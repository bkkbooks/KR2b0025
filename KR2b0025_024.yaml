body:
  text: 九朝編年備要卷二十四宋陳均撰哲宗皇帝起甲戌紹聖元年止丁丑紹聖四年甲戌紹聖元年春正月貶韓嘉彥駙馬都尉韓嘉彥責置蘄州以其於長公主虧禮不遜擅宿外第也吏部侍郎彭汝礪言周之王姬下嫁諸侯車服不係其夫猶執婦道以成肅雍之德今嘉彥以不能下公主而廢是婦得以勝其夫矣婦得以勝夫則子可以勝父臣可以勝君其源一開其流有不可塞不可不謹除河東大銅錢禁二月以李清臣為中書侍郎鄧溫伯為尚書左丞清臣此時召自真定未至溫伯請復名潤甫尋卒紹述之説清臣唱之溫伯和之故二人由是並獲柄用葬宣仁聖烈皇后祔永厚陵三月壬申朔日有食之免宰執赴經筵先是侍讀顧臨進讀寶訓至漢武帝籍提封為上苑仁宗曰山澤之利當與衆共之何用此也丁度對曰臣事陛下二十年每發德音未嘗不本于憂勤此蓋祖宗家法耳讀畢呂大防進曰祖宗家法甚多自漢五日一朝長樂宮祖宗以來母后皆朝夕見此事親之孝也前代大公主用臣妾禮此事長之法也上曰今宮中見行家人禮大防又言宮禁嚴密此治內之法母后之家不預事此待外戚之法臣下有黜無誅此寬仁之法此皆家法行之足以致太平上甚然之呂大防罷知潁昌府後二日改永興軍大防朴厚憃直並不植黨與范純仁同心戮力以相王室立朝挺挺進退百官不可干以私不肯市恩嫁怨以邀聲譽輔政八年始終如一宣仁既祔廟殿中侍御史來之卲乞逐大防以破朋黨因疏神宗所簡拔之人安惇安燾呂惠卿以備進用大防亦自求去上遂從之親試舉人賜畢漸以下及第出身有差考官取答䇿者多主元祐楊畏覆考専取主熙豐者故漸為之首時䇿問乃中書侍郎李清臣擬進其略有曰復詞賦之選而士不加勸罷常平之官而農不加富可差可募之説雜而役法病或東或北之論興而河患滋賜土以柔逺也而羌夷之侵未已弛利以便民也而商賈之路不通又曰可則因否則革惟當之為貴聖人何有固必焉于是國論遂變清臣與僕射范純仁議不合士大夫爭陳紹述之䇿元祐之人皆相繼得罪矣蘇轍罷轍為門下侍郎上疏略曰臣伏見御試䇿題有復熙豐故事之意臣竊料陛下本無此心其必有人妄意陛下牽于父子之情不復深究是非逺慮安危故勸陛下復行此事此乃小人之愛君取快于一時而非忠臣之愛君以安社稷為悅者也竊觀先帝在位近二十年而終身不受號裁損宗室恩止袒免減朝廷無窮之費出賣坊場雇募衙前免民間破家之患罷黜諸科誦數之學訓練諸將惰慵之兵置寄祿之官復六曹之舊嚴重祿之法禁交謁之私行淺攻之法以困西戎收六色之錢以寬雜役凡此皆先帝聖謨睿斷元祐以來上下奉行未嘗失墜至如事或失當何世無之父作之於前子救之於後前後相濟此聖人之孝也漢武帝外事四夷內興宮室財賦匱竭於是修鹽鐵𣙜酤平準均輸之政民不堪命幾至大亂昭帝即位罷去煩苛漢室乃定光武顯宗以察為明以讖決事上下恐懼懷不自安章帝代之以寬仁愷悌之政後世稱焉本朝真宗天書章獻藏之梓宮仁宗聽政絶口不言天下至今韙之英宗濮議朝廷為之洶湧者數年先帝寢之遂以安靜豈其薄于孝愛輕事改易哉蓋事有不可當以社稷為重故也又言兩喜必有溢美之言兩怒必有溢惡之言喜怒不忘于心而以議天下之政必有過甚而不平者疏奏上已不悅李清臣鄧溫伯又先媒蘖之及面論上益怒責轍曰人臣言事何所害今以漢武帝上比先帝引喻甚失當轍復曰漢武明主也上曰卿所奏稱漢武外事四夷內興宮室立鹽鐵𣙜酤均輸之法其意但謂武帝窮兵黷武末年下哀痛之詔此豈賢主乎轍恐懼下殿待罪上聲色甚厲范純仁獨進曰史稱武帝雄才大略為漢七制之主轍果以比先帝非謗也陛下親政之初進退大臣當以禮不宜如此急暴上怒稍霽轍退舉笏謝純仁曰公佛地位人也歸急具奏乞寬刑誅特賜屏逐詔轍除端明殿學士知汝州吳安詩草制略曰事有可否固宜指陳而言或失中引義非是朕雖曲意含忍在爾亦自難安原誠終是愛君薄責尚祈改過上批蘇轍引用漢武故事比擬先帝可止散官知汝州仍别撰詞進入未幾虞䇿請逺謫轍上曰已謫矣可止也夏四月蘇軾降知英州侍御史虞䇿論端明殿學士兼翰林侍讀學士知定州蘇軾所作呂惠卿誥詞語涉譏訕來之卲亦言軾在元祐間凡作文字譏斥先帝呂惠卿制詞曰均輸之政自同商賈手實之法下及雞豚呂大防制詞則曰民亦勞止願聞休息之期司馬光神道碑則曰其退於洛如屈原之在陂澤凡此之類播在人口當原其所犯明正典刑有旨落職降知英州制詞略曰軾行汚而醜正學僻而欺愚頃在先帝自取疏斥肆豫纂服開以自新弗訛爾心覆出為惡軾於書命之職公肆誣實之辭凡兹立法造令之大經皆曰蠧國害民之弊政顧威靈之如在豈神理之可容深惟厥辜宜竄逺服祗奪近職尚臨一邦蔡卞所草也于是元祐諸人相繼黜責軾為之首詔改元曽布為翰林學士請復先帝政事且乞改元以順天意遂降御札略曰朕日聽外朝之治躬臨萬務之機眇若涉淵未知攸濟顧念祗承上帝誕保受民惟駿惠於先猷以纘隆于下武乃稽仁祖之成憲思大文考之烈光其因盛夏之辰載新元統之號宜改元祐九年為紹聖元年於是天下曉然知上意所向矣張商英自開封推官出五年不召及為諫官故攻元祐大臣不遺餘力商英疏略曰我神考發明道德之意以作成人才同一風俗大志未集神靈在天宣仁太后保佑陛下托心腹于輔弼寓視聽于臺諫而勢利之下是非蜂起阿諛附會一旦烏合上叛君親之恩下背師友之訓或以小合傳緘白晝告急或以手扇障面夜半造門或苞苴結子弟之歡或伏地修門下之敬于是浮言競作鄙謗交興川洛異黨泰汶分明撥而後動謂之天平子大而無見謂之盲大蟲交通相紐謂之八關隂私搆架謂之五鬼誰何門户謂之約閙抱持其足謂之小鬼捨所親而去謂之過房失所合而還謂之歸宗伺候報探謂之滅門瞪走馬鐙勢盡相圖謂之徒中反告嗚呼學士大夫平日不素講聞師儒先生之髙誼不自慎重身被譏議亦有足悲者若滋長不已則憎愛恩怨未易改也臣願陛下以臣此章降手詔戒勵仍揭朝堂范祖禹罷出知陜州先是祖禹屢乞補外上曰不須入文字執政官有闕政蓋上欲以代蘇轍也既而沮之者衆祖禹又固求出乃有是命以王安石配饗神宗廟庭章惇為右僕射制詞曰方政令出於簾帷操柄歸于廊廟善政良法多所紛更正色危言不憚強禦十年去國一德保躬雖風波並起于畏塗而金石不渝乎素履又曰四方之休戚壅于上聞羣臣之忠邪牽于公議眷求真宰秉我國成翰林學士曽布所草也於是禮部侍郎楊畏急令人語惇曰畏前日度勢力之輕重遂因呂蘇以逐摯燾方欲逐呂蘇而二人覺罷畏言職畏迹在元祐心在熙寧首為相公開路者畏先後立朝更元祐元豐紹聖每變其説以投時好人謂之楊三變云范純仁罷知潁昌府初純仁既為右僕射于事無所私隱同列或病之呂大防引楊畏為諫議大夫以自助純仁以畏不靖不可用大防曰豈以畏嘗言相公耶門下侍郎蘇轍從旁誦其彈文純仁遂力丐去故有是命罷五路開寶通禮科復元豐免役法初役法差募二者俱有弊王安石主雇司馬光主差范純仁蘇軾俱光門下士亦以差役為未便章惇安石門下士亦以雇役為未便純仁軾惇雖賢否不同然悉聰明曉事兼知南北風俗其所論甚公各不私其所主元祐初光復差役惇議曰保甲保馬一日不罷有一日害如役法則熙寧初以雇役代差役講之不詳行之太速故後有弊今復以差役代雇役當詳議熟講庶幾可行而限止五日太速後必有弊光不以為然惇對太皇太后簾下與光爭辨語不遜太后怒惇以罪去蔡京時知開封府用五日限改畿縣雇役之法至是惇入相復議以雇役改差役置司講議除京為户部尚書兼提舉于是京欲掩蓋元祐迎合之迹乃白惇曰取熙寧元豐法施行之耳尚何議為惇信之遂請人額雇直一從元豐舊法閠月復提舉常平等官以陸師閔等二十三人為之時左右相虛位李清臣有所覬覦乘章惇未至亟除師閔等罷十科復義倉除二廣外復置之復元豐改官員每歲毌過一百四十人以朱服為中書舍人彭汝礪罷自上親政修復元豐故事士大夫爭獻所聞吏部尚書彭汝礪一無所論而知壽州朱服賀改元表力詆元祐變法時章惇欲專黜陟之柄乃出汝礪為寶文閣直學士知成都府而召服為中書舍人於是上官均言汝礪行義髙潔今雖除美職與藩郡其實疏之非所以進正人也服柔佞傾險今自外擢為從官非所以逺佞人也不從汝礪堅辭行章纍上或以為慢當謫上不許降寶文閣待制知江州尋又以都承旨召之命未下而卒五月罷進士習賦令專治經術各專大經一中經一願專二大經者聽立宏詞科明年禮部立試格除詔誥赦敕不試外章表依見本式賦如唐人斬白蛇幽蘭渥窪馬賦之類頌如韓愈元和聖德詩柳宗元平淮夷雅之類針如揚雄官針九州針之類銘如桞宗元塗山張孟陽劒閣銘之類戒諭如近體戒諭風俗戒百官之類序如顔延之王融曲水詩序之類記亦用四六詞理俱優者為上等次優者為次等詞格超異者取旨上等循兩資次等循一資承務郎以上比類推恩重修神宗實録翰林承旨修國史曽布言奉詔重行修史定神宗實録請取王安石日録參照編修六月貶黜呂大防等有差大防自永興知隨州劉摯知黃州蘇轍知袁州蘇軾安置惠州呂希純自崇政説書知懷州中丞黃履言大防劉摯梁燾當垂簾日俱為柄臣燾先倡邪言吳處厚繼陳詩誣劉安世等遂共攻之乃投蔡確于外竟不得見慈親而死陛下躬臨機務寖復確官而陷確者宜加顯黜左司諫翟恩言大防等擅作威福誣竄呂惠卿蔡確乞各正其罪右正言上官均言大防及蘇轍擅權敗君竊㺯威福及前中丞李之純朋邪相濟又引楊畏虞䇿來之卲等在言路其所擊彈皆受大防轍密諭范祖禹喬執中吳安詩呂希純為給舍亦附會大防與轍之意所繳駁者其所惡也所掩蔽者其所愛也今之純雖責而畏為吏部侍郎䇿為起居郎之卲為侍御史執中為給事中祖禹希純雖出守尚除學士待制未快士論左正言張商英言先帝厭代之後司馬光呂公著呂大防劉摯等援引朋黨肆行譏議凡詳定局之建明中書省之勘會户部之行遣言官之論列詞臣之誥命皆指摘嗤笑當垂簾之際剪除陛下之羽翼於內擊逐陛下之腹心於外天下之勢殆哉岌乎今天清日明雷動風行而誅賞未正臣竊疑之望與大臣斟酌而可否焉又言朝廷敘呂惠卿蔡確以常法則是猶以為真有罪者惠卿幸而不死偶占恩敘當顧命之際確何負於陛下而殺確者以美官要職布列中外曽無曲直之辨哉侍御史來之卲言司馬光之秉政擢摯為御史摯首引王巖叟朱光庭布列言路凡欲施設摯言之於下光等行之於上是時先帝陵土未乾而光等更唱迭和剗革掃除忠臣義士熟視而吞聲光與巖叟光庭相繼已死獨摯未即殂者此天以遺陛下也又言蘇軾雖黜未厭衆論於是並行責降商英又言燾及范祖禹吳安詩劉安世唐老孫升韓川等當呂大防擅權時或在臺諫或在給舍並以親舊相為表裡通傳指意彈劾繳駁搆撰飛語中傷無罪人首惡雖已貶黜而燾等猶未明示竄殛傳曰去惡如農夫之務去草芟夷蕰崇之勿使滋蔓願陛下亟圖之于是降燾知鄂州安世知南安軍川知坊州升知房州安詩監光州鹽酒稅除字説禁周秩罷時為監察御史上言元祐黨人之言曰向有御批欲增隆皇太妃儀物又如治平中議濮廟令吕大防如何住得所以求去且大防與司馬光等向議濮廟事以歐陽修議為非當而朝廷惑於邪説至今英宗所生母任氏猶為仙遊縣君嗚呼邪説盛行使天子不得尊其母可不恨哉上讀至呂大防如何住得所以求去曰大防何嘗有言且儀物事未付外非有司所當與今秩越次及之是迎合也又讀至使天子不得尊其母上曰此言激怒也又言垂簾日姦臣謀害蔡確引鄭穆等自王府官為侍從使親王私于權臣上曰此是何言使親王聞之且不自安如秩置之言職朝廷無安靜之理遂以秩知廣德軍秋七月追奪司馬光等贈諡竄呂大防等於諸州以黃履周秩張商英等交章論之也追奪光及呂公著贈諡及所賜神道碑額撤樓毁碑奪王巖叟所贈官貶大防劉摯蘇轍梁燾劉安世官分鄭蘄筠鄂南安軍居住初章惇欲用蔡卞議光及公著並發塜斫棺上不聽下申警詔略曰朕繼體之初宣仁聖烈皇后以太母之尊權同聽政自以簾帷之間見聞不能周及故不次以用大臣推心以委政事而司馬光呂公著忘纍朝之舊恩懷平時之觖望幸國家之變故姦邪之深謀引吕大防劉摯等周旋欺蔽表裏符同宗廟神靈恣行訕瀆朝廷號令輒肆紛更首信偏詞輕改役法開訴理之局使有罪者僥幸下疾苦之詔使羣小人謗言誣橫斂則濫蠲茍免之逋誣厚藏則妄耗常平之積崇聲律以輕薄經術任穿鑿以紊亂官儀棄境土則謬謂和戎弛邊備則歸過黷武城隍保民而罷增浚器械資用而缺繕修凡屬經綸一皆廢絀人才淆混莫辨於品流黨與縱橫迭分於勝負務快乘時之憤都忘託國之謀方利亮隂之不言殊匪慈闈之本意十年同惡四海吞聲敵計得行邊民受害其司馬光以下各已輕重議罰至於射利之徒脅肩成市盍從申警以革回邪推豫不忍之仁開爾自新之路布告天下宜一切不問先是周秩等又言文彥博背負國恩詆毁先朝詔彥博年及耄期四朝舊相先帝待遇恩禮至優宜加闊略以優老臣可特置不問復免行錢上謂章惇曰須從民便不願者勿強也又曰如寬剩錢亦何須取之朝廷安待此以佐用耶乃詔開封不得抑勒及取寬剩毌過一分置府界孶生監八月開洛口新河吳安詩言廣武境危迫請開汴河導洛南流遂詔安詩提舉開修洛口新河九月罷制科考官上張咸吳儔陳晰各六論上謂章惇曰制科所試䇿與進士䇿無異先朝嘗罷此科何時復置曰元祐初復置李清臣曰漢亦不設此科上曰進士䇿亦可言時政闕失因詔罷制科廢廣惠倉其户絶田土並行出賣本倉見管錢斛撥入常平倉所有賑濟合行事令户部檢舉元豐敕令立法以聞冬十月呂惠卿徙知大名府自江寧改除樞臣韓忠彥曽布曰惠卿在朝善人君子何以自立上曰只令知北京豈可留也又曰王安禮勝惠卿又曰呂嘉問吳居厚皆刻薄布因言章惇專權日甚一日若以舊恩欲保全之則不若制之于初先帝禮貌王安石言聽計從亦未嘗敢爾也布又曰除臣與忠彥曽稍開陳他人有敢言其非者否此不可不察時布已有傾惇之意矣以常安民為監察御史用中丞黃履薦自開封推官有是命安民入對上問曰聞卿嘗致仕安民曰臣元祐七年丁母憂病篤致仕服除范祖禹趙君錫以臣年齒未老聞於朝廷遂再通籍上又問元祐任何官安民具以實對且言鄧溫伯蘇轍蘇軾皆嘗薦臣為臺官以拘于資格不除因奏曰祖宗置臺諫官乃好言之意天下事付與執政使行之行不當則臺諫言之天子惟擇執政與臺諫而已自可無為而治故臺諫官人君當自擇近歲多由執政度其附已然後除授故雖名為天子耳目其實執政私人上曰今日如何安民對曰今日之患莫大於士不知恥人茍無恥則擇利而趨見害而避無事之時惟祿仕所誘奔走俯仰供為臣職一旦投之患難之地則掉臂而去矣今之大臣所提撕者皆無恥之人當元祐中進言則以熙豐之政為非而當時為是及今日進言則以元祐之政為非而熙豐為是是皆偏論臣嘗謂先帝以天下不無積弊故須變革然末年已有欲趨安靜之意陛下即位之初亦因時之宜務以寬仁鎮靜稍更作為之政今進言者一切以為非願陛下公聽並觀是者行之非者改之無問新舊惟歸于當上深然之謂執政曰安民議論公正無所阿附安民尋上疏略曰大臣不和于上朋黨交惡于下紛拏詆訐虧損風俗陛下姑務兼容不明邪正曲直則紀綱豈不日就陵遲昔唐文宗初亦慨然有意於治史稱儒雅恭險出於天性故太和之後朝廷號為清明惟以牛僧孺李德裕二黨相攻黑白不分德裕之黨有鄭覃陳夷行僧孺之黨有楊嗣復李班同時並用紛爭于前唐祚遂衰陛下若不能辨邪正則朋黨何時可破牛李之禍可不戒哉河盡復東流初吳安持乞於北流作軟堰蘇轍以為不可遂罷之中丞李之純言大河東流已漸深駛宜及時因塞北派髙其隄防使專向東行安持奏乞塞梁村口縷張包口閘內黃決口仍于東流多疏口地及閘雞爪河遂詔安持速往河上同河北諸監司按視是春中書舍人呂希純侍御史元亮采行河希純言東流雖深本自人力北流雖淺而水勢極順都水監所請五事惟縷斷張包等河門恐壅遏北流之勢不可施行從之于是用希純等言詔增治北流堤岸閉內黃決口鑿開九里堤東河亦疏口地開雞爪河以助其勢既又遣都水使者王宗望速往措置及是奏言河悉已東還故道北流斷絶十一月復八路差官法熙寧七年立七路注官法元祐七年詔八路官並歸吏部差注至是復之八路當考録周後賑河北飢十二月河東鹽復官賣法轉運司言本路鹽課以一年最多之數比元豐最少之年猶不及三分之二請罷去客人算請官自賣從之明年春制置解鹽司言同華解耀州河中陜府出産私鹽盜販公行乞許本司立額官自出賣從之嚴銅錢出界禁奉使鄭價言北界支到抬廂人例物見錢七十餘貫並是國朝新鑄錢寶遂詔增重其禁論修史罪范祖禹等並竄黜祖禹永州趙彥若澧州黃庭堅黔州並安置坐修神宗實録詆誣也言者論所撰實録美意良法輒敢隱沒而微言譏刺者凡數十事詔祖禹等供答至是國史院會到祖禹彥若庭堅各稱别無按據得之傳聞上曰史官敢加誕謾不恭遂有是命明年正月右正言劉拯等言祖禹等纂修先帝實録擅敢增損厚加誣毁為臣不忠不可赦止以散官安置善地屈法多矣呂大防實董其事書成則冒賞轉官罪敗則責罰不及非所以正賞罰示勸懲也望先追奪所轉官仍正誣毁之罪竊慮朝廷以礙敕榜為難況敕榜未出已有臣僚論列大防罪誠無所礙詔大防追奪兩官趙彥若范祖禹陸佃曽肇林希並追奪兩官除林希在職日淺外曽肇與小郡陸佃候服闋與小郡黃庭堅特追一官未幾拯等復論大防詔降官分司南京安州居住三年八月范祖禹自永州安置賀州劉安世自南安軍安置英州坐元祐中同上疏論禁中覔乳母事章惇發之故再謫乙亥紹聖二年春二月賑河北飢以內庫錢帛各十萬賜河北東西兩路提舉司準備賑濟夏四月以邢恕知青州恕入見泣涕曰臣不謂今日復得見陛下以至淚濺袍上不樂遂令赴青州初恕請入覲上謂韓忠彥曽布曰李清臣言恕有八劄子常在懷中此必曽以示人耶曰臣不聞此言因言恕人才文采皆不可得但多言耳上曰政為此上殿必亂道忠彥曰所言必有以惑聖聽上曰恕自謂有定䇿功布曰此豈惟恕狂妄而劉安世等指為四凶乃與蔡確章惇等恕小官何得與此忠彥曰梁燾亦以此攻之布曰恕嘗誚元祐執政云恕雙手分付與箇太平天下却逐恕在外聞者皆笑之上亦笑及是忠彥問恕對甚久上曰恕但説與惇確議事云王圭有邪心曽曰但以家事歸之太母大臣不須與議布言臣亦曽見恕言圭以語清臣清臣以告惇確上曰圭果何如布曰圭傾邪何所不至不足怪忠彥曰當時緣公繪及確故貶上曰確之禍由恕起渠云嘗自辨于太母太母亦欲召還恐無此事云是公繪報之布曰未必不為公繪所紿忠彥曰恕當時言太母待遇太妃事上曰渠亦自言布曰亦聞其教公繪云非髙氏之福太母尤怒此語上曰此語誠非理布曰此人學識以至盡心公家誠不可得但多犯分如欲調一確與司馬光令新舊同力此豈可得上亦笑之置律學博士秋八月録趙普後罷熙河等路分畫地界時章惇曽布方謀用兵故先勸上罷分畫開邊自此始元祐間孫路為徐王侍讀聞朝廷議棄地即上書言自通逺至熙河兩州才一徑爾熙河北關已接夏境昨自開闢地百八十里瀕大河而城蘭州然後熙州有屏蔽使夏虜北據蘭州南跨故境熙河固已迫矣出而左則通逺絶出而右則河州斷熙州孤寄一川中豈不殆哉恐有不測則岷州亦不守而階成遂失蜀道甚可憂也橫山一帶地險阻而肥沃人強悍而善戰謂之山界部落徑兵之處此元昊所以渡砂磧而肆猖狂者昨大兵一出而城壁峙立雖未盡橫山之廣已裂其腹心而城其要害矣今若委而與之其衆復集其地復守且相導而南下則環慶而東麟州以西傍邊之人豈得安枕是蘭州橫山未可輕議也不報于是朝廷知路有前日之議命為陜西轉運是歲正月遷環慶經略安撫九月范純仁降知隨州純仁知陳州上疏言望陛下于日近進擬赦文之際特降御批令添入昨來呂大防等坐貶謫各指定州軍居住及安置者並特許於外州軍取便居住如此則澤及幽隱和氣充盈太皇太后神靈在天亦當欣懌凡五十上奏上有從意章惇力主前議且謂純仁同罪未録乞并責之於是御批純仁立異邀名阻抑朝廷已行之政可落職改隨州越明年以武安節副貶東川辛亥大饗明堂先是曽布獨言大禮恩宥在近去歲貶謫人不知何以處之上應聲曰莫不可牽復布曰誠如聖諭蔡確五年不移呂惠卿十年止得移居住處吳居厚等十年不與知州軍此皆元祐起例自可依此昔蔡京曽為臣言錢協已曽來京處探問謫降人牽復消息京但答以不知布又曰如梁惟簡近方押送峽州九月中未知到否豈可便移上曰豈有此理因問惟簡此行衆頗喜否布曰此舉固足以警兩端之人然亦有喜有不喜者元祐之人未免以為過也遂有呂大防等永不敘復指揮常安民罷安民為監察御史上疏言蔡京之姦足以惑衆辨足以飾非巧足以移奪人主之視聽力足以顛倒天下之是非內結中官外連臺諫今在朝之臣京黨過半陛下若不早覺悟逐去他日羽翼已成雖欲去之嗟無及矣又言今凡為紹述之説者其實皆借此名以報私怨一時朋附之人從而和之遂至已甚張商英在元祐時上呂公著詩求進其言諛佞無恥士大夫皆傳笑之及近為諫官則上疏乞毁司馬光呂公著神道碑周秩在元祐間為太常博士親定司馬光諡為文正及近為正言則上疏論司馬光呂公著乞斫棺鞭尸陛下察此輩之言果出于公論乎朝廷凡事不用元祐例至王圭家蔭孫五人皆圭身後所生乃引元祐例許奏薦近日請復官制職事官不帶職寄祿不帶左右至于權尚書侍郎獨以林希李琮之故不復改易如此等事謂之公心可乎故凡勸紹述先帝者皆欲託先帝以行姦謀謂它事難以感陛下若聞先帝則易為感動故欲快恩仇陷良善者須假此以移陛下之意不可不察又言宣仁太后甚得人心前日陛下駕幸秦楚大長公主第澆奠及輟朝并命敕葬諸費從官給人人無不歡呼權臣橫恣朋黨滿朝言官未嘗一言及之惟知論元祐舊事力攻已去臣僚臣荷陛下奬拔不敢負恩摧枯拉朽之事臣實恥為之舉朝疾臣誣陷非一臣賦性愚直終恐不能勝朋黨之論願乞外以避之上開慰而已未幾命與安民知軍惇乃進擬送吏部降監當明年董敦逸論瑶華事上怒欲貶之謂執政曰依常安民例與知軍惇救之乃知上初不知安民降監當也冬十月河南府地震十一月安燾罷出知河南府燾與章惇舊相好及為門下侍郎惇意燾必助已而燾寖多駁議惇憚而惡之所以排陷燾者無所不至上祠明堂齋于太廟燾為儀仗使後宮有絶馳道穿仗而過者燾且彈劾已而常安民諫劉美人侍祠語尤訐上怒欲逐之燾言安民以言為職雖過當願少寬假惇因是白上曰燾與安民相表裡今安民狂妄如此而燾力救解其意可見安民既責燾不自安遂求去位上從之追贈蔡確贈太師諡忠懷用左司諫劉拯之言也十二月詔察官免言事舉臺諫毋限資元豐末減察官二員令殿中侍御史兼領而察官亦許言事至是命復置三員分領六察不許言事又詔奏舉臺官毌限資序編元祐章疏尋詔崇政説書沈銖赴樞密院編類銖以進講在近求免宰執進呈曽布曰此事外議多不以為然故銖亦不願且元祐中妄論者非一此令一行則人不安豈有朝廷行一事而使天下之人皆不自安之理然業已行則止于兩府侍從臺諫可也其他且已上以為然布又言銖恐難強遂命考功郎中余中代之越四年春正月樞密副承旨宋球等編成一百四十三册詔録本進入御史陳次升言陛下即位之初詔令天下直言親政以來又揭榜許其自新今若考一言之失置于有過之地則前之詔令適所以誤天下後之敕榜適所以誑天下非示天下大信也願寢勿治蘇州地震自夏涉秋方止丙子紹聖三年春正月以楊畏知虢州時知成德軍改河中府右正言孫諤言畏在元豐間為御史議論皆與朝廷合元祐末呂大防蘇轍用事則盡變而從之紹聖初陛下親政則又偷合詭隨締交執政天下之人謂之三變望顯黜之有詔落職中書舍人盛陶繳詞頭遂改虢州出內庫金帛助邉出內庫金帛六十五萬赴五路經略司封樁自後降賜非一不盡録二月罷富弼配饗三月以禁中屢火罷春燕尚書省火劒南東川地震夏四月命河東鑄當三鐵錢復罷宣徽使五月孫諤罷出知廣德軍時為左正言上疏略曰免役者一代之大法在官之數元豐多元祐省雖省未嘗廢事也則多不若省散役人之直元豐重元祐輕雖輕未嘗廢役也則重不若輕大綱立矣隨時不能無損益者衆目也數省而直輕則民之出泉者易矣出泉之法四方不同有計錢之多寡而輸之者其弊在於常平官所賦輕重之不均有計田之厚薄而輸之者其弊在於元差官所定美惡之不平若使輕重均美惡平而後行焉則民之出錢者易而法可久也今役法優下户使弗輸所取併歸上户意則美矣而法未善也願陛下博採羣言無以元豐元祐為間要以使元元無不均之患豈不盛歟蔡京力攻其説且謂劉摯以熙寧四年言役法十害內第一害謂紛錯不均曽布以為均第二害劉摯以為貧富多少不平曽布以為平不均不平之辨已判二十年矣諤於二十年後竊取其説言於陛下追復之日臣愚不知諤果何心也上以諭曽布曰孫諤論役法却云元祐輕元豐重兼與劉摯之説同布曰恐不同方今言路中正直惟諤等一二人願更賜察上頗欣納時陳次升擊蹇序辰章惇蔡卞共加庇護進呈次升章不行而排諤甚急布即奏云惇卞欲因此罷諤言職而庇序辰等邪正顛例是非貿亂冇誤聖政明日又言之上諦聽不已然而終以諤為助元祐者詔罷言職補外秋九月滁沂州地震廢皇后孟氏初后朝謁景靈宮訖事就坐諸嬪御侍立劉媫妤獨背立簾下后閣中陳迎兒喝曰綽開婕妤背立如故由此閣中皆忿冬至朝隆祐宮俟見后所御坐朱髹金飾媫妤頗愠從行者為易坐製與后等衆皆不平故傳喝曰皇太后出后去所媫妤亦起立或已撤媫妤坐尋復所遂頓于地媫妤不復朝泣而去遂訴于上時內御郝隨用事謂媫妤曰母以此戚戚蚤為大家生子此坐正當為媫妤有耳會福慶公主病后冇姊頗知醫嘗已后危疾以故出入掖庭投公主藥不效乃取道家治病符水以入宮㜮以示后后變色問曰此何從來㜮對以實后曰六姊寧知中禁嚴密與外舍異耶戒令存之俟上至言所以既而上過視公主疾后特以告上上曰此亦人情之常耳后即取符爇于前宫禁相傳壓魅之端作矣未幾后養母聽宣夫人燕氏尼法端與內供奉官王堅以左道為后禱祠事聞上召宰相謀之章惇請禮官共議蔡卞曰既犯法何用禮官乞掖庭置獄差宦者推治遂詔內侍梁從政蘇圭即皇城司鞫之御史陳次升言廢后事重且自古鞫獄皆付外庭未有宮禁自治付之閹官者萬一寃濫貽後世譏乞選侍從臺諫置獄庶獲情實不報獄具堅坐以家藏雷公式示法端又以南方聽得楓木銅法端即光教院造式作后禱祀有所厭者伏所求者得等語式成恐門户譏察以棗入之而入法端坐與堅造式又嘗令堅求閭巷間所謂驢駒媚蛇霧叩頭蟲者以進后令佩往上寢殿燕氏坐上過后閣燒歡喜字作符取灰將置茶中以進會上不欲茶而止又燒符和水以灑御路兾上數來又令堅繪劉媫妤像以大釘釘其心又欲取五月中療死宮人燒尸灰致劉寢覬其亦以此疾惡死又取七家針各一燒符灰致劉閣中皆以厭呪卒無驗尋命侍御史董敦逸録問遂詔廢后遷居瑶華宮王堅法端燕氏皆處斬比所連逮以等第定罪經由失譏察等官貶秩罰金有差陳迎兒因始造為語言激怒中宮杖脊逐出詔獄初起禁中捕逮幾三十人箠楚甚峻皆宦官宮妾柔弱之人既録問罪人過庭下者氣息僅屬或肢體毁折至有無舌者無一人能聲敦逸秉筆疑未下郝隨從旁脅之敦逸畏禍不能剛決乃以奏牘上蓋宰相章惇迎合於外而郝隨擠排于內莫有敢異議者上曰朕待后有禮不意其所為如此今日之事誠出于不得已上言及此惻怛見於顔色惇等奏曰廢后大事也陛下誠出於不得已願少寬聖心敦逸復奏言中宮之廢事有所因情有可察詔下之日天為之隂翳是天不欲廢之也人為之流涕是人不欲廢之也且言嘗録問獄事恐得罪天下後世上曰敦逸不可更在言路曽布曰陛下本以皇城獄出于近習推治故命敦逸録問今乃貶録問官何以取信中外上然之冬十月夏人大舉入寇鄜延經略使呂惠卿諜知之乃制為前後左右中及前左前右後左後右九軍及東西兩遊奕凡十一軍而自行主將事分巡府城外北山及賈家山嘉領山宅子谷諸處而使圍在府後之三川亭建帥旗外又周立十一軍旗帥司有令則舉逐軍旗而逐軍以旗應逐軍有稟亦舉旗而帥司以本軍旗應又為之開門河道使相通以便出入為援慮賊兵併以攻一軍乃制䇿應十一軍悉屯於城裡與外軍相近部分既定李乾順與其母梁氏率衆渡河至烏延口分為三路晝夜疾馳至青龍平距府城五里盡圍諸寨而以輕兵與諸將戰賊亦為十一寨其二在金明北其九在金明南云初賊欲以重兵圍延州而後南掠鄜州及至延州見有備欲攻則城不可近欲掠則野無所有欲戰則諸將按兵不動欲南則有腹背受敵之患留二日即拔寨北去攻陷金明寨惠卿遣將追之賊以精騎殿而不奔第四將張輿及李淮戰死諸將不敢擊奏聞章惇怒張輿軍失主將欲誅四千人中書侍郎李清臣曰將沒亦多端或先登爭利輕身入敵今全軍盡誅異時亡將全軍盡降虜矣于是詔惠卿隨宜裁處所誅牙兵才十六人而已雷大雨雹城安西築汝遮城賜名安西自後進築城寨非一不盡録十二月宗正宗景罷宗景娶楊氏妻詔許之矣已而聞實妾也詔落開府罷宗正丁丑紹聖四年春正月田嗣宗坐指斥抵死李清臣罷嗣宗清臣之表弟清臣出知河南府授轄正節度使去秋阿里庫卒子轄正嗣立至是加封二月追貶司馬光等奪贈有差光追貶清海節副公著建武節副王巖叟傅堯俞趙瞻並奪所贈官追韓維致仕及孫固范百祿胡宗愈遺表恩三省言光公著唱為姦謀詆毁先帝變易法度罪惡至深當時凶黨雖已死及告老亦宜薄示懲沮故有是命是夏復追貶光朱崖軍公著昌化軍並司户先是邢恕嘗為章惇言神宗晏駕時范祖禹赴召光送别謂祖禹曰方今主少國疑宣訓事不可不慮宣訓者北齊武明婁太后宮名也后廢其孫少主殷立其子常山王演恕常謗宣仁有廢立意故造為此説惇雖知其妄但借此以罪光謂光志在傾搖猥以武明事擬宣仁併公著追貶之詔給舍舉職給事中葉祖洽言先帝修復官制其意蓋欲使之更相檢察而不得混亂也故中書省置中書舍人以行為職其不可行則繳之門下省置給事中以讀為事其不可讀則駁之蓋以為廟堂之上議論施設或有差誤人主有所不知則給舍得舉其職上聞如此則政事之闕常救于未然而朝廷無過舉今使中書舍人兼權給事中又令凡有書過文字並不回避如此則中書舍人即是給事中給事中即是中書舍人不惟名實混淆而給事中職事遂廢當其職事者自行自讀或有阿附可以蕩然肆志無所忌憚命令既出雖有言者亦無及矣詔特旨書讀不回避外餘令互書夜有紅光出西北繼得亳州奏其夕紅光自太清宮老君兩眉起遍殿北連洞霄如兩紅橋中有白光二鼓後散歸西北天門人皆以為火視則赤雲成片四鼓後東方亦然或謂蚩尤旗長蔽天者是也罷春秋科再竄呂大防等三十餘人三省言大防等為臣不忠罪與司馬光等無異頃朝廷雖嘗懲責而罰不稱懲內范純仁又自因别過落職于本罪未正典刑生死異罰無以垂示萬世遂貶大防劉摯蘇轍梁燾范純仁為散官安置於循新雷化永五州劉奉世郴州居住韓維落職致仕王覿通州韓川隨州孫升峽州呂陶衡州范純禮蔡州趙君錫亳州馬默單州顧臨饒州范純粹均州孔武仲池州王欽臣信州呂希哲和州希純金州希績光州姚勔衢州並居住吳安詩連州安置王汾落職致仕張耒朝補之賈易並監當程頤追毁出身以來文字秦觀移橫州編營並依紹聖二年八月二十一日指揮永不收敘朱光庭孫覺趙卨李之純杜純李周並追奪大防等制詞皆葉濤所撰極其詆毁尋降文彥博太子太保諸子並勒解官司馬康奪贈官去秋七月詔知滑州呂大忠在元祐中堅持邉議不為黨人所回加寶文閣直學士知秦州大忠因言臣弟大防自罹謫籍流落纍年南北乖暌山川修阻既衰且病來日幾何一旦不虞倐先朝露死生隔絶銜恨無窮望賜哀憐將臣已除職名乞行追寢只量移大防陜西州郡居住所貴聲問稍近少慰終鮮急難之情不報先是大忠自涇原入對上語大忠曰曽得大防信否對曰近得之上曰安否又曰初議令過海朕獨處之安州知否對曰舉族荷陛下厚恩上曰有書再三説與且將息忍耐大防朴為人所賣候二三年可復相見大忠拜謝以告章惇其請大防量移蓋恃前日上語也大忠既以所得上語告惇及還因為通判潘適言之適歎曰公失言矣必為深悔於是大防再責或曰循州之行上語實激之蓋章惇等疑上意復欲用元祐人故再行貶黜是歲蘇軾自惠州移昌化軍范祖禹自賀州移賓州劉安世自英州移髙州並安置明年知雷州張逢周恤流人蘇轍兄弟同官吏門迎轍軾且館轍于州民吳國鑑家每月移存否差借白直董必奏之轍徙循州逄停官范祖禹徙化州劉安世徙梅州秦觀徙雷州閏月上書人張天説抵死上批天説所進書觀其立意狂妄詆毁之言上及先帝下及朝廷可送開封府取勘其後開封府言天説私有景祐福應太一集要上書詆訕先朝情不可恕特處死自是妄言者莫不誅死以曽布知樞密院林希同知章惇之拜相也布在翰林草制極其稱美望惇用為同省執政惇忌之止拜同知樞密院於是又遷知樞密院布得獨對惇疑布更引希同知使密察之希尋為布所誘亦背惇布與惇益不合卒傾惇奪其位大雨雹三月親試舉人賜何昌言以下及諸科六百餘人及第出身有差幸金明池風甚池浪如山新作龍舟艤於水心殿東不復登水嬉等船皆罷殿中侍御史陳次升上疏略曰伏聞金明池新造龍船費用萬貫肆為侈靡窮極工巧必非陛下意也陛下躬不世之資襲祖宗之慶勤儉過於夏禹天下之所共仰有司乃不能宣明德意所造不乘之舟其費如此而遊幸之日天乃大風豈非愛祐陛下而使覺悟有司之過乎兹事既往雖不可救亦足以為來者之戒先是以修龍船了畢特支度牒十五道賜楊琰御史蔡蹈言楊琰者本木工止緣技巧馴致使名祿養豐厚時有加賜近代以來以工巧被寵遇者未有如琰比也龍舟之役其費不資朝廷不責其過侈而反以度牒賜之甚亡謂也若謂其功可賞不過百工之事何足多尚今賞之過厚無不議論凡賞罰所以存勸沮也今以一龍舟而命賞過厚不知勸何在耶若謂其勞可賞則邊陲用命國爾忘家之人不知何以為賜兼臣竊見諸路每有興修干乞度牒詰問勘當十不得五其重惜如此而獨濫于賞琰不知為意何耶夏四月陳瓘罷初太學博士林自阿蔡卞之意唱言於太學曰神考知王安石不盡尚不及滕文公之知孟子也士大夫皆駭其説校書郎陳瓘謁章惇求外任因具以告惇惇大怒召自而罵之章蔡皆由是不合瓘自為小官時即特立敢言紹聖初惇以宰相召道過山陽瓘適相遇隨衆謁之惇素聞瓘名獨請登舟共載而行訪以當世之務曰計將安出瓘曰請所以乘舟為論偏重其可行乎或左或右其偏一也明此則可行矣惇默然瓘復曰上方虛心以待公公必有以副上意者敢問將施行之敘以何事為先何事為後何事當緩何事當急誰為君子誰為小人惇良久曰司馬光姦邪所當先辨瓘曰相公誤矣此猶欲平舟勢而移左以置右也果然將失天下之望惇厲聲視瓘曰光輔母后獨宰政柄不務纂紹先烈大改成緒誤國如此非姦邪而何瓘曰不察其心而疑其迹則不為無罪遂以為姦邪而欲大改其已行則誤國益甚矣乃為之極論熙豐元祐之事以為元豐之政多異熙寧則先志固已變矣溫公不明先志而用母改子之説行之太驟所以紛紛至於今日為今之計惟當絶臣下之私情融祖宗之善意消朋黨持中道庶乎可以救弊若又以熙豐元祐為説無以壓服公論恐紛紛未艾瓘辭辨淵源議論徑正惇雖忤意亦頗驚異遂有兼取元祐之語留瓘共飯而别惇到闕召瓘為太學博士瓘聞其與蔡卞方合知必害正論遂以婚嫁為辭久而赴官於是三年不遷至是出為涪州通判當瓘為博士薛昻林自之徒為正録皆卞黨也競尊安石而排元祐卞方議毁資治通鑑板瓘聞之因䇿題時引序文以明神考有訓昻自愧遽以告卞密令置板髙閣不復敢議毁矣呂大防卒于虔州上始聞之曰大防何以至虔州及請歸葬即許之議者由是知痛貶元祐黨人皆非上意也紹興初追封宣國公諡正愍成都路復榷茶以西邊進築赦陜西河東制曰朕綏御九有懷柔四夷蠢兹西戎蕞爾小國弗茹其力敢拒大邦申命邊臣奉將薄伐方共武服已奏膚功闢疆復境者九城盡要害膏腴之地折馘執俘者萬計皆精鋭驍勇之人役不淹旬捷無虛日而財靡殫衆力非調民因其天亡之時成其席卷之勢然念士卒有暴露之苦雉堞有版築之勞宜覃鴻恩以慰邊俗應陜西河東州縣罪人流以下並釋之於戲武之所加者廣則澤之所及者深尚暨乃心克平兹土追貶王圭萬安軍司户三省言元豐末兩府大臣嘗議奏請皇太子就傅建儲事王圭輒語李清臣云他自家事外庭不當管蔡確章惇聞之對衆窮其所立圭不得已方云上自有子確惇宣言于衆其議遂定給事中葉祖洽言若以圭之罪無實迹則當時二三執政尚在見今侍從間甚有知其詳者皆可考況臺官黃履論之於前諫官劉拯論之於後近日髙士京又極陳其狀望陛下決于獨斷以慰中外遂有是命遺表恩例並追奪上之初嗣位也邢恕蔡確自謂冇定䇿功既而確死貶所恕亦斥不用心恨之其後恕帥中山會髙遵裕子士京為西京副將士京庸暗恕一日置酒誘士京曰公知元祐間獨不與先公推恩否士京曰不知又問有兄弟無曰有兄士充已死恕曰此乃傳王圭語言之人也當是時王圭為相欲立徐王遣公兄士充傳道言語于禁中知否士京曰不知恕因啖士京以官爵曰不可言不知為公作此事第勿以語人因令王域為士京作奏上之圭由是得罪先是上謂輔臣曰黃履三月末已有章論圭事朕以宣仁聖烈于社稷大計聖意素定自是內外羣小罔有窺度朕嘗語惇等先后乃婦人之堯舜也復侍從轉對五月文彥博薨彥博凝簡莊重顧盻有威逮事四朝薦更二府七換節鉞為將相五十年兩以太師致仕英傑奇雋名聞四夷熙寧中彥博在樞府尼惠普以妖妄就捕有司奏搢紳所與簡牘一時公卿多有之獨彥博無有神宗問其故對曰臣但不知耳如知之亦當有書時人美其分謗云諡忠烈復濬洛通汴六月癸未朔日有食之隂暗不見羣臣表賀太原府地震秋七月大內火火入鬼輿太史奏主賊在君側宜備上召太史詰之對曰讒慝之人皆賊也惟親近正人修德乃所以備之八月治同文館獄太府寺主簿蔡渭奏臣叔父碩嘗於邢恕處見文及甫元祐中所寄恕書具述姦臣大逆不道之謀及甫彥博子也必知姦狀詔翰林承旨蔡京吏侍安惇同究問初及甫與恕書自謂畢禫當求外入朝之計未可必聞已逆為機穽以榛塞其塗又謂司馬昭之心路人所知也又云濟之以粉昆朋類錯立欲以眇躬為甘心快意之地及甫嘗語蔡碩謂司馬昭指劉摯粉昆指韓忠彥眇躬及甫自謂蓋俗稱駙馬都尉為粉侯人以王師納故呼其父堯臣為粉父忠彥乃嘉彥之兄也及甫除都司為劉摯論列又摯嘗論彥博不可除三省長官故止為平章重事及彥博致仕及甫自權侍郎以修撰守郡母喪除與恕書請補外因為譟忿詆毁之辭及置對則以昭比摯所云眇躬乃以指上而粉昆乃謂指王巖叟面如傅粉故曰粉燾字況之以況為兄故曰昆摯將謀廢立不利于上躬京惇言事涉不順及甫止聞其父言無他證佐望别差官審問乃詔中書舍人蹇序辰審問仍差內侍一員同往彗出氐斜指天市垣光芒三尺餘越三夕長丈餘掃巴星未幾犯宦者復犯帝座九月大赦求直言批旨付三省天垂變異彗出西方災譴為大朕實懼焉可避正殿減常膳罷秋燕許內外臣僚言朝廷闕失曽布言熙寧乙卯歲十月彗在翼軫吳楚分野之外尋有交州之變陷雍欽亷三州光芒掃長沙明年春長沙民大飢疫死者相枕籍自丙辰春出師討交趾丁巳春師還死者數十萬今掃巴星則巴蜀不可不慮臣等更當講求邊備兼星在氐羌邊事誠不可不戒臣素言涇原籬落未葺須至營築堡障其他版築當且休息未可舉動上皆然之布又言陛下以天變恐懼祗畏如此然政事有未安刑罰有未當大臣還肯因天變為陛下改更否正人端士天下之所欲進而大臣素所不悅還肯因天變為陛下收用否讒邪不正之人正在要路衆人所惡而大臣素所黨與還肯為陛下斥逐否以臣觀之必無此理恐未有以稱陛下修省之意也上矍然變色通判通逺軍李深上書曰當今之闕失莫大於主道太弱而臣道太盛陛下柄用大臣委信仰成未嘗疑二愛臣之心至矣盡矣馭臣之義似未施也祖宗進退言事官雖執政不得與聞蓋以杜絶臺諫私於宰執今蔡卞執政其兄京得薦臺官被其兄之薦者能不私其弟乎況陛下命黃履蔡京各薦御史而履所薦者不召京所薦用者二人四方瞻望願登蔡氏之門者惟恐不及然則執政過惡陛下安從而聞乎陛下選監司按察諸路欲知下民之疾苦官吏之美惡故著令執事相統屬者回避蓋欲監司於所部無欺蔽也今章楶為涇原帥乃用其壻劉何攝漕事應副軍需前日築平夏城為賊所抄而奏報不到陛下安得聞之乎陛下賞功罰罪進退羣臣以勸沮天下宜無毫釐失實也然今之邊帥如鄜延以一路事力進築三城而每賞不過進官一等涇原章楶以四路兵勢三路民力失亡其衆才築安西城一寨而賞則官自朝散而遷朝議職自修撰而加密直于鄜延何薄于涇原何厚無乃以楶為宰相章惇兄故而優之乎陛下分命監司應副芻粟如卲篪於鄜延親臨飛挽至於功成賞止一官張詢於熙河未始一至沿邊而全城之賞乃自權運副一進而為都轉運使又加祕閣之直於鄜延何疏而於熙河何親無乃以詢為章惇妹夫而特異之乎陛下鼓舞人物厲之以名引之以美是謂日新之政也呂嘉問移發運使未數月不緣奏計登對不緣六曹二卿遂除待制天下皆謂嘉問之子女王雱之女蔡卞娶雱之妹又嘉問蔡卞結為死黨去年無故出户部郎何玩者蔡卞為嘉問報仇也臣不知嘉問驟為兩制果出陛下聖意乎又臣見張赴近自左藏庫副使不因賞功又無他長遂以閣門副使為雄州帥天下皆謂赴乃章惇妻弟臣不知張赴之超為橫行邊帥果出陛下聖意乎章惇為小官有李參者嘗厚惇今參之子孫李仲光以不職罷遽除河北運判李延嗣方在監當遽除淮東提舉官此人人知惇報恩也蔡卞為王安石壻有鄧綰者薦卞於先帝欲以壻安石先帝察其邪怒而逐之至今天下傳誦今綰之子洵仁洵武一為校書郎一為提舉官洵武又兼為修史檢討此人人知卞之報私恩也陛下復行免役本以寬民而取於民者不輕陛下留神安邊本以養民而害於民者先至原其所以然皆以用蔡京為詳定章楶為帥臣也京為役法罪人楶為邊防罪人天下共知朝野共怒而人不敢言者特以卞惇之兄孰肯言之以取禍乎臣聞衆賢和於朝則萬物和於野今大臣論事於黼座之前有至喧辨不已時於政事堂中或以惡語相侵陛下未加誅責固為大度然朝廷綱紀不肅為之奈何孔子曰天下有道則禮樂征伐自天子出比年邊陲興兵乃征伐大事也陛下不自專可乎論邊城之要兵權之重則河北莫如雄州陜西莫如涇原熙河今雄州用宰相之妻弟涇原用宰相之兄熙河用宰相之妹夫凡指揮邊事但用私書而已陛下獨不為萬世慮患乎祖宗故事有一於此乎一歲之內春則熙河地震秋則禁中火災又彗出西方皆隂極之異陛下不可不慮也若夫王旁心疾而為館職邵材病妄而知越州梁子美之為提點刑獄周之道之為刑部侍郎似此之類莫非宰相私意此皆陛下待御大臣過于仁柔反為所制也願陛下上念祖宗之艱難親收人主威福大柄選擇正直之賢士以備諫諍委任公忠之賢佐以為贊襄駕馭英雄使之各盡其力屏出邪佞使之無所施巧則天地和應災害不作符瑞沓至年穀屢豐天文之變有不足患惟陛下留意冬十月以邢恕為御史中丞以權吏部尚書遷章惇實啓上也恕嘗謂惇有定䇿功而惇每疑元祐人復用謀誅絶之恕肯任此事故不以序遷改蔡卞請用安惇上不許時章惇與卞已不咸十一月梁燾卒于化州乞歸葬不許先是蔡確母明氏奏燾嘗私語懷州致仕官李詢云朝廷若存蔡確則不利於徐邸詢忿疾之以告邢恕詔恕詳具以聞又詔三省詰詢及瀛州推官尚洙蓋元祐中詢嘗對洙言之三省言詢所供不殊詔以河北運副呂升卿湖南提舉常平董必並為廣東西採訪時蔡京等究治同文館獄卒不得要領乃遣使嶺外謀盡殺元祐人會劉摯及燾已前死朝廷未知也曽布言竊聞欲遣升卿按問梁燾之所言證佐已具想必不虛若更遣升卿輩按問豈免有煆鍊之嫌若萬一燾不肯承必須置獄若置獄而後承則天下後世以為煆鍊無疑矣何以釋此謗況祖宗以來未嘗誅殺大臣縱燾更有罪惡亦不過徙海外上曰祖宗未嘗誅殺大臣今豈有此布曰然則何必遣使也況升卿兄弟與蘇軾兄弟切骨仇讎天下所知萬一軾轍聞其來望風引決豈不傷仁政兼以升卿聲熖可畏又濟之以董必此人情所以尤驚駭也上改容曰甚好陳次升亦言元祐臣僚陛下本無殺之之意而遣升卿為使理無全者升卿昔以贓敗太后上升自真州泛小舟隱姓名七日至京師投匭上書資性慘刻喜求人過失今將使指投隙釋憾何所不至有旨升卿察訪指揮更不施行而必自東路改西路必至廣西所為多刻薄遂劾昌化軍使張中役兵修驛以舍蘇軾而監司失覺有詔廣西鈐轄程節提刑梁子美並降官既而必除工部郎官中書舍人郭知章論必前按衡州守起獄多寃繳必詞頭遂命趙挺之趙辭于是給事中陳次升封駁以為不當必乃訟知章次升皆為元祐臺諫上怒必輒訟言者詔送吏部竄程頤編管涪州以其與司馬光相厚也黃庭堅尋自涪移戎十二月劉摯卒先是蔡京章惇共治文及甫等所告事將大有所誅戮會星變上怒漸怠然京惇極力煆煉不少置已而梁燾先卒于化州後七日摯亦卒于新州衆皆疑兩人不得其死明年二月朝廷乃聞摯死不許歸葬家屬令於英州居住至五月獄乃罷復市易務許用見錢交易收息不過二分不許賖欠兩浙旱九朝編年卷二十四
