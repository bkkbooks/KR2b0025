body:
  text: 九朝編年備要巻十三宋陳均撰仁宗皇帝起乙酉慶歴五年止戊子慶歴八年乙酉慶歴五年春正月孫甫罷知鄧州時蔡襄亦以親老岀知福州杜衍言諫官無故岀終非美事且乞仍舊上可之退書聖語參知政事陳執中曰吾初不聞衍懼遂焚之議者謂衍當俟明日審奏不當遽焚其書也復言事御史以梅摯李京為之唐制御史不專言職故天禧初始置言事御史六員其後乆不除至是以諫官員不足復除之杜衍罷出知兖州仲淹知邠州富弼知鄆州初仲淹弼出宣撫攻者益多二人在朝所施為亦稍沮止獨衍左右之上頗惑焉仲淹亦自請乞罷政上欲聽其請章得象曰仲淹素有虛名今一請遽罷天下謂陛下輕絀賢臣不若且賜詔不允若仲淹即有謝表則是挾詐要君乃可罷也上從之仲淹果奉表謝上愈信得象言於是弼使還至近畿右正言錢明逸希得象㫖言弼更張綱紀紛擾國經凡所推薦多挾朋黨又言仲淹受命宣撫聞詔戒勵朋黨心懼仍乞罷政知邠州欲固己位陳執中因譛衍黨庇二人故併黜之學士承㫖丁度草制指其朋黨衍相纔一百二十日皆罷之以賈昌朝為平章事兼樞密使王貽永樞密使宋庠參知政事呉育龎籍樞密副使上問章得象誰可代仲淹者得象薦宋祁而其兄庠嘗執政上雅意屬之於是用庠既而育上言曰今邊事甫定朝廷為息肩之計則未可足恃以為安也議者必謂夷狄相攻乃中國之利臣謂不然二國連兵士馬益練一國幸勝則氣驕而勢横别啟貪求必致生事正當夙夜孜孜以前事為戒後事為念申飭二府講求經乆備邉之䇿夷秋聞之可弭患於未萌也籍上言陜西用兵公私困乏請併省官屬退近塞之兵就屯内地以省邉費二月遣内侍汰諸路兵京東西淮南兩浙荆湖福建路諸州宣毅過三百人者毋得更募罷京朝官保任叙遷法從御史劉元瑜之請也初考課之法自朝官至郎中少卿監湏望官五人保任始得遷元瑜以為適長奔競非所以養士亷恥故罷之康定初元瑜嘗言范仲淹以非罪貶既復天章閣待制宜在左右尹洙余靖歐陽修皆坐朋黨斥逐此小人惡直醜正也及仲淹迹危元瑜即希得象陳執中意排之又言前除夏竦為樞密使諫臣數人摭其舊過召至都内而罷之自茲以進退大臣為己任以激訐隂私為忠直磨勘保任之法實仲淹所建仲淹既絀故元瑜亟奏罷之罷䕃補限年法從余靖之請也㝷詔䕃補選人量試入官其慶歴三年條制勿行三月賜孝子李訪粟帛訪父母卒廬於墓側有虎暴傷旁人而不近訪廬又有白烏數百飛集墓上詔賜訪粟十石帛十疋仍令州縣常存問之韓琦罷自樞密副使出知揚州時董士亷上書論水洛城事輔臣多主之琦不自安請外故有是命既而歐陽修自河北上疏言今杜衍范仲淹冨弼韓琦相繼罷去天下皆知其可用之資而不聞其可罷之罪自古小人䜛害其識不逺欲廣䧟良善則指為朋黨欲動揺大臣則誣以專權蓋去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過難一一求瑕惟是指為朋黨則可盡逐至如自古大臣被主知而蒙信任則難以他事動揺惟有專權是上所惡方可傾之夫正士在朝羣邪所忌謀臣不用敵國之福今此四人一旦罷去而使羣邪相賀於内四夷相賀於外臣所以為陛下惜之也由是為黨論者益忌之復科舉舊制知制誥楊察言前所更令不便以為詩賦聲病易考論䇿汗漫難知請復用詩賦墨義如舊制從之八年夏詔科場舊條皆先朝所定宜一切無易從禮部之請也四年宋祁所定不行罷入粟補官夏四月丁亥朔日有食之隂晦不見近臣稱賀御史李京上䟽曰陛下因天之戒恐懼修省故日當食而隂雲蔽之然臣尚有所陳自寳元初定襄地震今十年不已豈非二邊有窺中國之意乎時已孟夏而雷不發聲豈非號令之不信乎臣願陛下益備邉謹出命以厭禍於未形又尚美人棄外館多年而比復召入苗繼宗以庸才而為府界提㸃亦宜割帷薄之愛謹名器之分以助修德也章得象罷得象在中書八年畏逺名勢宗黨親戚一切抑而不進然亦無所建明至是䑓臣有言得象亦累求去出知陳州以陳執中為平章事五月罷轉運判官以上封者多言其競為苛刻故也歲未滿者聴終秋九月置南京留䑓留守司御史䑓廣州荆南府岳州地震冬十月祔章獻明肅及章懿皇后於太廟章惠别饗奉慈廟如故去冬判太常寺吕公綽上言詩稱莊姜宣姜皆以諡從夫自漢而降后諡多冠以帝號不然則參同一字先帝在御特諡二皇后曰莊懐莊穆及上真宗章聖之諡即當追正詔上真宗五后諡曰章懷曰章穆曰章獻明肅曰章懿曰章惠大赦初議者請覃恩百官且優賜軍參政呉育曰無事而啟僥倖誰為陛下建此請治之已而上語輔臣曰外人怨執政宜防喧譁育曰此必建議者欲以動揺上聽願毋慮臣既以身許國何憚此耶上嘗遣中使察視山東盜賊還奏盜不足慮而言兖州杜衍鄆州冨弼山東尤尊愛之此為可憂上欲徙二人者淮南呉育曰盜誠無足慮然小人乘時以傾大臣非國家之福議遂格轉運罷兼按察時執政沮改范仲淹冨弼所行事故因肆赦以其過為煩擾無益事體罷之七年夏詔曰前京東轉運薛紳任吏部孔宗旦等四人為耳目摭郡縣細過以滋刑獄時號四瞪前江東轉運楊紘判官王綽提㸃刑獄王鼎皆苛察相尚時號三虎此豈稱朕忠厚愛人之意歟除紘先已降知衡州紳等其悉降黜自今毋得用為監司三人皆仲淹等所選用者紘為億後初江東歲飢紘發義倉以賑之謂郡吏曰國家義倉本虞㐫歲今湏㫖乃發人將殍矣然御下急常言不法之人不可貸如肆貪殘於一郡一邑害良民千萬家不若去之止不利一家耳聞者望風解去或及期不敢之官綽先為刑部詳覆官有廖均者挾當路權勢雪罪中書連舊例送刑部官屬無敢違者綽獨以為勅一定而例有出入今廢勅用例非有司所敢聞執政雖深惡之然終不能屈選通判雄州城乆壞守將慮違契丹誓書綽持之既興役契丹果來問綽報以前語仍緩其使及使者返而役已畢北人亦不敢復問杜衍富弼尤稱其才其後傅惟㡬運使江東上戒以無效三虎所為也畋楊村自真宗東封以來不復校獵先是直集賢院李東之言講武不可廢乃詔討詳其制至是獵楊村以所獲馳薦太廟初頒厯於夏國宰臣免兼樞密使從賈昌朝陳執中之請也詔樞密院凡郡國機要依舊同商議未㡬密院又請自今進退管軍臣僚極邉長吏以下鈐轄以上并與宰臣同議從之十一月燕宗室於崇政殿邇英閣講詩角弓篇上曰幽王不親九族以至於亡楊安國對曰冬至日陛下親燕宗室人人撫藉豈不廣骨肉之愛也上又曰書載九族既睦平章百姓帝堯盛德也朕甚慕之詔訪石介存亡知鄆州富弼知青州張存並罷安撫邠州范仲淹罷四路安撫改知鄧州以邉事寜息盜賊衰止為辭其實䜛者謂介謀亂弼將舉一路兵應之仲淹先亦引疾求解邉任故也時有滁州狂人孔直温謀反伏誅捜其家得介書時介已死宣徽南院使夏竦憾介甚謂介詐死乃弼遣介約契丹起兵期以一路兵為内應因請發介棺以驗詔下京東訪介存亡杜衍在兖州會官屬以驗介事語之衆不敢答掌書記龔鼎臣曰介平生直諒願以合族保其必死衍悚然探懐中奏稿示之曰老夫已保介矣君年少見義必為豈可量哉提㸃刑獄吕居簡亦曰發棺空而介果北走雖孥戮不足以為酷不然是國家無故剖人冡墓何以示後世耶且介死必有親族門生會葬及棺斂之人茍召問無異說即令具軍令狀保之亦足以應詔矣於是衆數百人合狀保介已死居簡夷簡弟也時又得孔直温遺直講孫復詩復亦坐貶䖍州監税而介子弟羈管他州乆之乃得還國朝會要成王洙編修自建隆至慶歴四年凡一百五十巻是歲書成丙戌慶厯六年春二月青州地震三月辛巳朔日有食之登州地震岠嵎山摧自是震不已每震則有聲如雷親試舉人賜賈黯以下及諸科八百餘人及第出身有差初劉敞第一學士王堯臣為編排官以親嫌自列乃降敞第三夏五月京師雨雹地震減卭州鹽課緡錢一百萬益梓利䕫四路鹽課縣官之所仰給然井源或發或微而責課如舊責事者多務增課為能朝廷切於愛民多為蠲減至下赦書亦每及之汰陜西邉兵遣户部副使夏安期如陜西市馬及議損邉費安期頗奏省吏員及汰邉兵之不任役者五萬人是秋三司使王拱辰上言太祖時兵二十萬太宗時十八萬章聖時四十萬今遂倍之兵在精不在衆冗數坐食非計也三司雖總大計而事實在外請諸道帥臣并任其責乃命判大名府夏竦知并州鄭戩永興軍程琳並兼本路計置粮草六月有流星出營室南大如杯其光燭地隱然有聲占曰主兵上謂輔臣曰上天譴告人主思懼而修德亦猶人主知臣下之過先示戒飭使得自新而不陷於咎惡也賈昌朝等再拜謝詔貢舉歲試制科仍須從臣論薦毋得自舉初參政呉育為學士日薦唐詢為御史及賈昌朝執政與詢亦有親嫌育數為昌朝言詢用故事當罷御史昌朝欲留詢不得而以知廬州凡官外徙者皆放朝辭而詢獨不用比入見中丞張方平乃奏留詢育爭不能得詢由是怨育而附昌朝昌朝雅不善育而詢希其㫖時上數稱近嵗制科得人以育為賢詢言自古災異乃䇿賢良今六科率不用公卿薦引而特視進士之期凡應此科者至自稱曰賢良曰茂異臣謂習染澆浮莫甚於此可悉罷之詢意在排育不在制科也上刋其名付中書育奏曰漢䇿賢良自晁錯始錯非以災異舉上以育言為然由是不廢上因諭輔臣曰彼上言乞從内批以行今乃知欺罔也育曰人臣言渉機密欲歸德於君或入告謀猷成國之美此類可以刋名付外制䇿天下公選廢置豈宜隂沮欲自上行願出姓名劾之以明國法育弟婦故駙馬都尉李遵朂之妹有六子而寡詢又奏育弟婦久寡不使改嫁欲用此附李氏自進而詢終以故事罷御史秋七月以李璋為西上閣門副使上㝷謂宰臣曰前日除李用和子璋為閣門副使今次子珣又求為通事舎人朕已諭之曰朝廷爵禄所與天下共也倘戚里之家兄弟補遷如已欲使朕何以待諸勲舊乎天聖中駙馬都尉柴宗慶求為使相王曾曰將相之任豈容私請乃諭宗慶毋得倖求八月䇿制科武舉賢良方正能直言極諫太常博士錢彦逺入第四等擢祠部員外郎知潤州彦逺易之子明逸之兄也宋興以來父子兄弟登制科者錢氏一家而已武舉凡得四十餘人其後大理寺丞馮維師奏武舉以䇿為去留弓馬為髙下伊洛溢時登州地震不止又有巨木三千浮海而出上謂輔臣曰山東連嵗地震又有巨木浮海而出宜防未然之變其下登州嚴飭武備時又伊洛暴漲漂民廬舎浙江潰防海水入台州於是御史梅摯引洪範上變戒曰王省惟歲謂王總羣吏如嵗總四時有不順則省其職今日蝕於春地震於夏水於秋一嵗而變及三時此天意以陛下省職未至而告戒之也陛下宜責躬修德以回上帝之眷顧使隂不勝陽則災異衰矣冬十一月詔捕湖南蠻冦初蠻首唐和冦桂陽監湖南騷動兵不得息上嘗命户部判官崔嶧為體量安撫徃議招捕二䇿既而知桂陽監朱守信奏唐和為盗乆未平者朝廷不許窮討故也今衡州監酒黄士元願得敢戰士二千引路土丁二百捕之彼勢窮則將欵附詔用其䇿於是大發兵討之衆果懼遁入郴州由山路轉冦英韶詔督捕之越明年五月和詣廣南轉運司乞降詔湖南鈐轄楊畋徃共告諭之畋約賊出峒受田為民而轉運使欲授以官納質使還畋曰賊剽攻湖廣七年所殺不可勝計今使飽貲據峒其勢不乆必復亂賊果復出畋即領衆趍嶺外渉春夏凡十五戰賊乃潰罷河北𣙜鹽用三司使張方平之議也河北滄濵二州鹽課九千餘石以給一路自開寳以來聴商人貿易官收其算嵗為錢十五萬緡先是三司使王拱辰建議悉𣙜二州鹽以專其利而議者以為不可且言商人販鹽與所過州縣交通為弊所算十無一二請勅州縣以十分算之聴商人至鬻州縣併輸算錢嵗可得緡錢七十餘萬三司奏用其䇿上曰使人頓食貴鹽豈朕意哉於是三司更立𣙜法而未平也方平見上問曰河北再𣙜鹽何也上曰始立法非再也方平曰周世宗𣙜河北鹽犯輒死世宗北伐父老遮道泣訴願以鹽課均之兩税而弛其禁今之兩税鹽錢是也豈非再𣙜乎上曰卿語宰相立罷之方平曰法雖未下民已知之當直以手詔罷之不可自有司出也上大喜命方平撰手詔下之河朔父老相率拜迎於澶州為佛老會七日以報上恩且刻詔書北京父老過其下必稽首焉嘉祐三年冬詔除河北諸州坊郭客户乾食鹽錢畋韓村是役也衛士不及整而歸比夜有雉殞於殿中越明年三月詔將復出諫者甚衆御史何剡之言尤切至編修官王疇亦陳十事以諫遂詔罷獵先是學士宋祁提舉諸司庫務薦疇幹當公事時有宦官同提舉者疇辭於中書曰翰林先進疇不得然也然以朝士而為閹人指使則疇實恥之丁亥慶厯七年春正月杜衍致仕衍時知兗州年方七十以元旦上表願還印綬以太子少師致仕議者謂故相一上章得請以三少致仕皆非故事蓋宰相賈昌朝素不喜衍而抑之也三月旱詔寛恤詔求寛恤民力事聴官吏驛置以聞上其副於轉運司利害明白者得專行之求直言許中外臣僚指陳當世切務實封條上詔畧曰朕惟災異之來應不虛發殆不敏不明以干上帝之怒與其降疾於人不若移災於朕初命學士草詔上以為未盡罪己之意更為是詔上禱雨於太乙宫日方炎赫上却蓋不御及還而雨大浹賈昌朝罷以夏竦為樞密使初參知政事吴育遇事敢言屢與宰相賈昌朝爭議上前覩者失色育乃請曰臣所請者職也顧力不勝願罷臣職六年八月乃命育與樞密丁度兩易昌朝與育猶數爭論不已論者多不直昌朝時方閔雨昌朝乃引漢災異册免三公故事乞罷而中丞髙若訥亦以為言故昌朝出判大名府育歸給事中班㝷命知梓州而召用竦及彦博初召竦為宰相彦博為樞密副使諫官御史言大臣和則政事起竦與陳執中議論素不合不可使共事越三日遂貼麻改命而以彦博參知政事髙若訥為樞密副使竦初以使相判大名詔以前官充使故事文臣自使相除樞密者必納節還舊官獨竦不然昌朝既去而執中等復以旱乞罷於是各降官一等而輔政如故㝷復之度之為樞密副使也嘗言周世宗募驍健有朝出羣盗夕備宿衞者太祖閲猛士實騎軍請擇河北河東陜西就粮馬軍以補禁旅之闕因為慶歴兵録五巻上之夏六月置北京留臺秋八月賜隱士孔􅌈粟帛孔子四十六代孫也隱居汝州龍興縣之龍山性孤潔喜讀書有田數百畆賦税嘗為鄉里先遇嵗飢分所餘周不足者未嘗計有無聞人之善若出於已動止必依禮法環所居百里人人皆愛慕之見旼於路輒斂袵以避葬其親廬墓三年卧破棺中日食米一溢壁間生紫芝數十本州以行義聞故有是賜置天章閣直學士位在龍圖閣直學士之下河北分四路九月作廣親宅廣秦王居賜以是命冬十月孟許二州地震十一月戊戌郊貝州卒王則反則𨽻宣毅軍初以妖術惑衆與德齊諸州妖黨約以明正旦斷澶州浮橋亂河北會其徒懷刃以書謁北京留守賈昌朝被執故先期而發執知州張得一囚之通判董元亨叱賊遇害則僣號東平王建國曰安陽改年號曰德聖旗幟號令率以佛為稱初北京指使馬遂聞則叛詣昌朝請擊賊昌朝因使持榜入城招之不應遂扼則喉擊之為賊所害遂開封人後贈官録其五子得一㝷以降賊棄市趙學究女有殊色賊遣人刼致欲妻之女日夜號泣嫚罵求死賊使人守之女知不脱乃紿曰必欲妻我宜以禮聘賊信之使歸具禮來迎女泣與家人訣至則自經輿中矣戊子慶厯八年春正月文彦博宣撫河北閏月討王則平之王則未平上以為憂彦博請行遂以命之初以明鎬宣撫夏竦惡鎬所奏多從中沮之惟恐其成功至是彦博請以便宜從事許之彦博選壯士越地道入城攻之執則送京師磔於市則叛凡六十五日敗後改貝州為恩州則之亂也田京為提㸃刑獄縋城趨南關入驍捷營撫士卒保州振武兵焚民居欲應賊京捕斬乃定由是營兵二十六指揮在外者皆懾服不叛州之南關居民衆多與城中等得不䧟賊京有力焉京督士攻城甚力賊繫京妻子乘城廹使呼曰毋亟攻城城中將屠我軰矣京叱諸軍益進攻注矢仰射殺其家四人賊知京無所顧乃牽妻子去至是以不能預察賊降監永州税御史言其失察賊過輕而忘家為國於義為重不宜左遷乃徙通判兖州尋改知江隂軍以文彦博為平章事禁衞叛卒伏誅是夕從政殿親從卒顔秀等四人謀為變踰屋入禁中焚宫簾斫傷内人臂並為宿衞兵所誅卒不知其始謀領皇城司楊景宗等五人並坐逐獨楊懷敏降官領内都知如故言者以為樞密使夏竦結懷敏曲庇之三月詔近臣言時政甲寅幸龍圖閣天章閣賜輔臣手詔畧曰間者西陲禦備天下繹騷常賦有增經用不給加以承平浸乆仕進多門人浮政濫員多缺少又牧宰罕聞奏最將帥艱於稱職西北多故情偽難測獻竒譎空言者多陳悠乆實效者少思濟此務罔知所從悉為朕除之又詔翰林學士三司使知開封府御史中丞曰欲聞朕躬闕失左右朋邪中外險詐州郡暴虐法令非便民者及朝廷幾事其悉以陳皆給筆札令即坐以對時宰臣陳執中不學少文樞密使夏竦為上謀以䇿訪大臣面使條對竦之意實欲困執中也於是執中固辭而參知政事宋庠曰兩漢對䇿本延巖穴草莱之士今備位政府而自比於諸生非所以尊朝廷請至中書合議條奏乃聽兩府歸而上之論者以庠為知體是日翰林學士張方平既退朝會鎖院草制方平即條對所問夜半與制書俱上曰康定慶歴之間朝廷議刺民兵陞廂軍充禁旅臣時任諫官屢上章疏極言其害至於今日事勢固然臣昨在三司計會天下財用出入之籍及建隆以來兵數乞朝廷速加圖議蓋太祖蓄兵不及十五萬人太宗朝不過四十萬人章聖備禦西北兵籍頗增祥符以後除招募斥疲老以减冗食至於寳元凡四十年天下可謂乆安向因夏戎阻命宰相非其人慮害不深事失幾先遂致大擾陜西河北京東京西增置保捷一百八十五指揮武衞七十四指揮宣毅一百六十四指揮更於江湖淮浙福建諸路又添宣毅一百二十四指揮凡内外增置禁軍約四十二萬餘人通三朝舊兵且八九十萬人其鄉軍義勇州郡廂軍諸軍小分半分剩員等不在此數軍人日多農人日少三邉税賦支贍不足募客人入粮草就京給還錢帛加擡則例價率三倍外則剗刷諸道之物中則侵用内帑之財厚賞聚斂之人賤立鬻官之令茍狥目前之急莫為經乆之慮凡此冗兵非惟困天下之財用方且成天下之禍階若不早圖後無及矣約計四千餘員今六千五百餘員臣勘會學士院兩省以上官景祐中四十餘員今六十餘員臣任御史中丞將本䑓班簿㸃算景祐京朝官不及二千八百員臣判流内銓取責在銓選人畢竟不知數目大約三員守一闕畧約萬餘人十年之間所增官數如此若更五七年後其將奈何每嵗入官之路僥倖攀援日生新例不可勝數澄源培本在陛下命令而已乞令中書樞密院各具逐年諸色入仕名目及人數取其僥倖弊濫尤甚者逐色别立科條稍加裁損又曰先朝以前雖將相大臣之家子孫猶多白衣未仕者今自少監以上輒每嵗任一人不亦過乎祖宗之時文武官不立磨勘年嵗不為陞遷次序有才用名實之人或從下位便見超擢無才用名實之人有守一官十餘年不改轉者其任監當知縣或通判知州有至數任不得遷者故當時人皆自勉非有勞効知不得進自祥符之後朝廷之議益循寛大故令自監當入知縣知縣入通判通判入知州皆以兩任為限又守及三年即例得磨勘先朝行之人始知恩未見有弊及今嵗年深乆習以為常皆謂本分合得無賢不肖莫知所勸願陛下稍革此制其應磨勘叙遷者必有勞績可褒或朝廷特敕擇官保任者即與轉遷如無勞績又不因保任者更增展年考其保任之法不當一例應須選擇清望有才識之人即命舉之如此則是委執政臣舉清望官委清望官舉親民官官有闕員隨員數令舉又足以見聖恩急才愛民之意也至於將帥之人尤在駕馭得術仍宜乆於其職祖宗任李漢超郭進賀惟忠李謙溥姚内斌董遵誨侯贇楊延昭等逺或二十年近猶八九年假之事權畧其細故不為間言輕其移易責其成效而已又不與髙官常令其志有所未滿不怠於為善也今則不然武臣指邉郡謂之邉任借之為發身之地歴邉任者曾無寸勞薄効不數年徑至横行刺史防團亷察能飾厨傳熟於人事者即以為才而又移換改易地形山川未及知軍員士伍未及識吏民土俗未及諳復去矣願陛下鍳祖宗故事重爵賞以待功勞責乆任以觀能效亦馭將帥之一節也臣頑疎不達治道據詔問所及謹以近事上對其詔㫖所不及者亦不敢僣易有陳也上覽奏驚異詰旦復賜手札問詔所不及者方平即日復上對曰今茲聖心昨因保州恩州之變得無常以河北為意者乎自唐天寳之後河北兵素以驕悍自處又北接戎狄朝廷每多姑息實難處置欲選擇軍校以嚴整之則其遷補皆不在本營非若在京及諸道可以轉員移易也欲揀選上京别補軍分則子弟姻婭蔓連根固樂土重遷非若在京及諸道可以選募轉徙也欲陞遷軍分以利動之則衣粮素厚難以更行增給臣曾勘會河朔廂禁軍僅二十萬人禁軍五之四然體問其中疲老不任征役者甚多若朝廷密諭安撫部署及轉運使提㸃刑獄官此後一切且住招填令依常例旋行揀放頻作畨次揀選少作人數放停使由之而不知無得漏露朝㫖嵗年後稍稍團併據所闕指揮發在京禁軍就逐州駐劄使其勢足與土兵相制庶乎置器於安也今茲聖心因昨衞士震驚宫省得無以親衞為意者乎臣按周官虎賁士掌守王宫皆士也趙左師觸讋托其子於太后願補黑衣之缺以衞王宫蓋王宫之衞兼用卿大夫之子弟秦漢以來宿衞之士不惟選材武必取馴慤壯愿之人以其近尊者不可不審也國初循周制置諸班直備爪牙士屬殿前司又置親從官屬皇城司其宿衛之法殿外則相間設廬更為防置殿内則專用親從最為親兵也然募置之法則異於古皆惰㳺而無根蒂莫容其身者乃來應募前者變故卒生意外臣恐當有以創懲之若於諸班直中選其年老乆次者至於東西下班殿侍有門閥家業者及諸軍中死事者之孤稍有材勝兵者嚴立保委之法選取千人以充殿内之衞仍令屬皇城司令樞密院殿前司立定選捕格式嵗月更代之法嵗滿則優遷之願留者令皇城司保任委是壯愿謹良則聴留若其功過之凖教習之法居處之制頒給之例即請自朝廷裁議臣聞太祖訓齊諸軍法制甚嚴軍人不得衣皂但許衣褐其制不得過膝豈有紅紫之服葱韭不得入營門豈知魚肉之味每請月粮時營在城西者即於城東支營在城東者即於城西給不許僱車須令自負以勞役之令行禁止軍士亦以足用今則異矣臣嘗入朝見諸軍帥從卒一例新紫羅衫紅羅袍肚白綾袴絲鞋帯青紗㡌拖長紳帯鮮華爛然其服裝少敝固已恥於衆也一青紗㡌市估千錢至於衫袴蓋一卒之服不啻萬錢今之上四軍請給比諸軍為至厚然月受千錢只可買得一㡌耳度所戴㡌嵗須二枚補染服裝須要鮮潔則於諸事畧稱此也計其所受廩給不足一身之費若有妻子爭得不飢凍妻子既不免飢凍小人之情豈能不歸怨於上此軍情所以易動也至於常程特支例即對料錢勘請朝廷一次特支在京約用錢三十萬貫及入軍人之手何足為用是朝廷不勝其困軍中殊未有濟所以致此者何由乎習為侈汰之弊也願陛下清閒之餘試召軍帥如此問之便可密令條陳以何術可以革今日之奢靡以何道可以復昔時之朴素如帥臣能自節約以身率之則軍人庶乎可以存濟矣臣竊惟陛下御極於今且三十年甚盛之事所以感格天地浹洽人心之深者以其至仁慈厚好生惡殺急深故之罪寛縱出之罰哀矜庶獄惟刑之恤也近因貝賊挾妖為亂朝廷又追劾李曇之獄張存等例䝉重罰州郡乘風覺發妖事至於誦經供佛符呪禁術盡遭捕繫蔓延平民豈無奸人乘便創造疑似或挾讐怨更相攀引榜掠之下何求不獲臣見判審刑院奏按七十餘道内二十餘道係是妖事雖近降朝㫖嚴加止絶但恐官吏指李曇為鍳戒無復更用平恕之心臣聞賞罰猶風也人情猶草也草上之風必偃人情隨賞罰而遷矣臣惜陛下三十年甚盛功德虧於一簣寳元之後國家多故邉陲繹騷人事紛紜災異屢見中外屬任之官鮮著事效推諸人事勢可憂已聖心焦勞寅畏祗厲日謹一日迄此乂寧獨頼陛下至仁慈厚之德所以感格天地浹洽人心之深者也奈何輕用刑獄以危天下招致沴氣以速民怨者乎凡臣所陳實今時要務然皆事之一節耳至於天下大勢臣請為陛下言之臣觀古今治亂之變不在其他祗在上下之勢離合而已上下之勢合事無大不成上下之勢離事無小不敗比年以來朝廷頗引輕險之人布之言路違道干譽利口為賢天下承風靡然一變又外人議論展轉縁飾沽激倣傚惟恐不及敗壞雅俗遂成險薄内則言事官外則按察官多發人閨門曖昧年歲深逺屢經赦宥之事而又諸色小人至吏胥童僕觀時得逞敢于犯上創造詞説朝廷便行濟以愛憎何所不至故自將相以下至於卿大夫士惴惴危懼莫有泰然而自安者一動一為輒曰恐致人言更相姑息專避嫌疑茍且因循求免謗咎何暇展布心體為國立事者哉臣竊詳聖意豈欲人情風俗之如此歟但以其所由來者漸矣自上及下無大於此上下之勢離阻若是則將誰與陛下同心一德而深謀逺慮者哉既無同心一德之人深謀逺慮之士則天下之務何以致治願陛下深為留神務在通上下之情欲上下之情合在審于聽受而已上覽奏益異之書文儒二字以賜方平龍圖閣學士宋祁言人主不斷是名召亂春秋書隕霜不殺菽天威暫廢則不能殺小草猶人主不斷則不能制其臣又謂與賢人謀而與不肖者斷重選大臣而輕任之大事不圖而小事是急是謂三患其意主於强君威别邪正急先務皆切中時弊焉知永興軍葉清臣聞手詔問當時急務乃為條對曰陛下欲息奔競此繫中書若宰相裁抑奔競之流則風俗淳厚人知止足宰相用憸佞之士則貪營冐進激成頽波向有職在管庫日趨走時相之門入則取街談巷言以資耳目出則竊廟謨朝論以驚流軰一旦皆擢職司以酬所任比日人士競踵此風出入權要之家時有三尸五鬼之號乃列館職或置省曹且臺諫官為天子耳目今則盡為宰相肘腋宰相所惡則指其微瑕公行擊搏宰相所喜則從而唱和為之先容中書政令不平賞罰不當則箝口結舌未嘗敢言人主纎微過差或宫闈小事即極言過當用為訐直供職未逾歲時遷擢已加常等宋禧為御史勸陛下宫中蓄犬設棘以為守衞削弱朝體而擢為諫官王逵所至苛虐特以宰相故舊不次超擢如此是長奔競也其他所列利害甚衆癸亥御迎陽門召知制誥待制臺諫官畧曰朕欲聞朝政得失兵農要務邉防預備將帥能否財賦利害錢法是非及防微杜漸之䇿夏四月冊諒祚為夏國主夏主曩霄凡七娶五曰伊呼氏裕勒且從女也生寧凌格曩霄以貎類己特愛之以為太子後裕勒且欲内附事覺曩霄族其家伊呼氏訴我兄弟無罪見殺曩霄悔恨訪得裕勒且妻摩藏氏與之私通既娠因出為尼七曰瑪伊克氏初欲納為寧凌格妻曩霄見美自取之號新皇后寧凌格憤而殺曩霄不死劓其鼻而去匿黄蘆羅滂家為羅滂所殺曩霄是年正月因鼻創死遺命立其從弟圖格羅滂曰夏自有國以來父死子繼今摩藏尼幸而生子足以為嗣遂以摩藏尼偽號太后曩霄既死而諒祚生至是諒祚生甫三月諸將未知議者謂可因此時皆以節度使命諸將使各統所部可分弱其勢冀絶後患判延州程琳言幸人之喪非所以示夷狄不如因而撫之或請乘隙舉兵知慶州孫沔亦言伐喪非中國體上善其言遂趣有司行册禮然議者頗惜其失機會諒祚母摩藏氏既通李守貴又通巴克實齊都爾已守貴怒併殺之羅滂族守貴後以女妻諒祚諒祚益長而驕心忌摩藏羅滂專且通羅滂子妻梁氏梁氏密告羅滂將叛諒祚乃與左右舉兵誅羅滂滅其族殺妻臧氏而以梁氏忠於己因以為妻諒祚性狂侻無常時過酋豪大家輒私其婦女酋豪多怨納叛人景詢親而用之以為樞密使棄蕃禮用漢制嘉祐六年上書言慕中國衣冠詔許之秉常立復請用蕃儀河北四路各置安撫使以知大名真定府瀛定州者領之初明鎬引諸州兵平恩州獨定兵邀賞賚出怨語幾欲譟城下及韓琦知定州琦素聞其事以為定兵不治將為亂及至即用兵律裁之察其尤横不可教者捽首斬以狥軍士死攻圍者賻賞其家其孤兒使繼衣廪恩威既信則倣古兵法作方圓鋭三陣指使偏將日月教習之由是定兵精勁齊一號為可用冠河朔京師發龍猛卒戍保州在道竊取人衣屨或飯訖不與人直至定即留不遣曰保州極塞嘗有叛者豈可雜以驕兵戍之易素教者數百以往而所留卒未踰月亦皆就律不敢犯法嵗大歉發廪賑之活飢人數百萬三年秋詔書褒美增秩再任隣城旁路刺取其政以為法人視中山隱然為雄鎮聲動北中五月置觀文殿學士去秋改文明殿學士為紫宸殿學士言者謂紫宸不可為官稱乃改舊延恩殿為觀文殿仍命紫宸殿學士丁度領之夏竦罷以宋庠為樞密使龎籍參知政事言者既數論竦奸邪會京師同日無雲而震者五上方坐便殿趣召翰林學士張方平至謂曰夏竦奸邪以致天變如此亟草制出之方平請撰駁詞上意遽觧曰且以均勞逸命之皇祐三年秋賜竦諡曰文獻知制誥王洙當行制封還其目曰臣下不當與禧祖同諡遂改曰文正同知禮院司馬光言諡之美者極於文正竦何人乃得此諡判考功劉敞言諡者有司之事也竦奸邪而陛下諡之以正不應法且侵臣官光疏再上乃諭更諡曰文莊六月河決澶州章得象薨臨其喪太常以致仕官無臨奠禮上特奠之秋七月罷鑄陜西鐵錢前月初令陜西以大銅錢一當小銅錢三小鐵錢三當銅錢一至是併河東小鐵錢如陜西用之嘉祐元年當陜西小鐵錢四年以盜鑄者多詔陜西大銅鐵錢并當常錢之二冬十月美人張氏進貴妃初衞士之變美人有扈蹕功夏竦倡議欲尊異美人同知諫院王贄因言賊根本起皇后閣前請究其事冀動搖中宫隂為美人地御史何剡入見以贄言諭剡剡曰此奸人之謀不可不審上悟事遂寢然美人卒用扈蹕功進妃位國朝命妃當冊拜而翰林學士宋祁輒進誥貴妃怒取誥抵地祁坐落職知許州貴妃遂行冊禮祁初亦疑進誥非是以李淑明於典故而問之淑心知其誤而俾之進祁果得罪議者益惡淑傾險云上嘗問翰林侍讀學士張錫以治道對曰節嗜慾者治身之本省刑罰者治國之本時妃方寵幸錫以此諷上為改容曰卿言甚善除陜西鹽禁以范祥為陜西提刑兼制置觧鹽使推行其法舊禁鹽地一切通商鹽入蜀者亦縱不問仍罷並邉入中芻粟悉留𣙜貨務錢幣以實中都盡弛輦用之役又以沿邉於青鹽地近奸人私以青鹽入塞侵利亂法乃優其直募人入中所入鹽池官自鬻禁人私售峻青鹽之禁其後行之數年猾商貪賈無所僥倖關中民得安業公私便之十一月作皇帝欽崇國祀之寳初真宗朝刻昭受乾符之寳後大内火焚至是命陳執中書而刻之十二月行四說法河北並邉入中粮草改行四說法初鹽鐵判官董沔言太宗時北伐燕薊西討呉夏以至真宗朝二國未和用兵數十年然猶帑藏充實者行三說入中之法耳今國用不足者得非廢三說之法耶請依舊行之於是三司言自行錢法𣙜貨務緡錢去年入一百一十九萬出二百七十六萬入少出多恐無以給請如沔議而舊法每一百貫支見錢三十貫香藥象牙三十貫茶引四十貫至是加以南鹽為四說法每一百貫在京支見錢三十貫香藥十五貫在外支南鹽十五貫茶四十貫乃詔行之初止於並邉而内地未嘗請即以康定詔書從事自是三說四說之法並行於河北是歲河北京東西大水大飢人相食詔出三司錢帛賑之流民入京東者不可勝計知青州富弼擇所部豐稔者五州勸民出粟得十五萬斛益以官廪隨所在貯之擇公私廬舎十餘萬區散處其人以便薪水官吏自前資待闕寄居者皆給其禄使即民所聚選老弱者廪之山林河泊之利有可取以為生者聴流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝率五日輒遣人以酒肉粮飰勞之人人為盡力流民死者為大冢葬之謂之叢冡自為文祭之及流民將復其業又各以逺近受粮凡活五十餘萬人募而為兵者又萬餘人上聞之遣使慰勞就遷其秩弼曰救災守臣職也辭不受前此救災者皆聚民城郭中煮粥食之飢民聚為疾疫及相蹈籍死或待次數日不食得粥皆僵仆名為救人而實殺之弼所立法簡便周至天下傳以為法時知鄆州劉䕫亦發廪賑飢民頼全活者甚衆盗賊衰止賜書褒奬九朝編年備要巻十三
