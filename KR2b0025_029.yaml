body:
  text: 九朝編年備要卷二十九宋陳均撰徽宗皇帝起庚子宣和二年止己巳宣和七年庚子宣和二年春二月趙良嗣使金女真使托和津持其國書來請别遣使通好因遣良嗣往猶以買馬為名其實約夾攻契丹取燕雲舊地也苐面約不齎國書時女真出師三面攻遼國上京良嗣至青牛山追及阿達遂從至上京觀攻城不旋踵而破唐恪罷時王黼奪上供綱為應奉之用漕運不至者纍月恪為户部尚書上言曰國家定都汴梁非有山河形勢以臨天下也直仰汴渠之運以養百萬之師而綱運自去秋絶不至將有匱乏之憂且以天下奉一人臣子不敢憚今珍異之物充於大臣之家而奉上者曾未十一是傾天下之財為國斂怨上以諭黼黼取下卸司以進且請治恪面謾之罪恪復言黼所進卸運數蓋併應奉司綱在其中屬戶部十之一二爾詔恪罷知滁州夏五月祭地于方澤竄朱夢說編管池州夢說以布衣上書論宦寺之權太重也六月蔡京致仕仍朝朔望時京子攸鯈鞗孫行皆至大學士視執政而鞗尚帝女他至侍從者二十餘人尚方賚豫無虛日厮役皆至大官媵妾至封夫人然公論益不與而上厭之至是請老詔京致仕依舊神霄玉京萬夀宫使仍朝朔望復元豐保甲舊制罷京東西保甲餘路並依元豐舊制秋七月嚴文臣起復法詔非邉防勿起復九月金使來趙良嗣至上京與阿固達議約大抵以燕本漢地欲夾攻契丹使女真取中京大朝取燕京許之遂議嵗賜良嗣初許三十萬而卒與契丹舊數良嗣曰燕京一帶則并西京是也阿固達亦許之遂以手札付良嗣約以女真兵自平地松林趨古北口南朝兵自白溝夾攻不然則難以依已許之約仍遣使偕來止作新羅人來朝見其國書略曰大金皇帝謹致書於大宋皇帝陛下蓋緣素昧未致禮容酌以時宜交馳使傳趙良嗣等言燕京本是漢地若許復舊將自來與契丹綃轉交雖無國信諒不妄言若將來貴朝不為夾攻即不依得已許為夾具形敝幅冀諒鄙悰馬政使金國書略曰大宋皇帝謹致書於大金皇帝逺承信介特示函書致罰契丹逖聞為慰確示同心之利共圖問罪之師誠意不渝義當如約已差童貫勒兵相應彼此兵不得過關嵗幣依與契丹舊數仍約毋聽契丹講和差政之子擴從行燕童貫第冬十月戊辰朔日有食之加梁師成太尉師成纍遷河東節度拜太尉提舉明堂時上留意禮樂符瑞事師成特以頴悟善逄迎希恩寵上實以𨽻人蓄之凡御筆號令皆主於師成於是入處殿中多擇善書吏習倣奎書雜詔㫖以出外庭莫能辨隂竊用人之柄權勢熏灼一時嗜進之徒爭先赴趨之王黼以父事之執政侍從出其門者不可勝計師成自謂為蘇軾之子訴於上曰先臣軾何罪時天下禁誦軾文其尺牘在人間皆深藏至是始復出十一月余深罷深嘗諌上以取閩中花果之擾王黼曰此太平末事不足罷又曹輔初得館職乃深除之而輔兄弟有為深門客者至是言者謂輔為深所使深遂求退出知福州上以王黼為太宰方臘反陷睦歙等州命談稹討之睦州青溪有洞曰幫源廣四十里羣不逞往往囊槖其間方臘家有漆園時造作局多科須諸縣抑配而兩浙皆苦花石綱之擾臘以妖術誘之數日之間嘯聚響應者至數萬人遂以誅朱勔為名縱火大掠驅其黨四出兩浙都監蔡遵顔坦擊賊敗死遂陷睦州殺官兵千人於是夀昌分水桐廬等縣皆為賊所據僭號改元永樂陷休寧縣執知縣趙嗣復脅之使降面斬二士以恐嗣復嗣復罵曰自古妖賊無長久者爾當舍逆以從順因我以歸朝廷朝廷必宥爾奈何使我降賊何不速殺我賊曰我休寧人也公宰邑有善政前後官無及公者我忍殺公乎委之而去未幾命嗣復知睦州陷歙州將官郭師中士曹掾栗先守獄詬賊遇害陷杭州守臣趙霆遁亷訪趙約死之陷衢州彭汝方死之陷處州縉雲尉詹良臣禦賊為所執欲降之良臣罵曰往年王綸反戮於淮南王則反磔於河北同惡無少長者皆棄市今不鍳前禍猖獗至此旦暮官軍至爾等肉餧狗鼠矣賊怒割其肉使自啖之且吐且罵死不絶聲良臣晚以恩得官時年七十上聞而憫之官其二子陷剡縣知縣宋旅死之犯杭州王禀敗之於城外又敗之於桐廬犯越州守臣劉韐敗之青溪令陳光以棄邑先遁尋伏誅十二月以陳過庭為御史中丞時睦寇猖獗過庭言致寇者蔡京養冦者王黼竄二人則冦自平又言朱勔父子本刑餘小人交結權近竊取名器賄賂狼籍罪惡彰著宜正典刑以謝天下時論韙之盜宋江平江犯淮陽及京西河北至是入海州界知州張叔夜設方略討捕招降之辛丑宣和三年春正月改談稹為兩浙制置使以童貫為江浙淮南宣撫討方臘初臘之亂王黼方鋪張太平惡聞有外冦且峻責浙西提刑急捕治勿張皇生事因不敢直奏賊遂不可制至連陷婺州上大恐中都為震始遣談稹稹逗留不進及賊入杭乃遣貫行時征北事起陜西徑兵多聚輦下盡發以往上微行送之握貫手曰東南事盡付汝有不得已者竟以御筆行之大赦以復燕京也罷蘇杭造作局先是二州置局造作器用曲盡其巧牙角犀玉金銀竹藤盡糊抹雕刻織繡諸色匠人日役數千而財物所須悉科於民民力困乏上嘗罷之諂諛人猶責其工程進奉不絶未幾復置至是以方臘亂浙西悉詔罷之二月罷御前綱運禁般載花石入京初江淮發運司於真揚楚泗各有轉般倉綱運兵士各有地分不相交越每舟虛二分容私商以利舟人又載鹽回運兵士稍便之後因內侍何欣以宿州靈壁縣山石進御前又朱勔以江浙竒花果木起綱發運司新裝舟船撥充御前綱以載花石其餘敝舊者以載綱運直達京師而轉般倉廢新綱多重載容私商又鹽法變改無回運舟兵苦之多逃亡而為盜糧運不繼至是罷花石綱使之般運糧儲三月親試舉人賜何渙舉人以下六百餘人及第出身有差詔梁師成下使臣鄧宏曹組時令就殿試賜同進士出身是春日有眚忽青黑無光其中洶洶而動若鉟金而湧沸狀日旁有青黑正如波光周回旋轉將暮而稍止是時睦賊未平人多憂之以謂禍難必未巳也夏四月貴妃劉氏薨追諡明節皇后劉氏本酒家女女也性頴悟能迎㫖合意林靈素以左道幸謂上為長生帝君謂妃為九華玉真安妃每神霄降必别置安妃位方臘平童貫與王禀劉鎮兩路軍豫約㑹於睦歙間包幫源洞表裏夾攻至是鎮與楊可世馬公直率徑騎從間道奪賊門嶺平旦入洞賊二十餘萬衆腹背抗拒轉戰至晚凶徒糜爛流血丹地火其屋萬間禀以竒兵斬賊五千餘級鎮所斬亦如之釋脅從者數萬禀尋及辛嗣宗楊惟忠生擒方臘於幫源山東北隅石澗中並其妻孥兄弟僞相侯王共三十九人振旅凱還奏捷於朝其表有曰孰謂亷頗之已老尚堪李靖之一行又曰遂成希世之功等語識者笑之臘破六州五十二縣殺平民二百餘萬王師自出至凱旋凡四百五十日臘至八月始伏誅尋赦江浙淮南等路改睦歙二州為嚴州徽州五月金使來詔國子司業權邦彥內侍童師禮館之未幾師禮傳㫖邦彥曰大遼已知金人海上往還難以復如前議諭金使令歸邦彥驚曰如此則失其歡心曲在朝廷矣師禮入奏復傳㫖候童貫回議之留闕下凡三月餘方遣人送歸國書只付其使回不復遣使後赫嚕等自海上歸至其國阿固達得書意朝廷絶之乃命其弟國相貝勒並尼堪烏舍等悉師渡遼而西用遼降人伊都為先鋒趨中京竄陳過庭張汝霖初過庭為中丞日乞罷冗官之以御前使喚為名者汝霖為西轉運請罷進花果上既嘉納矣至是王黼露章劾之以為爵祿泛濫政事猥并天下賦入殆不能支而議者弗為此圖乃敢懷奸興謗每於奉上之事動欲侵損如過庭欲廢御前使喚之人汝霖違令更不嵗進花果伏望留神自今有此必正典刑於是過庭自知蘄州貶黃州汝霖貶均州閠月置應奉司命王黼及內侍梁師成領之初方臘之亂黼承上意罷蘇杭造作局及諸所局而內侍復以言動黼黼大悔悟且懼失權勢乃乞創應奉局於私第而自領之黼言臣纍奏士大夫懷奸弗悛抑損應奉意在妄為譏謗望特置應奉一司專總領以杜姦謀從之仍令梁師成總領於內於是右司周武仲見黼論其不合黼變色曰九式九貢正周官太宰所執由是不悅武仲黼自蔡京致仕悉反其所為當時聲稱翕然而黼既得位乘髙勢而為邪多蓄子女玉帛以自奉稍襲京迹及應奉司之置黼為上宰而親領之奪運發漕挽之卒以為用戶部不敢詰四方珍異之物充牣二人之家而入尚方者才什一每陪扈曲燕至為俳優茍賤之技以獻笑取容時鄆王楷有寵或妄傳有廢立之意黼知中外嫉已不自安欲以是為竒貨東宫長子諶已除節度使封國公黼言於上以為皇孫始封但當為觀察使令宫臣耿南仲至其第令代東宫奉辭諶免官竟奪節度使而童貫隂附之謀搖東宫矣六月河决恩州黑眚出洛陽京畿忽有物如人或如犬其色黑不能辨眉目夜出掠小兒傷食之蓋黑眚云如是二嵗乃息秋七月童貫進太師談稹加節度冬十月童貫復領陜西兩河宣撫諸路蝗壬寅宣和四年春正月加梁師成開府內侍官謂之家臣自古無賜坐者其在禁中則不可知外庭未嘗見也時童貫為太師領樞密院視宰相師成為開府亦視宰相春秋大燕巍然坐於宰相之上與人主講勸酬之禮且家臣為師傅於義尤悖貫以領樞密日與宰相同班進呈畢即自屏後入內復易窄衫與羣閹為伍出則為大臣當體貌之禮入則為近侍執使令之役古所未有也二月雨雹三月幸祕書省太學命祭酒韋夀隆講書司業權邦彥講詩下武遼主天祚奔夾山耶律淳立金人攻陷遼中京中京奚國也遂兵至松亭關以與我有各不過關之說止引兵由其西而過遼主天祚先已引避又聞女真用伊都為先鋒蕭奉先曰伊都宗支也豈欲亡遼不過求立其甥晉王耳何惜一子伐其奸謀遂賜晉王死晉王賢而死非其罪聞者揮涕自此人心益携有言伊都將至者天祚震驚率騎兵五千奔雲中留宰相張琳李處溫與燕王淳守燕天祚至雲中遂取馬三千匹入夾山因謂蕭奉先曰使我至此皆汝之由急去人不容汝奉先慟哭辭行去二十里為左右所殺淳守燕二十年得人心天祚既奔夾山李處溫與其弟處能及子奭及都統蕭幹挾怨軍謀立淳乃率燕京數萬人勸進淳慟哭不得已即位改怨軍為常勝軍自號天錫皇帝改元建福降天祚為湘隂王淳主燕雲平上中京遼西六路而沙漠以北諸番部天祚主之猶稱保大二年遼國自此分矣金人追至雲中蕭扎拉降進追天祚幾及凡行帳輜貨及其幼女盡俘獲之天祚有四子長趙王次晉王次秦王次許王晉王有人望秦王母元妃兄蕭奉先慮秦王不得立密圖之㑹晉王母文妃姊適耶律達哈拉妹適伊都達哈拉妻嘗過伊都家奉先密告其結伊都將立晉王伊都聞之懼遂擁千餘騎并骨肉叛歸女真天祚遣追之及於閭山衆議若擒伊都送奉先則吾曹皆伊都也不若結之為利皆曰諾於是紿云追之不及伊都既亡奉先懼諸將皆叛乃峻加爵賞以慰其心夏四月命童貫蔡攸帥師巡邉耶律淳既立遣使來告謝上以天祚在夾山淳安得擅立令雄州却之遂遣貫勒兵十五萬巡邉攸副之下詔復幽燕故地仍以三䇿付貫如燕人悅而取之因復舊疆上也耶律淳納欵稱藩次也燕人未復按兵巡邉下也貫啓行上微出北郊餞之貫之遣也鄭居中力陳不可又謂蔡京曰使百萬生靈肝腦塗地公實為之貫遣張寶趙忠諭耶律淳舉國內附淳執二人斬之加髙俅開府舊制殿帥早朝退至殿門於宰執閣於階不相揖捲簾二三尺以為禮俅以隨龍人不數年至太尉至是又加開府恩比宰相每遇王黼於路則分道而行傳呼相揖故事盡廢矣五月我師與燕人遇戰失利六月退保雄州童貫至髙陽關駐軍用知雄州和詵計降黃榜及旗述弔民伐罪出於不得已之意如敢殺人並從軍法若有豪傑以燕京來獻除節度使遂命种師道盡護諸將分兵為兩路种師道總東路之兵屯白溝辛興宗總西路之兵屯范村又分麾下之兵授詵從師道行耶律淳遣達實林牙領一千五百餘騎屯涿之新城貫遣馬廣齎軍書入燕達實林牙謂其使人王介儒曰過河語童貫欲和偕還作善鄰不和請以兵相見毋令諸軍徐苦也前軍統制楊可世信詵言謂燕人久欲附必迎王師止將輕騎數千過界趨蘭溝甸先遣人以旗榜渡河橋開示達實林牙見之叱之曰有死而已可世為所掩被傷而退淳益兵二萬遣蕭幹統之將渡白溝諸將皆欲迎戰師道如貫約曰不可妄殺諸將憮然翌日敵亟來攻我堅壁不動敵尋退蕭幹迎戰於范村甚力興宗遣楊可弼救之仍自督戰敵乃却駐十二日師道興宗以敵勢尚熾乃議還師退保雄州其日北風大雨雹敵兵大至以背盟詬我薄暮始還營於界河敵遂至城下使來曰女真之叛本朝亦南朝之所甚惡也舍此不圖而欲射利棄好結叵測之鄰基他日之禍謂為得計可乎貫遣參議官劉韐與遼使介儒議再修好始和詵贊取燕及見事寖異又使其子璟詣蔡京以為不宜取其反覆類此於是童貫以為契丹尚盛和詵侯益探報不實妄請興師乞行軍法上聞師敗懼甚遂詔班師耶律淳死遼人立其妻蕭氏為太后蕭幹與達實林牙立淳妻蕭氏為太后改元德興八月阿固達追襲天祚於國崖擒其都統蕭規天祚脫身去及夏國引兵數萬襲天德軍阿固達遣偏師七千擊破之於是乘勝遂因秋成並邉牧馬休兵屯奉聖州之東秋七月初收經制錢去夏命陳遘經制江淮荆浙福建七路諸司財計置司杭州至是遘請七路典賣田地契錢每一貫足增收二十文通舊無過一百文省充經制移用經制錢始此九月竄宋昭上書極言遼國不可攻金人不可鄰異時金人必先敗盟為中國患乞誅王黼童貫李良嗣等言極激切至謂兩國之誓敗盟者禍及九族陛下以孝理天下其忍忘列聖之靈乎陛下以仁覆天下其忍置河北之民於塗炭之中而使肝腦塗地乎仍乞親自奉使以和解其事詔朝散郎宋昭上書狂妄除名勒停編管海州初師行即詔妄議北事者即罰無赦執政廷臣時無一言獨昭上書言其事遂坐之龍圖閣直學士任諒亦貽時相書論耶律氏不當滅絶人初以為狂也金使來貝勒烏舍髙慶裔等來初朝廷回書附其使還不遣使報金金疑吾有謀用是未嘗先報師期輒進兵取中京移軍白水濼襲破天祚行帳既占雲中府山後州縣忽聞童貫舉兵阿固達與羣下議恐爽約自我或南朝徑取燕則嵗賂不可得遂專遣使來烏舍等奏如聞貴朝遣童貫舉大兵壓境不報本國故遣臣來聘館伴趙良嗣答曰聞貴朝取西京雖不得報已令童貫舉兵以應夾攻之約彼此不報不足較也上待烏舍等甚厚賜豫不資至輟御茗調膏賜之引登明堂入龍德宫蕃衍宅别籞離宫無所不至禮過契丹數倍慶裔渤海人桀黠知書雖外為恭順稱藩頌德而屑屑求故例不已烏舍等又詣王黼第計事面授回書略曰所有漢地及夾攻並如昔議慶裔曰夾攻一假且莫是候本國兵來否良嗣曰縱本朝乘勝下燕亦與已許嵗幣初不必計先後也趙良嗣報使馬擴副之我師再舉遼髙鳳郭藥師以易州涿州來降自耶律淳死蕭后專政契丹恐漢人應南軍將謀殺之時管常勝軍郭藥師有意歸朝而四軍蕭幹聞我師再壓境忽自燕來涿州藥師以為圖已乃召蕭幹開燕欵密說其歸我幹不從而去藥師以餘慶嘗薦已不敢害之即召所部說曰天祚失國女政不綱宋天子重兵壓境此男兒取金印之時於是萬口響應囚監軍蕭餘慶遣人奉表來降時髙鳳亦以易州來歸童貫自河間復回雄州時已在道藥師至受之以其軍八千并易州義兵五千並𨽻延慶為鄉導軍聲大振初貫攸回軍至河間二人既敗事相持而哭但招集亡潰冀保雄州而已忽知中山府詹度奏耶律淳死燕人有越境而至者於是王黼復有覬幸之心鄭居中又以為不可聽詔貫攸無歸異議者斬聚諸道兵三十萬復欲用种師道為帥師道力辭又造堂曰太祖嘗出收燕山圖示趙普普曰此必曹翰所為然翰能取之陛下使誰守之太祖遂卷圖而入如師道非才豈敢望翰今朝謀帥設有如翰者又使誰守之於是師道以避事落節度而更以劉延慶為都統制約九月㑹三關屬蕭后遣蕭容韓昉來奉表稱藩貫攸視副本止云納欵稱臣揮之而去曰須納土乃受昉笑曰納欵即納土也冬十月我師潰於盧溝河劉延慶郭藥師等自雄州趨新城劉光世楊可世自安肅軍出易州遂㑹於涿州時兵衆五十萬進駐盧溝河契丹四軍蕭幹亦於燕城十里外築壘與我師相拒日遣騎渡河擊我嘗縱兵犯中軍藥師言曰四軍者既以全師抗我則燕城必虛宜遣輕騎擊之延慶即用其䇿選常勝軍并西兵五千騎間道襲燕夜半渡河銜枚而進質明常勝軍五十騎雜鄉人奪迎春門以入大軍繼至燕城七門各以二百騎守之下令曰燕人盡降契丹盡殺不意契丹兵尚多而我師已驕所至紛然四掠藥師遣人諭蕭氏使降不從我師與敵合戰至晚不解蕭幹知我師入燕亟來救或告藥師城外塵起必有救兵至諸將皆謂延慶遣兵來助登高望之則燕王冢上立四軍旗矣四軍兵自南門入人皆死鬭藥師屢敗奔門不得出盡棄馬縋城而下死傷過半還者數百騎而已時大軍屯盧溝河者未動蕭幹兵才數千得漢兩人留帳中夜半僞相語曰聞漢兵十萬吾師三倍當分左右翼以精兵衝其中舉火為應殱之無遺陰逸其一人歸報既夕而遁衆軍遂潰自相蹂踐而死幹遣騎來追至涿水北乃回自熙寧以來所積軍實掃地盡矣上始知藥師但跳入燕城尋已退遁而延慶師潰手詔責貫攸等曰吾今不復信女矣十一月庚午郊王黼言郊日隂雲解剝陽景來臨壁月垂耀信星彪列非霧非煙磅礴暗靄已事而退密雪四委乞拜表稱賀從之金使來議割燕山地初朝廷與女真約但求石晉故地初不思平營灤三州乃劉仁恭以遺契丹故女真不肯割盡蓋王黼疏謬如此至是趙良嗣馬擴見阿固達於奉聖州金主令其弟國相貝勒與計事貝勒以往嵗不遣報使今嵗出兵失期為言云今更不論元約特與燕京六州二十四縣謂薊景檀順涿易也良嗣答以兩朝皆以信義為主元約山前山後十七州今乃如此信義安在與之辨論數四卒不從於是以國書付良嗣等與其使偕來仍留馬擴於軍前趙良嗣報使送金使還且求營平灤三州十二月金人入燕初童貫蔡攸再舉不能下燕懼無功獲罪密遣其客王瓌由飛狐路邀阿固達令圖之瓌見阿固達具言貫兵已壓燕境乞如約夾攻阿固達遣瓌先歸遂分三道進兵尼堪趍南暗口達蘭駙馬趍北牛口阿固達趍居庸關時馬擴隨軍行阿固達謂擴曰我初聞南軍到盧溝有入燕者我心亦喜將斂軍歸國却聞劉延慶一夜燒焚而遁何至此耶一二日間到關汝觀我家用兵有走者否契丹聞阿固達至棄關而遁遂入居庸關軍皆蓐食時到蕭氏聞居庸失守夜率蕭幹等疾行五十里金人游騎及城統軍蕭伊遜開門納之於是宰相以下皆降阿固達遣五百騎護送馬擴歸朝獻捷遼蕭氏奔夾山金人之入燕也達實林牙以蕭氏歸遼主延禧於夾山延禧殺蕭氏蕭幹以奚渤海人入奚是嵗髙麗王侯死子偕嗣侯在位三十八年癸卯宣和五年春正月金使來趙良嗣報使先是良嗣至軍前阿固達曰平灤等州若必欲取并燕京不與汝家矣以國書副本示良嗣讀至燕京用本朝兵力攻下其租稅當輸本朝良嗣曰租稅隨地豈有與其地而不與其租稅者尼堪曰燕京自我得之則當歸我大國熟計若不早見與請速遣涿易之師無留我疆於是遣李靖王度色埓默與良嗣偕來李靖既對遂見王黼黼謂靖曰租稅非約也上意以交好之故欲以銀絹充之靖復請去年嵗幣上亦特許遂命良嗣與靖再使良嗣偕靖抵燕京見阿固達曰本朝狥大國多矣豈平灤一事不能相從耶阿固達曰平灤欲作邉鎮不可得也遂議租稅阿固達曰燕租六百萬止取一百萬不然還我涿易舊疆常勝軍亦當還我吾且提兵按邉良嗣曰本朝自以兵下涿易今乃云爾豈無曲直耶且言御筆許十萬至二十萬不敢擅增乃令良嗣歸報過半月不至吾提兵往矣時左企弓為金人謀嘗以詩獻之曰君王莫聽捐燕議一寸山河一寸金故金人要我不已金人自以金軍護送虜獲東歸又山後告急以天祚謀復故地而張㲄據平州不能無懼自南使過盧溝悉斷橋梁焚次舍亦恐我不從而自防也良嗣等留雄州以國書遞奏其略云貴朝兵不克夾攻特因已力下燕所以拘租今據燕管內每年租六百萬貫良嗣等許御筆二十萬以上不敢自專其平灤等州不在許限倘務侵求難終信義仍速追退過界之兵詔復遣良嗣自雄州再使金國國書略曰本朝與貴朝通和每曲從所欲以成交契今代稅之物悉如來諭阿固達大喜遂議雲中地烏舍曰皇帝言趙皇大度增百萬一言不辭今求西京何辭以拒然其民却待遷去良嗣曰若止空城安用之烏舍笑曰此無他皇帝意欲南朝犒賞諸軍耳三月金使來盧益報使尼楚赫王度色埓默持誓書草同良嗣來議西京犒賞金帛引對上許以二十萬乃遣兵部侍郎盧益等持國書及誓書議交燕京日子良嗣與尼楚赫皆言金許還西京且求犒軍物二十萬而國書并誓書乃無一語及西京者蓋良嗣與尼楚赫共為欺罔卒啓兵端夏四月金人來歸燕京六州先是盧益與金使尼楚赫至燕山金人止之以俟犒師金帛已乃得見烏舍等先索誓書觀之斥字畫不謹屢却回令至京師易之益等諭以主上親御翰墨示尊崇大國之意猶不聽凡改更三四朝廷皆曲從之且言近有燕人趙溫訊李處能等逃去南朝須先見還方可議交燕地趙良嗣諭宣撫司縛溫訊與之既至尼堪釋其縛以為用遂遣楊朴以誓書及燕京涿易檀順景薊六州來歸且索米二十萬石初祖宗時遼使至待遇之禮有限不示以華侈且以河朔逼近都邑故迂其途多其里堠次第為之燕犒而後至皆防微杜漸意也及王黼之遣趙良嗣惟務速以擅其功與其使人限以七日自燕山至闕下凡四五往返然每至輒漸加禮誇之以富盛金人因之自負要索不已黼遂許與遼人舊嵗幣四十萬之數外每嵗更添燕山涿易順景檀薊一百萬緡代稅錢金人既得所欲乃許我又索營平二州則曰海上腳根底元約石晉所獻之地當如元約於是我無辭又索雲中一路則曰雲中久為我有中國安得之中國亦無如之何姑欲得燕山且掩挫敗之醜以塞中外之議因割燕山府涿易檀順薊景為一路而歸其代稅錢一百萬緡又議折中貨物以補其闕於是又遣良嗣議折物凡絹三十萬匹絲綿稱是金人每喜南貨故雖木綿亦二萬段香犀玳瑁碗碟匙筯皆折閲倍償之至如龍腦每兩折八貫則皆良嗣其中為姦也約既定復索禮數因盡還其待大遼敵國之禮惟不稱兄弟而已燕山之地易州西北乃金坡關昌平之西乃居庸關順州之北乃古北關景州東北乃松亭關平州之東乃榆關榆關之東乃金人之來路凡此數關蓋天所以限蕃漢也一夫守之可以當百朝廷之割地若得諸關則燕山之境可保矣然關內之地平灤營三州自後唐為契丹按巴堅陷之後改平州為遼興府以營灤二州𨽻之號為平州路至石晉之初按巴堅子耶律德光又得燕山檀順景薊涿易諸郡建燕山為燕京以制六郡號為燕京路而與平州自成兩路始朝廷自海上議割地但云燕雲兩路而已蓋初謂燕山之路盡得關內之地殊不知關內之地平州與燕山異路也由是破遼之後金人復得平州路金人既據平州則關內之地蕃漢雜處故斡里雅布至自平州入冦此當時議割燕雲不明地理之故也童貫蔡攸入燕貫攸帥師入燕先曰交割後曰撫定燕之金帛子女職官民尸為金人席卷而東朝廷捐嵗幣數百萬所得空城而已尼堪猶欲止割涿易阿固達曰海上之盟不可忘也我死汝則為之海上初約燕人歸南朝奚渤海契丹人皆屬金國而郭藥師等渤海人上下方以為撓議欲對換為之却收其田宅既可贍常勝一軍為用又不煩朝廷錢糧童貫然之遂亟奏禀王黼許焉蓋獨以常勝軍為童貫而已赦兩河燕雲路童貫蔡攸奏撫定燕人老幼歡呼迎謁南向焚香上祝聖夀又言燕山父老皆謂自冬至春不雨昨日王師撫定雨澤隨至王黼即率百僚表賀遂降曲赦初盧益與金使尼楚赫等具言金人許西京及益與楊朴復來國書姑載交西京邉界等路而誓書不及西京朝廷惟信趙良嗣等虛詞謂金誠許歸我雲中故曲赦并及山後然當時實未始得山後土地也其後得武朔蔚三州旋復失之五月王黼加太傅總治三省事詔黼已除三公依蔡京例總治三省事祭地金阿固達死弟烏竒邁立改元天㑹號阿固達為太祖大聖武元皇帝烏竒邁改名為晟遼張㲄以平州來降㲄燕人仕遼知契丹將亡盡籍丁壯得五萬潛練兵為備金人既下燕尼堪謂參政康公弼曰我欲遣兵擒張㲄何如弼曰若加之兵是趣之叛也公弼昔居此州願往伺而圖之遂見㲄諭金人之意㲄曰契丹八路今特平州存耳敢有異志所以未釋甲者防蕭幹耳厚賂公弼公弼達其語於尼堪尼堪信之改平州為南京加㲄同平章事至是烏竒邁新立遂遣左企弓等歸時燕人患逺徙私訴於㲄曰企弓不謀守燕而使吾民流離至此近聞天祚復振若明公仗義首圖興復先責企弓等罪而殺之縱燕人歸南朝宜無不納如金人復來內用平州之兵外借南朝之援何懼乎㲄召翰林學士李石問之石以為然遂拘企弓數其罪殺之石與三司使髙履詣燕山說王安中曰平州形勢之地張㲄綜練之才足以禦金人安燕境幸招致之毋令西迎天祚北合蕭幹為我患安中入其語送石履赴闕改石名安弼履名黨又延康殿學士趙敏修者乃遼相李處能也於是敏修安弼黨三人日詣王黼白事朝廷多從其說㲄遂竟以平州來附金人聞㲄叛遣棟摩國王將騎二千討之㲄率兵迎拒金人以兵少不交鋒大書州門有今冬復來之語㲄即妄以捷聞於宣撫六月加朱勔節度以燕山之役勔馳驛得命有勞故也秋七月童貫致仕初貫上表告功落節鉞為真太師遂乞加上尊號不許及與蔡攸歸自燕山頗失上意王黼梁師成共薦談稹為宣撫副使交雲中之地貫尋命致仕稹遂為宣撫仍駐河東金人以燕山地要害實不我與但浮沉其辭而我之使人昧利貪寵欺誑朝廷因是日生希覬稹出師至太原㑹烏竒邁新立猶未暇治山後於是朔州韓正應州蘇京蔚州陳相皆通欵於我稹即除官因任朝廷謂稹有嘉靖之功尋遷少保云禁元祐學術中書省言福建路印造蘇軾司馬光文集詔令毁板今後舉人傳習元祐學術者以違制論明年又申嚴之冬詔曰朕自初服廢元祐學術比嵗至復尊事蘇軾黃廷堅軾廷堅獲罪宗廟義不戴天片文隻字並令焚毁勿存違者以大不恭論靖康初罷之八月辛巳日當食不見隂雲蔽之王黼乞付史館遼將和哩布犯燕山我師敗之和哩布者蕭幹也金人既陷燕京幹就奚王府自立為神聖皇帝國號大奚改元天復奚人濟幹出盧龍嶺攻破景州又敗常勝軍於石門鎮陷薊州冦掠燕城其鋒甚鋭有涉河犯京師之意人情洶洶頗有謀棄燕者童貫自京師移文王安中詹度郭藥師等切責不已而安中命藥師大破其衆乘勝窮追過盧龍嶺殺傷過半幹遁去尋為其下所殺傳首京師先是詔以王安中知燕山府詹度郭藥師同知藥師以節鉞欲居度上度稱御筆所書有序藥師不從兼常勝軍橫甚度不能制朝廷恐其交惡九月以度與知河間府蔡靖兩易其任靖有城府開懷待藥師藥師亦重靖稍為損然終不得其柄也藥師在燕山凡有所請朝廷無不從又遣部曲商販諸路為竒巧之物以奉權貴下及小璫無不喜之者時常勝軍及鄉軍號三十萬戍兵惟九千人無能為也藥師及燕人終不改左袵時人比之祿山明年春童貫自真定瀛莫入燕山犒常勝軍奏請河北置四總管中山辛興宗真定王元河中楊惟忠大名王育人招逃卒及刺游手之人為軍又請專委蔡靖知燕山召王安中還朝皆從之貫尋入京冬十月雨木氷十二月班御注列子莊子詔國子監刋御注冲虛至德真經南華真經頒之學者幸王黼第觀芝黼專結梁師成既為相再賜第於城西開便門與師成對街以相往來及燕山告功黼益得意乃妄言家之屏風生五芝請上臨幸上既幸府第又自便門過師成復來黼家駐蹕曰闕黼自出傳㫖賫賜命放散侍從百官於是禁衛諸班直爭願見上謝恩不肯散因大詬訩師成談稹乃扶持上出撫諭之猶洶洶不已己而復入夜漏上五刻乃開龍德門復道小墻所謂鹿塞門者以還內官者十餘人執兵衛之而去三衙衛士無一人得入者是夜諸班禁從皆集教場備不虞幾至生變翌日猶不御殿殆半日人心始少安祖宗以來臨幸未之有也金人陷平州張㲄又遣其弟來通欵朝廷授㲄節度使世襲平州令李安弼齎詔仍以金花箋御筆付其弟授㲄時外庭莫知其端燕山路轉運趙良嗣力爭不可以為恐必招女真之兵朝廷不從㲄聞有詔至率官吏郊迎金人諜知之以千騎襲破平州得朝廷所賜㲄詔㲄挺身走燕山其弟懷御筆以走又為金人所得自是歸曲朝廷纍檄宣撫司取㲄朝廷不得已命王安中縊殺函首送之未幾金太子斡里雅布由平州路將入冦矣十二月金使初來賀正初賀正旦也招河東義勝軍談稹奏常勝軍恣橫乞於河東别招一軍分其權勢優其餼廪號義勝軍凡五萬人多燕雲降卒也甲辰宣和六年春正月御樓觀燈上元節也故事天子御樓觀燈則開封尹設次以彈壓於西觀下上時從六宫於其上以觀天府之斷絶者簾幕深密下無由知衆中忽有人躍出墨黑色布衣若寺僧童行狀以手畫簾出指斥語執於觀下上怒甚命中使傳㫖治之箠掠亂下又加炮烙詢其誰何略不一語亦無痛苦之狀又斷其足筋俄施刀臠血肉狼籍上大不悅為罷一夕之歡至暮竟不得其何人付獄盡之明年八月有都城東門外鬻菜夫至宣德門下忽若迷罔釋荷擔向門㦸手而言曰太祖皇帝神宗皇帝使我來道尚宜速改也邏卒捕之下開府獄一夕方省則不知所云為者乃於獄中盡之置措置書藝所生徒以五百人為額二月陳瓘卒於楚州范純仁晚年益以天下自任尤留意人才或問其所儲人才可為今日用者答曰陳瓘又問其次曰陳瓘自好也蓋言瓘可以獨當天下之重也宣和之末人憂大厦之將顛或問游酢以當今可以濟世之人酢曰四海人才不能周知以所識知陳了翁其人也睢陽劉安世亦嘗因瓘病使人勉瓘以醫藥自輔云天下將有賴於公當力加保養以待時用瓘彈蔡京疏謂重南輕北分裂有萌論者推其先見瓘嘗為别試主文蔡卞聞瓘欲取史學將因此害瓘而因禁絶史學瓘乃於五名前悉取談經及純用王氏之學者卞無以發然五名之下往往皆博學稽古之士瓘嘗曰隨時所以救時不必自快目前也蔡京知瓘才待之加禮瓘不肯附性恬於進取雖諸公交薦逮居言職所疏奸惡雖死不避也嘗曰彼則舉爾所知此則為仁由己靖康初贈諫議大夫官其一子三月金人來丐糧金人遣詣宣撫司索所許糧二十萬斛談稹曰二十萬斛豈易至耶兼宣撫司未嘗有片紙隻字許糧之文其使曰去年四月趙良嗣已許矣稹曰良嗣口許豈足憑耶終不之與金人怒及舉兵亦以此為辭云閠月京師河東陜西地震去冬及正月地震至是又震宫中殿門皆搖動且有聲河東陜西尤甚其蘭州地及諸山草本悉沒入西山下麥苖乃在山上朝廷遣右司郎官黃潛善為察訪因按視焉及歸圖進曰震而已所傳則非也上意遂安潛善又以迎合銅鐵事除戶部侍郎夏四月親試舉人賜沈晦以下八百人及第出身有差時內侍梁師成益通賔客招賕賂士人納錢數千緡即令赴廷試以獻頌上書為名而官之至百餘人及唱第日侍於上前奏請升除皆出其口其小史儲宏者亦登第而執厮養之役如初五月金使來告嗣位也六月科免夫錢燕地雖號沃壤而金人席捲一空時常軍五萬興成兵九千月給糧已十餘萬石而他軍及官吏不與焉故悉出河北河東山東之力以饋給之才一年而三路皆困蓋科配既大道阻且長率費十餘石至二十石始能至一石於燕山民力不堪上殊不樂欲罷王黼黼懼計無從出遂與省吏謀作免夫之令冀得少久其位乃下詔曰自燕雲之復兩河京東屢經調發民力已疲若不假諸路之力其何以濟可措置調夫京西八萬淮南四萬兩浙六萬五千江南九萬七千福建三萬五千荆湖八萬八千廣南八萬三千四川十七萬八千並納免夫錢每夫三十貫委漕臣限兩月足違依軍法尋降御筆諸路調夫以供邉計應宗室后妃戚里宰執之家及宫觀寺院雖特㫖免科者一例均輸於是遍率天下所得才二千萬緡而結怨四海矣先是殿中侍御史李景衡言財匱民困元豐左庫每月約支三十六萬緡今月支一百二十萬緡不急之務若營繕諸役及花石綱與吏員猥多軍額冗濫又無名功賞非常賜豫皆夤緣僥幸千請無厭宜節以祖宗之制而省去之近年常賦之外絹帛别有和買法買有常平司和買應副燕山和買采榖則有和糴均糴有補上供和糴應付軍糧和糴撥發司和糴州縣促辦府庫空虛無以償其直民間嵗獲盡輸之官而猶不足則破産繼之見行鹽法名曰招誘商販其實抑配耳况茶鹽祖宗舊法並俟嵗中第其增虧今鹽法乃逐季比較官吏畏罪希賞遂行口斂故每田一畝有嵗買鹽八斤者若此之類民尤不堪曽未聞以實告朝廷者唯知奉行檄符以邀寵耳不報禁衝改元豐法制犯者以不恭論許亢宗使金以著作郎為賀嗣位使亢宗至金國拉林河金人所居館燕悉用契丹舊禮如結綵山作倡樂尋幢角抵之技鬭雞擊踘之戲與中國同但於衆樂後飾舞女數人兩手持鑑上下類神祠中電毋所為者莫知其說其國初無城郭四顧莽然皆草舍以居至是方營大屋數千間日役萬人規模亦宏侈矣秋七月置製璣衡所以王黼總領梁師成副之衛膚敏再使不至而復以校書郎為賀生辰使膚敏言彼生辰後天寧節五日今未聞彼遣使吾反先之於威重已缺萬一不至為朝廷羞請至燕山候之脫若不來則以幣置之境上上以為然至燕山金人果不來遂置幣而返金人攻陷應蔚等州八月童貫落致仕兩河燕山路宣撫初金人納夏羌之請割拓跋故地雲中二千里遺之止以宣武二州歸我至是夏人舉兵侵朔武地界談稹遣李嗣本禦之兵數交夏人未即退聽又金人以朝廷納張㲄屢出怨言及嘗借糧既許之矣稹不時給金人愈怒遂攻應蔚逐守臣蘇京殺陳翊又陷飛狐靈邱兩縣絶山後交割之意朝廷罪稹措置乖方詔落太尉致仕除貫落致仕仍領樞密院事河東北燕山路宣撫使是時遼主天祚在夾山上欲誘致之始遣一番僧齎御筆絹書通意及天祚許歸則易書為詔待以皇弟之禮位燕越二王上築第千間女樂三百人天祚大喜貫之是行名為代稹交割山後土地其實已約天祚來降自往迎之也是冬貫遣馬擴辛興宗使尼堪軍至雲中㑹尼堪已歸國留烏舍權元帥責以庭參禮卒不相見苐使髙慶襲傳言以朝廷先遣誓書招納叛亡雖山後亦難以便交擴歸告貫以敵情不測乞速營備邉貫不能用大赦以復燕雲兩路之故九月以白時中為太宰李邦彥為少宰先是上待王黼異於他相名其所居閣為得賢治定且為書載賡堂以下凡九榜黼以父事梁師成稱恩府先生黼第側有復道過師成家上因觀芝就詣之始悟其交結狀歸而大悔乃拔時中邦彥以分其權而師成由此亦絀初上欲大用蔡攸既而悔之至是宣制罷因曰蔡六豈堪作相攸遂落節鉞仍領樞密院事趙野左丞宇文粹中右丞蔡懋同知樞密院事冬十一月王黼致仕罷應奉司置講議局十二月命蔡京兼領詔以法式滋多流品猥衆僥幸路啓民力匱乏令尚書省置局講議命蔡京兼領蔡京落致仕領三省事五日一朝至都堂視事時河朔青齊間盜賊日熾動數十萬內外窘匱莫能支吾上意大不樂且曰崇觀間安至是哉又上意深倦於勤與中宫數有密議然無人敢當其事中宫贊上召故老大臣分付上以為然遂决意用京恐京年髙不能朝參遂命其子絛以時入對傳道君臣之意先是蔡攸以弟絛鍾愛於其父因絛私撰西清詩話專宗蘇黃為言者所論攸白上請殺之上憫京老不許止落職勒停仍詔毁板攸權勢日與父相軋輕薄者互煽搖以立門戶由是父子遂為仇敵攸纍遷至太保燕國公童貫欲收復雲中以奏議來上京主其說左丞宇文粹中對以金誓書有俟拿天祚五七年後徐議之說恐今興兵則釁端啓其議遂已兩京河浙路水時灾異叠見都人有賣青果男人孕而誕子蓐母不能收易七人始免而逃去又有酒肆號豐樂樓酒保朱氏子其妻年四十餘忽生髭髯長僅六七寸疏秀甚美宛然一男子詔度為女道士是嵗河北山東盜起命內侍梁方平討之時轉糧以給燕山民力疲困重以鹽額科斂加之連嵗凶荒民食榆皮野菜不給至自相食於是饑民並起為盜山東有張仙衆十餘萬號敢熾張迪者衆五萬圍濬州五日而去濬州去京才一百六十里而初不知河北有髙杔山者號三十萬自餘一二萬者不可勝計也遣方平率兵討捕之乙巳宣和七年春正月遣使撫諭河北京西持親書手詔撫諭詔略云諭告河北河東盜賊唐鄧汝潁流移人戶方疇田蠶宜使復業言念良民皆吾赤子比緣用非其人政失厥中不能撫諭安集使饑寒流離扶老携幼動以萬計轉而為盜非其本心為之惻然其赦厥罪仍放未納租稅以禮部尚書洪中孚為宣諭使詔許招降中孚急於成功奏請出降者齊民復當年賦役軍士依元額收願削兵籍者聽由是鄉黨子弟競為盜以免稅卒伍有過竄名賊中皆得所欲大名尹徐處仁極言其弊中孚罷為宫觀處仁又移書宰相曰人窮為盜理之必至昔谷永有言諸夏舉兵萌於民饑饉而吏不恤興於百姓困苦而賦斂重起於下怨離而上不知齊和帝時蜀有齊狗兒之役或嘲羅研曰卿蜀人貪亂一至於此研曰若令家蓄五母之雞二母之彘床上有百錢皮甑中有數升麥飯雖蘇張巧說於前韓白按劔於後不能使一夫之為盜况貪亂乎今朝下恤民之詔暮行害民之政丁寧懇至之言悉成虛文而望四民安業盜賊不作難矣金人滅遼遼主天祚竄入隂夾山金人以力不能入恨其不出謂出必得之天祚亦以畏尼堪在雲中故不敢出至聞尼堪歸其國以烏舍代戍雲中乃率韃靼諸軍五萬并攜其后妃二子秦趙王及宗屬南來達實林牙諌之不聽遂越漁陽嶺而尼堪已回雲中故為金人所敗又畏中國不可伏乃謀奔西夏未至金人擒之削封海濵王送長白山築城居之踰年而卒遼國遂亡遼契丹蓋東胡之種在橫山之南本鮮卑舊地元魏時自號契丹初達呼哩氏有八子號八部其酋長稱大人推一人為主得建旗鼓三嵗一代至唐通天中陷營州至開元十一年克屯乃奉赤心之弟實固統衆詔許襲王梁貞明間諸部以耶律色勒迪少子安巴堅為主遂盡并奚渤海諸國始建元神冊不復受代自是常為邉患安巴堅至天祚凡九代輸米於燕山以燕山糧匱自京師輸米五十萬斛以濟之罷京東西弓箭社宣和四年提刑梁楊祖請置社既而邀功者請五等之籍悉入之民不堪擾滋起為盜故臣僚請罷之楊祖落職三月朔雨雹夏四月蔡京致仕京自再領三省未幾目昏不能視事事皆决於子絛絛福威自任同列不能堪一日京以竹紙批出十餘人令改入官與寺監簿或諸路監司屬官其間有不理選限者有未經任者有未曽試出官者及參選者仍令尚書省奏行右丞宇文粹中上殿進呈事畢出京所書竹紙奏云昨晚得太師蔡京判筆不理選限某人未經任某人未曽試出官參選其人皆令以改名入官求差遣上曰此非蔡京批字乃京子第十三名絛者筆蹟京今次與事老耄無一能為專聽此後生之言遂先罷絛侍讀蓋將以是撼京而京略無去之意上乃召童貫使詣京諷之致仕貫既宣㫖京泣曰上何不容京數年必有讒譖者貫曰不知也京不得已引退自京為相不數年子六人孫四人為執政從官嘗有謝表云奉觴在庭子孫並列張蓋歸第父子同塗又宰相鄭居中子修年億年劉正夫子皂民阜民余深子章王黼子宏孚白時中子彥暉蔡卞子仍鄧洵仁子襄鄧洵武子雍並以曲恩列於侍從而阜民宏孚襄尤懦騃或始十餘嵗時李㑹為左司諌上疏略曰尚從竹馬之游已造荷槖之列又曰未應娶婦已得任子天下以為名言詔三公母領三省事先是李邦彥為右丞日言政和初蔡京改令僕之名冠以公相之號總領三省自治令㕔自此遂無長官及京致仕王黼奏改公相㕔為都㕔既遷太傅則自領三省不避皆自營專權侵紊官制乞釐正之故有是詔更定折杖法御筆除徒三年杖一百以下二年半杖九十可十七下二年杖八十十五下一年半杖七十十三下一年杖六十十二下笞五十可十下四十八下三十七下二十六下十可五下五月赦山東河北以纍年應奉軍需盜賊劫擾流移頗衆故也詔宗室復著姓初宗正少卿趙子嵩入對上疑宗室出仕者皆著姓子嵩曰熙寧舊法也上曰終是相疏御筆令今後內外宗室并不稱姓五年六月也至是子嵩出守淮寧陛辭日為上言曰周曰姬氏漢曰劉氏唐曰李氏今無故去國姓非所宜乃詔復熙寧舊法並著姓按江休復嘉祐雜志云於故書中見真廟為夀王時申奏文字皆用姓六月封童貫廣陽郡王國朝異姓非外戚無封王者蔡京用事主紹述之說以資奸謀遂贈王安石舒王其後何執中贈清河郡王鄭居中贈滎陽郡王及賞童貫燕山功遂封廣陽郡王王爵於是乎濫矣劉安世卒安世少從學於司馬光問行已之要光教之以誠且令自不妄語始初除諫官未拜命入白母曰朝廷不以安世為不肖使在言路倘在言路須明目張膽以身任責脫有觸忤禍譴立至上方以孝治天下若以母老辭當可免母曰不然吾聞諫官為天子諫臣汝父平生欲為之而不得汝幸居此當捐身以報國若得罪流竄毋問逺近吾當從汝所之於是受命任職纍年正色立朝扶持公道其面折廷諍或逢盛怒則執簡却立俟天顔稍霽復前抗辭旁觀者逺視蓄縮聳汗目之曰殿上虎居平坐不傾椅不草書不好聲色貨利其忠孝正直皆取則司馬光為人既老羣賢雕喪略盡巋然獨存是以名望益重梁師成用事能生死人心服其賢求得小吏吳默常趨走前後者使持書來啖以即大用默固勸為子孫計安世笑曰吾若為子孫計不至是矣吾為元祐全人見司馬光於地下又可破戒乎還其書而不答蘇軾嘗評元祐人物曰器之真鐵漢云秋七月河東義勝軍叛於黎城縣將官叛遂招安之其三千奔金國熙河河東路地震有裂數十丈者蘭州尤甚倉庫皆沒河東諸郡或震或裂九月童貫復宣撫金國以天祚成擒遣李用和等來告慶其實金將舉兵懼我為備尚揣我决請雲中地乃謬以好言入我牒言不一而羣小欲雲中不以為信顧方預擇雲中守蔡攸薦聶山立召之用和之來實使覘我且紿言於上曰願詔童貫至河東當授以雲中之地信之不疑詔貫再行宣撫有狐升御榻而坐是月有狐自艮嶽直入中禁據御榻而坐詔毁狐王廟冬十一月丙戍郊上才下壇而密報金將犯界左右祕之曰恐妨却恭謝宰相亦不知也及恭謝畢宰執又共匿之不以聞十二月金帥斡里雅布尼堪分道入冦東路之軍斡里雅布主之建樞密院於燕山以劉彥宗主院事西路之軍尼堪主之建樞密院於雲中以時立愛主院事金人呼為東朝廷西朝廷於是斡里雅布之軍自燕山直犯河北尼堪之軍冦河東陷朔武代欣等州直趨太原斡里雅布殺伴使傅察陷檀州薊州先是金人既得天祚連遣三使來聘初曰報謝通好也次曰告慶得天祚也又次曰賀天寧節也使傳繼來河朔至京不惟供億疲敝而彼亦因以覘我道路使我不疑及三使者歸虞部申陳桷為送伴使至境上金人已宣言大舉兵為攘奪無常儀桷懼馳還時尼堪已蓄南侵之謀㑹義軍三千叛奔之具言中國虛實又易州常勝軍五百亦叛歸尼堪由是劉彥宗伊都蕭慶力勸尼堪言南朝可圖人不必衆因糧就兵可也尼堪遂决意入冦然尚未顯然渝盟朝廷以故事命吏部員外郎傅察為接伴賀正旦使行至境上值斡里雅布入冦遂執察等責令投拜自副使蔣噩以下皆羅拜臣服察獨不屈敵以兵脅之察亦不顧敵將曰我以南朝天子失德故來弔伐察曰爾欲敗盟以此為兵端耳然自古之戰以曲直為勝負南北敵國亦安知爾非送死哉惟有死而已膝不可屈也敵將大怒執而殺之察堯俞從孫也童貫自太原逃歸先是貫至太原乃遣保州路亷訪使者馬擴知保州辛興宗使尼堪軍前諭以交蔚應州及飛狐靈邱縣餘悉還金國且密窺其意擴等至境上尼堪嚴兵以待却吏卒無越境趣擴等庭參擴等立爭不可皆拜之如見阿固達禮首議山後事尼堪曰大聖皇帝初與趙皇帝跨海交好各立誓書萬世無毁不謂貴朝違約隂納張㲄收燕京逃去官民本朝纍牒追還苐以虛文見紿今當略辨是非擴曰本朝緣談稹昧大計輕從張㲄之請上深悔之願國相存舊好不以前事置胸中乞且交蔚應兩州飛狐靈邱兩縣尼堪笑之云爾欲兩州兩縣耶山前山後我家地尚復奚論汝家别削數城來可贖罪也汝輩可即辭我自遣人如宣撫司矣擴自雲中回至太原具以尼堪所言告貫貫驚曰金人初立國邊頭有幾許兵馬遽敢作如此事耶擴曰彼意深恨本朝結納張㲄又為契丹亡國之臣所激必謀報復擴固嘗關白獨未䝉取信耳今猶可速作隄防然貫已隂懷遁歸之意矣尼堪繼遣王介儒色埓默齎書至太原貫軍中言納張㲄渝盟事且言其國已興兵辭語倨甚貫亦厚待之曰如此大事何不素告我色埓默曰兵已興何告為相國自河東入太子自燕京路入不戮一人止傳檄定耳馬擴曰兵凶器天道厭之貴朝滅契丹亦藉本朝之力今一旦渝盟舉兵相向豈不顧南朝積纍之國若稍飭邉備安能遽侵色埓默曰國家若以貴朝為可憚則不長驅矣詰旦來公必見之若勸童大王速割河東河北以大河為界用存宋朝宗社乃報國也貫聞之驚恧不知所為即與參議官宇文虛中范納機宜王雲宋伯通謀赴闕禀議貫將逃歸請太原帥張孝純諭之意孝純愕曰金人渝盟大王當㑹諸路將士極力支吾今大王去人心搖是將河東與賊河東失河北亦豈能保乎願少留共圖報國兼太原地險城堅人亦習戰未必便能攻也貫怒目曰貫受命宣撫非守土之臣必欲留貫置帥臣何為孝純撫掌嘆曰平時童太師作多少威重臨軍乃畏怯如此身為大臣不能死難止欲奉頭鼠竄何面目見天下士乎貫翌日遂行越九日至京師斡里雅布陷燕山府郭藥師叛降之知府蔡靖以斡里雅布軍壓境令藥師張令徽出門為備其夕令徽遁歸未幾斡里雅布至藥師率兵迎降金人執靖及都轉運使吕頤浩置軍中以行頤浩嘗奏燕山開邊其勢難守雖窮天下之力竭天下之財必無以善其後上怒落頤浩待制領職如故繼又詔王安中以頤浩沮抑疆事倡不可守之說陳不可行之事以沮朝論可以詔書面詰頤浩此後應副有缺或為國生纎介之事者當坐以軍法初蔡攸童貫力主藥師為可倚任沿邊巡檢得其通金人書繳上之亦屢有告變者皆不省及報至京師上左右不欲人聞之乃共匿其報但曰藥師被圍耳方欲封藥師燕王張令徽郡王割燕地與之使之世守斡里雅布留靖守燕引兵向闕以藥師為先驅尼堪陷朔武代欣等州圍太原朔州守將孫翊者勇而忠出戰勝負未决義軍開門獻其地進至武州義軍亦為內應遂失朔武長驅至代州守將李嗣本率兵拒守義軍民擒嗣本以降遂陷代州敵入城安撫使史抗父子三人迎戰死之家人皆遇害西路都巡檢李翼屯崞縣敵遣嗣本降之翼射却嗣本帥衆堅守義勝軍領崔忠殺都監張洪輔引敵入城翼挺身鬭達旦力不敵被執敵欲臣之翼怒罵不屈與將吏皆遇害翼臨死呼官家數聲乃絶金人至欣州守臣賀權開門張樂以迎之尼堪大喜特令兵不入城遂距石嶺關關尤險隘太原帥張孝純謀守關之人或曰冀景可命景景辭命耿守忠以八千人助景景復辭孝純曰第如我語景不得已而往使守忠當前守忠至關啓而獻之景奔還尼堪引兵圍太原知朔寧府孫翊來救兵不滿二千與金人戰於城下張孝純曰賊已在近不敢開門觀察可盡忠報國翊曰但恨兵少乃復戰數日其兵皆盡為金人所殺罷花石綱凡非法上供及延福宫西城租課內外製造局並罷斡里雅布犯中山府詹度禦之詔罪已求言童貫初得敵牒拆開乃檄書其言不遜貫與大臣及左右匿不以奏及議下詔求言而詔本數改易未欲下也李邦彥謂不若以檄書進呈激聖心冀求言即下大臣遂於宣和殿以檄書進上再三閲其書憤且恐乃即下詔罪已求言手詔略曰朕獲承祖宗休德托於士民君王之上二紀於兹雖兢業存於中心而過咎形於天下蓋以寡昧之資藉盈成之業言路壅蔽諂諛日聞恩幸持權貪叨得志搢紳賢能陷於黨籍政事興廢拘於紀年賦斂竭生民之財戍役困軍旅之力多作無益侈靡成風利源酤𣙜已盡而牟利者尚肆誅求諸軍餉糧不時而冗食者坐享富貴灾異叠見而朕不悟庶衆怨懟而朕不知追維已愆悔之不及應天下方鎮郡縣守令各帥師募求勤王捍邊能立竒功者並優加奬賞不限常制草澤之中懷抱異材能為國家建大計定大業或出使疆外者並不次任用其尤異者以將相待之中外臣僚士庶並許直言極諫實封投進雖有失當亦不加罪尋下詔內禪李鄴使金告內禪且求和庚申上內禪以道君號退居龍德宫皇太子即皇帝位大赦立妃朱氏為皇后斡里雅布犯慶源府信德府初祖宗以梁門遂城二縣為安肅保信軍所謂銅梁門鐵遂州也自童貫蔡攸既得燕山謂安肅保信在內地皆廢為縣移軍營廢櫓樓至是詔使為軍而敵已大入遂犯慶源其太史占帝星復明大驚欲回郭藥師曰南朝未必有備不如姑行道出陽武縣或勸知縣蔣興祖避之蔣興祖曰吾世受國恩誼死於是與妻孥俱留不肯從監兵有與敵通者斬以狥敵騎數百來攻不勝去明日益濟師力不敵遂遇害妻與長子以憂悸亦相繼而死尋賜褒詔官其二子金之攻信德也不移時遂陷執守臣楊信功斡里雅布登門撫諭軍民太學生伏闕請誅六賊時天下皆知姦臣誤國而用事者多受其薦引莫肯為上明言於是陳東率在學諸生伏闕上書數蔡京童貫王黼梁師成李彥朱勔之罪指為賊乞誅之以謝天下其書略曰臣等聞自古帝王之盛莫盛於堯舜堯舜之盛莫大於賞善罰惡堯之時有八元八愷而未暇用有四凶而未暇去堯非不知其可用可去也意謂我將倦於勤必以天下授舜特留以遺之使大明誅賞以示天下耳故傳曰舜有大功二十而為天子天下誦之至今不息臣竊謂在道君皇帝時非無賢才如八元八愷而未用者非無奸臣賊子如四凶而未去者道君亦非不知之特留以遺陛下陛下欲知姦臣賊子如四凶者乎曰蔡京曰王黼曰童貫曰梁師成曰李彥曰朱勔是也臣等謹按蔡京罪惡最大崇寧初道君皇帝方恭默聽京自散地置之宰司京天資凶悖專權跋扈首倡亂階陷害忠良進用憸佞引置子孫盡居要塗變亂祖宗法度挾其私忿竊弄朝廷爵賞固其黨與蠧害國用殘暴生民交結宦官姑息堂吏盤根錯節牢不可破京乃偃蹇自肆無復顧憚包藏禍心實有異志有識之士比之王莽所幸宗廟之靈社稷之福道君皇帝聰明睿知洞照其衷姦邪數露弗得竊發使京若輔少主其篡奪復何疑哉此非特臣等知之天下共知之臣等聞陳瓘任伯雨何昌言江公望皆曽論京奸狀故數人者一斥不復再用至有飲恨而死者天下寃之緣京用事奸人並進王黼相繼為相位至公傅騁柔曼之容肆俳優之行欺君罔上蠧國害民無所不至假應奉之名置局私家四方珍貢盡入黼室自奉之餘始以進御賣官鬻爵貪叨無厭奸賊狼籍搢紳不齒觀其所為大抵效京朔方之釁黼實啓之貫實佐之貫因京助遂握兵權至為太師封王左右指使官之至承宣固人庖人防圉是任自有宦官之盛未有其比貫實庸繆初無智謀每一出師必數十萬隨軍金帛動億萬計比其還歸軍失大半金帛所餘盡歸私帑臣等聞之邊人貫之用兵紀律不明賞罰不公身冒矢石未必獲賞而親隨先及夫以師之耳目在大將旗鼓進退從之勝負所繫貫身去敵常數百里是致將不先敵士不用命屢見敗衄挫辱國威士卒陷亡不以實奏所獲首級增數上聞祖宗軍政壞亂掃地而又冒功冒賞不察事機朔方之兵遂以輕舉敗我國盟失我鄰好今日之事咎將誰執貫之所恃者師成實聫婚姻以相救援師成之惡亦又何言外示恭謹中存險詐假忠行佞藉賢濟奸盜我儒名髙自標榜妄立名號兼稱隂相欲攬國家大柄盡歸之己欲使天下士大夫盡出其門正人端士往往望風疾避亦有不幸遭其㸃汙者一時茍賤無恥之人爭往從之旋至顯位王黼之進實賴師成如貫與京內外相應捷若影響黼為相臣專柄國政奉行師成之意而已不聞天子之命也朝廷侍從天下監司郡守往往師成門生蔡京父子奉之不暇至如去嵗道君皇帝一日相二人師成自謂出已意聞者駭恨不已夫論相者天子之職也宦官招權以為己力浸淫不已事必有大於此者可勝寒心頃嵗李彥以根括民田按行河北京東西威赫三路所至州縣倨坐黃堂使監司郡守列侍其旁而列侍之輩咸藉彥以進不敢輒違臣等嘗聞有詣道君皇帝論列此事者師成時適在側抗聲言曰王人在古諸侯之上使其人不肯盡言彥之凶熖由此益熾奪民常産重斂租課官吏稍有違忤即諷監司以他故無事送獄士大夫往往鬱憤而死三路百姓破家流蕩愁怨溢路去年京東河北以租錢及燕山免夫之征尅利太甚盜賊四起正如兩浙曩時清溪之寇實由朱勔父子漁奪東南之民怨結數路方臘一呼四境響應屠割州縣數十殺戮吏民動億萬計天下騷然彌嵗不已皆勔父子之所致生靈罹毒按勔父子皆曾犯徒杖脊始賂事蔡京夤緣交結閹寺遂致超顯招權怙勢氣熖可炙出入禁闥無時而衛士莫敢呵止侵移內帑無數而有司莫能㑹計其所請錢號為收買花石進奏之物其實竟以入已自初至今不知其幾千萬數父子每以幹當公事為名多破官舟往來淮浙興販百貨騷動數路蔑視官司僅同奴僕所貢物色盡取於民撤民屋廬削民冢塋幽明受禍所在皆然甚者深山大澤窮崖斷谷江湖危險人跡所不到之地茍有一花一石擅作威福逼脅州縣期於必取間有不可力致而官吏申白者輒大怒詈以不奉上之名論之官吏懼此名不免驅動百姓極力攻鑿得而後已往往顛踣陷溺以隕其身東南之民怨入骨髓欲食其肉而勔之父子方且炎炎未艾天下扼腕此六賊者前後相繼誤我國家離我民心天下困敝盜賊滋起外侮交侵危我社稷致道君皇帝哀痛罪已之詔播告四方而京等罪狀未白典刑未正天下無不歸怨上皇若不誅京等將何以慰道君皇帝之心雪道君皇帝之謗以解天下之疑耶况今日之事蔡京亂壞於前梁師成隂賊於內李彥結怨於西北朱勔結怨於東南王黼童貫又從而結怨於遼金敗祖宗之盟失中國之信創開邊隙使天下勢危如絲髮此六賊者異名同罪伏願陛下擒此六賊肆之市朝傳之四方以謝天下庶幾道君皇帝之志果成於陛下豈不偉哉李綱入對門下侍郎吳敏薦之也綱時為太常少卿對於延和殿上迎謂之曰卿向論水灾疏在東宮見之今猶能誦憶綱謝奏曰金人先聲雖若可畏然聞有內禪之事勢必阻縮請和厚有所邀求臣竊料之大概有五欲稱尊號一也欲得歸朝人二也欲增嵗幣三也欲求犒師之物四也欲割疆土五也欲稱尊號如契丹故事當法以大事小之義不足惜欲增嵗幣當告以舊約以燕山雲中歸中國故嵗幣增於大遼者兩倍今既背約則嵗幣當減然國家敦示和好不較財帛姑如元數可也欲求犒師之物當量以與之至於疆土則祖宗之地子孫當以死守不可以尺寸與人願陛下留神於此數者堅毋曲為浮議所搖可無後艱并陳所以禦敵固守之䇿上皆嘉納之除兵部侍郎尊道君為太上皇帝皇后為太上皇后九朝編年備要卷二十九
