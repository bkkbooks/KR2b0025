body:
  text: 九朝編年備要巻十八宋陳均撰神宗皇帝起戊申熙寧元年止庚戌熙寧三年戊申熙寧元年春正月甲戌朔日有食之定掩骼令詔州縣春首檢視暴骸給錢塟祭之復武臣同提刑以唐介参知政事執政坐待漏院故事惟宰相省閲文書同列未嘗與聞介謂曾公亮曰介備位政府而文書皆不與知上若顧問何辭以對公亮乃與閲視後以為常增太學生員初二百員至是又增置一百員尋詔以九百人為額二月進讀資治通鑑司馬光進讀三葉畢上命更讀六國從横事上曰儀秦掉三寸舌乃能如是乎光曰儀秦縱橫多華少實無益于治此所謂利口覆邦者也三月潭州雨毛夏四月王安石入對安石新除翰林學士詔越次入對上曰方今治當何先安石曰以擇術為先上問唐太宗何如對曰陛下當以堯舜為法太宗所知不逺所為不盡合先王但乘隋亂子孫又皆昏惡所以獨見稱述堯舜所為至簡而不煩至要而不迂至易而不難但末世學者不能通知常以為髙不可及不知聖人經世立法以中人為制也上曰卿可為責難於君朕自視眇然恐無以副卿此意可悉意輔朕庶同濟此道安石又曰願陛下以講學為事六月錄唐魏徵狄仁傑後是冬錄段秀實後詔興水利河決恩冀等州七月又溢瀛州尋遣使賑貸之都水監丞宋昌言與内侍程昉請相六塔舊口并二股導使東流徐塞北流初商胡決河自魏之北至恩兾乾寧入于海是謂北流嘉祐八年河流汎於魏之第六埽遂為二股自魏恩東至于徳滄流入于海是謂東流乃命翰林學士司馬光同内侍張茂則往相度二年光入對卒用昌言説於二股之西置上約擗水令東光又言俟東流漸深北流漸淺即塞北流臣恐官吏見東流已及四分急於見功遽塞北流而不知二股分流十里之内相去尚近地勢東髙西下若河流併東一遇盛漲水勢復西合入北流則東流遂絶或於滄徳未成之處決溢橫流雖除西路之患而害及東路非䇿也宜專䕶上約及二股堤岸若今嵗東流上添二分則此去河勢自東近者二三年逺者四五年候及八分以上河流衝刷己濶滄徳堤埽已固自然北流日減可以閉塞兩路俱無害矣秋七月城篳篥初秦州生戸為諒祚刼而西徙有空地百里名篳篥知州馬仲甫請城而耕之韓琦從其説樞宻院難之琦奏自來鄜延環慶涇原等路縁邊例皆以城寨包衛熟戸使諸族知有家計則可以相為表裏號為籓落之固臣復見涇原路原州有敏珠宻藏康諾爾之族以居處恃險屢殺官軍慶厯中范仲淹遂於三族之北與西界相接處修置靖安綏寧二寨豐庫闢勒多城二堡敏珠等三族於是不敢作過聴從㸃集目今所以乞城篳篥者非好生事盖欲因西人未復和好間城之庶可經久若以粮草為疑篳篥既城則秦川三陽伏羌永寧來逺寧逺諸寨却在近裡可以均勻抽減往彼屯泊更有剏置酒税場課利相兼充贍今畫沿邊城塞對西界者作圖子進呈乞更與二府大臣斟酌可否詔從之却尊號司馬光入直因言上尊號之禮非先王令典起于唐武后中宗之世遂為故事因循至今陛下踐阼未久又在諒隂中似未宜受手詔賜光曰朕方以淫雨地震天威彰著日虞傾禍若被此鴻名有慙面目况又在諒隂卿可善為荅辭自是終身不復受尊號以陳升之知樞宻院升之即旭也避諱以字行時吕公弼為樞宻使韓絳邵亢副使樞院並置使副知院始此行入粟補官法出將作監主簿助教告勅七十道付河北安撫司募人入粟尋又賜河東空名勅誥後不盡録初鬻度牒知諫院錢公輔言祠部遇嵗飢河決鬻度牒以濟急乞自今裁損聖節恩賜以限剃度之冗從之鬻度牒始此自嘉祐至治平總十三年給七萬八千餘道熙寧初至八年九月給八萬九千餘道京師河朔地大震京師震者三八月京師又震者再十一月復震九月英州地震有聲如雷十一月復震大水八月孫覺罷出通判越州時樞宻副使邵亢在位無補益覺為諌官論亢不才併疏中丞滕甫貪汙頗僻不報亢引疾辭位上優容之覺又薦陳升之代亢詔覺不當引大臣降官覺言諌官雖㣲亦預謀王斷國與人主宰相别白賢不肖於造膝之間所從來久矣且去嵗有罰金御史今兹有貶秩諌官遂請補外上初諭執政降覺官差遣仍舊執政曰諌官有出外無降官之理上曰但與降官他自住不得復行崇天厯以七月望夜月食東方與明天厯不協周琮等皆坐占騐差失奪官乃詔更造新厯九月封太祖後初詔中書門下考藝祖子孫屬近而行尊者一人裂地王之使當從獻于郊廟世世勿絶適韓琦自長安入覲因言主鬯從獻皆太子事今忽擇一人令郊廟從獻豈不疑駭天下視聽乎上悟遂罷從獻之㫖命詞但云遵仁宗慶厯四年故事封徳芳之後從式為安定郡王太祖之曾孫也減䕃補恩越明年十二月復詔裁減河南北分置監牧使以劉航崔合符為之專𨽻樞宻院不領於羣牧制置諸監牧田大抵皆寛衍為人所買占故議者爭請收其餘資以佐芻粟言利者乘之始以增廣賦入為務二年詔括河南非監牧司總牧地舊籍六萬八千餘頃而今籍五萬五千餘數皆隱於民自是請以牧田賦民者紛然而諸監尋廢矣是嵗天下應在馬凡十五萬三千有竒冬十一月丁亥郊初治平間南郊費七百餘萬至是費九百餘萬曾公亮等辭郊賚上問司馬光何如光對曰臣已有奏狀乞减半上曰減半無益大臣既懇辭不若盡聽之光曰求盡納者臣下之志賜其半者人主之恩後數日光與王珪王安石同進呈郊賚劄子光曰方今國用不足災害薦臻節省冗費宜自近始聽之為便安石曰國家富有四海大臣郊賚所費幾何惜而不與未足富國恐傷國體昔常衮辭饌時議以為衮自知不能當辭位今兩府辭郊賚正與此同耳且國用不足非當今之急務也光曰常衮辭禄猶知亷恥視夫固位貪禄者不猶愈乎國家自真廟之末用度不足近嵗尤甚何得言非急務安石曰國用不足由不得善理財者耳光曰善理財者不過頭㑹箕斂以盡民財安石曰此非善理財者善理財者民不加賦而國用饒光曰此乃桑𢎞羊欺漢武之言也天地所生財貨百物止有此數不在民間則在公家此言豈可㨿以為實上曰朕與司馬光同且以不允荅之是日安石當制批荅畧曰方今生齒日繁賦入不少理財之義殆有可思此之不圖而姑務自損祇傷國體未協朕心公亮遂不敢再辭先是光登對言國用不足者在用度太奢賞賜不節宗室繁多官職冗濫軍旅不肅乃命光及中丞滕甫裁定十二月立内降覆奏法詔從中批降須覆奏十年九月又詔應傳宣中批及面得㫖事無法者中書宻院覆奏若非理祈恩有罪規免者奏劾之造神臂弓民李宏所獻其實弩也射一百四十歩製成賜以是名已酉熙寧二年春二月以富弼同平章事時弼以足疾未能入見間有于上前言災異皆天數非人事所致弼聞之嘆曰人君所畏惟天若不畏天何事不可為者去亂亡無幾矣此必姦臣欲進邪説故先導上以無所畏使輔弼諫諍之臣無所復施即上疏數千言未幾入見又言臣聞中外之事漸有更張此必小人獻説于陛下也大扺小人惟動作生事則其間有所希覬若朝廷守靜則事有常法小人何所望也上改容聽納又言今所進用多是刻薄小才小才雖自可喜然害事壞風俗為甚恐須進用醇厚篤實之人去夏弼自河陽移判汝州詔入見上命勿拜坐語從容問以治道弼以上銳于有為對曰人君好惡不可令人窺測可窺測則姦人得以傅㑹其意上稱善又問北事弼曰陛下且二十年未可言用兵亦不宜重賞邊功恐致生事干戈一起所係禍福不細上黙然良久又問所先弼曰阜安宇内為先上善之除集禧觀使弼懇辭乞赴汝州不許弼又言臣去秋在河陽已聞臣入見後除一觀使今見未數日果有集禧之命又聞觀使只是聖意且欲留住候過聖節便除首相此説極為喧播臣始猶不深信今罷汝州除集禧此事已騐則後來事豈敢決謂妄傳易曰君不宻則失臣臣不宻則失身幾事不宻則害成前代君臣因不謹宻敗事甚多願陛下留意謹宻如天髙地厚不可窺見乃國體君道之至也臣老病非才不係利害且乞放令赴汝州任候得安好不拘内外竟求任使上乃聽弼之汝州上之初即位也弼在河陽上疏論君子小人畧曰從古以來君子常寡小人常衆人君探聽之際故得人常少不得人常多得人少故好事常不足不得人多故惡事常有餘又曰君子則惟道是守不計身之進退用則進而行道不用則退而無悶也小人則不然惟利是向若為正道所抑其身不得進則戚戚不肯休千岐萬路不顧名節經營鑚刺得其進而後己又曰又况君子常為小人所勝故從古以來治世少而亂世多者以此也又曰君子小人並立于朝實所難辨盖小人外則文飾其詞使説理道不減于君子而其心及其所為之迹則如水火之異也臣謂帝王都無職事惟别君子小人乃帝王之職事然千官百職豈盡煩帝王辨之乎但精求任天下之事所謂大臣者不越十數人不使一小人参用於其間則千官百職委諸大臣分而選之因而漸及天下州縣之吏莫不得人矣顧雖欲亂不可得也王安石参知政事上召對曰富弼曾公亮與卿協力弼聞卿肯任事亦大喜然須勿為嫌疑朕初亦欲從容除拜覺近日人情于卿極有欲造事傾揺者故急欲卿就職朕常以吕誨為忠直近亦毁卿趙抃唐介皆以言扞塞卿用朕問曾公亮亦云誠有此卿且與朕力變此風且不知卿設施以何為先對曰變風俗正法度最方今急務也上以為然初上問孫固曰安石可相否固曰安石文行甚髙侍從獻納其選也宰相自有度安石為人少容恐不可安石既執政士大夫素重其名以為太平可立致雖司馬光亦以是望之吕誨任中丞將對光為學士侍講亦將趍資善堂相遇並行光宻問曰今日言何事誨曰袖中弹文乃新参也光曰介甫命下之日衆喜得人奈何論之誨正色曰君實亦為此言耶安石好執偏見喜人佞己聽其言則美施于用則疎為從官則可登政府則天下必受其弊語未竟閣門追班光退終日思之不得其説既而搢紳間有傳其疏光往往疑其太過也初治平中邵雍與客散歩天津橋上聞杜鵑聲惨然不樂客問其故雍曰杜鵑洛陽舊無之今始至有所主客曰何也雍曰不二年上用南士為相多引南人專務變更天下自此多事矣客曰聞杜鵑何以知此雍曰天下將治地氣自北而南將亂自南而北今南方地氣至矣禽鳥飛類得氣之先者也春秋書六鷁退飛鴝鵒來巢氣使之也至是雍言果驗云創制置三司條例司議行新法命陳升之王安石領其事初安石言昔周置泉府之官以摧制兼并均濟貪乏變通天下之財後世惟桑𢎞羊劉晏粗合此意學者不能推明先王法意更以為人主不當與民爭利今欲理財則當修泉府之法以收利權又曰人才難得亦難知今使十人理財其中容有一二敗事則異論乘之而起臣謂堯與羣臣共擇一人治水尚不能無敗事况所擇而使非一人豈能無失要當計利害多少而不為異論所惑上曰有一人敗事而遂廢所圖此所以少成事也尋以吕惠卿蘇轍為條例司檢詳文字安石多與惠卿謀人號安石為孔子惠卿為顔子安石欲行青苖法轍曰以錢貸民出納之際吏縁為奸錢入民手雖良民不免妄用及其納錢雖富民不免違限恐鞭箠必用州縣不勝煩矣九月命李常吕惠卿編修中書條例初安石言編修條例在擇人上曰見在館職無足與脩法度者惟吕惠卿才髙朕嘗問吕公著何不舉惠卿作御史公著曰惠卿姦邪不可用朕見惠卿論事極有本末安石曰惠卿學術豈特今人少比前世儒者未易擬議也舉先王之道而能用者臣獨見惠卿而已其材他日必為陛下用人言其姦邪者惠卿以所負少所屈降以此多為人所毁上曰若内有所負亦何肯為姦邪上乃許用惠卿至是遂與李常並命是夏樞密院亦請以本院文書凡關祖宗以來法制可施久逺者刪次成書從之仍賜名經武要畧三月冊秉常為夏國主夏主諒祚卒於去嵗之三月子秉常立使來告哀上遣韓縝詰問來使薛宗道以殺傷楊定及虜掠熟戸不遣使賀即位降詔不承等事宗道言李崇貴等見己禁錮候朝㫖即拘送及陳夏主秉常母子悔過之意上命縝諭㫖恐國主幼小未能戢服沿邊蕃部他日或再來侵犯度彼親任事止三五人欲自朝廷除官仍于嵗賜内割五萬充俸及候李崇貴至方可行册慰之禮令縝錄本付宗道仍以詔書賜秉常且云餘令宗道宣諭其冬秉常遣使羅重進來言主上方以孝治天下奈何反教夏國之臣叛其君朝廷乃罷分賜酋豪之議止令歸塞門安逺二寨還賜以綏州重進凡三往返議之始奉表聽從乃賜秉常詔畧曰夏國既再修職貢歸納塞門安逺二寨乞别進誓文永遵臣禮所宜謹守信誓無或擾犯邊圉重取悔尤至於順漢西蕃亦無得輒有侵畧候誓表到日即遣使封冊并以綏州給還嵗賜如舊未幾陳升之請城綏州韓琦亦不欲廢事遂格秉常上誓表乃賜以誓詔夏四月河決地震旱詔以大河決溢地震相仍方夏大旱其避殿減膳罷同天節上夀令羣臣勉修厥職以圖修復唐介薨臨其䘮介疾上親臨問為之出涕至是躬臨奠贈諡忠肅初上欲用王安石参知政事曾公亮薦之介曰安石好學而泥古議論迂濶若使為政必多變更以擾天下退諭公亮曰異日安石果用天下困擾諸公當自知之耳先是執政進除目既數日上乃曰朕問安石以為可行介曰臣每聞陛下宣諭某事問安石以為不可未得施行如此則執政何所用以臣為不才當先罷免此語傳播恐非體也安石既執政奏言中書處分事用劄子皆言奉聖㫖其不中理十常八九不若令中書自出牒不必稱聖㫖介曰太宗時冦準用劄子遷馮拯官不當拯訴之太宗曰前代中書有堂牒指揮乃權臣假此以威福天下太宗朝趙普為相堂帖重於勅命尋令削去今復置劄子何異堂帖安石不欲稱聖㫖則是政不自天子出也上曰太宗制置此事極當及安石議殺人傷者許首介數與安石爭論於上前上主安石語介憒悶疽發于背而卒詔從臣言缺失詔諸路封事休日並以聞又詔侍從官各極言上躬過失及朝廷缺政遣使察農田水利賦役從三司條例司之請也劉晏謝卿才王廣㢘侯叔獻程顥盧秉王汝翼曾伉八人充使叔獻尋與楊及提舉淤田引水于畿縣澶州間嵗壞民田廬而朝廷不知六年秋詔賜二人田各十頃九年冬罷淤田司五月定縣令考績法分上中下三等六月吕誨罷自中丞出知鄧州以其論王安石也誨言大姦似忠大詐似信惟其用舎係時休否安石外示朴野中藏巧詐驕蹇慢上隂賊害物臣畧疏其十事嘉祐間因開封爭鵪鶉公事不當御史臺催促謝恩倨傲不恭一也安石每遷小官遜避不己及除翰林學士不聞固辭先帝臨朝則有山林獨往之思陛下即位則有金鑾侍從之樂見利忘義好名嗜進二也安石在經筵力請坐而講説將屈萬乘之重自處師氏之尊不識君臣上下之分三也安石自居政府留身進説多乞御批自中以下以塞人言是則掠美于己非則斂怨于君四也許遵誤斷謀殺公事力為主張妻謀殺夫用案問減等科罪挾情壞法狥利報怨五也安石入翰林未聞薦士首率同列稱弟安國之才朝廷與狀元恩例猶謂之薄主試定文巻不優遂罹中傷賣㺯威福無所不至六也宰臣不視事旬日差除自專罷逐近臣本皆不附已者妄言盡出聖衷作威作福聳動朝著七也與唐介爭論謀殺刑名衆非安石而是介介務守大體不能以口舌勝憤懣發疽而死奏對强辨陵轢同列八也章辟光獻言俾岐王遷外離間之罪固不容誅有㫖送中書正罪安石堅拒不從九也制置三司條例兼領兵財又舉三人者勾當八人者廵行臣未見其利先見其害十也上兩降手詔諭誨誨論不已遂補外州尋以諫議大夫致仕誨之請致仕也因言臣本無宿疾偶值醫用術乖方殊不知脉候有虛實隂陽有逆順診視有標本治療有先後妄投湯劑率任情意差之指下禍延四肢寖成風痺遂艱行歩非祗憚䟦渉之苦又將虞心腹之憂勢己及此為之奈何雖然一身之㣲未足深恤其如九族之説良以為憂盖以身疾喻朝政也越四年五月卒病亟手書屬司馬光為墓銘光往省之至則目且瞑光呼曰更有以見屬否誨張目强視曰天下事尚可為君實勉之秋七月乙丑朔日有食之隂雲遮蔽所食不及元奏分數宰臣表賀罷義倉行均輸法立淮浙江湖六路均輸法命發運使薛向領之賜内藏庫錢五百萬緡米三百萬石先是三司條例司言諸路上供嵗有定額年豐可以多致而不敢取贏嵗歉艱於供億而不敢不足逺方有倍蓰之輸中都有半價之鬻至遇軍國大費則剗削殆無留藏朝廷百物之用多求于不産責于非時富商大賈乘公私之急因得擅輕重斂散之權臣以為發運使實縂六路之出入宜假以錢貨經其用之不給周知諸路之有無而移用之凡上供之物皆得徙貴就賤用近易逺預知在京倉庫所常辦者得以便宜蓄買以待上令而制其有無則國用可足民財不匱矣上從之八月貶劉琦錢顗琦為侍御顗裏行言陛下用王安石未及半年中外人情囂然不安盖以其專肆胸臆輕易憲度而全無忌憚之心陛下置安石政府必欲致時如唐虞躋治于成康今安石反以管商權詐之術戰國縱横之論取媚陛下陛下遽信其言侵奪三司利柄開局置官引三人者議事用八人者分行所辟如吕惠卿王子韶盧秉王汝翼之徒豈能通曉錢榖周知天下之利源乎復引薛向為發運使兼領均輸之職信如詔書之言徙貴就賤用近易逺固亦無害然使小人用事任其變易縱有所入不免奪商賈之利商賈既不行則諸路税課虧失是先䘮其國之常入何以仰給經費官司販易物有難售者未免均配在民以取其直物既壅積難於速貨則必有鬻田産破家業以應期㑹者不然則滛刑濫罰從而加之矣兼薛向多用耳目刺州縣短長從而脅之俾承聚斂非道之事去年許遵妄議謀殺自首按問之法朝廷委安石與司馬光定奪光則持公請依舊法安石則任偏見而立新議逮韓維再定而皆附安石之法又令宻院同議文彦博所定既協公道陛下以衆人所議委富弼看詳弼在病告不俟其出朝廷即行安石所定良由同列畏其强陛下惑其辯乃至此爾小人章辟光妄獻岐邸遷外之議吕誨乞加譴逐安石百端阻格誨竟黜降故事若昭文在假集賢尚不敢專行聖㫖豈知安石傲視同列旁若無人愛憎予奪一出於已上閲疏曰此皆挾情非竭節以補時事者乃黜琦監處州鹽酒税顗為衢州酒税時臺官劉述亦以論安石出知江州范純仁罷自同知諫院出知河中府亦以論王安石也初純仁自陜西運副召還上問曰卿在陜西久主漕輓必精意邊事城郭甲兵粮儲如何對曰城郭粗完甲兵粗修粮儲粗備上愕然曰卿材能如此朕所倚頼而職皆言粗何也徐對曰粗者未精之辭如是足矣臣願陛下無深意于邊事恐邊臣觀望要功生事結釁夷狄殘害生靈耗費財用厚費爵賞不惟為今日目前之害又將貽他時意外之變上嘉納之又謂上曰書云怨不在明不見是圖願陛下圖不見之怨上曰何謂不見之怨純仁曰杜牧所謂天下之人不敢言而敢怒者是也及為諫官前後上言以休兵省事節用富民進君子退小人申公論為急崇聚斂事苛刻親䜛佞任偏聽為戒其於君子小人之際尤反覆激切又言道逺當馴致事大難速成人才不可遽求積弊不可頓革自古人君欲事亟就必為憸佞所乘不可不察純仁雅與安石厚善至是數言事多忤安石最後言薛向不可為發運使安石滋不樂劉琦罷純仁又言琦不當罷請速解安石機務留章不下純仁九求去不許未幾罷諫院為起居舍人純仁固辭安石遣所親諭純仁曰已議除知制誥矣純仁曰是以利怵我也言不用萬鍾何加焉遂録所上章申中書省曰忽聞今日詔命以劉琦等言多失實事輙近名擅去官曹規喧朝聽各落御史充監當者夫人臣以率職為忠人君以納諫為美是以仁宗開廣言路先帝容納直言此皆主上所親見今主上述事繼明思紹先烈而二三執政不能以道致君教化失其先後刑賞乖於輕重中書藏其本末但致外議喧騰凡居言責者敢不論奏而柄臣遂摭其罪欲其遇事退縮雖於政府便安而主上將何所頼王参政專任已能不曉時事性又率易輕信姦回欲求近功忘其舊學尚法令則稱商鞅言財利則背孟軻鄙老成為因循棄公論為流俗異己者指為不肖合意者即為賢能薦薛向為閎才指吕誨為無用而曽相公年髙不退㢘節己虧且欲見容依隨茍且趙参政心知其非而詞辯不及凡事不能力救徒聞退有後言伏望平心虛懷深為國計安石見之怒攜以白上上曰宜與一善地故有河中之命曾公亮趙抃得純仁狀上章自劾畧曰清時備位難逃竊禄之譏白首佐朝遂起蔽姦之謗如安石者學給辯勝年壯氣豪議論方鄙于古人措置肯諧于寮黨至使山林末學草澤後生放自有之良心樂塗附之異説拖紳朝序非安石之黨則指為俗吏圜冠朝宇異安石之學則笑為迂儒又言安石平居之間則筆舌丘旦有為之際則身心管商待聖主為可欺視同寮為不物為臣如此事主若何伏乞特申聖斷大決羣疑正安石過舉之繆以幸邦家白臣等後言之罪俾還田里純仁初知襄邑縣有牧地衞士縱馬暴民純仁取一人杖之牧地初不𨽻純仁有詔劾治純仁言兵須農以養䘏兵當先䘏農朝廷是之聽牧𨽻縣自純仁始蘇轍罷為河南府推官轍為三司條例司檢詳文字至是以書扺陳升之王安石論遣使按求農田水利徭役之失又曰發運之職今將改為均輸常平之法今將變為青苖夫商賈之事曲折難行其買也先期而與錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今官買是物必先設官置吏為費己厚然後使民各輸所有非良不售非賄不行是以官買之價必貴及其賣也弊復如前商賈之利何縁可得徒使謗議騰沸商旅不行此均輸之説轍所未喻也常平條勅纎悉具在患在不行非法之弊必欲修明舊制不過以時斂之以利農以時散之以利末今乃改其成法雜以青苗逐路置官號為提舉别立賞罰以督虧欠法度紛紛何至如此况錢布於外㓙荒水旱有不可知歛之則結怨于民捨之則官將何頼此青苗之説轍所未喻也且乞補外任上閲轍狀問安石轍與軾何如安石曰軾兄弟大體以飛箝捭闔為事上問所以處轍曾公亮請以堂除差遣故有是命河徙東行北流既塞而河自其南四十里許家港東決汎濫大名恩徳滄永靜五州軍境九月行青苖法置常平官初王安石既執政出一巻書付條例局曰此青苖法也諸君熟議之以檢詳文字蘇轍力言其不便而止已而王廣廡者乞度僧牒數千為本錢行陜西漕司前所私行青苗法春散秋斂與安石意合安石遂請先行於河北京東淮南三路尋乃置河北陜西提舉常平廣惠倉官命廣㢘等為之條例司又請以諸路常平廣惠倉錢依陜西青苖錢例取民情願預結令隨税納斛㪷其願請本色或納時價責願納錢者皆聽從便仍遣官提舉從之時諸路常平廣惠倉錢米計千五百萬以上貫石乃復推行其法于諸路尋又詔出内藏錢百萬緡增糴河北常平榖是冬邇英進講吕惠卿言先王之法有一嵗一變者則月令季冬飭國典以待來嵗之宜而周禮正月始和布于象魏是也有數嵗一變者則堯舜五載修五禮周禮十二嵗修法則是也有一世一變者則刑罰世輕世重是也有數十世而改者則夏貢商助周徹夏校商序周庠是也有雖百世不變者則尊尊親親貴貴長長任賢使能是也前日見司馬光云漢惠文景皆守蕭何之法而治武帝改其法而亂宣帝守其法而治元帝改其法而亂臣謂何雖約法三章其後乃為九章則何已不能自守其法矣惠帝除挟書律三族令文帝除誹謗妖言除秘祝法皆蕭何法之所有而惠與文除之景帝又從而因之則非守蕭何之法也宣帝所以治者由縂核名實信賞必罰元帝所以亂者失于優柔牽制知蕭望之周堪張猛之賢而不能任知𢎞恭石顯之邪而不能去非由改蕭何之法也上召光前謂曰卿聞惠卿之言乎光曰惠卿言漢惠文景宣元治亂之體是也其言先王之法有一嵗一變五嵗一變一世一變則非也譬之於宅居之既久屋瓦漏則整之坊墁闕則補之梁柱傾倒則正之亦可也茍非大壞豈必盡毁而更造哉茍欲更造必得良匠又得良材然後可為也今無良匠又無良材徒以少許之漏闕乃欲盡毁而更造之臣恐其無所庇風雨也上曰朝廷每更一事舉朝洶洶皆曰不可又不能指名其不便可據所聞言之光曰散青苖錢兹事非便上曰聞陜西已行之民不以為病也光曰臣家陜西來者皆言責督嚴急細民不勝愁苦惠卿曰光所言者吏不得人耳廢奉慈廟命發運兼坑冶市舶時饒州江建等用逓年額鑄錢一百五萬貫并額外有增剩錢尋詔京西淮南兩浙江西荆湖六路各置鑄錢監江西湖南以十五萬緡餘路以十萬緡為額又以興國軍睦衡舒鄂惠州既創監六通舊十六監水陸回逺增提㸃之官于時諸路大率務于增額詔惠州永通阜民監舊額八十萬至熙寧十年增三十萬及折二凡五十萬其後衡州黎陽監嵗增折二凡五萬緡西京阜財監嵗增市易本錢凡十萬緡興州濟衆監嵗增七萬二千餘緡陕西三銅錢監各嵗增五萬緡而睦州則創神泉徐州則創寶豐梧州以易得錫鉛興造萬端有司日夜講求于内使者四十餘輩分行營幹於外造端宏大創法新竒或言京師邸店議置監官䕫路深山當行酒禁拘收僧尼常住減刻兵吏廪禄甚者至以為欲復肉刑凡七千餘言軾不為安石所喜使權開封推官欲以多事困之而軾決斷精敏論事不休裁定宗室恩數詔畧曰宗室子弟服疎親盡一藝可録在隨材器官之至于任子之令昬姻之儀宜一用外官之制自是祖宗子孫之後世襲惟袒免親補外官非袒免親罷賜名授官罷武提刑河東行交子法置務于潞州以搬運鐵錢勞費也明年漕司以其法行則鹽礬不售害入中粮草之計詔罷之四年復行于陕西罷市鈔或論其不便罷之七年中書言陕西沿邊以鹽鈔市粮草有虛擡邊糴之弊請用交子度錢數製造於是永興路轉運皮公弼請更鑄折二大鐵錢為本並從之後竟以實錢少不可行九年後罷之寛贓吏法比部郎張仲宣犯枉法贓流賀州上納蘇頌之言以其情輕特免杖與黥面自是杖黥之法鮮施於命官矣十二月重失入死罪法增置宫觀官增置三京留司御史臺同判國子監及諸州宫觀官以待卿監監司知州之老不任職者王安石亦欲以此處異議者遂詔毋限期行預買法令諸路預給錢和買紬絹庚戌熙寧三年春正月録周唐後青苖錢禁抑配委提刑察奏敢阻遏當請者亦如之知通進銀臺司范鎮言青苖錢者唐末亂世之所為苖青在田先估其直收斂未畢己趣其償是盜跖之法也未幾又奏乞罷青苖錢歸農田水利差役于州縣而召還使者右正言李常孫覺言王廣㢘在河北第一等給十五貫第二等十貫第三等五貫第四等一貫五伯第五等一貫又富者不願取貧者乃欲得之即令貧富相兼十人為保民間喧然以為不便判相州韓琦言準轉運司及提舉司牒給散青苖錢須十戸以上為保三等以上為甲頭等第散錢更有餘錢坊郭戸願請者五家為一保依青苖例支借臣竊以為鄉村自一等而下皆立借錢貫陌三等而上更許增數坊郭戸有抵當者依青苗支借又鄉村每保須有物力人為甲頭雖云不得抑配其實官吏防保内下戸不納異時只責甲頭代輸復峻責諸縣若人不願請結罪保明申報續差官曉諭茍有願請者則干繫人别作行遣或具申奏官吏畏懼未免抑配上袖琦奏示執政曰琦真忠臣朕始謂可以利民不意乃害民如此且坊郭安得青苗而使者强與之王安石勃然變色曰既取情願則别無所用自不復俵既有保甲則難以納者自不能請升之曰但恐州縣避難索之故抑配上戸爾安石曰抑配誠恐有之但絀責一二人則此弊自絶縱使州縣抑配上戸俵十五貫錢又必令出二分息則一戸所陪止三貫因以廣常平儲蓄以待㐫荒比之前代科率百姓出粟為義倉未為不善况又不令抑配有何所害上曰須要盡人言料文彦博富弼亦以此為不可但腹誹韓琦獨肯來説真忠臣也安石曰事之情偽是非若不能察惟務多納人言恐非但常平事不可為矣遂稱疾求分司翰林學士司馬光批答畧曰今士論沸騰黎民騷動乃欲委選事任退取便安卿之私謀固為無憾朕之所望將以諉誰安石怒抗章自辨上封還其章諭以失於披閲安石入見固請罷上奬慰良久然上以琦所奏為疑遂降是詔時有知越州山隂縣陳舜俞以自劾違制不散青苖錢降監南康軍税五年而卒蘇軾為文哭之稱其學術才能兼百人之器一斥不復士大夫識與不識皆深悲之云時人有樂京者知許州長葛縣白提舉常平官言助役不便使之條悉又不報且不肯治縣事自列丐去提舉官劾之奪著作佐郎後十年始復官監黄州酒税元祐初召赴闕不至有劉蒙者知唐州湖陽縣常平使者召㑹諸縣令議免役法䝉以為不便不肯與議退而條上其害自投劾去亦奪官歸鄉飬親講學以卒元祐初賜其家布五十疋二月司馬光辭樞宻副使光奏云陛下所以用臣盖察其狂直庶幾有補若徒榮禄位不能力救生民則是盜竊朝廷名器以私其身此臣所以屢違詔命不敢祗受也方今建畫之臣徒見目前之小利不思永久之大害憂政事之不治不能輔陛下修祖宗之令典乃變更先王之正法患財利之不足不能勸陛下恭儉節用乃更遣聚斂之臣誅剥齊民設官則以冗增冗立法則以苛益苛使四海危駭百姓騷然猶且堅執不肯自以為非也青苗法行似此抑配臣恐十年之後貧者既盡富者亦貧不幸國家有邊隅之警粟帛軍須之費何從取之兼放散青苖錢凡幾千萬緡若民力既竭加以水旱之災朝廷豈容坐視流亡轉死而督責如故其勢只得蠲除是官錢幾千緡已放散不可復収矣官錢既放散百姓又困窮此可以為善乎先帝嘗出内藏庫一百萬緡助天下常平倉作糴本前此天下常平錢榖且及一干餘萬貫石今無故散盡他日若思常平之錢復欲収聚何時得及此數乎至于欲計畝率錢僱人充役決汴水以種稻及澆溉民田與夫洩三十六陂水募人耕佃若此之類不可悉數故大小皇皇不能自安陛下誠能昭然覺悟采用臣言罷制置三司條例司追還諸路常平使者則臣雖盡納官爵但為太平之民以終餘年其幸多矣若言不見用雖置諸二府天下徒指為貪榮之人未幾復令趣光入見光言臣近乞罷制置三司條例司追還諸路常平使者未賜采納若臣言果是早乞施行若臣言果非當正刑書使是非不至淆混㣲臣進退有地凡九辭詔収還勅告時臺諫侍從多以言事求去㕘知政事趙抃言朝廷事有輕重體有大小財利於事為輕而民心得失為重青苗使者於體為小而禁近耳目之臣用舎為大今去重而取輕失大而得小非宗廟社稷之福臣恐天下自此不安言入即求去未幾知杭州傅堯俞除喪至京師安石數召之既見語及新法安石謂堯俞曰方今紛紛遲君來久矣將以寳文閣待制同知諫院還君堯俞謝曰新法世皆不以為便誠然當力論之平生未嘗敢欺敢以實告安石不悦乃以堯俞同判流内銓三月親試舉人初用䇿賜葉祖洽以下及諸科八百餘人及第出身有差舊制進士一日而兼試詩賦論謂之三題特奏人只試論一道至是罷三題始用䇿翌日試特奏名進士亦制䇿也自王安石得政每賛上以獨斷上專信任之於是考官蘇軾發䇿云晉武平吳以獨斷而克苻堅伐晉以獨斷而亡齊桓專任管仲而霸燕噲專任子之而滅事同而功異何也安石見之不悦祖洽䇿言祖宗多因循茍簡之政陛下即位革而新之初考為三等覆考為五等上令宰相陳升之面讀以祖洽為第一軾乃上言陛下試士將求朴直之人而阿諛順㫖者率據上第臣竊悲之是以不勝憤懣擬進士對御試䇿以進上以軾所對䇿示安石安石曰軾才亦髙但所學不正耳陛下何不黜軾豈以其才可惜乎譬如調惡馬須減芻秣加箠扑使其帖服乃可用陛下不可不察也未幾外人讙言將以新進士為校書陸佃嘗從安石學張安國安石客也吕升卿乃惠卿弟皆外人所指目者於是諫院胡宗愈言故事崇政説書如未厯外官及不滿任者不得選舉昨邢恕以新進士除校書盖是朝廷未有法制近聞新進士因此奔走權要廣為道地乞自今須厯一任乃除于是命恕出為知縣孫覺程顥罷覺自右正言出知廣徳軍顥自御史裏行出為西京提刑初曾公亮等言開封府界散常平錢實有抑配遣覺體量有無覺既受命復奏疏辭行且言只如陳留一縣前後曉示情願請錢卒無一人至者故畿縣唯陳留不散一錢以此見百姓其實不願與官中交關今聖㫖令體量人戸情願請領或追呼抑配則臣前所引其情可見矣所省體量青苗指揮望賜寢罷故黜之顥上疏曰天下之理本於簡易則事無不成捨之而險阻則不足以言智矣若沮發公議用賤陵貴以邪妨正設令徼幸事小有成而興利者日進尚徳者日衰尤非朝廷之福况天時不順地震連年臣奉職不肖議論無補望允前奏早賜罷責故出之置刑法科九月命判大理寺崔台符等考試試法官始此夏四月賜僧牒助邊秦鳳路五百本自後諸費多仰給于此如賜本路糴米給千本造景靈宫什物給千本修宫復給千本賜廣西供軍與糴宜融州軍粮各二千本河東千本修河八百本買原武等埽物料二千五百本修瀛定州六倉之類前後給降支賜者不可勝數今並不復書是秋八月三司使吳充言三路屯兵費廣乞嵗減江淮漕米二百萬石委發運司易輕貨二百萬緡五年無慮得千萬緡轉置三路令商人入粟領于提㸃刑獄司王安石言當付之常平盖新法本以實邊儲緩急也宜令發運司度諸路米貴者折錢轉為輕賫儲於河東陜西用常平法以和糴焉詔如安石議吕公著張戩等罷公著自中丞出知潁州戩及王子韶並自御史裏行出為知縣公著與王安石素厚故用為中丞既而天下患條例司為民害公著乃復言條例司不便屢上奏不聽安石以公著叛己怨之尤深上語執政云吕公著嘗言韓琦乞罷青苖錢為執政所沮將興晉陽之甲以除君側之惡可出知潁州宋敏求當為誥安石使之明著其語陳升之以為不可敏求但言敷陳失實援㨿非宜安石怒進呈改之曰比大臣之抗章因便殿之與對乃誣藩鎮有餘惡之謀深駭予聞非事理之實或云公著素謹實無此語孫覺嘗與上言今藩鎮大臣如此論列而遭挫沮若唐家五代之際必有興晉陽之甲上誤以為公著也戩及子韶並言青苖不便至是復上疏曰臣比乞罷諸路使者及王安石處事荒謬專為聚斂吕惠卿險薄姦㓙尚留君側曾公亮陳升之趙抃雖知其非依違不斷均為有罪乞正嚴誅等事並未施行臣自今更不敢赴臺供職又言韓絳代陳升之領條例司徇從安石與為死黨遂參政柄李定邪謟自幕官擢臺職陛下惟安石是信今又以絳輔之臣豈敢愛死而不言哉子韶乞追孫覺吕公著謫命又言臺諫方論青苖乞罷兄子淵管勾京東常平差遣先是上謂執政曰王子韶言青苖法實不便但臣先與此議不敢論列小人首䑕兩端當黜之知雜陳襄亦奏子韶姦邪反覆曾公亮請以戩子韶為通判安石不可上從之乃以戩知公安縣子韶知上元縣戩既上疏詣中書力爭辭氣甚厲公亮俛首不答安石以扇掩面而笑戩怒曰參政笑戩戩亦笑參政參政所為豈但戩笑天下誰不笑之陳升之解之曰察院不須如此戩顧曰只相公得為無過耶遂並出之以李定為監察御史裏行罷徙宋敏求等職定素與王安石善為秀州判官召至京謁見李常常問南方之民以青苖為如何定言皆便之無不善者常謂曰今朝廷方爭此君見勿為此言定請安石白其事曰定但據實而言安知京師不得言青苖之便也安石喜密薦于上上欲以為知諫院曾公亮謂前無此例固爭之乃改命焉敏求時知制誥繳還詞頭以為御史之官領太常博士經兩任通判景祐初以資任相當者少始許通判未滿任者然未有自幕職官處糾䋲之地臣恐未協公論且以疾辭職從之復下蘇頌李大臨並繳還更奏迭下至於七八固執不行俱罷歸本班乃命攝官修起居注章衡行之時有朱夀昌者巽子也母劉氏生二嵗巽守長安出其母嫁民間母子不相知者五十年夀昌行四方訪求不獲飲食罕御酒肉與人言輒流涕以浮屠法灼臂燃頂刺血冩佛書兾遂其志又棄官入秦與家人訣不得毋不歸行次同州得之劉氏時年七十餘矣知永興軍錢明逸表其孝節有詔夀昌赴闕朝見先是言者共攻李定不服母喪王安石力主定因忌夀昌夀昌前巳再典郡至是折資令通判河中范育前後七奏定不服母喪且乞罷免臺職其言曰天下之惡當先治其大者而定背母喪無親法所當治今置不孝之人在天子左右臣職在糾弹此而不正焉暇其他今王安石上誣天心下塞公議朝廷雖可惑李定之心安可欺亦自御史裏行遷崇文院校書越明年正月監察御史裏行林旦言王安石以李定素出其門曲折庇䕶聴其不服母喪擢在君側臣至中書安石謂臣言此事出自上意臣聞古之事君者善則稱君今衆人知仇氏為定母而安石獨以為非衆人以李定為不孝而安石獨以為可薛昌朝亦言仇氏死定家定己三十七嵗無有不知之理今安石不顧是非專欲取勝遂使朝廷之上經筵之間置一不孝之人何以型示天下于是並與知縣差遣以謝景温為御史知雜安石獨對問上曰陛下知今日所以紛紛否上曰由朕置臺諌非人安石曰陛下遇羣臣無術數失事機别置臺諫官恐但如今日措置亦不免紛紛于是專用景温五月復置直舎人院是職太平興國以來不復除王安石欲合草李定詞故請置之初以命同修起居注陳襄襄不受乃以蔡延慶王益柔為之罷條例司以其事歸中書先是文彦博等請罷制置條例司上曰俟羣言稍息當罷之不欲亟罷恐傷王安石意也既罷又以手札諭安石增置司農寺官初條例司言常平新法宜付司農寺選官主判兼領農田差役水利遂命吕惠卿同判胡宗愈兼判未幾上批令司農寺專主常平廣惠倉農田水利差役自今嵗終要見常平廣惠倉見在錢斛若干數目夏秋青苖錢散過若干數目合収若干斗斛己納若干未納若干倚閣若干糴到諸色斗斛若干斗直若干出糴過若干都収息錢若干賑貸過若干天下水利興修過若干處所役過若干人功若干兵功若干民功淤溉到若干頃畝增到税賦若干數目農田開闢到若干生荒土地增到若干税賦天下差役更改過若干事件寛減得若干民力罷入閣儀王珪等言入閣者乃唐雙日紫宸殿受常朝之儀也唐紫宸殿與今同而唐宣政殿即今文徳殿唐制天子坐朝必立仗於正衙若止御紫宸即喚正衙然自宣政殿東西閣門入故謂之入閣五代以來廢正衙立仗之制今閣門所載入閣儀者止是唐常朝之儀非為盛禮不可遵行故罷之初沿唐故事百官日赴文徳殿朝宰臣押班謂之常朝休假三日以上内殿起居官畢集謂之横行宰臣以下應見謝辭者皆先赴文徳殿謂之過正衙元豐四年冬侍御史知雜蒲中行言今垂拱内殿宰臣以下既已日㕘而文徳常朝仍復不廢極為舛謬甚至橫行參假與夫見謝辭官先過正衙雖沿唐故事然必俟天子御殿之日行之可也有司失于申請欲望罷去詔從之置審官西院從王安石之請也詔曰樞輔之任重矣而舊制自武臣之升朝者並選除之是以三公而親有司之事也其以審官為東院别置西院專領閣門祇候以上至諸司使磨勘常程差遣樞宻使文彦博力爭之不從秋七月徙歐陽修知蔡州先是行青苖法王安石以為本于周官泉府之制修在青州上疏曰田野之民蠢然安知周官泉府為何物但見官中放債每錢一百文要二十文利是以申告雖煩而莫能諭也以臣愚見必欲使天下曉然知非為利則乞除去二分息但納本錢如此始是不為利矣元降指揮災傷及五分以上夏料青苖錢令於秋料送納秋料於次年夏料送納臣竊謂豐年常少若連遭三兩料水旱則積壓拖欠數多者遇豐熟一併催納則民永無豐嵗矣臣今欲乞遇災傷處人戸無力送納或頑猾不納者並不支俵次料錢如此則人戸免積壓拖欠州縣免鞭扑驅催矣不許抑配人戸朝廷雖有指揮而提舉官又催促盡數俵散州縣之吏亦以俵散不盡為弛慢不才由此言之理難獨責州縣臣欲今後所俵錢取民戸盡情如此則自無抑配之患臣已指揮本路州軍並令未得俵散秋料錢别候朝㫖又言夏料錢於春中俵散猶是青黄不接之時尚有可説若秋料于五月俵散正是蠶麥成熟人戸不乏之時何名濟闕直是放債取利爾若二麥不熟則夏料尚欠豈宜更俵秋料錢以此而言秋料可罷不散中書言脩擅止給青苖錢欲下問罪安石論修殊不識藩臣體乃降詔放罪上復欲用修執政安石曰修見事多乖理又好文華人盖以指蘇軾輩上黙然除修太原不拜改蔡州治秀州獄貶祖無擇無擇時以龍圖閣直學士守杭州王安石以私怨諷監司誣其過詔置獄于秀州遣御史王子韶逮捕鞫之知制誥蘇頌言無擇身列近侍出典藩服不與故吏判曲直本朝邊肅孫沔吕臻偕典州不法當時不令親鞫但直行貶今無擇所犯未甚于三人而使令對獄其為辱甚矣不報獄具巧詆無所得坐借公使酒二百小瓶送賔客遂責為節副天下寃之自後多起詔獄矣出蘇軾先是詔江淮發運湖北運司體量直史館蘇軾居喪服除往復賈販及令李師中供析照驗見軾妄冒差借兵卒事實以聞因侍御史知雜事謝景温劾軾故也景温與王安石聯姻安石實使之窮治卒無所得軾不敢自明久補外上令與知州差遣中書不可擬令通判潁州上批出改通判杭州司馬光乞知許州或西京留司御史臺國子監上曰朕欲用卿前命卿且受之光曰臣舊職且不供况當進用上曰王安石素與卿善何自疑光曰臣素與安石善但其執政違忤甚多今忤安石者如蘇軾輩皆毁其素履中以危法臣不敢避削黜但欲茍全素履臣善安石豈如吕公著安石初舉公著云何後毁公著云何彼一人之身何前是而後非必有不信者矣上又曰蘇軾非佳士卿誤知之鮮于侁在逺軾以奏藁傳之韓琦贈銀二百兩不受反販鹽及蘇木甕器光曰凡責人當察其情軾販鬻之利豈能及所贈之銀乎安石素惡軾陛下豈不知以姻家謝景温為鷹犬使攻之臣豈能自保不可不去也且軾縱非佳士豈不賢於李定不服母喪禽獸之不如安石喜之乃用為臺諫何也雨雹夏人冦邊先是虜遣兵二萬侵綏徳城築八堡判延州郭逵曰彼氣力方鋭不可與戰又不可止俟其去而平之虜既城堡各留戍三百人逵遣將攻其二大堡一日克之餘堡遁去時虜人又築堡於慶州荔源堡北曰諾克在境外二十里及聞延州堡敗亦止不築蕃部廵檢李宗諒地近虜堡害其田作乃率衆千餘人與虜戰于諾克知慶州李復圭使李信助之信按兵不出宗諒戰不利還趨堡信閉門不納宗諒還戰而沒復圭責信觀望信等引兵三千往十二盤擊虜虜曰我與宗諒有仇不與宋兵戰也信曰宗諒我熟戸射之虜曰汝真欲戰耶乃縱西翼圍之且令曰殺兵勿損將朝廷聞之命復圭酬賽復圭遣將破金湯白芍蘭浪萌和市等寨又使李克忠襲金湯虜伏兵衝之克忠還虜于是大入冦攻圍大順城柔逺寨荔源堡兵多者號三十萬少者號二十萬王師不利兵官髙敏郭慶死之虜屯榆林距慶州四十里逰騎至城下陜西大震時大順清野賊無所掠又毒水上流飲者多死凡九日乃遁去冬十月又大舉入冦環慶諸堡皆被圍姚兕駐荔源堡引兵出據險要及張疑兵諸山上使賊不得散掠境内間出竒兵擊之賊稍却明日益兵來攻甚急兕乘髙而射凡三百餘發皆應弦而斃指裂流血而射不已更遣子雄率精騎出自從城上麾之賊不敢當即西攻大順城兕復往援城亦獲全夏人之冦大順也詔知延州郭逵出師援之逵諜知秉常幼留宥州即遣燕達悉破近邊諸寨聲言擣虛攻宥州凡九戰其酋皆遁又遣田守度出徳靖寨伺其歸邀擊之夏人聞逵將襲宥州亟奔還守度破之于金湯八月立川峽閩廣七路選法詔川峽福建廣南七路之官罷任迎送勞苦其令轉運司立格就注免其赴選著為令行重禄倉法九月置中書檢正官中書檢正五房公事官一員每房各置檢正公事二員並以朝官充十月以鄧綰檢正中書孔目房公事綰舉進士髙第累遷寧州通判上書言陛下得伊吕之佐青苖免役錢等法百姓無不歌舞願堅守之又與王安石書及頌安石大喜白上使乘驛赴闕既至上問曰識王安石否曰不識上曰今之古人也又問識吕惠卿否曰不識上曰今之賢人也綰退見安石欣然如故交數日值安石致齋陳升之馮京以綰知邊事奏除知寧州綰甚不平曰使我還事州耶朝士有問曰君今當作何官曰我不失作館職或問君得無為諌官乎綰曰亦自可以為之明日果有此命綰自至京師不敢與鄉人相見鄉人皆笑罵綰曰笑罵從他笑罵好官我須為之尋又命兼編修中書戸房條例韓絳宣撫陜西絳以參知政事出吕大防為宣撫判官建議曰星居鳥散不能常聚㸃兵數千動須累日者虜之所短也建營列戍一二萬之衆旦夕可集者我之所長也分路置帥舉一路兵將除防守外不滿二萬者我之所短也率數萬衆向一路以多擊少者虜之所長也異日以我所短抗虜所長所以屢敗今十將並出因其未集便行擾擊彼若衆兵擊我一處則六處牽制一處堅壁使虜防救不暇然後招懐無所不可矣尋又命絳兼宣撫河東曾公亮罷公亮初薦王安石可大用及同執政上方向安石公亮隂助之而外若不與同者每遣其子孝寛與安石謀議安石以此推尊公亮而抑韓琦御史至中書爭論青苖事公亮俛首不答安石厲聲與之往反由是言者以安石為專而公亮不與也蘇軾嘗責公亮不正救公亮曰上與安石如一人此乃天也然安石猶以公亮不盡阿己數毁訾之于是聽公亮罷相五年夏以太傅致仕䇿制科武舉得吕陶張繪孔文仲對䇿凡九千餘言力詆王安石所建理財訓兵之説為非是宋敏求第為異等上讀文仲䇿謂其意尚流俗毁薄時政恐不足収録安石見之大不平于是乃宻啟上御批令文仲逺單州推官本任齊恢孫固封還御批韓維陳薦孫永皆力言文仲不當黜維五上章畧曰陛下無謂文仲一賤士耳黜之何傷臣恐賢俊由此解體忠良由此結舌阿䛕茍合之人窺隙而進為禍不細願改賜處分卒不聽武舉二十五人司馬光罷出知永興軍初上諭王安石曰聞三不足之説否安石曰不聞上曰陳薦言外人云今朝廷以為天變不足懼人言不足恤祖宗之法不足守昨學士院進試館職䇿其問意專指此三事此是何理盖䇿問光所為也光屢請外不許至是乃有永興之命冬十月雨木冰陳升之罷以母喪去位明年正月詔起復升之請終喪五年冬以升之為樞密使同平章事八年夏罷知揚州元豐三年卒升之深狡多數善附㑹以取富貴丹陽居第壯大踰制南人驚詫以為未識其他豪侈類此范鎮致仕鎮奏曰臣近舉蘇軾諫官䝉御史劾奏又舉孔文仲應制科䝉下流内銓告諭令歸本任職臣之故上累聖徳望除臣致仕仍不轉官以贖蘇軾販鹽誣罔之罪及文仲對䇿切直之過不報又奏蘇軾父死京師先帝賜之絹百疋銀百兩辭不受而請贈父官是時韓琦亦與之銀三百兩歐陽修與之銀二百兩皆辭不受軾之風節亦可想矣今言者以為多差人船販私鹽是厚誣也文仲對䇿内外皆言其切直設有過當亦由小官踈外不識忌諱且以直言求之而以直言罪之是網天下忠直而納之罪罟也臣竊惜之乞明辨軾之無過恕文仲之直言除臣致仕最後又奏曰臣言青苗不見聽一可去薦蘇軾孔文仲不見用二可去負二可去而重之以多病早衰其可已乎李定避免持服遂不認母是壞人倫逆天理也而欲以為御史御史臺為之罷陳薦舍人院為之罷宋敏求李大臨蘇頌諌院罷胡宗愈王韶上書肆意欺國以興邊事敗則置而不問反為之罪帥臣李師中及御史一言蘇軾下七路掎摭其過孔文仲則遣之還任以此二人况彼二人以此事理况彼事理孰是孰非孰得孰失至於言青苗則曰有見效者豈非嵗得緡錢數十百萬乎此錢非出于天非出于地非出于建議者之家一出于民民猶魚也財猶水也養民而盡其財何異養魚而竭其水惟陛下裁赦早除臣致仕王安石見之大怒持其疏至手顫命王益柔草詞又自改云鎮頃居諌院以朋比見攻晚在翰林以阿䛕受斥而每託議論之公欲濟姦邪之惡乃至每誣先帝以盖其附上罔下之醜力引小人而狃于敗常亂俗之姦稽用典刑誠宜竄殛宥之田里姑示寛容乃落翰林學士致仕凡所應得恩例悉不之與司馬光預作鎮傳曰吕獻可之先見范景仁之勇決皆余所不及也十二月賜諸路節行士官南郊赦書訪求節行才識學術之士諸路監司以劉䝉等二十一人應詔送舍人院試而命之以官十二月立更戍法以京東兵戍河北河北兵戍河東河東京西兵戍陜西淮南兵戍湖北京師及府界兵戍成都利梓路湖北戍䕫路以他路兵雜戍者遣還之立保甲法初上問王安石以省用安石對以減兵最急上因舉陜西河北兵數安石曰鼓舞三路百姓習兵則兵可省至是同管勾開封府界常平廣惠倉趙子幾逢安石意請先舉保甲法於畿縣其法十家為保選一人為保長五十家為大保選一人為大保長十大保為都保選衆所服者二人為都保正副凡保丁聽自置弓箭習武藝每一大保輪五人夜廵盜先行於開封祥符二縣五年秋七月更定保甲上畨法六年秋曾布修成義勇保甲及養馬條三巻詔頒之保甲惟開封府界以都保置木契左留司農寺右付其縣差官閲試農隙講習皆出左契廵尉司給廂禁軍白直餘以保丁畨上比舊兵給三分之一代更以十日遇追捕羣盜聽抽上下畨縣尉留弓手白直外餘如廵檢法河北河東陜西五路並排定保甲勸誘習武藝聽㫖教試未得上畨餘路止排定保甲免習武藝荆湖川廣被邊州軍如當習武藝委監司詳度以聞以韓絳王安石同平章事王珪參知政事絳在陜西遣使即軍中拜之謝景温言珪徒有浮文執政豈所宜耶上曰姑容之中書三員韓絳奉使遇齋祠告遂無人押班且當用珪薛昌朝曰執政係天下輕重豈但充位押班者陛下待執政何薄也上曰兩制中誰可易珪者昌朝曰司馬光豈不賢于珪上曰吾非不知光光待朕薄豈肯為朕用乎昌朝曰陛下何以言之上曰仁宗末年琦弼用事光是時處諌諍侍從未嘗有所避朕用為樞副而不肯受非薄朕而何昌朝曰今希㫖徼幸者徧天下光獨勸陛下崇義而黜利非獨言之而又懇辭大用兾以感悟聖心孟子與齊王言仁義而不及利故齊人莫如孟子愛王臣謂羣臣愛陛下未見有如光者未幾曽布除檢正五房公事布每事白安石即行或謂布當白兩參政布曰丞相己議定何必問為俟勅出令押字耳九朝編年備要巻十八
