body:
  text: 九朝編年備要巻十五宋陳均撰仁宗皇帝起申午至和元年止戊戍嘉祐三年甲午至和元年春正月京師大疫出犀角和藥以療民其一通天犀也内侍李舜卿請留供服御上曰朕豈貴異物而賤百姓哉立命碎之追册貴妃張氏為温成皇后初妃既受封冊寵愛日甚出入車御華楚頗侵並后飾嘗議用紅繖增兵衞數有司以一品青蓋奏兵衞凖常儀上守法度事無大小悉付外廷議凡宫禁干請雖己賜可或輒中卻妃嬖幸少比然終不得紊政及薨上悲悼不已謂左右曰昔者殿廬徼衞卒夜入宫妃挺身從别寢來衞又朕嘗禱雨宫中妃刺臂血書祝辭外皆不得聞宜有以追賁之入内押班石全彬探上意請用后禮於皇儀殿治喪諸宦官皆以為可入内都知張惟吉獨言此事須翌日問宰相既而判太常寺翰林學士承㫖王拱辰知制誥王洙等皆附全彬議宰相陳執中不能止遂詔近臣宗室皆入奠於皇儀殿移班慰上於殿東楹特輟視朝七日命參知政事劉沆為監䕶使全彬及勾當御藥院劉保信為監䕶都監凡䘮禮皆全彬與沆合謀處置而洙等奏行之初有司請用荆王故事輟視朝五日或欲更增日聽上裁乃增至七日殿中侍御史李景初言貴妃一品當輟朝三日禮官希㫖使恩禮過於荆王不可以示天下御史中丞孫抃上三奏請罷追冊不報初賜諡曰恭德樞密副使孫沔言太宗四后皆諡曰德從廟諡也今恭德之諡其法何從且張郭二后不聞有諡此雖禮官之失實貽譏於天下遂改今諡先是詔沔讀哀冊沔奏章穆皇后喪比葬行事皆兩制官今反詔二府大臣行事不可於是執冊立上前陳故事且曰以臣孫沔讀冊則可以樞密使讀冊則不可置冊而退陳執中取而讀之後議立忌沔又極陳不可直集殿劉敞亦言太祖以來孝惠孝章淑德章懷后廟四室陛下之妣也猶不立忌豈可以私昵而變古越禮乎吕景初亦力爭乃罷立忌抃及侍御史毋湜殿中侍御史俞希孟皆求補外知雜事郭申錫請長告並以言不用故也沔數言追冊温成於禮不可且曰皆由佞臣賛兹過舉陳執中等甚衘之沔不自安力求解職㝷出知杭州内侍王守忠加留後故事宦官未有真留後者上以守忠服勞乆欲予之以樞密使髙若訥力辭不可而止及是疾亟求為節度使梁適引故事云宦官無除真刺史者况節度使乎中丞孫抃亦力爭乃止加武信軍留後言官方論列翌日守忠卒守忠謹愿詳密故眷遇最厚三月王貽永罷以王德用為樞密使本朝外姻未有輔政者貽永在樞府十五年性清謹逺權利歸第則杜門謝客迄無過失德用雖致仕乾元節預班庭契丹使語譯者曰黑王相公乃復起耶上聞之起德用判鄭州至是復用之初孔道輔死或謂德用曰孔道輔害公者今死矣德用曰中丞以其言職豈害某哉朝廷亡一忠臣可惜也德用在邉時上嘗遣使問邉事德用曰咸平景德中賜諸將陣圖人皆死守戰法緩急不相救以致屢敗臣願不以陣圖賜諸將使得應變出竒自立異效上然之又嘗言兵法使士知畏愛怯者勇勇者不驕以吾可勝因敵而勝之豈多言哉詔改元以四月為始司天監言四月朔日食故也易服避殿减膳夏四月甲午朔日有食之用牲於社是日雷雨至申時見所食九分之餘宰相率百官以日食不及算分拜表稱賀祥源觀災御史呉中復對於延和殿上曰比來上封事者多言隂陽未和由大樂未定且樂之不和於古乆矣朕謂水旱之來繫時政得失非樂所召去歲之郊祀也以三聖並享至是旱學士胡宿言五行火禮也去歲火而今又旱其郊祀并配之失也即建言配非古宜用迭配如初秋七月梁適罷先是將以梁適為温成皇后園陵使適以為不可及奏國朝以來妃嬪葬佛寺别園遂定葬奉寺由是與陳執中不合御史馬遵等彈適貪黷怙權其所除授多縁賄賂親黨不宜乆居重位上未聴御史吴中復又彈適奸邪上曰馬遵亦有疏且言唐室天寳後治亂分何也中復對曰明皇初任姚崇宋璟張九齡為相遂致太平天寳而後相李林甫牛仙客楊國忠因而大壊治亂於此分矣雖威福在於人主要之治亂在所任之臣上曰朕每進用大臣未嘗不采天下公議然知人亦未易也至是中丞孫抃又以為言罷知鄧州解馬遵等臺職時並為御史遵知宣州㝷改京東轉運吕景初呉中復並通判改知衢池二州梁適之得政也中官有力焉及遵等於上前極陳其過上左右或言御史捃拾宰相自今誰敢當其任者適既罷左右欲并遵等去之遵對彈適多私又言適與劉宗孟連姻而宗孟與富人共商販下開封府劾治所言不實皆坐貶知制誥蔡襄以皆無罪封還詞頭不草制改付他舎人亦莫敢當者遂用熟狀降敕中丞孫抃累疏爭之翰林學士胡宿因召對亦乞留遵等退又上書皆不報越明年知制誥劉敞上言故事遷降官皆有誥命前年因事黜御史吴中復蔡襄當草制封還詞頭執政恥為所沮且單用敕牒因循習熟遂成乆例今後除命合用誥辭者乞遵故事八月以賈黯判流内銓時承平日乆百官職業皆有常憲樂於因循而銓衡徒文書備具而已黯始欲以風義整救其弊益州推官桑澤在蜀三年不知其父死後代還舉者甚多應格當遷方投牒自陳人皆知其當喪父豈肯為作文書澤知不可乃去發喪制服以不得家問為解澤既除喪求磨勘黯謂澤三年不與其父通問亦有人子之愛於其親乎使澤非匿喪猶為不孝也言之於朝澤坐廢歸田里不齒終身晉州推官李亢初以入錢得官己而有私罪黙自引去匿所得官以白衣應鄉舉及第積十嵗當磨勘乃自首言其初事黯以為此律所謂罔冐也奏罷之奪其勞考以劉沆同平章事前一夕召當宿學士楊偉草麻不至更自外召趙概草之乃詔自今當宿學士以故請告者令其以次逓宿命修起居注官侍經筵從知制誥賈黯之請也舊邇英延義二閣講讀官自有記注至是乃罷焉仍詔命賜坐於御榻西南越明年春修注石揚休言恐上時有宣諭咨訪而坐逺不悉聞因令立侍云九月以吕臻王洙為翰林學士故事翰林學士六員時楊察趙概楊偉胡宿歐陽修己五員於是察加承㫖臻及洙并除洙乃員外擢蓋附會温成事宰相陳執中劉沆喜其助己也時洙講周禮上令畵禮器圖至是上之明年春臻以上疏論陳執中出知徐州賜燕資善堂仍詔自今由經筵出者亦如例以劉沆為温成皇后園陵監䕶使中丞孫抃御史范師道毋湜言宰相不當為贈后典葬不報又議為后建陵立廟抃率官屬言非禮因相與請對爭不能得抃伏地不起上為改容遣之冬十月葬温成皇后知諫院范鎮言太常議温成皇后葬禮前謂之温成園後謂之園陵宰相劉沆前為監䕶使後為園陵使如問此議皆由禮官前日是則今日非今日是則前日非必有一非於此矣夫禮典素定而議論如此古者法吏舞文今世禮官舞禮乞下臣章問前後異同狀以正中外之惑定州郡選人奔喪令十一月呉充鞠真卿罷充時同判禮院鞠為太祝先是議温成皇后園廟事學士判太常寺王洙令吏以印紙行文書不關僚屬充真卿即移開封府治吏罪而知府蔡襄不受充等持之不置會臺諫亦論其事朝廷疑充等諷之故出充知髙郵軍真卿知淮陽軍御史趙抃及諫官范鎮皆言充等無狀不報時諫官爭言充及真卿不當補外直集賢院馮京最後上疏言愈切宰相劉沆怒請出京濠州上曰京何罪然猶落修起居注臺諫又爭言京不當奪職請復之不報知制誥劉敞言臣昨聞呉充出守馮京落職將謂其人所行實有過當所言實有不可是以觸忤聖意不䝉矜恕及於延和殿奏事面奉宣諭充乃舉職京意亦無他中書惡其太直不與含容臣竊驚駭不覺憤咽前古以來惟有人主不能容受直言或致竄謫臣下今陛下慈聖好諫寛大如此不知中書何故不務將順聖德之美須要排逐言者又言臣前論呉充馮京謫官面䝉聖諭本末臣即言若如此則是大臣蔽君之明專君之權而擅作威福也必恐感動隂陽有地震日蝕風霧之異今臣竊聞鎮戎軍地震一夕三發去臣所言五日之内耳又京師雪後昏霧累日復多風埃太陽黄濁此皆變異之可戒懼者也臣所以先知必然者按五行志云臣事雖正專之必震况其不正乎又尚書洪範䝉恒風若而京房易傳臣之蔽君則䝉氣起臣以此數者合之故知必有異也加内侍石全彬劉保信官全彬加觀察使保信西染院使並以兼䕶温成皇后園陵故也范鎮言章獻章懿章惠三太后之葬推恩皆無此比乞遣還告不報後數日又遣全彬入内副都知劉敞以為濫賞數遷封明年三月卒遷之敞為人磊落明白博記問為文章尤敏贍在西掖時一日追封皇子公主九人敞將下直立馬却坐一掃九制各得其體遇事多所建明好譏議執政惡之故知制誥七年不遷慶歴間學者多守注疏敞為七經小傳始異諸傳之説後王安石修經議蓋本於敞乙未至和二年春正月晏殊薨諡曰元憲殊雖早貴而奉養清儉善於知人如范仲淹孔道輔皆出其門而富弼楊察乃其壻也上篆其碑首曰舊學郭固上車戰法固為汾州推官嘗造戰車知并州韓琦曰此馬燧法也令賫詣闕既試之除衛尉丞三月孔宗愿封衍聖公孔子四十八代孫也初襲封文宣公太常博士祖無擇言孔子後在漢魏封褒成褒尊宗聖晉宋曰奉聖後魏曰崇聖後周及隋唐封鄒國公唐初曰褒聖開元中始諡孔子為文宣王封其後為文宣公不可以祖諡而加諸後嗣乃詔改封而令世襲焉夏四月定差衙前法罷里正衙前以貲産差排鄉戸衙前初州縣之役皆出於民而有常數非民事則役廂兵詔令有大興作然後調丁夫而役有輕重勞佚之不齊人有貧富强弱之不一承平既乆奸偽滋生命官形勢占田無限皆得服役衙前將吏得免里正戸長而應役之户困於煩數至偽為劵售田於形勢之家假佃戸之名以避徭役至是知并州韓琦言民苦於里正衙前至有孀母改嫁親族分居或棄田與人以免上等或非命求死以就单丁又每鄉被差疏密髙下不均富者休息有餘貧者敗亡相繼請罷差里正衙前只差鄉戸衙前令本縣於諸鄉中第一等選物力最髙者為之於是下其議於京畿諸路相度皆以為便而知制誥韓絳蔡襄亦極論江南福建里正衙前之弊絳請行鄉户五則之法其法凡差諸州軍鄉戸衙前以産錢與物戸從多至少置簿排定戸數分為五則其役之重輕亦分等第焉假若第一等重役十處合用十人即排定第一等一百戸若有第二等五處即排定第二等五十户以備十次之役其里長更不差人襄請以産錢多少定役輕重遂命絳及襄與三司㕘定絳等議定乃共奏請凡奏鄉戸衙前以物力多少置簿排定其里長更不差人遂更著法下三司頒焉民甚便之六月陳執中罷出判亳州先是執中嬖妾張氏笞小婢出外舎死御史趙抃列八事劾奏執中自此章十二上於是詔置獄命糾察在京刑獄崔嶧按治之嶧以為執中自以婢不恪笞之死非張氏殺之有詔勿推中丞孫抃與其屬郭申錫毋湜范師道趙抃請合班論奏閣門言有違近制詔令輪日入對抃等既入對極言執中過惡請罷之退又交論之抃最後乞解憲職補外以避執中朋黨中傷之禍於是得請始御史因執中殺婢事欲擊之上未聴而諫官初無論列者御史并以為言而抃攻范鎮尤力臺官皆助之鎮累奏乞與御史辨不報及御史入對又言執中私其女子傷化不道執中既罷上以諭鎮鎮復言朝廷置御史以防䜛慝非使其為䜛慝也審如御史言則執中可誅如其不然亦當誅御史并繳前五奏乞宣示執政相與廷辨之上不報鎮由是與趙抃有隙先是鎮上言去冬多南風今春多西北風乍寒乍熱欲雨不雨又有黑氣蔽日此皆人事所感也黑氣蔽日者隂侵陽小人惑君也欲雨不雨者政事不决也陳執中為相不病而家居者百日矣陛下以御史之言决一婢死而欲退宰相為是即乞速退執中以御史之言為非亦乞敇執中起視事毋使天意乆不决也乍寒乍暑者賞罰不當也鄧保吉不當為都知鄧宣言不當為押班王全彬不當為觀察使是不當賞而賞冬而多南風春而多西北風皆逆氣也恐陛下意慮有為小人所惑而號令數變也陛下如欲應黑氣蔽日之變莫若逺小人進君子如欲應乍寒乍暑之變莫若追還鄧保吉等過恩而正大臣之罪如欲應欲雨不雨之變莫若速定執中之進退以决中外之惑如欲應冬多南風春多西北風之變莫若精其思慮而不數變號令此皆古聖賢通天人之術非臣臆説職居言責之官不得黙然嘉祐四年議賜執中諡禮官韓維言執中為相後宫之喪不能考正儀典使朝廷有非禮之舉又閨門之内禮分不明請諡曰榮靈判太常寺孫抃等言執中為小官以大本未立獨先羣議及在宰司公正方重有大臣之風請諡曰恭判考功楊南仲又請諡恭襄詔諡曰恭維累疏論列以為責難於君謂之恭臣之議執中正以其不恭因乞罷禮官不報上又篆其碑曰褒忠以文彦博富弼同平章事初除弼監修國史乃在舊相劉沆之上論者以為非故事由學士承㫖楊察之誤㝷貼麻改沆監修國史而弼為集賢班大學士彦博與弼並命是日宣制上遣小黄門數軰覘於庭士大夫相慶得人後數日翰林學士歐陽修奏事殿上上具以語修且曰古之求相者或得於夢今朕用二相人情如此豈不賢於夢卜哉修頓首稱賀未幾知并州龎籍過京師入對上新相彦博及弼意甚自得謂籍曰朕用二相何如籍曰二臣皆朝廷髙選陛下拔用甚副天下望上曰誠如卿言文彦博猶多私至於富弼萬口一詞皆曰賢相也籍曰文彦博臣頃與之同在中書詳知其為人實無所私但惡之者毁之耳况前者被謗而出今當愈畏謹矣富弼頃為樞密副使未執大政朝士大夫未有與之為怨故交口譽之爵禄樹私恩則非忠臣何足賢也若一以公議概之則向之譽者將轉而為謗矣陛下所宜深察也且陛下既知二臣之賢而用之用之則當信之堅任之乆然後可以責成功若以一人言進之未㡬又以一人言疑之臣恐太平之功未易卒致也上曰卿言是也上嘗問王素曰大僚中孰可命以相事者素曰陛下命相臣何敢言上曰姑言之素曰惟宦官宫妾不知其姓名者可充其選上憮然曰如此則富弼耳素再拜曰陛下得人矣張昪為御史中丞上嘗謂執政言昪清直可任風憲乃有是命富弼初入相歐陽修復為翰林學士時號三得人秋七月呉育罷初陳執中罷相上曰誰可代卿者執中舉育上召赴都為翰林侍讀學士至是侍讀禁中帝因語及臣下毁譽多出愛憎育曰聖言要切實四海之幸然知而形之於言不若察而行之於事自古人君皆因信䜛邪而致亂照奸憸而致治至於安危萬端不出愛憎二字逹之則羣書不足觀不逹則博覽無益也蓋人主事有不可不密者有不可不明者語及軍國㡬微或事干權要此不可不密也若指人姓名隂言其罪狀未見者此不可不明也若不明則奸邪得計忠正難立曲直莫辨愛憎逆行故曰偏聴生奸獨任成亂是故聖王之行如天地日月坦然明白進一人使天下皆知其善黜一人使天下皆曉其惡則隂邪不能為害公正可以立身此百王之要道也上益重之數欲大用而為諫官劉元瑜誣奏在河南嘗貸民出息錢乆之乃命知延州八月赦京輔先是正月已降德音知諫院范鎮言京輔嵗一赦而去嵗再赦今嵗三赦又在京諸軍嵗再賜緡錢姑息之政無甚於此夫嵗一赦者細民謂之熱恩以其必在五六月間也奸猾為過指以待免况再赦三赦乎今備塞之兵五六十萬使聞京師端坐受賜者能不動其心哉請自今罷所謂一赦以懲奸猾而使良善得以立也罷兵士之特賜以均内外而使民得以寛也置臺諫章奏簿從范鎮之言也鎮言先朝以御寳印紙給言事官使以時奏上所以知言者得失而殿最之今請置御史諫官奏章簿於禁中時時省之仍以中書舊所置簿具其言行否每季録付史官詔從之九月下溪蠻冦邉辰州蠻酋下溪州刺史彭士義之子師寶來奔湖北轉運李肅之等納之以為鄉導撃彭士義不克自是數入冦詔湖北廣西發兵討之至嘉祐三年秋始奉職貢如初冬十月録唐長孫無忌後十一月行並邉見錢和糴法置河北都大提舉便糴粮草及催遣黄御河綱運初薛向為虞部郎中言河北糴法之弊以為備邉十四州悉仰食度支歲費錢五百萬緡得米粟百六十萬石其實才直二百萬緡而歲常虛費三百萬緡入於商賈蓄販之家今宜罷其邉入粟自京輦錢帛至河北專以見緡和糴且既用實錢革去三説四説虛估之弊又必有以佐之則其法可行故邉穀貴則糴澶魏粟漕黄御河以給邉新陳未交則散糴價以救民乏軍食有餘則坐倉收糴以待不足使見錢行而三利舉則河北之穀不可勝食矣三司使楊察請用其説於是置官而以向為之既而三司輦絹四十萬疋當緡錢七十萬又蓄見錢及擇上等茶埸總為緡錢百五十萬儲之京師而募商人入錢並邉計其道逺近增其數以償之且省輦用之費惟入中芻豆計直償以茶如舊十二月修六塔渠導河入横隴故道初詔自商胡之决大河注金堤寖為河北患今河渠司李仲昌欲約水入六塔河以紓一時之患其令兩制臺諫官詳定學士歐陽修言伏見集議修河未有定論蓋由賈昌朝欲復故道李仲昌欲開六塔互執一説莫知孰是臣愚皆謂不然大抵今河勢有三决之虞復故道上流必决開六塔上流亦决金堤下流若不浚使入海則上流亦决臣謂宜選知水利之臣就其下流求入海之路而浚之不然下流梗塞則終於上决為患無涯願下臣議裁取其當焉學士承㫖孫抃等言開故道誠乆利然功大慮不克成六塔下流可導而東去以紓恩冀金堤之患先是有詔遣使與河北都轉運司周沆言利害沆言近計塞河用薪蘇千六百萬工五百八十萬今仲昌用薪蘇三百萬工一百萬河一爾所費財用不容若是之殊蓋仲昌先為小計以求興役爾又今河廣二百餘歩六塔渠纔四十六歩必不能容且横隴不流自河徙以來淤成髙陸其西堤粗全東堤或在或亡前日六塔水微通分大河末十分之三濵水之民喪業者已三萬戸使如仲昌言全河東注必横潰泛濫齊博德棣濵五州之民皆為魚矣今六塔渠千餘里若欲壅河使東當先治水所過堤使皆髙厚仍置吏兵分守其地多積薪蘇以防衝决乃可為也費大難辦朝廷卒從仲昌議蓋文彦博富弼主之故抃等亦傅會其説中書言黄河自商胡决北流乆為民患先議開銅城故道而塞商胡恐功大難就欲量開六塔河見行水勢入横隴舊道從之以李璋李仲昌施昌言蔡挺同領其役時富弼尤主仲昌議修又言朝廷議開六塔河中外皆知不便而未有言其利害者何哉一曰畏大臣二曰畏小人三曰畏無竒䇿今執政之人用心河事亦勞矣初開故道今又修六塔夫以執政大臣鋭意主其事固非口舌可回而仲昌利口小人雖衆所共惡而為大臣所主欲與之爭勢必難奪今言者謂故道既不可復六塔又不可修詰其如何則又無竒䇿此所以雖知不便而罕肯言也况治水本無竒䇿所謂䇿之竒者不大利則大害若循常計雖無大利亦未至大害今言修六塔者竒䇿也然役不可成而為害愈大言順水治堤者常談也然無大害不知為國計者欲何所擇哉惟朝廷審其利害早罷六塔之役疏奏不省役之未興也上賜詔問澶州曹佾佾言河决殆天時未易以為人力爭陛下念河北被患於功費何所惜然决口將合流益駛雖用工如麻葦積芻如邱阜且何所施以臣之見不如徐觀其勢而利導之萬全之䇿也佾論與執政異乃徙佾知青州醴泉觀成即祥源觀也觀因火更作今改名是歲契丹主宗真死子洪基立宗真是年夏遣使以其畫像來獻求易御容以代相見篤兄弟之情八月卒宗真立二十五年諡文成皇帝號興宗宗真性佻侻嘗因夜燕自入樂隊又數變服入酒肆寺觀尤重浮圖法僧有正拜三公三師兼政事令者其臣馬保忠嘗勸以臣下無勲勞宜序進之宗真怫然怒曰若爾則是君不得專豈社稷之福耶保忠惶恐自是欲有遷除必先厚賜近臣以絶其言故親信察喇哈凖等數十人皆拔處將相子洪基立改元清寜先是日食正陽客星出於昴著作佐郎劉義叟曰宗真其死乎至是果驗李德政死子日遵立加靜海節度交趾郡王丙申嘉祐元年春正月大赦甲寅朔御大慶殿受朝前一夕大雨雪至壓折藥架上疏禱而霽是日感風眩不豫己未契丹使者入辭上疾作掖入禁中文彦博以上㫖諭契丹使者就驛仍授國書彦博與兩府俟於殿閣乆之召副都知史志聰鄧保吉等問上至禁中起居狀志聰等對以禁中事密不敢泄彦博怒叱之曰主上暴得疾繫宗社安危豈可不令宰相知天子起居欲何為耶自今疾勢小有增損必一一見白仍令引至中書取軍令狀自是禁中事宰相無不知者庚申詣内東門小殿問起居上自禁中大呼而出曰皇后與張茂則謀大逆語極紛錯宫人扶持者皆隨上而出謂彦博等曰相公且為天子肆赦消災彦博等退始議降赦茂則内侍也上素不之喜聞上語即自縊左右救解不死彦博召茂則責之曰天子有疾譫語耳汝何遽如是汝若死使中宫何所自容耶戒令常侍上左右無得輒離皇后以是亦不敢輒至上前諸女皆幼福康公主稍長時已病心初不知上之有疾侍上側者唯十閣宫人而已上既不能省事兩府但相議定稱詔行之時二府議留禁中未有以發彦博請用道家説辛酉祈禳大慶殿輔臣主祠事設次宿殿廡内侍史志聰曰非故事彦博曰今日豈論故事耶甲子大赦壬申罷禱祈兩府始分番歸第不歸者各宿於其府知開封府王素嘗夜叩宫門求見執政請白事彦博曰此際宫門何可夜開詰旦素入白有禁卒告都虞候欲為變者執政欲收捕按治彦博曰如此則張皇驚衆乃召殿前都知揮使許懐德問曰都虞候某甲者何如人懷德曰在軍職中最為良謹彦博曰可保乎曰然彦博曰此卒必有怨於彼誣之耳當亟誅之以靖衆衆以為然時富弼以疾謁告彦博請劉沆判狀尾斬於軍門彦博初欲自判王堯臣揑其膝彦博悟因請沆判之及上疾愈沆譛彦博於上曰陛下違豫時彦博斬告反者彦博以沆判呈上而上意乃解夏四月六塔渠决李仲昌等塞商胡北流使入六塔河河溢不能容而復决溺夫兵漂芻藁不可勝計自是朝廷但治西堤以衞北京及契丹國信路不復治東堤矣㝷治修河官罷知澶州施昌言知滑州李璋并降官仲昌編置英州初奉詔俟秋冬塞河流而擅違約甫塞即决仲昌坐取河材為器盜所監臨故重貶之先是文彦博富弼主仲昌議不聴賈昌朝所言昌朝以為恨及六塔功敗仲昌等皆坐責内侍劉恢徃視河還言仲昌所斷岡曰趙征村與國姓御名同人謂昌朝排執政摘恢言奏之有詔遣中人置獄御史李景初言事無根源不出政府恐隂邪用此中傷善良乃更遣御史呉中復與内侍鄧守忠即澶州同訊中㫖趣行甚急中復請對言恐獄起奸臣非盛世所宜及馳至較景德戸籍乃趙征村實非御名六塔河亦無岡勢止歸罪仲昌軰仲昌垂子也垂知河事嘗上導河形勢書欲釃為别𣲖使緩而不决至仲昌反塞河背戾家學遂以貶終中復時號為鐵面御史上之得疾也昌朝隂結内侍武繼隆令司天官二人於大慶殿庭兩府聚處執狀抗言國家不當穿河於北方致上體不安彦博知其意顧未有以制數日二人又上言請皇后同聽政亦繼隆所教也史志聰等以其狀白執政彦博視而懷之有喜色同列問不以告既而召二人詰之曰汝今日有所言乎對曰然彦博曰天之變異汝職所當言也何得輒預國家大事汝罪當族二人懼色變彦博曰觀汝直狂愚耳未欲治汝罪自今無得復爾二人退彦博乃以狀示同列皆憤怒曰奴敢妄言何不斬之彦博曰斬之則事彰灼於中宫不安衆皆曰善及議遣司天官定六塔於京師方位彦博復遣二人徃繼隆曰請留之彦博曰彼何敢輒妄言有人教之耳繼隆默不敢對二人至六塔恐治前罪乃更言六塔在東北非正北無害也减䕃補額定選舉法去秋龍圖閣直學士李東之上言古者官有定員人無他覬今三四年間放進士五百人因諸路用兵舉人又加録用而諸科惟專記誦不知理義亦放及五百人此選舉之路未精也文武官御史知雜御史而上嵗任一子帯職員外郎諸司副使而上三嵗任一子近歲任子比祖宗朝多逾數倍又三丞以上致仕者任一子且退一老者進一孺子甚非國家愛賢取士之道此補䕃之門太廣也嬪嬙之侍宗室之妻有邑號視品者皆得薦其弟姪又皇親納壻白身受官而内臣之家因事奏授者甚多此恩倖之源未塞也三省百司胥吏補官已冗而又因縁權勢悉換班行權貴給役明有恩例此因循之原闕遂敕中書樞密院裁定乃詔見任二府及御史知雜以上并罷乾元節奏恩例學士以下每遇郊恩許奏大功以上親再遇郊恩小功以下親郎中帯職員外郎初遇郊詔奏子若孫再遇郊奏期親四遇郊奏大功以下親其取進士依皇祐四年以四百人為額諸科毋過其數南省特奏名者罷之有司入流悉如吏部格毋得序勞减年及換武於是歲入仕者差减矣五月京師諸路大水京師大雨水注安上門門關折壊官私廬舎數萬區諸路大水河北尤甚㝷遣韓絳體量安撫河北六月雨壊太社太稷壇求直言詔羣臣實封言得失於是翰林學士歐陽修奏疏略曰自古人君必有儲副所以承宗廟之重而不可闕者也陛下臨御三十餘年而儲副未立此乆闕之典也臣聞臣僚多以此事為言大臣亦當進議陛下聖意乆而未决而庸臣愚士知小忠而不知大體者因以為異事遂生嫌疑之論此不思之甚也伏望陛下出於聖斷擇宗室之賢依古禮文立以為子未用立為儲副也既可以徐察其賢否亦可以俟皇子之生臣又見樞密使狄青出自行伍遂掌樞密始初議者以謂不可今三四年間外雖未見過失而不幸有得軍情之名且武臣掌國機密而得軍情豈是國家之利臣前有封奏其説甚詳且述青未是竒才但於今世將率中稍可稱耳雖其心不為惡而不幸為軍士所喜深恐因此陷青以禍而為國家生事欲乞且罷青樞務任以一州既以保全青亦為國家消未萌之禍知制誥吴奎疏言陛下在位三十餘年而嗣儲未之立今之災沴乃天地祖宗開發聖意禮大宗無嗣而擇支子之賢者以昭穆言之則太祖太宗之曾孫陛下所宜建立以繫四海之心俟有聖子則優其禮而退之亦何不可願陛下勿聽邪説以誤大事侍御史李景初亦言國朝二宗相繼尹京而天下有所係望願擇宗子之賢者使得問安視膳於宫中以消奸萌或尹原闕不搖國本固矣時狄青每出士卒輒指目以相矜夸又其家犬生角屢有光怪景初數詣中書白輔臣請出青文彦博以青忠謹有素外言皆小人為之不足致意景初曰青雖忠如衆心何蓋謂小人無識則或以致變大臣宜為朝廷慮無牽閭里恩也知制誥劉敞亦論之甚力秋七月引對羣臣自上不豫惟二府得奏事至是始引對羣臣彗出紫微垣歴七星其色白長丈餘八月庚戌朔日有食之司馬光又上疏曰有國家者政有大小事有緩急今甚大而急者在於本根未固陛下不以此時早擇宗室之賢使攝儲副之位萬一有出於意外可不過為之防哉狄青罷時青避水徙家相國寺行止殿上都下閧然人情寖疑執政聞之始懼以熟狀出青判陳州越明年青薨諡武襄青為人謹密寡言其計事必審中機會而後發師行正部伍明賞罰與士同饑寒勞苦雖敵猝犯之無一士敢後先者故其出常有功喜推其功以與將佐始與孫沔破賊謀一出青賊已平經制餘事悉以委沔退然如不用意者沔始服其勇又服其為人自以為莫及也以韓琦為樞密使時韓琦新除三司使在道除樞密院使而以三司使召張方平於益州琦初以武康節度使知州降麻除三司使唐制節度納節不降麻本朝丁謂自節度使為參知政事止舎人院命詞今除韓琦降麻非故事也九月辛卯恭謝大慶殿改元時上疾平以太宗至道年升遐惡其年號遂詔中書改元嘉祐先是范鎮言自廢祖宗舊樂用新樂以來迄今四五年日食星變冬雷秋雹風雨不時寒暑不節不和之氣莫甚此也使樂無所感動則己樂而有所感動則衆異之至未必不由此也去年十二月晦大雨雪大風宫架輒壞元日大朝會樂作而陛下疾作臣恐天意以為陛下原闕詳悉今再具進呈乞下執政大臣參議臣書如有可采伏乞且用祖宗舊樂以俟異時别求制作從之舉行御史遷次格范知道知常州趙抃知睦州先是宰相劉沆進不以道深疾言事官因言自慶歴後臺諫官用事朝廷命令之出事無當否悉論之必勝而後己又專務抉人隂私莫辨之事以中傷士大夫執政畏其言推擢尤速遂舉行御史遷次之格滿三歲者與知州而抃等又當乞避范鎮各請補外沆遽引格出之師道及抃蓋嘗攻沆之短中丞張昪言沆等挾私出知御史請留抃及師道不報冬十月觧范鎮言職先是鎮知諫院以上春秋髙而未立儲嗣不御朝者累月曰天下之事尚有大於此者乎即上疏言太祖舎其子而立太宗此天下之大公也周王既薨真宗取宗室子養之宫中此天下之大慮也願陛下以太祖之心行真宗故事擇宗室賢者異其禮物而試之政事俟有聖嗣復遣還邸累上不報及彗星之變鎮謂其占為急兵復上疏言國本未立若有兵變孰急於此者陛下得臣疏不以留中而付中書是欲使大臣奉行也臣兩至中書大臣皆設辭以拒臣是陛下欲為宗廟社稷計而大臣不欲也臣竊原其意特恐行之而陛下中變耳中變之禍不過於死而國本不立萬一有如天象所告急兵之變則其禍豈止一死而已哉夫中變之禍死而無愧急兵之變死且有罪願以此示大臣使自擇而審處焉未㡬以鎮為御史知雜固辭不受執政有謂鎮曰上之不豫大臣嘗建此䇿矣今間言己入為之甚難鎮復書執政曰事當論其是非不當問其難易速則濟緩則不及此聖賢所以貴機會也鎮見上面陳者三鎮泣上亦泣曰朕知卿忠卿言是也當更俟三二年章凡十九上待罪百餘日頭髪為白由是卒觧言職朝廷亦不能奪也初御史趙抃亦以上不豫請建立宗室賢子弟以安人心通判并州司馬光亦上疏曰儲貳天下之根本望斷自聖志擇宗室原闕太常博士張述于皇祐五年上疏曰臣聞宗廟社稷之重以繼嗣為本匹夫有百金之産猶能定謀托後事出於素况於有天下者哉建隆乾德之臣子孰不願藝祖享年萬億端拱天禧之人其心亦然而天地運行物極必變陛下承三聖之業春秋四十有四宗廟社稷之寄未有托焉此臣所以夙夜憂也謂宜黙禱天地分寵六宫或未之獲則願選宗親才而賢者試以機務俾内外知聖心有所屬則天下大幸至和初復上疏曰臣聞大人繼明照四方離為日君象也二明相繼故能乆照陛下御天下將三紀是日之正中也而未聞以離照為慮大嗣不早定則有一旦之憂而貽萬世之患歴觀前世事出倉卒則或宫闈出令或宦官主謀或奸臣首議貪孩孺以乆其政冀暗昧以竊其權安危之機發於頃刻而朝議恬然曾不為計豈不危哉述前後七上疏最後語尤激上終不為罷鎮在至和初上䟽言國家用調責之三司三司責之轉運轉運責之州州責之縣縣責之民竭力以佐公家而自用不給則嗟怨之氣干戻天地此水旱之所以作也願詔大臣考求祖宗逮天聖官吏與兵及天下賦入之數而斟酌裁之節之庶國用有常民力有餘陛下髙拱而天地之和至矣初真宗時内外兵九十萬宗室吏員受禄者九千七百寳元以後募兵益廣宗室蕃衍吏員歲增至是兵百二十五萬宗室吏員受禄者萬五千景德中祀南郊内外賞賚錢帛總六百萬至是饗明堂至一千二百萬用度不得不屈故臣有是請又奏臣去年言官冗兵多民力不堪請下大臣條理今累月不報景德中兵不滿五千萬西備北禦沛然有餘今兵倍之矣而尚苦不足夫兵不在衆在將何如耳儂智髙冦嶺南前後遣兵遣將不知其㡬皆相繼奔北陛下親遣狄青而卒取勝者蕃落數百騎耳此兵不在衆也陛下何不持此説以詰大臣之欲益兵者臣愚以為備契丹莫若寛河北河東之民備靈夏莫若寛關陜之民備雲南則莫若寛兩州湖嶺之民備天下莫若寛天下之民民力寛則知自愛知自愛雖有外虞人人可用為兵用人人自愛之兵以禦外虞何徃而不克夫官所以養民者也兵所以衞民者也養民衞民者反殘民矣而大臣不知所以捄之臣恐朝廷之憂不在四夷而在冗兵與窮民也又言周冢宰制國用唐宰相兼鹽鐵轉運使則宰相制國用從古然也今中書主民樞密主兵三司主財各不相知故財已匱而樞密益兵無窮民已困而三司取財不已中書視民之困而不知使樞密减兵三司寛財者制國用之職不在中書也願使中書樞密通知兵民財利大計與三司量其出入制其國用則民庶㡬少寛矣然自天聖以來上以經費為利臣下亦屢以為言而有司不能承上之意牽於習俗卒無所建明議者以為恨焉又言取兵於民則民稀民稀則田曠田曠則賦役重賦役重則民心離寓兵於民則民稠民稠則田闢田闢則賦役輕賦役輕則民心固陛下誠能罷令招兵敕大臣使具太祖太宗真宗每朝賦入若干兵若干官若干陛下天聖中賦入若干兵若干官若干約令賦入之數與兵數官數酌取中道立為經制以賦入之數十分為率以七分養官兵給郊廟宫省及諸費留三分以備水旱緩急為之十年僅可以言治此陛下所宜留念也十二月劉沆罷出知應天府初沆出御史范宗道等中丞張昪言天子耳目之官進退必由陛下奈何以宰相怒斥之乎願付有司明其曲直又請與御史俱出皆未報而御史吴中復又論沆治温成喪天下謂之劉彎俗謂鬻棺者為彎則沆之素行可知昪等論辨不已凡上十七章沆知不勝亦自請出上以昪指切時事無所避謂曰卿孤特乃能如是昪曰臣朴學愚忠仰體聖意是為不孤今陛下之臣持禄養交者多而赤心謀國者少臣竊以為陛下孤立矣上為之感動以包拯知開封府拯立朝剛嚴聞者皆憚之貴戚宦官為之斂手舊制府吏坐府治門先收訟牒謂之牌司拯開正門徑使至前自言曲直民不敢欺胡瑗管勾太學瑗既為學官其徒益衆太學至不能容取旁官舎處之禮部所得士瑗弟子常居四五隨材髙下喜自修飾衣服容止往徃相類人遇之雖不識皆知其為瑗弟子也於是擢與經筵治太學猶如故瑗以四年春致仕歸海陵諸生與朝士祖餞東門外時以為榮及卒詔賻其家集賢校理錢公輔率太學諸生一百餘人即佛舎為位哭又自陳師喪給假二日丁酉嘉祐二年春正月杜衍薨諡曰正獻衍被病自作遺疏謂無以乆安而忽邉防無以既富而輕財用及早建儲副以安人心語不及私二州地震三月親試舉人賜章衡等及第出身有差凡進士與殿試者始皆免黜落時歐陽修為知舉先是文士以磔裂怪僻相尚鈎章棘句寖失渾厚修深革其弊前在髙第者盡詘之務求平淡典要舉子皆造言謗之然文體自是亦少變矣夏五月夏人冦邉管勾麟府軍馬郭恩死之初屈野河西地夏人數侵耕知麟州武戡已築一堡於白草平為候望會經畧使龎籍檄并州通判司馬光行邉與戡議更增二堡籍遂檄麟州如其議於是恩及走馬承受黄道元等以巡邉為名徃按視之遂為所襲恩衆大潰戡走還恩道元及府州都監劉䕫皆被執軍士死者三百餘人亡失器甲萬七千有餘恩不降見害事聞贈觀察使詔舉行磨勘法詔文武官舊皆陳乞磨勘有傷亷莭截自今歲滿令審官三班院舉行之熈寧二年詔以㤙遷官者不隔磨勘自比部員外郎黄汾始秋八月䇿制舉賢良方正能直言極諫科王彰材識兼茂明於體用科夏噩彰不入等噩入第四等於是夏有詔自今應制科者聴待制以上奏舉毋得自陳内草澤人許本路轉運使奏舉進用差使毋得引舊例起擢視舊亦少抑焉賜諸州和劑緡錢詔每歲賜諸道節鎮諸州錢有差委長吏選官合藥以療救民疾置校正醫書局命直集賢院官四人校正置廣惠倉初天下戸絶田官自鬻之至是樞使韓琦請留勿鬻而收其租别倉貯之以賑窮乏仍令逐路提㸃刑獄専領歲終以數上三司四年詔𨽻司農寺時京東提刑韓宗彦以上未有繼嗣上書請修胎養之令且言昔漢章帝著為此令而繼嗣漢室咸其苗裔陛下前日詔令戸絶田勿鬻而收其租置為廣惠倉近聞後宫就館者二則報將有在今下戸有懐妊而不能自存者願賜之粟則德益施於海内蓋君務蕃毓其民則天亦必昌衍其子理固然矣宗彦億孫也冬十月頒禄令十二月詔開歲貢舉進士諸科解舊額之半其進士髙等恩例亦裁損之置明經科罷書舉人立内降關白二府法詔學士院承内降並關白中書樞密院先是澶州言河流損壞浮橋後數日而修完之遂下本院降敕奬諭中書言官吏䕶視不謹法當劾之既令免劾而詔亦追罷之戊戌嘉祐三年春正月開永通河先是有司言至和大水京師罹患請直城西穿河北入於惠民河分注魯溝則無水患既成名曰永通表烈女張氏墓表其墓封旌德縣君張氏江夏民妻也里惡少持刀逼之欲與為亂張大罵曰庸奴可死不可它也至以刀自斷其喉猶能走禽其人以告鄰里事聞特褒異之二月以呉及為右正言及復上疏曰同姓者國家之屏翰儲副者天下之根本今陛下之根本未立四方無所係心宜擇宗室之親賢以備儲副聴入禁中陛下它日有嫡嗣則異其禮數復令歸邸於義為順也三月范鎮知制誥鎮自罷言職每因事未嘗不以儲嗣為言冀上心感動及知制誥入謝又面論之曰陛下許臣又三年矣願早定大計夏四月罷睦親宅神御殿五月增國子監生員以四百五十人為額㝷增一百五十人六月文彦博罷以使相判河南府初鹽鐵副使郭申錫受詔行河與河北轉運李參議論不相中訟參於朝且言參嘗遣人賫河圖屬彦博御史張仲玉亦論結托有狀乃詔推劾而二人所言皆不實仲玉以風聞免劾申錫坐貶彦博亦不自安數求退故有是命以韓琦為平章事初琦在樞府編次諸房比例使吏不得因縁為奸至是中書亦行之包拯為御史中丞拯言東宫虛位日乆天下為憂羣臣數言聖意不决夫萬物皆有根本而太子者天下之根本也根本不立禍孰大焉上曰卿欲誰立拯曰陛下問臣誰立是疑臣也臣行年七十且無子非邀後福者所以乞建太子者為宗廟社稷萬世計耳上喜曰徐當議之拯又言命令不當數易及請裁抑内侍减節冗費言多切至若條責諸路鹽司御史府得自舉屬官减一歲休假事多行之秋七月命范祥制置解鹽從三司使張方平御史中丞包拯之言也初祥坐它罪貶命京西轉運使李參代之遂以至和元年入緡錢一百六十九萬為定率量入計出可助邉費十之八乆之並邉復聽入芻粟以當實錢而虛估之弊滋長劵直亦從而賤歲損官課無慮百萬至是復以祥總鹽事祥請重禁入芻粟者其劵在今己前者每劵别使輸錢一千然後予鹽又言商人持劵若鬻鹽京師皆虧失本錢請置官師蓄錢二十萬緡以待商人至者劵若鹽估賤則官為售之劵紙六千鹽席十千毋輒增損以平市估使不得為輕重詔以都鹽院監官領之自是稍復祥㝷卒嘉祐六年三司使包拯請録其後曰祥建議通陜西鹽法行之十年歲减𣙜貨務緡錢四百萬其勞可録也廣濟河溢㝷又决汴堤長城口八月乙亥朔日有食之冬十一月置省減司命翰林學士韓絳等同三司詳定省減自是多所裁省云㝷詔三司每歲上賦數三歲一㑹置都水監罷三司河渠司以其事屬之九朝編年備要巻十五
