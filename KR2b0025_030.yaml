body:
  text: 九朝編年備要卷三十宋陳均撰欽宗皇帝起丙午靖康元年止丁未年四月丙午靖康元年春正月朔詔求言監察御史余應求先為校書郎嘗上奏略曰獻言者皆曰敵氛外侵而邊鄙未寧為可慮百姓久困而財用日急為可慮兵革未弭而士馬不強為可慮臣以為選將帥以守邊治險阻以固圉積粟治兵實之塞下則邊備何患乎不嚴罷不急之務減無名之費躬節用裕民之德去蠧國害財之政用計數之人治轉運之法則財何患乎不足下募兵之令高賈馬之直明賞罰以收人心嚴軍政以勵士氣付之良將何往不克則士馬何患乎不強又曰夫人君之所以維持天下者紀綱法度也所以勵世磨鈍者慶賞刑威也紀綱不立則國日削法度不更則弊日滋爵賞妄施則為善者不勸刑罰不當則為惡者不畏此誠治亂之源安危之機也今朝廷樂因循之習而重於變更務姑息之愛而憚於裁抑則以循常守故為中和以避怨養恩為得計紀綱弛而不振法度壞而不修進賢斥姦未當於人心發號施令未孚於天下冗濫不抑而姦邪未盡退聽名器不慎而僥幸未盡革心禮教不立廉恥尚寡誕謾未悛風俗尤薄臣恐國勢日以削弱政事日以紛亂內之不治奚暇治外邇之不能奚暇柔逺何以革前日之弊何以致中興之業也伏惟陛下益留聖心思日孜孜使人主之勢日隆朝廷之政日新威權尊而下莫敢欺紀綱立而人莫敢犯可以使小人不斥而自退可以使外侮不戰而自伏矣詔特賜章服自金人犯邊屢下求言之詔事稍緩則復沮抑言者故當時有城門閉言路開城門開言路閉之諺斡里雅布陷相州濬州內侍梁方平領兵在河北岸敵騎奄至倉卒奔潰時南靣守橋者望見金人旗幟燒斷橋纜陷沒凡數千人金因不得濟方平既潰何瓘軍亦望風奔散我師在河南者無一人金遂取小舟以濟凡五日騎兵方絶步兵猶未渡也初金至邯鄲遣郭藥師為前驅付以千騎藥師求益復以千騎與之藥師疾馳三百里質明遂至濬州己巳詔親征竄殛王黼朱勔李彥黼以金騎犯京師載其孥東下詔竄永州籍其家金寶以萬計黼侍妾甚衆封號者八令人十安人公然賣官取贓無厭京師為之語曰三百貫且通判五百索直祕閣黼至雍邱縣南固村吳敏李綱指燕山之役為黼罪請誅之事下開封尹聶山山遣武吏尋躡戕之民家取其首以獻議者謂黼罪固當誅朝廷不明置於法而回枉若此為失刑矣勔削官放歸田里繼而羈管循州籍其家尋賜死勔固寵二十年第舍擬宫省名園别墅甲吳郡服膳器用擬玉食而華緻過之輿臺職𨽻腰金纍使充牣其門彥以恩澤積官至承宣使宣和間括民田按行河北京東西所至州郡踞坐黃堂而使監司郡守列侍奪民常産重斂租課當時謂勔結怨於東南彥結怨於西北至是亦賜死籍其家上皇如南詔令范訥統勝捷軍護從時蔡京父子欲避難南奔官司舟船皆隸發運司乃以宋煥為江淮京浙等路發運使煥攸之妻黨也於是蔡氏宋氏皆傾家而南下矣辛未定城守策以李綱為親征行營使白時中請上出狩襄鄧曰事有屈伸太王亦避狄居岐山下侍郎吳敏曰時中敢任出奔之責否時中無言敏曰京師百萬生靈奈何棄之臣願留守以救一城上曰誰可副者同知李棁曰臣願留上即命棁為副時從官以言邊事求見者皆非時賜對兵侍李綱侍班延和殿下語知閣門朱孝莊曰有急切公事欲與宰執廷辨孝莊曰舊例未有宰執未退而從官求對者綱曰此何時耶而用例耶孝莊即具奏詔引綱立於宰執之末因奏曰聞諸道路宰執欲奉陛下出狩避兵果有之宗社危矣且道君皇帝以宗社之故傳位陛下今捨之而去可乎上默然時中曰都城豈可以守綱曰天下城池豈復有如都城者且宗廟社稷百官萬民所在捨此將何之若能率勵將士慰安民心豈有不可守之理時內侍陳良弼領京城所自內殿出奏曰京城樓櫓創修百未及一二又城東樊家岡一帶濠水淺小決難保守願詳議之上命綱同蔡懋及良弼往視東壁而御延和殿俟之綱回曰城堅且髙樓櫓誠未備然所以守不在此樊家岡雖淺可以徑兵強弩據也上曰誰可將者時中曰非李綱莫能戰綱曰陛下命臣治兵願以死報上即除綱右丞命綱留守內侍王孝竭奏中宫國公已行上曰朕欲往陜西治兵決不可留此綱以死請會燕越二王至亦以固守為然乃俾中使追還中宫國公上顧謂綱曰治兵禦冦專以委卿中夜上諭宰執又欲詰朝決行是日質明綱入朝見禁衛擐甲矣綱厲聲曰汝等願守乎願從幸乎皆呼曰願死守綱入見曰六軍之情已變彼父母妻子在都城豈肯捨去萬一至道散歸陛下誰與為衛且敵騎已逼復以健馬疾追何以禦之上悟始命輟行以綱為親征行營使馬軍都指揮曹曚副之白時中罷坐主出奔議也李邦彥起復太宰張邦昌少宰仍兼門下中書侍郎趙野王孝迪門下中書侍郎蔡懋尚書左丞簽書樞密院耿南仲同知李邦彥美丰姿善謳謔尤能市井鄙俚之語綴成小詞都人呼浪子宰相制詞有曰盡忠而人絶間言制勝而慮無餘算謝安之矯情鎮物足抗秦苻李靖之制勝臨機何憂突厥國威既振民志以寧時又以王宗濋主管殿前司公事宗濋上母王皇后之親屬也上欲寵異母黨故有是命自髙俅鎮是職紀律廢弛至是以宗濋為之識者寒心壬申遣使分督援兵每路差近上內侍一員癸酉斡里雅布犯京師初治京師四壁守具每壁正兵萬二千人而保甲壁兵之屬不與各以從官提舉又團馬步四萬人為前後左右中五軍軍各八千人有統制等官時通津門外延豐倉積粟四十餘萬石以前軍護之勤王之師集城外者食焉後軍占樊家岡使金不敢近而左右中軍居城中以備緩急凡四日初金師抵城下斡里雅布軍徑趨牟駝岡天駟監獲馬二萬匹芻藁山積郭藥師嘗打毬於其間導之使據也金人曰南朝若以二千人守河我豈得渡哉先是李鄴使於斡里雅布軍求和斡里雅布以鄴犯京師攻城不克乃遣王汭偕來鄴盛誇金強我弱以濟和議大臣皆有懼意汭見上倨甚李邦彥等議專主和范宗尹俯伏流涕乞割三關以安社稷趙野王孝迪蔡懋皆含糊其間不敢決李綱言擊之便上是邦彥計李鄴謂金人如虎馬如龍上山如猿入水如獺其勢如泰山中國如纍卵時號六如給事金尋攻通天景陽門甚急李綱督將士拒之又攻陳橋封邱衛州門綱登城督戰自卯至申殺賊數千乃退何灌出戰敗績死之未幾馬忠以京西兵敗金於順天門外於是王師稍振金遊騎不敢旁出京師以南民少安居鄭望之使金軍未至偕金使來議和李棁皇弟康王構相繼如金營初命望之為使高世則副之望之等縋城與金使二人遇其一吳孝民也遂偕入見孝民奏曰上皇朝皆已往事今少帝與大金别立誓書結萬世歡好仍遣親王宰相詣軍前可也乃遣同知李梲為使而改望之等為副以金一萬兩遺斡里雅布棁等至金營斡里雅布盛兵南向坐棁望之北靣再拜膝行而前恐怖喪膽失其所言金人遣王汭譯云京城破在旦夕所以按兵不動者徒以少帝故欲存趙氏宗社恩莫大也今議和需犒師之物金五百萬兩銀五千萬兩牛馬萬頭表縀百萬匹欲尊其主為伯父歸燕雲之人在漢者割中山太原河間三鎮之地且欲宰相親王為質乃退書出細目一紙付棁達朝廷棁等唯唯不能措一詞尋乃以書遣蕭三寶努耶律忠王汭與棁來詔以皇弟康王為軍前計謀使張邦昌副之時肅王及康王居京師康王毅然請行曰金必欲親王臣為宗社大計豈應辭避上命引王詣殿前見執政李棁曰大金恐南朝失信固要親王送到河北無他王正色云國家有急死亦何避聞者皆悚然李鄴高世則齎誓書俱行時李綱力爭以謂加號及歸朝官固無害犒師金帛太多當量與之三鎮不可割至于遣使即宰相當往親王不可往今莫若擇使與之熟議彼以孤軍入重地勢不能久留宰相皆謂都城破在旦夕尚何有三鎮而金帛之數又不足較上默然綱求去上曰卿第出治兵固守恐金人疑我也于是朝廷以誓書往所求皆與之綱留三鎮詔書不遣康王在金營二月斡里雅布憚之不肯留更請肅王樞代之康王還從臣衛仲達張勸坐奔逃貶仲達時為工部尚書勸禮部尚書金兵將至及從官等五十餘人同日棄官而逃于是詔除名勒停种師道等帥師入衛京畿河北制置使种師道及統制官姚平仲以涇原秦鳳路兵至未幾熙河經略姚古秦鳳經略种師中及折彥質折可求等勤王兵並至號二十萬京師人心稍安師道初為制置使聽用便宜檄取兵食師道聞命即發會平仲嘗以涇原騎兵二千步兵一千更戍燕山將行師道遂率與俱北至洛陽而斡里雅布兵已屯于城之北或止師道勿行曰敵勢方鋭我以偏師先犯勝負可知矣四方勤王之師視此以為去就盍少駐汜水以謀萬全師道曰吾兵少若遲回不進形見情得祇取辱焉今鼓行而前金安能知吾虛實都人知吾來士氣日振何憂敵哉上聞其至喜甚開安上門命李綱迎勞既入見時已與金人議和上曰今日之事卿意若何師道曰女真不知兵豈有孤軍深入人境而能善其歸乎上曰業已講好矣對曰臣以軍旅之事事陛下餘非所敢知也即拜同知樞密院事宣撫京畿河北河東路師道時被病特命毋拜跪許乘肩輿入朝家人掖升殿金使王汭素頡頏入對見師道拜跪稍如禮上顧笑曰彼為卿故也自金渡河京師諸門盡閉市無薪菜師道請啓西南壁聽民出入如平常又請緩與金帛禁遊騎使不得逺掠俟彼惰歸扼而殲諸河執政聞其所言心皆易之師道平仲既至李綱言于上曰勤王之師集者甚衆兵家忌分節制歸一乃克有濟願命師道平仲等聽臣節制上降御筆曰師道老而知兵職位已高與卿同官替曹曚可也上意蓋欲以師道為親征行營副使而執政間自密建白為不可者上入其言於是别置宣撫司應西兵及四方勤王之師並𨽻之又撥前後軍之在城外者亦屬之而行營使所統獨左右中軍而已上屢申敇兩司不得侵紊節制既分不相統一宣撫司所欲行者打以機密往往不復關報及勤王之師既集西將兵師日至上意方壯赫然有用兵之意綱贊上曰易謙之上六稱利用行師征邑國師之上六稱開國承家小人勿用蓋謙之極非利用行師不足以濟功師之成非戒用小人不足以保治今陛下之於金人屈已求好其謙極矣而金人貪婪無厭凶悖益甚其勢非用師不可然功成之後願陛下以用小人為戒而已使金人有所懲創不敢有窺中國之心當數十年無邊陲之禍不然一日縱敵數世之患憂未艾也括金銀時從王孝迪之議揭榜立賞括在京師軍民官吏金銀違者斬之都城大擾限既滿得金二十餘萬銀四百餘萬兩而民間藏貯為之一空李綱因對奏曰取金銀限滿民力已竭復許告訐恐生內變外有大敵而民以內變不可不慮上曰卿可往收榜毋得告訐綱因巡城傳聖旨收榜人情稍安詔金國以大金為稱梁師成伏誅初道君東下舊臣多從行獨梁師成留京或言師成有保護東宫之功至是太學生陳東又言蔡京童貫朱勔挾道君南巡恐生變亂而師成當正典刑上迫於公議下詔暴其罪黜為散官命開封吏押至八角鎮殺之二月姚平仲宵攻金營不克楊可勝死之方倚种師道以謀軍國而种氏姚氏素為山西巨室兩家子弟不相下平仲之父古帥熙河以兵入勤王平仲恐功名之會獨歸於种氏忌之乃以士不得速戰有怨言達於上上一日遣使五輩趣師道進戰師道言過春分節可擊是時相距才八日蓋俟其弟師中及姚古之至也平仲欲夜叩金營生擒斡里雅布奉康王構以歸故師道言既不用而平仲謀泄金先事設備至是平仲率步兵萬人夜擊金寨反為所敗而還李綱率行營左右軍又與金戰於是宰相臺諫交言西兵及行營司兵為金所殱上大驚有詔不得進兵初師道請簡料勤王之師分為三等出戰餘皆守城先立刑賞之格以示之選將分總距敵寨二三里環營守之絶其掠剽使其之食遇姚古以所領西師會河朔將帥選精鋭五萬人自河陽駐滑州進屯敵營之後剋日併力攻之此必勝之策也不聽平仲敗績師道復言劫寨已誤然兵家亦有出其不意者今夕再遣兵分道攻之亦一竒也如猶不勝每夕以百人擾之不十日敵遁矣李邦彥等畏懦皆不果用廢親征行營司罷李綱罪綱以謝金也以左丞蔡懋為京城守禦使金使復來遣宇文虛中齎李綱所留割三鎮詔書以往太學生都人伏闕請復用李綱太學生陳東及都人數萬人伏闕言李邦彥等疾綱恐其成功罷綱正中金計幸復綱及种師道舊職會邦彥入朝乃數其罪面罵且欲毆之吳敏傳宣不退遂撾登聞鼓山呼震地耿南仲亟入奏開封尹王時雍麾之不去殿帥王宗濋恐生變奏上勉從之於是遣內侍號於衆曰已得旨宣綱矣內侍朱拱之宣綱未到而後發之使先至衆取拱之臠而磔之並內侍數十列擘無遺體領開封府聶山出諭乃皆相率聽命綱惶懼入對泣拜請死上即復綱右丞充京城守禦使而罷蔡懋衆遂散師道未嘗去位蓋流傳之妄云追封范仲淹贈司馬光張商英官仲淹魏國公光贈太師英太保或曰靖康初求治甚急徐吳當國有詔宰相范希文司馬光張商英皆贈太師希文乃仲淹字且未嘗任宰相蓋出後進耳食之談意以為純仁也有司不能正乃取仲淹慶歷間乞修京城為功應詔然仲淹贈太師之後遂改封魏國公失於平昔不講也但是時徐吳猶未當國或者之説亦失之除元祐黨籍學術禁王孝迪罷以徐處仁為中書侍郎先是處仁知大名府建議乞下詔親征而實於王城按兵不動以張國威會朝廷已有親征詔仍以李綱為行營使處仁即移書於綱言備禦方略皆朝廷所未決者綱以聞上嘉歎再三褒諭略曰卿昔陳忠論四檄援兵豈惟謀之具臧信矣仁者必勇事平當以宰相詔卿至是遣使趣行丙午金人退圍京城凡三十三日既得三鎮詔書及肅王至不俟金帛數足遣使告辭而去种師道請臨河要擊之李綱亦謂金人兵不過六萬吾勤王之師二十餘萬今莫若扼關津絶糧道且禁其抄掠吾堅壁勿戰俟其疲之然後以將帥檄取誓書復三鎮縱其歸半渡而後擊之此必勝之計也並不從綱乃請遣大兵用澶淵故事護送之乃命姚古种師中折彥質范瓊等領兵十餘萬數道並進且戒度便利可擊則擊之李邦彥奏立大旗於河東河北有擅出兵者依軍法綱尋奏曰金人退師交割三鎮官吏軍民不肯陷沒外域其勢必為朝廷堅守天時寖熱而金有輜重之纍必不能久留當即出疆臣恐秋髙馬肥彼必再至以責前約及今宜飭武備修邊防勿恃其不再來當恃吾有以待之於是為上條具所以備邊禦敵者凡八事其一謂唐之藩鎮所以拱衛京師故雖屢有變故卒賴其力而及其弊也有尾大不掉之患祖宗鑑之消藩鎮之權罷世襲之制施之承平邊隅無事則手足不足以捍頭目為今之計莫若以太原真定中山河間建為藩鎮擇帥付之許之世襲收租賦以養將士習戰陳相為唇齒以捍金人可無深入之患又滄州與營平相直隔河下流及小海其勢易以侵犯宜分濱棣德慱橫海為一道如諸鎮之制則帝都有籓籬之固其二謂自熙豐以來河北保甲凡六十餘萬河東保甲凡二十餘萬比年不復閲習又經燕山雲中之役調發科率皆逃亡流離散為盜賊今所存者不及其半宜專遣使團結訓練令各置器甲官為收掌用即給之蠲免租賦以償其直武藝精者次第遷補或命之官以激勸之彼既自保鄉里親戚墳墓必無逃逸平時無養兵之費有事無調發之勞此最策之得者其三謂自祖宗以來養馬以監擇陜西河東河北美水草高涼之地處之凡三十六所比年廢罷殆盡而更為給地牧馬民間飼養以充數官吏便文以塞責而馬無復有善者又驅之燕山悉為敵人所得今諸軍闕馬者大半宜復祖宗監牧之制權時之宜括天下之馬量給其直則不旬月間數萬之馬可具也其四謂河北塘濼東距海西抵廣信安肅深不可涉淺不可行舟所以限隔北騎為險固之地而比年以來淤泥乾涸不復開濬官司利於稻田往往泄去積水隄防弛壞又自安肅廣信以抵西山地形低下處可益增廣其高仰處即開乾濠及陷馬坑之類宜專遣使以督治之其五謂輔郡諸畿邑皆當築城措置樓櫓之屬使官吏兵守而有所恃以安萬一有敵騎深入虜掠無所得可以坐困其六謂河北河東州縣經敵馬殘破蹂踐去處宜優免租賦以賑恤之往年方臘擾浙東猶免三年今三鎮之民為朝廷固守安可不議所以大慰其心者其七謂河東諸州最以儲峙糴買糧草為急務宜復祖宗加擡糧草鈔法一切以見緡走商賈而實塞下使沿邊諸郡積蓄豐衍則金不敢動矣其八謂陜西解鹽無煮海之勞而給邉費足民食其利不小自行東南鹽法而解鹽地分益狹西邊益貧願復祖宗舊制以慰關陜兵民之心上俾宰執同議而其間所論異同雖橫海軍一道以安撫使總之而藩鎮之議寢雖委提舉官遵舊制教閲上戶保甲三分之一而遣使盡行團結置器甲之議不行雖委諸路增修塘濼濠池而輔郡畿邑已降指揮旋即罷止雖委官相視監牧而不復括馬雖放河東租稅而止及一年雖行加擡糧草鈔而貼以四分香藥雖復解池而其地分不如舊制綱力爭之不能得諫議大夫嘗奏補進義副尉二人御批付三省以為專權綱惶懼求去不允竟出都門上遣使留之御史胡舜陟疏言大臣去不當理徒為紛紛願責以大義使安厥守諫議大夫楊時言切惟河朔朝廷重地三鎮又河朔要藩自周世宗迄於藝祖百戰而後得之其艱難甚矣一旦棄之以紓目前之急則可矣以為經久之計則未也方金騎之來士不素養欲戰則無其人樓櫓未修欲守則無其具割地賜金勢有不得已者臣故曰以紓目前之急則可矣河朔郡縣犬牙相錯今以三鎮三十州之地與之貫吾腹中則一方邊面裂而為三建城壁備器械練兵積穀未易以嵗月計也其距京城無藩籬之固金騎長驅不數日而至非前日之比豈不殆哉臣故曰以為經久之計則未也四方勤王之師逾月而後集使之無功而去厚賜則無名不與則生怨復有緩急召之宜有不受命者不可不慮也姚平仲之出殺傷相當不為大衄勝負兵家之常數未足為戒傳聞三鎮欲以死拒之萬一不守則數州之衆肝腦塗地矣朝廷寧忍坐視而不救乎臣竊謂三鎮拒其前吾以重兵躡其後使之腹背受敵宜若可為臣本儒生軍旅之事未之學也不敢自信其説姚古种師中之徒皆一時名將始至而未用乞召問以方略可否必有定論朝廷專守和議以契丹百年之好猶不能保况此新釁乎然朝廷許以金帛以千萬計秋高馬肥乘間而來責其未償者彼不為無辭矣當時金銀不可復取之於民援兵不可以卒致其患有不可勝言者孔子與蒲人盟曰要盟神不聽卒渝之不以為不可也今良將徑卒咸願自效此而不為後將噬臍惟陛下留神而審處之尋又疏言臣聞金人之去欲未厭成安一縣驅掠女子二千餘人殺令佐二人誓書之墨未乾而背不旋踵吾雖欲專守和議不可得也昔趙割六縣之地使趙郝約事之秦郝曰秦以其力攻其所不能取倦而歸王又以其力之所不能攻以送之是助秦自攻也今日之事正類於此夫去其巢穴越數千里之逺而犯人之國都是危道也使其力能攻之則城中之物皆其有也尚奚事求和哉彼見吾高城深池未易陵犯勤王之師四面而至姚平仲固嘗與之交兵忍而不敢怨怒請和而去則其情可見蓋亦懼而歸非愛我而不攻也朝廷割三鎮三十州之地而與之是亦助寇而自攻也聞肅王初與之約及河而返今挾而往此敗盟之大者臣竊謂朝廷宜以肅王為問責其敗盟必得肅王而後已三鎮之民以死拒之於前吾以重兵擁其後其勢必得所欲者若猶未從則聲其罪而討之夫師以直為壯是舉也直在我矣三鎮聞之士氣百倍此萬全之利不可誤也竊聞出師之令廟算不一屢行而屢改如是則士氣必惰欲其成功難矣唐憲宗平淮西而韓愈謂凡此蔡功惟斷乃成未有處大事不斷而能有成也惟斷自宸𠂻無惑於浮議則天下幸甚中丞許翰言自金人退師朝廷搢紳上恬下嬉幸於無事自以為安而臣終夜不寐獨以為憂夫以強敵之性貪婪無厭而我既示之以弱開之以利不過一二嵗勢必復來自所割三鎮疾馳三日則突騎犯都飛塵入闕矣當此之時金帛不可復得地土不可復割邊鄙之師不可復召智能之士不可復圖萬世之憂可勝言哉今聞姚古引兵已次國郊竊聞陛下不以閫外之事制將不若遣一介之使可下下之使不可下則用兵不疑臣嘗熟計我戰而勝則蒙福無窮戰而不勝則北扼井陘西斷太行內守大河國固無患因陳可以決勝者五且曰今全軀保妻子之臣務在虛張金勢虛喝恫疑茍安目前為萬世患意亦無他不過謂戰勝則咎歸議者使身不利今一主和身保無恙明年盛秋金騎復來則諉曰國家事敵不至則歸名和者姦回自營孰便於此非真有為陛下宗廟社稷長慮者也夫一勝一負兵家常事要觀大勢何如耳詔遵祖宗舊制詔自今並遵祖宗舊制選用大臣裁抑內侍不崇假恩幸不聽用姦人不輕爵祿不濫賜豫不奪爾居以營燕遊之地不竭爾力以廣浮用之費凡蠧國害民之事一切寢罷詔河北堅守仍出竒掩擊時斡里雅布歸還抵中山河間兩鎮民兵固守不肯下即以兵力不及之而退詔沿邊諸郡堅守李邦彥罷以張邦昌為太宰吳敏少宰李綱知樞密耿南仲李棁左右丞中丞許翰上疏言曰臣嘗學易考察否泰之象則知君子小人未嘗相無於天下雖堯舜在上世必有小人雖桀紂在上世必有君子其所以更為治亂相反如此者堯舜措之得宜而桀紂置之失當也夫措之得宜則君子小人受其福是以皆謂之泰置之失當則君子小人各罹其禍是以同謂之否所謂當與不當要在內外之間而已矣泰內君子而外小人則其象內健而外順否內小人而外君子則其象內柔而外剛剛者君子之德柔者小人之德也使君子有為於內則內健可以制天下使小人委聽於外則外順而天下從之何謂內外傳曰暌外也家人內也否泰反其類也故人君以小人為睽而以君子為家人者類固相反雖人君以一人之明而欲盡知天下之君子親之使為家人又欲盡察天下之小人睽而逺之則雖堯舜之聖猶難於此然圖其易亦必有要矣舜選於衆舉臯陶則不仁者逺湯選於衆舉伊尹則不仁者逺故易曰君子有解小人退也前日君子小人倒植內外逆施姦罔充斥臣未易遽論而獨怪陛下即位以來朝廷之間未見泰象臣是以請先論之如近日王孝迪之昏庸固已汙翰苑而擢中書蔡懋之頑固已敗樞府而猶遷右丞四方聞之悵然失望此則陛下既悟而罷之今又相邦昌於廟堂是則古之所外今之所內類進之禍豈復勝言臣竊意陛下聖明豈不知前日之亂皆生於大臣姦諛不去此輩無以為治而相邦昌者蓋或用權以濟敵騎既行未必遂用故臣未敢正擊而發其端於此他日果用之則臣請以死爭之臣以謂陛下正始之時置相不可不謹辟如植木始得嘉木而植之則嘉木有種其後材將不可勝用始得惡木而植之則惡木日滋其極將至無復取材則君臣一體相待而成自昔未有有君無相而能成大業者也故陛下欲為漢文帝則相必有陳平周勃欲為唐太宗則相必有房玄齡杜如晦欲為堯舜三代之君則必有堯舜三代之佐而後紛無不解為無不成將前卜天下之安危在始觀置相之得失故願陛下考而謹之先王知人之道要在公聽並觀驗左右之言於諸大夫驗諸大夫之言於國人驗國人之言於其人可見之迹灼知其賢而用之此孟子用人之法而易所謂泰者故臣輒敢論思先之以為治之要上嘉納之太學生吳若上書略曰自古人主急於擇相而於今尤難臣竊聞陛下之相張邦昌特因其面折童貫耳貫之奴才罪盈惡稔面折其短誰不能之則陛下論相之術踈矣今又相吳敏士論以敏為京姦黨前日建請上皇遜位乃絛鈎探先旨擲敏為之兾敏立朝庇其宗黨又道路言蔡嘗有保護邦本之策陛下不忘其恩欲全宥之且陛下之居儲位係於天人京父子方欲倚此全宗害天下之公議矣願陛下察之竄殛蔡京父子童貫京責授祕書監分司南京尋移德安府衛州安置正言崔鶠上言賊臣蔡京以姦邪之術誑耀人主大似王莽而朋黨之衆則尤倍於莽莽之姦邪制井田更錢帛設六管造明堂起辟雍頒時令築學舍萬區以誑耀其君於是攘其國而有之京賊亦用此術其心安在莽之腹心不過王舜劉歆等數人豈如京賊收天下之士以為腹心乎遂致盜賊蜂起戎馬生郊宗廟神靈為之震駭陛下安得而赦之遂竄京儋州尋又竄京子孫三十三人遇赦不許量移京行至潭州而死年八十京天資險譎舞智以御人在人主前左狙右伺專為固位計子攸以太保賜玉帶金魚絛修行咸至大學士視執政鞗尚帝女他加侍從者又十餘人厮役取大官妾媵封夫人然公議皆不與天子雖富貴之而亦隂知其姦諛不可以託國故屢起屢仆嘗收其素所不合者如趙挺之張商英劉正夫鄭居中王黼之流迭居臺司以扼之京每聞當罷輒入見天子叩首哀祈無復有大臣廉恥事燕山之役攸實在行京送以詩陽為不可之言兾事之不成資以自解暮年即家為府嗜利干進者趦趄其門輸貨僮僕以得美官者踵相躡紀綱法度一切為虛文識者切憂之而京患失之心無所不至根株盤結牢不可脫卒以召釁誤國為宗社竒禍雖以譴死而海內以不及正刑誅為恨攸從道君南下或云將遂復辟於鎮江尋責永州安置徙潯雷二州又移萬安上復命即所在斬之絛亦以復辟之謗斬之貫初貶池州居住移栁州尋下詔數其十罪追斬於南雄州貫狀貌魁梧偉瞻視皮骨如鐵略不類閹官有度量而疏財後庭自妃嬪而下內侍無大小獻餉結納無虛日故左右交口稱譽一時寵焰赫然乃至隂謀搖東宫聲焰震天下服食華侈仰逼乘輿珍玩瑰竒充牣於家其副將又招伉健少年號勝捷軍以為親兵環列第舍持兵呵衛僣擬宫闕一時蹈利嗜勢之人趨走如市親王柄臣多出其門厮臺賤役自承宣而下凡數百人庖夫廄兵亦官至團練刺史惡稔釁盈卒以起釁之禍流毒四海雖醢其軀不足以謝天下云种師道罷罷為中太一宫使中丞許翰言不當解師道兵柄上曰師道老矣難用當使卿見之令相見於殿門外師道寂然於殿門外翰因言平仲城下用師之失以感發之師道始言彼衆我寡當分兵結寨守要地使糧道不通坐以持久可破也翰深嘆息其言復上奏師道智慮未衰方時多故虎臣置之散地非策也以楊時兼國子祭酒初李棁蔡懋王孝迪趙野悉為都人所詬棁懋大恨之言於上曰諸生率衆伏闕意在生變請置於法又又密諭國子監司業黃哲令斥屏諸生諸生益憤聶山聞而救止之上意少解學官亦連名露章待罪上乃詔學官安職仍曉諭諸生諸生既為棁懋所仇有不告而去者學官舉規屏之諸生閧然請同屏時言諸生欲忠於朝廷爾本無他意但擇老成有行義者為之長二即定矣上喜曰此無逾卿者遂有是命尼堪陷隆德州先是尼堪詣太原城下言朝廷已割此城與我矣亟開門張孝純王稟曰但奏云吾二人不肯堅守如初尼堪攻之不克會義勝軍將劉嗣初劫平陽府叛降於尼堪權威勝軍李植亦以城叛降尼堪遂留兵攻太原分兵而南既逾南北關仰而歎曰關險如此而使我過之南朝可謂無人矣遂至隆德城中素無備二日而陷守臣張確死之自李綱建議盡遣城下兵追斡里雅布之師及於邢趙間相去二十餘里金人懼其行甚速至是澤州奏尼堪兵次髙平執政具密啓於上以御前金字牌追兵還甚速綱力爭於上前得旨復遣而諸將還已數程矣再進猶及金人於滹沱河然將士知朝論二三悉解體不復邀擊第遙護之而已命种師道等援三鎮尼堪之兵聞已和而退乃命師道為河北宣撫駐滑州而命姚古為河東制置种師中副之古總兵以援太原師中援中山河間諸郡時朝廷僉議以三鎮為果不可割如有兵民為國家堅守不下即遣使再議以租賦歸之求保祖宗之地故也尋會師道兼河東宣撫實無兵從行師道乃請合山東陜西京畿之兵屯於孟滄滑衛河陽預為防秋之計徐處仁等謂金人重載甫還豈能復來不宜先自擾費且示敵以弱議格不用三月張邦昌罷以徐處仁為太宰唐恪中書侍郎先是徐處仁入見首論禦戎狄者不一而足朝廷甘言重幣修好可也何亟捐三鎮以與之陛下受祖宗之天下尺地豈可與人矧保塞奉二祖之陵寢中山為陛下之始封敵人詐而難測今要盟劫質侵侮莫甚但見其還從而信之則過上矍然曰卿言是也吾意亦爾自是稍議禦戎而堅守三鎮處仁視事未旬日而有是除時朝廷驛召處仁至未幾即拜太宰而復擢恪以是職人皆賀得人可以撥亂獨給事中謝克家曰州郡失一良守朝廷得一僉人其後附會耿南仲而乖謬有不可述者靖康之初首為宰相而因循失措者吳敏與處仁是也姦巧自營而廢國隄防者恪與聶昌也詔三鎮堅守詔金人要盟終不可保今尼堪深入南陷隆德先敗元約朕夙夜追咎已黜元主和議之臣又詔种師道等往助三鎮播告中外使知朕意於是朝奉大夫朝説之著重地論略曰中山之地則保深祁廣信安肅順安永寧八州軍兵三萬三千有竒髙陽則莫雄霸恩冀滄永靖保寧乾寧安信十一州軍兵則四萬二千有竒太原則欣代二州寧化岢嵐二軍控契丹之朔雲麟府二州守河外嵐石隰三州火山保德二軍州河並扞夏國之西州足十有二州軍兵則七萬三千有竒嗚呼可謂重矣故曰瀛州者有瀛海之富富於天下也定州者可以大定天下也并州者可以并兼天下也名不虛得亦未可忽也若不保此三重鎮而棄之竊恐江海之民魚蝦之俗先叛而後服者足搖而生心矣且曰非我敢棄朝廷恐朝廷之我棄也故曰所憂不在河北而在京師也今陛下赫然下明詔俾三鎮無棄其守如故且會兵擊外侮實天下幸甚命李綱迎上皇於南京上自受內禪吳敏輩以定䇿為己功耿南仲挾師傅之舊左掣右制使上不得有所為道君既渡江敏南仲言於上謂童貫朱勔蔡攸絛將邀道君復辟於鎮江或陳唐明皇與我劒南一路自奉之語朝夕撼於上前上憂且疑之遣江淮發運使朱映齎書至行營具言思奉晨昏之意映至宿城之東迎謁道君即日北還又親書手詔以賜映焉內侍石如岡畏罪不肯從道君還京道君亦以為是乃批令吳敏李綱二人前來敏綱俱請行詔遣綱往迎綱至南京道君且曰金既退師方渡河時何不邀擊綱曰朝廷以肅王在軍中故不許道君曰宗社計豈復論此語既浹洽因及行宫上遞角等事曰止緣都城被圍恐金人知我所在非有他也綱即奏皇帝仁孝小心惟恐一有不當大敵入冦政事不無小更今宗社無虞陛下回鑾勿問細故可也道君曰朕已釋然矣因出玉帶以賜綱太后至京師上出迎初上意欲從端門入禁中而內侍輩頗首勸上嚴備以待兩宫之至者吳敏乘間言陛下但推誠盡孝上皇相見當釋然至是兩宫情通遂罷如洛之議夏四月夏人冦邊攻震威城戎酋呼知城朱昭曰大金約我夾攻自河以北大金得之自河以西我國得之今麟府諸壘悉已歸我公何恃而不降乎昭答曰新君即位聖政日新汝輩誰知耶乃宣發傳禪詔示之衆皆􅌓眙然攻甚急城陷昭先自殺其妻子而後死上皇至京師入龍德宫初童貫部捷勝軍從道君東巡貫貶軍士有惡言上以問宰執或請城守獨處仁曰陛下仁孝宜郊迎稱賀何謂城守乎上大喜以處仁為扈駕禮儀使道君至近郊上出迎謁兩宫甚歡無一間言立皇子諶為皇太子復春秋學官置詳議司尋罷之以宰執徐處仁吳敏李綱總領其事蓋三人所共奏也又擇侍從參詳餘官檢討分六房期以半年一切去之政協於祖宗成憲而廷臣弗與者多不樂稍進説以為是與熙寧條例司崇寧講議司相似非當今所宜處仁謂熙寧條例司欲變祖宗法今欲復祖宗法崇寧講議司欲制禮作樂以文太平今欲破觚斷雕以濟艱難其相似者乃名也而不相似者實也上方去名取實雖説者百人上弗信之矣然説者不已踰月以御史胡舜陟之言罷之詔吏部考核濫賞稽考庶官凡由王戬李彥之公田王黼朱勔之應奉童貫談稹等西北之師孟昌齡父子河防之被變蜀湖南之開疆關陜河東之改幣吳越山東茶鹽陂田之利宫館池苑營繕之功後苑書藝局文書庫等之賞又若近習所引獻頌可採效用宣力應奉有勞特赴殿試之流所叨恩數不限高卑一褫奪之七月詔罷討論左正言程瑀爭之以為可痛憤者三可深惜者二不聽科舉復用詩賦追復吕公著等官詔親擢臺諌詔臺諌者天子耳目之官宰執不當薦舉當出親擢立為定制趙良嗣伏誅先竄栁州就誅之五月募民輸財助軍罷王安石配享孔子從楊時之請也詔安石合依鄭康成等例從祀孔子廟庭令禮部改正施行而徽猷閣待制談世績又言并不當以安石從祀不報种師中擊金人于榆次死之姚古師潰于盤陀退保龍德府斡里雅布之還師也抵中山河間兩鎮固守沿邊諸郡亦然師中因此進兵逼逐金人出境兩鎮無虞尼堪之師至太原城下太原亦堅壁尼堪屯兵圍之悉破諸縣為鎖城法以困太原鎖城法者於城外矢石不及之地築城環逺分人防守使內外不相通雖姚古進師復龍德府威勝軍扼南北關纍出兵屢有勝負而不能解太原之圍于是詔師中率兵由井陘道與姚古相犄角應援太原師中進次平定軍乘勝復夀陽榆次等縣有輕金人之意又輜重賞軍之物悉留真定不以從行金人乘間衝突諸軍以神臂弓射却之欲賞射者而隨行銀碗只數十枚庫吏告不足而罷于是士卒憤怒又嘗約姚古張灝兩軍同進二人不至師中裹創力戰而死其餘將士退保平定軍金人進兵迎古遇于盤陀王師皆潰時种師道駐滑州以老病乞罷師中訃聞上親製祭文哭于營中贈使官其子孫族屬二十人當時行移文字出于密院者則令追破賊出于三省者則令護出境諸將莫知適從赦河北以李綱為兩河宣撫初師中敗聞种師道又以老疾告歸乃别議選宣撫使代師道領兵再援太原門下侍郎耿南仲謂中國勢弱用兵無益宜割三鎮以賂之綱奏祖宗之地不可割割之徒資敵勢生靈陷于殊域豈為民父母之道哉上從綱議為再援之計南仲等以綱堅執異議決於用兵乃曰方今欲援太原非綱不可宜以綱為宣撫使上欲用綱召對睿思殿諭所以欲遣行者綱自陳書生不知兵在危城中不得已為陛下料理兵事實非所長今使為大帥恐不勝任且誤國事死不足以塞責上不許即命尚書省出敕令面受綱奏曰借使臣不量為陛下行須擇日受敕今拜大將如呼小兒乎上乃許别日受敕綱退即移疾入劄子乞致仕力陳所以不可為大將且云此必有建議不容臣於朝者章十餘上上批答不允且督令受命於是臺諫交章言綱儒者不知軍旅將兵必敗又言綱忠鯁異衆為大臣所陷他日成功亦死僨事亦死不宜遣使綱出衄太原失守貽憂近甸禍安可弭非善計也上斥為大臣遊説寢不報先是上録裴度傳賜綱綱入劄子具道吳元濟以區區環蔡之地抗唐室與金人強弱固不相侔而臣曾不足以望裴度萬分之一以度擬臣是謂非倫且言諸葛亮出師表謂親賢人逺小人此先漢之所以興隆也親小人逺賢臣此後漢之所以傾頽也夫用人之於用兵之間若不相及而亮深以為言者誠以冦攘外患有可掃除之理而小人在朝蠧害本根寖長難去其禍有不可勝言者是以吉甫贊周以北伐必有孝友之張仲裴度相唐宗以東討必安姦邪之元稹君子小人之不兩立從古已然臣竊觀陛下嗣位之初適遭金人入冦宵旰憂勤勵精圖治思刷前恥雖古帝王勤儉之德無以逺過然君子小人尚猶混淆於朝翕訿成風殊未退聽謂宜留神照察在於攘逐經理之先朝廷既正君子道長則所以捍禦外患者有不難也今取裴度論元稹魏洪簡章疏節其要語輒陳天聽上優詔答之綱踰旬不受命或謂綱曰公知上所以遣行之意乎此非為邊事乃欲緣此去公則都人無辭耳公堅卧不起讒者益得以行其説上怒且不測矣奈何許翰又書杜郵二字遺綱綱皇恐乃受命宣撫司得兵三萬人而闕馬綱復上曰戎事以馬為先今之馬如此無以奮張軍容昔天寶末封常清出師幽薊人見其軍容不整皆叛去今臣出師安知無窺覘者所係國體非細故也事迫矣請括都城馬倍價償之可得數千匹上以為然令條具以聞既而榜於開封府曰宣撫司括馬事屬騷擾可更不施行綱以二萬人分為五軍時勝捷軍叛於河北遣左軍往招撫之又遣右軍屬劉韐除韐宣撫副使韐乃唐恪所薦綱初不知也又以解潛為制置副使代姚古以折彥質為河東勾當公事與潛治兵於隆德府宣撫司凡萬二千人綱請銀鈔錢於朝廷各百萬方得二十萬期於六月二十二日啓行而庶事皆未辦集乞量展行期上批曰遷延不行豈非拒命其日戊申也綱惶恐入劄子辨所以未可以行者且曰陛下前以臣為專權今以臣為拒命方遣大帥解重圍而以專權拒命臣為之毋乃不可乎願併罷樞密之任擇信臣委之乞保骸骨因以尚書右丞知樞密院事宣撫使告敕繳納上封還遣使趣召數四綱入見上具道所以為人中傷致上聽不能無惑者因於二月五日士庶伏闕事今奉命出使無緣復望清光上驚曰卿只為朕巡邊便可還闕綱奏曰臣之此行豈有復還之理昔范仲淹自參知政事宣撫西邊過鄭州見吕夷簡語暫出之意夷簡曰參政豈復可還其後果然今臣以愚直不容於朝使臣既行之後無沮難無讒謗無錢糧不足之患則進而死敵臣之願也萬或有一朝議不堅臣自度不能有所為即須告陛下求代罷去陛下即宜念臣孤忠以全君臣之誼上頗感動乃以二十五日戒行前期錫宴紫宸殿及行又送御筵於瓊林苑問勞甚渥綱先具奏略云深惟國家之大非一已私智所能獨辦今臣將行顯受睿算與廟堂之成謀使臣得以遵稟奉行庶幾有濟夫用兵之道雖臨機制變不可預計然規摹大略當須先定今日之事莫大於防秋莫急於解太原之圍士大夫獻説者不過和與戰二策而已金人留吾親王幸利以為質屯重兵於太原已半年矣使者相望欲得三鎮之意愈堅和果可得乎种師中姚古以十萬之師相繼潰散戰果可必乎和不可恃則秋髙馬肥敵騎侵軼議者必以臣今日出師為致冦之端戰不可必勝則萬一戰士或復有衄必又以臣為輕舉誤國不知陛下睿算與夫廟堂之謀所以授臣使防秋而解太原之圍者當決以何策而可也前日和議割三鎮之説至今為梗今日之謀倘或更有差誤則天下之勢有不可勝慮者矣願陛下及在廷之臣與五六大臣熟議決策特降親筆俾臣巡邊臣非敢愛死誠恐有誤國家大事綱又復奏云十月初抵河陽入劄子言泛水間西都河陽皆形勝之地城壁頽圮當亟修治今雖晚然併力為之尚可及也又因拜望諸陵具奏曰臣總師道出鞏洛拜望陵寢澘然流涕恭惟祖宗創業守成垂二百年聖聖傳授以至陛下適值艱難之秋戎馬南侵中國勢弱此誠陛下嘗膽思報勵精求治之日願考祖宗之法一一推行之進君子逺小人無以利口善讒之言為足信無以小有才間君子之大道為足恃益固國本以圖中興上以慰安九廟之靈下以為億兆蒼生之所依賴天下幸甚初綱陛辭日為上道唐恪聶山之為人陛下信任之篤故於此申言之上批答有銘記於懷之句留河陽十餘日練士卒修器械之屬進次懷州自出師後禁士卒不得擾民有悍奪婦女叉子者立斬以徇拾遺棄物者決配逃亡捕獲者皆斬以故軍紀頗肅無敢犯者嘗謂步不勝騎騎不勝車金人以鐵騎衝突非車不能制之有張中行獻戰車制度兩竿雙輪前施箟籬運轉輕捷每車用甲士二十五人執弓弩槍牌之屬以輔翼之結陳以行鐵騎遇之皆靡造千餘輛日肄習之俟防秋之兵集以謀大舉而朝廷降旨凡所起之兵悉罷減之綱上疏力爭其大略曰臣昨待罪樞府伏蒙陛下委分措置防秋之兵臣意謂軍政不修幾三十年矣闕額不補者過半其見存者皆潰散之餘不習戰陳故令金人得以窺伺既陷燕山長驅中原遂犯畿甸國無藩籬之固人無邀擊之威廟堂失策又割三鎮質親王劫取金帛以億萬計驅略士女屠戮良民不可勝數誓書之言所不忍聞此誠宗社之羞而陛下嘗膽而思報者也今河北之冦雖退而中山河間之地不割敵馬出沒並邊諸郡寨柵相連兵不少休太原之圍未解而河東之勢危甚旁近縣鎮皆為敵兵所占據秋髙馬肥敵騎慿陵決須深入以責三鎮之約及金帛之餘數倘非起天下之兵解圍太原則必復有今春之警宗社安危殆未可知此危急之秋也故臣輒不自揆為陛下措置降詔書以團結諸路防秋之兵大約不過十萬餘人而欲分布沿邊河北雄霸二十餘州中山河間真定大名橫五帥府腹中十餘州軍沿河一帶控扼地分翊衛王室隄防海道其甚急者解圍太原收復欣代以扞金人夏人連兵入冦不知此數十萬之衆一一皆到果能足用而無敵騎渡河之警乎今臣被命出使距陛辭之日未幾朝廷已盡改前日詔書調兵防秋之計既罷日下又罷弓弩手又罷練兵民罷四川福建廣南東路將兵又罷荆湖南北係將不係將而京西州縣又皆免起發是前日詔書所團結之兵罷去大半不知金人聚兵兩路入冦將何以支吾而朝廷何恃不留意於此也臣竊思之以兵為不須起者大槩有五川廣福建荆湖之地逺一也錢糧犒賞之費多二也河北冦退天下已無事三也太原之圍敵騎不多不攻自解四也探報有林牙髙麗之師金人牽制未必深入五也若以川廣福建荆湖之地逺則詔書之下已四月期天下兵以七月當時則報三省何不即止今已七月逺方之兵皆已在道始復罷之是蹈今春勤王之師約回之弊也一嵗而起天下之兵在道而兩罷之天下謂何臣恐朝廷自此不復能取信四方而將士解體矣國之大事在戎宗廟安危所係而且行且止有如兒戲臣竊痛之若謂錢糧犒賞多則今春無兵捍冦致令誤國土地寶貨人民皆為所取又不止於前日也況元降指揮防秋人民各令齎糧以行則錢糧犒賞之乏自非所患廟堂不深思宗社大計而惜小費臣竊所不取也若以河北冦退天下無事則邊郡日報金人聚兵聲言某月入冦當取某地強敵臨境非和則戰朝夕恐栗懼其復來天下果無事乎賈誼謂厝火積薪之下而寢其上火未及燃因謂之安以今日觀之何止於火未及燃殆處於烈焰之旁而言笑自若也若以太原之圍敵騎不多不攻自解則自春徂秋攻守半年曾不能得其實數姚平仲一帥以十萬之師一日皆潰彼未嘗有所傷衄何以必其兵之不多以為可以不攻而自解者臣以為非愚則誣至林牙髙麗牽制之報理或有之然不可恃彼之不來恃我之有備則屯兵聚糧正今日之急務不可忽也今河北河東州郡日告危急皆以三五萬為言而半年以來未有一人一騎可以副其求者防秋之兵甫集又皆遣罷不知此何理也若必以謂不須勤王之兵而自可無事則臣不足以任此職陛下何不遣建議之人代臣俾至康平而重為此騷擾也除范世雄所統河北兵聞已至闕塘間臣以昨奉聖旨令疾速發赴宣撫司外所有餘路乞依元詔書起發庶幾不誤國事未報再開具奏曰近降旨指揮減罷防秋之兵臣所以深惜此事一則河北防秋闕人恐有疏虞二則一嵗之間垂令起兵又復止之恐無以示四方大信防秋之計臣前奏論之已詳請為陛下更論不可失信之意昔周為犬戎所侵嘗以𤇺火召諸侯之兵恐諸侯之未必至也舉𤇺火以試之諸侯之兵大集知其試已皆大怒而歸其後真舉烽火無復至者去冬金人將犯闕詔起勤王之師逺方之兵踴躍赴難至中途而已議和有詔止之皆憤惋而反今以防秋之故又起天下之兵良非獲已逺方之兵率皆就道又復約回將士卒伍寧不解體夫以軍法勑諸路起兵而以寸紙罷之臣恐後時有所號召無復應者矣竟不報六月貶陳公輔公輔上言三事一謂李綱本書生不知軍旅遣援太原為大臣所陷必致敗事二謂余應求不當以言逺謫三謂方復祖宗舊制馮澥不宜更論熙豐之政此三者譬人腹心之病願急治之遂自左司監降監合州酒稅下戒厲詔先是諫議大夫馮澥言有公論有中道公論天下所同而中道萬世不易近日朝論稍歸復於元祐漸不可長夫祖宗之法與熙豐之法擇其可行者行之足矣諸經古制與王安石新議擇其善者從之足矣何必彼之是此之非詔榜朝廷於是御史李光疏駁之不聽右正言崔鶠奏近日馮澥上章其言曰熙寧元豐之間士無異論文學之盛也此姦言也昔王安石用事除異已之人當時名臣如富弼韓琦司馬光吕公著吕誨吕大防范純仁等皆以異論斥逐布衣之士誰敢為異乎士攜策負笈不逺千里遊於學校其意不過求仕宦耳安石著三經之説用其説者入官不用其説者黜落於是天下靡然雷同不敢可否陵夷至於今大亂此無異論之大效也而敢尚為此説以熒惑人主乎乞以澥所上言章並臣之章垂於象魏揭於通衢以驗國人之論而賞罰之以戒小人之欺罔吾君者鶠又奏臣近所上章論諫官馮澥未蒙施行澥復進吏部侍郎此士論之所公憂臣適當言責不得已而言也觀澥之意不過欲以熙寧元豐之法為治緣澥乃熙豐人類之一也已之説行則身安已之説廢則身危非為國家忠計此天地否泰所係國家治亂之所由分不可忽也昔在仁宗英宗時選天下敦朴敢言之士以遺子孫而王安石用事皆目為流俗之臣盡逐去之乃自為新説以造士號為新義人材充塞乎朝廷而人主不問天下之安危元祐之初司馬光收仁宗英宗時人材而用之故宣仁聖烈皇后擁少主不出簾幃而天下治問其四夷則率服矣問其盜則消弭矣問其軍士則豫附矣問其百姓則富樂矣當時天下之勢安於泰山及章惇蔡卞用事斥之於瘴域炎荒之外蔡京隂蓄異圖凶謀益熾於是盡收熙寧元豐時人材用之誘以美官餌以厚祿於是海內小人波蕩而從之萬口一詞迭相唱和為紹述之論以誑惑人主紹述一道德而天下一於諂佞矣紹述同風俗而天下同於欺罔矣紹述理財而公私竭矣紹述造士而人材乏矣紹述開邊而四裔交侵矣此熙寧元豐之效也且元符末以連年四月朔日食四月正陽之月古人所忌詔求直言應詔者數千人蔡京因此以除異已者乃遣腹心之黨與定之分邪正二等同已者為正異已者為邪澥與京同者也故在正等凡異已者京皆指以為邪陷以為罪矣凡數千人近者上皇下責躬之詔其意以直言奪於權臣反歸咎建議臣寮然則前日附會蔡京號為上書正等者皆今日之罪人也陛下嗣位之初天下觀陛下好惡是非以卜世之興衰今用蔡京正等之人豈上皇悔過之意天下之士聞之解體矣上召翰林學士吳升至內東門付以御封李光劄子論馮澥尊推王安石之學鼓惑衆心安石置條例司専任已能斥逐名賢任用小人以馴至蔡京蔡卞操繼述之説掃除祖宗法度於光劄子御批祖宗之法子孫當守之如蔡京首倡紹述變亂舊章貽患至於今日可作一詔於是降詔略曰祖宗法度在於後人奉承之不敢有違邇者蔡京懷藏姦慝自作不靖凡舊章彞典肆行變亂挾紹述之言為劫持之計比嵗上皇深燭其姦咸當釐正尚慮邪説鼓行習熟間搖衆心害於國體明示厥指罔有不孚有一于斯必罰無赦丙辰太白熒惑鎮嵗四星聚張壬戌彗出紫微垣竄姚古初古屯威勝軍帳下統制官焦安節妄傳冦至以動軍情古遂退至隆德安節又勸古遁去故兩郡皆潰散及安節還軍李綱召安節斬于瓊林苑中丞陳過庭奏昔周主戰髙平斬敗將何徽等而軍聲大振古罪不容恕詔安置廣州金置元帥府初二將入冦但置節統府是夏金人用其臣劉彥宗議始改元帥府且置官屬以安班貝勒舍音茂為都元帥尼堪斡里雅布為左右副元帥達蘭烏舍為左右監軍阿穆爾及耶律伊都為左右都監凡七人尼堪烏舍伊都棄太原斡里雅布達蘭阿穆爾自燕山會于山後草地避暑且議事及秋乃還議者謂尼堪烏舍伊都三大敵棄太原北去往返千有餘里避暑而我援兵雲集不能解太原之圍失計甚矣秋七月除元符上書邪等禁彗出東方長數丈北拂帝座掃文昌大臣有謂此乃敵勢將衰非中國憂也提舉醴泉觀談世績面奏垂象可畏當修德以應天不宜惑其諛説八月詔以垂文見異除民間疾苦十事勝捷軍叛討平之初勝捷軍統制官張師正與金人遇于河北而潰至大名府宣撫使李彌大斬師正以徇而不能撫其衆皆不自安又聞童貫已誅死有大校李福者率以為亂遂掠淄青間其徒至四萬人所過無噍類矣至章邱縣離城問罪令曰此朝廷處分非小邑罪也遣人以牛酒犒之乃舍去彌大遣禆將韓世忠以所部五百襲擊之追至臨淄斬福餘棄甲而遁衆猶滿萬世忠單騎入其軍曰我輩皆西人平時惟殺畨賊幾曾作賊耶官家使我招汝若能降悉赦汝罪皆拜而請命遂降之詔改宣仁皇后謗史諫議大夫楊時言臣竊帷宣仁聖烈皇后保佑哲宗皇帝殆十年被誣謗久而未明臣謹條具本末于左昔元豐末神宗皇帝不豫哲宗沖幼宣仁聖烈皇后有旨令二王非宣召不得入內其周防之慮深矣是時王圭首建大議謂立延安郡王為皇太子餘臣無敢言者退批聖語在中書仍關實録院衆臣簽書本末詳具天地鬼神臨之在上質之在旁不可誣也至元祐中蔡確以罪去其黨始造為姦謀兾邀異日之福紹聖初章惇蔡卞用事欲中傷舊臣報復私怨遂實其説上誣聖母而以大逆之名加王圭以定策之功歸蔡確而已亦與焉其為此謀非私于蔡確其實自為因以中傷元祐之人耳天下蒙寃積忿幾四十年伏遇陛下嗣神器如太陽之升無隱不燭而臣幸得備員諫省不得不為陛下言之也凡元祐政事著在甲令者皆已焚毁則當時所批聖語在中書者必多遺失所幸紹聖中所修政事記具在祕書省國史案猶可考也此天之意實以遺陛下乞索元祐時政記一賜覽觀庶以究竟事實昭洗王圭為臣不忠之名追奪蔡確冒受封贈之典濫恩所列悉行改正以塞天下憤鬱之氣中丞陳過庭吏部侍郎馮澥户部侍郎邵溥相繼論奏故有是命是月解潛劉韐兵潰李綱使解潛屯威勝軍劉韐屯遼州幕官王以寧與都統制折可求張思正等皆屯汾州范瓊率山東兵屯南北關五驛約以三更並進會城下時大雨連月或謂陰盛以語上上以綱握兵權太重徐處仁曰綱書生耳強敵中國之隱憂今太原兵圍未解不以此憂而憂綱乎然綱猶未進兵而河東七月旦暮已涼且多江浙閩蜀人皆脆弱不可戰至是劉韐兵先進金人併力禦之韐兵潰將領王彥等死之而解潛兵與敵遇于關南郊大敗八月召李綱還以种師道代之時師道無兵從行及次河陽金使王汭自北來師道揣金必大舉入寇亟拜疏請幸長安大臣以為怯未幾召還命劉韐代之韐未及行復命范納代韐綱自序云初遣王雲曹時使金軍中議以三鎮軍民不肯割地願輸租賦代割地之數及雲時還云金有喜意其實以欵我非誠言也朝廷信之耿南仲唐恪尤主其議復詔宣撫司不得輕易進兵而議和復紛然矣斡里雅布復入寇張思正師潰思正之兵在汾州十七萬號百萬未出戰金人相謂曰劉韐解潛既敗不足畏也乃驅老弱守虛寨以當平定威勝之路而併其兵以禦思正思正引兵出汾州執冀璟徇于衆曰此不堅守石嶺關遁還者斬之癸丑夜金人于文水縣張飲諜者遽以告思正與張灝襲之斬首數百與李嗣本合甲寅復出戰金人曰彼衆雖多而喧囂不整無能為也乃以鐵騎三千直衝我師我師大奔相蹂踐而死數萬人坑谷皆滿思正以敗卒數千奔汾州灝以牙兵數百赴磁隰于是威勝隆德汾晉絳澤之民扶携老幼渡河南奔者以萬計州縣井邑皆空矣李綱自序云上日以御批促解太原之圍於是宣撫劉韐制置使解潛察訪使張灝勾當公事折彥質都統制王淵折可求等會議於隆德府期于七月二十七日諸路進兵平定軍遼州兩路劉韐王淵主之威勝軍路解潛折彥質主之而宣撫副使制置副使察訪使勾當公事皆承受御前處分事得専逹進退自如宣撫司雖有節制之名特具文耳綱奏上以節制不専恐誤國事雖降指揮約束而承受専達自若也至期出師解潛與敵相遇于南北關轉戰四日殺傷相當金人增兵潛兵力不能勝而潰平定遼汾之師皆逗留不進其後張灝又違節制用統制官張思正復文水縣已而復為敵所奪綱極為上論節制不専之弊又分路進兵敵以全力制吾孤軍不若合大兵由一路進會范世雄以湖南兵至即薦為宣撫判官方欲會合親率師以討擊而朝廷之議變矣劉岑李若水分使金軍請緩師也岑等使還言至斡里雅布軍止索歸朝官所欠金銀見尼堪則深諱金銀専論三鎮初若水名若氷上召見惡其若猶弱也氷猶兵也兵不可弱遂賜今名徐處仁吳敏罷以唐恪為少宰何栗中書侍郎陳過庭尚書右丞許翰罷同知以聶昌代之李回簽書樞密院事時門下侍郎耿南仲専主和議上是之處仁力爭南仲引王雲使金密請逐兩相以藉口又談世績李熙靖同提舉龍德宫一日道君謂二人曰國有大故大臣定䇿古有之矣亦有羣臣輒請傳禪者乎世績曰古無有也道君正色曰內禪自出豫意小人竊為已功以致將相卿等奏知熙靖畏懦不敢惟世績獨奏聖語又南仲欲引聶昌為執政於是御史中丞李回言處仁與少宰吳敏皆蔡京之黨也而處仁與敏不和敏又貪天之功為己力望亟罷之先是左正言程瑀上言陛下即位以來功效不見以未得馭臣之方而今日大臣持茍且之術行姑息之政以節用則浮侈尚多以愛民則凋弊未息官冗而未澄兵驕而不知制名曰斥逐姦臣而加恩庇護名曰愛惜名器而不謹差除若此者遽數之不能盡臣稽之于衆僉謂處仁庸常吳敏耿南仲昏懦唐恪傾險此政事所以曠敗而不振陛下宜深推安危治亂之機盡賜黜罷别選英賢共圗大計庶幾尚可救藥惟陛下念之福州軍亂殺守臣李庭俊九月尼堪陷太原始尼堪久攻太原不下乃於城外築舊城居之號元帥行府已而歸雲中留尼楚赫大王攻城至是尼堪自雲中復至乘勝急攻丙寅城陷金人盡殺捷勝軍帥臣張孝純被擒既又釋而用之副總管王稟負原廟太宗御容赴汾水而死轉運使總提舉王孝忠三十六人皆被害太原自去年十二月己卯受圍凡二百六十日軍民亂死十八九固守不下至是始破吳革使尼堪軍革以閣門舍人充使見尼堪庭立不拜責其貪利敗約氣徑詞直敵相顧動色愧服為追回威勝軍等處人馬受書以歸備得其情狀報宣撫折彥質請于朝急備河南及對上問革他事革曰金人有吞噬之意又寇聚兵乞措置邊地起陜西兵馬為京城備不復議和乃遣革詣陜西勾兵委之帥臣講武備置四道總管府從何栗之請也分總四道以知大名府趙野總北道知河南府王襄總西道知鄧州張叔夜總南道知應天府胡直孺總東道事得専制財得通用官得辟置兵得誅賞緩急則以羽檄召之入衛京師給事中談世績言裂天下樹四人而王畿所自治才十六縣耳獨無不掉之慮乎中書舍人胡安國亦言一旦以數百州之地分為四道則權太重萬一號召不至又何以待之臣欲乞二十三路帥臣皆選重臣付以都總管之權有警則各帥所屬守將應援則一舉兩得矣安國世績二人所言皆拂上意乃改績為禮部侍郎安國又言野不才緩急恐誤事不報初欲以宇文虛中當一宰執主之其後中書舍人安扶言其不可任乃罷之冬十月竄李綱安置建昌軍尋徙夔州綱自敘云初唐恪謀黜綱則徐處仁吳敏許翰皆可以不去者數人去則綱必不能留已而處仁敏罷而恪相翰罷同知樞密院而用聶山陳過庭李回等皆知恪䇿言者復論敏承蔡攸旨建內禪議及初除門下侍郎亦蔡攸矯制為之責授散官安置涪州綱竊歎曰事不可為矣遂乞罷奏數上猶批答不允綱具奏力道其所以材能不勝任者且得昏憒之疾恐誤國事并敘曩日榻前之語于是上命种師道以同知樞密院事巡邊交割宣撫司職事召綱赴闕且俾沿河巡視防守之具綱連章乞罷知樞密院致仕行至封邱縣有旨除觀文殿學士知揚州綱辭免不敢當且以疏言所以力乞罷者非愛身怯敵之故特事有不可為者難以虛受其責始宣撫司得兵若干又防秋兵若干今屯駐某處皆不曾用如朝廷應副銀絹錢若干又御前降到若干除支官兵食錢犒賞外今皆存留襄州及在京降賜庫具有籍可考按也臣既罷去恐不知者謂臣喪師費財惟陛下遣使覆實雖臣自以為不材乞罷願益擇將帥撫馭士卒與之捍敵金人狡獪謀慮不淺和議未可専恃一失士卒之心無以禦侮則天下之勢去矣臣至此不復與國論敢昧死以聞至是果有言綱専主戰議喪師費財者又指十罪於是落職宫觀責授節度建昌安置以綱上書辨論謂退有後言以惑衆聽再謫寧江斡里雅布陷真定府執帥臣李邀鈐轄劉竧死之初金以三鎮未得兩道入寇斡里雅布主之八月十四日入塞先以衆攻廣信軍保州不克遂越中山攻真定邀措置乖謬竧率衆晝夜拒戰城上金入初攻北壁竧立拒之至是偽移攻東城邀復趣竧往應力攻兩日一日潛移攻具還攻北城城中不知也黎明金又忽鼓衆憑堞而上城陷李邀不能死為金所擒竧猶率衆巷戰麾下稍稍亡去竧顧其弟曰我大將也豈可受敵戮乎因䇿馬挺刃潰圍欲出而諸門皆為金人所守遂之孫氏園中亭內解絛絶脰而死邀被執至燕山亦不屈而死金使來斡里雅布尼堪以書來責問契丹梁王及伊都蠟書并元割三鎮略云乃者差蕭仲恭趙倫等齎書報復回日輒受間諜之語陰傳搆結之文今差楊天吉王汭為問罪之使請速令皇叔越王皇弟鄆王并太少宰一員同詣行府齎書陳謝過責仍據元割三鎮即行誡諭令開門以待先是斡里雅布既退尼堪尚留隆德遺簽書路允迪等以和議之書上之尼堪聞斡里雅布得金帛不資而已無所得于是遣使數輩求賂時勤王之師踵至大臣有輕敵意猥曰吾兵盛如此當與金抗且使既領肅王過河吾盍留其使與之相當于是館其使踰月不遣有都營趙倫者燕人狡獪懼不得歸乃訐詐以情告館伴邢倞曰金國有伊都者領契丹精鋭甚衆二于金人願歸大國可結之以圖二將倞遂以聞大臣信之即以詔書授倞賜伊都納衣巾中仍賜倫等絹各千匹白金千兩倫至尼堪所首以其書獻之尼堪大怒以倫書表奏聞其主報云深入攻討委元帥從長措置尼堪遂復提兵南下又麟府折可求來獻言夏國之北有大遼天祚梁王與林牙蕭太師出榜言金人不道與南朝姦臣結約毁我宗廟今聞南朝天子遜位嗣君明聖如能合擊金人立我宗社則當修好如初吳敏以為然乃奏上令致書梁王由河東入麟府為尼堪遊騎所得故金以為辭金使之來也禮貌甚倨持其書於上前曰陛下既不割三鎮之地又安忍復立契丹之後上曰此乃姦臣所為也金使請必割三鎮之地要金帛車輅儀物及加其主徽號上乃卑辭深明其非朝廷之罪吏書王時雍實館之時雍議盡以三鎮所入增歲幣并祖宗內府珍玩悉歸二帥且厚犒河東之師金使頗領其説先取犒師絹十萬以行尼堪陷汾澤等州時金勢甚張知州張京戩堅守以待敵俄聞朝廷分河東為兩路隆德為東路平陽為西路各命守臣救汾兵未至而城陷京戩朝服南向焚香拜舞乃自引決其家死于難者凡八人紹興中贈忠確都監賈亶亦死之陷威勝軍執守臣張堯佐陷澤州守臣髙世由降陷隆德府執守臣張有極陷平定軍先是尼堪自太原東至平定軍斡里雅布自真定西至平定會議再寇京闕右監軍烏舍曰今河東已得太原河北已得真定二者乃兩河領袖也乘此之勢可先取兩河俟兩河既定徐圖過河以取東京未為晚也今若棄兩河先犯東京茍為不利則兩河非我有也兼太子昨已到東京不能取之斡里雅布未有語尼堪拂然而起以手去貂帽擲之于地謂諸將曰東京中國之根本我謂不得東京兩河雖得難重守茍得東京兩河不取可自下昨東京不能得者以我不在彼也今我往得之必矣又舒右手作取物之狀曰我今若取東京如運臂取物回首得之矣斡里雅布欣然稱善諸將不敢沮之入寇之計遂決下哀痛詔命兩河互相救援命諸路合從連橫相為救援見便而動無拘一律初尼堪既陷太原乃縱兵汾晉之間攻下縣鎮塞壘十數汾雖糧乏兵疲獨不降併力攻逾月乃陷之又東攻太原之夀陽夀陽城小而百姓死守凡三受攻殘破之衆萬人竟不能拔乃攻平建欲據井陘其始攻也喪士三千復與斡里雅布合兵攻平定亦喪萬人拔之斡里雅布自二月由畿甸歸燕至九月復入寇攻保塞中山不克進攻真定先是真定帥劉韐守禦備具人恃以安總管王淵鈐轄李質訓練士卒數千人皆可用是時真定在河朔最為強壘朝廷以太原危急恐金東軼犯河朔命韐為宣撫副使領兵五萬守遼州以據其險又命淵質自隨乃以李邈代守真定邈新至拙于應變人心未附金卒至圍城下不旬日而陷是時失太原又聞真定之報上大以為憂乃下哀痛之詔雨木冰尼堪陷平陽府初金人犯汾州議者謂汾州之南有回牛嶺險峻如壁可以控扼于是命以守朝廷又命劉琬統衆屯平陽以捍北邊然國用乏竭倉廪不足士之守回牛嶺者日給豌豆二升或陳麥而已士笑曰軍食如此而使我戰乎金人領精鋭師寇回牛嶺于山下仰望官兵曰彼若以矢石自上而下吾曹病矣徘徊未敢進俄而官軍潰散遂越嶺至平陽琬領兵遁去城遂陷凡官吏皆縋而出斡里雅布犯慶源府都統王淵遣將韓世忠遣兵三百人劫敵寨敵兵遂亂時宣府范訥統兵五萬守滑濬斡里雅布知有備乃由恩州王揄渡而趨大名由李固渡濟河髙麗來貢侍御史胡舜陟言自政和以來髙麗使歲至淮浙之間不勝其擾今髙麗事金國必窺我之虛實以報金望止令遞表以進却其使還追王安石所贈王爵十一月种師道薨師道至懷州召還都城至是卒上臨其喪哭之甚哀夏人寇邊陷懷德軍守二劉銓杜翊死之契丹故將原闕呼嚕者自其國滅奔于西戎至是招集叛亡雜胡羌數十萬攻麟府諸城至建寧塞兵才百數知塞楊震與其子居中執中死之長子沂中從征河朔得免詔止援兵時南道總管張叔夜陜西制置錢蓋各統兵赴闕會唐恪耿南仲専主議和語同知聶昌曰今百姓困匱養數十萬兵于城下何以給之乃止兩道兵毋得動議棄守三鎮太原之陷也乃命王雲使金國議和許以三鎮稅租之數雲軍前先遣李裕回報已講和不復議三鎮止索五輅冠冕及上尊號且須康王親到議乃可成康王出使左丞王宇副之既而宇托故辭行詔落左丞安置新州以同知馮澥代宇李若水副之雲回言事已中變必欲得地差一十日使不至即再犯闕時康王已出城戊辰王復入中外大駭己巳百官集議于延和殿言不可與者惟梅執禮吕好問洪芻秦檜等三十六人自范宗尹以下七十餘人皆欲與之而范宗尹言最切至伏地流涕會李若水使歸亦慟哭於庭言與之以紓禍何栗持之甚堅曰三鎮國家根本奈何棄之況敵情變詐安可保其必信割之亦來不割亦來且河東之民皆為赤子棄地則并其民棄之為民父母而棄其子可乎上然其言唐恪密啓上請以親征為名西幸洛京據秦雍以圖恢復而留太子居守上將從之會栗入見力詆其不然上以足頓地曰今當以死守社稷栗退謂恪曰割三鎮則傷河外之情不割則太原真定已失不若任之但飭備以待恪唯唯議遂定梅執禮建議清野詔河東北京畿並清野命執禮為清野使已而京畿民扶携入城折彥質等師潰尼堪陷西京及河陽府金人既不得三鎮地怒甚尼堪自澤潞至河陽宣撫副使折彥質領兵十二萬與之夾河而軍又簽書李回以萬騎行視黃河時亦至河上敵曰南軍亦衆與之戰勝負未可知不若加以虛聲遂取戰鼓擊之逹旦王師潰散京西提刑許髙河北提刑許亢各統兵防路口亦望風而潰金衆悉渡自河東澤潞官吏多棄城而走西道都總管王襄與河陽守臣燕瑛皆去城尼堪乘勝陷河陽及西京康王構使斡里雅布軍許割三鎮王雲副之許割三鎮并奉冕輅以行仍尊其主為叔且上尊號十八字王請耿南仲偕行上曰南仲老矣令其子延禧為參議官王既出城雲白王曰京城樓天下所無然真定城髙此幾倍金使雲等坐見一時震破此雖樓櫓如畫不足恃也王不答初雲使金過磁相勸二郡為清野計二郡從之撤近城民令運穀入城磁人以是怨雲宗正少卿宗澤嘗論列宰相非其人宣撫副使提兵不進并劾雲使金張皇敵勢命知磁州澤上疏乞邢洛磁趙相五州各養精兵二萬寇至一郡則四郡相應凡一路當有十萬兵上喜之嘗以語康王其後議卒不合王至磁澤出迎謁王問之澤以兵皆在山村急則召至殊不費糧百姓遮王馬諌曰不可北去肅王已為人紿因指雲曰清野之人皆姦細也雲遂被害尋相州守臣汪伯彥領兵郊迎王入宿于州澤因言是日被朝旨二一令本路諸郡召土豪民兵禦敵節鉞而下皆充賞典一河北路諸處不得鼓唱民間起兵生事有礙和議同時行下兼傳聞斡里雅布已于十四日由大名府魏縣李固渡河今願大王暫留審議國事何栗罷以陳過庭為中書侍郎孫傅尚書右丞栗持不割三鎮之議甚堅朝廷既定議割三鎮故栗罷先是孫傅請復祖宗法度上問之對曰祖宗法惠民熙豐法惠國崇觀以來法惠姦侍御史胡舜陟言今日敵寇侵陵國勢危蹙豈可坐以待亡昔湯武髙光得賢為輔故成帝王之業今陛下所用皆非其人唐恪俗吏耿南仲腐儒何栗狂生聶昌凶人李回差勝亦迂濶獨陳過庭孫傅忠直然非經濟手今欲轉敗為功惟人才是先望擇所任天下幸甚耿南仲聶昌分使金軍許畫河金人欲割地須大臣報聘于是陳過庭以主憂臣辱首自請行南仲昌各以事辭詔免過庭而以南仲使尼堪軍割河東昌使斡里雅布軍割河北並為告和使與王汭等偕行南仲至衛州衛人欲叔同行金人王汭汭走南仲得脫遂如相州見康王王遂出榜召兵人情大恱昌至絳州諭令割地絳人不奉詔為鈐轄趙子清所殺刳其目碎切之昌附南仲至顯位每左右其説以誤國論卒至禍變天下以此罪之范致虛帥師入衛時知京兆府命為陜西五路安撫使乙酉斡里雅布犯京師朝廷以金去歲駐牟馳岡乃決汴水灌其地且置塘濼斡里雅布軍至城下遂屯劉家寺自唐恪耿南仲等散西南兩道兵至是四方兵無一至者城中惟衛士上四軍及中軍效勇京東西弓手十萬餘于是以萬人分作五軍備緩急救護命姚仲友辛亢宗分領之以五萬七千人分四壁守禦京畿提刑秦元集保甲三萬請先出屯自當一面禮部侍郎談世績亦謂宜遣元以所統分四寨直國門使兵勢相屬即金不敢逼城孫傅深然之而守禦使劉韐又奏悉取保甲自益元謀遂止凡四壁共十萬時有炮五百餘座在郊外皆棄不取兵部則曰屬朝係樞密院合收樞密院則曰自有所屬軍器監提舉內侍官也方以罪去京畿所則曰本非掌守禦也未守禦何預于我或謂駕部當收駕部則曰庫部當收至是反為敵用吳革纍乞出兵城外下寨使金不敢近城且遏東南道路及京城被圍又密具奏乞選日諸門迸出分兵期會為正兵為牽制為衝突為尾襲為應援出其不意可以制勝上惑于衆議不果從之大風拔木張叔夜帥師入衛初上以手詔趣叔夜提兵入衛叔夜即自將中軍二子伯奮伯熊將前後軍凡三萬人至尉氏遇遊騎轉鬬而前己丑至京師屯于玉津園至是勤王之師無一來者東道總管胡直孺為金生得以示城上都人益恐尋擢叔夜簽書樞密院以其兵入城同孫傅措置四壁叔夜與范瓊同襲金營不克復左右僕射滑州軍亂殺守臣閏月唐恪罷以何栗為右僕射恪無經濟大略從上巡城都人欲擊之因求去遂罷明年二月以金人來取恪恐不免飲藥而死尼堪陷鄭州守臣宋伯交遁時河東諸郡或降或破殆盡惟河北頗有堅守不下者陷懷州守臣霍安國通判林淵鈐轄張彭年都監趙士詝張諶于潛統制沈敦張行中及部隊將五百人皆死之初城既陷尼堪引州官及鼎澧將分四行立其前使畨官傳令問不肯降者為誰安國曰安國是宋朝守臣率衆不降又問淵等同對云某等與知州一體皆不肯降於是引令東北望金國拜降皆不屈尼堪令解衣反縳之遂害十三人而釋其餘安國一門幾無噍類明年贈延康殿學士尼堪犯京師召李綱尋除開封府尹金使來議和曹輔馮澥如金營尼堪復遣蕭慶等來議和且貸糧堅請上出城會盟乃詔都水監丞李處𣙜等為報謝使以書報之不受上以勤王之師不至時令挑戰以示敢敵然可用者獨衛士三萬每出數百人雖多獲級然亦十失五六至是亡已數千金使來請帝車駕暫出郊不從復請遣親王詔遣越王行將出金率兵以迎又止之於是金人聲言失信攻城甚急乃遣簽書曹輔左丞馮澥詣金請和尼堪即送之歸不交一談已而雲梯輻輳來者不已以康王構為天下兵馬大元帥初金攻城日急殿中侍御史胡唐老言聞康邸奉使至磁相間為士民所遏不得進此天意也乞就拜大元帥俾率天下兵入援宰臣視奏猶以大字為難唐老力爭曰今社稷危矣仰其拯國顧惜一大字非計也于是募敢死士得武學生秦仔等四人皆假閣門祗候齎蠟詔命康王為大元帥陳遘元帥宗澤汪伯彥副元帥速領兵入衛己酉仔至相州王捧詔拜泣軍民感動是日開府上密遣閣門祗候侯章賫蠟書促大元帥勤王十二月甲子章至相州白王曰陛辭日聖諭曰康王辟中書舍人隨行可令以便宜草詔盡起河北兵入衛于是王命耿延禧草詔頒之諸郡王在相州攝大名尹張慤力請王移行府以河水冰堅自相至大名府涉河而地里不遠密邇王室發勤王之兵為便也時京城獨久圍王既渡駐軍北岸天下申請四集取決于霸府矣河北守臣亦將兵漸至知磁州宗澤兵三千人知潞州王麟兵一千知德信府梁揚祖兵幾萬人馬千匹張俊苗傅楊沂中田師中皆在麾下王問揚祖以諸將孰優揚祖以俊對王亦喜俊自是常在左右王留揚祖為隨軍轉運使澤在磁州屢乞會兵奪李固渡斷敵歸路衆議不可澤自遣其將秦光弼張德領兵趨渡至安城縣金騎千餘人遇北門二將出東西門夾擊之遂斬首數百級獲其賫糧會帥府移文約赴大名遂還師先是諸軍至王大恱澤乞進兵援京師汪伯彥以澤為狂譎澤亦詆伯彥等為失䇿澤曰金人狡計百端豈可深信惟速進兵直指都城第言兵民欲見君父既兩國通和可亟退師如敵有詭謀即援兵已到無能為也伯彥等執和議之説不可進澤請自進兵從之大雨雪彗竟天丙辰京城失守自十一月二十五日被圍凡四十日是日午時陷先是有卒郭京者都人盛傳其能用六甲訣可以生擒尼堪斡里雅布何栗孫傅與內侍輩尤尊信傾心待之又有劉孝竭等召募衆或稱六丁力人或稱北斗神兵或稱天關大將大率效京有識者危之是日大啓宣化門出去不數百步時已天明京盡令守禦人下城獨與張叔夜坐宣化門甕城樓上以親兵數百自衛俄頃敵兵分四翼鼓噪而進前軍殱焉後者悉墜河城門急閉京白叔夜曰自下作法因下城引餘兵南遁敵兵登城者才數人衆皆披靡城遂陷王宗濋引殿班下城傳呼救駕四壁兵大潰金人因而上城統制姚仲友為軍士所殺仲友將種也自守禦以來往來東南西壁䇿應夙夜勤勞在諸將中最為有功初百姓毆殺東壁統制辛亢宗朝廷縱而不問仍赦罪故軍士縱恣如此蓋京師升平日久遊手浮浪最多除旅居外皆在火房浴堂匱坊雜居里巷強梁乘此擾攘聚衆作亂初仲友欲于京城置巡檢十六員各一正一副每員統兵五百人遇有警急則一正將帶二百五十人接應常留二百五十人在地分或有姦細乘勢作過以兵法從事仍置都巡三員以總其事仲友之意以小人喜亂欲設此以防姦也而朝廷不從至是獨先被害何慶言力戰死於城上內臣黃經督視東壁亦不敢去望闕號慟赴火而死四壁守禦使劉文慶與其子光國縋門出為追騎所殺張叔夜言敵鋒鋭甚願駐蹕襄陽以圖幸雍上然之叔夜連四日與敵大戰斬其金環貴將二人城破叔夜被創尤甚父子力戰皆死鬬殺傷相當然諸將無一人至者上聞城陷慟哭曰朕不用种師道言以至于此春初金人之去也師道嘗勸上半渡擊之不從曰異日必有後患至是果然是日都人爭入都亭驛取金使劉晏殺之時上四軍班直猶有萬餘人馬亦數千匹護駕人馬等皆欲奪門而出指揮使蔣宣李福率衛士數百人入祥曦殿欲護駕突圍而出上親撫諭之不退聞已和議乃散辛酉上如青城何栗陳過庭孫傅等從二帥相見初何栗率都民欲巷戰聞者爭奮由是斂兵不下仍偽唱和議人心稍安時李若水以出使留軍中二帥急令若水促何栗來議事若水入見上曰二帥止欲得兩河地别無他事乃遣栗及濟王栩為請命使二帥曰自古有南即有北不可相無也今之所議期在割地而已栗回言二帥請與上皇相見上曰朕當自往爾豈可使上皇相見哉辛未栗又至軍前二帥乃許上出是夜彗星竟天庚申日出赤如血而金人自攻太原以來即以講和割地為言李邦彥吳敏耿南仲唐恪皆墮其計時栗為右丞孫傅為尚書每朝議及割地必面折執政以為地不可割敵人志不在割地朝廷由是任之初無奇䇿足以濟難城陷乃反故意講和夫不信於造謀之始乃反信於破城之後辜天下之望致乘輿播遷由惑於和議而戰守不固也十二月癸亥上至自青城括金銀金人來索金三千萬錠銀三千萬錠縑帛如銀之數於是朝廷大括金銀命户部尚書梅執禮提舉根括而監察御史胡舜陟胡唐老姚舜明王俁副之自御馬而下在京共七千匹悉歸之遣使如兩河割地陳過庭劉韐折彥質三人其後過庭死於燕山尚書省火未幾天寶寺火延燒居民五百餘家雨雹丁未靖康二年五月髙宗皇帝即位改建炎元年金主天會五年春正月朔命親王二人如金營賀正尼堪遣其子真珠大王同金使八人來舊制正旦朝會御大慶殿諸國使人賀殿前列法駕儀仗百官皆冠冕朝服諸路舉人解首亦士服列班其服二梁冠白袍青緣諸州進奏官各執方物入殿諸國使人大遼大使頂金冠後簷尖長如大蓮葉服紫窄袍金蹀躞副使褁金帶如漢儀文使拜見立左足跪右足以兩手著右肩為一拜如漢儀夏國副使皆金冠短小朴製服緋窄袍金蹀躞皮靴叉手展拜髙麗與南番交州使人並如漢儀回紇皆長髯髙鼻以匹帛纒頭散批其服于闐皆小金花氊笠金絲帶袍束帶并妻男同來乘駱駝氊兜銅鐸入貢三佛齊皆瘦瘠纒頭緋衣上織成佛面又有南蠻五姓畨椎髻烏氊並如僧人禮拜入見旋賜漢裝綿袟之類更有真臘大理等國有時朝貢大遼使人在都亭驛髙麗在梁門外安州巷同文館回紇于闐在禮賓院諸畨國在瞻雲館懷遠驛惟大遼髙麗就館賜宴是歲正旦乃命景王杞濟王栩如金帳致賀都人感傷繼之以泣大風霾是月西北陰雪中有如火光庚子上如青城金索金銀益急欲縱兵入城且遣使來曰農務方興將歸矣徽號事當面議原闕盜犯德安府陳規敗之權府事陳規率兵民固守先是規知安陸縣率民兵數千援京師路梗不能達還及遼上會盜祝進攻德安守臣李公濟遁父老迎規攝府規率軍民禦進却之後又來攻城凡十有七日而去劉韐死於金營韐守真定有威名金人知之欲用為尚書僕射許以家屬行韐不可手書片紙遣人遺其子曰忠臣不事二君此豫所以必死也乃以衣帶自經于城南夀聖院中興贈資政殿大學士諡忠顯韐初在陜西為童貫所知及是能以忠死議者不以前失所從為韐罪云徐揆死於金營太學生徐揆及丁特起王若海何剡等各為一書欲遺二將留守司不許揆獨詣南薰門誑言獻金銀金遣騎取揆赴軍中揆出書略云京城金銀根括盡願班師振旅緩以嵗時使求之四方然後遣人入獻二將見書詰難揆厲激抗論為所殺黃時甫繼亦貽尼堪書責其久留車駕且謂內侍監訴醫官周道隆為幸濫渠魁今取過軍前坐席未暖乃忘我宋朝前日恩寵妄興間諜稱有金銀窖藏在家則是前日故違根括指揮若使未過軍前則人人蓄為私藏貪吝悖逆合誅戮乞賜行遣徇首京師樞密院編修胡瑀亦為書貽尼堪曰原闕金犯蔡州知鄂州崇陽縣李涓死之時以羽檄召天下兵入援鄂部縣七當發三千人涓召募才十日鋭意欲奮或謂涓盍徐之以須衆集涓曰事急矣當持一信報天子為東南倡即日引而東過蔡而蒲圻嘉魚二邑之師至合而前天大雪蔡之保甲譟而奔曰金至矣即整陳以行少焉遊騎微集涓馳馬先犯其鋒下皆步兵蒙鹵楯徑進頗殺其騎騎且走涓乘勝追北約十里許大與金遇飛矢蝟集二邑兵引去吏士無人色視涓獨留不忍舍之歸創甚猶被血大呼叱左右負已以戰遂遇害死明年金退蔡人以涓尸歸朝廷録其忠贈朝奉郎官其三子云二月朔上在青城丁卯太上帝后如青城原闕辛未皇后皇太子如青城初南壁統制官吳革聞上皇已出入白孫傅請力留皇后皇太子且為傅畫計乃于啓聖院置局賑濟所募士就食者至萬計革陰以兵法部勒且告急于康王及在外諸大臣約日大舉至是革請以所募十微服潰圍以出傅不許革遂陳請不已傅不聽傅在皇城司其子來省傅叱之曰吾已分死國矣汝曹速速去勿亂人意范瓊恐生變先以危言讋衛士原闕按唐末五代國璽不存周廣順中造二寶一曰皇帝承天受命之寶一曰皇帝神寶我太祖傳之太宗即位乃更製寶如周承天之文真宗亦自作寶而更其文曰皇帝恭膺天命之寶自此纍朝即位皆仍此文作新寶仁宗明道元年以為火所焚又更製焉英宗之初令歐陽修篆文以製新寶范鎮之請王圭等之議皆謂不當改作言格不用因鎮之奏乃知纍朝此寶皆從葬也神宗哲宗亦循此製今金所取白玉之寶十有四其中有恭膺天命之寶二者即上皇與今上之所製也其他不復録李若水王履死於金營原闕獨吏部侍郎李若水大呼罵金金擊之面目為傷若水氣絶仆地良久乃蘇使人監視日三飯飲之若水絶不食金怒囚之若水母張氏聞變哭且言曰吾子死難必矣至是尼堪再召若水去若水知金不可以義動因歷數其失信五事肆罵不已尼堪大怒即以圜丘下敲殺之若水將死奮罵益切敵相謂曰大遼之破死義者十數今南朝惟李侍郎一人初若水之出使也修武郎王履副之使還進觀察使抗金不回卒以俱死履臨被害略無懼色且歌詩末句云矯首問天兮天卒無言忠臣效死兮死亦何愆人聞而悲之若水死年三十五中興贈觀文殿學士諡忠愍復贈武勝節度康王次濟州元帥府官軍及羣盜歸來者凡八萬人分屯于河北諸郡而向子諲在宿何志同在河趙野范訥在宋趙子嵩在陳皆圍繞京師未得進先是王黻魏伯芻變河北鹽稅為鹽鈔法専置提舉官賣鈔於𣙜貨務及京師道梗商不能通張慤建議即元帥府印給鹽鈔許鹽商詣河北漕司大名安撫司輸錢取鹽于逐州鹽場不閲旬得緡錢五十萬佐軍興公私賴其利金犯雷澤縣尉宋拱敗之金遊騎至縣尉宋拱禦之拱勇而有謀先繫繩桑下金至挑戰已而偽遁金追奔馬絓而止悉斬之大風拔木金人責金銀殺從臣梅執禮等四人户部侍郎梅執禮禮部侍郎陳知質刑部侍郎程振給事中安扶並坐根括金銀不登為金人所殺其副御史胡舜陟胡唐老姚舜明王俁杖數百幾死於是再括留守司差官百員分坊巷遍括左諌議大夫洪芻等詣懿親蕃衍宅原闕延寧宫火元祐孟皇后緣是出居相國寺前之私第初上與李若水大更張弊政乃尊后為元祐皇太后已草詔書未及行也時六宫有位號者皆從二帝以行惟后以廢得存三月朔上在青城金納張邦昌原闕吳革謀起兵范瓊誘殺之初革既募兵遷居同文館附者至數萬人又引太學吳銖朱夢説徐仁等數十人與參謀議革率衛士殺妻子以圖迎二帝欲奉九廟神主以從軍先誅范瓊等數十人乃命兵突出十八門期用三月八日舉事與謀者惟兵部尚書吕好問監察御史馬伸張所奉議郎致仕吳給等數人革將起兵其參議吳銖等曰事急矣緩則且有不測之禍是夜班直班廣等數百人排闥曰邦昌以翌日受䇿請舉事革以衆不可奪被甲上馬時已黎明北行至咸豐門四面皆瓊兵瓊遂與權主管殿前司公事左言誘紿革至帳下議事遂斬之其徒百餘人併戮河上革至死顔色猶不少變革為人天資忠勇天文地理人事兵機無不通死之日知與不知皆為泣下丁酉金以張邦昌僣位偽號楚原闕是日風霾日色薄而有暈百官皆慘怛邦昌亦變色惟王時雍吳开莫儔左言范瓊等欣然若有所得原闕邦昌不御正殿不受朝不三呼及稱聖旨與執政侍從坐議必自稱名遇金人至則為易服禁中諸門悉緘鐍題以臣邦昌謹封易詔曰手書邦昌尋以胡思權户部侍郎葉宗諤權司農少卿胡直孺户部尚書前諌議范宗尹吏部侍郎謝京家落致仕中書舍人李擢並仍舊職李寧靖詹義並權直學士院王時雍權樞密院兼領尚書省吕好問領門下省徐秉哲領中書省尚書左丞馮澥守舊職李回權右丞吳幵同知樞密院事莫儔簽書樞密院事周懿天開封尹王及之權都水使者大抵往來議事幵儔也逼逐公卿以下者時雍秉哲也脅懼都人者范瓊也遂皆擢用李回靖康初簽書樞密院事及是前執政在城中者惟回一人馮澥曹輔留金營邦昌素善澥將歸之而輔不在請中故以回補其處時雍既受命請用二府蓋韉許之時雍蜀人也在蜀為市伍圖利小人謂之三川牙郎至是都人又號為賣國牙郎幵儔為金來須索朝暮往還敵中有捷疫鬼王之號尼堪斡里雅布有了事官人之稱都人亦目之為賣國吳牙時雍等領三省事及郎官王及之王紹皆擅政每以佐命功臣自許士夫切齒因呼三王及之等又命有司籍隆德二宫寶貨賣靈沼魚藕以贍百官御史馬伸檄之曰古者大臣去國三年不反然後收其田里今雖危而車駕之行止未決爾等輒敢取兩宫物逆節甚矣力爭乃止之初有司趣百官入賀太學博士孫逢獨堅卧不屈夜既半同寮強起之不從至垂泣而與之訣事畢有司舉不至者欲以復于金以逢及駕部員外郎喻汝礪為請邦昌以畢至告乃得免逢聞之曰是必將肆赦遷官以重汚我我其可俟遂發疾而死未幾考功員外郎虞譽太學博士朱震並致仕工部侍郎何昌言請言更名善言其從弟亦更名知言徐俯致位居城中買一婢名之曰昌妼遇朝士至即呼前驅使李熙靖時以顯謨閣奉祠始邦昌與熙靖直學士院熙靖拒之因憂憤不食疾且篤謂家人曰百官何日再朝天乎泣數行下未幾卒中興贈延康殿學士禮部侍郎談世績既得歸邦昌命權學士院而世績稱疾堅卧不起邦昌知不可奪遂已後贈延康殿學士諡端潔宗澤敗金于長垣初朝廷徇金意欲遣曹輔往河北迎康玉何栗請上于輔原闕屑書語以傳密旨輔言不見王而還金人又趣再遣中書舍人張徵以蠟封詔行徵至開德語諸將未可進兵澤怒命諸將射之徵與同行金人俱遁澤約諸帥會兵五旬無一人至者澤回願擊金引諸將議之都統制陳淬曰金方熾未可輕舉澤將斬之諸將羅拜乞貸淬使得效死乃命淬當先以贖罪遂進兵未十里與金遇出金不意敗之于長垣澤既敗金遂得韋城縣金欲夜襲澤澤知之日暮移軍南華敵果夜至得空壁大驚自是不復出澤在軍中與士卒同甘苦故人樂為用澤為書與諸道勤王帥勸督兵入援趙野曽楙范訥皆以澤為狂不答澤自南華遣兵過大溝河襲金金人敗之時四方勤王之師只留近甸惟澤力戰及至冀州權邦彥亦領兵與澤同抵韋城澤獲敵所掠人知二帝將北行謀引兵渡河據敵歸路而對壘諸寨一夕解去澤號慟即自臨濮引兵趨滑州抵大名城而勤王之兵無一人至者又知張邦昌僣位擬先行誅討乃將所部復還屯衛南復貽書康王言今日國之存亡在大王行之得其道與不得其道耳所謂道者其説有五一曰近剛正而遠柔邪二曰納諌諍而拒諂諛三曰尚恭儉而抑驕奢四曰體憂勤而遠逸樂五曰進公實而退私偽澤謂所親曰怨結王之左右矣不恤也時發運使翁彥國起東南數萬兵至泗州不行知州事解公望以京城望救責之彥國怒持軍趕程渡淮而進初金人以兵五萬守潼關捍西來之兵陜西制置使錢蓋統兵十萬至潁昌聞京城已破蓋遂棄大兵挈家往湖北由是荆定至荆門一路騷動陜西宣撫范致虛自長安引兵十萬勤王日與金戰攻奪潼關既得關乃引兵東去遂至陜府尼堪遣將精卒鋭騎擊致虛前軍敗之致虛不敢進駐兵潼關以疑敵而已先是禆將李彥仙説曰陜為軍後盍少遺之行兵者利速多為支軍則舍不至淹敗不至覆不然衆屯聚出殽澠一蹴於險阻則敗矣致虛不聽有傅亮者開州人知古兵法种師道嘗薦之召亮赴闕亮聞命募兵得數千至陜聞敵登城即兼程而去陳蔡間羣盜皆為亮所殺京西安撫使和志同以便宜假亮官為統制率之以行亮軍嚴整所至秋毫不犯自朱仙鎮直抵韋城尼堪後軍大驚狼狽而去遺絹數萬匹軍士畏亮不敢取翟興復西京斬金留守髙世由范致虛既敗統制翟興興族弟進提兵數百潛入洛陽擒世由及金隨軍轉運張友極斬之友極前為河東轉運世由知澤州金人再入以城降為金用金置河北河東統軍敏珠爾貝勒為河北統軍屯濬州阿里哈貝勒為河東統軍斡里雅布退原闕夏四月庚申朔原闕原闕尼堪退原闕江寧府軍亂軍校周德等率衆叛執知府宇文粹中殺通判王導鈐轄王宗韓及曹掾官七人嬰城自守張邦昌降偽赦赦與覃恩同但改敕字為手書而已時四方勤王兵大集吳幵莫儔為邦昌謀令散諸路故偽赦首及之其文著作郎顔博之所草也邦昌又遺范訥范致虛錢蓋翁彥國劉光世等手書外題云付某人內云邦昌上某官仍用內侍省印發運副使向子諲在亳州邦昌遣其甥劉達賫手書以往子諲不啓封而焚之械繫達于獄遣使勸進於康王邦昌手書至虹縣縣令以下迎邦宣讀如常式武尉徐端益獨不屈膝而走事定子諲言于朝廷易文資國學生遊相上書請邦昌歸政康王不報汪伯彥譛殺俟章先是黃潛善遣張宗至京知金人立張邦昌事宗既歸道逢俟章具以告之章走濟州言曰事既如此諸公别無措置奈何且以言侵伯彥等伯彥請誅之康王再三不可伯彥力請以其鼓惑三軍遂斬之癸亥元祐皇后復居延福宫其䇿語有曰尚念宋氏之初首崇西宫之禮蓋用太祖即位迎周太后西宫故事識者有以覘邦昌之意非果真為趙氏也先是監察御史馬伸言于邦昌曰伏見金人犯順且逼立相公使主國事相公所以忍死就尊位者自信金退必能復辟也忠臣義士不即就死城中之人不即生變亦以相公必立趙孤也今金退多日吾君之子亦已知所在訟獄謳歌又皆歸往相公尚處禁中不反初服未就臣列以為外挾強金之威使人遊説康王且令南遁然後為久假不歸之計一旦喧閧孤負初心望速行改正易服歸省庶事取太后命而行仍速迎奉康王歸京日下開門撫勞勤王之師以示無間應內外赦書施恩惠收人心等事權行拘收俟立趙氏日然後施行庶幾中外釋疑轉禍為福不然伸有死而已必不敢輔相公為宋朝叛臣也自邦昌僣立凡言事者皆用君臣之禮至馬伸始貽書稱太宰相公書入邦昌命一切啓王尋降手書迎太后入居禁中庚午垂簾聽政邦昌以太宰退處資善堂邦昌僭位至是凡三十三日甲戌降手書迎康王手書曰比以敵國興師都城失守祲纒宫闕既二帝之蒙塵誣及宗祊謂三靈之改卜衆恐中原之無統姑令舊弼以臨朝遂成九廟之安坐免一城之酷緬惟藝祖之開基實自髙穹之眷命厯年二百人不知兵傳序九君世無失德雖舉族有北轅之釁而敷天同左袒之心乃眷賢王越居近服已徇羣臣之請俾膺神器之歸由康邸之舊藩嗣宋朝之大統漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在兹為天意夫豈人謀尚期中外之協心同定安危之至計庶臻小愒漸底丕平用敷告于多方其深明于吾意時侍御史胡舜陟上疏請后降詔諸路使知中國有主康王即位有日以破亂臣賊子之心吕好問言今日布告之書當明白易曉不必須詞臣遂命太常少卿汪藻草書御封付御史臺看詳然後行下原闕王時雍徐秉哲奉乘輿御服來迎邦昌率百官表勸進略曰使生靈相顧以無歸雖溝瀆自經而奚益輒慕周勃安劉之計庶幾程嬰存趙之心其表亦汪藻為之邦昌繼至伏地慟哭請死王待以客禮且慰撫之九朝編年備要卷三十
