body:
  text: 九朝編年備要卷十六宋陳均撰仁宗皇帝起己亥嘉祐四年止癸卯嘉祐八年己亥嘉祐四年契丹清寧五年春正月丙申朔日有食之用牲於社去冬詔以明年日食正旦避殿減膳知制誥劉敞言天明雖有可畏之道然亦當稽古率禮然後為允按三代之典日食無預避之事左氏傳稱避移時曽子問諸侯入門不得行禮者日食居其一此覩有變而戒非早備也先王制禮過之者猶不及其制法先時者與不及時者均貴得中而已至是敞又言臣前論先期避殿不中古典未蒙省察今又聞遣官祭社稽之於經亦未見此禮蓋社者上公之神羣隂之長故曰日食則伐鼓於社所以責上公退羣隂今反祠而請之是屈天子之禮從諸侯之制抑陽扶隂降尊貶重此乃日之所由改變非承天戒尊朝廷之意也右正言吳及言日食者隂陽之戒在人事則臣陵君妻乘夫四夷侵中國今大臣無姑息之政非所謂臣陵君失在陛下淵默臨朝使隂邪未盡屏也后妃無權橫之象非所謂妻乘夫失在左右親幸驕縱亡節也羌戎順服非所謂四夷侵中國失在將帥非其人為彼所輕也因言孫沔在并州苛暴不法燕飲無度龎籍前在并州輕動寡謀輒興堡寨屈野之衄為國深恥沔卒坐此廢二月弛茶禁嘉祐初元之冬始用薛向議罷並邉入中粟自京輦錢帛至河北專以見錢和糴惟入中芻豆則仍計直給茶行之未久論者謂輦運科折煩擾居民且商人入錢者少芻豆虛估益髙茶益賤詔學士韓絳等即三司經度絳言自改法以來邉儲有備商旅頗通未宜輕變惟輦運之費宜從官給舊輸稅絹者毋得折錢其入中芻豆勿給茶平其市估至京以銀紬絹三物償之皆從其說自是茶法不復為邉糴所須而通商之議亦起矣初茶法屢變歲課日削至和中并本息計之才百六十七萬餘緡自景祐中葉清臣建通商之議不行至是著作佐郎何鬲三班奉職王嘉麟又皆上書請罷給本錢縱園户貿易而官收租錢與所在征算歸𣙜貨務以償邉糴之費而淮南轉運副使沈立亦集茶法利害為書上之陳通商之利輔臣富弼韓琦曽公亮等決意向之力言於上去冬九月命韓絳等即三司置局遣官分行六路詢其利害至是還言如三司議便乃詔罷之以三司歲課均賦茶户凡為緡錢六十八萬有竒使嵗輸官比輸茶時其出幾倍朝廷難之為損其半歲輸緡錢三十三萬八千有竒謂之租錢與諸路本錢悉儲以待邉糴罷十三山場六𣙜貨務惟臘茶如舊餘茶肆行天下矣茶禁既弛論者以茶户困於輸錢商賈利薄販鬻者少其後劉敞復請收前令詔擇其利害變而通之歐陽修言新法有五害望除去前令時朝廷方排衆論而行之卒不聽及治平中歲入臘茶散茶凡七十萬餘斤茶户租錢三十萬餘緡又儲本錢四十七萬餘緡而內外總入茶稅錢四十九萬餘緡史臣曰推是可見茶法得失矣交趾寇邉親試舉人賜劉輝等以下一百六十餘人及第出身有差授官如三年閏十二月詔書蓋以科舉既數嘗有詔裁損進士髙第及制科入等恩數自是驟顯者鮮而所得人才及其風迹比舊亦寖衰三月以包拯為三司使初拯為御史中丞彈三司使張方平賤買豪民産事方平罷去遂代以宋祁拯復論祁在益州燕飲過度且其兄庠方執政不可任祁亦罷去而以拯代之於是翰林學士歐陽修復言拯既排擊二人不當代其任所謂牽牛蹊田奪牛已甚拯避位久之方出尋遷樞副卒於七年夏諡孝肅拯性峭直而奏議平允常惡俗吏苛刻故務為敦厚雖疾惡甚至人情所不及即推以忠恕未嘗為色辭以悅人不作私書親故干請一皆絶之夏四月録周後以柴氏子為崇義公給田十頃令奉周祀復銀臺司封駁制以何郯同知通進銀臺司兼門下封駁事郯上言本朝設此司實代給事中封駁之職乞準王曽王嗣宗故事凡有詔敕並由銀臺司從之時殿中丞龍昌期上所注書賜緋及絹百匹郯言昌期嘗毁周公異端之學不可長也詔追其賜五月詔內臣權罷進養子始用吳及議也初至和元年及為審刑院詳議官疏言臣輒原刑法之本以效愚忠竊惟前世肉刑之設漢文易以鞭箠然已死而笞未止外有輕刑之意而其實殺人我祖宗始用折杖之法蓋曠古聖賢思所未至宜乎天降之祥而未享繼嗣之慶意者宦官太多也何則肉刑之五一曰宫今宦官之家競取他子希求爵命童幼何罪陷於刀鋸因而夭死夫有罪而宫前王不忍况無罪乎漢永平間中常侍四員小黃門十人爾唐太宗定制毋得踰百員且以近事較之祖宗時幾何人今幾何人望宦官進子一切權罷則天心應而聖嗣廣矣書奏上異其言欲用為諫官而及以父憂去矣除猜防大臣條約詔前此兩制不許至執政私第執政所薦士不得充臺官法並除之命江寧府等州官臣兼鈐轄洪潭揚廬越福並兼本路鈐轄六月却尊號請加尊號曰大仁至治知諫院范師道言比災異數出而崇尚虛文非所以答天戒知制誥劉敞亦曰尊號非古也陛下尊號盡善盡美矣復加大仁至治不足增光盛德且自寶元以來不受徽號今二十年奈何一旦增虛名而損實美上曰朕意亦謂當如此奏五上不許申嚴閉糴禁從諫官吳及之請也及言春秋有告糴今官司擅造閉糴之令豈陛下子育兆民之意哉乃詔諸路轉運使鄰路鄰州輒閉糴者以違制論秋七月出宫人先以月食幾盡修隂教以應天變也出二百餘人至是復出其數如之初劉氏在掖庭通請謁為奸御史中丞韓絳密以聞上曰非卿言朕不知此當審驗之後數日出劉氏及他不謹者且詔中書召絳諭意劉氏及黃氏在十閣中尤驕恣者也於是并黃氏皆出之八月䇿制科陳舜俞錢藻汪輔之並入第四等言者以輔之無行罷之輔之躁忿因以書誚譏富弼曰公為宰相但奉行臺諫風旨而已弼不能答冬十月大祫於太廟先是上將親祫下禮官集議東向之位同判宗正寺趙良規請正太祖東向位而知太常禮院韓維以為宜如祖宗故事虛東向之位便時禮官不敢決乃與待制以上臺諫官同議曰太祖為受命之君然僖祖以降四廟在上故大祫止列昭穆而虛東向魏晉以來已用此禮今親享之盛宜如舊便詔恭依禮官張洞韓維請以孝惠孝章淑德章懷四后享於别廟不升合食上重其事詔兩制集議而孫抃胡宿李昭述楊安國向傳式劉敞王疇何郯八人曰按春秋傳大祫未毁廟之主皆升合食於太祖國朝至祫之日别廟后主皆升合食子孫遵用未易輕改傳曰祭從先祖如其故便歐陽修吳奎陳升之包拯韓絳錢象先唐介盧士遜九人曰古者廟制皆一帝一后後世有以子貴者始著並祔之文其不當祔者又有别廟之祭本朝禘祫乃以别廟之后列於配后之下於古無聞若以為行之已久重於改作則是失禮之舉無復是正也請從禮官於是敞特奏曰今羣臣不務推原春秋之法而獨引後儒疑近之說不務講求本朝之故而專倡異代難通之制不務將順主上廣孝之心而輕宗廟久行之儀欲擯隔四后使永不得合食臣竊恨之夫宗廟之禮神靈之位豈可使舉措數有後悔哉當留聖念初上春秋髙議者恐上勞拜起禮官遂咸造此議上微聞之及得敞奏謂近臣曰朕初謂禮當然茍以拜起為煩朕猶能之何憚也乃詔别廟四后祫享如舊俟大禮畢别加討論時胡宿當草詔自主其所議然自後亦不復議御製祫享舞名文舞曰化成治定武舞曰崇功昭德上自製迎神送神樂章詔宰臣富弼等撰大祚至采茨曲調十八升益并州為成都太原府韓琦之在太原也乞復并州為節鎮詔兩制議之翰林學士胡宿以為堯遷閼伯於商邱主火而商為宋星遷實沈於大夏主水而參為晉星國家受命始於商邱王以火德又京師當宋之分野而并為晉地參商仇讐之星今欲崇晉非國之利也自宋興平僣僞并最後服太宗削之不使列於方鎮幾八十年謂宜如舊制上是宿議及琦秉政因祫享赦書卒復之宿又以為言不報減河南民丁錢米十一月汝南王允讓薨後追封濮王諡安懿為大宗正二十年宗族懷其恩而畏其嚴以牧地賦貧民是嵗初以諸防監及諸軍牧馬所用餘田賦貧民耕種庚子嘉祐五年春正月隕星東南有聲如雷同知諫院范師道上疏曰漢晉天文志天狗所下為破軍殺將伏尸流血甘氏圖天狗移大賊起今備邉防盜未見其至雖有將帥不老則愚士卒雖多徑勇者少夷狄可保也如州郡何州郡可保也如盜賊何必有包藏險心投隙而動者宜簡拔將帥訓練士卒詔天下為備上晚年尤恭儉而四方無事師道言事人稱其介直穿二股渠用河北都運韓贄議穿四界首二股渠分河流入金赤河夏四月詔均稅命近臣同三司均之才均數郡言者以為不便而止五月京師地震龎籍致仕籍自定州詔還既入見詣中書白執政求致仕執政曰公康寧如是且上意方厚奈何欲去之堅也籍曰若待筋力不支人主棄厭然後去斯不得已爾豈得為止足哉遂歸卧於家前後凡七上表其劄子不可勝數乃許之置寬恤民力司詔三司置之尋遣官分路訪寬恤民力事以王安石為度支判官安石獻萬言書極陳當世之務略曰陛下有恭儉之德聰睿之才而仁民愛物之意未孚於天下又公天下而選輔相屬之以事而不疑宜其天下大治而效不至此者患在法度雖多而不合先王之政故也今去先王之世既遠而欲一一以修先王之政雖甚愚猶知其難臣謂當法其意而已然今天下之才不足以承所使一路之間能修其職者甚少其能講先王之意以合時變者往往而絶夫人才不足陛下雖欲更改而孰能稱㫖然則今之所急在人才而已先王之於人才教之養之取之任之皆有其道今雖州縣有學而不能長育人才太學之官未嚴其選而禮樂刑政之事非已之所當知而所以教之者誦說課試而已故雖白首於庠序而不知從政之方又古之教士以射為急射為男子之事既朝夕從事於此則能者衆而邉疆宿衛之任皆可擇而取之也夫士以行義見推於鄉黨矣然後因其才而託之以邉疆宿衛之事此所以無虞今乃以邉疆宿衛之任而屬之奸悍無賴之人所以常憂而不足恃此教之非其道也方今制祿大抵皆薄州縣之吏月所得錢多者八九千少者四五千雖厮役之給不窘於此而欲士之無毁廉恥蓋中人之所不能也故官大者交賂遺營資産官小者販鬻乞丐無所不為今天下公私常以困窮為患者殆亦理財未得其道而有司不能度世之宜而通其變耳誠能焉雖增吏祿不足以傷經費此養之非其道也方今取士賢良方正與進士之髙者皆公卿之選也夫此二科不足以為公卿不待論而後可知而議者乃以為吾常以此取天下之士而公卿亦常出於此不必法古之取人然後得士也其亦蔽於理矣今悉廢先王取士之道而驅天下之士使為賢良進士固宜有時而得才之可以為公卿者也然而不肖者茍以此進亦至乎公卿使不肖之人幸而至乎公卿因使推其類聚之朝廷所以多不肖之人雖有賢知往往困於無助不得行其意此皆取之非其道也今取之既不以其道至於任人不問其德之所宜而問其出身之後先不論其才之稱否而論其歷任之多少以文學進者且使之治財又轉而使之典獄又轉而使之治禮是則一人之身而責之以百官之所能備宜其人才之難也夫在位非其人而恃法以為治自古及今未有能治者也此任之非其道也夫教之養之取之任之有一非其道則足以敗天下之人才况兼四者而有之則在位少可任之才固不足怪臣願明詔大臣思以陶成天下之才茍人才不勝其用則陛下何求而不得何欲而不成哉臣又觀朝廷異時欲有所施為變革其始計利害未嘗不熟也顧有一流俗僥幸之人不悅而非之則遂止而不敢為夫法度立則人無獨蒙其幸者陛下誠有意於天下則臣又願斷之而已六月交趾寇邉都巡檢宋士堯死之秋七月京西分南北路許州兼北路鄧州兼南路安撫河南府即不𨽻所部八月蘇洵試校書郎初歐陽修上洵所著書韓琦善之召試舍人院再以疾辭至是抃又薦之乃就除卒於治平三年初王安石名始盛黨與傾一時歐陽修亦善之勸洵與遊洵曰吾知其人矣作辨奸論略曰面垢不忘洗衣垢不忘浣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書此豈其情也哉凡事不近人情者鮮不為大奸慝洵既沒三年而安石用事其言果驗置陜西估馬司命薛向領之時有詔修馬政命學士吳奎等經度之奎等言牧馬在於得人汧渭之間未嘗無牧而非子獨能蕃息於周河隴之間未嘗無牧而張萬歲獨能蕃息於唐此得人之效也然得人而不久其任久其任而不使專其事專其事而不臨之以賞罰亦不可以有功今陜西馬價多出解鹽復領陕西財賦可專委之仍俾擇地置監益市西馬牧之乃命向専領本路監牧及買馬事仍置買馬場於原渭州德順軍而羣牧使歐陽修又言今之馬政皆因唐制而馬多少不同者唐牧地皆與馬性相宜今或淪異域或為民田請下河東京西訪草地置監河北諸監有不宜馬者可行廢罷罷同提㸃刑獄置轉運判官江南等十一路冬十一月罷內臣寄遷法趙槩言御藥院內臣有遷官至遙領防團者謂之暗轉於是詔自今當轉出外而特留者毋得纍寄所遷資序十二月以吕公弼知成都府公弼初至人疑其少威斷㑹營卒犯法當杖不肯受曰寧請劒不能受杖公弼再三諭之不從乃曰杖國法不可不受劒汝所請亦不汝違也命杖而後斬之軍中肅然辛丑嘉祐六年春二月親試舉人賜王俊民等及第出身有差三月富弼罷以母喪去位罷大燕以富弼丁母喪故也同知禮院晏成裕言君臣之義哀樂同之請罷春燕以表優恤大臣之意上亟從之夏四月以包拯為樞密副使解唐介等言職初除陳旭為樞密副使或言旭因結宦者史志聰王世寧等故有此命諫官趙抃御史范師道吕誨等遂交章論列上以章示旭旭奏臣前任言職彈斥內臣如楊懷敏何誠用武繼隆劉恢輩多坐黜逐今言者乃以汙臣乞付吏辨遂家居求罷上手詔出之介等復闔門待罪頃之復出如是者數四上詔輔臣曰凡除拜二府朕初豈容內臣預議耶介等章十七上遂兩罷之旭知定州介洪州抃䖍州師道福州誨江州初嘉祐四年夏師道同知諫院上言竊聞諸閣女御以董周育公主御寶宣制並為才人不自中書出詔而掖庭覬覦遷拜者甚多董周之遷可矣女御何人而遷乎才人品秩既髙古有定員若使諸閣皆遷則不復更有員數矣且一才人之俸月直中户百家之賦况誥命之出不自有司豈盛世之事耶恐斜封墨敕復見於今日矣五月授顔復等官先是諸路舉行義文學之士二十三人至者十六人皆館於太學即舍人院試論䇿賜出身五人辭不能試亦以試將作監主簿命之六月壬子朔日有食之初司天監言當食六分之半至是食四分而雲隂雷雨渾儀所言不為灾中丞王疇言頃歲日食正陽實亦隂晦羣臣集班表賀甚非陛下畏天之意同判禮部司馬光亦言日食京師不見四方須有見人天意若曰人君為隂邪所蔽災慝甚明天下皆知其憂危而朝廷獨不知爾蝕不及分者歷官當治其罪而羣臣皆欲稱賀上下相蒙詔毋賀富弼辭起復故事執政遭喪皆起復弼謂兵革變亂不可用於平世上五遣使起之卒不從以王安石知制誥去冬除安石及司馬光同修起居注光五辭而後受安石終辭之後復命之辭至七八月乃受於是徑遷知制誥安石遂不辭官矣嘗有詔舍人院不得申請除改文字安石言若詞頭所批事情不盡而不得申請自非大臣欲傾側為私則立法不當如此陛下舉天下之事屬之七八大臣大臣之弱者則不敢為陛下守法以忤諫官御史强者則恣行所欲諫官御史亦無敢忤者陛下方爾聽其所為而無所問安有朝廷如此久而無亂者乎安石由是與執政忤秋七月司馬光入對光時同知諫院進三劄一論君德有三曰仁曰明曰武仁者非嫗喣姑息之謂也興教化修政治養百姓利萬物此人君之仁也明者非煩苛伺察之謂也知道誼識安危别賢愚辨是非此人君之明也武者非强亢暴戾之謂也惟道所在斷之不疑奸不能惑佞不能移此人君之武也故仁而不明猶有良田而不能耕也明而不武猶視苗之穢而不能耘也武而不仁猶知穫而不知種也三者兼備則國治强闕一則衰闕二則危闕三者無一焉則亡自生民以來則未之或改也臣不勝區區觸死忘生竊見陛下天性慈惠謹微接下子育元元泛愛群生雖古聖王之仁殆無以過然自踐阼以來垂四十年夙夜孜孜以求至治而朝廷紀綱猶有虧缺閭里窮民猶有怨歎意者羣臣不肖不能宣揚聖化將陛下之於三德萬分一亦有所未盡歟臣聞春秋傳曰慶賞刑威曰君臣幸得以終起居注日侍黼扆之側伏見陛下推心御物端拱淵默羣臣各以其意有所敷奏陛下不復詢訪利害考察得失一皆可之誠使陛下左右前後股肱耳目之臣皆忠實正人則如此至善矣或出於不意有一奸邪在側豈可不為之寒心哉夫善惡是非與混淆若待之如一無所别白或知其善而不能賞知其惡而不能罰則善者日懈惡者日勸善者懈惡者勸雖有堯舜禹湯文武之君稷契伊吕周召之臣以此求治猶鑿氷而取火適楚而北行也伏望陛下少垂聖思以推天地之至仁廓日月之融光奮乾剛之威斷善無微而不録惡無細而不誅則唐虞三代之隆何遠之有其二論御臣曰臣聞至治之道無出在三而已一曰任官二曰信賞三曰必罰國家纍日月以進秩循資歷而授任又采名不采實誅文不誅意陛下誠能博選在下之士有德行者掌教化有文學者待顧問有政術者為官長有勇略者為將帥有功則增秩加賞而勿徙其官無功則降黜廢棄而更求能者有罪則流竄刑誅而勿加寬貸如是而朝廷不尊萬事不治百姓不安四夷不服臣請伏面欺之誅其三論揀軍言務精不務多止以其一留中其二送中書其三送樞密院光疏千餘言未幾復言數赦之弊繼又進五規曰保業曰惜時曰遠謀曰謹微曰務實其保業略曰天下重器也得之至艱守之至艱王者始受天命之時天下之人皆我比肩也相與角智力而爭之智竭不能抗力屈不能支然後肯稽顙而為臣當是之時有智相偶者則為二力相參者則為三愈多則愈分自非智力首出於世則天下莫得而一也斯不亦得之至艱乎及夫繼體之君羣雄已服衆心已定上下之分明强弱之勢殊則中人之性皆以為子孫萬世如泰山之不可搖也於是有驕惰之情生驕者玩兵黷武窮泰極侈神怒不恤民怨不知一旦渙然四方糜潰秦隋之季是也惰者沈酣宴安慮不及遠善惡雜糅是非顛倒日復一日至於不振漢唐之季是也二者或失之强或失之弱其致敗一也斯不亦守之至艱乎臣竊觀自周室東遷以來王政不行諸侯並僣分崩離析不可勝紀凡五百有五十年而合於秦秦虐用其民十有一年而天下亂又八年而合於漢漢為天子二百有六年而失其柄王莽盜之十有七年而復為漢更始不能自保光武誅除僣僞凡十有四年然後能一之又一百五十有三年董卓擅朝州郡瓦解更相吞噬至於魏氏海內三分凡九十有一年而合於晉晉得天下才二十年惠帝昏愚宗族搆難劉石乘釁濁亂中原散為六七聚為二三凡二百八十有八年而合於隋隋得天下才二十有八年煬帝無道九州幅裂八年而天下合於唐唐得天下一百有三十年明皇恃其承平荒於酒色養其疽囊以為子孫不治之疾於是漁陽竊發而四海橫流矣肅代以降方鎮跋扈號令不從朝貢不至名為君臣實為讎敵陵夷衰微至於五代三綱頽絶五常殄滅懷璽未暖處宫未安朝成夕敗有如逆旅鄙亂相尋戰爭不息流血成川澤聚骸成邱陵太祖皇帝受命於上帝起而拯之躬擐甲胄櫛風沐雨東征西伐掃除海內當是之時食不暇飽寢不遑安以為子孫建太平之基大勳未集太宗皇帝嗣而承之凡二百二十有五年然後大禹之迹復混而為一黎民遺種始有所息肩矣由是觀之上下凡一千七百餘年天下一統者五百餘年而已其間時時小有禍亂不可悉數國家自平河東以來八十餘年內外無事然則三代以來治平之世未有若今之盛者也今民有十金之産猶以為先人所營苦身勞志謹而守之不敢失墜况於承祖光美之業奄有四海傳祚萬世可不重哉可不慎哉惜時略曰夏至陽之極也而一隂生冬至隂之極也而一陽生故盛衰之相乘治亂之相生天地之常經自然之至數也其在周易泰極則否否極則泰豐亨宜日中孔子傳之曰日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎是以聖人當國家隆盛之時則戒懼彌甚故能保其令聞永久無疆也逺謀略曰詩云逮天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之逮天之未隂雨者國家閒暇無災害之時也徹彼桑土者求賢於隱微也綢繆牖户者修敇其政治也謹微略曰周易坤之初六曰履霜堅氷至霜者寒之始也氷者寒之極也坤之初六於律為林鍾於歷為建未之月陽氣方盛而隂氣已萌物之未知也是故聖人謹之曰履霜堅氷至言為人君者當絶惡於未形杜禍於未成也繫辭曰知幾其神乎君子知微知彰知柔知剛萬夫之望又曰太宗皇帝命王繼恩討蜀亂平之宰相請除宣徽使太宗不許曰宣徽使位亞兩府使繼恩為之是宦官執政之漸也宰相固請太宗怒切責宰相特置宣政使以授之又曰夫宴安怠惰肇荒淫之基竒巧珍玩發奢泰之端甘言卑辭啓僥幸之途附耳屏語開讒賊之門不惜名器導僣逼之源假借威福授陵奪之柄凡此六者其初甚微朝夕狎玩未覩其害日滋月益遂至深固比知而革之則用力百倍矣務實略曰夫安國家利百姓仁之實也保基緒傳子孫孝之實也辨貴賤立綱紀禮之實也和上下親逺邇樂之實也決是非明好惡政之實也詰奸邪禁暴亂刑之實也察言政試政事求賢之實也量材能課功狀審官之實也詢安危訪治亂納諫之實也選勇果習戰鬭治兵之實也實之不存雖文之盛美無益也諸路大水河北京畿等路八月䇿制科得王介蘇軾蘇轍言極切直胡宿請黜之上曰以直言召入奈何以直棄之於是軾入第三等介轍第四等知制誥王安石意轍右宰相專攻人主比之谷永不肯撰詞宰臣韓琦曰此人語謂宰相不足用欲得婁師德郝處俊而用之尚以谷永疑之乎已而楊畋見上曰蘇轍臣所屬也陛下赦其狂直而收之乞宣付史館上悅從之閏月以曽公亮同平章事張升樞密使歐陽修參知政事胡宿樞密副使宿既被用專以顧惜大體為說聞更張革弊則曰變法古人所難不務守祖宗成法而徒務紛紛無益於治也時韓琦為首相法令典故問公亮文學之事問修百官奉法循理朝廷稱治冬十月定內侍磨勘法自祖宗時內臣未嘗磨勘轉官惟有功乃遷景祐初內臣入仕三十年纍有功勤經十年未嘗遷者聽奏旨蓋猶未有磨勘定格慶歷以後其制漸隳有入仕才五七年遷至髙品者兩省因著十年磨勘之制至是患其幸進令並理三十年磨勘知諫院楊畋言文臣七遷而內臣始得一磨勘其法不均詔髙品以上仍舊十年無勞績而嘗坐罪徒者即倍其年畋為言事官顧以士人比閹寺議者譏之皇姪宗實辭起復知宗正寺上在位四十一年皇嗣未立諫官御史交章進說久之言者稍怠宰臣韓琦乘間請曰皇嗣者天下安危之所係自昔禍亂之起由䇿不早定也今陛下春秋已髙未有建立何不擇宗室之賢者而定之為宗廟社稷之計乎一日琦取孔光傳進曰漢成帝即位二十五年無嗣立弟之子定陶王為太子成帝中材之主猶能之况陛下之聖哉奈何久不定至是諫官司馬光復上疏且面言其事而知江州吕誨亦請早立皇嗣頃之琦與曽公亮張升歐陽修又極言之上曰宗子自有賢智可付天下者卿等其勿憂琦請其名上以名示之琦復奏曰大事也願陛下審思之翌日復請上曰決矣時皇姪嶽州團練使宗實方服漢王喪乃降詔起復宗實四表請終喪從之光之復見上也言向者進說陛下欣然無難今寂無所聞此必有小人者間之小人無遠慮特欲倉卒之際援立所厚善者爾唐自文宗以後立嗣皆出於左右之意至有稱定䇿國老門生天子者上大感悟曰送中書光見琦等曰諸公不及今定議異日夜半禁中出寸紙以某人為嗣則天下莫敢違琦等皆唯唯曰敢不盡力是歲初立考課法治平三年考課院言知磁州李田再考在劣等降監淄州鹽酒稅務坐考劣降等自田始壬寅嘉祐七年春正月詔南郊奉太祖定配改溫成廟為祠殿先是諫官楊畋論水災由郊廟未順下禮院禮院言對越天地神無二主唐垂拱中始用三祖同配至開元親享遂罷之皇祐詔書南郊三聖並侑後遞配未幾復並侑為定制雖出孝思然頗違禮經又溫成立廟城南禮同太廟亦有司之失復下兩制議而王圭等曰饗帝不可以瀆故郊無二主親親不可以僣故廟止其先今三后並侑欲以致孝也而適所以瀆乎後宫有廟欲以廣恩也而適所以僣乎享親請如禮官議詔從之二月更江西鹽法舊自海陵漕鹽至江湖常恐濫惡而價髙嶺鹽善而價賤䖍汀二州民多盜販嶺鹽持甲兵往來或殺傷捕卒則聚而為盜而江西官糶鹽嵗才百萬斤朝廷患之先是蔡挺知南安軍嘗條奏利害乃命挺為江西提刑使之制置挺令民首納私藏兵械以給捕卒而令販黃魚籠挾鹽不及二十斤不以甲兵自隨者止輸算勿捕選官之淮南運新鹽嚴綱吏賞罰以官數之餘畀之於是官鹽減價而盜販衰息嵗增賣鹽四十餘萬遂著於令諸路大水河北陕西等路遣使察獄夏五月以司馬光仍知諫院初光與吕公著並召試中書及除光知制誥以文不工固辭乃復命以是職光疏略曰竊以國家之治亂本於禮而風俗之善惡係於習赤子之啼無有五方其聲一也及其長也則言語不通飲食不同有至死莫能相為者是無他焉所習異也是故上行下效謂之風薰蒸漸漬謂之化淪胥委靡謂之流衆心安定謂之俗及夫風化已失流俗已成則雖有辨智弗能諭也彊毅不能制也重賞不能勸也嚴刑不能止也自非聖人得位而臨之積百年之功莫之能變也周易履之象曰君子以辨上下定民志故天子之令必行於庶人使天下之勢如身之使臂臂之使指莫不率從詩曰勉勉我王綱紀四方此禮之本也昔三代之王皆習民以禮故子孫數百年享天之祿及其衰也雖以晉楚齊秦之强不敢暴蔑王室豈其力不足哉知天下之不已與也於是乎翼戴王命以威懷諸侯莫敢不從所以然者猶幸先王之遺風餘俗未絶於民故也其後日以衰薄下陵上替晉平公之世魯子服回如晉還謂季孫意如曰晉之公室將遂卑矣六卿强而奢傲將因是以習習實為常能無卑乎其後趙魏韓氏卒分晉國習於君臣之分不明故也降及漢氏雖不能若三代之盛王然猶尊君卑臣敦尚名節以行義取士以儒術化民是以王莽之亂民思劉氏而卒復之赤眉雖羣盜猶立宗室以從民望王郎矯託名氏而燕趙響應董卓之亂袁紹以誅卓為名而州郡雲合曹操挾獻帝以令諸侯而天下莫能與之敵操之心豈不欲廢漢而自立哉然沒身不敢為者畏天下之人疾之也自魏晉以降人主始貴通才而賤守節人臣始尚浮華而薄儒術以先王之禮為糟粕而不行以純固之士為鄙朴而不用於是風俗日壞入於偷薄叛君不以為恥犯上不以為非惟利是從不顧名節至於有唐之衰麾下之士有屠逐元帥者朝廷不能討因而撫之拔於行伍授之以旄鉞其始也取偷安一時而已及其久也則衆庶習於聞見以為事理當然不為非禮不為無義是以在上者惴惴然畏其下在下者睽睽焉伺其上平居則酒肉金帛甘言屈體以相媚悅得間則銛鋒利刃狠心詭計以相屠膾成者為賢敗者為愚不復論尊卑之序是非之理陵夷至於五代天下蕩然莫知禮義為何物矣是以世祚不永遠者十餘年近者三四年敗亡相屬生民塗炭及大宋受命太祖太宗知天下之禍生於無禮也於是以神武聰明躬勤萬幾征伐刑賞斷於聖志然後人主之勢重而羣臣懾服矣於是翦削藩鎮齊以法度擇文吏為之佐以奪其殺生之柄攬其金穀之富選其麾下精鋭之士聚諸京師以僃宿衛制其腹心落其爪牙使不得陸梁然後天子諸侯之分明而悖亂之原塞矣於是節度使之權歸於州鎮將之權歸於縣又分天下為十餘路各置轉運使以察州縣百吏之臧否復漢部刺史之職使朝廷之令必行於轉運使轉運使之令必行於州州之令必行於縣縣之令必行於吏民然後上下之序正而紀綱立矣於是申明軍法使自押官以上各有階級以相臨統小有違犯罪皆誅死然後行伍之政肅而士用命矣此皆禮之大節也故能四征不庭莫不率服汛掃九州而陟禹之迹至於真宗重之以明德繼二聖之志夙夜孜孜宣布善化銷鑠惡俗以至於今治平百年頑民殄絶衆心咸安此乃曠世難成之業陛下當戰戰栗栗守而勿失者也臣竊見陛下有中宗之嚴恭文王之小心而小大之政多謙讓不決委之臣下誠使所委之人常得忠賢則可矣萬一有奸邪在焉豈不危甚矣哉古人所謂委任而責成功者擇人而授之職叢脞之務不身親之也至於爵祿廢置殺生豫奪不由己出不可也又言頃以西鄙用兵權置經略安撫使一路之兵得以便宜從事及西事平因而不廢河東一路總二十二州向時節度使之權不能及矣又將相大臣典州者多以貴倨自持轉運使欲舉職業往往違戾而不從又言自景祐以來頗行姑息之政胥吏歡譁斥逐中丞輦官悖慢廢退宰相衛士凶逆而獄不窮姦軍人罵三司使以為非犯階級疑於用法朝廷雖特誅其人而已停之卒復收養之其餘有一夫流言於道路而為之變令推恩者多矣凡此數者殆非所以習民於上下之分也夫朝廷者四方之表儀也朝廷之政如是則四方必有甚者矣於是元帥畏偏裨偏裨畏將校將校畏士卒奸邪怯懦之臣至有簡省教閲使之驕惰保庇羸老使之繁冗屈撓正法使之縱恣詆訾粟帛使之憤惋甘言諂笑靡所不至於是士卒翕然譽之而歸怨於上矣彼既為之則此效之下既言之則上從之前既行之則後襲之茍彼為而此不效下言而上不從前行而後不襲則怨怒聚於其身而禍亂生矣長此不已日滋月益民之耳目習而安之此有以異唐之季世乎後魏孝明帝時征西將軍張彛子仲瑀上封事欲抑損武人不預清品羽林虎賁千餘人焚彛第殺彛父子官為收捕凶强者八人斬之其餘大赦以安之懷朔鎮人高歡時奉使至洛陽見之歸而散家財以結客曰朝政如此事可知矣於是始有飛揚之志由是觀之紀綱不立則奸雄生心矣夫祖宗苦心焦思以變衰唐之俗而陛下髙拱熟視以成後魏之風此臣之所以為陛下痛惜也又上疏論財利曰為今之術在隨材用人而久任之在養其本原而徐取之在減省浮冗而省用之國初三使司副判官専擇曉錢穀者為之近嵗多用文辭之士以為文臣進遷之資途不論其習與不習也又居官者出入遷徙有如傳舍臣欲精選曉練錢穀者為三司判官自權為正三司副使缺選於判官三司缺選於副使久任三司使而有實效者增其秩使與兩府同又言今天下之民農者不過二三而浮食者常七八欲倉廩之實其可得乎又言商賈志於利而縣官數以一切之汰棄信而奪之是以茶鹽棄捐征稅耗損凡以此也又言陛下天資恭儉而左右侍御宗戚貴近爭尚侈靡先朝公主在宫中俸錢月不過五千其餘月給大扺倣此今何啻數十倍矣又內藏庫專以內臣掌之不領於三司多少虛實有司莫得而知又食貨窮乏而宰相不憂以為非己之職也願復置總計使使宰相領之光二疏凡八千餘言秋七月河決北京八月立宗實為太子賜名曙尋加齊州防禦巨鹿郡公時宗實力辭宗正琦曰宗正誥敕付閣門故得不受若立為皇子則凡降一詔書定矣上以為然張升進曰陛下疑之否上曰朕何疑欲民心先有所係屬升再拜稱賀琦等乞手札付外施行琦至中書召王圭草詔圭疑焉請對曰此大事也後不可悔上指心曰朕意決矣議遂定初皇子辭命記室周孟陽問皇子曰太尉稱疾堅卧其義安在曰非敢邀福以避禍也孟陽曰假如得請歸藩遂能無患乎皇子撫榻而起曰吾慮亦及此遂入內良賤不滿三十口行李蕭然惟書數橱而已中外聞之相賀李度皇子位伴讀王獵說書九月辛亥大享明堂奉真宗配初禮院言皇祐參用南郊百神之位不應祀法宜如唐制設昊天上帝五方帝位以真宗配而五人帝五官神從祀餘皆罷前者嘗停孟冬之薦今明堂去孟冬日尚遠請復薦廟前者祖宗並侑今獨配前者地祇神州並享今以配天而亦罷皆變禮中之大者也又開元開寶二禮五帝無親獻儀詔恭依而行親獻至是設昊天上帝五方帝位以真宗配而五人帝五官神從祀餘皆罷赦文天下寺觀未有名額者特賜名諫官司馬光言竊以佛老之教無益治世而聚匿遊惰耗蠧良民是以國家法令明著有創造寺觀一間以上聽人陳告科違制之罪仍即令毁撤臣聞為上者洗濯其心一以待民是以令行禁止而莫敢不從今立法以禁之於前而發赦以勸之於後則凡國家之令將使民何所從乎其赦文一節乞更不施行庶使號令為民所信而遊惰不能為奸也英宗治平四年正月詔民間先私造寺觀及三十間者悉存之賜名夀聖冬十月賜常平糴本錢諸路凡百萬緡十二月幸龍圖天章閣召輔臣從官皇子宗室主兵官觀祖宗御書又幸寶文閣為飛白書分賜從臣遂燕羣玊殿未幾再詔從臣於天章閣觀瑞物復燕羣玉殿上曰天下久無事今日之樂與卿等共之宜盡醉勿辭又召宰臣韓琦至榻前别賜酒一巵從臣霑醉至暮而罷癸卯嘉祐八年春二月上不豫輔臣奏事福寧殿西閣見上所御幄帟裀褥皆質素暗敝上顧韓琦等曰朕居宫中自奉止如此此亦生民之膏血也何輕費之哉赦三月賜舉人第覆試舉人如常例上不御殿賜許將以下及第出身有差上崩於福寧殿年五十四在位四十二年諡曰神文聖武明孝廟號仁宗上性至孝天禧中立為皇太子涕泣纍日至於減膳謂當出宫不得日侍帝后左右真宗慰諭之曰此特加恩爾未出宫也上乃悅復膳如常即位年十三臨朝端莊事天地宗廟齊栗若不勝或時災變必跣足露立致禱愛重民力於宫室池臺無所興作三司嘗欲以玊清昭應宫地為御苑曰吾先帝苑囿猶以為廣可更侈乎監修南京鴻慶宫內侍請於本宫隙地建皇帝本命殿曰建宫觀所以為民祈福豈可勞民以自奉耶其遇本命殿道場日只令設板位祠之則其不輕營膳從可知矣異時州郡上雨暘後或畏罪不敢言使民不得除租賦乃命著令毋罪長吏而除民租又奏水災不實者有司請加罪曰不猶愈於奏祥瑞乎吏部選人一坐失入死罪皆終身不得遷隴州官吏坐誤斷重辟㑹赦當原上特貶權州事孫濟為雷州參軍判官以下除名配廣南衙前州縣吏配刺沙門島及廣南牢城仍詔以濟等誅陷非辜之罪戒天下凡大辟有疑及情可矜者並令讞上所活嵗以千計嘗諭輔臣曰朕未嘗詈人以死况敢濫刑罰哉民有户絶田産有司聽奏裁曰此皆編民朝夕自營者何必利其入官詔給與其出嫁女及同居外甥愛養元元之念未嘗少釋於懷遺制下雖在深山窮谷莫不奔走悲號而不能止豈非德澤涵養之至耶廟號曰仁不亦宜乎程皓嘗言仁祖時北使進言髙麗自來臣屬北朝近來職貢全缺殊失臣禮今欲加兵又聞臣屬南朝今來報知仁祖不答及將去也召而前語之曰適議髙麗事朕思之只是王子罪不干百姓事今既加兵王子未必能誅得且是屠戮百姓北使遂屈無答不覺汗流浹背俯伏於地歸而寢兵他都不言彼兵事勢只看這一箇天地之量亦誠有以格他也魏泰記仁宗聖性仁恕一日晨興語近臣曰昨夕因不寐而甚饑思食燒羊侍臣曰何不降旨取索仁宗曰比聞禁中每有取索外面遂以為例誠恐自此逐夜宰殺以備非時供應則嵗月之久害物多矣豈可不忍一夕之饑而啓無窮之殺也時左右皆稱萬嵗至有感泣者而史臣所載嘉祐中上詔三司使張方平曰監御厨竇昭齊等燕日擅殺羊羔且羊羔物未成者枉其生理嘗戒使勿殺今復殺之不可不懲特令衝替其愛物類如此陳師道記十閣獻蛤蜊每枚千錢一獻二十八枚仁宗曰我嘗戒爾輩勿為侈靡今一下箸費二十八千吾不堪也遂不食范祖禹曰仁宗愛人恤物之仁在位四十二年未嘗一日而忘其誠之所及上極於天下達於地內則諸夏外則夷狄山川鬼神草木無不及者誠之至也契丹主嘉祐中以其三世畫像來求聖容曰思見而不可得故來求聖容而見之也其後遼使云今於慶州崇奉每夕宫人理衣衾朔日月半上食食氣盡登臺而燎之曰燒飯惟祀天與祖宗則然北陲自黃帝以來為諸夏患未有事中國之君禮文如此其隆者書曰至諴感神矧兹有苗其謂是矣時上暴崩皇后敕左右毋得輒發哭斂門鑰悉至於前授衛士甲宿衛畢乃召皇子夏四月朔皇子即皇帝位未明皇子入及明韓琦等至后傳詔皇子即位皇子固避數四左右被以御服掖就榻召翰林學士王圭草制百官入班福寧殿前韓琦讀遺制皇子即位御東楹見百官大赦尊皇后為皇太后後名其宫曰慈夀上不豫詔請皇太后權同聽政上養疾於柔儀殿之西室太后居東室垂簾輔臣日至西室候問東室奏事司馬光上疏太后言章獻明肅保祐先帝用賢退奸有大功於趙氏特以親用外戚小人負謗天下今初攝大政大臣忠厚如王曽清純如張知白剛正如魯宗道質直如薛奎者當信用之鄙猥如馬季良讒諂如羅崇勳者當疏遠之則天下咸服又言趙氏安則百姓皆安况於曹氏必世世享富貴明矣趙氏不安則百姓塗地曹氏雖欲獨安其可得乎作皇帝恭膺天命之寶歐陽修篆文時大行受命寶與平生衣冠器用將舉以葬故别製此既而學士范鎮奏大行受命寶望陛下寶而用之示有所傳付命兩制議而王圭等曰受命寶猶昔傳國璽也宜為天子傳器不當改作時已别製圭等議格不用立京兆郡君髙氏為皇后瓊曽孫女母曹氏皇太后親姊后四嵗與上同育於禁中既長出宫婚於濮邸至是正位五月以富弼為樞密使同平章事時已除喪上始親政上既聽政司馬光上疏言陛下事太后孝謹撫諸公主慈愛此誠仁孝之至願陛下聖心謹終如始三年之喪自天子達於庶人一也陛下雖遵遺詔二十七日而釋服至於宫中吉慶之事並皆俟三年然後復常禮為人後者為之子蓋以特重於大宗則宜降其小宗孝宣不加尊號於衛太子史皇孫光武不加尊號於巨鹿都尉南頓君至於哀安桓靈自旁親入繼皆進尊其祖父此不足為孝而適足犯義傷禮願陛下深以為鑒六月廣太廟為八室初禮院請增廟室觀文殿學士孫抃等以為七世之廟據父子而言兄弟則昭穆同不得以世數數之國朝禘祫圖太祖太宗同居昭位南向真宗居穆位北向蓋先朝稽用古禮著之祀典大行神主祔廟請增為八室以備天子祀七世之禮詔從之於是龍圖閣直學士盧士宗天章閣待制司馬光以為太祖以上之主雖屬尊於太祖親盡則遷蓋太祖未正東向故止祀三昭三穆已正東向則并昭穆為七世唐惟眀皇立九室祀八世事不經見今以太祖太宗為一世則大行祔廟僖祖親盡遷夾室祀三昭三穆於先王典禮及近世之制無不符合復詔抃等議議曰自唐至周廟制不同而皆七世三昭三穆與太祖之廟而七是也今僖祖雖非始封要為始祖方廟數未過七世遂遷其主不合禮意宜存僖祖之室以備七世詔又從之停制科趙卨等十七人將來科場使赴祕閣就試秋七月初日御殿初御紫宸退御垂拱輔臣奏事上自六月後以疾不御殿至是始見羣臣感動者久之其後雙日御前殿隻日御後殿太后乃御內東門小殿垂簾二府奏事太后意有疑則曰公等更議之再奏乃可未嘗出已事涉曹氏及內臣無絲毫假借中外章奏下二府者日殆百通二府考㑹擬議近則數日遠至旬月及進呈太后一見舉大意無所忘失樞密院使富弼謂副使吳奎曰君等名强記能如是乎奎言非所及也上初以憂疑得疾舉措或改常度其遇宦官尤少恩左右多不悅者乃共為讒間兩宫遂成隙太后對輔臣嘗及之韓琦因出危言感動太后曰臣等只在外見得官家內中保護全在太后若官家失照管太后亦未得安穩太后驚曰相公是何言自家更切用心琦曰太后照管則衆人自然照管矣同列為縮頭流汗或謂琦曰不太過否琦曰不如此不得間有傳上在禁中過失事衆頗惑之琦曰豈有殿上不曽錯了一語而入宫門即得許多錯琦固不信也傳者亦少息司馬光上太后及上疏言皇帝非太后無以君天下太后非皇帝無以安天下萬一奸人有涉離間者當立行誅戮後又上太后疏言皇帝內則仁宗同堂兄之子外則殿下之外甥壻童幼之年鞠育於宫中天下至親何以過之殿下聰明睿知詎可責有疾之人以無疾之禮耶又以疏諫上曰古之至孝者雖有不慈之母猶能使之感動歡悅况太后聖善之德著聞四方陛下豈不思有以慰安之也知諫院呂誨上太后書言聞上疾未間言或荒忽殿下幾至不能容覆竊慮小人隂為交鬬以生他事且言三十年保育之功一朝而棄竊為殿下惜之又以書勸上盡孝道親藥物開陳切至多人所難言者冬十月葬仁宗於永昭陵初議上大行皇帝諡學士王圭曰古者賤不誄貴幼不誄尊禮天子稱天以誄之欲稽典禮先請於南郊詔從之遂為定制初禮院奏准畫日孟冬薦饗太廟改為祫祭按春秋閔公即位二十二月喪未除而行吉禘三傳譏之真宗以咸平二年六月除喪至十月乃祫祭仁宗天聖元年四月有司誤通天禧舊禘之數在再期之內接行禘祭故四十二年之間九禘八祫例皆太速事失於始則嵗月相乘不可得而正矣今年未大祥未可夾明年未可禘今年十月乞依舊時饗從之韓琦歸自陵下太后遣中使以上所寫歌詞并宫中過失事付韓琦琦對使者焚毁及進對簾前太后嗚咽流涕具言之曰老身殆無所容須相公作主琦曰此病固爾病已必不然子病母可不容之乎太后不懌歐陽修繼言曰昔溫成驕恣太后處之裕如安有母子之間而反不忍耶太后意稍和他日琦等見上上曰太后待我無恩對曰自古帝王獨稱舜為大孝惟父母不慈愛而子不失孝乃可稱爾正恐陛下事太后未至父母豈者不慈愛者上大悟自是亦不復言太后短矣十二月初御經筵召吕公著侍講論語劉敞侍讀史記越明年夏四月上諭內侍曰方日永講讀侍對未食必勞倦自今視事畢不俟進食即御經筵故事講讀畢拜而退上命毋拜遂以為常置寶文閣以藏仁宗御書命學士王圭撰記治平四年詔以英宗御書附藏元祐四年又詔以神宗御集附藏九朝編年備要卷十六
