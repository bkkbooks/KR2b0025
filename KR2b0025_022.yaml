body:
  text: 九朝編年備要卷二十二宋陳均撰哲宗皇帝起丙寅元祐元年止戊辰元祐三年丙寅元祐元年春二月授阿里庫節度時棟戬已死養子阿里庫代立授河西節度閏月蔡確罷確與章惇黃履邢恕相交結確惇倡之於內履與僚屬和之於外恕往來傳送自以為有定䇿之功右正言王覿者首論人主所與共理天下者執政大臣而治亂安危之所係也今執政大臣姦邪害政者相半一二元老安得盡行其志因極言惇確及韓縝張璪朋邪害正劉摯朱光庭蘇轍等纍數十疏論劾命知陳州以司馬光為左僕射光之初相也王安石已病其弟安禮以邸吏狀示安石安石曰司馬十二作相矣悵然久之安石以行新法作相光以不行新法解樞密副退居西洛負天下重望十五年上即位太皇太后聽政遂起光而用之然當是時進說者以為三年無改於父之道欲稍損其甚者聊舉數事以塞人言光慨然爭之曰先帝之法其善者雖百世不可變若安石惠卿等所建為天下害非先帝本意者改之當如救焚拯溺猶恐不及况太皇太后以母改子非子改父衆議乃定光以為治亂之機在於用人邪正一分則消長之勢自定每論事必以人物為先凡所進退皆天下所當然者然後朝廷清明人主始得聞利害之實或謂光曰元豐舊臣如章惇呂惠卿輩俱小人他日有以父子之議聞於上則朋黨之禍作矣光起立拱手厲聲曰天若祚宋必無此事遂改之不疑安石嘗歎曰始終謂新法不便者司馬君實爾嗚呼若曰參用元豐舊臣共變其法實光之所不取也自國朝治亂論之曰元祐黨者豈非天哉後世聞光之言可以流涕痛哭矣立三省同取㫖法元豐官制行三省並建而中書獨為取㫖之地門下尚書奉行而已至是左丞吕公著以為言乃詔事下三省執政並同取㫖而各行之仍著為令立户部總財用法司馬光言户部尚書舊三司使之任也左曹𨽻尚書右曹不𨽻尚書天下之財分而為二視彼有餘視此不足不得移用欲乞令尚書兼領左右曹侍郎分職而治其右曹所掌錢物尚書非奏得㫖不得擅支諸州錢穀金帛𨽻提舉常平司者每月具文帳申户部六曹及寺監欲支用錢物皆須先關户部舊三司所管財穀事有散在五曹及寺監者並收歸户部詔尚書省立法三月以李常為户書或疑常文士少吏幹以問司馬光光曰使此人掌邦計則天下知朝廷非急於征利掊克之風庶幾少息罷提舉常平官用司馬光之請也其纍年積蓄錢穀委提刑交割主管依舊常平倉法時天下常平免後坊場積剩錢凡五千餘萬貫穀帛二千八百餘萬石匹云復差役法詳定役法所以差役為便惟衙前一役欲用坊場河渡錢依舊法募人不足方許按簿定差詔從之初時青苗將官之法猶在而西戎之議未決司馬光始得疾嘆曰四患未除吾死不瞑目矣乃力疾上免役五害云上户充役有所陪備年滿後却得休息今年年出錢而出數多於陪備一也舊時下户不充役今一例出充役錢二也舊所差皆土著良民今募浮浪之人恣為姦欺三也農民所有惟榖帛與力今使出錢而錢非民間所鑄四也提舉司惟務多斂役錢積寬剩以為功五也為今計莫若罷天下免役錢其役人並依舊法定差惟衙前役重難向有因是破家者朝廷為此始作助役法若衙前力難獨任即依舊法令官户寺觀出助役錢遇衙前重難差遣即行支給詔付三省蔡確曰此大事也當與樞密同之樞密章惇上疏駁光奏復差役以為甚疏略于是吕公著言惇上疏出於不平専欲求勝臣竊考朝廷有大議論多選近臣定奪乃擬上數人詔以韓維吕大防張永范純仁置局詳定不復令樞密院與議矣光議凡役人皆不許雇代然東南及西蜀諸路民有髙資或子弟業儒皆當為弓手執賤役既不許募代人甚苦之吕公著聞其弊即令一聽雇募民情甚悅蘇軾亦言免役差役各有利害免役掊斂民財而不免錢荒之患差役民常在官而貪吏猾胥得緣為姦先帝本意使民户率出錢専力於農雖有貪吏猾胥無所施其户坊場河渡官自出賣而以其錢雇募衙前民不知倉庫綱運破家之禍此萬世之利也決不可變獨有三弊多收寬利役錢以供他用實封爭買坊場河渡以長不實之價此乃王安石吕惠卿之隂謀非先帝本意也光不悅軾曰日者韓魏公刺陜西義勇公為諫官言之甚力韓公不樂公亦不顧軾嘗聞公道其詳豈今日作相不許軾盡言耶蘇轍言罷差役已二十年况役法干涉衆事根芽盤錯若不究首尾遽使行之恐别生諸弊今州縣役錢約支數年君且依舊雇役仍督有司審議趂今冬成法來年役使進退亦皆便也光又召問司農卿馬默復差衙前法如何默曰常平自漢良法不可盡廢去其害民者可也其後役人立為一州一縣法而常平提舉省歸提刑者自默發之初范純仁自慶州召入純仁與光素厚善聞光議復行差役法純仁曰法固有不便然亦有不可暴革蓋治道惟去太甚者耳乃言于光且欲緩議先行於一州使見其利害可否漸推之一路庶民不騷擾而法可久行光不從純仁嘆曰是又一王介甫矣復折東道之略曰此法若緩行而熟議則不擾急行而疏略則擾今公寧欲擾民而且將疏略之法使繆吏遽行則其擾民又在公意料之外今純仁畫計不改公之法只欲京師推行使不擾一人而公法可行光亦弗聽光既復差役舊法蔡京知開封府即用五日限令開封祥符兩縣如舊役人數差一千餘人充役遂詣東府白光光喜曰使人人如待制何患法不行乎議者謂京但希望風㫖茍欲媚光非實事也故蘇轍首以為言臺諫亦纍疏請罷京遂出京知真定州王安石在金陵聞朝廷變其法夷然不以為意及聞罷役法愕然失聲曰亦罷至此乎良久曰此法終不可罷安石與先帝議之二年乃行無不曲盡後果如其言差役行於治平之前法久而弊編户不習官吏虐使之多以破産神宗知其然故為免役便民以户髙下出錢而無執役之苦行法者不循上意於雇役實費之外取錢過多民遂以病章惇罷惇與司馬光爭論役法惇謂光曰後日安得奉陪喫劍于是中丞劉摯諫官王巖叟朱光庭言惇凶險乞行顯黜韓縝素切齒惇等誣定䇿事至於簾前白之太皇太后與外廷始知其詳太后怒遂罷惇樞密院事知汝州制詞有曰鞅鞅非少主之臣硜硜非大臣之節三月罷熙河經制財用司貶王得君是春諫官蘇轍上疏言京城四門外白骨如麻多是昔日築城開壕死損人夫其間雖已埋瘞者土薄水淺亦皆發露狼籍臭腐不忍見聞諸路久旱未必非寃氣所致乞差一二亷幹內臣與赤縣官吏計㑹相度如法藏掩或能感召和氣詔開封府選官瘞埋並支常平錢得君時為軍器監丞上書曰近日言事之臣以先帝之法一切為非指斥塵㸃無所不至雖京城四門未瘞白骨亦云多是昔日築城開壕死損人夫臣讀此章不勝憤感伏望特降指揮應臣僚上章與議改法但許明建事情不得妄有指斥內出手詔曰豫方開廣言路得君乃欲杜塞人言無狀若此可與監當遂命監永城縣倉安燾仍同知樞密院先是燾升知院給事中王巖叟以為燾附章惇不當躐遷詔令不過門下省書讀凡八疏力爭臺諫官孫覺劉摯交章論奏燾亦力辭特依所乞休舊同知樞密院以程頤為崇政殿說書初司馬光薦頤學行命為汝州團練推官充西京國子監教授尋除校書郎至是上殿遂列經筵頤面辭不許退上三劄其一略曰自古人君守成而致盛治者莫如周成王成王所以成德由周公之輔養昔者周公傅成王幼而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成陛下春秋方富在涵養薰陶而已大率一日之中接賢士大夫之時多親寺人宫女之時少則自然氣質變化德器成就乞遴選賢德之士以備勸講讀畢常留二人值日夜則一人值宿以備訪問皇帝講習之暇游息之間時於內殿召見從容宴語不獨漸磨道義至於人情物態稼穡艱難積久自然通達竊聞間日一開經筵講讀數行羣官列侍儼然而退情意略不相接如此則責輔養之功難矣其二曰臣聞三代之時人君必有師傅之官師道之教訓傅傅其德義保保其身體後世作事無本知求賢而不知正君知規過而不知養德傅德義之道固已疏矣保身體之法無復存焉臣謂輔德義者在乎防見聞之非節嗜好之過保身體者在于適起居之宜存畏謹之心祇應宫人內臣並選年四十五以上厚重小心之人服用器玩皆須質朴奢麗之物不接于目淺俗之言不入於耳及乞擇內臣十人充經筵祇應以俟候皇帝起居凡動息必使經筵官知之有剪桐之戲則隨事獻規違持養之方則應時諫止調護聖躬莫過於此今不設保傅之官傅德義保身體之責皆在經筵其三曰陛下未親庶政方専務學臣以為輔養聖德莫先寅畏動容周旋當主於此嵗月積習自成聖性臣竊見經筵臣僚侍者坐而講者立于禮為悖欲乞特令坐講以養主上崇儒重道之心竊聞講官在御案傍以手指書所以不坐欲别令一人指書講官稍逺御案坐講意朝廷循習舊體只以經筵為一美事臣以為天下重任惟宰相與經筵天下治亂係宰相君德成就責經筵安得不以為重中丞劉摯言頤以節行自守不介意于仕陛下髙其風故以汝州推官西京教授起之頤既赴召陛下又以校書郎待之今又官之以通籍置之于經筵頥之遜避不已陛下之恩命每加臣恐頥于出處辭受之際義有難安者也况紛紛之論致疑于頥者非特如臣之言也直以為天下處士皆盜虛名無益于用若頥者持迂濶之學要君索價而已天下節義之士樂道不出如頥等輩蓋亦不少伏願陛下依頥所乞成就其節止授以初命之官庶幾成頥之志全頥之節以息羣議而亦不害異日擢用也亷恥不立于天下久矣今幸有一人焉若授受不當於義則使天下靡然益不以亷隅為事豈不重哉頥卒留經筵摯所言不用頥每以師道自居其侍講色甚莊言多諷諫聞上宫中盥而避蟻因講畢請曰有是乎上曰然誠恐傷之耳頥曰推此心以及四海帝王之要道也上稱善頥在講筵常典質供用或疑祿薄問知乃自供職後不曾請俸尋詰户部户部索前任歷子頥言起自草萊無前任歷子乃令户部出給頥之意蓋以為朝廷得士便當知有廩人繼粟庖人繼肉之意置理訴所許熙寧以來得罪自言夏四月韓縝罷中丞劉摯諫官孫覺蘇轍王覿等相繼論之也言縝才鄙望輕士大夫初不以輔相期之在先朝奉使割地七百餘里以遺遼國邊人怨之切骨章數十上卒以縝自請命知潁昌府內批縝自以為不才恐妨賢路故乞出視矜功要名而去者為得進退之體宜于制詞及此意矜功要名蓋指蔡確也賑淮南饑賜上供米十萬石減價糶給饑民蠲旱傷租詔旱傷即蠲其租勿檢覆仍勿問限內外曾未投訴王安石薨司馬光於病中聞之簡吕公著曰介甫文章節義過人之處甚多但性不曉事而喜遂非致忠直疏逺讒佞輻輳敗廢百度以至於此今方矯其失革其弊不幸介甫謝世反覆之徒必詆毁百端光意為朝廷宜加厚禮以振起浮薄之風不識晦叔以為何如更不煩答以筆札扆前力主張則全仗晦叔也詔下輟視朝贈太傅與遺表恩澤初安石提舉修撰經義訓釋詩書周官既成頒之學宫天下號曰新義晚歲為字說學者爭傳習之凡試有司者必宗其說先儒傳注盡廢士亦無自得之效當時議者謂王氏之患在好使人同己安石又著日録七十卷如韓琦富弼文彥博司馬光吕公著范鎮吕誨蘇軾及一時之賢者重為詆毁而安石不恤也黜內侍四人中丞劉摯論之也摯言陛下臨御以來分别邪正而天地之和氣未應其故何也蓋元惡大憝猶有漏網前日之三四宦者是也王中正昨將兵二十萬由河東出界逗遛違詔坐失興靈㑹師之約精兵徑騎死亡殆盡李憲于熙河生事濫用縣官財賦漁斂生民膏血興靈之役首違師期乃頓兵以城蘭州遺患今日永樂之圍又不赴援宋用臣誅求小民奪其衣食之路擅作威福侵陵官司石得一領皇城司縱遣伺者朝士都民若飛書朝上則暮入狴犴上下惴惴不敢自保相顧以目者殆十年是四人者權勢鋒熖張灼中外幸而先帝神武英氣足以鎮壓之不然其為禍豈減漢唐之宦者哉殿中侍御史林旦亦言其奸詔並降官中正得一奉祠用臣監太平州稅務以吕公著為右僕射先是執政官每三五日一聚都堂堂吏日抱文書歷諸㕔白之故為長者得以専决同列盡難爭也司馬光嘗懇蔡確欲數會議庶各盡所見而確終不許公著既秉政乃日聚都堂遂成故事越明年公著言近以經筵講畢論語賜燕內出皇帝御書唐賢律詩分賜臣等伏惟皇帝陛下仁哲之性本出於天縱而復內稟慈訓日新典學今來論語終帙進講尚書二書皆聖人之格言為君之要道輒于尚書論語及孝經中節取要語共百段進呈聖人之言本無可去取臣今惟取明白切于治道者庶便省覽或游意筆硯之間以備揮染亦日就月將之一助也文彥博平章軍國重事序宰臣之上一月兩赴經筵六日一朝因赴都堂議事五月贈吕誨官始劉摯言先帝舉天下任王安石士民指期以望太平吕誨獨以為不然屢有奏議其略曰安石居廟堂之上必無安靜之理又曰誤天下蒼生必此人也誨坐是貶外未幾而沒其後安石造端興利四海困擾一如誨言誨可謂有先知之明矣陛下臨御以來凡臣子在前日輸忠獻䇿嘗有一言于朝者靡不褒用而誨不幸既亡不見遇于今日望賜贈恤録其諸孤范純仁亦以為言遂贈誨通議大夫男由庚與堂除差遣六月授陳烈官特授宣德郎致仕烈福州侯官人性介特篤于孝友力學不羣平居端嚴從學者數百人嘗與鄉薦黜於禮部自此不踐場屋或勉之仕則曰伊尹守道成湯三聘以幣吕望持誠文王載之俱歸今天子仁聖好賢豈無如伊尹者乎仁宗屢詔不起嘉祐中以近臣薦授州學教授方辭避間福建提刑王陶奏烈以妻林氏疾病瘦醜遣歸其家十年不視烈貪詐人也願賜削奪司馬光言臣不識烈不知其人果何如惟見國家常患士人不修名節故舉烈以厲風俗若烈平生操守出于誠實雖有迂濶之行不合于中道猶為守節之士亦當保全之願委官覆實以明至公雖不行然世頗以矯僞譏之上即位喻陟為福建提刑薦烈行義詔以烈名在仕版自仁祖嘗以學官命之而棲遲衡門不起宜從其所尚故有是命未幾落致仕授福州州學教授禁科舉用字說置春秋博士令國子監長二舉奏竄吕惠卿先是惠卿落職分司南京蘇州居住諫官王巖叟等四人論列不已遂責授建寧軍節副本州安置蘇軾草制詞曰凶人在位民不奠居司冦失刑士有異論稍正滔天之罪永為垂世之規吕惠卿以斗筲之才穿窬之智諂事宰輔榮升廟堂樂禍貪功好兵善殺以聚斂為仁義以法律為詩書首建青苗次行助役均輸之政自同商賈手實之禍下及雞豚茍有蠧國害民率皆攘臂稱首先皇帝求賢如不及從善如轉圜始以帝堯之心姑試伯鯀終然孔子之聖不信宰豫發其積奸謫之輔郡尚期改過稍畀重權復陳罔上之言繼有碭山之貶反覆教戒惡心不悛躁輕矯誣德音猶在始與知己共期欺君喜則摩足以相歡怒則反目而相噬連起大獄發其私書黨與交攻幾半天下奸贓狼籍橫被江東至其復用之年始倡西戎之隙妄出新意變亂舊章力引狂生之謀馴致永樂之禍興言及此流涕何追逮豫踐阼之初首發安邊之詔假我號令成汝詐謀不圖渙汗之文止為欵賊之具迷國不道從古罕聞尚寬兩觀之誅薄示三苗之竄國有常典朕不敢私貶鄧綰知徐州言者未已或謂吕公著曰今除惡不盡將貽患他日公著曰治道去太甚耳文景之世網漏吞舟且人才實難宜使自新豈宜使自棄同知范純仁亦以為言上納之詔言事務存大體略曰先帝謂求法度務從寬厚而搢紳之間不能推原本意希㫖掊尅妄生邊事連起犴獄此羣言所以未息也敕正風俗修振紀綱兹出大公蓋不得已况罪顯者已正惡巨者已斥則宜蕩滌隱疵濶略細故務存大體以示寬恩秋七月立十科舉士法從司馬光之請也曰行義純固可為師表曰節操方正可備獻納曰智勇過人可備將帥曰公正聰明可備監司曰經術精通可備講讀曰學問該博可備顧問曰文章典麗可備著述曰善聽獄訟盡公得實曰善治財賦公私俱便曰練習法令能斷情讞應侍從以上嵗舉二人從之夏人來議疆事初神宗于熙河路增置蘭州鄜延路增置塞門安疆米脂浮屠葭蘆五寨上即位夏國才遣使賀登極還未出境又遣使入界朝廷知其有請地之意然棄守之議未決使人至見于延和殿輒妄奏曰神宗自知錯上起立怒久之內侍張茂則曰與押伴理會移時方退于是孫覺首議棄蘭州而司馬光謂此數寨者田非肥良不可以耕墾地非險要不可以守禦欲因天子繼統悉加毁撤歸其侵地劉摯謂供億戍守窮竭財力其最大者莫如蘭州不若捐一空城與之至于鄜延河東新置堡塞願明詔大臣早有定計鄜延帥趙窩欲留塞門安逺二寨其餘或存或廢乞密降付臣遵守吕陶謂實於邊防無分毫之益環慶安撫范純粹謂收復廢州略無所利乞令虜以所陷官吏丁夫悉歸朝廷而所削之地並從給賜范純仁之論亦然蘇轍謂增置州寨坐困中國願決計棄之王存謂夏國疆界終難久守王巖叟謂守之無所得棄之不足惜文彥博謂邊臣欺罔生事第恐不能持久却須自棄不若推恩賜豫惟上官均孫路以為不如出兵積穀畫地而守前熙河機宜穆衍亦言蘭州棄則熙河危熙河棄則關中搖動唐自失河湟吐蕃回鶻一有不順則警及國門逮今二十餘年非先帝英武孰能克復今一旦委之恐滋後患詔除元係中國及西蕃舊地外候送到陷沒人口委邊臣賜給先是太皇太后手詔賜吕大防范純仁略曰夏國自神宗升遐後遣使弔慰祭奠繼告國母喪進遺物今又復遣使入謝外示恭順然戎情狡獪未測其心如向者所得邊地雖建五城寨亦慮孤僻不易應援棄之則弱國守之則終恐戎人在念卿久任西寨久曉邊情可條具奏聞大防以為不可棄純仁上對略曰臣竊見夏國自朝廷用兵以來近漢之民頗失生業並寨二百餘里不敢耕種其國上下之人皆欲講和又自陛下臨御以來聖政鼎新凡有不便於民者悉議蠲除每詔令一下民間歡呼鼓舞以至印賣傳播謂之快活條貫此事即時聞于夷狄又邊土臣僚亦多體朝廷意不縱侵擾以此夏國必謂朝廷待之異於前時所以遣使入慰探朝廷之意朝廷待其初來之使禮意既厚是以接續肯來至于纍次不失恭順今夏人又將到闕願選擇押伴臣僚使與推誠語論因而誇美聖政凡陛下好生惡殺舍己從人之意彼亦有所對答可測見願和之意則可令自作意度說與自用兵以來其有陷蕃官吏軍民見在西界若夏國盡將納與朝廷則朝廷乞將虜到生口賜給夏國所有邊上之事亦可因而陳請又曰若將所得邊地換得陷蕃生靈不惟無損國威兼且和氣充塞陛下聖德越超古今為中國無窮之利矣八月復常法罷青苗錢初同知范純仁以國用不足建請復散青苗錢時司馬光方以疾在告不與也已而臺諫共言其非皆不報光尋具劄子乞約束州縣抑配者蘇軾又繳奏乞盡罷之光始大悟遂力疾封入於簾前爭曰不知是何姦邪勸陛下復行此事純仁改色却立不敢對青苗錢遂罷不復散罷成都茶場九月司馬光薨辛卯大饗明堂奉神宗祀臨司馬光喪光為政踰年病居其半每欲以身律下躬親庶務不舍晝夜賓客見其體羸曰諸葛孔明罰二十以上皆親之以此致病公不可以不戒光曰死生命也為之益力貽書吕公著曰光自病以來悉以身付醫家事付康惟國事未有所付今日以屬晦叔矣病革諄諄不復自覺如夢中語然皆朝廷大事也太皇太后聞哭之慟上亦感涕不已明堂禮畢皆臨奠贈太師溫國公官親族十人諡文正表其墓曰精忠粹德光在相位遼人夏人遣使入朝必問光起居遼人敕其邊吏曰中國相司馬矣切勿生事開邊隙及卒京師之民罷市畫其像印鬻之畫工有致富者及葬四方來㑹者哭之如哭其親戚嶺南封州父老亦相率具祭蘇軾嘗論光所以感人心動天地者二曰誠曰一君子謂軾知言又嘗論光語朝無咎曰吾無過人但平生所為未嘗有不可對人言者冬十月改衍聖公為奉聖公鴻臚卿孔宗翰奏言先臣孔子之後世襲封爵元差灑掃户五十人看林户五人熙寧中議者欲役錢寬剩遂減三十其看林户只有三人昔慶厯中知兖州梁適乞以廂庫代廟户并裁減人數執政欲從適請獨范仲淹曰此與尋常利害不同仁義可息則此人可減遂已今乞裁酌施行尋詔令襲封専主祠事添助田百頃供祭祀外許均贍族人差灑掃户看林户如舊人數改衍聖公為奉聖公仍賜書置教授一員教孔氏子弟紹聖三年溫益知兖州奏乞罷置教授十一月詔監司分巡州縣二年遍十二月詔蘇軾傅堯俞等供職軾為翰林學士撰試館職䇿題略曰欲師仁祖之忠厚而患百官有司不舉其職或至于偷欲法神考之勵精而患監司守令不識其意流入于刻又稱漢文寬大長者不聞有怠廢不舉之病宣帝綜核名實不聞有督責過甚之失初軾與崇政說書程頤同在經筵軾喜戲諧而頤以禮法自持軾每靳之左司諫朱光庭及御史賈易皆頤門人積不能平乃力攻軾光庭言軾不識大體以仁宗難名之盛德神考有為之善志反以偷刻為議論獨稱漢文宣之全美不忠莫大焉乞正其罪詔軾放罪軾自辨甚力詔追放罪指揮中丞傅堯俞御史王巖叟吕陶諫官王覿相繼論列堯俞巖叟右光庭陶右軾惟覿之論頗得其平謂同異之因不足攻也陛下若悉攻同異深究嫌疑則兩岐遂分而朋黨之論起且學士命詞失當有罪無罪小事也使士大夫有朋黨之名大患也范純仁亦言䇿題文意是指今日非譏諷祖宗不須彈奏軾抗章乞罷堯俞等並不供職遂有是命邵伯溫曰哲宗即位宣仁同聽政羣賢畢集於朝賢者不免以類相從故當時有洛黨川黨朔黨之語洛黨以程頤為領袖朱光庭賈易為羽翼朔黨以劉摯梁燾王巖叟劉安世為領袖而羽翼尤衆諸黨相攻擊不已頤多用古禮軾謂其不近人情深疾之或加玩侮故光庭易不平皆以謗訕言軾執政兩平之是時既退元豐大臣於散地皆銜怨入骨隂伺間隙而諸賢不悟自分黨相毁惟吕大防秦人贛直無黨范祖禹獨師司馬光不立黨至紹聖間以為元祐黨盡竄之嶺外可哀也哉起免役錢赴京詔免役錢五路全留諸路留一半餘召人入便置場和買物貨發赴元豐庫送納是嵗復茶鹽法許通商江西河北解鹽許通商湖南鹽法福建茶鹽法並復舊先是王巖叟上言河北二年以來新行鹽法鹽價增貴三倍願復如故又言慶厯六年臣寮擘畫鹽法一嵗之間比舊數可增錢五十九萬餘貫利之所得可謂厚矣而神宗不以為意又言慶厯六年鹽稅嵗額止一千九萬餘緡今若依元豐八年未推行𣙜法以前嵗收鹽稅為額已自三十三萬緡矣又言財利得之易人心得之難又言江西湖南鹽法為害之深請罷之髙麗王運卒子堯立未幾病卒其叔父熙立尋改名顒丁卯元祐二年春正月冊李乾順為夏國主秉常死於去秋乾順繼立故有是命程文禁用申韓釋氏詔舉人並許用古今諸儒之說或出已見母雜以申韓釋氏考官勿於老莊列子出題先是蘇軾請科舉一切如舊但所對經義兼注疏及諸家議論或出已見不専用王氏之學仍罷律義從之二月河北灾遣使賑之定選人改官員每嵗百人代州地震三月罷營繕以雨雪不時止天下營繕三年遣散兵匠定內侍員詔內侍省供奉官至黃門以百人為額分畫西夏地界宥州送到陷蕃人三百十八口詔鄜延經略司候到日葭蘆米脂浮屠安疆四寨並特行給賜其餘不係可還城寨地土各委官畫定界至開立壕堠夏四月旱授陳師道官徐州人侍從合薦授本州教授遷太學博士言者謂其當官私至宋謁蘇軾改教授穎州未幾罷居彭城家益貧至纍日不炊妻子愠見不恤也久之召為祕書省正字適郊祀行禮寒甚妻以其衣無重綿假于友壻趙挺之家問所從來妻以實告師道素惡挺之之為人却去不肯服遂以寒疾死初遊京師吏部侍郎傅堯俞聞其賢欲與相見先以問秦觀觀曰是人可就見不可屈致傅堯俞曰非也吾將見之懼其不吾見也子能介我於陳君乎知其貧甚因懷金欲餽之及睹其貌聽其議論竟不敢出居都下逾年章惇欲一見之終不可得復制科解張舜民等言職初李乾順既立遣起居郎劉奉世為奉册使舜民以為夏人政亂權歸梁氏乾順存亡尚未可知未宜遽加爵命緣大臣有欲優假奉世者大臣謂彥博也太后以其語侵彥博且惡其有用兵之意罷舜民御史左遷監登聞鼓院于是中丞傅堯俞右司諫朱光庭御史上官均皆言舜民不當罷乞還舊職右諫議梁燾及御史王巖叟韓川等七人並爭之燾至二十疏不從堯俞等因家居待罪詔宰執召赴都堂宣諭堯俞等不奉命復上疏極言之于是皆相繼罷言職燾出知潞州巖叟知齊州堯俞知陳州初新法之行舜民上書云裕民所以窮民强內所以弱內闢國所以蹙國以堂堂之天下不當與小民爭利可恥也時人壯之五月阿里庫及夏人冦邊都監吳猛死之六月罷開樂宴侍講范祖禹上疏曰祥禫終即吉奢儉之端皆始於此臣以為珠璣金玉之飾錦繡纂組之工凡可以蕩心悅目者不宜有加于舊近聞奉宸庫已取珠子六十斤户部已用金至三千六百兩不為不多矣願預為之防又言君子之於喪服以為至痛之極不得已而除之若以開樂故時設宴則以除服而慶賀非不得已而除之意也惟因事則聽樂庶合先王禮意有詔寢罷有星如瓜出文昌復府界河陜路馬步軍府界六指揮河東五指揮陜西十指揮河北十一指揮各以五百人為額先是樞密范純仁請罷畿內保甲右丞王存言今京師兵籍益削又廢保甲不教非為國家根本長久之計且先帝為之已就緒無故廢之不可純仁與存同執政趨向多合而此議獨異蓋不茍相比也秋七月庚戌朔日有食之隂雲不見出張商英商英為開封府推官上書言三年無改於父之道先帝陵土未乾奈何輕議變更又簡蘇軾曰老僧欲住烏寺呵佛罵祖一巡其意欲作言事官也或以告吕公著不悅故出商英為江東提刑韓維罷自門下侍郎出知鄧州維面奏范百祿所為不正及非理事十餘條簾中怒甚以為不公具章疏何異讒毁御史吕陶先嘗劾維挾勢狥私百祿至畫五服圖以進以其多用親戚作美官也詔分司南京左丞王存連章論救中書舍人曾肇不草制吕公著亦言維有人望並不從八月賈易罷由右司諫出知懷州自洛蜀黨分易言吕陶黨助蘇軾兄弟而文彥博主之語侵彥博及純仁太后欲峻責易吕公著言易言頗直惟詆大臣太甚不可處諫列耳退語同列曰諫官所言未論得失顧主上方富于春秋異時有導諛惑上心者正賴左右力諫不可使人主輕厭言者吕大防劉摯王存私相顧而嘆曰吕公可謂仁者之勇程頤罷初頤嘗赴講㑹上瘡疹不御殿纍日頤詣宰相問知否且曰上不御殿太后不當獨坐人主有疾而大臣可不知乎翌日宰相以頤奏請問疾頤又往見諫議大夫孔文仲賀其與賈同官告以易攻陶數日矣今陶司諫之命已閣復下易畏義知恥必不要職欲文仲助易攻陶文仲奏其言且云臣居京師二年頤未嘗過臣門臣比除臺諫即來訪臣又以非意相干說諭如此方陛下清明而頤乃鼓騰利口間謀羣臣紛紛擾擾無有定日縱未誅戮且當放還田里乃命同管勾西京國子監文仲疏又言程頤乃五鬼之魁都下指為老鬼頭孫抃為小鬼尾吕公著諸子與事而小子希純尤甚其壻范祖禹外甥楊國寶引黃庭堅畢仲遊輩日夕聚論進退人物一言之出朝暮即應識者比之入關五鬼頤在講筵嘗上疏曰臣本山野之人性稟朴直言辭鄙拙則有之至於愛君之心事君之禮告君之道敢有不盡伏以太皇太后陛下心存至公躬行大道開納忠言委用耆德不但維持大業且欲興致太平前代英主之所不及也但能日謹一日天下之事不足慮也臣以為今日至大至急為宗社生靈長久之計惟是輔養上德而已歷觀前古輔養幼主之道莫備於周公周公可為萬世之法也臣願陛下廣髙世之見以聖人之言為可必行勿阻滯于近規勿迷惑于衆口古人所謂周公豈欺我哉周公作立政之書舉常伯至于綴衣虎賁以為知恤鮮一篇之中丁寧重復惟在此一事而已書又曰僕臣正厥后克正又曰后德惟臣又曰侍御僕從罔非正人出入起居罔有不欽是古人之意謂人主跬步不可離正人也蓋所以涵養氣質薰陶德性故能習與智長化與心成後世不復知此謂人主就學所以涉書史覽古今也不知涉書史覽古今乃一端耳若止如是則能文宫人可以備勸講知書內侍可以充輔導何用置官設職精求賢德哉大抵人主受天之命稟賦自殊歷考前史帝王才質鮮不過人然而全德有道之君至少其故何哉皆輔導不得其道而位勢使之然也伏惟皇帝陛下天資粹美德性仁厚必為有宋之令主但恨輔導之道有未至爾臣供職以來六侍講筵但見諸臣拱手默坐當講者立案旁解釋數行而退如此雖彌年積嵗所益幾何與周公輔成王之道殊不同矣或以為主上方幼且當如此此不足之論也古之生子能食能言而教之大學之道以豫為先人之幼也知慮未有所主便以格言至論日陳於前雖未曉知且常薰聒使盈耳充腹久自安習若固有之雖以他言惑之不能入也若為之不豫及乎稍長私意偏好生于內衆言辨口鑠於外欲為純全不可得也故所急在先入豈有太早者乎又以為人主天資至靈自無違道不須過慮此尤非至論矣聖莫聖于舜而禹臯陶未嘗忘規戒至曰無若丹朱好慢遊作傲虐且舜之不為慢遊傲虐雖愚亦當知之豈禹而不知之乎處崇髙之位警戒之道不得不如是也且人心豈有常哉以唐太宗之英睿躬歷艱難力平禍亂年亦長矣始惡隋煬侈麗毁其層觀廣殿不六七年復欲治乾陽殿是心果可常乎所以聖賢雖明盛之際不廢規戒為慮豈不深逺也哉况幼冲之君間邪拂違之道可少懈乎又曰開發之道蓋自有方朋習之益最為至切故周公輔成王使伯禽與之處聖人所為必無不當真廟使蔡伯希侍仁宗乃師古也臣欲擇臣寮家子弟十嵗以上十二嵗以下端謹頴悟者三人侍上左右所讀之書亦使之讀辨色則入昏而罷歸常令二人入侍一人更休每人擇有年宫人內臣二人隨逐看承不得暫離常情笑語亦勿禁止惟須言語必正舉動必莊仍使日至賢善堂呈所習業講官常加勸教使知畏憚方年十三便令罷去嵗月之間自覺其益又曰今講讀共五人四人皆兼要職獨臣不領别官近差修國子監太學條例是亦兼也乃無一人専職輔導者執政之意可見也蓋愛惜人才不欲使之閒爾又以為雖兼他職不妨講讀此尤不思之甚也不敢言告君之道只以告衆人言之夫告於人者非積其誠意不能感人也故聖人以蒲蘆喻政謂以誠化之也今夫鐘怒而擊之則武悲而擊之則哀誠意之感人也告于人亦如是古人所以齊戒而告君者何謂也臣前後兩得進講未嘗敢不宿齊豫戒潛思存誠覬感動於上心若使營營於職事紛紛其思慮待至上前然後善其辭說徒以頰舌感人不亦淺乎此理非知學者不能曉也又曰竊以為聖人之學不傳久矣臣等得之于遺經不自度量以身任道天下駭笑者雖多而近年信從者亦衆方將區區駕其說以示學者覬得傳於後不虞天幸之至得備講說於人主之側誠使得以聖人之學上沃聖聰則聖人之道有可行之望豈特臣之幸哉如陛下未以臣言為信何不一賜訪問臣當陳聖學之端緒發至道之淵微陛下聖鑒髙明必䝉照納如其妄僞願投誅殛是疏去年六月也七年夏頤以服闋除直祕閣西京國子監上表辭略曰臣力學有年以身任道惟知耕食以求志不希利達以干時陛下詔起臣于草萊之中而授臣以講說之職臣竊思之得以講學侍人主茍能致人主以堯舜禹湯之道則天下享唐虞夏商之治儒者逢時孰過于此臣於是幡然有許國之心在職嵗餘畢精竭慮方進沃心之論實覬不傳之學復明於今日作聖之效逺繼于先王不思道大則難容跡孤則易躓入朝見嫉世俗之常態髙名毁甚史册之名言如臣之愚豈免衆口不能取信于上而欲為繼古之事成希世之功人皆知其難也臣何狂簡敢爾覬幸志既乖于仕道義當致於為臣屢懇請而未從俄遭憂而罷去銜恤既終於喪制退休當遂於初心豈舍王哉忠戀之誠如結不得已也去就之義當然監察御史董敦逸遂摘頤辭表中語上疏言頤狂賤迂疏妄自尊大肆為狂言至引孔孟伊周自比又自謂得儒者進退之義惑衆慢上無甚于此望寢新命頤亦纍奏控免遂命勾管崇福宫頤即承領敕牒但稱疾不拜假滿百日竟以尋醫而歸詔西邊嚴備詔夏國政亂主幼失藩臣禮皆强臣齊約特之故其君民非有罪也興師討伐有所未忍諸路帥臣宜嚴兵自備如能洗心效順與之自新復洮州西蕃大酋領果莊棟戬别將也桀黠有謀所部兵鋭數為邊患熙寧中誘陷景思立先帝屢欲生致之至是聞朝廷罷兵又知夏人之怨失蘭州也遂合從冦邊吕公著建議遣軍器監游師雄諭㫖諸將便宜出師時夏人聚兵于天都山前鋒已屯通逺境上駐常家山大城洮州以待師期師雄將先發以制之告熙河帥劉舜卿舜卿曰彼衆我寡奈何師雄曰此機不可失倘不濟願為首戮舜卿乃召將佐議三夕乃從總管姚兕神誼請分兵兩路急裝輕齎並洮水而進兕部洮西誼部洮東黎明至洮州城下既築未就一鼓破之斬千七百級奔溺者數千遂擒果莊及大首領青伊結等九人捷奏范純仁請誅果莊塞上以謝邊人而議者欲致其子取河南故赦而不誅諫官王覿言果莊之子既不聼命則檻車致之闕下者將遂斬之耶獻之廟社而後赦之耶臣竊以為非計也莫若破檻車處之洮岷秦雍間不惟示聖朝含容亦所以懷其死黨也不從果莊至闕下吕公著賀遣使告裕陵獻俘上御殿詰問聼招其子及部屬以自贖尋命為陪戎校尉九月太皇太后御崇政殿受册初有請后御文德殿服冠冕受册曾肇言天聖二年兩制議皇太后受册于崇政殿仁宗時詔於文德殿今皇帝述仁宗故事以極崇奉之禮臣謂太皇太后倘于此時於崇政殿受册則皇帝之孝愈彰太皇太后之德愈尊矣后欣然後數日執政奏事后諭曰性本好靜昨緣主上幼冲權聼政事蓋非得已况母后臨朝非國家盛事文德殿天子正朝豈女主所當御吕公著等曰陛下思慮精深非臣等所及夏人冦邊冦鎮戎軍尋遁去時西邊稍寧而近塞時苦冦掠樞密安燾謂為國者不可好用兵亦不可畏用兵好則疲民畏則取侮今朝廷每戒邊吏非舉國入冦不得應之則固畏用兵矣然虜數犯邊亦未免病民雖僅保城壘適墮其計願復講攻擾之䇿如左氏所謂用三師以疲楚之意此計最上也禁造箔金冬十月更科舉法進士分四場以經義詩賦論䇿通定去留髙下新科明法增論語孝經經義分五場四年夏詔進士不兼詩賦人許依舊法取應于本經外增治一經續禮部奏詩賦進士聽習一經第一場試本經義二道論語及孟子義各一道第二場賦及律詩一首第三場論一道第四場子史時務䇿二道經義進士並習兩經以詩禮記周禮左氏春秋為大經周易書公羊穀梁儀禮為中經願習二大經者聽不得偏占兩中經其治左氏春秋者不得以公羊穀梁為中經第一場試本經義三道論語義一道第二場本經義三道孟子義一道餘如前並以四場通定髙下去留不以人數多寡各取五分即零分及元額解一人者聼取文理優長之人罷武臣換文法命講讀官進故事遇不講日輪具漢唐故事有益政體者二條進入蘇頌等尋編類賜名邇英要覽十二月賑饑窮以大寒出禁錢十萬緡賜貧民明年又發京西穀五十餘萬石賑糶戊辰元祐三年春正月復廣惠倉二月以豐稷為國子司業稷為左司諫言楊王頴荆王頵嘗令成都路走馬承受宦者造錦地衣仰惟二聖節儉朴素欲化天下而近奢侈僭靡至如此監察御史趙㞦時與稷同進對謂稷曰聞君言使㞦汗流浹背給事中趙君錫曰諫官如此天下必太平不數日稷遷司業詔文臣繫銜分左右自朝議至金紫光祿進士為左餘人為右明年冬又詔朝議大夫以下並分左右紹聖二年罷之正議以上如故崇寧四年又詔朝議中散正議光祿銀青光祿大夫分左右為兩資應轉者先右而後左三月親試舉人賜李常寧以下及第出身有差增賜錢百萬酒五百壺為期集賞夏人冦邊德靖寨張誠敗之夏四月以吕公著為司空同平章軍國事吕大防范純仁為左右僕射三相制詞學士蘇軾所草也是夕軾對于內東門小殿既承㫖太皇太后曰有一事問內翰前年何官何以至此軾曰遭遇陛下與官家太皇曰不關老身及官家事軾曰豈大臣論薦耶太皇曰不關大臣事此事神宗之意當其飲食而停筯看文字則內人必曰此蘇軾文字也神宗忽時稱曰竒才竒才但未及用內翰而上仙耳軾哭失聲太皇與上左右皆泣已而命坐賜茶曰內翰直須盡心事官家以報先帝知遇軾拜出宋興以來以三公平章軍國事者四人二人公著許公子也議者榮之夏人冦邊塞門寨朱贇郝普等死之五月寬奏讞法詔奏讞不當者免按罪六月嚴選用臺諫法初太皇太后諭宰執曰近臺諫官多新進未更事所論不知大體近於求名詔自今司諫正言殿中監察可體祖宗故事以升朝官通判諸序及一年者為之秋八月渠陽蠻冦邊九月䇿制科謝悰尋以紕繆罷之冬十月廢渠陽軍去秋改誠州為渠陽軍至是詔曰頃以荆湖諸蠻請吏置城以撫之而希功者輒侵洞穴致生疑懼其罷新創堡寨廢渠陽軍五年冬湖北路奏渠陽軍蠻首楊晟秀請降復渠陽寨為誠州補溪峒舊族楊氏之子昌達為刺史紹聖元年九月議棄渠陽官吏罪集賢殿撰唐義問等並黜為散官邢恕罷知汝州初太皇太后姪公繪上書太皇太后請尊禮太妃為髙氏異日之福太皇詰公繪誰為作此書公繪對以起居舍人邢恕時恕方召試中書舍人因是遂補外復南北宣徽使視簽書樞密院議回河令吏部侍郎范百祿給事中趙君錫相視初大河東流元豐中小吳河決流遂北先帝知故道不可復還因導之北流水性已順惟河道未深隄防未立嵗有決溢之患本非深害其後朝廷用王令圖議將復大河故道詔李常視之常言不可役已興旋罷時元祐元年也尋又詔張問同令圖相度開孫村口河以分減水勢朝廷既從之後亦中輟二年令圖死王孝先代領都水亦欲開孫村減水河如令圖議太師文彥博以河為重事與中書侍郎吕大防樞密副使安燾從而和之謂濁河流入界河久之必淤淺若河流尾直注北界則河朔全失險阻無以禦戎故主其議同列莫能奪惟范純仁堅執以為不可回中書舍人蘇轍見右僕射吕公著乘間問曰公自觀智勇孰與先帝勢力隆重能鼓舞天下孰與先帝公著驚曰君何言歟曰河決而北自先帝不能回而諸公欲回之是自謂智勇勢力過先帝也且河決自元豐導之北流亦自元豐是非得失今日無所與諸公不能因其舊而修其永備乃欲取而回之其為力也難而其為責也重矣左丞王存亦主新道之議竟莫奪也回河之議遂興時河北運使兼外都水使者謝卿材亦言近嵗河流稍行無可回之理上河議一編召至政事堂會議持論不屈忤大臣之意十一月減䕃補恩閏十二月太皇太后諭宰執曰本家恩澤亦當先議裁省要自上始則均一矣已而下詔四分減一損吏額後省定吏額以范百祿蘇轍領之吕大防欲廢其半百祿曰失職者衆法必不行莫若以漸去自今犯罪及死者勿補大防不從㑹百祿出使轍専領其事吏有白中孚者告轍曰吏額不難定昔之流內銓今侍郎左選也事之劇莫過此矣昔銓吏止十數而今左選吏至數十事不加舊而用吏至數倍何也昔無重法重祿吏通賕賂則不欲人多以分所得今行重法給重祿賕賂比舊為少則不望人多而幸於少者此吏額多少之實情也舊法日生事以難易分七等重者至一分輕者至一釐以下積若干分而為一人今若取逐司兩月事定其分數則吏額多少之限無所逃乃具白宰相請據實立額遂自尚書省取諸司兩月生事諸司吏皆俱莫肯供再申乞榜示使知立額俟他日見闕不補非即今損也榜出文字即具大防得之喜以問三省吏莫能曉有諸司吏任永壽者精悍而猾與三省吏不相能具以諸吏姦告大防深然之乃取其事致吏額房于都省召永壽領之一日內降畫可六曹吏額房吏請封送尚書省中書侍郎劉摯曰録黃當送門下今封送何也吏言尚書以吏額事每卷入必經下本省已久今誤至此摯曰中書不知其第當如法令遂作録黃永壽見録黃愕曰兩省初不與今安得此即稟大防命兩省各選吏與其事以是語摯摯曰中書用法行録黃非省意與吏為道地也今乃使吏就都省分功何耶他日大防又持奏藁示摯曰省吏額事欲謹密而速故徑行下然未經立法欲三省同奏作致仕官法摯曰此非其類也當聚議明日大防復出奏稿示摯曰不可不爾摯諾之其事遂畢以立額裁損吏員永壽積勞補官餘吏遷轉有差于是外議洶洶臺諫交論以諭事在後省久永壽攘去才兩月而都司擅擬優例冒賞章數十上永壽以贓刺配大防不懌未幾摯遷門下侍郎及臺諫共攻大防大防稱病不出摯每於上前開陳吏額本末曰此皆被減鼓怨言路風聞過實不足深究大防他日語人曰使上意不疑劉門下之力居多然而士大夫趨利者交鬭其間而朋黨之論起矣摯自除門下纍請外不允久之始復視事閏十二月范鎮卒贈右金紫光祿大夫諡曰文忠公熙寧元豐間士大夫論天下賢者必曰君實景仁其道德風流足以師表當世其議論可否足以榮辱天下鎮始以詩賦為名進士及為館職侍從以文學稱雖屢諫諍及論儲闕事朝廷信其忠然事頗祕莫盡知也其後議濮安懿王稱號守禮不回而名益重及論熙寧新法與王安石吕惠卿辨論至廢黜不用然後天下翕然師尊之無貴賤賢愚謂之景仁而不敢名有為不義必畏鎮知之元豐末鎮㑹葬永裕陵下蔡京謂鎮曰朝廷將起公矣鎮變色曰鎮以論新法不合得罪先帝一旦棄天下其可因以為利乎元祐初詔落致仕除侍讀赴闕鎮辭又降詔曰西伯善養二老歸來漢室卑詞四臣入侍為我强起無或憚勞朝廷之起鎮蓋欲授以門下侍郎鎮固不起又遺書問其從孫祖禹亦勸止之鎮大喜曰是吾心也凡吾所欲為者司馬君實已為之何用復出也裁省冗費自宫掖始三省言官俸比舊例以前雖減而公使日多治平支一十六萬緡今支七十五萬緡乞比舊制例裁減户部亦請裁節浮費于是置局于户部檢寶元慶厯嘉祐政事擇近臣共議仍詔諸班軍人依舊外餘並裁省户部又言宫掖之費有司不得而見乞詔內侍省裁省禁中之費以報省司從之九朝編年備要卷二十二
