body:
  text: 九朝編年備要巻十九宋陳均撰神宗皇帝起辛亥熙寧四年止甲寅熙寧七年辛亥熙寧四年遼咸熙七年春正月以内侍程昉同簽書外都水監丞都大提舉黃御等河同簽書内侍簽書新制也渝夷寇邊廵檢李宗閔死之未幾䕫路運使孫紹先判官張詵奏討平夷賊李承秀等斥地七百里鬻廣惠倉田為三路及京東常平本其當賑濟即以廣惠常平倉所貯粟麥給之初王安石建此議曾公亮曰佃戸或百年承佃有如已業今鬻之則失職上曰只令佃戸買之安石曰廣惠倉田本是戸絶因置廣惠倉方不許賣固無百年佃戸也公亮曰㓙年頼此賑濟奈何上曰有常平法㓙年不患無賑濟公亮曰利不百不變法上曰事理可行自無不利安石曰利者義之和公亮曰亦有利於公家不利於百姓者不可謂之義上卒從安石之説二月議更科舉法罷詩賦明經諸科以經義論䇿試進士初王安石以為古之取士俱本于學請興建學校以從古其明經諸科欲行廢罷取元解明經人數増進士詔兩制兩省御史臺三司三館議之韓維請罷詩賦各習大經問大義十道以文解釋不必全記注疏通七以上為合格諸科以大義為先黜其不通者蘇頌欲先士行而後文藝去封彌謄録之法直史館蘇軾上議畧曰得人之道在于知人知人之法在于責實使君相有知人之明朝廷有責實之政則胥吏皂𨽻未嘗無人而况於學校貢舉乎雖用今之法臣以為有餘使君相無知人之明朝廷無責實之政則公卿侍從常患無人况學校貢舉乎雖復古之制臣以為不足矣夫時有可否物有興廢使三代聖人復生于今其選舉亦必有道何必由學乎且慶厯間嘗立學矣天下以為太平可待至于今惟空名僅存今陛下必欲求徳行道藝之士責九年大成之業則將變今之禮易今之俗又當發民力以治宫室斂民財以養㳺士置官立師而又時簡不帥教者屏之逺方徒為紛紛其與慶厯之際何異至于貢舉或曰鄉舉徳行而畧文章或曰專取䇿論而罷詩賦或欲取唐故事兼取譽望而去封彌或欲變經生朴學不用帖墨而考大義此皆知其一未知其二者也夫欲興徳行在於君人者修身以格物審好惡以表俗若徒欲設科立名以取之則是教天下相率而為偽也上以孝取人則勇者割股怯者廬墓上以亷取人則敝車羸馬惡衣菲食凡可以中上意者無所不至徳行之弊一至於此自文章言之則䇿論為有用詩賦為無益自政事言之則詩賦䇿論均為無用矣雖知其無用然自祖宗以來莫之廢者以為設法取士不過如此也近世文章華麗無如楊億使億尚在則忠清鯁亮之士也通經學古無如孫復石介使復介尚在則迂濶誕謾之士也矧自唐至今以詩賦為名臣者不可勝數何負於天下而必欲廢之上曰朕固疑此即日召軾問何以助朕軾曰陛下求治太急聽言太廣進人太鋭願陛下安靜以應之上問安石軾何如人且言欲用軾修中書條例安石知軾異巳恐上用之也對曰軾與臣所學及議論皆異若修中書條例須與臣意同乃可如軾者别以事試可也于是卒除聲律專意經義罷明經及諸科立新制如安石之議進士罷詩賦各占治詩書易周禮禮記一經兼以論語孟子每試四塲初本經義五道論語孟子義各三道次論一道次時務䇿取諸科解名十分之三増進士額置京畿等五路學京東西河東北陜西尋以陸佃等為諸州學官州給田十頃為學粮仍置小學教授八年秋詔諸州學官先赴學士院試大義五道取優通者選差以司馬光判西京留臺光時自永興移知許州初光在永興宣撫司請修城壁内郡亦如邊郡光奏罷之又請屯兵長安河中邠州光言嵗㓙無以供億宣撫司賦民造乾粮麨飯光以為昔嘗造後無用腐棄之民力可惜又奏災傷地分所欠青苗錢許倚閣牒所属未得依司農寺指揮催理詔提舉司催理如司農寺指揮不得施行牒光知言不用乞判西京留司御史臺不報又上章言臣之不才最出羣臣之下先見不如吕誨公直不如范純仁程顥敢言不如蘇軾孔文仲勇决不如范鎮誨于安石始知政事之時已知安石為姦邪謂其必敗亂天下純仁與顥與安石素厚安石㧞之處清要及覩安石所為不敢顧私恩廢公議極言其短軾上書對䇿指陳其失隳官獲譴無所顧忌安石熒惑陛下以佞為忠以忠為佞以是為非以非為是鎮不勝憤懣抗章極言自乞致仕甘受醜詆杜門家居又言陛下惟安石之言是信安石以為賢則賢以為愚則愚以為是則是以為非則非上曰未用論其言與否如光者常在左右人主自可無過光力辭許州固請留臺久之乃從其請光自此絶口不復論新法三月夏人㓂邊是春韓絳遣种諤築囉兀城及撫寧堡調發倉卒關陜騷然吕公弼上言諤既城囉兀又増堡障今大兵殺獲已多虜方懷忿日夜聚兵必為邊患願罷城築專為持重不聽至是為夏人所陥囉兀亦棄不守初上遣戸部副使張景憲等按視景憲受命即奏曰二城不可守臣固不待到而後知行未半道撫寧已陥至鄜延條奏道路所見百姓憔悴師旅咨嗟願罷徒勞之役廢無用之城嚴勅諸將大為守備而已种諤誤國乞正典刑及言入鄜延界詢求囉兀利害無一人言便者乞速行毁廢諤尋責置許州未幾又貶為賀州别駕浚漳河役兵及萬人上患財用不足文彦博曰要豐財安百姓須省事如漳河累年不開何所妨河不在東邊即在西邊利害一也今發夫開河只移得東邊河却掘西邊民田於民則亦何所利王安石曰若治使行地中則有利而無害若或東或西利害一也則禹何須浚川盡力溝洫勞民誠不可輕然以佚道使民雖勞不可不勉上笑慶州兵亂討平之王文諒者夏國用事臣藏羅滂家奴得罪自歸王安石薦其才加閣門祇候韓絳先遣文諒出界凡官軍斬級多奪與蕃軍至掘塚戮屍為級邠寧廣鋭都虞候吳逵嘗與文諒爭馬文諒怨之誣以夜至都會與賊闘呼逵不至及煽揺軍士宣撫司送逵慶州獄四十日絳至慶州將斬逵部卒喧呼乃復送獄數日賊攻囉兀甚急絳命慶州出兵牽制廣鋭兩指揮謀擁逵為亂雨作不授甲乃止遂焚北門大譟縱掠斬關而出林廣説以逆順多投降者時逵已擁衆出餘黨猶在城下廣諭降者曰亂首去矣爾曹本非同惡若聽我不唯得活且有功因收集得百餘人至營激厲約束授以兵器令攻城下兵擒戮皆盡城遂平韓絳罷責知鄧州以撫寧堡失守也責詞云聽用匪人違戾初詔統制亡狀綏懐寡謀暴興征師罙入荒境卒伍駭撓橫罹轉戰之傷丁壯驅馳重疲齎餉之役邊書旁午朝聽震驚其後上命張吉甫為勾當市易吉甫辭以見為李璋指使璋方在降謫一旦捨去義所不安上嘆曰十室之邑必有忠信吉甫雖小人陳義甚髙賢于李清臣逺矣可遂其志初清臣為絳管幹機宜㑹絳貶清臣多毁絳以自全故上薄之夏四月以常秩為右正言秩潁川人舉進士不中退在陋巷為學自得尤長於春秋嘗謂孫復所學商君法耳歩過六尺與棄灰於道者有誅不近人情甚矣皇祐中歐陽修為州劉敞王回與之逰聞秩居里巷有節行間亦與之燕集由此知名嘉祐五年用胡宿薦命為本州教授英宗召之以疾辭至是有仕進意二公與秩談時政秩以時政為是修隨折之安石命本郡以人船送秩赴闕至京師館于太學召對上問所以久不起之意秩對先帝召臣以官故臣不敢至陛下不以官召臣臣所以起上大悦又問安石公著優劣及時政是非秩對青苗等事皆合古義安石知經知道公著不知經不知道修于浮文為長明日遂除修自去潁每為詩思潁無不及秩公著薦之尤力一旦秩為安石所誘二人大失望遂不復與相見初吕惠卿章惇輩事修亦甚謹及修老失勢不復顧修歸潁又失秩終身自咎以為知人之謬秩以處士超為右正言直集賢院判國子監不踰年待制寳文閣兼判太常寺中間謁告歸汝隂上降詔召之兩制降詔自秩始也㑹放進士秩籍太學生之薄於行者置袖間毎唱名有之即乞黜落如是者三四上方披閲試巻秩又有請往往不省秩言秩大以為沮謁告不朝一日翰林學士楊繪坐禁中俄有太常寺吏到院者繪舊判太常命至前詢其來之故即云常待制以謁告月餘未有詔起令刺探消息楊曰此禁中豈可妄入我若置汝于戾累及待制汝速出或告秩曰臺官欲以私覘禁中為言秩大恐遂以病歸既而卒熙寧十年春也賑河北饑詔省倉不能多給當自以常平廣惠倉監司州縣毋得有所吝抑於民上自即位大修常平法所蓄既豐名亦不一有曰貸粮種子者有曰借助賑貸者以息賑濟者也有曰賑糴者减價糴榖以賑之也有曰賑濟者直與以賑之也上嘗欲改貸粮法為賑濟文彦博曰貸粮法最古不可罷王安石言古有賒貸出息即今借助法是也古有周民艱阨即今賑濟法是也故卒改之是冬蠲諸路貸粮計米一百六十六萬石錢十一萬緡皆有竒六月歐陽修致仕初修請老上不許王安石曰如此人與一州則壞一州在朝廷則壞朝廷留之何用上以為然乃以觀文殿大學士太子少師致仕諌臣楊繪言今舊臣告歸或屏於外者悉未老范鎮年六十三吕誨五十八歐陽修六十五而致仕富弼六十八被劾引疾司馬光王陶皆五十而求閒散陛下可不思其故耶修卒于明年之八月國朝揣摩五代末流文章專以聲病對偶為上如楊億劉筠其學博矣然亦不能自㧞於流俗反推波揚瀾助其氣勢則爭慕效之謂之崑體修年十五六時于隣壁角破簏中得唐韓愈集本學之後獨能棄時俗故歩是時尹洙與修俱以古文倡率學者然洙才不逮修文遂行于世文體為之一變庶幾乎西漢之甚盛者由修發之詔潁州令其家上修所撰五代史富弼坐格青苗法徙判汝州先是鄧綰言知亳州富弼責蒙城官吏散常平錢榖妄追縣吏笞之又遣人持札下諸縣令未得依提舉司牒施行本州簽判徐公衮以書諭諸縣使勿奉行詔令乞根治詔送亳州推勘其富弼令案後収坐弼奏官昨來不敷青苗錢解其罪不在他人及令本州簽判徐公衮等宻與前縣書題是臣不敢明廢格新法又恐諸縣便行支散各曹令其因書傳臣之意諭與諸縣情狀甚明所以累奏乞獨坐獄成詔落弼平章事為尚書左僕射徙判汝州弼到汝州兩月乞就西京養疾從之通判唐諲簽判徐公衮及七縣令佐皆坐黜弼明年三月致仕秋七月河决北京新堤第四第五埽决漂溺館陶永濟清陽以北韓琦言大河泛溢全魏居衝非通判以下所能預詔釋之上以河漲北使道不通出圖示近臣王安石曰澶州埽危急二口可且勿問八月溢澶州曹村十月溢衛州决新堤二埽下属恩冀貫御河奔衝為一尋命修二股河上流楊繪劉摯罷繪落御史中丞為翰林侍講學士摯落監察御史裏行監衡州鹽倉明日以繪知鄭州初東明縣民以縣賦助投錢不當相率遮宰相自言凡數百家王安石遂白上曰知縣賈蕃者范仲淹壻好附流俗非上所建立上以為然因令究東明事繪言東明百姓千百人詣開封訴超升等第出助役錢事本府不受百姓既無所訴遂突入安石私第安石問汝來知縣知否皆云不知又詣御史臺臣以本臺無例収接詞訴諭令散去退而訪問乃司農寺不依諸縣元定戸等却以見管戸口量等第均定助役錢數付諸縣管認别造簿籍前農務而畢臣竊謂凡等第升降視民産髙下須憑本縣本縣須憑戸長里正戸長里正須憑鄰里今仍自司農寺先畫數令本縣依數定簿豈得民心甘服哉且言助役難行之説有五摯言願降指揮今來新法逐縣未得施行及根究司農寺承凖是何條制輒有升降等第且言助役法之害有十安石為上言繪不宜久在言職上批賈蕃可令治其不奉法之罪繪摯論奏不已安石使張琥為十難以詰之琥辭不為曽布自請為之且言繪摯内懷邪詖有所向背詔令繪摯分析以聞繪具録前後論助役法四奏自辨且言曽布自海州懷仁令轉著作郎今方及一年十箇月遂知制誥夫賢能不待次而舉王者之善政臣觀曾布天下未見其賢止縁王安石姻家而進筦助役文字以臣所言利害事加之以邪詖欺罔夫正人既呼小人為邪小人亦謂正人為邪何以辨之且布既以有所向背指臣則必以勁特自處也薫蕕不可同器臣願從逺竄以清朝列摯言曽布謂臣中有向背則臣所向者公所背者私所向者義所背者利所向者君父所背者權臣今方辨助役之利害而無故立向背之論以朋黨之意教誘天下甚可駭也陛下以臣言為是則事盡於前奏以臣言為非則貶黜之而已雖使復言亦不過所謂十害者是以不復條陳不惟費辭文過盖以風憲之官而與有司較是非勝負交口相直如市人之詬競者豈不辱陛下耳目之任哉安石曰繪所奏前後反覆今並不分析布所言事理摯言所向者公所背者私不知何以為私遂有是命初摯以是嵗四月除臺職未及陛對即上言亳州官吏昨以住滯青苗本錢差官助勘今經累月訪聞命官及干係人甚衆遂成大獄驚駭物聽臣愚以為不依限散青苗錢一言可定而起獄不止有司未測朝廷風㫖張皇事勢連逮證佐當此暑月殊可矜恤望速指揮圓結以王韶為秦鳳沿邊安撫議開熙河吐蕃遺種獨嘉勒斯賚一族最盛雖西夏亦畏之朝廷封西平王用為藩翰嵗貢不絶先是關中土人多言其利害雖橫渠張載之賢少時亦欲結客取之既登第乃已仁宗朝韓琦富弼為相凡言開邊者不納王安石進用韶上平戎䇿謂國家欲平西夏當復河湟河湟復則西夏有腹背受敵之憂今古渭之西熙河蘭鄯皆漢隴西等郡董氈雖國其間而不能制諸羌宜并有之以絶夏人右臂凡數千言投匭以進詔召對方畧安石以為竒謀乃以韶為秦鳳路經畧司機宜始開熙河之役韶尋上言渭源城下至秦州沿河五六百里良田不耕者萬頃每頃約用錢三萬嵗収不下三百石以一百石為人牛粮種外尚存二百石也秦鳳一路接連西夏諸蕃貨物嵗百千萬盡為商賈之利欲于本路置市易司借官錢為本即一嵗之入亦不下一二十萬緡乃以韶為安撫司勾當公事仍詔秦鳳路經畧司借封樁錢三萬付韶募人耕種及以本司見管西川交子轉易貨物赴沿邊置塲與西蕃市馬至是除安撫使兼營田市易韶言措置洮河事只用回易息錢未嘗輒費官本文彦博曰工師造屋初必不計冀人易於動功及既與作知不可巳乃方増帛上曰屋壞豈可不修安石曰主者善計自有忖度豈至為工師所欺王雱為崇政殿説書雱安石子也為人剽悍無所顧忌安石與弟安國白首窮經雱從旁剽聞而下筆貫穿未冠已著書數十萬言年十三時得秦州卒言洮河事嘆曰此可拊而有也故安石力主王韶議雱既登第安石暴進用執政多少年雱尤欲與選乃與父謀曰執政子雖不可與事惟經筵可處安石欲上知而自用乃以雱所作䇿三十篇及注道徳經鏤鬻于市遂傳達于上而鄧綰曾布等又力薦之遂有是命人謂安石必辭乃殊不然但為雱一狀申堂便自受勅八月髙麗來貢自天聖八年王詢修貢之後絶不通中國者四十餘年詢孫徽嗣立是為文王至是始復來貢九月辛夘大饗明堂夏人請和乞綏州城願依舊約詔荅夏主秉常畧曰夏國去秋自絶朝廷深入環慶路殺掠熟戸侵犯城寨須至舉兵入討朕為民父母亟令班師毋得窮武今國主遣使歸欵欲繼舊好休兵息民甚善所言綏州前已降詔更不交割夏國塞門安逺二寨綏州亦不給還十二月詔歸夏俘明年秋又詔陜西毋侵掠夏境時夏人已進誓表故有是命上嘗謂安石曰楚建中言昨陜西用兵凡費緡錢七百餘萬有是否安石曰臣亦疑之然建中稽考沈起簿書數果如是錢銀紬絹共千二百萬貫疋一路半年有竒所費己如此之多何由供億增選人俸冬十月罷差役行募役法詔差役弊民其罷之更出直募人充投令人戸以等第輸錢謂之免役錢官户女戸单丁未成丁不充役者亦等第輸錢謂之助役錢皆吕惠卿所定也幸新東西府去年秋詔作東西府以居執政至是成因幸焉立出官試法選人及任子並令試斷案律令大義或時議乃許出官六年三月詔進士諸科並令試律義或斷案始出官八年秋又詔進士第一人以下並試初詔自三人以下始令試法中書習學練亨甫言髙科任簽判及職官與一州之事其於習法豈所宜緩前此試刑法者世皆指為俗吏今朝廷推恩雖厚而應者尚少若髙科不試則人不以為榮矣乃詔悉令試焉元豐二年夏令進士免試法建太學立三舍法鄧綰言治平百餘年即未嘗營建太學止是假錫慶院西北隅廊屋數十間逼窄湫隘詔改錫慶院為太學初太學養士亦未有論選升降之法至是中書言初入學為外舍不限員外舍升内舍二百員内舍升上舍一百員生員各治一經未幾學官焦千之王汝翼梁師孟顔復盧侗五人皆罷初蘇頌子嘉在太學顔復嘗䇿問王莽後周變法事嘉極論為非在優等蘇液宻冩以示曽布曰此軰唱和非毁時政布大怒責張琥曰君為諌官判監豈容學官與生徒非毁時政而不彈劾遂以告安石安石大怒遂逐諸學官以李定常秩同判監選用學官非執政所喜者不與陸佃黎宗孟葉濤曾肇沈季良與選季良安石妹壻濤其侄壻佃門人肇布弟也佃等夜在安石齋授口義旦至學講之無一語出已其設三舍皆欲引用其黨耳作中太乙宫壬子熙寧五年春正月置京城邏卒皇城卒七十人開封府散從官數十人廵察謗議時政者収罪之二月賑兩淅饑以兩浙水賜榖十萬石以賑之募民興水利濬二股河三月立文武換官法行市易法從宗澤魏繼宗之請也王安石奏行之置京師市易務凡貨之滯不售者平其賈市之欲市于官者則度其抵而貨之行抵當収息之法以戸部判官吕嘉問提舉賜内藏緡錢百萬緡京東路錢八十七萬緡為本尋以榷貨務為市易西務下界市易務為東務上界以在京商税院雜買務雜賣場𨽻焉元豐七年復改市易下界為榷貨務嘉問及劉佐明年夏並以市易務嵗収息錢有羡遷除上嘗問安石曰聞榷貨賣冰致民賣雪不售又曰聞賣梳樸則梳樸貴賣脂麻則脂麻貴又曰吕嘉問少年不練事所用人皆姦猾嘉問不能檢察安石曰在京師官若皆能寤寐飲食不忘職事又能曉達事情如吕嘉問即朝廷可以無事矣以内侍李憲為河北沿邊安撫勾當安撫司公事夏五月置通逺軍詔以古渭為通逺軍命王韶兼知軍古渭唐渭州也至徳中陥于吐蕃皇祐中始得其地上將恢復河隴故命建軍為開拓之漸上嘗言古渭可建軍王安石曰蕃人但見貴種則已悦慕附從若説以中國威靈而懷之以道何憂不集聞近羌夷盡來通逺决曲直既盡來則易成臨長之勢臨長既成則化為内地不難矣上尋議授青唐大首領俞龍珂官欲與内殿崇班且厚賜之以鼓動其餘生羌安石言若自朝廷奬擢則安撫司更無可驅誘之理莫若令王韶輩隨事大小與官賞則俞龍珂必為實用上曰王韶恐不敢乞與俞龍珂官安石曰陛下諭㫖可也上曰卿將書説與乃從安石議下安撫司授龍珂西頭供奉官賜姓包名順未幾安石以韶書進呈言巳拓地千二百里招附二千餘萬口然此特衆人以為異效韶所欲為朝廷施為此尚未髣髴料相公亦不止期韶以此立宗室應舉法非袒免親許應舉補官九月宗室試換文資自令鑠始加趙尚寛等官尚寛司農卿髙賦秘書監張恂京西提舉先是王安石言髙賦興水利功甚多向以人言放罷初未沾恩欲再勘㑹推賞上曰善于是并尚寛恂等進呈上諭執政曰尚寛等于唐州闢田䟽水招集人戸殆無曠土已有成效並與加職以勸天下上又諭人有才不可置之閒處因言漢武帝亦言用人才安石曰武帝所見下所用將帥止衛霍輩至天下戸口减半不能㓕匈奴上曰武帝自為多欲耳安石曰欲亦不能害政如齊桓公亦多欲矣而注厝方畧不失為伯能用人故也上曰漢武帝至不仁以一馬之欲勞師萬里侯者七十餘人視人命若草芥所以戸口减半也安石曰不仁如此非特人禍隂陽之報亦豈可逃也初京西多曠土唐州閒田尤多尚寛知州事乃按圖記得召信臣故迹益發卒復三大陂一大渠皆溉田萬頃又教民自為支渠數十轉相浸灌四方之民來者以荒地計口授之貸民官錢置牛比三年廢田盡為膏腴尚寛在州前後凡五年增戸萬餘安石嘗作新田詩以美之治平初嘗有増秩賜金之命行保馬法詔開封府界諸縣保甲願養馬者聽仍以陜西所市馬選給之六年又詔司農寺立養馬法是秋曽布脩成保甲及養馬法上之其養馬法凡五路義保願養馬者戸一匹有物力養二匹者聽以監牧見馬給之或官與其直使自市無或强與府界毋過三千匹五路毋過五千匹在府界者嵗免體量草二百五十束先給以錢布在五路者嵗免折變縁納錢三等以上十戸為一保四等五等十戸為一社以待死病補償者保甲馬即馬主獨償之社戸馬半使社人償之嵗一閲其肥瘠先從府界頒馬五路委監司經畧司州縣吏度之於是保甲養馬行於諸路矣六月詔以四塲試進士罷考課院作京城門銅魚符王安石求退不許先是安石乞東南一郡上曰自古君臣如卿與朕相知極少朕鄙鈍初未有知自卿在翰林始聞道徳之説心稍開悟卿朕師臣也斷不許卿出外未幾又求去上曰卿無乃謂朕有疑心朕自知制誥知卿属以天下事如吕誨比卿少正夘盧杞朕不為惑豈更有人能惑朕即不須如此安石曰臣非敢言去就但乞均勞佚而已上曰周公為成王所疑故逃居東及成王不疑則歸周縱朕於卿有疑今既相見無疑矣安石固乞退上固留之安石復具奏閣門有㫖不許収接安石文字既而上又令内侍趣見安石見上曰陛下不許臣去臣不敢固違然臣實病若更黽勉半年不可強未免再煩聖聽上曰朕不明每事頼卿扶持安石曰陛下以郭逵誕謾故許其辭秦州既而逵譛王韶陛下又從之逵知陛下可欺故敢放肆為王韶之獄今杜純奏王韶討奄東事純勘官于奄東事本不相關又輒如此誣罔陛下誠能照姦而斷以義則無人敢如此上曰只為事難得分明者安石曰事何嘗不分明但是陛下不窮究到底前後小人為欺豈是盡無形迹但以陛下含糊不肯窮究若窮究到底豈有不分明之理編修條例郭逢原言古者天子隆尊師之禮臣聞陛下以師臣待安石而安石拜走殿陛與冗僚無别願陛下特設殊禮事必咨而後行又曰宰相事無不統宜廢樞府併歸中書合文武於一道歸宰相於一職復兵農於一民此堯舜之舉也今安石居宰相之重朝廷有所建置特牽於樞府而不與則陛下任安石不専矣䟽奏上甚不悦他日謂安石曰逢原必輕狡安石曰陛下何以知之上曰見所上書欲併樞宻院安石曰人才難得如逢原亦且曉事可試用之安國安石弟也常非其兄所為安國為西京國子監教授頗溺於聲色安石在相位以書戒之曰宜放鄭聲安國復書曰亦願兄逺佞人也去冬官滿至京師上以安石故召對謂安國曰漢文帝何如主對曰三代以來賢主上曰但惜其才不能立法制對曰文帝自代來定變故於呼吸恐無才者不能然其專務徳化一時風俗恥言人過則文帝加有才一等矣上曰王猛佐苻堅而令必行今朕以天下之大而不能使人何也對曰王猛專教苻堅以峻刑殺人此必小臣刻薄有以誤陛下者願專以堯舜三代為法則下豈有不從者乎又問安石秉政外論謂何對曰但恨聚斂太急知人不明耳上不悦初安國召對人謂必得經筵由是别無恩命久之只除崇文院校書安國嘗力諌安石以天下不樂新法皆歸咎于兄恐為家禍安石不聽安國哭于影堂曰吾家門滅矣又嘗責曾布以誤惑丞相布曰足下人之子弟變法何與足下事安國勃然怒曰丞相吾兄也丞相之父即吾父也丞相若由汝殺身破家僇及先人發掘丘塜豈得不與我事耶復武學仁宗朝嘗建既而中輟至是復置尋詔生員以百人為額河溢北京秋七月初以文臣為都承㫖故事樞密院直學士之下有都承㫖副都承㫖有樞府承㫖有諸房副承㫖又有所謂逐房副承㫖都承㫖置於太平興國中亦用士人為之其後吏以乆次逓遷至都承副都承三年秋上欲復用士人問王安石故事何如安石言事果可不須問故事為物所制者臣道也制物者君道也陛下若問故事有無是為法所制矣上然之乃以東上閣門使李評為之尋又以皇城使李綬為副都承㫖至是評罷乃以起居舍人曾孝寛為之始用文臣也元豐中張誠一自副都承逓遷則又用武臣元祐初復除文臣元符後則專任武臣矣閏月命章惇察訪湖北議開梅山惇時為中書檢正官命察訪本路農田水利常平等事始議經制南北江蠻初辰州布衣張翹與流人李資詣闕獻書言辰州之南北江乃古錦州地接施黔牂牁世為蠻人向氏舒氏田氏所據地産朱砂黃蠟水銀金布良田數千頃來徃無有山川之險若朝廷出師壓境臣二人説之可使納土上命惇措置未㡬惇言招諭梅山蠻徭令作省户皆歡喜爭開道路迎所遣招諭人得其地東起寜鄉縣司徒嶺西扺邵陽白沙寨北界益陽四里河南止湘鄉佛子嶺定内侍養子法詔入内供奉官以丁私養次子為内侍者斬八月置鎮洮軍王韶舉兵出塞復武勝軍改為鎮洮軍秦鳯鈐轄髙遵裕兼領之王安石曰洮必為内地武勝更移市易即為都㑹據夏國上游足以制其死命上令與武勝錢物曰昨韓絳費六百萬貫都無所成今武勝雖更有費亦非妄費安石曰誠如此尋詔置市易司賜錢帛五十萬貶唐坰監廣州軍資庫初坰自小官上書乞斬非青苗法如韓琦者數人王安石喜薦之召對上薄其人除知錢塘縣安石欲留之乃令鄧綰薦為御史遂除太子中允數月將用為諌官疑其輕脱將背已立名不除職以本官同知諌院故事未嘗有也坰果怒安石易已凡奏二十疏論時事皆留中不出一日垂拱殿起居坰忽叩殿陛請對事不素請殿中皆驚上令諭坰他日請對坰不肯又令詣後殿坰曰臣所言者請與大臣面辨又再三諭㫖坰伏地不起乃召升殿坰至御座前徐於袖中出一大軸曰臣所言皆大臣不法請對陛下一一陳之乃搢笏展疏目安石曰王安石進御座聽劄子安石遲遲坰訶曰陛下前猶敢如此在外可知安石慄然進歩坰大聲宣讀凡六十條大畧以安石專作威福曽布等表裏擅權天下但知憚安石威權不復知有陛下文彦博馮京知而不言王珪曲事安石無異厮僕且讀且目珪珪慚懼俛首韓絳薛向安石頥指氣使無異家奴臺官張商英乃安石鷹犬非陛下耳目也每讀一事畢即指安石曰請陛下宣諭上屢止之坰慷慨自若畧不退懾侍臣衛士相顧失色讀畢即指揮座曰陛下即不聽臣言不得久居此座降殿再拜而出詔貶潮州别駕安石曰此素狂不足責乃有是命頒方田均税法方田之法以東西南北各千歩當四十一頃六十六畝一百六十歩為一方嵗以九月令佐分地計量據其方莊帳籍驗地土色號别其陂原平澤赤淤黒壚之類凡幾色方量畢計其肥瘠定其色號分為五等以地之等均定税數至明年三月畢掲以示民均税之法以縣租額税數州以舊収蹙零數均攤于元税外輒增數者禁之若絲線紬絹之類不以桑柘有無止以苗畝為定凡田方之角立土為峰植以野之所宜木有方帳有莊帳有甲帖有戸帖其分煙析産典賣割移官給契縣置簿皆以今所方之田為正令既具乃以鉅野尉王曼為指教官先自京東路行之諸路倣焉初天下之税割移逃死多或不均京西相度差役官蔡天申言請委提舉司均税而頒於司農先行於河北陜西河東京東詔用其議於是司農寺始立方田均税法至是頒之天下先自年豐及平土州縣行之京西分河北路九月少華山崩知華州吕大防言少華山前阜頭谷山嶺摧陥其下平地東西五里南北十里潰散墳裂涌起堆阜各髙數丈若堤岸陥居民六社凡數百戸林木廬舍亦無存者並山之民言數年以來谷上嘗有雲氣毎遇風雨即隱隱有聲是夜初昬畧無風雨山上忽霧起有聲漸大地遂震動不及食頃即有此變詔賜壓死者家錢貧者官為塟祭淮南分東西路冬十月置熙河路以王韶為經畧安撫等使改鎮洮軍為熙州以熙河洮岷通逺為熙河路時河州之地猶未得也王安石白上曰武勝一軍攻取不能無惻怛然以其嵗相讎殺之數乘除則一為属戸乃無此患安石又白上曰鎮洮便可建為州通逺鎮洮河州或併割階州為一路僉以階州為逺安石曰未要階州亦可上曰王韶意未欲便併河州恐傷人情安石曰是或一説然如臣計便明下詔割河州属鎮洮路示河州人以必取即人心自折摩正無由結合上然之故有是命明年二月賜本路緡錢三千萬以助邊費又分秦鳳路軍馬以六分属之凡兵三萬土兵一萬八千馬六千五百皆有竒十一月開梅山湖北察訪章惇教諭洞蠻開梅山地奏得田二十六萬餘畝尋以梅山地置安化縣初張頡首議開梅山及章惇往經制頡時憂居鼎之桃源數遺京師書言南江殺戮過當非辜者十八九以至浮尸蔽江下流之民不敢食魚者數月惇病之欲弭其謗乃言今成功因頡之謀詔賜絹三百疋執政猶恐其異論㑹頡服闋六年春乃命頡為江淮發運副使且令便道之江淮不敢食魚之謗遂息張商英罷商英時為御史劾奏察院黨庇吏人任逺等十二事樞宻使文彦博等皆不入院送印於中書乞付有司推治詔責商英監荆南税陜西分六路各置經畧司永興鄜延環慶涇原秦鳳熙河路十二月雨土癸丑熙寧六年春正月復僖祖祧順祖先是中書言僖祖毁廟非是乞下兩制議之學士元絳陳繹許將張琥等言諸儒見稷契有功于唐虞之際以謂祖必有功若祖必有功則夏何以郊鯀乎故生民詩序言尊祖而不言尊有功臣謂宜以僖祖為始祖學士韓維曰國語曰契勤商十四世而興稷勤周十五世而興榖梁曰始封必為祖僖祖功業未見有若稷契而以所事稷契奉之恐於古無據臣以仍舊為便天章閣待制孫固以為國家尊據南面皆太祖所授不當以僖祖替其祀請以太祖為始祖而為僖祖立廟如周别祀姜嫄之禮禘祫之日奉祧主東向此韓愈所謂祖以孫尊孫以祖屈之意也判太常寺章衡奏自古有天下必尊祖秦漢以降典章殘缺廟祧遷次始失先王尊祖之意今宜尊僖祖為始祖而順祖在次當遷此所謂子為父屈以定七廟之制又禮記大傳曰王者禘其祖之所自出以其祖配之説者謂祭所感帝則配以始祖伏請以僖祖配饗上辛感生帝之祀而罷宣祖侑神之位禮官張師顔亦請以僖祖為别廟蘇税又請以僖祖祔景靈宫上以問王安石安石曰祖立别廟自古無此禮姜嫄所以有别廟者盖姜嫄禖神也以先妣故盛其禮與歌舞皆序于先祖之上不然則周不為嚳立廟而立姜嫄何也上曰善于是中書請用絳等議奉僖祖為太廟始祖而遷順祖孟夏祀感生帝以僖祖配詔恭依絳等初議安石所主也安石本議以僖祖配天上頗難之故更以配感生帝以僖祖配感生帝則章衡等所議亦與安石合故也戸部侍郎致仕范鎮上言伏見英宗皇帝即位議祧遷僖祖陛下即位祧遷僖祖今復還僖祖祧遷順祖則是僖祖長東向而為不遷之主矣太祖皇帝自宋州節度有天下國號為宋與髙祖起漢中國號正同僖祖不當復還竊見國朝大臣定諡皆下太常尚書省集百官參議今宗廟祧遷最為大禮而未經講論竊恐不當祖宗之意伏乞下太常尚書省集百官定議不從二月永昌陵上宫火王韶克河州獲西畨首領河州刺史摩正妻子初王韶已破摩正子鞏令城穿露骨山南入洮州界諸將皆欲入趨河州韶曰兵抵城下摩正必為外應四山諸羗得氣坌集則大事去矣乃遣景思立攻河州而自將尾摩正所在與戰破之斬千餘級獲摩正妻子然後抵城下時守者猶以為摩正應已既而知其非是乃降韶之穿露骨山也以道險狹捨馬徒行者一日上初未知兵之所趨聞之憂甚王安石曰軍如奕棋然若一着止應一着則理無可勝若我一能應彼二三則敵在吾術矣臣料韶必聲言討河州而潜師乘間由洮西不虞之道以攻洮岷所不戒已而果然㨗書至上謂安石曰非卿主謀於内無以成此未幾摩正復入河州親試舉人賜余中以下千二百餘人及第出身有差賜錢三千緡為期集費進士諸科舊以甲次髙下率錢期集貧者或稱貸于人置諸路學官詔諸路擇舉人最多州軍依五路法各置教授仍命中書選舉學官三月置經義局命王安石提舉訓詩書周禮義命王安石提舉以吕惠卿王雱同修撰新進士余中白衣徐禧吴著為檢討先是上諭執政曰今嵗南省所取多知名人舉人皆趨義理之學極為美事安石曰民未知義則未可用况士大夫乎夏人冦秦州劉惟吉敗之封李乾徳五年春交趾來告李日尊卒子乾徳嗣立至是乃加封册為交趾郡王夏四月甲戌朔日有食之隂雲不見王安石等稱賀且請復常膳從之置律學置教授四員公試習律令生員義三道習斷案生員一道刑名五事至七事私試義二道案一道刑名五事至三事置濬河司初有選人李公義者獻鐵龍爪揚泥車法以濬河内侍黃懷信以為其法未盡乃别制濬川杷謂禹所以濬川者也人皆知其不可用惟王安石信之至是乃别置濬河司命外都水監丞范子淵為都大提舉開直河用杷爪疏濬二股及清水河道八年閏四月賜公義懐信田各二十頃公義請先自北京至海驗一過之功是秋河溢大名判府文彦博奏河溢壞民田多者六十村戸至萬七千少者九村戸至四千六百上既蠲其租乃命都水詰官吏水災如此胡不以聞都水第言濵河薄有水患而已九年安石去位始命獲驗遂罷局復併一司止令子淵提舉先是子淵奏用杷疏濬二股河上下奪過水勢復歸二股退出民田數萬頃乞推賞官吏朝廷下彦博覆實彦博奏河水浩大非杷可濬夏溢秋涸固其常理去年八月霜降水落方露所退地是豈疏濬之功今年杷未嘗用退地更多又所濬河身盡在水底深淺固不可知雖河濵愚人皆知其無益臣不敢雷同欺罔詔知制誥熊本行視本奏如彦博言十年五月乃命御史蔡確與知諌院黄履致獄定奪明年正月獄成子淵追一官本落職分司西京餘得罪者數人五月瀘夷冦邊景思忠死之命熊本體量之本時為中書檢正置勇敢効用河東鄜延秦鳳環慶熈河路各以三百人涇原路以五百為額以弓弩斗力定三等料錢視為髙下不刺手不置營季首赴經畧司閲試及本軍注籍遇有邊事追集給口食借官馬給草料教習日射中者有賞不中减料錢次季又不中勒停有戰功以八等定賞仍頒行諸路六月置軍器監王雱言今天下甲胄弓弩以千萬計而無一堅利者為武備臣謂莫若更制其法斂數州之所作而聚以為一若今錢監又比擇知工之臣使典其職且募良工為匠師上頗采雱説置軍器之政以吕惠卿為判監周惇頥卒惇頥初名惇實字茂叔後避英宗諱改今名初用舅氏奏授洪州分寧縣主簿縣有獄久不决一訊立辨部使者薦之為南安軍司理時年尚少不為守所知洛人程珦攝通守事視其氣貌非常人與語知其為學知道也因與為友且使二子顥頥往受學焉及為郎故事當舉代每一遷授輒以其名聞二子即所謂河南二先生者也南安獄有囚法不當死轉運使王逵欲深治之逵苛刻吏無敢與相可否惇頥獨力爭之不聽則置手板取告身委之而去曰如此尚可仕乎殺人以媚人我不為也逵即感悟因得不死移郴及桂陽皆有治績知南昌縣人迎喜曰是能辨分寧獄者吾属得所訴矣于是更相共語莫違教命盖不惟以抵罪為憂實以汙善政為耻也遷合州判官事不經其手吏不敢决茍下之民不肯從蜀之賢人君子皆喜稱之趙抃時為使者或䜛之抃抃疑焉及守䖍州惇頥適佐州事抃熟視其所為乃執其手曰幾失君矣今日乃知周茂叔也知邵州新學校以教其人熙寧初除廣南轉運判官改提㸃刑獄在嶺表時不憚出入之勤瘴毒之侵雖荒崖絶島人跡所不至亦必緩視徐按務以洗寃澤物為己任施設措置未及盡其所為而病作亦㑹水囓其先墓遂求知南康軍以歸既塟上其印綬分司南京至是卒年五十七博學力行聞道最早遇事剛果有古人風為政精宻嚴恕務盡道理以名節自砥礪奉已甚約俸禄盡以周宗族賔友家或無百錢之儲及分司而歸妻子餐粥或不給而亦曠然不以為意也襟懷飄洒雅有髙趣尤樂佳山水遇適意處或徜徉終日廬山之麓有溪焉發源於蓮華峰下合於湓江惇頥家世道州營道濓溪人也因寓以濓溪之號而築書堂于上有太極圖易説數十篇傳於世豫章黄庭堅序之曰茂叔人品甚髙胸中洒落如光風霽月知徳者亦深有取於其言云秋七月河北分東西路八月収免行錢先是京師百物有行官司所須俱以責辦下逮貧民浮販類有陪析故詔提舉市易務吕嘉問及開封府司録朱談同詳定諸行利害以聞於是嘉問等奏言衆行願出免行錢乞許本所酌中裁定均為吏禄報可至是遂約諸行利入厚薄令納錢以備吏禄與免行戸祇應自今禁中賣買並下雜買務仍置市司估物之低昻凡内外官司欲占物價則取辦焉越明年春詔聞鎮定州民有折賣屋木以納免行錢者令有司體量上因言役錢市易免行錢之擾王安石難之九月置兩浙和糴倉從相度兩浙水利沈括之言也括言浙人以治田為生所入甚廣宜立法以斂散之試武舉二十四人授縁邊任王韶克洮岷等州王韶既克汀州滿沙鄂特北率疊宕諸羌脅青唐欲擾邊遣髙遵裕攻降之通洮山路岷州摩琳章以城降獻麥牛以千萬計因粮而食師以無乏進兵岷州於是疊州䇿凌扎卜洮州古斯敦皆相繼聽命而恐珍嘉勒亦以其族歸于是洮岷疊宕皆復幅員二千餘里又據青唐咽喉之地而邊堠益斥矣上尋以熙河役兵死亡甚多顧輔臣惻然久之且曰此何異以政殺人越明年春命比部員外郎沈起乘驛體量仍令至修築城寨工役處分委使臣時其飲食居處以撫循之别立勸沮之法以聞自開建興河嵗費四百萬緡七年以後財用出入稍可㑹嵗常費三百六十萬緡越明年韶破西畨築諤城首領摩正率酋長八十餘人詣軍門降詔賜摩正姓趙名思忠命居熙州給田四十頃冬十月以熙河功解玉帶賜安石安石率百官表賀上解所服玉帶賜之加王韶資政殿學士未幾遷觀文殿學士未嘗執政而除者自韶始賑兩浙江淮饑章惇平懿洽州蠻惇言三路進兵討平之尋以懿州置沅州行折二錢除在京及府界外諸路並通行八年併行于在京府界元豐元年在京府界復罷自王安石為政始罷銅禁姦民日銷錢為器邊關海舶不復譏錢之出國錢日耗八年張方平因對極論其害請詰問安石舉累朝令典一旦削而除之其意果安在十二月置中書諸房習學以徐禧為中書戸房習學公事禧洪州布衣先為修撰經義所檢討吕惠卿獻禧所為治䇿二十四篇上善之王安石曰中書檢正官如章惇輩朝廷當即有差除後更用人即有不稱難於退詘欲置人為習學上以為然以選人習學行檢正事自禧始甲寅熙寧七年春正月熊本平瀘夷初命本措置瀘州清井監夷至是本奏撫定降者得地二百四十里聯属或為保甲未幾渝州獠人木斗叛詔本體量安撫本説賊黨木斗以溱州地來歸得五百里為四寨九堡奏至朝議欲除本天章閣待制上曰本之文朕所自知及還遂命知制誥二月棟戬遣將冦邊知河州景思立死之先是棟戬將青伊結果莊數擾河州属蕃襲破河州采木軍士害使臣張普等又以書詆思立思立不能忍帥漢蕃兵六千攻之于踏白城果莊衆二萬餘思立與先鋒將王寧承李元凱戰沒賊遂圍河州又圍岷州道路不通者數月或請退保總管髙遵裕曰敢議此者斬登西門選偏將出擊之賊遂退走尋以遵裕為岷州團練使旌守城功也三月旱减兩浙預買紬絹先是遣沈括察訪兩浙括言上缺帛元額九十八萬民間陪備甚多後發運司以移用為名復增十二萬請罷之以寛民力從之遼使來言疆事二年遼使蕭扈館伴王洙詰之平入對上因問之對曰嘉祐歸因以洙藁上嘗言之朝廷討論之詳矣命蕭禧來爭河扈不能對録其條目付扈以東地界張方之遼國書大畧言河東路沿邊増修戍壘起舖舍侵入彼國蔚應朔三州界内乞行毁撤别立界至等事禧辭歸上面諭以三州地界俟差職官與北朝職官就地頭檢視定奪雄州外羅城今修已十三年即非創築又非近事北朝既不欲如此更不令接續修白溝館驛亦俟差人檢視如有創盖樓宇箭窻等並令拆去屯戍兵級並令抽回國書亦云儻事由夙昔固難徇請誠有侵踰何恡改正求直言翰林學士承㫖韓維對上曰久不雨朕夙夜焦勞奈何維曰願陛下痛自責已詔求直言又言近臣都内督青苖甚急往往鞭辦取足至伐桑為薪以易錢貨旱災之際重困此苦夫動甲兵危士民匱財用于荒夷之地朝廷處之不疑行之甚鋭至於蠲除租税寛裕逋負以救愁苦之良民則遲遲而不肯發望陛下自奮英斷行之過於養人猶愈過於殺人也上感悟即命維草詔其畧曰自冬迄今旱暵為虐永維其咎未知所出意者聽納不得于理歟獄訟非其情歟賦斂失其節歟忠言讜論欝于上聞而阿諛壅蔽以成其私者衆歟何嘉氣之久不效也應中外文武臣僚並許實封言時政得失先是天久不雨河東河北陜西饑民皆流入京城而京城外饑民尤多監安上門福清鄭俠畫而為圖且上書曰陛下南征北伐皆以勝㨗之勢作圖而上料無一人以天下憂苦父母妻子不相保遷移困頓遑遑不給之狀為圖而獻者臣謹按安上門逐日所睹見繪成一圖百不及一但經聖眼亦可流涕况於千萬里之外哉陛下觀臣之圖行臣之言十日不雨乞斬臣以正欺君之罪上出侠圖及䟽示輔臣問王安石曰識俠否安石曰嘗從臣學固乞辟位上不許于是遂詔韓維孫永體量免行錢曽布體量市易又發常平倉及放商税而青苗免役亦權罷催俠又自劾擅發馬逓詔開封治擅發之罪司馬光自判西京留臺絶口不論時事至是讀詔泣下復陳六事一曰廣散青苗使民負債日重而縣官無所得二曰免上戸之役斂下戸之錢以養浮浪之人三曰置市易司與細民争利而實耗散官物四曰中國未治而侵擾四夷得少失多五曰團結保甲教習㓙器以疲擾農民六曰信狂狡之人妄興水利勞民費財若其瑣瑣米鹽之事皆不足為陛下道也河北西路運使劉航應詔論時政五事不報又言人君不可有輕天下心宜乘時有所改為則人心悦而天意得矣語尤切至因力奏求罷天章閣待制李師中應詔言旱既太甚非有應天之實不足以塞天變請召司馬光蘇軾蘇轍復置左右以輔聖徳吕惠卿因摘其語以激上怒安置和州夏四月權罷方田及編排保甲是日雨詔權罷災傷路方田編排保甲造五等簿雨雹王安石罷安石執政六年先是上侍太后同岐王顥至太皇太后宫太皇太后謂上曰吾聞民間甚苦青苗助役錢盍罷之上曰此以利民非苦之也太皇太后曰王安石誠有才學怨之者甚衆上欲保全不若暫出之嵗餘復召之可也上曰羣臣惟安石為國家當事顥曰太皇太后之言至言也陛下不可不思上怒曰是我敗壞天下耶汝自為之顥泣曰何至是耶皆不樂而罷安石益自任一日太皇太后及皇太后又流涕為上言新法之不便者且曰王安石變亂天下上流涕退命安石裁損之安石重為解乃已㑹久旱百姓流離上益疑新法不便欲罷之安石不悦求去上以手詔諭安石欲處之以師傅之位留京師而求去益堅上手詔諭曰更不欲再三邀卿之留已除制命除知江寧府安心休息以適所欲朕體卿之誠至矣卿宜有以報朕手劄具存無或食言從此浩然長往也以韓絳同平章事吕惠卿參知政事上賜安石詔曰韓絳欲得一見卿意者有所諮議卿可為朕詳語以方今人情政事之所宜急者安石薦絳代已仍以惠卿佐之于安石所為遵守不變也時號絳為傳法沙門惠卿為護法善神惠卿慮中外或言新法不便以書遍遺諸路監司郡守使陳利害又白上下詔戒勅畧曰今法行已見其效而吏或不能奉承朕終不以吏或違法之故輒為變法敢有弗率必罰無赦𣙜蜀茶初蜀之茶園皆民兩税地不植五稼惟宜種茶賦税一例折輸及王韶建開湟之䇿委以經畧乃命李杞等入蜀買茶應副秦鳳熙河路愽馬自是蜀茶始行𣙜法初税額總錢三十萬緡及杞經度創設官場嵗増至四十萬其後李稷加為五十萬元豐末陸師閔加至百萬云五月大雨雹罷制科從吕惠卿之請也馮京曰漢唐以來豪傑多從此出惠卿曰制科止于記誦非義理之學又曰進士已試䇿與制科䇿無異乃詔罷之以吕升卿沈季良為崇政殿説書上嘗以外事問王安石安石曰陛下從誰得之上曰卿何必問所從安石曰陛下與他人為宻而獨隱于臣豈君臣推心之道乎上曰得之李評安石由是惡評他日安石以宻事質於上上問於誰得之安石不肯對上曰朕無隱於卿卿乃隱於朕乎安石不得已曰朱明之言之上由是而惡明之明之安石妹夫也安石既出吕惠卿欲引明之為侍講上不許曰安石更有妹夫為誰惠卿以季良對上即召季良與惠卿弟升卿同伴講升卿素無學術每進講多捨經而談財榖利害上有問不能對輒目季良上問難甚苦季良屢屈上問從誰受此義對曰受之安石上笑曰宜爾季良雖黨安石然常非王雱吕惠卿所為謂必累安石雱等深怨之故不得甚進用廣太學為屋百楹學者以千計六月治臺獄竄鄭侠編管汀州侠獻流民圖朝廷以為狂而不問唯劾擅發馬逓之罪侠又上書言天旱由王安石所致安石即罷吕惠卿執政侠又言惠卿朋黨姦邪壅蔽聰明獨馮京立異敢與安石較請黜惠卿用京為相且言京及元絳孫永王介四人者皆仁義人也惠卿大怒白上重責之秋七月行手實法吕惠卿獻議曰免役出錢未均出於簿書之不善今請令手實者令人戸具其丁口田宅之實也嘉祐勅造簿委令佐責戸長及大戸錄人戸丁口税産物力為五等且田野居民耆戸長豈能盡其貧富既不令自供手實則無隱匿之責安肯自陳又無賞典孰肯紏告以此舊簿不可信用謂宜倣手實之意使人戸自占家業如有隱落即用隱寄産業告賞之法庶得其實凡造五等簿預以式示民令依式為狀納縣簿記第其價髙下為五等乃定所當輸錢非用器田榖而輒隐落者許告有賞三分以一充賞凡田産皆先定中價示民乃以民所占如價計錢命行之初免役之法行民以貲産出錢時曲陽縣尉吕和卿首校一鄉戸之髙下役之重輕第為數等以應令定帥李肅之深喜之未及行而和卿以憂去于是惠卿領司農條例遂奏行之八月曾布罷自三司使出知饒州吕嘉問知常州王安石之罷相也吕惠卿以布所按提舉市易吕嘉問事付章惇曽孝寛置獄軍器監鞫之布言與惇有隙上曰有孝寛在未必不直獄具布竟坐論市易違法不實黜初市易之建布實同之既而揣上意疑市易有弊遂急治嘉問㑹惠卿與布有隙乘此擠布而議者亦不直布也布由安石進既得政乃寖與安石異後惠卿亦叛安石獨惇終始不背安石云尋以嘉問提舉河北便糴粮草初安石既有江寧之命張諤與嘉問持安石而泣安石勞之曰已薦吕惠卿于上矣二人遽収淚謝安石置提舉保甲官時河東河北陜西三路義勇保甲凡百萬上欲擬後周八柱國法使侍從官提舉不以𨽻帥府河北三十餘萬先集以沈括曾孝寛為提舉官領之元豐二年冬以内侍王中正為府界提舉官于是中正獻民兵保伍法請以時教習詔從之未踰年便殿臨閲以武藝出倫補班行者百數餘以次賞金帛下其法河北河東陕西三路而置使如府界焉九月遼使來議疆事於代州遼使蕭素來遣劉忱吕大忠與之共議于代州三司火焚屋千八十楹案牘殆盡詔權於尚書省涖事仍詔諸路熙寧五年文帳悉封上防其因火為姦也團併中外兵先是上謂輔臣曰祖宗之兵率二三年一出戍相属於道故將不得專兵兵不為將用以革藩鎮之弊承平既久不可以戰㑹契丹來議雲中地樞宻副使蔡挺請召還河北縁邊戍兵亦以無事因得積邊儲仍乞置三十七將將有正副以畿縣及諸道兵分𨽻皆給虎符上從之乃部分諸將總𨽻禁旅使兵知其將將練其士謂之將兵選經戰陣大使臣充將副河北一至十七府界十八至二十四京東二十五至三十三京西三十四至三十七凡三十七將所領屯戍等兵二十萬人尋復分鄜延環慶涇原秦鳳熙河之兵在鄜延者九在涇原者十一在環慶者八在秦鳳者五在熙河者九合為四十二將尋又增置馬軍十三指揮忠果及上軍共十二指揮於京西唐鄧等州元豐四年又詔團結東南路諸軍為十三將淮東路第一淮西第二浙西第三浙東第四江東第五江西第六湖北第七湖南潭州第八全部永州凖備廣西應援第九福建第十廣東第十一廣西桂州第十二邕州第十三總天下兵九十二將而東南兵三千以下惟置軍將云而鄜延五路又有蕃漢弓箭手亦各附諸將焉六年併熙河九軍為五軍祖宗制兵之法有四曰禁兵將兵附焉曰廂兵曰民兵鄉兵保甲繫焉曰蕃兵禁兵者天子之衛兵也殿前侍衛二司總之其最親近護從者號諸班直其次總于御前忠佐軍頭司皇城司騏驥院餘皆以守京師備征戍其在外者非屯駐駐泊即就粮軍也廂兵者諸州之鎮兵也各𨽻其州之本城專以給役内總于侍衛司而尚書兵部掌其政令自騎射至牢城其名凡二百二十三熙寧間始移併省廢除牢城以待有罪配𨽻之人壯城專治城隍别為一軍外教閲廂軍皆自為額其教閲者號廂禁軍鄉兵者籍郡縣鄉里及旁塞之民與其丁壯子弟之應募者𨽻習武事備戰守曰義勇曰弓箭社曰保毅曰寨戸曰彊人曰土丁曰弩手曰洞丁曰槍手曰槍杖手曰弓箭手曰勇藝名因其方之名而名之通謂之鄉兵熙寧以來民兵莫盛于保甲餘則多承舊制而所謂蕃兵者取旁塞熟𦍑官其酋給廪賜因糾合其人而用之也按兵元豐之籍禁軍凡六十一萬廂軍凡二十二萬皆有竒以章惇為三司使三司火惇時判軍器監逓領所部役兵救火上御樓問救火者誰左右以惇對上説故有是命惇乞借内藏錢五百萬緡令市易司選能幹之人往四路入中筭請鹽引及乘賤計置糴買之宜詔借以二百萬緡未幾又詔借以三百萬緡買陕西鹽鈔詔留常平錢榖先是諸路旱災有司不能賑濟上諭輔臣曰天下常平倉若以一半散錢取息一半减價給糴使二者如權衡之相依不得偏重民必受賜今有司務行新法惟欲散錢至於常平舊規無人留意者大凡前世之法度有可行者宜謹守之今不問利害如何一一更變豈近理耶上批諸路常平錢榖十分以上散民間若遇水旱須救濟及緩急朝廷移用則卒難斂索宜速指揮諸州縣㨿所管已支見在錢數常留半外方得給散其見有倚閣戸毋再給冬十月置三司㑹計司以韓絳提舉明年九月罷十一月己未郊十二月復元積中等官積中李大臨蘇頌吕大防郭逵李師中劉摯唐坰錢顗孫昌齡張戩王子韶程顥胡宗愈薛昌朝林旦范育張商英李周周約賈青李孝純張端王子淵凡二十四人或復舊職或量移或與合入差遣時責降應復者四十餘人吕惠卿意所惡者輒廢格不行胡宗愈劉摯皆坐言事落職外補宗愈又先責至是惟摯復舊職宗愈通判蘇州如故十年再赦乃復舊職置熙河買馬場凡六處運蜀茶以市之從王韶之請也嵗買馬萬五千匹繼又詔増為二萬匹復詔茶税息錢亦與熙河市馬仍罷原渭州徳順軍買馬場市馬舊制唯河東陜西川陜而已河東者為最其後又仰給于西邊市于蜀者已久而非邊軍所仰給熙河用兵馬道梗八年乃詔知成都府蔡延慶提舉戎黎州買馬㑹威茂夷人㓂邊而西邊馬已至詔罷之元豐中乏馬又置嘉雅等州馬場而馬皆不至亦罷之大抵蜀馬不耐寒苦劣于西北逺甚所市之數則唯沈黎為多其他如戎瀘等處第存優䘏數馬而給其直以㣲利羈縻之而已以王韶為樞宻副使賞熙河之功也其後安南之役韶爭之以為貪虛名而忘實禍且言熙河事臣本意不費朝廷而可以至伊吾廬甘初不欲令熙河作路河岷作州也韶本鑿空開邊驟躋政地乃以勤兵費財歸曲於朝上由是不悦十年春罷知洪州是嵗収頭子錢三月詔役錢每干别納五文輒圓融者以違制論先是公家之費有敷于民者謂之圓融多寡之數出于臨時汙吏乘之以為姦遂悉禁焉九朝編年備要巻十九
