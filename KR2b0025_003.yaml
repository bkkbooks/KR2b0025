body:
  text: 九朝編年備要巻三宋陳均撰太宗皇帝起丁丑太平興國二年止乙酉雍熙二年丁丑太平興國二年吳越漳泉奉正朔北漢廣運十年春正月上以太祖殯不視朝禁居官岀使者行商賈事幸相國寺還御東華門觀燈賜禮部貢士累舉者出身閲貢士十舉至十五舉者百二十人並賜出身幸講武池二月吳越來貢罷南唐鐵錢令江南諸州鹽先通商處悉禁之三月置威勝軍夏四月大食來貢𦵏太祖於永昌陵祔廟以孝明皇后王氏配秋七月河決温縣尋又決滎澤决頓丘又决白馬命塞之諸路大水閏月諸州上閏年圖故事三年一令天下貢地圖與版籍國初以閏為限所以周知天下山川險易戸口衆寡八月陳洪進來朝令支郡得専奏事從知懐州髙保寅及右拾遺李翰之請也始唐及五代節鎮皆有支郡太祖平湖南始令潭朗等州直屬京大縣屯兵亦有直屬京者興元之三泉是也至是天下節鎮無復領支郡者矣九月嚴私鑄禁錢以七十七為百私鑄小錢者死每千錢必及四斤半以上禁江南私小錢悉令送官給其直初李氏嵗鑄六萬貫江南平増冶匠亦不過七萬貫及張齊賢為轉運使言民間苦銅錢難得因訪饒信處州産銅鉛錫之所用唐開元錢料嵗鑄三十萬貫每嵗雖増數倍錢稍麄惡矣真宗大中祥符九年夏江東發運使李溥言饒杭池江四州錢監毎嵗共鑄錢一百二十萬貫用銅四百五十二萬斤採取既多望酌中定額真宗曰嘗記咸平中陳恕以江南銅多請官少市未幾銅礦漸少迄今常苦不豐如解池鹽景徳中所收數倍本州亦欲少種不逾年兩旱驟減舊額是知天地所育皆貴濟用豈人心可料其増損耶容州初貢珠自廢媚川都禁民采珠未幾官復自采容州海渚亦産珠仍置官掌之至是始貢珠百觔賜負擔者銀帶衣服大閲上屬意戎事毎朝罷即親閲禁卒藩衛之士益以精强乃命築講武臺於城西之楊村至是大閲上登臺而觀初命楊信董其事以信病瘖乃命天武右廂都指揮使鶴瀚更董之士伍綿亘二十里瀚執五色旗以號令毎按旗指揮則千乗萬騎周旋如一甲兵之盛近代無比上甚悅遣使以金帶賜之曰此朕藩邸所服者也楊信即楊義也避上名改焉是春改簇御馬直曰御龍直鐵騎曰日騎控鶴曰天武龍騎曰龍衛虎捷曰神衛日騎後改曰捧日冬十一月丁亥朔日有食之既十二月嚴私礬禁有司言官嵗鬻礬不充舊貫請嚴其禁詔私販化外礬至三斤私煮及鹽至十斤者並棄市餘論罪有差是嵗渤尼國來貢渤尼前代未嘗與中國通其章表非紙類木皮而瑩薄色微緑長數尺而濶寸餘横軸僅盈掌握以數小囊重複緘之其字細而横讀之不可識詔象胥以華言譯之皆尊慕本朝之意戊寅太平興國三年是嵗吳越漳泉納土北漢廣運十一年春正月開襄漢漕渠發唐鄧民夫及諸州卒數萬人開之直抵京師渠成而水不行二月置崇文院更置三館賜名崇文院盡遷舊館之書以實之南廊為集賢書東廊為昭文書西廊四庫分經史子集為史館書六庫書籍正副本凡八萬巻三月吳越王俶來朝夏四月置諸路轉運判官陳洪進獻漳泉二州用其幕僚劉昌言之計也得縣十四户十五萬兵一萬八千加洪進平章事子文顥文頊為刺史尋復以文顯知泉州文顗知潭州文顯之往也議擇能臣以闗掌州事遂起復喬維岳為通判維岳始至屬㳺洋草寇十餘萬來攻城勢甚危急監軍何承矩欲屠城焚府庫而遁維岳抗議堅守福州救兵至圍遂解河決獲嘉命塞之五月吳越王錢俶獻其地得州十三軍一縣八十六戸五十五萬兵十一萬五千封俶為淮海王子惟濬惟治將校孫承禮沈承祐並為節度使崔仁冀副使初俶為朝廷所留獨與仁冀決䇿納土退朝僚屬始知之以范旻權兩浙諸州事錢氏地狭民衆賦斂苛暴旻悉奏蠲之李克叡卒子繼筠嗣六月汴決寧陵命塞之嚴贓吏法去嵗永豐倉吏八人坐受贓為姦伏誅是嵗中書令史李知古坐受賕出人罪杖殺至是又詔贓吏配者遇赦勿叙用端拱初少府監言配役人郭冕等皆任京朝官㑹當叙用上曰贓吏不可復齒仕籍止令釋之秋九月親試舉人上御講武殿覆試禮部合格進士加論一首自是常以三題為凖得胡旦以下七十四人諸科七十人並賜及第始賜宴於迎春苑授官如二年之制先是上詔權罷貢舉恐有困於塲屋者乃詔諸州去年已得解者除三禮三傳學究外並以秋集禮部故事禮部惟春放榜至是秋試非常例也是冬諸州舉人並集㑹將親征北漢罷之自是毎間一年或二年乃置貢舉冬十月孔宜襲封文宣公宜知星子縣回獻所為文上召見問以孔子世嗣遂命襲封又詔免其家租賦厯代以聖人之後皆不科庸調周顯徳中遣使均田遂抑為編戸至是特命免之置内藏庫上幸左藏庫見金帛山積乃命分左藏北庫為内藏庫改封樁庫為景福内庫掌嵗經費之餘以待非常之用初太祖置封樁庫謂近臣曰石晉茍利於己割幽薊以賂契丹使一方之民獨限外境朕甚憫之欲俟斯庫所蓄滿三五十萬即遣使與契丹約贖幽薊之地不可則散之募士以圖進取㑹晏駕不果河決靈河命塞之十一月丙申郊奉太祖配大赦國初以來南郊四祭及感生帝皇地祗神州凡七祭並以四祖迭配而太祖親郊者四並以宣祖配上即位以宣祖太祖更配於是合祭天地始奉太祖升侑焉己夘太平興國四年是嵗北漢平春正月命潘美伐北漢置簽署樞密院事以石熈載為之簽署始此新渾儀成張思訓所造舊制行度皆人運轉新制成於自然尤為精妙二月上親征北漢三月契丹救北漢郭進敗之戰於石嶺闗之南折御卿克岢嵐軍嵐州尹勲克隆州夏四月上圍太原李漢瓊帥衆先登上躬擐甲胄䝉犯矢石諸軍皆奮怒爭乘城不可遏上恐屠其城因令衆少退時城幾陷或請急攻上曰朕惜并州一城生聚即自草詔賜繼元諭以速降終保富貴劉繼元降北漢平得州十軍一縣四十一戸十三萬五千兵三萬自劉旻僭號厯四主凡二十九年至是平初城中人猶欲固守左僕射致仕馬峯以病卧家舁入見北漢主流涕以興亡喻之遂納欵繼元妻峯女也以劉保勲知太原府廢太原舊城為平晉縣以榆次縣為并州上遣中使召劉繼業得之大喜命為防禦使繼業初為繼元扞太原城東南頗殺傷王師及繼元降繼業猶據城苦戰上素知其勇欲生致之諭繼元俾招之繼元遣所親信往繼業乃北靣再辭大慟釋甲来見上喜撫慰之甚厚復姓楊氏名業業初姓楊氏名重貴幼事北漢更賜以姓名上尋命業知代州業在邉契丹畏之毎望業旗即引去邉將多嫉之或潜上謗書斥言其短上皆不問封其書付業詔征契丹六月發鎮州扈從六軍有不時至者上怒欲置於法馬步軍都頭趙延溥遽進曰陛下巡行邉陲本以契丹為患今敵未殄滅而誅戮將士若圖後舉誰為陛下戮力者上嘉納之易州涿州来降東易州即岐溝也上至幽州敗契丹於城北秋七月上至自幽州攻城踰旬不下士卒疲頓轉輸回逺又恐契丹救至遂詔班師李繼筠卒弟繼捧嗣八月汴決宋城命塞之武功郡王徳昭自殺初徳昭從征幽州軍中嘗夜驚不知上所在有謀立徳昭者上聞不悦及歸以親征不利乆不行太原之賞徳昭言之上大怒曰待汝自為之賞未晩也徳昭退而自刎上聞驚悔往抱其屍哭曰癡兒何至此邪追封魏王諡曰懿九月河決汲縣置皇太子侍讀以楊可法為之仍賜五品服尋遷補闕仍侍讀除蜀銅錢禁契丹冦鎮州趙延進等敗之初上以陣圖授諸將俾分為八陣至是虜騎坌至延進亟乘髙望之東西亘野不見其尾崔翰等方按圖布陣相去百歩延進謂翰等曰今敵騎若此而我師星布其勢懸絶若合而擊之可以決勝李繼隆亦曰兵貴通變安可預料於是分為二陣前後相副大破之捷書聞手詔嘉奨冬十一月市民馬先是詔中使趙守倫優給價和市在京及諸州民間私馬於是得十七萬三千有竒庚辰太平興國五年春正月修河堤衛潭濮州置天駟監左右各二以左右飛龍使為左右天廏使閑廏使為崇儀使國初但有飛龍二院以左右飛龍使各二人分掌之時諸州監牧多廢太祖始置養馬二務又興葺舊馬務四以為放牧之地分遣中使詣邊州嵗市馬自是閑廏之馬始備上既平太原遂觀兵范陽得汾晉燕薊之馬凡四萬二千餘匹國馬増多乃置監牧之廏馬充牣始分置諸牧養置文明殿學士以程羽為之即端明殿學士也序列於樞密副使之下國初雖改殿名而學士領職如故至是併改焉二月定差役法從京西轉運程能之請也分民戸為九等上四等充役下四五等免詔令轉運使躬親詳定勿復差官閏三月親試舉人得蘇易簡以下一百餘人諸科五百餘人並分第甲乙賜宴始有直史館陪座之制初唐有勅賜及第以表特恩開寳以来御試中第一者皆稱之其文有不由科第者或因獻文别試以勅賜進士及第或賜御前進士及第又有同進士及進士出身之目其後復賜三史進士及第仍附是年第一等進士之下夏四月授沙州曹延祿節度沙州歸義節度曹元忠卒子延祿自稱留後遣使入貢詔加節度唐末以張義潮為𤓰沙節度旋為吐番所陷元忠之先繼有其地太祖朝亦嘗来貢五月以賈黄中知制誥黄中知昇州府舎有一室封記具存黄中啟之得李氏珠寳數十櫃皆未著於籍者即表上之上曰非黄中亷恪則亡國之寳汙法害人矣賜錢三十萬仍有是命上尤重内外制之任毎命一詞臣必諮訪宰相求才實兼美者先召與語觀其器識然後授之嘗謂左右曰詞臣之選古今所重朕早聞人言朝廷命一知制誥六姻相賀以為一佛出世豈容易哉是夏丁璉卒大校黎桓專政秋七月命孫全興討之璉卒弟璿尚幼桓囚丁氏宗族專制國事上乃命全興等討之桓尋以璿表来求襲兄位稱藩入貢上以全興等師出踰時察其意止欲緩兵寢而不報已而師乆無功侯仁寳死之全興等並以逗留伏誅初仁寳之妻趙普之妹也盧多遜與普有隙白上以仁寳知邕州凡九年不得代仁寳恐因循死嶺外乃上疏言交州主帥被害國亂可取願乘驛詣闕面奏其狀上大喜令馳驛召之多遜遽言不若授仁寳以飛輓之任令經度其事上乃以仁寳為交州路水陸轉運使冬十一月契丹入冦上親征次大名契丹遁以竇偁為比部郎中初偁與賈琰同為開封局官琰巧佞偁常對上叱之至是上思見偁促召至行在而有是命時方議北征偁因抗疏請還都休養士馬徐為後圖上悅其言及至自大名以偁為樞密直學士偁儀之弟也十二月畋近郊時禁盜畋有衛士獲獐令當死上曰我若殺之後世必謂我重獸而輕人命釋之上至自大名上初聞契丹退欲遂追取幽州命宰相問李昉扈䝉等以事之可否昉等上奏請養驍勇廣儲積期嵗之間用師未晩上深納之下詔班師時張齊賢亦上疏略曰聖人舉事動在萬全百戰百勝不若不戰而勝若重之慎之戎狄不足吞燕冀不足取自古疆場之難非盡由戎狄亦由邊吏擾而致之若縁邉諸軍撫御得人但使峻壘深溝蓄力養鋭以逸自處寧我致人李牧所以稱良將於趙用此術也所謂擇卒不如擇將任力不如任人如是則邉鄙寧邉鄙寧則輦運減輦運減則河北之民獲休息矣又曰臣又聞家六合者以天下為心豈止爭尺寸之事角彊弱之勢而已是故聖人先本而後末安内而養外人民本也戎狄末也中夏内也夷狄外也五帝三王未有不先根本者也堯舜之道無他廣推恩於天下之民耳推恩者何在乎安而利之民既安利夷狄斂衽而至矣陛下愛民利天下之心真堯舜也臣慮羣臣多以纎微之利尅下之術侵苦窮民以為功能者彼為此效相習已乆伏望精擇通儒分路採訪兩浙江南荆湖兩川有偽命日賦歛苛重者改而正之使賦歛課利通濟可經乆而行為聖朝定法除去舊弊天下諸州有不便於民事者委長吏聞奏如敢循常不以聞嚴加憲典使天下耳目皆知陛下之仁戴陛下之惠則幽燕之歸可立而待也辛巳太平興國六年春三月岐王徳芳薨太祖之次子也夏五月旱大赦六月薛居正薨臨其喪秋九月乙未朔日有食之解田錫言職出為河北南路轉運副使時盧多遜專政羣臣章表不先禀多遜則有司不敢通錫為左拾遺嘗獻平戎歌多遜許之始得進御又諫官上章必令閤門吏依常式書狀云不敢妄陳利便希望恩榮錫貽書多遜請諫官免書状多遜不悦出之時既取太原范陽未下上怒不賞平晉之功中外莫敢言錫因入辭直進封事言軍國要機一朝廷大體四略曰頃嵗平太原逮兹二載未賞軍功請因郊祀行之此要機之一也交州蠻海之地得之如獲石田願毋屯兵以費財此大體之一也邇來官廢其職給事中不敢封駁遺補不敢貢直言起居郎舍人不得升陛紀言動御史不彈奏左右丞今尚缺員中書舍人雖掌書命未聞訪之以事集賢院雖有書籍而無職官秘書省雖有職官而無圖籍願擇材而任之各司其局此大體之二也朝廷闢西苑廣御地而尚書無本㕔郎曹無本局九寺三監狹室蕭然禮部試士或就武成王廟是豈太平之制望别修省寺用列職官此大體之三也又毎於歧路見囚荷鐵枷於法所無去之可矣此大體之四也上嘉其言賜錢五千萬或謂錫宜少晦匿以逺讒忌錫曰事君之誠惟恐不竭矧天植其性豈以一賞而奪耶在河朔累章論邊事後知相州上疏略曰陛下憂民太過視事太勤毎日聴朝之後或進陳甲伏或揀閲軍人或躬問縲囚或親校簿書恐於大體有所未究又百司營為多以劄子取進止官員注擬必領引見聴敕皆勞天體安用有司加以條理事宜或傷頻併施行詔勅或致稠重此非臨下以簡之道又轄磨勘一司本屬考功今於中書外廡更置是考功之職不修而磨勘之名互出又言御史臺本不禁人今為繫囚之所大理寺舊来置獄今為檢格之司置京朝官差遣院舊制京朝官属吏部國初以来皆出中書至是詔中書舎人郭贄等考校勞績品量材器以中書所下闕員引對而授之謂之差遣院以趙普為司徒兼侍中普奉朝請日乆盧多遜益毁之謂普初無立上意於是普因奏事言昭憲顧命臣實與聞上發金櫃得誓書遂大悟尋復相之石熙載為樞密使以戸部尚書充使用文資正官充樞密使始此冬十一月置皇城司改武徳司為之上嘗遣武徳卒潛察逺方事有至汀州者知州王嗣宗執而杖之縳送闕下奏曰陛下不委任賢俊而猥信凡輩為耳目上大怒已而遷其官辛亥郊大赦先是有陳再思者上書乞當郊勿赦上竟從趙普言由是赦宥之文遂定自後郊赦不書是嵗髙昌國來貢其國漢車師前王之庭戊巳校尉之地也定安國亦附上謝表上初議討契丹因詔定安國令張犄角之勢其國得詔大喜㑹女真遣使經其國其王烏𤣥明附表來上略曰臣髙麗舊壤渤海遺民常仰覆露之仁毎被漸漬之澤頃嵗契丹恃其强暴入冦境上所宜受天朝之密畫率勝兵而助討復優詔答之定安本馬韓之種為契丹所破其酋帥糾合餘衆於西鄙自號定安國云太祖朝亦嘗因女真遣使來貢壬午太平興國七年春三月癸巳朔日有食之夏四月以竇偁參知政事上謂偁曰汝自揣何以至此偁曰陛下念藩邸之舊臣出於際㑹上曰非也乃汝靣折賈琰賞卿之直耳貶盧多遜秦王廷美多遜流崖州廷美勒歸第自普復相多遜益不自安普屢諷多遜令引退多遜貪權固位不能自決故及先是金明池水心殿成上將往逰或告廷美欲乗此時為亂上不忍暴其事故罷㑹普亷得多遜與廷美交通事以聞上怒責授多遜兵部尚書下御史逮捕中書守當官趙白秦府孔目官閻密等命翰林學士承㫖李昉等雜治之並得交通顧望祝詛實狀引伏故有是命趙白等六人皆伏誅多遜累世墳墓在河内未敗前一夕震雷焚其林木皆盡聞者異之及赴貶所食於道旁逆旅有嫗頗能言京邑舊事多遜因與語嫗固不知其為多遜也多遜曰嫗何自来乃居此嫗顰蹙曰我夲中原士大夫家有子任某官盧某作相令枉道為某事吾子不能從其意盧銜之中以危法盡室竄南荒未周嵗骨肉相繼淪没惟老身流落山谷今僑寄道旁非無意也彼盧相者妬賢怙勢恣行無忌終當南竄幸未死間可見之耳多遜黙然趣駕去至貶所瓊州遣才將知崖州事輒求婚於多遜多遜不許遂使辱之將加害卒與為婚沈倫罷上以盧多遜包藏逆節倫與同列不能覺知責授工部尚書倫清介謹厚故車駕毎出多令居守然十年相位但齪齪固守不能有所建明搢紳非之録繫囚趙普等以上察見隠微相率稱賀上嘗謂普曰朕毎讀書見古帝王多自尊大深拱嚴凝誰敢犯顔言事若不降情接納乃是自蔽聰明或喜賞怒刑豈能歸天下之心哉上又問治民之道復有何術普曰陛下恤念生民毎聞利病無不即日施行古聖王愛民之心止於此矣雍熈間有司上竊盜贓至大辟者特詔貸其死上因謂宰相曰朕常重惜人命如此數者往往貸其極刑但時取其甚者以儆衆耳不欲小人知寛貸之意慮犯法者多耳五月契丹三道入冦邉將敗之竄廷美降涪陵縣公安置房州趙普復教知開封府李符上言廷美怨望不悔過乞徙逺郡防他變遂有是命初太祖傳位於上昭憲顧命也或曰昭憲及太祖本意盖欲上復傳之廷美而廷美復傳之徳昭故上即位亟命廷美尹開封徳昭授節度使皆稱皇子皆縁昭憲及太祖意也徳昭既不得其死徳芳相繼夭絶廷美始不自安寖有邪謀他日上以傳國意訪之趙普普曰太祖已誤陛下豈容再誤邪於是普復入相廷美遂得罪廷美所以得罪則普之為也李繼捧来朝獻四州地其弟繼遷叛去六月河決臨濟尋又決范濟口又決武徳置譯經院秋七月幸譯經院八月罷劔南榷酤冬十月幸金明池閲習戰行乾元厯吳昭素所造上親為之序十二月朔戊午日有食之是嵗眀紀死子隆緒立復號大契丹明紀諡景宗孝成皇帝隆緒號天輔皇帝尊母蕭氏為承天太后改明年元為統和隆緒才十二嵗母蕭氏專其國政初蕭氏與樞密使韓徳讓通至是賜姓耶律改名隆運尋拜大丞相封晉王髙麗王伷死弟治立遣李巨源孔維使之治問禮於維維對以君臣父子之道升降等威之序治喜曰今日復見中國夫子矣癸未太平興國八年春正月曹彬罷以弭徳超為宣徽北院使兼樞密副使彬坐為徳超誣譛未幾徳超敗上知彬無他待之愈厚臨朝累日不懌從容謂趙普等曰朕以聽㫁不眀幾敗大事夙夜循省内愧於心普對曰陛下知徳超才幹而任用之審曹彬無罪而昭雪之有勞者進有罪者誅物無遁情事至立斷此所以彰陛下聖明也雖堯舜何以加此上由是釋然初徳超之譛彬也覬事成自得樞密使及為副使出怨望語或告之上命訊鞫遂伏罪是夏流徳超於瓊州徳超之進因李符李琪之薦也初趙普令李符告廷美怨望又恐符漏言因事逐符貶寧國司馬徳超之敗上惡符朋黨併令徙嶺表遂以符知春州嵗餘卒盧多遜之流崖州也符白普曰朱崖雖逺在海中而水土頗善春州稍近瘴氣甚毒至者必死不若令多遜處之普不答至是乃以處符二月戊子朔日有食之三月分三司各置使上嘗語宰臣曰三司官吏奏事朕前紛紛異同此固不為私事但迭執偏見不肯從長商度朕毎以理開諭朕於臣下務在將䕶才用優劣一一可見隨其器能各加任使奏對之際無不假以辭色善惡兼聴未嘗峻折之也宋琪曰人之才用罕有兼備陛下聰明覆臨長短俱露或又初見天威内懐懾懼若不賜之辭色何由畢其懇誠聖心深鑒事理曲盡物情臣下幸甚端拱初朝議欲置三司判官十二員直史館羅處約上言三司之制非古也盖唐之中葉後兵冦相仍以賦調筦𣙜之所出故自尚書省分三司省董之今則倉部金部安能知帑藏之虛盈司田司川孰知溝渠之逺近有名無實積習生常今宜復舊制若三司之中更分置僚屬則愈失其本源矣又言九寺三監多為冗長之司雖設其官不舉其職願陛下建垂乆之規不煩更差使臣别置公署置諮議翊善侍講官於諸王及皇子府以王遹姚坦邢昺等十人為之坦為益王元傑府翊善雅好直諫王嘗作假山所費甚廣既成召僚屬置酒共觀之衆皆褒賛其美坦獨俯首不視王强使視之坦曰但見血山安得假山王驚問其故對曰坦在田舍時見州縣督稅上下相急剝里胥臨門捕人父子兄弟送縣鞭笞血流滿身愁苦不聊生此假山皆民租賦所出非血山而何時上亦為假山猶未成有以坦之言告於上者上曰傷民如此何用山為命亟毁之王毎有過失坦未嘗不盡言規正宫中自王以下皆不喜左右乃教王稱疾不朝上日使醫視之逾月不瘳上甚憂之召王乳母入宫問王疾増損状乳母曰王本無疾徒以翊善姚坦檢束王起居曽不得自便王不樂故成疾耳上怒曰吾選端士為王僚属者固欲輔佐王為善耳今王不能用規諫而又詐疾欲使朕逐去正人以自便何可得也且王少未知出此必爾輩為之謀爾因命捽至後園杖之數十召坦慰諭之曰卿居王宫為羣小所嫉大為不易卿但能如此無患讒言朕必不聴也尋擢坦為考功郎雍熈間以畢士安為諸王府記室上謂曰諸子生長深宫未知世務必資良輔賛道為益使聞忠孝之道卿等皆謹恪有行各宜勉之親試舉人擢王世則以下百七十餘人諸科五百餘人賜宴始就瓊林苑後遂為例以世則等十八人通判諸州上因謂近臣曰朕親選多士殆忘饑渴召見臨問以觀其才拔而用之庶得岩野無遺逸而朝廷多君子耳朕毎見布衣搢紳間有端雅為衆所推譽者朕代其父母喜或召拜近臣必為擇良日欲其保終吉也朕於士大夫無所負矣上嘗謂宰相曰唐置採訪使盖欲察官吏善惡人民疾苦然所命者官髙則權勢太重官卑則威令不行又所過州郡承迎不暇豈能審知利害但虛有其名耳曷若慎選羣才各分任使有功有過賞罰分明且國家選才最為切務人君深居九重何由徧識必須採訪茍能善者多自然操履無坫若擇一好人為益無限古人言得千良馬不若得一伯樂得十利劍不若得一歐冶此言殊有理朕孜孜訪問正要求得良才以充任使也趙普曰帝王進用良善實助太平之理然於采擇要在得所盖君子小人各有黨類最不可不謹也上然之夏四月蠲漳泉苛斂上嘗覽福建版籍謂宰相曰陳洪進止以漳泉二州贍數萬衆無名科斂民所不堪比朝廷悉已蠲削民皆感恩朕亦不覺自喜又嘗謂趙普曰前代亂多治少皆繫帝王所為朕撫御萬方固不能家至戸曉但持其綱領行其正道以齊一之鄉者偏霸掊克凡數百種朕悉令除去矣俟五七年當盡減民租賦卿記朕此言非虛發也普曰陛下愛民之意發於天性惟始終力行之天下幸甚又嘗謂宰相宋琪等曰近代以来政理隳紊無如晉漢外則侯伯不法恣其掊斂内則權倖用事貨賂公行百姓未納王租先遭率斂嗷嗷何所告訴朕毎念及百姓寒耕熱耘營求衣食國家若非贍食軍旅兩税亦不忍催督而況非理誅剝乎琪等對曰陛下恤民求理取鑒晉漢天下幸甚班外官戒諭辭上嘗作戒諭辭二付閣門一以戒京朝官受任於外者一以戒幕職州縣官至是令閣門於朝辭日宣㫖戒勅仍書其辭於治所屋壁遵以為戒五月河決滑州灌澶濮曹濟等州流至徐州入淮發卒數萬民夫十餘萬治之作太乙宫初方士言五福太乙天之貴神也行度所至之國民受其福以數推之當在吳越分故令蘇州築宫以祠之至是成又詔作宫於蘇村黎桓來貢桓廢丁璿自稱交州留後始遣使入貢上賜詔書因而撫之令遣丁璿母子入朝桓不聴命六月榖洛伊瀍溢溺死者以萬計秋七月諸路大水八月令中書密院修時政記先是詔盧多遜錄時政記未成書直史館胡旦言唐以来中書樞密院置時政記周顯徳中李穀又奏樞密院置内庭日厯自後闕廢請修舉之乃詔自今軍國政要並委參知政事李昉撰錄樞密院令副使一人纂集毎季送史館昉因請先奏御時政記奏御始此九月置江淮水陸發運使置於京師寛兩税限禁嚴刑催科上謂宰相曰朕視萬民如赤子念其耕稼之勤春秋賦租軍國用度所出恨未能去之比令兩税三限外特加一月而官吏自求課最恣行捶撻督令辦集此一事尤傷和氣乃下詔申儆之且令長吏皆察所屬有嚴刑催科者論其罪又令自今遣使檢覈災旱必立限以遣之防稽緩也冬十月置都進奏院罷諸州知後官趙普罷出領武勝節度宴餞普於長春殿上賜普詩明日謂近臣曰趙普於國家有大勲勞朕布素時與之逰從齒髮衰矣不欲煩以機務擇善地令之卧治因詩道意普感激且泣朕亦為之堕淚宴之日樞密使王顯等侍側數視上怪而問之顯等曰陛下所衣袴文縷俱側上笑曰朕未嘗御新衣盖澣濯頻所致耳上因言此雖逼下已甚盖念機杼之勞苦欲示敦朴為天下先也十一月以宋琪李昉同平章事上謂曰世之治亂在賞罰當否當其功罪無不治或以為飾喜怒之具即無不亂卿等戒之琪曰賞罰二柄乃御世之銜勒若馬無銜勒何以控御治天下者茍賞罰至公未有不致太平也昉初與盧多遜善待之不疑多遜屢譖昉人或告昉昉曰盧與我厚不當爾於是上語及多遜事昉頗為解釋上因言多遜居常毁卿不直一錢昉始悟上由此益重之詔宰相班親王上琪等固辭上曰宰相之任實總百揆與羣官禮絶藩邸之設止奉朝請而已元佐等尚幼欲其知謙損之道卿勿多辭也以李穆呂䝉正李至㕘知政事張齊賢王沔同簽署樞密院初穆知開封府時剖決精敏姦猾無所假貸由是豪右屏迹權貴不敢干以私上益知其才始有意大用至是穆等入對上謂之曰朕為官擇人惟恐不當今兩制之臣十餘皆文學通用操履方潔卿居京府尤號嚴肅故加奨擢也因思閭里間毎旦焚香祝天子萬嵗次則大臣眉壽朕與卿等安得不日思善事以副億兆之禱耶穆等謝上又曰朕覽前書備見厯代治亂大抵君臣之際先要情通朕勵精求治卿等為朕股肱耳目設有闕政宜悉心言之斷在必行朕毎行一事偶有未當乆之尋繹惟自咎責耳固不以尊居自恃使人不敢言也䝉正入朝堂有朝士指之曰此子亦參知政事邪䝉正佯為不聞同列欲詰其姓名䝉正遽止之曰若一知其姓名則終身不能忘固不如毋知也後有張紳者知蔡州以贓敗或為上言䝉正與紳有隙上即復紳官䝉正終不辨後得其實上復黜紳因謂䝉正曰張紳果有贓䝉正亦不辨置侍讀官上聴政之暇日閲經史患顧問闕人是嵗始用著作佐郎呂文仲為侍讀尋又為翰林侍讀常御經史命文仲讀之文仲與侍書王著更宿而書學葛湍亦直禁中毎暇日多乃問文仲以經書著以筆法湍以字學當時史館修太平總類成日進讀三巻宋琪等曰窮嵗晷短恐疲聖躬上曰朕性喜讀書開巻有益不為勞也尋改總類名曰御覽上嘗謂近臣曰朕每讀老子至佳兵者不祥之器聖人不得已而用之未嘗不三復以為規戒王者雖以武功克定終須用文徳致治朕毎退朝不廢觀書者意欲酌前世成敗而行之也上嘗禁中讀書自巳至申始罷有蒼鶴飛止殿䲭吻逮掩巻而去上怪之以語近臣對曰此陛下好學之感也昔有鸛雀銜三鱣魚墜楊震講堂下抑亦類此李繼遷寇宥州擊敗之甲申雍熙元年春正月求遺書廷美卒廷美至房州憂悸成疾卒上聞之嗚咽流涕贈涪王諡曰悼廷美母陳國夫人耿氏上之乳母也李穆薨臨其喪穆性至孝操履純正遭母喪詔强起之尋以毁卒上臨哭謂近臣穆國之良臣朕方倚用遽淪没非斯人之不幸乃朕之不幸也二月朔閲將校按名籍㕘考勞績而升黜之踰月而畢自後率循其制上謂近臣曰朕選擇將校先取其循謹能御下者又曰兵雖衆茍不選擇與無兵同舊制諸軍辭見或行問驍勇出衆者令將校互相保任魏能戍逺不為衆所保上曰此人材勇朕可自保之由是稍加進用三月滑州決河塞先是塞房材口決河用丁夫凡十餘萬自秋踰冬斷塞而復決上不欲重煩民力乃命發卒五萬人塞之及訖功上作平河歌蠲水所及民田租夏四月羣臣請封禪詔許後以火災故罷之五月除江南鹽禁尋復之乾元文眀二殿災初以京官充堂後官是冬初以堂後官充職事官仍詔除入謝外不赴朝㕘見宰相禮同胥吏端拱初又令選選人授京官闕充堂後官六月求直言火災故知睦州田錫上疏略曰給事中不得其人左右補遺不舉其職致陛下有朝令夕改捨近謀逺之事又言時乆昇平天下混一故左取右奉致陛下以功業自多然臨御九年四方雖寧而刑罰未甚措水旱未甚調陛下謂之太平誰敢不謂之太平陛下謂之至理誰敢不謂之至理又言宰相不得用人而委員郎差遣近臣不専受責而求令録封章又言聴用太廣則條制必繁條制既繁則依從者少自今凡有奏陳幸令大臣議而行之毋使垂之空言示之寡信人言宰相若賢當信而用之宰相非賢當擇而任之何以置之為具臣而疑之若衆人也遣使諸路察獄御史季杞等八人詔州縣官言事初轉運使及知州通判皆併尚書言事至是復降是詔俾附傳置以聞時有草澤上書言時政者引對其詞狂悖上慰諭之越明年冬有龍溪主簿王濟附驛奏事時福建輸鶴翎為箭羽鶴非常有物官督責尤急一翎直至數百緡民甚苦之濟以便宜諭民取鵝翎代輸驛奏其事因詔旁郡悉知之嚴慮囚限令諸州十日一慮囚秋七月命諫官領登聞檢院改匭院為之仍令諫院依舊差諫官一員主判九月夏州襲敗李繼遷初李繼捧入朝其弟繼遷留銀州詔發繼捧繼遷赴闕繼遷時年十七勇悍有智謀不樂内徙與其黨奔入番族地斤澤距夏州東北三百里出其祖彛六像以示戎人戎人皆拜泣稍稍歸附詔書招諭繼遷不出至是知夏州尹憲選精騎夜掩襲之斬首五百級燒四百餘帳獲繼遷母妻獨繼遷以身免冬十月召隱士陳摶上之初即位嘗召之至是復至上益加禮重遣使送至中書宋琪等問曰先生得𤣥黙修養之道可以授人乎曰摶遁迹山野無用於世鍊養之事皆所不知無可傳授然正使白日昇天何益於治聖上龍顔異秀有天曰之表洞達古今治亂之㫖真有道仁聖之主正是君臣合徳以治天下之時勤行修鍊無以加此琪等表上其言上覽之甚喜賜號希夷先生尋請還華山上嘗謂宰相曰朕每日所為有常度辰巳間視事罷即看書夜深乃寢五鼓而起盛暑永晝未嘗卧至於飲食亦不過盖行之已乆甚見得力凡人飲食飽無不昏濁倘四支無所運用更復就寢血脈凝滯諸疾自生卿等亦宜留於攝養也嵐州獻一角獸徐鉉等以為祥麟上曰珍禽竒獸奚益於事方内乂寧風俗淳厚此乃為上瑞耳十一月丁夘郊奉宣祖配改元初太祖追尊四廟親郊以宣祖配上即位從禮官議故三年六年再郊並以太祖配及將封禪扈䝉定禮奏言經曰嚴父莫大於配天請以宣祖配天太祖配上帝至是遂用䝉議識者非之自張昭竇儀卒朝廷諮訪故興革立儀法皆䝉専焉上嘗語宰相以今嵗大稔人民亦無疾疫當與卿力行好事以答天意十二月罷廣南諸州采珠場自是惟商船販市淳化中罷端州貢硯立徳妃李氏為皇后故淄州刺史處耘之女也是嵗令外庭勿與内藏詔是今内藏庫月帳於内東門進外庭不得與其事上謂左右曰此盖慮司計之臣不能莭約異時用度有闕復當賦率於民爾朕終不以此自侈嗜好也乙酉雍熈二年春二月禁増置寺觀三月親試舉人初唱名賜第得梁灝以下一百七十餘人諸科一百餘人並唱名賜及第李昉呂䝉正之子皆入等上曰此並勢家不宜與孤寒競進並罷之左右言尚有遺才復試又得洪湛等七十餘人諸科三百餘人並賜及第夏四月遣使賑江南饑御史安國祥等十人夏州敗李繼遷繼遷春間詐降誘殺都延檢曹光實至是夏州敗其黨錫里族宴近臣宴於後苑宰相以下三館皆與賞花釣魚曲宴始此秋七月詔按視倉粟轉運及長吏計支用外出糶或借貸與民及轉輸京師不省視而致損敗者雖去官論如律八月遣使按察荆浙等路李承積等六人九月廢皇子楚王元佐為庶人初廷美得罪元佐獨申救之上不聴廷美死元佐遂感心疾屢為殘忍不法至是坐縱火廢冬十月錄繫囚上决事至日旰因謂宰相曰中外臣僚若皆留心政務天下安有不治者古人宰一邑守一郡使飛蝗避境猛虎渡江況人君能惠養黎庶申理寃滯豈不感召和氣乎朕毎自勤不怠此志必無改易或云百司細故帝王不當親決朕意則異乎是十二月庚子朔日有食之宋琪罷坐與樞密使柴禹錫交通上不欲暴其狀以琪素好詼諧無大臣體禹錫不能輸誠奉公并罷之琪守本官上詔李昉等曰朕於大臣豈欲容易進退琪為宰相乃請居盧多遜舊第不避惡名與鍾離意何相逺耶又曰中書樞密朝廷政令所出治亂根本繫焉且天下廣大卿等與朕共理當各竭公忠以副任用九朝編年備要巻三
