body:
  text: 九朝編年備要卷六宋陳均撰真宗皇帝起戊戌咸平元年止癸卯咸平六年戊戌咸平元年春正月命官兼南北宅教授以諸王府記室等官兼之時南北宅又有侍讀然無定員召學官崔頥正侍講上令擇官校正九經文字李至薦頥正上召至後苑講尚書大禹謨賜五品服因命輔臣於班行中選明經者以名聞自是日令頥正赴御書院侍講上每旦御前殿辰後復御後殿視諸司事或閲試軍士日中而罷夜則召儒臣詢得失或至夜分二月彗出營室北上問宰相曰何祥也吕端等言變在齊魯之分上曰朕以天下為憂何止一方耶求直言時田錫罷銀臺封駁司知泰州未行㑹星變上疏言李繼遷不合與夏州又不合呼之為趙保吉又言從來密院公事宰相不得聞中書政事樞密不得議兵謀不精國計未善三月賜舉人第自淳化五年停貢舉至是舉行之上語知舉楊勵曰貢舉任重當務選擢寒俊精求藝實以副朕也得孫僅等五十人諸科百五十人是年始詔知舉官親屬别試寬飢民罪時京兆府言本府穀貴民多持杖發窖藏合從强盜法察其情本止為艱食請自今犯者特貸死徒罪減等俟麥登仍舊從之夏四月旱遣使分詣諸路察獄蠲逋負用判理缺司王欽若之言也凡除逋缺二千餘萬釋繫囚三千餘人後欽若請以此事付史館因命學士院召試上前後所蠲三司逋負不一據史所書如咸平四年所釋凡二千六百餘人蠲物二百六十餘萬六年釋四千一百餘人蠲物八萬三千又謂輔臣曰宜悉取民弊著為條目大事隨宜減省小者即為除免五月戊午朔日有食之六月命近臣舉轉運上嘗語參知政事李至曰凡舉官宜先擇舉主以類求人今外官轉輸之任最切卿等可先擇人而令舉之越明年河東轉運宋摶言大通監冶鐵盈積可供諸州軍數十年鼓鑄請權罷以紓民力時西北二邊屯師甚廣摶經制饋餉以幹治稱朝廷難其代凡十一年不徙詔議太祖廟稱號先是李宗訥請改僖祖以下稱號下尚書省集議時張齊賢言為人後者為之子安得宗廟中有伯氏之稱詔禮官詳定禮官引春秋閔僖同為一代及晉惠懷唐中睿故事請太祖太宗昭穆同位詔都省復集議議同齊賢又詔禮官再討典故奏言唐𤣥宗謂中宗為皇伯考德宗謂中宗為髙伯祖伯氏之稱復何不可况太宗享祀太祖二十二年止稱皇弟請自今合祭同位異坐太祖位仍舊稱孝子奏可秋八月嚴倉官羡餘禁詔禁倉官以羡餘為課九月令綾錦院改織絹上嘗語輔臣曰國家所謹儉約為先節用愛人民俗自化冬十月丙戌朔日有食之呂端罷以張齊賢李沆同平章事初齊賢嘗受詔刪定編敇以小人犯盜者衆强竊盜持杖不得財論罪大重非治平之法乃申明律意裁減之刪定官王濟謂以死懼之尚不畏况緩其死乎是惠姦也濟强伉手疏詆齊賢腐儒不知適時之要齊賢復表陳濟同議定而復有異論乃下尚書省集官詳議并劾濟既而齊賢再相因言不欲與庶僚較曲直上欣然嘉其有容遂罷議濟既免劾而刑名如齊賢之請自是犯盜者歲亦不增先是三班不免杖罰齊賢請以贖論訖今不易十一月置估馬司估蕃部及進貢馬價凡市馬之處河東則府州嵐岢軍陜西則秦渭等州川峽則益黎等州皆置務嵗得五千餘匹以布帛茶他物準其直十二月詔大辟疑者以聞嚴牧守選詔三司判官舉知州上重牧守之任秦國長公主嘗為其子壻求正除近京刺史上曰牧守親民之官係朝廷公議不許頒新編敕柴成務重定也成務言太宗時有太平編敕三十卷又有淳化編敕三十卷自後至萬八千餘道刪定成二百六十餘道請與律令同行奬恬退是嵗審刑院詳議官韓見素年四十八乞致仕李至言知止求退者少從之足以勵薄俗乃授刑部員外郎致仕己亥咸平二年春三月賜舉人第孫暨等七十一人諸科一百八十人有司請上御殿試上以在諒暗不許卻貢獻內侍裴愈因事至交州謂龍花蘂難得之物宜充貢本州採以為獻上怒黜愈𨽻崖州仍絶其貢是嵗又減罷劍隴夔賀等五十餘州土貢又罷三十餘州嵗貢茶遣使賑江浙飢閏月旱求直言自是草澤上言甚衆其可採者授官奬之朱台符上疏略曰陛下踐阼以來二年之內彗星一見時雨再愆彗星見者兵之象時雨愆者澤未流也今北土未賔西羌作梗荆蠻有猖狂之冦江浙有飢饉之民宜設備以禦之修政以壓之又言農者國之本也其利在粟多兵者國之命也其功在戰勝方今患在農少而粟不多兵多而戰不勝農少則田或未墾兵多則財用常不足民利盡於國國利盡於軍所以民困而國貧也且地方百里每畝收粟一斛嵗計得粟五百四十萬斛今甸服之內方百里者百所出曽不足供軍運糧江淮所得不過百里之出有以見農政之不修也國家養兵百萬自夏庭逆命軍聲不振一紀于兹將帥不用命而委任不專士卒驕惰而不習邊事也又請郡縣量置義軍於王畿置兵十萬以制之緣邊之人便於鬭戰宜募為正軍以備城守止於趙魏之間少屯王師以䇿其後如此則內外之兵減大半矣又言不任人無以安邊不安邊無以省兵不省兵無以惜費不惜費無以寬民不寬民無以致治捨此數事雖有智者不能為計矣又言簡易者事不黷節儉者財有餘今官吏森羅使者旁午無名之賞賜不急之造作他費百端動計千萬加以教化未甚行亷恥未甚至法有滋章之條吏無惻隱之實其他背理傷道便文自營非為公家忠計者不可一二而舉也陛下自視當今事勢何如漢唐盛時有土者不可以言貧有人者不可以言弱以陛下神聖聰明資以天下之大而未比隆於漢唐竊為陛下惜之上優詔褒答時上封事者不下百數上令近臣閲其可采者取進止以索湘為戶部使湘質朴少文而長於吏事歷任邊郡所至必廣儲蓄為豫備計出入軍旅間頗著能名先是自京輦茶至𣙜場最為煩擾又多所損敗湘建議請許商賈緣江載茶詣邊郡入中既免道途之耗復有征算之益未幾右司諫孫何上疏請罷三司擇戶部尚書與其屬參掌之夏四月嚴封事進入限詔閣門封事許盡時進入防稽滯也選從臣兼知登聞院命工部尚書張宏翰林學士王旦兼之慮壅蔽也以張詠知杭州詠既至以嵗飢寬鹽禁官屬皆執不可詠曰錢塘十萬家餓殍如此禁之嚴則聚而為盜杭有名家子與姊夫訟家財壻言妻父臨終此子方三嵗故命掌資産且有遺書令異日以什之三與子七與女詠覽之曰汝婦翁知人也以子幼故託汝茍明以什七與子則子死汝手矣亟命以七給其子餘三與壻皆拜泣而去一郡稱神明墾襄汝二州間田先是耿望請於襄州置營田即令望為京西轉運與副使朱台符並兼本路制置營田事是嵗種稻三百餘頃汝州舊有洛陽南務遣內國兵士種稻雍熙中以所收少廢之於是從台符之請復置募民二百餘戶自備耕牛就置園長以京朝官專掌之墾六百頃導汝水澆溉嵗收二萬三千石五月禁泥金鋪金視曹彬疾車駕臨問因詢彬以北國事宜彬言太祖英武定天下猶委孫全興經營和好上曰此事朕當屈節為天下蒼生然須執綱紀存大體即久逺之利也未幾彬薨彬仁恕清謹平二國秋毫無所取北征之失律也趙昌言請行軍法及昌言知延州還因事劾未得入見彬遽為之請保功名守法度近代良將稱為第一秋七月給外官職田蠲其稅從張齊賢之請也幸國子監召學官崔偓佺講尚書大禹謨遂幸崇文院登祕閣觀太宗聖製墨跡惻愴久之賜祕書監祭酒以下器幣置翰林侍讀侍講學士以兵部侍郎楊徽之戶部侍郎夏侯嶠工部侍郎呂文仲為侍讀國子祭酒邢昺為侍講初太宗以呂文仲翰林侍讀名秩未崇上承先志特建此職擇老儒舊德以充其選班秩次翰林學士祿賜如之設直廬於祕閣侍讀更直侍講長上日給尚食珍饌夜則迭宿多召對詢訪或至中夕焉徽之純厚清介守規矩尚名教嫉非道以干進者朝廷以舊德目之八月大閲楊礪薨臨其喪時礪為副樞上聞嘆曰礪介直清苦方當任用遽此淪謝甚可悼也即冒雨臨其喪礪私舍委巷中乘輿不能入上為步進九月庚辰朔日有食之以朱昻為傳法院譯經潤文官鹽鐵使陳恕力言傳法院費國供億請罷不從冬十月置福建惠民倉令諸路轉運司申淳化惠民之制豐則增價而糴歉則減價而糶福建路倉至是始制十一月丙戌郊奉太祖太宗配畋近郊契丹入冦十二月上親征次澶州知冀州張旻敗契丹于城南次大名府知府州折惟昌又敗之于五合川先是鎮定都部署傅潜敗契丹于簾良路引兵留定州不進河北轉運使裴莊屢奏潜無將略樞密使王顯頗庇潜輒不報緣邊告急潜擁兵八萬畏懼自守敵破狼山諸寨入祁趙出邢洺間朝廷屢督進師皆不從詔百官言邊事集賢院學士錢若水言請斬傅潜擢如楊延朗楊嗣者五七人增其爵秩分授兵柄如此則不出半月可以坐清邊塞又言將來安邊之術太祖制置最得其宜以郭進在邢州李漢超在關南何繼筠在鎮定賀惟忠在易州李謙溥在隰州姚內斌在慶州董遵誨在通逺王彥升在原州但得緣邊巡檢之名不授行營部署之號率皆十餘年不易其任立邊功者厚加賞賚其位或不過觀察使位不髙則朝廷易制久不易則邊事盡知然後授以聖謀不令生事來則掩殺去則勿追所以十七年中北邊西番不敢犯塞以至屢遣戎使先來求和此皆布在耳目陛下之所知也伏望遵太祖故事遴擇名臣分理邊郡罷部署之號使不相統臨置巡檢之名俾遞相救應如此則出必擊冦入則守城不數年間可致邊烽罷警矣起居舍人李宗諤言擇將帥必先察其智謀能總千人者委以千人之權能總萬人者授以萬人之職各人守一郡控一城分領驍雄爭據要害來則急擊去則勿追又豈須置三路都部署之名制六軍生死之命使材力之士不得施為又言臨陳易帥拔卒為將正在此時庚子咸平三年春正月上次大名府先是范廷召分兵擊敵求援於髙陽關都部署康保裔亟赴之廷召潜師遁去保裔為敵所圍力戰於瀛州之裴柯死之敵遂自德棣濟河掠青齊而去初上聞驍將楊延朗楊嗣等屢請戰傅潜不許戰勝者又抑之上怒下潜獄法當斬詔特貸公議憤惋益州卒王均反益州鈐轄符昭夀驕恣不親戍務知州牛冕寬弛無政事趙廷順等殺昭夀奉都虞候王均為主僣號大蜀改元化順率衆陷漢州遂趨劍門為知州李士衡所敗遁還成都初張詠自蜀還聞冕代已曰冕非撫衆材其能綏輯乎均之亂彭州人謀殺都監以應之陳從易時為判官攝州政事斬其首謀者召餘黨曉以禍福赦之乃率勵將吏嚴守械戒其家僮積薪舍後曰吾力不足以守當死於此賊聞有備不敢入境上聞之召從易為著作佐郎以雷有終知益州討王均罷沿邊𣙜酤上至自大名李沆為留守不戮一人而輦下清肅上之在大名也詔調丁夫十五萬修黃河監察御史王濟以為勞民請徐圖之乃命濟馳往經度還奏省其十六七宰相張齊賢以河決為憂因對并召濟入見齊賢請令濟署狀保河不決濟曰河決亦隂陽災沴所致宰相若能和隂陽弭災沴為國家致太平河之不決臣亦可保齊賢曰若是則今非太平耶濟曰北有邊釁西有羌遷兩河關右數被侵擾以陛下神武英略茍用得其人可以馴致今則未也上動容獨留濟問以邊事退而著備邊䇿十五條以獻未幾選官判大理寺欲得剛正不阿者上曰王濟近數言事似有特操可試之乃以命濟三月戊寅朔日有食之親試舉人上臨軒三日無倦色得進士陳堯咨以下四百九人諸科四百三十餘人又試進士五舉諸科八舉凡九百餘人所擢凡千八百餘人其中有晉天福隨計者較藝之詳推恩之廣近代所未有也四月改葬元德皇后祔永熙陵蠲潭州地稅等征從知州李允則之請也初馬氏斂州人嵗出絹謂之地絹及潘美定湖南計屋每間輸絹丈三謂之屋稅營田戶給牛嵗輸米四斛牛死猶輸謂之枯骨稅民輸茶初以九斤為一大斤後益至三十五斤允則請除二稅茶以十三斤半為定制㑹嵗飢欲發官廩先賑而後奏轉運使以為不可允則請以家資為質乃得發廩賤糶因募飢民𨽻軍籍得萬人民列治狀請留賜詔嘉奬及還對連三日上曰畢士安不謬知人矣蓋士安曽於上前薦之也五月河決鄆州命塞之六月以向敏中為兩河宣撫大使以兩河大兵之後特遣重臣巡慰訪民疾苦秋七月江浙飢遣使巡撫命夏侯嶠邢昺往詢民疾苦嶠上民病二十餘事亟詔革之未幾知黃州王禹稱上言太宗時令江浙諸郡毁城隍收甲兵大郡給二十小郡減五人以充常役號曰長吏實同旅人名為郡城蕩若平地雖則强幹弱枝亦匪中道宜令並置守捉軍士不過三五百人稍張禦備上嘉納之先是濮州有盜入城掠知州及監軍而去故禹稱有是請是嵗知泰州田錫亦上言江浙民飢死十八九乞免其賦役又言諸處城池多不浚築兵士多非精鋭甲兵少有堅利卒有盜起官吏何以固守九月置羣牧司尋以陳堯叟為制置使掌內外廏牧之事自騏驥院而下悉屬焉雷有終禽王均益州平有終既平賊誅殺不已轉運使馬亮所全活甚衆召還至京㑹械送為賊所詿誤者數十百人知樞密院事周瑩欲盡數誅之亮言愚民脅從者衆餘皆竄伏若不貸此反側之人聞風疑懼一唱再起是滅一均生一均也上悅悉宥之加亮史館復遣還部時諸州鹽井嵗久泉涸而官督所負課繫捕者州數百人亮盡釋之而廢其井又除屬部舊逋官物百餘萬冬十一月復轉對知兖州韓援上言近詔舉行轉對在外文武羣臣未預次對者各許上封奏事臣伏觀先帝自端拱以來益勵精為理臣嘗權鹽鐡判官得與本使上殿奏事一日先帝從容謂臣等曰大凡居職不可不勤朕每見殿庭兵卒剩掃一席地汲一瓶水必記其姓字夫如是則有以見先帝勤勞庶政片善無遺臣又聞治國在乎逺佞人杜讒口以陛下聰明神智必無驕逸之虞然願罔倦燭幽勿使小人乘間而進日慎一日雖休勿休居安念危在治防亂則天下幸甚疏奏召援歸闕授史館修撰張齊賢罷齊賢與李沆同相情好不協自負有致君之術每敷奏多不直置議者以為疏濶至是坐冬至朝㑹被酒失儀罷相守本官兵部尚書十二月畋近郊是嵗籍河北强壯河北河東强壯自五代時瀛霸諸州已有之至是以李繼遷數擾邊命籍之辛丑咸平四年春正月命官詳申外封事馮拯陳堯叟詔議轉運使賞罰從祕書丞查道之請也道乞令使回具任內曽薦才識者若干絀貪猥者若干朝廷議其否臧以為賞罰從之戊午雨自去冬旱上每御疏食憂閔切至是日方臨軒決事雨沾衣左右進蓋卻而不御詔舉賢良學士承㫖宋白舉直集賢院田錫錫尋召對言曰陛下治天下以何道方春秋鼎盛好古不倦若師皇王之道則十年必致太平乃抄四部為書曰御覽及采經史要言為御屏上之三月分川陜為四路命御史正名舉職先是三院御史多出外任風憲之職用他官兼領乃詔本司長吏自薦其屬俾正名而舉職乃以張㢲為監察御史從新制也越明年夏御史知雜田錫又言臺官共有二十一人皆差使在外請令三院御史各歸本職以呂䝉正向敏中同平章事國初至是三入相者惟趙普及䝉正焉行儀天厯史序等所編朱昻為序以楊億知制誥上初欲用梅詢及薛映梁鼎李沆素不喜詢言於上曰詢險薄不可用楊億素有盛名上驚喜曰幾忘此人召映鼎就試翌日與億並除億七嵗能屬文年十一太宗召至試詩授祕書省正字令就祕閣讀書億每為文揮翰如飛不加㸃竄門人傳録疲於應命賜潭州嶽麓書院書從知州李允則之請也夏四月楊嗣楊延朗加團練使時並為緣邊巡檢勇於戰鬭邊人謂之二楊延朗後改名延昭為髙陽副部署卒於祥符間智勇善戰俸賜悉以犒軍尅捷推功於下人樂為用在北邊二十餘年敵憚之目曰楊六郎罷郊恩遷官行磨勘京朝官法舊制每郊祀推恩百僚多獲序進諫官孫何等請罷之至是詔郊祀禮行慶止加勳階爵邑而命審官院考京朝官殿最引對遷秩京朝官磨勘始此回鶻來貢請助討李繼遷䇿制科得查道陳越王曙三人五月朱昻致仕時為翰林學士昻有清節淡於榮利初為洗馬十五年不遷不以屑意非公事不至兩府上嘉其素守故驟加褒進昻纍章告老上不得已從之遣使就第賜器幣謂大臣曰昻侍朕左右未嘗以私事干朕今其歸老可給全俸昻歸江陵詔本州嵗時省問如有章奏許附驛以聞又命其子正辭知公安縣以便就養舊制致仕官止謝殿門外於是上特延見命坐勞問久之令候秋涼上道復遣中使賜宴於玉津園兩制三館儒臣皆預仍詔賦詩餞行恩渥之盛近代無比昻自稱退叟而弟雍王府翊善協亦告老而歸時人比漢二疏云六月減冗吏諸路計省十九萬五千餘人秋八月䇿制科得丁遜孫僅何亮孫暨四人九月慶州地震者再李繼遷陷清逺軍楊瓊擁兵不救罪當死上赦之流瓊崖州置陜西保毅保捷軍詔陜西民家出一丁號保毅軍凡得六萬八千餘人其緣邊軍士先選中者並升為禁軍號保捷冬十月契丹入冦張斌等屢敗之斌敗之于長城口李繼宣尋又敗之於山谷初七月以契丹謀入冦命王顯為鎮定三路都部署冬顯奏大破契丹殺二萬餘人餘衆遁去授博囉齊官西涼六谷酋長也仍命出兵以助討李繼遷求遺書十一月畋近郊詔議棄守靈州右僕射張齊賢知制誥楊億力言棄之便輔臣多謂靈武必爭之地不可棄獨李沆與億意同奏曰若繼遷不死靈州非朝廷有也莫若遣使分軍民空壘而歸則關右之民息肩矣上始即位之二年棄鎮戎軍李繼和固請復城之即以繼和知軍事及張齊賢經略陜西因詢繼和邊事繼和上言以為鎮戎當賊來要口若防守得宜賊必不敢過此緣邊民戶不廢耕織熟戶老幼有所藏匿又極言靈州之不可棄閏月寬緣坐法靈州言河外寨主李瓊等以城降賊其親屬當緣坐上曰窮邊孤壘又無救助力屈就擒此可閔也並釋之遣使賑河北飢內出麻滓蓬實示宰臣曰民食此矣即命梁灝薛映分往東西兩路發廩及募富民出粟賑之時權管幹通進銀臺司掌門下封駁田錫上言霸莫等州人戶餓死雖有指揮下轉運司相度及減價賑糶即未見别行指揮若有司只如此行遣實未稱陛下憂勞之心也陛下為民父母使百姓餓死乃是陛下孤負百姓也宰相調燮隂陽啓導聖德而惠澤不下流王道未融明宜如禹湯罪已略降德音使民心知陛下憂恤然後振廪給貸以致其死若倉廪虛而饋運邊備尚未足即日無可給貸則是執政素不用心所致昔伊尹作相恥一夫不獲今餓殺人如此所謂焉用彼相錫在銀臺凡四方章疏有言民飢盜起及詔敕不便者悉條奏之上稱錫得爭臣之體是嵗吳淑請復車戰法時淑為祕閣校理壬寅咸平五年春正月以張齊賢為邠寧環慶等州經略使判邠州專為經略使始此經略判官曽致堯謂齊賢曰王超既為都部署公不得節度諸將無益也齊賢具以聞詔得自發諸州駐泊兵而已尋改命判永興軍兼馬步軍部署經略使田錫上言臣昨奏狀多言宰相不練邊事又進御覽曽引杜牧宰相不知兵說臣未委所差張齊賢果能不負任使否未幾靈州陷蠲陜西逋租以丁謂為夔州路轉運使初王均叛朝廷調施黔髙溪州蠻子弟以捍賊既而熟山川道路反入為冦攻州縣掠民男女入溪洞久不能定詔以謂為轉運委之經制謂至則命罷兵自入溪洞每渡水輒減從吏卒比至其巢穴自從者不過三二人蠻人聞已罷兵又自至其所居不以吏卒自衛服其恩信皆大喜其首領田彥伊以下遂出迎謁以牛酒勞謂留與之飲食歡甚諭以禍福且言有詔赦不殺彥伊等感泣願世奉貢不敢慢謂要與俱至夔州每渡水亦使之減所從蠻人如謂入時比及城其首領所自從亦不過三二人及館謂與之錦袍銀帶具服有差盛他燕之日夜縱樂蠻酋皆大悅比數日請歸不許而遇之益厚又數日請歸益數而留之益堅間使人謂之曰公所以留若屬者欲得所掠漢民男女而重自言若等誠能自請歸之公必喜厚賜若屬遣去矣蠻酋乃請歸所掠漢民男女謂與之約每歸一人與絹一匹于是凡得萬餘人還其家謂報之如約復遺之衣服繒綿甚衆與宴飲極歡及歸又自臨送之蠻酋皆感泣悔前反作誓刻石柱立境上謂度峽內至荆南宜備蠻險厄之地悉置寨籍居人使自守多少有差與之約有事則皆㑹禦賊無事則散歸田里留守望者數人而已於是無勞費而備足又以忠萬等州兵食不能自給乃置忠萬等州營於夔州使其軍就食有事則歸於其州峽之諸州施尤近蠻食常不足而道狹難饋有鹽井之利而亦以難致故售者少謂乃度施州至巫山縣每三十里置鋪置卒三十人使往者負粟以次達施州返者負鹽以次達巫山凡商人之得鹽巫山者比得之他所減勞費半乃令欲巫山鹽者皆入粟施州于是施州得粟與他州等矣詔特遷謂戶部員外郎賜白金三百兩時溪蠻别種有入冦者謂遣彥伊等帥其徒討擊且出兵援之凡擒生蠻六百六十得所掠漢口四百餘復上言黔南蠻族多善馬請置館犒給緡帛嵗收市之凡謂所經畫其後皆不能變二月禁有司以羡餘為課三月李繼遷陷靈州知州裴濟死之餉道孤絶救援不至故也王超等遂奏班師初何亮通判永興軍詔與轉運使陳偉往靈州經度屯田及還上安邊書曰臣竊謂今議邊事者不出三途請棄靈武一也輕議興師二也姑息而羈縻之二也而臣以為輕棄靈州則夷狄之患有未可量者三靈武地方千里表裏山河一旦捨之則戎狄之地廣且饒矣一患也自環慶至靈武凡千里故西域戎狄剖分為二如捨靈武則西域戎狄合而為一二患也冀之北土馬之所生自胸奴猖獗之後無匹馬南來咸取足乎西戎靈州既剖分為二其右乃西戎之東偏實為夏賊之境其左乃西戎之西偏秦涇熙渭之西北諸戎是也如捨靈武則合而為一夏賊桀黠服從諸戎俾不得貨馬于邊郡則未知中國戰馬從何來三患也輕議興師則有不利者四深入窮追夏賊度不能抵必奔遁絶漠王師食盡不能久留而退西戎復擾者一也冦至而不戰則邊郡被其害戰則緣邊之兵不足以當其衆者二也清逺西北曰旱海蓋靈武要害之路而白馬二將奔敗之地如二師薄伐無功而還則夏賊必據要害以絶河西糧道者三也河西路阻必將大興征討以通糧道疲民重困盜賊必多者四也若姑息而羈縻之則有不可者二戎狄豺狼貪婪無厭必將服從諸戎然後為中國大患者一也自白馬二將奔敗之後夏賊得志擇靈武山川之險而分據之意在吞噬譬如伏虎見便則動者二也在臣愚慮不出二䇿自清逺至靈武有溥樂耀德為河西之糧道而悉有古城之迹存焉請築此二城以通河西之糧道賊若悉衆來戰中吾上䇿也何者夏賊所以未滅者誠以深入窮追則奔遁絶漠師退則復來擾邊使其敢來與王師拒戰則其殄滅也必矣彼若知動無所利恭而聽命則中吾下䇿者也今雖存靈武使阻隔旱海居絶塞之外不築此二城為之唇齒與舍靈武無異今特城此二城則賊不敢動矣議者將曰國家贍靈武猶曰困匱而更供給二城費必大臣以為不然靈武至清逺不滿三百里而穀價殊絶者以度旱海無舍宿之地有戎冦之憂故也如建此二城則軍民之趨靈武也有舍宿之地少戎冦之憂輸糴日益穀寧無賤乎以減殺之價供二城之費又何疑焉外此則復有一說烏白鹽池夏賊洎諸戎視之猶司命也如夏賊來冦則令延慶之師入其境先據烏白之池而號令諸戎曰有得夏賊首者分封其地而以烏白與之則諸戎願禽之者衆矣親試舉人得進士王曽以下三十八人九經諸科百八十人先是貢舉人集闕下萬四千五百餘人陳恕知貢舉所取士甚少諸州舉逸官被黜責甚衆夏四月罷築綏州初邊臣有請城綏州大屯兵積穀以遏党項者朝臣互執利害上命洪湛等按還言甚便乃詔孫全照往經度之全照言作之非便復命知天雄軍錢若水按視若水往即罷其役初若水率衆渡河分布軍伍咸有節制上聞之曰若水儒人曉武事深可嘉也命北邊經度方田以限敵騎復雄州𣙜場從知州何承矩之請也五月選河南民丁為兵西北邊屢請益兵輔臣請以河北强壯選充上曰初置强壯嘗諭以永不充軍呂䝉正曰闕兵非取于民不可得也乃於河南籍丁壯為之侍御史知雜事田錫上言㸃集鄉兵人情不安實傷和氣置陜西振武軍選保毅軍二萬人升為禁軍各置營本州號振武六月李繼遷圍麟州守臣衛居實敗之京城大水秋七月甲午朔日有食之以錢若水為并代經略使判并州上新用儒臣為將未欲使兼都部署之名而其任實同也幸三館祕閣募河北丁壯九月授种放官先是詔放赴闕既召對光寵優渥近世所未有尋命為右司諫直昭文館尋復請還山及卒上親製文祭之有譏放循默者上曰放為朕言事甚衆但外廷不知耳因出所上時議十三篇冬十月立同録問大辟法初令諸州長吏與佐職官同録大辟罪人向敏中罷張齊賢貶敏中罷授户部侍郎齊賢授太常卿分司西京齊賢坐為薛安上所訴詞連敏中初薛惟吉婦柴氏無子盡蓄其産欲改適齊賢惟吉有子曰安上訴其事柴因訟敏中貿惟吉故第又嘗求娶已不許以是教安上誣告母且隂庇之上問敏中敏中言實買安上居第近喪妻不復議姻未嘗求娶於柴也柴訟益急遂下獄按鞫乃齊賢子教柴氏為辭鹽鐵使王嗣忠忌敏中言敏中議娶王承衍女弟密約已定上因面責敏中以不直而罷之先是翰林學士宋白嘗就敏中假銀不與白草制極力詆之有云對朕食言為臣自昧之語敏中讀之流涕齊賢不事儀矩頗好治生再入相數起大獄又與冦凖相傾人以此少之時田錫上疏言伏覩內殿起居近罷轉對封章迭送今已逾年上書應詔並無旌酬失儀被彈即有責罰又聞密院中書政出吏胥行遣只索檢舊例施行樞相商議别無逺謀戎夷深入則請大駕親征將帥無功則取聖慈裁斷備位則不失享富貴罷免則不過歸班行臣下優逸而君上常焦勞實為倒置也隂陽不順水旱不調法令滋章盜賊多起尚率京城父老與百辟千官五度上章請加尊號賴聖君英睿以為天不可欺御劄丁寧示志不可奪必斷來表深愜羣情由是見宰相以甘言佞上求聖知以國計軍機非己任若加以水旱之災乘以戎狄之患不知在廟堂者用何智略總軍兵者作何籌謀按復令羣臣轉對在三年十一月此云已踰年或罷字誤也景德三年又令羣臣轉對豈咸平四年嘗罷轉對史失之歟十一月壬寅郊詔非禋祀所須並可減省於是省應奉雜物十萬有竒十二月以呂䝉正李沆兼門下侍郎舊制三師三公左右僕射平章事並兼兩省侍郎先是翰林學士宋白梁周翰草二相加恩制書遺忘舊制既而上問白等不能對第請改正不復降制止帖麻用印重寫告身白等各罰一月俸癸卯咸平六年春二月遣使賑京東淮南饑水災故田錫尋上疏言國家為少闕軍兵防邊備戍遂於曹單宋亳陳汝蔡潁㸃集鄉村揀選强壯得五七萬人訪聞始降宣命指揮只令在本城防守尋即押赴京師何失旨若此又言決沴之餘盜賊若起適足為戎狄之利有勞宵旰之憂檢災傷乃是虛名行賑貸且非實事授博囉齊朔方節度博囉齊言已集六萬騎㑹王師復靈州故以節鉞授之夏四月置河東神鋭神虎軍去嵗以義軍分𨽻州兵之籍至是料簡得萬三千餘人號神鋭神虎常訓習焉王繼忠戰沒繼忠時為副都部署與都部署王超逆戰繼忠常以契遇深厚思欲報效率麾下殊死戰于望都縣南遂陷於敵上以為實戰死贈繼忠官録用其子餘死事次第追贈厚恤其家是役也李福王升臨陳先遁削籍流配以張詠知益州民聞詠再至皆鼓舞相慶詠前後在益愛利之政不可悉紀舉其大者則以蜀地素狹遊手者衆事寧之後生齒日繁稍遇水旱則民必艱食米升直錢三十六乃按諸邑田稅如其價嵗折米六萬斛至春籍城中細民計口給劵俾輸元價糴之奏為永制五月罷雄州𣙜場六月出陳圖示輔臣自望都失利上日訪禦戎之䇿因命兩府㑹議李沆等或請合鎮定州高陽三路兵據要衝或請令三路分兵捍禦上總裁為陳圖示輔臣曰三路大兵悉㑹定州冦來堅守勿逐俟信宿冦疲則挑戰又量分兵屯威虜及保州北平三處使其腹背受敵又量分兵屯寧邊軍及邢州扼東西路上又曰魏能性剛張鋭善忍故使鋭佐能孫全照好陵人取其嘗所薦者同事餘皆類此謝德權自河北來言邊兵聚一處非便願分戍鎮定高陽三路上曰此大事非爾所知併三司置一使命冦準領之三司使不相總統各求允濟以促辦為務至於出納移用均㑹有無則動相違戾或交托利病以邀功希進至是併為一使復置三司鹽鐵度支戶部副使併三司勾院為一上嘗命三司具中外錢穀大數鹽鐡使陳恕久而不進上命輔臣詰之恕曰天子富於春秋若知府庫充羡恐生侈心上聞而善之秋九月呂䝉正罷為太子太師䝉正暴中風眩上即命駕臨問䝉正力求罷不許至是表凡七上乃得請募近京强壯補禁衛詔殿前高瓊閲習陳勢召近臣觀之上覩行伍整肅甚喜顧瓊曰昨日村民皆為鋭旅矣擢材武特異者三十人悉補小校唯二人𨽻御龍直優賜緡錢左右有言此二人才藝特優上曰是新强壯若𨽻禁衛驟統舊卒固亦非便瓊曰陛下發言舉事動有逺慮非臣等所及也冬十月開沿邊方田靜戎軍王能奏於城東開方田廣袤相去五尺深七尺以限戎馬詔鎮戎順安威虜軍界並為之先是陜西轉運劉綜亦嘗請於鎮戎軍城四面置屯田務開田五百頃置下軍二千人牛八百頭以耕種之分屯田四塞無冦則耕冦來則戰十一月有星孛于井鬼十二月求直言田錫卒錫將死取奏疏悉焚之曰吾豈可藏副示後謗時賣直邪上見錫色必莊嘗目之曰此吾之汲黯也錫動必以禮言必有法賢不肖咸憚伏之出處二十年未嘗趨權貴之門在貶廢中樂得其正晏如也上覽其遺表惻然曰田錫直臣也天何奪之速乎先是四年六月錫自泰州歸闕奏曰舊有御覽惟分門記事請别鈔略四部為三百六十卷萬幾之暇日覽一卷又采經史之言為御屏風十卷於是先上御覽十卷御屏風五卷手詔褒答之李繼遷陷西涼府博囉齊攻殺之守臣丁惟清死焉博囉齊要而擊之繼遷中流矢死於靈州之境子德明襲位杜請謁夀春縣主言夫兄侯紹卿掌芻積被劾望釋其罪上曰損壞官物自有常刑不可免也駙馬石保吉嘗訴僕夫侵盜願錫重責上曰所司自有常典豈可為卿故法外加刑魯國長公主以趙自化藥餌有功請授尚食使兼醫官院事上曰自化頃因元份以求刺郡尋諭以方技之流不可任郡今復有此請命樞密院召戒之元份雍王也秦國長公主嘗為其子請近郡刺史上曰牧守之任係朝廷公論不許九朝編年備要卷六
