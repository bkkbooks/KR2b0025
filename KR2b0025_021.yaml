body:
  text: 九朝編年備要卷二十一宋陳均撰神宗皇帝起辛酉元豐四年止乙丑元豐八年辛酉元豐四年春正月命林廣經制瀘夷代韓存寶明年春廣敗乞弟於納江乞弟遁去廣軍數萬進寨追賊越七日至白崖又五日次老大人山山形皆刀劔立又一日上老大人山又二日次黑崖明日過鴉飛不到山又二日乃至歸徠州大小茅屋百餘間自發納江即入叢箐無日不雨雪兵夫凍墮指者十二三疾病死亡不可勝數往往取僵尸臠割食之留歸徠州四日求乞弟不獲先有詔不得賊而輒班師者斬廣軍皆懼走馬承受麥文昞乃白廣曰行日上付密詔戒不得啓封候窮迫日始開今既進退不可遂相與開緘視之其詔云大兵深入討賊期在梟獲元惡如已搗其巢穴雖未得乞弟亦聽班師軍中皆呼萬嵗曰天子居九重明見萬里外乃以師還令進士加試律夏四月親閲保甲保甲當教時月給錢三千日給食官與戎械戰袍又具賞賜先教大保長藝成乃立團教以大保長為教頭教保成為一都保分為五團即本團都副保正所居空地聚教之府界法成乃推之三路至是引呈府界藝成者十月河北澶州保甲見於崇政殿召執政賜坐閲試官其優者三十六人餘賜金帛有差時府界及三路保丁凡六十九萬有竒按兵志熙寧九年繫籍義勇保甲及民兵合七百一十八萬有竒詔罷合祭親祠北郊初張璪議親祠北郊上已從之既而又令禮官講求於是判太常寺陳薦言議者以天地合祭始於王莽故欲罷之臣按周頌昊天有成命郊祀天也漢郊祀歌曰惟泰元尊媪神蕃釐泰天也媪神地也又曰涓選休成天地並况此天地同祀可以槩見恐非自王莽始也議者又謂圜丘之祀盛夏不躬行宜選冢宰攝祀亦恐未必合古然終不若天地合祭也乞且循舊例知禮院曽肇言今冬至若罷合祭而夏至又使有司攝事則於父母天地之義若有隆殺願陛下遇親祠南郊之嵗以夏至日躬欵北郊以合先王之制遂詔罷南郊合祭親祠北郊並依南郊儀如不親祀上公攝事河決澶州復北流決小吳掃初河雖復東流然水行地上上下視州縣至是大決轉而北流既而提舉官燕達言小吳故道斷新流難塞詔達還上曰陵谷更變雖神禹復出亦不能強蓋水之就下者性也今以州縣為礙致遏水勢不由其性此乃治水之事非治水之道也若以道觀之則水未嘗為患但州縣為水之患耳又曰以天下觀之黃河一帶也以河北觀之則為害極大順其所向徙城邑以避之復有何患雖神禹復生不過如此史臣曰熙寧間專欲導東流閉北流元豐以後而議者乃始欲復禹故道上愛惜民力思順水性而水官難其人多崇虛語過有勞費王安石力主程昉范子淵故二人尤以河事自任上雖藉其才然每抑之六月命內侍李憲經制熙河發殿前虎翼四指揮令憲將之以行又以王中正同簽書涇原經略總管追封程嬰杵臼嬰成信侯杵臼忠智侯初承議郎吳處厚言二人保全趙孤請訪其墓特加封爵至是訪得二墳在絳州故封之河北蝗詔捕之秋七月命李憲等分道伐夏國初環慶經略使俞充知上有用兵意屢請西伐又言諜報云夏國母及梁相公者勸秉常不行漢禮秉常不從因囚之且秉常事大國有何可罪乃被幽囚此正興師問罪之時今若一舉而復漢唐兩河之地其費不過五年嵗賜秉常之數蔡確之排吳充也充既罷相確指王圭為充黨欲併逐之圭畏確引為執政圭獨相久上厭之不悟確一日乘間謂圭曰上厭公矣圭曰為之奈何確曰上久欲收復靈武患無任責者公能任責則相位可保也圭喜謝之適江東運判何琬有違法事上語圭欲遣官治獄圭以上意告檢正俞充以書告琬琬上章自明上語圭漏言圭退朝甚憂召充問之充對以實圭曰圭與君俱得罪矣然有一䇿當除君帥環慶亟上取靈武之章上喜可免罪乃除充環慶帥充至環慶議取靈武書奏而充暴卒乃詔以髙遵裕代之鄜延總管种諤亦乞興師且言夏國無人秉常孺子臣往提其臂而來耳上壯之乃決意西伐方議出師知樞密院孫固曰舉兵易解禍難前後論之甚切上意益堅固曰然則孰為陛下任此者上曰李憲固曰伐國大事而使宦官為之誰肯為用上不悅固請去不許他日又對以未有大帥為言上諭以無其人副使吕公著曰既無人不若且已固曰公著言是也竟命髙遵裕出環慶劉昌祚出涇原李憲出熙河种諤出鄜延王中正出河東分道並進憲尋克蘭州奏至上詔憲曰官軍未出境之際內外莫不以夏羌鋒鋭為憂今道逢堅屯而能一鼓蕩散自非將帥有略何以臻此憲以蘭州古金城地是為河湟要害請城之仍建為帥府詔棟戬會伐夏國棟戬集六部族兵十三萬分三路與大兵會明年封為威武郡王賞其功也立吏部四選法分左右曹判吏部蘇頌請以武選歸吏部也八月罷中書堂選悉歸有司韓存寶伏誅斬於瀘州坐討乞弟失律也朝廷懲安南無功時方大舉伐夏故誅存寶以令諸將九月續會要成初仁宗時自建隆修至慶厯四年凡百五十卷熙寧初王圭請續之凡十二年乃成止熙寧十年通舊增益成三百卷冬十二月癸未朔日有食之太史言日當食驗之不食罷樞密使副上以樞密輔弼非出使之官乃詔置知院同知院餘悉罷詔李憲等班師初髙遵裕以慶州蕃漢步騎八萬七千人民夫九萬五千人种諤以鄜延兵五萬四千人畿內七將兵三萬七千人分為七軍方陳而進自綏德城出塞諤攻圍米脂寨遂乞不受王中正節度上以其有米脂之功詔從之諤入石夏銀三州遵裕復清逺軍入環韋二州中正入宥州劉昌祚軍大敗夏人於默音隘乘勝至靈州城下奪門將入遵裕馳使止之遵裕繼至與諸軍合攻城凡十八日不下諤之師死者十二三又多潰而歸中正及他將之師亦以道逺乏糧多至逃死遂班師上諭孫固曰若用卿言必不至此又兵民疲弊如此惟吕公著為朕言之遵裕言涇原兵出塞者五萬一千有竒歸者萬三千人髙遵裕郢州安置种諤王中正劉昌祚並降官而李憲獨免始議五路進討會於靈州憲輒不赴乃欲以開蘭會邀功弭責樞密孫固曰兵法會期而後至者斬諸路皆赴而憲獨不行雖得蘭會罪不可赦言雖不用士論與之十二月置扺當所提舉市易賈青請在京置四扺當所委官任其事其後又行之畿縣及諸路焉壬戌元豐五年春正月以李憲為涇原路制置等使兼經略安撫知蘭州李浩副之种諤知渭州浩諤於制置司并用階級法三月停劉誼官誼為江西提舉上疏論青苗免役仍申市易之弊及役法十害興賣鹽之患疏略曰陛下立新法本以為民為民有倍稱之息故與之貸錢為民有破産之患故與之免役為民有聯屬之任故教保伍為民有積貨之不售故設市易洵良法也行之數年法弊而民病色色有之請試言其甚者夫庸錢既厚則取民不得不多兩折之民富溢其等者為無比户多者七八百千其次五百千竊以舊法言之役之重者為鄉户衙前其次鹽稱子其次酒務使為上户者十年而一役費錢百萬則是年百千矣今上户富者出八百千則是七倍昔日以一户計之十年之出已八百萬矣如此則民家之錢安得不空天下財産安得不蹙哉臣向嘗過淮南淮南之民科黃河夫夫錢十千上户有及六十夫者湖南買弩椿官估二十百姓為費二千户有及二十條者江西買軍須衲襖官估八百實費三千其他翎毛羽箭無慮數倍甚可痛也又臣近巡歷洪筠據百姓訴州縣抑勒置鋪賣鹽竊詳蹇周輔元正鹽法以救淡食之民令民間積鹽不售以致怨嗟賣既不售月錢欠負追呼刑責將滿江西上批劉誼既有所見自合公心陳露輒敢張皇上書惟舉一二偏僻不齊之事意欲槩壞大法宜加黜責以警在位親試舉人賜黃裳以下千四百餘人及第出身有差雨土夏四月壬子朔日有食之陰雲不見官制成改平章事為左右僕射以王圭蔡確為之仍兼門下中書侍郎改參知政事為門下中書侍郎以章惇張璪為之置左右丞以蒲宗孟王安禮為之詔以五月朔行官制始命百官以三省統領百職事無大小並中書取旨門下覆奏尚書施行三省之制中書省掌進擬庶務宣奉命令中外無法式應取旨者凡命令之體有七曰册書立后妃封親王皇子大長公主拜三師三公三省長官則用之曰制書處分軍國大事頒赦宥德音命尚書左右僕射開府儀同三司節度使凡告庭除授則用之曰誥命應遷改職秩合命詞則用之曰詔書賜待制大卿監中大夫觀察使以上則用之曰敕書賜少卿監中散大夫防禦使以下則用之曰御札布告大號令則用之曰敕榜賜酺及戒勵百官曉諭軍民則用之大事奏稟得旨留所得旨為底别以黃紙書中書令宣侍郎給舍人行訖歸録送門下為畫黃小事受批降若覆請及入熟狀擬進得旨者亦别以黃紙書宣奉行訖録送門下為録黃樞密院掌軍國機務大事則稟奏其付授者用宣小事則擬進其付授者用劄先具所得旨開門下省審覆面得旨為録白批奏得畫者為書旨門下省掌受天下之成事審命令駁正違失凡受中書省畫黃録黃樞密院録白畫旨留為底及尚書六曹所上有法式事皆奏覆審駁之給事中讀侍郎省侍中審進入被旨畫聞則授之尚書省樞密院即有舛誤應舉駁者大則論列小則改正凡吏部擬六品以下職事官則給事中校其仕歷功狀侍郎侍中引驗審察非其人則論奏省覆刑部大理寺所斷獄不當罪則以法駁正之尚書省掌施行制命曰吏部曰户部曰禮部曰兵部曰刑部曰工部皆𨽻焉凡天下之務六曹所不能與奪者總而決之應取裁者隨所𨽻送中書省樞密院事有成法則六曹凖式具鈔令僕射丞檢察簽送門下省畫聞官制始行建尚書為三省各以其省長官為宰相而左僕射兼門下侍郎以秩髙不除故以尚書令之二左右僕射為宰相而左僕射兼門下侍郎以行尚書之職右僕射兼中書侍郎以行中書令之職而别置侍郎以佐之三省分班奏事獨中書取旨門下尚書不與元祐初始同取旨尋詔門下有差除更改事更不關報御史臺諌院又詔祕書殿中內侍入內內侍省不𨽻臺察其尚書六曹分𨽻六察八年十月以劉摯言差除更改事依舊於當日關諌官御史官制成以內舍為門下中書外省元祐初改為後省元祐元年定郎官為三十五員以主客兼膳部職方兼庫部都官兼司門屯田兼虞部又立磨勘之法待制太中以上止通議大夫餘官止中散大夫四年詔以御史知雜事為侍御史言事為殿中侍御史六察官為監察御史曽鞏為中書舍人鞏嘗敘戰國䇿説苑諸子及梁陳書識者以為可比劉向初與王安石善安石稱其文章近世無有如水之江漢星之斗上嘗問安石何如人鞏對曰安石文章行義甚似揚雄以吝故不及上曰安石輕富貴何吝耶曰臣所謂吝者謂其勇於有為而吝於改過吕公著謂鞏為人不及議論議論不及文章録唐段秀實後五月命內侍李舜舉同徐禧如鄜延議邉事先是李憲欲塞前罪乃上再舉之䇿時朝廷已知陜西民困更不調夫憲乃牒都轉運司調發以和雇為名人給錢二百且云受密詔若違令斬都轉運以下民間騷然相聚立柵於山澤不受調知通親諭之不聽巡尉逼之則執梃欲鬬州縣無如之何士卒前出塞死於凍餒者十五六存者皆憚行西京留守文彥博上言師不可再舉樞密吕公著亦上言不可秦鳯運判范純粹奏師出有期而帑藏匱乏芻糧未備今竭關隴之力圖此一舉而事理如是無可濟之理關中必亂上始信之而慰勞公著知延州沈括請盡城橫山且云寨北烏延城正據山界東望夏州八十里西望宥州四十里下瞰平夏最當要衝乞移宥州於此使虜不得絶磧為冦乃詔罷涇原之役命鄜延修六寨以包橫山之地遣舜舉同給事中徐禧往鄜延計議舜舉退詣執政王圭迎以好語曰朝廷以遣邉事屬押班及李留後無西顧之憂矣舜舉曰四郊多壘此卿大夫之辱也相公當國而以邉事屬內臣可乎內臣止宜供禁庭灑掃之職爾豈可當將帥之任耶聞者代圭發慙夏人冦邉鄜延王英死之六月召李憲赴闕罷西師再舉之議詔三省各舉職詔自今事無大小中書取旨門下覆奏尚書省奉行秋七月河決大吳掃堤時河溢北京內黃掃決之以紓靈平下掃危急也八月河決原武命塞之至仲冬畢工九月夏人陷永樂城先是朝廷從徐禧之議命禧及李舜舉沈括發延州蕃漢軍八萬役夫荷糧者倍之即永樂小川築新城距故銀州二十五里城成賜名銀州寨夏人聞城永樂舉兵來爭禧及舜舉亦自米脂引兵趨銀州禦之賊二十萬衆攻城髙永能曰羌性如獸不意而輒加笞叱則氣折不能害人若遲疑不斷縱其陸梁將無所不至今先來皆精兵急與戰破之則駭散後雖有重兵亦不敢進此常勢也塵埃漲天必數十萬之衆使俱集則衆寡不敵大事去矣禧岸然捋其鬚謂永能曰爾何知王師不鼓不成列永能退拊膺謂人曰吾不知死所矣鄜延副總管曲珍出戰敗績將官冦偉死之永樂城依山無水戰士渴死者大半至絞馬糞而飲之惟禧舜舉有水兩壺一日忽有於城下呼曰漢人何不降聞無水已三日矣禧以壺水揚於外以示之曰無水此何物也虜笑曰止於此矣夜半城遂陷禧舜舉及陜西運判李稷皆死之曲珍及王湛李浦逃歸蕃漢官二百三十人兵萬二千三百皆沒舜舉將死裂衣襟奏云臣死無所恨願朝廷勿輕此賊禧不知所終或云禧實不死有自虜還者嘗見之奏至上覽之慟哭左右莫敢仰視既而嘆曰永樂之事無一人言不可者右丞蒲宗孟曰臣嘗言之上曰何嘗有言在內惟吕公著耳知延州劉昌祚言永樂之敗一日失馬七千匹不知平時費幾何而致是寧不惜哉或言緣是役而死者六十餘萬人云安化蠻冦邉宜州守臣王奇將費萬死之時蠻以嵗飢掠省地廣西轉運馬默上平蠻方略以為勝負不在兵而在將富良宵遁郭逵怯懦雍城陷沒蘇緘老謬歸仁鋪覆軍陳宗儀先走崑崙關喪師張守節不戰儂智髙破亡因狄青之知勇歐希範誅滅乃杜杞之方略此足以驗矣今安化州蠻作過而宜融土丁萬人素號得力其中必有二三千可以重賞使之上謂宰執曰默意欲用兵未可從也乃詔知沅州謝麟帶御器械和斌經制溪洞發在京驍騎及江南福建兵以聽師期明年諸蠻降冬十一月景靈宫成告遷祖宗神御紹聖三年四月詔自今景靈宫朝獻分兩日大赦官繪象景靈宫臣僚子若孫一人癸亥元豐六年春正月朔御大慶殿用劉幾新樂初上以朝儀物敝當改製詔閣門御史臺詳定朝會儀更造仗衛輿輅冠服至是始陳於殿夜半儀鑾司撤覆輅幕屋屋壞毁新玊輅上不懌久之上自即位於禮樂之事未遑制作間從言省緒正一二知禮院楊傑條上舊樂之失大臣言祕書監致仕劉几知樂者乃詔几赴京議樂判太常寺王丞又乞召禮部侍郎范鎮參議既而几等言太常鐘磬凡三等王朴樂一也李照樂二也胡瑗阮逸樂三也王朴樂太祖嘗言其聲太髙雖李照胡瑗再定比王朴樂微下及鑄大鐘或譏其聲弇鬱亦不用郊廟依舊用朴樂今請遵祖訓下朴樂二律用仁宗所製編鐘追考成周分樂之序辨正二舞容節及范鎮召對為上言定樂當先正律鎮作律尺籥合升豆區釜斛欲圖上之又乞訪求一稃二米真黍以定黃鐘而几即用李照樂加四清聲而奏樂成時去冬十二月也鎮曰此劉几樂也臣何與焉初傑欲銷朴舊鐘意新樂成雖不善更無舊鐘可校乃詔許借朴鐘為清聲不得銷毁後輔臣至太常按試前一夕傑乃陳朴鐘已敝者一縣樂工不平夜易之而傑不知明日輔臣至傑厲聲云朴鐘甚不諧美使樂工叩之韻更佳傑大沮修前代陵廟夏人冦邉將官楊定死之虜衆數十萬奄至知蘭州李浩閉城拒守鈐轄王文郁請擊之浩曰城中騎兵不滿數百安可戰文郁曰賊衆我寡正當折其鋒以安衆心然後可守此張遼所以全合淝也乃募召死士百餘夜縋而下持短刃突之賊衆驚潰時以文郁方尉遲敬德既而降詔擢文郁知州事尋又入寇麟府將郭忠紹敗之冦麟州知州訾虎敗之夏四月雨土五月兩朝寶訓成先是王圭言天聖中真宗正史成别録三朝寶訓今當修兩朝寶訓乃詔林希修至是進旌孝子支漸漸資陽人也年七十持母喪既葬廬墓側三時號泣負土培墳哀毁瘠甚白蛇狸兔擾其旁白雀白鶴白烏日集於壠木五色雀至萬餘回翔悲鳴若助哀者其鄉勾氏子自娶妻即棄其親不養觀漸行因為感動迎其親還舍同時又有簡州鄧宗古汝州沈宣皆以孝行蒙褒賜束帛自熙寧以來迄靖康以孝義著於傳者自朱夀昌至張晉卿妻丁氏凡十四閏六月富弼薨遺表大略言忠詞杜絶諂諛日聞去嵗大舉西伐無有諌者又言輔弼之任議論之臣皆當極天下之選彼貪寵患失柔從順媚之徒豈可利而使之又言天下之大非知力可周惟誠意可通也則山海遐僻莫不感動而况朝廷之上乎今上下情意否塞不通百姓愁怨失其所者無由上達願推本忠厚之教以至誠通達天下又言宫闈之臣不可專委兵柄統制方面盡挾權怙寵陵鑠上下人心不服易以敗事又言興利之臣為國斂怨又言西事大為可憂若再犯邉則關陜震蕩願陛下速下明詔許其改心效順又言前舉秦晉之民肝腦塗地哭聲相聞窮而無歸恐生他變願擇循良之吏賑貸存恤若夫要道則在陛下聖化之所存與所用之人君子小人之辨耳望陛下詳覽臣奏特留聖意弼早有公輔之望名聞外域遼使每至必問其出處安否臨事周悉不萬全不發當其敢言奮不顧身忠義之性老而彌篤家居一紀斯須未嘗忘朝廷訃聞輟視朝兩日發哀其後贈太尉諡文忠哲宗篆其碑首曰顯忠尚德之碑元祐初配享神宗廟廷秋七月祔孝惠孝章淑德章懷四后於太廟孝惠皇后賀氏孝章皇后宋氏太祖之元妃及繼后也淑德皇后尹氏太宗之元妃章懷皇后潘氏真宗之元妃也初議不更發册大常博士王古言徽號之與升祔禮均也發册雖不為祔廟之節文而升祔之重乃由發册而後顯今既行升祔則册禮不可廢乃詔升祔比太廟親祠用升册焉祔太祖太宗真宗室以安燾同知樞密院西邉用兵日久上益厭之乃不次用燾燾力辭上曰西鄙未寧今日重事正欲賴卿謀謨耳時夏人欵塞燾言宜遂撫納且戒邉臣毋開兵端既又請還疆土燾言此所得有非要害處固宜豫以示恩然羌情無厭今則未可當使知吾宥過而罷不可使知吾厭兵之意先是燾嘗上諸司敕式上諭燾曰設於此而逆彼之至曰格設於此而使彼之效曰式禁其未然之謂令治其已然之謂敕修書者要當如此有典有則貽厥子孫今之格式令敕即典則也若其書備具政府總之有司守之斯無事矣八月蒲宗孟罷時為尚書左丞坐違法繕治府罷知汝州先是宰執同對上有無人付之歎宗孟對曰人才半為司馬光以邪説壞之上不語視宗孟久之宗孟懼無以自容上復曰蒲宗孟乃不取司馬光耶若光者未論别事祇辭樞密使自朕即位惟見此一人他人則雖迫之不肯去矣又泛論古今人物宗孟盛稱揚雄之賢上作色曰揚雄著劇秦美新豈佳士也王安禮嘗戲宗孟曰揚雄為公坐罪九月癸卯朔日有食之冬十月夏人納欵仍乞還侵地撤邉戍為分藩乃賜秉常詔略曰藩服不恭削地示過咨於故實匪朕所私其地界已令鄜延經略司指揮保安軍牒宥州施行候疆界了日歲賜依舊限度牒額嵗以一萬為額每道為錢百三十千孟軻封鄒國公明年詔以軻配食文宣王封荀况揚雄韓愈為伯並從祀十一月丙午郊罷合祭幸新尚書省去年詔建尚書省至是成車駕臨幸官僕射丞家一人進尚書以下官一等文彥博致仕時判河南府彥博之在河南也與富弼等用白居易故事就弼第致酒相樂尚齒不尚官洛陽多名園古剎諸老鬚眉皓白衣冠甚偉都人常隨觀之已而圖形妙覺僧舍謂之洛陽耆英會司馬光年未六十以狄兼謨故事與焉十二月夏人冦邉初經制李憲以夏人數至蘭州河外而翺翔不進意必大舉乃增城守之備按古步法以計戍卒復募遊兵隨方應禦至是果大舉入寇步騎號八十萬圍蘭州意在必取督衆急攻矢如雨雹雲梯革洞百道並進凡十晝夜不克糧盡引去城外得賊尸五萬是嵗髙麗王徽卒上憫焉遣臣祭弔前此未之有也徽在位三十八年治尚仁恕為東夷良主徽子順王勳嗣百日卒弟宣王運嗣運仁賢好文內行修飭每賈客市書至則潔服焚香對之其國東西二千里南北千五百里王居開州蜀莫郡號曰開成依大山置宫室立城壁名其山曰神嵩民居皆茅茨覆以瓦者才十二以新羅為東州樂浪府號東京百濟為金州金馬郡號南京平壤為鎮州號西京西京最盛凡三京四府八牧郡百有十八縣鎮三百九十洲島三千郡邑之小者或祇百家西北接契丹恃鴨緑江以為固江廣三百步其東海水清徹下視十丈可鑒凡海至髙麗即清入登州經千里長沙即濁東南望明州數日水皆絶碧至洋中則黑海人謂此無底之谷也官有中書省樞密院平章參知政事中樞密使翰林學士知制誥大抵倣中朝國子監有四門學士學者至六千餘人三嵗一貢舉百官以米為俸兵出於民番衛王府國人崇儒尚釋仁柔而惡殺其刑無慘酷惟殺人者死傷人及盜抵罪皆近古也甲子元豐七年春二月宗暉封嗣濮王嗣濮王自宗暉始夏四月夏人冦邉延州將官吕真敗之六月冦德順軍巡檢王友死之九月寇定西城將秦貴敗之十月冦靜邉寨鈐轄彭孫敗之又冦涇原又冦熙州十一月寇靜邉寨隊將白玉李貴死之秋七月伊洛溢河決元城浸北京遣使賑恤賜溺死者家錢冬十一月夏人來貢表略云歷世以來貢奉朝廷無所虧怠至於近嵗尤甚歡和不意憸人誣間朝廷遂起大兵侵奪土地今乞陛下將還疆土通遐域之貢輸用息干戈庶生民之康泰上令録本付李憲十二月資治通鑑成授司馬光資政殿學士仍降詔奬諭上諭輔臣曰前代未有此書過荀悅漢紀逺矣初官制之將行也上於禁中自為圖帖定未出先詔輔臣曰官制將行欲取新舊人兩用之又曰御史大夫非司馬光不可蔡確進曰國事方定願少遲之王圭亦助確乃已及除光第四任提舉崇福宫詔滿三十箇月即不候替人發來赴闕蓋將復用光也是嵗秋熱上感疾始有建儲意又謂輔臣曰來春建儲以司馬光吕公著為師保蔡確知光必大用乃謂邢恕曰上以君實為資政殿學士異禮也君實好辭官晚進不敢通書和叔門下士宜以書言不可辭之故恕但與光子康書致確語康以白光光笑而不答亦再辭而後受之更茶鹽法五年𣙜淮西鹽是嵗七月河北路始併大名府澶恩等十州鹽皆官𣙜九月通廣鹽於郴全道三州亦從蹇周輔之請也額利增加一方騷然十月𣙜建劔州茶二州茶自熙寧三年後許通商至是復𣙜明年二月惟在京府界及陜西路許通茶商餘路並行𣙜法從福建路轉運使王子竒之請也乙丑元豐八年三月哲宗皇帝即位遼大安元年春正月上不豫大赦三月朔立皇子傭為皇太子賜名煦大赦上既不豫宰執入問疾至朝堂議建儲蔡確章惇欲鉤致王圭語知開封蔡京陰戒人執刀將斬圭圭曰上自有子何謀之有入對圭言去冬奉聖旨皇子延安郡王來春出閣願早建東宫頃已奏上首肯圭言書皇太子名進上頷之圭等籌又奏請皇太后權同聽政上首肯太后辭避圭等請至再三太后泣許又曰去嵗皇子侍宴君臣皆嘗見之乞再瞻覩太后垂簾於福寧殿上皇子立簷外太后泣謂圭曰皇子精敏好學不好弄已讀論語七卷自皇帝服藥手寫佛經祈福因出示圭等所書字極端正圭等拜賀是日立為皇太子初岐王皓嘉王頵日詣寢殿問起居至是太后諭王非宣詔不得入初蔡確遣邢恕要太后姪髙公繪等辭圭明日又遣人招會東府確曰宜往見邢舍人恕且恕家有桃著白花可愈人王疾其説出遺藏經幸留一觀及入中庭紅桃花也驚曰白花安在恕執公繪手曰右相令布腹心上疾未捐延安沖幼宜早定議岐嘉皆賢王也公繪答曰公欲禍吾家竟去已而恕方謂后與圭為表裏欲舍延安而立其子皓頵已及惇確持之得無變且稍播其説於士大夫間矣上崩於福寧殿夀三十八在位十九年諡曰英文烈武聖孝廟號神宗上在東宫素聞王安石有重名熙寧初擢輔政虛己以聽之安石更定法令中外爭言不便上亦疑之安石堅持之不肯變其後天下終以為不便上亦不專信安石不自得求引去後八年不復召勵精求治如恐不及總攬萬務小大必親或日昃不暇食至南宫遣人迎之侍臣有以為言者上曰朕享天下之奉非喜勞惡逸誠欲以此勤報之也憤北土倔強慨然有恢復幽燕之志聚金帛內府欲先取靈夏滅西羌乃圖北伐及安南失律喟然歎曰使赤子無罪死朝廷當執其咎永樂之敗益知用兵之難於是息意征伐矣孝友仁儉根於至誠慈聖光獻之喪既除而慕不已待嘉岐二王如布衣歡終上之世乃出外邸平生不御畋逰不治宫室雖青城小苑跬步弗幸謙沖退託去華務實終身不受尊號誠帝王之盛德也史臣云視其建禮樂正官名崇經術肅武備省州縣抑僥幸以䇿問取士以常平養民以原廟奉祖宗以官使勸宗室經制一定至於今賴之豈不信然皇太子即皇帝位大赦尊皇太后為太皇太后宫曰崇重皇后為皇太后宫曰隆祐後改慈德德妃朱氏為皇太妃上生母也宫曰瑞聖太皇太后同聽政尋以太皇太后生辰為坤成節罷𣙜場務佃賃田宅空地出限罰錢罷在京免行錢罷提舉保甲錢糧官提舉保甲官諸縣巡敕保甲官每嵗農隙祇赴縣教閲一月尋又詔自十月至正月分四番教第五等兩丁之家放免罷鄜延團將罷增置鑄錢十四監罷方田復府界三路巡檢弓兵罷水磨茶初召司馬光吕公著於外未至遣中使迎勞太皇手書問以今日設施所當先光未及條上已有旨散遣修京城役夫罷減皇城內覘者止御前工技出近侍之無狀者三十餘人敕中外無敢苛刻暴斂廢導洛司物貨易及民所養户馬寬保限馬限皆從中出大臣不與嚴內降覆奏法詔傳宣內降并由中書樞密院覆奏元祐初諌官王巖叟奏云今日所急在人才須節節有人以為備則朝廷多正論然正直者小人所憚朝廷常有可忌憚之人則朝廷安又奏聖人不以無過為美而以改過為美不以無諌為美而以從諌為美又奏臣節以不回為忠主意以易回為聖又奏兩宫垂簾杜絶內降更乞陛下照管太皇以其言語試問官家上曰無之巖叟曰如此幸甚蓋斜封墨敕不宜於今日有之自古此事盡出於外交結宦官女謁遂賣官鬻獄無所不至不可不防微不可不奏知太皇曰卿言極是決然不至有此不須憂也出內侍宋用臣等十三人以改轉法出之於外遣使察舉監司詔舉行舊法分遣郎官御史察舉諸道監司召吕公著侍讀公著時知揚州遵先帝意召用之入見奏陳十事一曰畏天二曰愛民三曰修身四曰講學五曰任賢六曰納諌七曰薄斂八曰省刑九曰去奢十曰無逸五月京師地震王圭薨圭輔政至宰相凡十六年無所建明守成而已時號為三旨宰相以其上殿進呈云取聖旨上可否訖云領聖旨既退諭稟事者云已得聖旨賜舉人第以亮陰不親䇿其應直赴廷試舊已奏名者皆同場别號試䇿一道賜劉達等千四百餘人及第出身有差以蔡確韓縝為左右僕射章惇知樞密院司馬光門下侍郎光居洛十五年天下以為真宰相田夫野老皆號為司馬相公婦人孺子亦知其為君實也神宗崩赴闕入臨衛士望見皆以手加額曰此司馬相公也爭擁馬首呼曰公無歸洛留相天子活百姓所在數千人聚觀之光懼歸洛太皇聞之詰問主者遣內侍梁惟簡勞光問為政所當先者光言宜開言路尋上疏略曰人君之德三曰仁曰明曰武致治之道三曰任官曰信賞曰必罰且言臣昔以此事仁宗又以此事英宗又以此事神宗又以此事陛下既而復上疏曰臣竊見先帝聰明睿知勵精求理思用賢輔以致太平不幸所委之人於人情物理多不通曉足已自是不知擇祖宗之令典合天下之嘉謨以啓迪清𠂻佐佑鴻業而多以己意輕改舊章謂之新法其人意之所欲為人主不能奪天下莫能移與之同者援引登青雲與之異者擯斥沈溝壑專欲遂其狠心不顧國家大體人之常情誰不愛富貴而畏刑禍於是搢紳士大夫望風承流競獻䇿畫作青苗免役市易賖貸等法又有邉鄙之臣行險僥幸大言面欺輕動干戈深入敵境坐守孤城糧運罄竭狼狽奔潰使兵夫數十萬暴骸於曠野資仗巨億棄捐於異域又有生事之臣欲乘時干進建議置保甲户馬以資武備變茶鹽鐡冶等法增家業侵街商稅錢以供軍需遂使九土之民失業困窮如在水火此皆羣臣躁於進取惑誤先帝使利歸於身怨歸於上非先帝之本志也比聞有旨罷修城役夫撤巡邏之卒止御前造作斥退近習之無狀者戒飭有司奉法失當過為煩擾者罷物貨等場及民所養户馬又寬保馬年限四方之人無不鼓舞聖德夫為政在民心茍民之所欲者與之所惡者去之如決水於髙原之上以注川谷無不行者苟或不然如逆阪走丸雖竭力以進之其復走而下可必也今新法之弊天下之人無貴賤賢愚知之是以陛下微有所改而逺近皆相賀也保甲免役錢將官三事皆當今之急務釐革所宜先者伏願早賜施行昔文帝除肉刑斬右趾者棄市笞五百者多死景帝元年即改之笞者始得全武帝作鹽鐡𣙜酤均輸等法天下困敝盜賊羣起昭帝用賢良文學之論而罷後世稱明唐代宗縱宦官公求賂遺置客省拘滯四方之人德宗立未三年悉禁止罷遣時人望致太平德宗晚年有宫市五坊小兒暴橫為民害鹽鐡日進羡餘順宗即位皆罷中外大悅皆改父之政事而當者人誰非之切不可泥三年不改父道之説也其乞罷保甲略曰兵出民間雖亦古法然古者八百家才出甲士三人步卒七十二人間民甚多三時務農一時講武不妨稼穯自兩司馬以上皆選賢士大夫為之無侵漁之患故卒乘輯睦動則有功今籍鄉村之民二丁取一以為保甲皆授以弓弩教之戰陳是農民半為兵也近年又令河北河東陜西置都教場無問四時每五日一教特置使者比監司專切提舉州縣不得關預每一丁教閲一丁供送雖云五日保正以泥棚除草為名日聚教場得賂則縱之不則留之是三時耕耘收種稼穯之業盡廢也又朝廷時遣使者遍行按視所至犒設賞賚縻費金帛以巨萬計此皆鞭撻平民銖兩丈尺而斂之一旦用之如糞土而鄉村之民但苦勞役不感恩澤臣不知設保甲於農民之勞既如彼國家之費又如此終將何所用哉又悉罷三路巡檢下兵士及諸縣弓手皆易以保甲令主簿兼縣尉但主草市以裏其鄉村盜賊悉委巡檢而巡檢兼掌巡按保甲教閲朝夕奔走猶恐不辦何暇追捕盜賊哉又保甲中往往有自為盜者亦有乘保馬行劫者然則設保甲保馬本以除盜乃更資盜也臣愚以為宜悉罷保甲使歸農召提舉官還朝量逐縣户口每五十户置弓手一人其餘巡檢兵士縣尉弓手耆長壯丁逐捕盜賊並乞依祖宗舊法又乞罷免役略曰百姓出力以供在上之役蓋自古及今未之或改熙寧中執政者謂百姓惟苦差役破産不憚增稅乃請據髙下各令出錢雇人充役因差役破産者惟鄉户衙前有之自餘散從承符弓手手力耆長户長壯丁未聞破産者也其鄉户衙前所以破産者蓋由田野愚戅之人不能幹事主彼官物或因水火損敗或為上下侵漁欠折備償不足有破産者至於長户衙前久在公庭勾當精熟每經重難差遣積纍分數别得優輕場務奬借往往致富何破産之有又向者役人皆上等户為之其下等單丁女户及品官僧道本來無役今更使之一槩輸錢則是賦斂愈重非所以寬之也故自行免役法以來富室差得自寬而貧者困窮日甚殆非所以抑兼并哀惸獨均賦役也而又監司守令之不仁者所雇役人之外多取羡餘或一縣數萬貫以兾恩賞規進取又國家舊制所以必差青苗户充役人者為其莊田家屬有罪難以逃亡故頗自重惜今雇浮浪之人充役常日恣為不法一旦事發單身竄匿則何處不可投名也又農家所有不過榖帛與力自古賦役無出錢者行新法以來青苗免役及賦斂多責見錢錢非私家所鑄要須貿易外求豐嵗榖賤己自傷農况迫於期限不得半價盡糶所收未能充數家之糗糧未暇更留若值凶年則又無榖可糶人人賣田無所可售遂至殺牛賣肉伐桑鬻薪來年生計不敢復議此農民所以重困也臣愚以為宜悉罷免役錢其州縣諸色人並依舊制悉委本縣令佐揭主簿定差替見雇役人其衙前先召募人投充長名召募不足然後差鄉村人户每經歷重難差遣依舊以優輕場務充酬賞所有見在免役錢撥充州縣常平本錢以户口為率存三年之蓄有餘則歸轉運司其乞罷將官略曰州縣者百姓之根本根本危則枝葉何以得安故自古以來凡置州郡必嚴其武備設長吏必盛其侍衛非以重其權驕其人也乃所以安百姓衛朝廷也國朝以來置總管鈐轄都監為將帥之官凡州縣有兵馬者其長吏未嘗不兼同管轄蓋知州即一州之將知縣即一縣之將故也先帝欲征伐四夷患諸州兵官不精勤訓練士卒懈弛於是有建議者别置將官使之專切訓練其逐州總管以下皆不得關預及有差使量留羸弱下軍及剩員以充本州官白直及諸般差使其餘禁軍皆制在將官專事教閲臣愚以為職事修舉在於擇人不在於設官苟不得人雖將官亦何所為况今之將官即向之總管等官也豈為總管時則不能舉職為將官乃能舉職乎此徒變易其名無益事實非徒無益兼亦有害凡設官分職當上下相維如身之使臂臂之使指紀綱乃立今為州縣之吏及總管等官而於所部士卒有不相統攝不得差使殆如路人者至於倉庫守宿街市巡邏亦皆乏人雖於條許差將下兵士而州縣不得直差須牒將官將官往往占護不肯差撥萬一有非常之變州縣長吏何以號令其衆制禦姦宄臣略舉目覩一事以證其餘先帝敕西京留司親詣嵩山起建道場其將下禁軍充白直者於條皆不得出城經宿所留者剩員七八人而已西京天子别都也其守禦不固如此留守前宰相重官也其侍衛單寡如此况僻小州縣其守禦之備侍衛之衆可知矣今獨緣邉州軍城隍完固士卒衆多可以守禦自餘州縣既無深溝髙城又乏士卒羣盜猝至何以責其竭節守義臣愚以為河北陜西河東京西等路腹內州縣宜以漸修築所治之城州城稍髙縣城次之不必廣大所以然者髙則難踰小則易守故也屯駐兵士大藩常留千餘人小州亦留數百人悉罷將官其逐州縣禁軍并委長吏與總管等同共提舉教閲仍令逐州各選有勇力武藝之人充弓手以衛守城邑討捕盜賊其州縣吏所給白直迎送之人皆如嘉祐編敕以前各數如此則力可以守然後遇冦盜之至責其棄城等罪誅之彼亦甘心矣起光知陳州過闕留之而有是命光上疏辭免略曰先帝以睿知之性切於求治而王安石不達政體專用私見變亂舊章誤先帝任使陛下深知其弊即政之初變其一二歡呼之聲已洋溢乎四表則人情所苦所願灼然可知陛下何憚而不悉更張哉譬如人有誤飲毒藥致成大病苟知其毒斯勿飲而已矣豈可云姑少減之積以嵗月然後盡捨之哉臣向言免役保甲將官此皆所害者大所及者衆宜先變更何為不可太皇遣中使諭令供職曰嗣君年德未髙吾當同處萬務所賴方正之士贊佐邦家切欲與君商量政事卿又何辭可降詔開言路須卿供職施行光乃受命求直言先是五月詔略曰為治之要納諌為先有能以正論啓沃者豈特受之而已且不愛髙爵重祿以奬其忠若乃陰有所懷犯非其分或扇搖機事迎合己行上則觀望朝廷僥幸希進下則衒惑流俗干取虛譽審出於此而不懲艾必能亂俗害治然則黜罰之行是亦不得已也司馬光上疏略曰臣伏讀詔書固盡善矣中間逆以六事防之臣以為人臣惟不上言上言則可以六事罪之矣其所言或於羣臣有所褒貶則可以謂之陰有所懷本職之外微有所涉則可以謂之犯非其分陳國家安危大計則可以謂之扇搖機事或與朝旨暗合則可以謂之迎合己行言新法之不便當改則可以謂之觀望朝廷言民間愁苦可憫則可以謂之衒惑流俗然則天下之事無復可言者矣是始於求諌而終於拒諌也望於詔書中刪去中間一節使天下曉然知陛下務在求諌不憂黜罰則中外之情逺近之事如指諸掌矣凡三奏乞改前詔乃更下詔許中外實封言事知慶州范純仁言向來朝廷陰立法度付之有司固欲便民益國也如慈父寄食哺兒意豈有不善哉而哺者無愛兒之心不量飢飽多少之節惟曰哺之而已不恤其他則兒不病而死者幾希矣今吏之行法者不恤民之利害惡欲曰惟知行法而已不恤其他則宜其百姓疲敝無告矣然則羣縣之弊守令知之一路之弊職司知之軍政之弊三帥與將領者知之茶鹽利局民兵刑法差役之弊提其局及受其寄者知之邊防之弊守邊者知之伏望各使條陳無或隂蔽某事利人益國可以興行某事勞擾煩費可以簡省某事蠧害公私可以釐革天下幸甚吕公著既上十事太皇遣中使奬諭且曰當此拯民疾苦更張何者為先具悉以聞公著上奏略曰自王安石秉政青苗免役之法行而取民之財盡保甲保馬之法行而用民之力竭市易茶鹽之法行而奪民之利悉若此之類甚衆今陛下既已深知其弊更張之際當須有術不在倉卒且如青苗之法但罷逐年比較則官司既不邀功百姓自免抑勒之患免役之法當少取寬剩之數度其雇差所宜無令下户虛有輸納上户取其財中户取其力則公私自然均濟保甲之法祗令秋冬月農隙教習仍祇委本路監司提按既不至妨農則衆庶稍得安業無轉為盜賊之患如此三事並須别定良法以為長久之利至於保馬之法先朝已知有司奉行之謬市易之法先帝尤覺其有害而無利福建江南等路配賣茶鹽過多彼方之民殆不聊生俱非朝廷本意恐當一切罷去而南方鹽法三路保甲尤宜先革者也又曰必欲實利及民莫若任人為急同日又上奏曰臣乞陛下廣開言路登用正人恐陛下深居九重未能盡知人才於是薦孫覺方正有學識范純仁徑挺有風力皆可充諌議大夫等官李常清直有守可備御史中丞劉摯性資端厚可充侍御史蘇轍王巖叟並有才氣可充諌官言事御史太后封公著劄子付司馬光詳所陳當與未當光奏公著所陳無有不當惟有保甲一事欲就農隙教習臣謂既知其為害於民無益於國便當廢罷更安用教習於是光又薦劉摯公忠剛正終始不變趙彥若博學有父風內行修飭傅堯俞清立安恬淹滯嵗久范純仁臨事明敏不畏強禦唐淑問行已有恥難進易退范祖禹溫良端願修身無闕此六人或處臺諌或侍講讀必有禆益九月侍御史劉摯言侍講陸佃蔡卞皆新進少年越次暴起論德業則未試語公望則甚輕乞罷其兼職别選用道德經術有行義忠信孝弟惇茂老成之人以講讀遂命趙彥若傅堯俞兼侍讀秋七月嚴奏讞法先是有以強盜及故殺鬭殺情可矜讞於朝法官援例貸免刑部郎杜紘以為多不實請勿貸於是司馬光主之乃詔奏讞不當者按罪起居郎范百祿監察御史邵材皆爭之不從死者甚衆皆自紘發之其後范純仁亦以為非先王寧失不經之意乃詔大辟刑名疑慮情理可憫公案令刑部看詳不得致有枉濫冬十月詔舉諌官初詔倣唐六典置諌官尋又詔待制以上舉堪充諌官二員時已除范純仁唐淑問朱光庭蘇轍范祖禹為諌官太后問執政曰此五人何如章惇曰故事諌官皆兩制以上舉然後執政議今除自中出臣不知陛下何從知之得非左右所薦此門不可啓后曰此大臣所薦非左右也惇曰大臣當明揚何以密啓由是韓縝司馬光以純仁吕公著以祖禹親嫌為言惇曰臺諌所以紏繩執政之不法故事執政初除親戚及所舉之人見為臺諌皆徙他官今當循故事不可違祖宗法光曰純仁祖禹作諌官誠協衆望不可以臣故妨賢者進臣寧避位惇曰縝光公著必不至有私萬一他日姦臣執政援此為例非國之福純仁祖禹請除他官仍令兩制以上奏舉故有是詔淑問光庭轍除命如故改純仁兼侍講祖禹兼著作佐郎尋又詔監察御史兼言事殿中侍御史兼察事罷義倉河決大名葬神宗於永裕陵先是九月朔范祖禹言先王制禮以君服同於父故皆斬衰自漢以來不惟人臣無服而人君遂不為三年之喪惟國朝祖宗外庭雖有易月之制而宫中實行三年之服且易月之制前世所以難改者以人君自不為服也今君上已如古典而臣下猶依漢制故以大行在殯而百官有司容貌衣服無異於行路之人豈人之性若此其薄哉由上之不為之制禮也今羣臣易月而人主實行三年之喪故十二日而小祥期而又小祥二十四日而大祥再期而又大祥夫練祥不可以有二也既以日而為之又以月而為之此禮之無據者也古者大祥中月而禫禫者祭之名非服之色也今乃為之禫服三月此禮之不經者也既除服矣至葬即又服之祔廟而後即吉才八月耳而遽純吉無所不佩此又禮之無漸者也易月之制因襲故事已行之禮既不可追且衰裳不可以服勤則斷以日月而易朝服以視事亦是也臣愚以為宜令羣臣朝服正如今日而未除衰至期而服之漸除其重者再期而又服之乃釋衰其餘則君服斯服可也至於禫不必為服惟未純吉至大祥然後無所不佩則三年之制略如古矣又奏曰天子者天下之共主故其喪使天下共服之今朔望之禮羣臣朝服以造殯宫是以吉服臨喪也人主獨以衰服在上是以先帝之服為人主之私喪也凡此皆禮之所不安也今欲風天下以忠者莫如先正此禮然古者君臣居喪而行吉禮則服冕既畢禮則服衰今人主素服以聽朝而人臣朝服以治事亦古之遺法也惟羣臣燕服當為之制期年之內純用縞素小祥可以有色而漸加以緣使脫去朝服而猶知有喪則人情不可得忘矣書曰三載四海遏密八音古者禮不下庶人惟遏密三年所以為君服也今祔廟之後羣臣不樂百姓無禁是殺禮以姑息習為俗樂之浮民而使人不知君臣之義也彼不為樂必有他業以養其生豈遽至困窮禁之合於禮而無傷於俗請禁之便司馬光主其説下禮官議而禮部尚書韓忠彥等言喪祭從先祖且遺制不可改也乃止募耆户長壯丁知吉州安福縣上官公穎奏曰耆壯户長法之始行皆出於雇及其久也耆壯之役則歸於保甲之正長户長之役則歸於催稅甲頭往日所募之錢除承帖人及刑法司久吏許用外其餘一切付樁若以為耆壯户長誠可以廢也即所用之錢自當與百姓均減元額今則錢不為之減又使保正長為耆壯之事催稅甲頭任户長之責是何異使民出錢免役而又使之執役也乃詔並募充仍等第給雇錢其舊以官正代耆長催稅甲頭代户長承帖人代壯丁并罷諸路所樁耆户長壯丁錢數撥入役錢內一處支用通寬剩並不得過二分有剩即行均減復坊正并募人充給雇錢十一月祔神宗祧翼祖以鮮于侁為京東轉運熙寧末侁嘗為是官至是復除之司馬光語人曰今復以子駿為轉運使誠非所宜然朝廷欲救東土之弊非子駿不可此一路福星也可以為諸路模範矣又曰安得子駿布於天下乎十二月于闐進獅子卻之是嵗六月程皓卒皓嘗云一命之士苟存心於愛物於人必有所濟嘗令澤之晉城在縣三嵗民愛之如父母熙寧初除監察裏行神宗素知其名數召見前後進説甚多大要以正心懲欲求賢育材為先上嘗使推擇人才皓所薦者數十人而以父表弟張載弟頥為首每勸上防未萌之損及勿輕天下士時王安石日益信用皓每進見必為上言君道以至誠仁愛為本而未嘗及功利一日極陳治道上曰此堯舜之事朕何敢當皓愀然曰陛下此言非天下之福也安石與皓雖道不同而嘗謂皓忠嘗被旨趣中書議事安石方怒言者厲色待之皓徐曰天下之事非一家私議願公平氣以聽之安石愧屈皓每論事心平氣和安石多為之動嘗謂安石曰管仲霸者之佐也猶能言出令當如流水以順人心今參政苦要作不順人心事何耶但願作順人心事又誰不願從也安石曰此則感君誠意既而有於中書大悖者安石大怒遂以死力爭之而黨與分矣皓居職數月章疏十上其尤繫教化之本原者則論王霸等篇是也其論王霸曰得天理之正極人倫之至者堯舜之道也用其私心依仁義之偏者霸者之事也王道坦然本乎人情出乎禮義若履大路而行無回曲霸者崎嶇反側於曲徑之中而卒不可與入堯舜之道故誠心而王則王矣假之而霸則霸矣二者其道不同在審其初而已故治天下者必先立其志正心先立則邪説不能移異端不能惑故力進於道而莫之禦也陛下躬堯舜之資處堯舜之位必以堯舜之道自任然後為充其道漢唐之君有可稱者論其人則非先王之舉考其時則皆駁雜之政乃以一曲之見幸致小康則創法垂統非可繼於後世者皆不足為也然欲行仁政苟不素講其具使其道大明而後行則或出或入終莫有所至也惟陛下稽先聖之言察人事之理知堯舜之道備於己反身而誠推之以及四海擇同心一德之臣與之共成天下之務則天下幸甚其論正學禮賢曰君道之大在乎稽古正學明善惡之歸辨忠邪之分曉然趨道之正故在乎君志先定君志定而天下之治成矣所謂定志者正心誠意擇善而固執之者也夫義理不先盡則多聽而易惑志意不先定則守善而或移惟在以聖人之訓為必當從先王之治為必可法不為後世駁雜之政所牽滯不為流俗因循之論所遷惑信道極於篤自知極於明必期致治如三代之隆而後己也然天下之事患常主於忽微而志亦戒乎漸習故古之人君雖出入從容間燕必有誦訓針諌之臣左右前後無非正人所以成其德業伏願陛下禮命老臣賢儒不必勞以職事俾日親便坐議論道義以輔養聖德又擇天下賢俊使得陪侍法從朝夕進見開誠善道講磨治體以廣聞聽如此則聖知益明王猷允塞矣其論養賢曰臣歷觀古先哲王所以虛己求治何嘗不盡天下之才以成己之德也故曰大舜有大焉善與人同樂取於人以為善今天下之大豈為乏賢而朝廷無養賢之地以容之徐察其器能髙下而進退之也臣今欲乞朝廷設延英院以待四方之賢凡公論推薦及巖穴之士必招致優禮視品給俸而不可遽進以官凡有政治則委之詳定凡有典禮則使之討論經書得以奏陳而治亂得以講究也俾羣居切磨日盡其才使政府及近侍之臣互與相接陛下時賜召對訪以治道可以觀其才器也察之以纍嵗人品益分然後使賢者就位能者任職或委付郡縣或師表士儒其德業尤異漸進以師臣職司之任為輔弼為公卿無施之不稱也若是則引彚并進野無遺賢陛下尊賢待士之心可無負於天下矣竟以言常平法不便出提點京西刑獄皓固辭改鎮寧軍判官皓求對上曰有甚文字皓曰今咫尺天顔尚不能少回天意文字更復何用欲去而上問者數四皓每以陛下不宜輕用兵為言尋監洛河竹木務神宗念之欲召修三經義執政不可命知扶溝縣扶溝地卑嵗有水旱為經畫溝洫之法未及興工而去官他日皓語人曰以扶溝之地畫為溝洫必數嵗乃成吾為經畫十里之地開其端使後人知其制必有經之者大凡為令必使境內之民凶年飢嵗免於死亡平居無事服禮義之訓然後為盡故吾於扶溝興設學校聚邑人子弟教之亦幾成而廢夫百里之施至狹也而道之廢興繫焉是數事皆不及成豈非命哉然知而不為徒責命之廢興則非矣此吾所以不敢不盡心也除判武學李定劾其新法之初首為異論罷歸故官又坐獄逸囚責監汝州酒稅上即位召為宗正丞未行而卒皓與弟頥少聞汝南周敦頥論學遂厭科舉之習慨然有求道之志謂孟軻沒而聖學不傳以興起斯文為己任其言曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乘其迷暗今之惑人也因其髙明自謂窮神知化而不足以開物成務言為無不周遍實則外於倫理窮深極微而不可入堯舜之道天下之學非淺陋固滯則必入於此窒塗生民耳目雖髙才明知膠於見聞醉生夢死不自覺也是皆正路之蓁蕪聖門之閉塞闢之而後可入道其教人自致知至於知止誠意至於平天下灑掃應對至於窮理盡性循循有序病世之學者捨近而趨逺處下而窺髙所以輕自大而卒無得也其死也識與不識莫不哀傷文彥博採衆論表其墓曰明道先生而其弟頥序之曰周公沒而聖人之道不行孟軻死而聖人之學不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生乎千四百年之後得不傳之學於遺經以興起斯文為己任辨異端闢邪説使聖人之道煥然復明於世蓋自孟子之後一人而已然學者於學不知所向則孰知斯人之為功不知所至則孰知斯名之稱情也哉皓嘗論熙寧初張戩爭新法不可行遂以語觸王安石因曰新法之行乃吾黨激成之當自愧不能以誠感悟上心遂成今日之禍吾黨當與安石分其罪也九朝編年備要卷二十一
