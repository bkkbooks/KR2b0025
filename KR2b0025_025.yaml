body:
  text: 九朝編年備要卷二十五宋陳均撰哲宗皇帝起戊寅元符元年止庚戌元符三年戊寅元符元年春二月罷翰林侍講侍讀學士三月建懿親宅以處五王內臣陳衍抵死紹聖初追貶司馬光等張商英又言內臣陳衍乃陛下家奴敢與宰臣交通干預大政劉摯未除相蘇頌未罷相前十日人已知之其姦狀明白乞流配海島詔除名白州編管三年又以其與州官往來配朱崖軍至是蔡京安惇究治到前皇城使張士良所言陳衍事狀乃奏云司馬光忘先帝厚恩棄君臣大義乘時伺候冒利無恥交通中人躐取高位姦黨交締蹤跡詭祕又曰其無君之惡同司馬昭之心擅事之迹過趙髙指鹿之罪蓋至今日其惡遂彰大逆不道死有餘責所有陳衍罪不在赦上曰陳衍朕親見之不可貸乃詔衍處死士良先已竄雷州至是徙白州章惇蔡卞請追廢宣仁聖烈皇后先是惇卞恐元祐舊臣一旦復起日夜與邢恕謀所以排陷之計既再追貶呂公著司馬光及謫呂大防等過嶺意猶未厭仍用黃履疏髙士京狀追貶王圭皆誣以圖危上躬其言侵及宣仁上頗惑之最後起同文館獄將悉誅元祐舊臣內結宦者郝隨為助專媒孽垂簾事欲追廢宣仁惇卞自作詔書請上詣靈殿宣讀皇太后方寢聞之遽起不及納履號謂上曰吾日侍崇慶天日在上此語曷從出且上必如此亦何有於我皇太妃同皇太后諫上語極悲切上感悟取惇卞奏就燭焚之於是禁中相慶郝隨覘知其語惇卞明日再具奏堅乞賜行上怒曰卿等不欲朕入英宗廟乎抵其奏於地張士良者前竄雷州惇卞逮赴詔獄欲使誣宣仁果有廢主意及士良至既以舊御樂告復列鼎鑊刀鋸置前謂曰言有即還舊官言無即死士良仰天哭曰太后不可誣天地神祗不可欺乞就戮惇卞無如之何但以陳衍罪狀塞詔宣仁追廢之議由是得息而惇卞終不釋然蔡京安惇進呈劉摯等事上曰元祐人果如是乎京惇曰誠有是心然反形未具上曰摯等已責遐方朕遵祖宗遺意未嘗戮大臣其釋勿治夏四月邢恕罷自中丞出知汝州恕每登對必移時章惇疑其輕已排而出之十月中書言恕元祐初上書言王安石呂惠卿之姦又稱宣仁后有宗廟大計旬日固已先定之語于是徙知南安軍建顯謨閣藏神宗御集崇寧元年置學士直學士待制等官復汴河堤岸司五月朔御殿受傳國寶初咸陽民段義郊居因造屋斸地得玉璽其文曰受命于天既壽永昌玉甚瑩色甚緑御史臺主簿李公麟以為璽文乃小篆為鳥魚狀蓋李斯所篆又云初學記云藍田之玉如藍故謂之藍田此真秦寶也蔡京等欲以五月朔大朝㑹受傳國璽上許之三省未知也及詔如所請章惇大駭然不敢復言聞者哂之六月改元初議改元上謂輔臣曰前代元鼎之類皆明白如何章惇曰元符最好其次有真符寶符皆不及兼寶字皆先世末歲所稱如天寶皆是上曰如此即且作元符曽布以為昔天書降嘗于承天門裏作元符觀後以火廢則元符亦不甚佳上默然置看詳元祐訴理局元祐初嘗置訴理所申理寃濫至是中丞安惇言陛下未親政事姦臣置訴理所凡得罪于熙豐之間者咸為除雪歸怨先朝收恩私室乞取公案看詳從初加罪之意復依元斷施行時章惇猶豫未應蔡卞即以相公二心之言迫之惇懼即日置局命蹇序辰同安惇看詳案內文狀陳述及訴理所看于先朝言語不順者具告以聞自是已伸雪復改正或重得罪者八百三十家秋七月地震八月嚴選用召對法詔自今三省樞密院擬進在京文臣及武官橫班使副諸路監司帥守召對嚴起復命詔非管軍邊任不許復起三省言駙馬都尉郭獻卿卒哭當起復上曰不以金革從事而起復雖有故事非古也其除之九月復竄鄭俠看詳訴理所言光州司法監安上門鄭俠上言謗訕朝政并王安國非毁兄安石等罪名元祐元年除雪不當及王斻王斿進狀內言父安國寃抑未除又云先臣不幸不得出于此時詔元祐指揮更不施行並令改正俠追毁出身以來文字除名勒停依舊英州編管斻斿俱降監當賜故相王安石第就京師賜第百間冬十月夏人寇邊渭川之西地數百里而平夏處其中初涇原經略章楶謂諸將曰新邊控扼誰可付者皆曰非郭成不可遂辟成為第十一將以戍平夏西賊自失地之後朝夕憤恚至是以兵號三十萬犯塞國主與其母自將攻平夏城自己卯至壬辰晝夜疾攻成等城守益堅寇乃造髙車以臨城載數百人填壕而進俄有大風震折寇一夕遁去夏人嵬名阿里默拉敦布二人乃西羌之將皆勇悍善戰屢為邊患章楶諜知其虛可襲十二月遣折可適等間以輕騎二千出蕩羌六道分進寇不及知夜入其室執之盡得其家屬俘馘三十餘人獲牛羊不啻十萬曽布曰上此非常之功可賀也上曰可賀否布曰果莊亦賀及告陵廟此功不在果莊下惇等皆曰此奇功也上乃御紫宸殿受百官賀左正言鄒浩言涇原擒到西夏統軍等人孰不稱賀然兵家未勝則以決勝為難既勝則以持勝為難知決勝于前而不知持勝于後將有棄前功而招後患矣明年進楶等秩其餘賞賚有差嵬名阿里等詔送闕下既至並貸其命范祖禹卒于化州祖禹平居恂恂口不言人過至遇事别白是非不少借隱在邇英守經据正獻納尤多嘗讀尚書至內作色荒外作禽荒之語拱手再誦却立云願陛下留聽上首肯再三乃退每當講前夕必正衣冠儼如在上側命子弟侍先按讀其說及講間列古義參之時事言簡而當無一長語義理明白粲然成文蘇軾稱為講官第一自以為不及也十一月甲子冬至郊罷合祭先是紹聖三年春詔復罷合祭大禮之歲親祀地祇于北郊其年六月詔立北郊齊宮十二月澶州河溢己卯元符二年春三月遼人請緩夏師遼使蕭德崇等見上遂言北朝皇帝告于南朝皇帝西夏事早休得即甚好上令答之曰西人纍年犯順理須討伐何煩遣使德崇等唯唯而退其國書略云粵惟夏臺實乃藩輔纍承尚主迭受封王近歲以來連表馳奏稱南兵之大舉入西界以深圖懇求救援之師用濟攻伐之難理當依允事貴解和蓋遼之於宋情重祖孫夏之於遼義隆甥舅必欲兩全於保合豈知一失於綏存而況于彼慶厯元豐中曽有披聞皆謂止退寧謂輒違先旨仍事逺征倘蔽議以無從慮造端而有自報書云惟西夏之小邦乃本朝之藩鎮曲加封植俾獲安全雖於北嘗與婚姻之親而在南全居臣子之分含容寖久變詐多端爰自纍歲以來無復事上之禮賜以金繒而不足加之封爵而愈驕殺掠吏民圍犯城邑推原罪惡在所討除聊飭邊防稍修武備築據要害控扼奔衝輒于去歲之冬復驅竭國之衆來攻近塞凡涉兩旬自取死傷數以萬計糧盡力屈衆潰宵歸更為詭誕之辭往求拯救之力狡獪之甚於此可知采聽之間固應洞曉必謂深加沮却乃煩曲為勸和示以華緘將之聘幣禮雖形於厚意事實異于前聞緬料雅懷誠非得已顧於信誓殊不相關惟昔興宗致書仁祖諭協力蕩平之意深同謀外禦之情至欲全除使無噍類謂有藉於一舉誠無益於兩朝祖宗貽謀斯為善美子孫繼志其可遺忘今者詳味縟辭有所未諭輒違先旨諒不在茲又一白劄子略云夏國犯順罪惡如此北朝所當共怒兼慶厯皇祐間興宗屢嘗致書仁廟至有熟料凶頑終合平蕩等語且言北朝興宗篤志勸和情義兼至方夏人有罪則欲協力討除及西征勝捷則持書相慶慮彼稱臣修貢則欲當朝勿賜允從今來兩朝歡好加于前日乃以夏人窮蹙之故詭辭以告既移文計㑹又遣使勸和恐與昔日興宗皇帝之意稍異竊料北朝臣僚不曽檢㑹往日書詞及所立誓約聞達仍詔遣郭知章報聘初德崇堅乞於國書內增休退兵馬還復疆土等語往復議論卒不從之德崇留京師凡三十七日乃歸夏五月以進築畢功赦陜西河東帝相章惇以涇原路建西安州及天都等寨諸路築據要害邊面各徑直相通率百官賀於紫宸殿制答曰夏羌弗庭命將進討復我境土據賊要衝道阻悉通邊防永固與卿等內外同慶德音降陜西河東路死罪囚流以下釋之差官奏告永裕陵先是曽布言西安建州包括天都自天都至秦州甘谷城南北一直五百里幅員近千餘里當時熙河山是摩正地今開拓乃夏國地兼據險要並河足以制其死命西人常恭順則已更作過則趨靈夏不逺矣此功非熙河可比然不得熙河涇原亦無有開拓今徑據天都涇原自汝遮建城塞至㑹州故兩道邊面相通接而秦州遂在腹內兼先帝建熙河蘭㑹路今日方得秦州乃成先帝之志上書曰蘭㑹方為漢地如此固當稱賀又曰熙寧建熙河路以熙洮岷通逺軍為一路此時尚未得河州至今未有洮州此故事也上然之又曰西安㑹州皆漢地亦當告陵廟又曰諸路所作築凡四十餘壘皆畢未論諸路只天都與熙河邊面相接所包括幅員蓋千里河東鄜延環慶邊面亦各相通此誠非常不世之效此番赦詞當從政府草定恐學士命詞不能盡朝廷意又當明示以休息兵民之意不惟慰安民心亦足以釋西北之疑也上許之赦文有討叛興師蓋非得已息民偃革將自于今之語布所草也章惇進官五等曽布三等許將蔡卞黃履皆二等先是夏人三遣使至鄜延而諜言梁氏之死乃遼人遣人鴆殺之使乾順自管國事呂惠卿以謂若誠有之則遼人欲西人之歸已可知我若應答太過所求難與則是怒彼以堅其北歸而畫河為界必無聽從之理乃上疏曰西人之所以有河外者以有河南為之限所以有河南者以有橫山為之阻今若畫河為界則皆失之彼豈不思一葦可渡而據山之險他路臣不能知如木路所築九寨與暖泉金湯二寨幸皆就緒東西殆千里而新築之外更拓二三十里以為堡鋪則形勢膏腴占據殆盡乾順因其母死歸咎姦臣殺之以謝罪而請入貢則我雖未能一舉而覆巢穴然自有國以來用兵西方未有如今日之盛也是春夏人又四遣使來其辭滋恭朝廷亦得其近上首領道其密謀以為急則納土北歸遂命惠卿說諭漸示接納之意六月河決內黃口東流斷絶于是吳安持等三十人降責有差以元祐間主回河東流之議也秋七月置湟水軍初吐蕃酋長轄正隆贊爭國於是綽爾結奔河州說權知州王贍以取青唐熙河經略司屬官王厚乃與贍同畫䇿遣客詣章惇惇下其事於經略使孫路路因言青唐必可取遂大發府庫招徠羌人厚韶子也既而河南酋長必斯布結以講朱一公錯鑿當剽四城來降贍奏乞速取青唐朝廷許之曽布對上曰先帝初以熙河洮岷為一路今方得秦又以熙河蘭㑹為一路今方得㑹陛下威靈所及遂成先帝之志非天時人事符合何以至此至是贍等師遂出塞自密章渡河趨邈川孫路知贍狡獪難制使總營王愍為將而以贍副之故其渡河贍為前鋒愍䇿應於後贍將趍邈川忌愍分其功紿愍明朝食畢乃發愍以為誠然贍夜半忽傳發平明入邈川愍徐覺之整陳而行日午始至贍已據府庫舍愍于佛寺贍徑上捷書不復由帥府矣邈川古湟中之地部屬繁庶形勢險要南拒河州東拒蘭州皆二百里于是孫路請建為湟水軍路既怒贍而愍又以贍據府庫事訴于路故路心右愍而奪贍兵權屬之而贍所請輒又抑不與專委愍至河州又與同還熙河而留贍屯邈川也史臣曰吐蕃之裔守護西塞為不侵不叛之臣固嘗宣力王家奮擊夏虜而熙寧元符崇寧間三用師于其國蓋其始也王安石主王韶取洮河中而章惇主王贍夷青唐末而蔡京主王厚復湟鄯遂建熙河一道郡縣而置之功雖訖成邉患不息唃氏子孫無罪而就覆亡及金人得秦隴乃能求其後而續其血食可慨也夫八月太原地震復㑹州修復㑹州以知鎮戎軍姚雄為知州安化蠻寇邊轄正降隆贊入居青唐轄正為其下所逐徙居青唐新城尋削髮為僧至是領衆趨宗哥城王愍受其降轄正既降其首領綽爾結與森摩欽戬棟戬疏族希巴烏次子也迎隆贊為主入居青唐城九月立賢妃劉氏為皇后時中宮久虛上屬意賢妃劉氏令左僕射章惇以兩宮意撰一詔進入惇即撰皇太后手詔有非此人誰可當等語內侍劉友端書之于是三省樞密院上奏乞立中宮上遂出惇所擬太后手札以賢妃為皇后隆贊以青唐降改為鄯州森摩欽戬綽爾結幽隆贊於别室遣使詣王贍通欵贍舉兵至青唐隆贊出降贍引兵入城閏月改青唐為鄯州邈川為湟州宗哥改為龍支城並𨽻隴右以廓州為寧寨城毁元祐碑刻從通判潭州畢漸請也竄鄒浩時為右正言上疏曰天子之與后猶日之與月隂之與陽相須而成者也然則立后以配天子安得不謹今陛下為天下擇母而所立乃賢妃劉氏一時公論莫不疑惑誠以國家自有仁祖故事不可不遵用之耳蓋皇后郭氏與美人爭寵致罪仁祖既廢后不旋踵并出美人所以示公也陛下以罪廢孟氏與郭實無以異然孟氏之罪未嘗付外推治天下至今疑以為與賢妃爭寵而廢若果與賢妃爭寵而致罪則不立妃嬪以逺嫌亦有仁祖故事在焉況孟氏罪廢之初天下皆料必以賢妃為后及讀詔書有别選賢淑之語又聞陛下臨朝慨嘆以廢后為國家不幸又見宗景有立妾之請陛下怒而譴之于是天下始釋然不疑今竟立之則不免上纍聖德豈不惜哉乞追停册禮别選賢淑詔除名勒停送新州羈管初浩過潁昌見其友田畫言得罪之由留三日臨别浩出涕畫正色曰使君隱默官京師遇寒疾不汗五日死矣豈獨嶺海之外能死人哉願君無以此舉自滿士所當為者未止此也浩茫然自歎息曰君之贈我厚矣編修官張庭堅見曽布極言瑶華無罪而器浩之直且曰今日朝廷逐諫官樞密何不力救布但唯唯章惇覆奏貶浩十一月蔣之奇落翰林學士呂嘉問落待制葉祖洽罷吏部尚書並補外王回特除名勒停坐與鄒浩語言交通也王琳吳師禮李友諒陳舉朱紱傅楫胡安修范致君王溥勒停白時中岑穰張庭堅畢漸蔡蹈范致虛蔣求葉承各衝替坐以錢銀遺浩且致簡叙别也冬十月諸羌復叛立小隆贊時森摩欽戩結山南諸羌悉叛圍鄯州部將李忠擊敗之王贍戮心牟欽氊等九人及城中諸羌甚衆羌人又圍湟州王愍擊敗之又圍宗哥城凡十日而解是月洮河總管苗履秦鳯總管姚雄及將髙永年破綽爾結於青唐峗羌人宵潰屬羌朗阿克章因河外叛率貴羅族拒官軍熙河經略胡宗回遣河中都監王吉將五百騎討阿章全軍陷沒又遣開封第八將魏釗討之釗亦敗宗回請以种朴知河州朴到州三日宗回馳檄至六七時賊鋒鋭朴不得已出兵墮伏中羌見首尾莫相應朴為羌刺死以馬負尸去羌乘勝追北我師遇隘不可兼行羌以萬騎來薄有王舜臣者善射以弓掛臂獨立有六七羌人厚甲馳騎而來舜臣曰此必羌酋之尤桀黠者今不先發吾軍咸死於此矣乃宣言曰今取最先者引弓一發矢中其面三發殞三人餘三四人返走皆貫其背萬騎洶懼不敢前舜臣因得整軍向敵須臾羌復至舜臣自申及酉發矢千餘無虛發者而舜臣亦血殷至肘矣一公錯鑿講朱當標四城咸在重山中崖壁阻峻惟微徑僅通人行羌既反乃於阻峻處以水溉道滑不可登故漢兵三入三敗熙河將士奪氣無敢復言戰者河岷及諸城寨堡日虞羌至於是青唐道路復不通綽爾結等共立隆贊為主希巴烏第三子也先是朝廷已受賀章惇白上將乘兵勢滅夏國而湟州告急惇意沮又云當復以青唐與溪巴既又聞朴死上下惶駭自經營鄯湟死傷又倍于安西之役關中諸民由此大困而湟州歲費三百餘萬緡涇原經略章楶既應詔發兵將赴熙河即具奏曰苖履姚雄等統兵在邈川等處已五十日兵士暴露未有解嚴之期如李忠傑之子世恭知河州种朴皆已陷沒其他所聞甚多不得不詳悉逐項開說一曰聞青唐道路山谷險峻或言有至險處為棧道通行自河州至青唐約四五百里此後屯戍兵馬既多不知用何人般運糧草應副歲計乞詔有司約計彼處屯數人馬數目並計道路逺近般用合用腳費雇賃錢物及如何措置經營般用并歲計合用若干錢帛糧斛指甚處所應副見今有備與未有備每歲朝廷合添賜若干錢帛一曰伏見興兵以來陜西府庫倉廪儲蓄一空前後撥賜內藏金帛不知幾千萬數而陜西目今處處闕乏糧草轉運司亦無從出惟是行移公文指空畫虛臣竊恐內帑金帛亦是有限今又收復青唐等處大興工役恐非陛下意一曰紹聖四年以後諸路興原闕人未嘗休息臣不原闕以本路言之原闕月未調發兵馬原闕五月半間分屯六月又調發進築定戎寨七月下手工原闕了又移兵應副進築㑹州至八月二十間方回空闕日月又修置正原等處堡子及日近添築烽臺移置堡鋪指立界堠連綿興役未嘗休息今又虛發五千人赴熙河救援臣勘㑹每一出師士卒病患死亡及將帶衣甲逃走數目不少臣為邊臣實難言之然皆係邊防利害願陛下深察十一月立州學三舍法諸州設教授處依太學選補學生歲貢上舍一人內舍二人又詔諸路各選監司一員提舉學事仍令逐郡知通專一掌管十二月夏人納欵先是西方之力已疲而其母梁氏死乾順乃遣人欵塞告哀謝罪請和樞密院言西人近寇涇原狼狽遁歸計窮請命理難便收假令異日許和亦當畫河為界既而遣使三至乃詔呂惠卿諭以謝表止是虛文若將首謀二人先執以獻方敢受表未幾復上表謝罪略曰伏念臣起國禍之基由祖母之世蓋大臣萌僭竊之事故中朝興平伐之師今母氏殞殂姦人誅竄故得因馳哀使附上謝章願追烈祖之前猷特賜曲全之大德願通常貢獲紹先盟詔答曰省所上表具悉爾國亂常歷年于此逮爾母氏復聽姦謀屢興甲兵擾我疆埸天討有罪義何可容今奸黨剗除爾既親政而能抗章别慝冀得自新朕喜爾改圖姑從矜貸已指揮諸路令各處巡綽所至處明立界至并約束城寨兵將如西人不來侵犯不得出兵過界爾亦嚴戒㳂邊首領毋得侵犯邊境俟施行訖遣使進結誓表當議許令收接之至是來上誓表有飭疆吏而永絶爭端諭國人而常遵聖化若違茲約則咎凶再降倘背此盟則基緒非延等語詔答略曰嘉爾自新俯從厥志爾毌爽約朕不食言宜諭國人永遵信誓疆界並依已降詔旨兼邈川青唐已係納土歸順各有久來疆界至今並依漢地及本處部屬有逃叛入夏國者即係漢人其餘一應約束事件並依慶厯五年正月一十二日誓詔施行是年十月夏遣使來賀天寧節後恩禮歲賜悉仍舊例戊辰元符三年春正月上不豫大赦上崩於福寧殿壽二十五在位十五年諡以欽文睿武昭孝廟號哲宗皇弟端王即皇帝位皇太后權同聽政神宗第十一子母曰陳氏紹聖三年進封端王哲宗崩太后哭謂宰執曰皇帝無子事須早定章惇厲聲曰在禮律當立母弟簡王太后曰神宗諸子申王長有目疾次即端王當立惇又曰以年則申王為長論禮律則同母之弟簡王當立太后曰俱是神宗子豈容如此分别兼先帝嘗言端王有福壽又仁孝知樞密院曽布進曰章惇未嘗與衆商量太后聖諭極當左丞蔡卞亦曰當依聖旨中書侍郎許將亦助布惇默然既承命都知梁從政白召五王惇曰且召五王來看諸王尋至端王是日在假太后再遣使召且戒使者王若復辭即扶持上馬以來俄頃王至獨召入太后諭曰先帝無子端王當立王對曰申王兄也固辭太后曰申王有目疾王不須辭王又辭再三太后再三申諭惇等進曰天命所屬大王當為宗廟社稷計上遂即位初梁從政給事皇太妃閣隂以簡王屬章惇至是太后以問從政從政云第問章惇后疑之問曰即惇言非奈何從政曰惇宰相其言安可不從后麾之去上請太后權同處分軍國事太后曰皇帝年長聰明不須如此輔臣皆曰願為國計勉從皇帝所請大赦尊皇后為元符皇后尋又尊皇太妃朱氏為聖瑞皇太妃追尊母貴儀陳氏為皇太妃正月罷增邏卒知開封府吳居厚奏言陛下即位之初京城有妄議朝政者當行止絶乞增置八廂邏卒上曰及朕躬否居厚曰雖不敢指斥然傳播朝廷升㸃將大有更張其語不根上曰如及朕躬容取修省居厚慚謝而退二月立夫人王氏為皇后復鄒浩等官緣浩坐纍者王回等二十六人悉復官或量加恩有差先是曽布言登極大赦非常赦之比竄謫之人延頸以望生還方春夏瘴癘之時早得遷徙為賜實大兼臣嘗蒙聖諭謂鄒浩豈可置之死地如浩萬一不得生還於先朝亦非美事上曰浩擊惇甚力章疏具在惇必未肯便與移叙布曰不若批付三省不必指名但以大赦應牽復移叙之人速具姓名取旨則必不敢緩也上欣納之於是詔浩復官監袁州酒稅回監泉州商稅餘或復官或除落衝替或與堂除差遣斥內侍郝隨劉友端上曽諭曽布曰禁中修造華侈太過墻宇梁柱塗金翠毛一如首飾又作王虛華侈尤甚布曰禁中地窄玉虛誠不須作其他多不知但曽從駕至北郊宣入賜茶次日大行宣諭曰昨日盡見北郊宮殿只是綵繪外面人言使了多少金也上曰不然賜茶處是寢殿前後殿有流盤曲水亭榭無非金翠未幾逐隨與友端布因問故上曰彼自乞宮觀因言營造過當曽見西北角上月榭否布曰亦見之既而聞承極殿後有水心殿地勢極窄所營宫室友端等造作奇巧皇太后太妃皆不曽到上一日令就彼作道場因往進香斥隨友端未使從行既至見其侈麗可驚柱梁椽榱皆作花卉龍鳯之類塗以金翠環繞其上去梁柱皆數寸若飛動狀上令築墻隔出後苑門外仍令毁撤又詔太常少卿孫傑同內侍李慤驅磨隨友端等所領後苑造御前生活所翰林書藝局造御前生活所修萬壽觀本命等殿所收支官物仍令慤先詣逐處封鎖見在官物簿厯及拘收干係人蓋此三所前後所費尤不資友端嘗作一屏風至用象牙二百株後苑作計料一物用金百兩却取千兩以九百兩為備諸皆類此月臺者隨友端等所創也在大內西北隅下瞰水門上初以其華靡詔令毁撤後用日官言但改為奉仙佛像之所云崇寧元年五月提舉後苑修造所言內中殿宇修造合用金箔五十一萬七千片上曰用金箔以飾土木一經靡壞不可復收甚亡謂也其請支金箔內臣令內侍省重行責罰以韓忠彥為門下侍郎給事中劉極言本朝不任八戚以故事誠防微杜漸萬世之長䇿也今忠彥除門下雖出自簡拔臣恐政府援以為例非國之福詔韓琦定䇿元勳忠彥純厚舊德不可以嘉彥故廢宜速書讀行下忠彥見上陳四事以禆政其一曰廣仁恩曰本朝自祖宗以仁德固結人心四方如泰山之安近年執政騖於功利以苛察相髙政太急刑太峻豈社稷之福哉願陛下以仁安天下之心其二闢言路曰諫官御史人主之耳目願陛下求忠直厚重之士親加識擢若敢言有補則行其言用其人其三去疑似曰法無舊新便民則為利人無彼此當材則可用自紹聖以來凡曰元祐之人大則投竄小則退斥願陛下惟是之從惟材之用其四重用兵曰先帝於陜西河東進築城寨數十得地雖廣而不可耕皆永興等路餉之虛內實外民力大困願陛下考用兵以來費幾千萬而所建之地收以為用者其數幾何而邊民父子肝腦塗地與官軍物故者其數又幾何則進築利害皎然見矣謂宜亟罷以惠邊民於是上數下詔蠲天下逋責甄流人忠藎敢言及知名之士稍見叙用矣范純仁等並收叙凡二十餘人悉牽復有差純仁劉奉世呂希純王覿吳安詩韓川唐義問並外司鄧光唐和澧隨安州居住呂希哲希續呂陶鄭佑並宮觀任便居住蘇軾蘇轍劉安世秦觀程頤移亷永衡英峽等州王古楊畏王欽臣范純禮純粹知潤襄兖亳信等州朝補之張耒河中府黃州通判劉唐老武勝軍判官鄒浩黃隱黃庭堅賈易王回並與監當差遣尋詔劉摯梁燾許歸葬摯燾王圭呂大防范祖禹王巖叟劉安世朱光庭諸子並許叙復三月以龔夬為殿中侍御史陳瓘鄒浩左右正言以曽布韓忠彥等薦也上極稱浩且謂布曰浩擊章惇文字待降出翌日乃曰檢尋未足亦有燒毁者矣布因言言路得人政事之首孰不鼓舞但章惇蔡卞不樂正上曰卞今殊無人色布曰瓘夬等久當進為惇等所抑卞無他見不附已者便惡之上曰所謂妬賢嫉能也又曰浩來必與惇理㑹皇太后亦諭忠彥等甚以瓘夬差除為得翌日布對上謂布曰安惇昨言鄒浩不可用恐形迹先帝非孝也朕答云先朝言事官未嘗論事而浩獨敢言莫用不妨惇無以對靣發赤而退又曰王祖道言不當差官驅磨後苑造作等處官物亦以為形迹先帝朕答云主掌財物不明理須究治何與先帝事布曰小人不悅者多此等語不足信更望深察上曰不足信不足信轄正隆贊入見初詔隆贊為河西節度知鄯州如府州折氏世世承襲趙懷義團練使同知湟州懷義乃摩正之子轄戩之孫嘉勒斯賚之嫡曽孫也摩正熙寧間來降賜姓名趙思忠至是隆贊與轄正懼來朝以隆贊為懷逺節度趣令之鄯州轄正為寧逺節度上之召對二人也因從容問隆贊以何術招希巴烏隆贊云希巴烏亦欲繼來但為朗阿章所制若赦阿章之罪招之必易上曰已放其罪矣隆贊曰臣到岷州當遣人諭之若不從即以兵取其首來上曰招誘為善不須殺也尋賜隆贊姓趙名懷德陜西運判秦希甫奏云熙河既受轄正之降以兵至青唐即求唃氏之後或只令隆贊承襲方合人心據地理從河州至湟州二百四十五里道路險隘不通車乘惟是頭口䭾載人夫擔負瓦吹峽中多遇寇掠道無宿頓人無飲食畜無芻秣雇到頭䭾及管押之人如赴死地即令欲全而歸已是難事緣鄯州招下新羌萬餘人若一離本處皆為讎敵欲望朝廷早追隆贊及三僞公王入鄯州分付降羌令自循撫求故主溫溪心之後守湟州徐議引去尚為小全之計三省進呈㑹布請馳送胡宗愈及希甫體度可守可棄聞奏布因言青唐本以國人不平阿里庫父子篡位故逐轄正而立隆贊邊臣因而欲有其地臣自初事即力爭以為不可及轄正隆贊相繼出降宰相率百官稱賀建置鄯州臣不復啓口然西番尋叛亦纍於大行前陳此事本不可為但業已建置州郡頒告天下百官四方上表稱慶一旦棄之取笑中外今於不得已之中但當盡力醫治拯救若鄯州不可守猶當西守湟州東建洮州以相維持且以成神宗以熙河岷為一路詔旨其後賊愈猖獗至覆軍沒將遂降旨以隆贊為河西節度使知鄯州與王贍同為隴在都護然希巴烏尚在隆贊父子恐未肯聽命亦纍下胡宗愈秦希甫令具鄯州合棄守利害聞奏今更責以果決指定棄守事上曰如此行遣亦已盡矣布又曰自紹聖以來經營邊事進築城寨五十餘所無不如意臨末作此一事至今狼狽支當不下無如之何求直言以太史豫言四月日食故也奉議郎鍾出美應詔上書乞復熙寧紹聖故事父為神考道過百王庶事具舉沒猶未久而匹夫之臣相與誣毁傳播當年曾不及中材庸主哲宗振起斯文六七年間天下大治復見熙豐之盛不折尺箠而西羌納土不勤師旅而盡復故疆若謂神考不當創法先帝不當追述則何以致巍巍赫赫之功若謂元祐改更而當則何以致官府廢墜財用匱乏京師纍月氷雪河朔連年災荒西賊長驅寇邊如入無人之境臣嘗至西塞備見元祐削弱之患直可䀌傷而歎息也奉議郎范柔中上書言亦多詆紹聖併及熙豐之政云却玉器永興民王懷所進也詔却之賑河北饑詔常平司先撥賜米四十五萬石給水災州郡若有餘數民食尚艱即令減價出糶並候二麥成熟日罷夏四月丁酉朔日有食之棄鄯州初轄正徙居青唐新城為其下所逐尋削髮為僧及其子來降于宗哥城首領森摩欽戩棟戩疏族希巴烏次子也迎隆贊入居之隆贊尋以青唐來降至是路梗羌酋復共立小隆贊為主詔王贍棄鄯州引兵歸湟州仍諭希巴烏或小隆贊依舊主青唐當議授以河西留後尋又詔熙河經略胡宗回追還王贍宗回遣知河州姚雄發兵往鄯州四戰獲捷與贍拔軍還河州詔加雄防禦使兼熙河蘭㑹路鈐轄依前知河州初令招諭朗阿章希巴烏等早令歸順方雄之出師也議者謂各路精兵悉在鄯州雄所將兵不過二萬大半老弱創病加以种朴魏釗敗亡之後兵將氣奪其勢難用苐顧吐蕃出何䇿耳若塞省章之險於要害處立壘以斷我路則雄雖有韓白之略師莫能前更以兵守青唐宗哥安原闕則贍軍原闕由得出原闕以待外援不至城中食盡則不戰自斃上䇿也若原闕章原闕遮絶軍路雄前不能越青唐而後無援兵繼續雄原闕無計必轉戰以求生此中䇿也若不得省章之險於平原邀戰則雄軍得出矣此下䇿也然吐蕃桀黠之酋已盡新用人無逺謀其䇿必出中下後五日湟州報羌已度省章並無一人守禦止於峽外川水邀戰我軍既出峽自嶺鼓譟馳下一擊而潰羌以前軍既敗悉撤諸城守併兵迎我軍我諸城聞援兵來亦咸出師相應羌人腹背受敵于是雄每戰必捷直抵青唐合王贍軍棄鄯州而歸屯河州自省章峽以西皆捐之諸羌遂奉小隆贊入青唐居之蔡京復翰林承旨京自承旨出知太原未赴有旨復職曽布力言京卞懷姦害政善類義不與之並立上慰諭曰太后欲令了神宗史事及至簾前具以京事開陳太后不納布曰如此臣不敢安位太后曰干樞密甚事布曰君子小人不可同處臣在先朝嘗有去意今日以太后聽政皇帝踐阼政事皆合人心以此亦欲自竭事既一變臣何可安太后曰不變只是教他做翰林學士了却神宗史事布力陳不已太后曰且耐辛苦乃遣之亦可也布曰臣為朝廷分别邪正此事所係不細既而報辰正牌太后又曰日色已晚遂退時中書舍人徐績亦與修史乃言正史久未成書良由元祐紹聖史官好惡不同范祖禹等專主司馬光家藏記事蔡京兄弟又用王安石日録各為之說以致紛紛不已宜盡取大臣家藏記録考核是非以成一朝大典從之初命京校五朝寶訓以備經筵殿中侍御史龔夬言祖宗寶訓已嘗進讀臣慮京增以已意必誤聖學乃下前旨京尋言非敢有所改也但欲增神宗故事為六朝寶訓詔從之時上未有逐京意而京因草制得進見數為上言繼述事上嘗搖手示京曰朕盡解此獨母后之意未聽卿姑待焉以韓忠彥為右僕射兼中書侍郎李清臣門下侍郎大赦以皇長子生也尋賜名桓赦書有解網恤辜何俟終日之語范純仁等二十五人原闕叙純原闕昌劉奉世宫觀許歸陳州王覿韓川呂希純原闕宫觀任便居住王欽臣知潁昌原闕官依舊知襄州原闕陶張耒劉當時並與知州呂希純原闕賈易並與小郡劉唐老黃隱並與堂除知軍朝補之與堂除通判黃庭堅與堂除簽判蘇軾蘇轍劉安世秦觀移永嶽鼎衡州居住程頤復官任便居住鄭俠放還安惇罷自中丞出知潭州以其嘗論鄒浩罪惡及言浩不可用故也先是左正言陳瓘言陛下欲開言路首還鄒浩取其有既往之善可謂得已試之才允合人心無可救正而聞御史中丞安惇尚緣往事論浩罪惡欲寢已成之命自明前舉之當安惇又常言鄒浩是先朝所棄不當復用國是所係不可輕改臣竊惟是非之心人皆有之古聖王以百姓之心為心故朝廷之所謂是非者乃天下之公是非也是以國是之說其文不載于二典其事不出于三代惟楚莊王之所以問孫叔敖者乃戰國一時之事非堯舜之法也然其言曰夏桀商紂不定國是而合其取舍者為是不合其取舍者為非則是孫叔敖之意亦不敢以取舍之私而害天下之公是非也若是取舍簡擇一以私意合我者是異我者非此楚莊所不敢也豈聖時所宜用哉因録國是故事上之又言鄒浩盡忠之言以愛君憂國為心先帝一時之怒無終絶言者之意惇居風憲理當助浩默而坐視愧責已多況如前日之所為者乎極天下公議所非以為國是極人臣不改之孝以為善述昔以誤朝今以非上原情定罪安可已乎伏望檢㑹前奏早賜施行惇聞瓘章已出亦自請去故有自命是秋瓘復言鍾正甫頃為廣東運判親往新州追攝本州羈管日前諫官鄒浩就獄根勘賓客往來饋遺等事偶㑹大赦釋免竊推浩以言事得罪於親戚故舊往來賙恤之義朝廷未嘗有旨禁絶而新州所劾與御史臺羅織之獄萬里相應欲置浩於必死其為忍酷不已甚乎然議者以為造意為虐者非正甫也欲望令正甫供原闕所承受御史臺文務如何指揮本路如何奏承但考兩處行遣次第則造意為虐者得其人矣詔安惇落待制依舊知潭州正甫與御史左原闕射韓原闕與合入差原闕編類原闕取其語原闕為謗原闕今陛下又求直言若原闕士必懷懼臣原闕陛下亟詔罷局於是詔取以入且面諭忠彥等曰已焚之矣賜舉人第賜李釜以下五百餘人及第出身有差五月竄王贍于房州姚雄奏稱青唐邈川始因王贍貪功生事招携羌酋收復窮逺之地費財勞師連歲不解幾陷兩路軍馬煩朝廷遣兵救應僅能全師而還樞密院勘㑹王贍前後傲慢專輒情實難恕兼纍據臣僚奏王贍王厚自據青唐邈川其揀戩轄正珍寶及府庫錢物並不即時起置文歷森摩欽戩等九人既已處置其逐家財産亦不見下落以此顯見二人各有侵盜迹狀分明緣事干人衆更不欲置獄推究乞貶贍及厚仍告諭將士咸使知之故有是命越明年三月流贍昌化軍至鄧州縊死王厚郴州安置太原等地震復廢后孟氏為元祐皇后初孟氏之廢也哲宗有悔悟之意嘗曰章惇壞我名節至是朝廷推行遺意適有布衣上書請復瑶華者遂命以官上因韓忠彥曲謝乃諭以復瑶華之事又諭宰執召入禁中却降麻免令張皇衆稱善遂詔瑶華廢后纍經大霈其議復位號於是左正言陳瓘言紹聖大臣以繼述神考為說以讎毁宣仁為心而瑶華乃宣仁所厚又於先帝本無間隙萬一瑶華有預政之時則元祐之事必復是以過為之慮若刈草而去其根則孟氏安得不廢朝廷赦宥為罪人而設掖庭祕獄治世所無今若以為過而均之赦宥以是廢興動與衆同科慢而不嚴於體未順且瑶華前日得罪而外議籍籍皆以為先帝有悔悟之言審如此則皇太后下一詔書明白其事陛下付外庭使議典禮縱令遂非之人自護其短安敢以先帝之言為不然乎不報既而瑶華廢后用犢車還宮中太后遣人以冠服易其道衣乃入中外聞者歡呼初上命蔣之竒進入所受太后立元符皇后手詔太后謂輔臣曰此乃劉友端所原闕輔臣復對曽布曰原闕問章惇惇遽云原闕固有名原闕上則章先帝之原闕以叔廢嫂未順原闕等議皆以兩存為便太后亦以原闕略曰雖元符原闕號已正位於中宮然永泰上賓固無嫌於並后置平準務改市易務為之蔡卞罷出知江寧府臺諫官龔夬陳瓘任伯雨皆言尚書左丞蔡卞過惡夬曰卞為安石之壻妄謂盡得其學以欺朝廷而一時嗜利者助成其說今乃參政預機清議沸騰望重黜之瓘曰章惇前日所為皆卞教之卞以繼述神宗為名以纂紹安石為主立私門之好惡以為國是奪宗廟之大美以歸私史又曰惇迹易明卞心難見春秋責意則難見之罪安所逃乎伯雨曰卞之罪有過于惇如誣罔宣仁聖烈保佑之功傅致元祐皇后疑似之罪安惇作理訴所而士大夫得罪者八百三十家蹇序辰編排章疏而語言被罪者數十人先帝親政六年未嘗有失獨此數事皆卞為之一日宰執奏事上曰臺諫攻卞已十餘章何以使卞知之衆未對上曰只付與章惇則卞自知矣惇令吳伯舉諭旨於卞卞乃請去遂有除職與郡之命築寧川堡時熙河方修湟川膔哥一帶堡寨曽布曰外議多謂湟州難守臣謂若併棄之則必為夏賊所有兼得湟州皆不能守豈不取輕夷狄自紹聖進築邊城深入西賊巢穴如㑹州正扼其右廂兵馬道路如天都淺井之類亦使賊不得㸃集而致其死命今新疆正宜固守若破壞一處則邊計可憂上然之既而膔哥堡賜與今名自後進築不盡録增太廟為九室祔哲宗不祧宣祖初翰林學士曽鞏等議祧宣祖禮部侍郎趙挺之言有天下者事七世謂考廟而上本朝至英宗始備七廟之數以僖祖為太祖順祖下六朝為三昭三穆太祖之廟百世不毁昭穆親盡則遷故仁宗即位則遷順祖哲宗即位則遷翼祖今上與哲宗皆神考之子豈復可遷門下侍郎李清臣以挺之言為是詔從之追復文彥博司馬光等官原闕凡三十三人原闕僕射韓忠彥白上以元祐原闕殊未甄復原闕當出自上意而原闕推是原闕祐原闕尚未被澤乞賜原闕元臣故老原闕中愍澤之頒豈容獨後原闕孰慰幽魂故彥原闕呂大防劉摯韓維梁燾司馬光呂公著孫固傳堯俞趙瞻鄭雍王巖叟范祖禹趙彥若錢協顧臨趙君錫李之純呂大忠鮮于侁孔武仲姚勔盛陶趙卨孫覺杜純孔文仲朱光庭李周張茂則髙士英孫升追復內彥博維悉復官職光公著大防等止復官燾摯比舊猶降一官罷𣙜廣西茶六月詔以坊場錢輸內藏歲以百萬緡為額貶邢恕均州居住左正言陳瓘言新知荆南邢恕頃誣司馬光劉摯梁燾等幾至滅族公議不容久矣宜定其罪於是韓忠彥請改撰司馬光等誥命上曰但以貶恕告詞中載此意則天下皆知之矣責詞略曰忠佞辨則內外肅是非公則勸沮行爾操心傾危曲意附㑹造為飛語上纍宣仁矧爾於光公著二人實門下士一旦下石孰謂虛言先是曽布嘗奏云紹聖中以光謀廢立天下皆以為寃至於變亂神宗法度豈得謂無罪臣嘗謂恕之言頗公上因言大臣中及論事者各有所偏布又言元祐人憤熙豐之人一切擯去已失之偏紹聖人病元祐之人故竄斥廢黜其偏益甚矣今陛下方欲調停兩黨但當區别使之邪正各得其所若但知復元祐黜紹聖則不免又偏矣如是則與元祐紹聖何以異然臣纍聞聖訓謂無論熙豐元祐紹聖但是者則用不是者不用更不分彼此若人臣能體此意無不當者秋七月朔太后還政召范純仁純仁初有分司之命太后遣中使抵永州賜銀合茶藥宣諭慰勞甚渥行次鄂州又復故官宫觀于是召令赴闕蓋將以為相也然純仁時已病矣未幾聽歸潁昌熒惑犯房心左正言陳瓘言咸平元年二月彗出營室北真宗謂大臣曰其祥安在呂端等曰變在齊魯之分真宗曰朕以天下為憂豈獨一方耶其年原闕李汸原闕人天下原闕謂賢也舉天下之原闕銷變之道如此而已原闕事所原闕人心則合天心矣漢元原闕之周堪張猛原闕之張議論交戰邪正未決當此之時有夏寒日眚之變而許史之徒以為堪猛用事之咎於是勢孤者危有力者勝臣嘗以謂天下大器也譬如一舟舟平則安舟偏則危自紹聖以來宰舟之人實右而虛左舟勢不平幾于傾覆觀者膽落亦已久矣陛下即位以來好平惡偏損諸右而遷之左十損一二舟勢尚偏臣願陛下察用偏同濟之人探旁觀膽落之語廣諏博訪而審其所以然也且天文之變昭示天下已數日矣惟京師隂雨見之最晚則是逺方之所知而陛下有所未知也況房星為宋之分野大星乃天房之位前星乃太子之位今幸未凌犯願陛下頓思所以銷弭之道右正言鄒浩言仁宗嘗謂輔臣曰事之將兆天當其象又曰事將萌而天象先見蓋人事在下氣積于上積衆人之氣而先見猶人之五臟有病而氣色見于面矣非仁宗神聖豈能及此此人主所當遵用也八月作景靈西宮初景靈宮神宗未有館御而居英宗之後殿及哲宗崩又無以處之蔡京言若謂宮東迫民居難展宜即其西對御道立西宮首奉神宗館御而哲宗次之右僕射韓忠彥以下亦請立西宮以奉神宗詔恭依且命户部尚書李南公總其役右正言陳瓘言其不可者五蓋國之神位在宗廟故神宗建原廟于左今乃在西不合禮經一也唐徐嶠言大理寺殺氣盈而鳥雀不敢攖今即其基則非善地二也雖移官舍不動民居而大理寺軍器監及元豐庫儀鸞司皆遷于他處則彼亦有居民不知遣幾家而後可就三也前者以祖宗神御散在寺觀故合于一宮今乃析為兩處則鑾輿酌獻分詣禮繁四也夫孝貴寧神自奉安於顯慶殿既變且久不宜輕動五也瓘章纍上且論京之矯誣卒不能易出內庫金帛助邊出內庫金帛二百萬緡助陜西糴軍儲自後不復盡録葬哲宗於永泰陵九月幸龍德宮觀芝原闕親原闕邸名曰龍德宮至是臨幸中丞曹原闕宗廟不當原闕臨幸上指御袍曰服色如此可原闕廟原闕言陳瓘言伏聞原闕為將幸蔡王外第都下之人老幼相傳歡呼鼓舞願瞻天表人心所歸於此可見然聞欲因幸龍德宮而傳者以為欲觀芝草竊惟陛下即位以來天下豐稔慶瑞已多芝草雖異臣知不足以動聖意也況自祖宗以來乘輿初出必正其名若非為民祈禱即因謁見宗廟今乘輿之出固有名矣因幸潛宮似為不可然而觀芝草之嫌亦不可不恤也此而不恤則流傳寖廣天下之人將有不逺萬里而獻芝者矣殿中侍御史陳師錫亦以為言並不報章惇罷先是哲宗靈駕發引至鞏縣遇雨山陵使章惇先就幕火大升輿陷于淖中臣僚不復隨後自旦至夜二膳不時進竟露宿野次時元祐皇后從行章惇請先住宿頓后不從亦暴露雨中既侍御史陳次升言惇自登仕路任私害物奉使山陵措置乖謬左正言陳瓘言惇獨相八年迷國誤朝罪不可數奉使失職事于泰陵於是惇乞罷政上謂宰執曰章惇求去乞越州當與之朕不以定䇿貶惇只緣奉哲宗靈駕不職纍有彈章朕不敢已遂命以特進知越州詔仁宗神宗廟永不祧貶蔡卞太平州居住初中丞豐稷入對學士承旨蔡京于殿陛間揖稷曰天子自外服召公為中司今日必有髙論稷正色答曰行自知之至是與殿中侍御史陳師錫共言京姦惡稷曰京身為禁從外結后族交締東朝伏望獨斷出之於外師錫曰若果用京則治亂自此分矣祖宗基業自此壞矣師錫又言資政殿學士知江寧府蔡卞與京兄弟同惡迷國誤朝為害甚大乞正典刑又言向宗良宗回亦隂為京遊揚進列要路是皆國之深患臣非自愛而憂之蓋為陛下憂為宗廟憂為天下賢人君子憂若黜京等於外則讒言不入於宫闈聖慮可忘於憂患實宗社之福也稷與師錫登對上曰此礙東朝卿當熟慮稷云臣請自奏東朝遂云自古母后臨朝未有手書還政如聖母原闕德原闕令外聞向宗原闕勢妄作內則惟原闕然而蔡京原闕等而黜京原闕亦奏疏東朝委曲原闕論原闕報原闕有是命殿原闕龔夬言臣伏聞蔡卞落職原闕平居原闕惡民原闕有云二蔡一惇必定滅門籍沒家財禁錮子孫又曰大惇小惇入地無門大原闕不可欺如此又言京在原闕先差擾數日而辨及紹聖原闕朝廷與京表裡相濟原闕人反原闕陳瓘罷原闕以為萬幾之事黜陟差除皇太后至今與也良由中外關通未有禁戒故好事之人得以益傳耳上批陳瓘纍言太后尚與國事言多虛誕不根可送吏部與合入差遣三省請以瓘為郡上不可添差監揚州糧料院瓘初不知被責復求見上閣門不許瓘即具以劄子繳進其一再論景靈西宮其二論章惇罷相制所稱國是其三其四皆指陳蔡京罪惡其言京云國之大事無過宗廟可傳萬世無過信史今京以矯誣之言唱西宮之事妄託先訓以惑上下自改日録以實其說朝廷遂其語欲遷神考于西宮豈非朝廷大政委曲遷就為一京地乎京在紹聖親入文字請滅劉摯等家族其言所以不行者哲宗之大惠也今哲宗之大惠不聞于天下而京復自謂有究治平反之功欲使天下皆謂哲宗有濫誅之意而京有及物之仁始則為國生事以復私讎今則歸過先朝以圖自利前原闕計亦行豈非以朝廷大政委曲遷就原闕二京之地原闕述神宗欽承哲宗至德原闕為懼矣以言為戒則依舊緘默以進為原闕則甘于沉原闕公議與親政之初漸不侔矣京之計䇿一行人之向背漸異為京之羽翼者漸多為陛下之耳目者漸少朝廷之威自此而漸弛䝉蔽之患自此而漸成安危治亂漸可卜矣又昔者唐明皇欲用牛仙客為尚書而張九齡以為不可明皇變色曰事皆由卿耶李林甫曰仙客宰相才也何有尚書九齡書生不達大體由是明皇悅林甫之言卒相仙客而九齡自此寖疏終見黜罷今忠彥及布無九齡之望而京之氣熖過于仙客因勢觀望而為林甫之言者不知幾何人崔羣謂唐之治亂在林甫九齡進退之時今京輕欺先帝與卞無異而人歸過于宣烈賣禍于惇卞曲為自安之計而陛下果留之也今既可以留後亦可以大用天下治亂之勢係于一京崔羣之言可不念耶臣恐後視今亦猶今之視昔治亂之機不可以不早辨也翌日復有旨除瓘知無為軍瓘即露章辭免云蔡京關通交結其勢益牢廣布腹心羽翼成就愚㺯朝廷有如兒戲陛下若不早悟漸成孤立後雖慎之亦無及矣陛下若以臣言為是則當如臣所請按京之罪明正典刑然後改臣差遣以示聽納若以臣言為非則是臣事發更重其罪益大重加貶竄乃得允當詔不許辭免差遣上嘗諭宰執曰瓘言事極不可得暫貶亦不久前日遣人送黃金百兩瓘受賜泣下布曰陛下待遇如此宜其感泣也未幾翰林學士曽肇亦上書其略云臣近曽論貶逐諫官陳瓘乞太后特下手詔留瓘舊職未䝉聽納臣竊以為瓘言雖犯其意則忠原闕則瓘以疏逺小臣妄議宮闈之事披寫腹心無所顧忌此臣原闕太后有援立聖明不世之大功有前期歸政過人之盛德原闕房闥不與外事人無間言本末相稱原闕議則於清躬不能無纍故瓘以愛君原闕必須關白凡章疏亦須呈單子來取看原闕甚已而陳瓘論裴彥臣等交通內外太后怒原闕再拜乞貶瓘而怒偏不解左右近習或請擢原闕庶可解太后之怒羣臣皆莫敢言肇既先上書與王詵俱入對初留身而上遽及之且曰卿文字但救陳瓘無補于事當更論東朝事乃有補耳又曰聞樞密人待著文字肇初不曉詵曰得非曽布欲有所陳上曰然又謂肇曰東朝往往已有人覘伺於此矣曽布遂上疏太后開陳甚至未幾布入對欲詢前所言未及啓口上遽曰前日文字極好太后亦不怒但曰巧飾語言只未說我不是文字且留待併肇文字總收却布因問近更與事否上曰如故又曰皇太后言待更來煎迫即不能管得布唯唯冬十月蔡京罷知永興軍長安闕帥欲遣京韓忠彥以為當遣曽布曰京之出天下所同欲自善原闕東太后不勝其怒臣自此不敢復啓口聖意如原闕上曰原闕只是太后怒朕元不主張近日陳瓘有原闕交通近習之狀却有簡與裴彥臣云且煩于太后前主張保全朕前逐馮說亦只為京布曰聞王詵嘗向人說既去却馮說奈元長何今聞聖諭則此言不虛矣京立朝如此以理言之何可使之不去但以形迹東朝且令補外亦可也竄章惇惇既罷相知越州陳瓘論其責輕於是中書省檢㑹原闕并臣僚上言云惇編類章疏看詳訴理受禍千餘家凡士民暗昧言語加以刀棓釘手足剝皮膚斬頸原闕古之刑責授武昌節度副使潭州安置責詞略曰先帝天資仁孝勤儉原闕惻怛及爾輔政日肆誕謾凡陳開導之原闕事隂原闕仇怨妄肆中傷或稱圖危上躬或託原闕若孤豚原闕斥搢紳棄如斷梗投之荒原闕徒原闕者不得原闕葬援引姦黨布原闕有司原闕望原闕道原闕為之原闕以韓忠彥為尚書左僕射曽布為尚書右僕射以豐稷為工部尚書布之相也御史中丞豐稷欲率原闕尚書以王覿為中丞稷力請補外不允謝表原闕成原闕方剡於奏章之語上問佞人為原闕曰曽布陛下斥布則天下事定矣詔增損役法先是鄒浩言臣近自廣東赴闕㳂路見官吏多稱役法尚有不便望隨宜修之王右亦言神宗創法有未便者皆許陳述未嘗禁人議論而比年凡及役事必加以詆毁變亂以故人莫敢言今乞下之諸路具合增損事以聞庶全良法從之下紹述詔詔略曰朕惟神考新一代之典刑以遺我後人而間者任事之臣用心或過朕所不取朕于為政用人無原闕之間斟酌損益惟義所在嘉與有位共圖康功以成紹原闕今有曲學偏見原闕意改作規害國事原闕罷平凖務尚書省言平凖務月置官吏等給費太多並遣官出外市物騷擾所治近年官賣石灰市直增不便于細民詔罷平凖務及官買石灰十一月貶蔡京蔡卞豐稷陳次升等再言知江寧府蔡京姦惡詔落端明殿學士提舉洞霄宫居杭州卞為太中大夫依舊太平州居住輔臣謂卞責太輕後十日再降官池州居住以王覿為翰林學士覿以上方鋭意圖治任事者不能以達孝之義開說因疏言堯舜禹相授一道考之方册則四凶在朝堯未能去而舜去之元凱在下堯未能舉而舜舉之有苖弗率舜禹原闕事不必盡同也武王周公所謂達原闕事者也文王作豐邑武王不居豐而作鎬邑文原闕不原闕澤梁無禁周公相成王則關市有征原闕孝與善繼善者也神原闕作法於前子原闕也至於時異事殊原闕一者損益之原闕恐復有營私原闕欲主其言以原闕謂紹復宣烈非臣等不可則引用私蔽隔原闕俊原闕名繼原闕而實以肆其奸焉輕狂盜刑名詔狂盜犯贓應絞者贓數並增一倍贓滿不曽傷人而情理輕者原闕復春秋博士陜西兼行銅鐵錢九朝編年卷二十五
