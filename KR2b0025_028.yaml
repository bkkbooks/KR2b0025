body:
  text: 九朝編年備要卷二十八宋陳均撰徽宗皇帝起辛卯政和元年止己亥宣和元年辛卯政和元年春正月毁京師淫祠凡一千三百餘區夏四月張商英罷大觀間天文屢變上意恐甚逐蔡京於杭州四方相賀及商英相不知平心用人故侍從臺諫官爭設智以陷之會上眷益衰言者乞逐商英愈急意上必有所主不知商英既去而京復來矣中丞張克公又言商英嘗毁謗先烈比中宮建立陰懷異意又引黨人陳瓘龔夬鄒浩之徒使上書且以己意令其客唐庚諷臺諌擊善良縱中書吏漏泄命令納結近臣務使更革以鼓動天下凡數罪而給事中蔡嶷亦助克公排之乃除商英觀文殿大學士知河南府尋落職知鄧州秋九月鄭允中童貫使遼尋以李良嗣來獻取燕䇿詔賜姓趙貫既得志於西邊遂謂北邊亦可圖嘗自請覘遼又託遼使蕭至忠言遼主欲識其面上信以為然故特命允中以端明充使往賀生辰而貫以節度使副之皆非故事也蔡京時在杭州聞貫出使亟附奏曰貫前日克敵藉成算耳貫威名既傳宜深藏之使莫測可也奈何遽遣出疆上報京曰遼主欲此彼既來要我因遂覘之不亦可乎貫至遼庭其君臣相聚指笑曰南朝人才如此然遼主方縱肆貪得中國玉帛玩好而貫所齎皆極珍竒至運二浙髹藤之具火閣書匱床椅等往遺之遼主所以遺貫者亦稱是蓋互相誇尚富侈而已貫使歸至盧溝河有燕人馬植者得罪於燕無所容遂見貫侍者陳有滅燕之䇿貫大竒之因携歸改姓李名良嗣薦於上遂賜姓趙後遼人數移徵索之諱不與復燕之議蓋始此去嵗給事中王漢之使遼歸言遼主不務恤民而惟掊剝是好上下荒淫其相李儼亦恬於目前不為逺計其亡可待遂除吏部侍郎再竄陳瓘王安石嘗著日録八十卷瓘初謂安石此書詆訕宗廟誣薄神考蓋著撰在退居鍾山懟謗君上之時讀其書論其事不考其時可乎及瓘貶亷州乃著合浦尊堯集以日録詆訕之罪歸於蔡卞其後北歸謂劉安世曰昨在諫省嘗以王荆公比伊尹伊尹未嘗詆湯胡可比也又嘗以為神考之師神考用荆公止九載何嘗終以其人為是乎瓘之前言可謂過矣於是復著四明尊堯集痛絶王氏以發揚熙寧用舍宰臣本末之緒而自明區區改過之心尊堯所以立名者蓋以神考為堯以主上為舜而助舜尊堯也書成藏之於家及是奏張商英已罷何執中乃請治尊堯集詆誣罪勒停台州羈管尋移楚州冬十月竄張商英初商英有時望而武安節度使郭天信於上前稱道之商英亦欲借助遂相結納使將仕郎俞負及僧惠洪達其語言時商英稍裁抑宦寺間言浸入蔡京之黨乘上意於商英寖衰因論商英與天信交通漏泄省中語且言天信先開其端於內俟上之動息以報乃從外庭決之莫不如意商英既罷鄭居中等惡商英請推究之張克公亦亟論商英與天信交通狀事下開封獄具商英衡州安置天信貶新州負惠洪皆逺配商英在元祐時作嘉禾頌以文彥博呂公著比周公又作文祭司馬光極其稱美後乃追論其罪至以宣仁比吕武蔡京強置黨籍中天下既共惡京而商英與異論以故天下皆翕然推重云宣和三年冬卒於京南時陳瓘寓山陽方與客會食聞之遽止酒而起嘆傷久之客有以為疑者瓘曰張固非粹德且復材疏然時人歸之今其云亡絶人望矣近觀天時人事必有變革正恐雖有盛德未必孚上下之聽殆難濟也壬辰政和二年春二月蔡京復太師賜第京師三月親試舉人賜莫儔以下七百餘人進士及第出身有差賜詩改賜針云初御史李章言作詩害經術自陶潛至李杜皆遭譏詆詔送敕局立法宰臣何執中遂請禁人習詩賦至是故賜針未幾知樞密院吳居厚侍御筵進詩改為口號後聖作屢出士大夫亦不復守禁矣先是御筆付知舉蔡嶷士人程文有譏誣先烈動搖國是以害紹述並簽帖真卷進入當痛懲戒尋御批潮州貢士林伯逺試䇿雖已黜落議論不正有害學術屏出學編管永州知舉蔡嶷以下降斥有差夏四月燕蔡京內苑輔臣親王皆與上親為之詔略曰詔有司掃除內苑太清樓滌內府所藏珍用之器集四方之美味前期閲集親幸其所用宫中女樂列奏於庭命子楷侍側勸勞又出嬪女鼓琴玩舞勸以琉璃瑪瑙白玉之杯京亦上記略曰太清之燕上曰此跬步至宣和令子攸掖入觀焉東入小花徑南度碧蘆叢又東入便門至宣和殿只三楹左右掖亦三楹中置圖書筆硯古鼎彛罍先陳几案牀榻東西廡側各有殿亦三楹東曰瓊蘭積石為山峯巒間出有泉出石竇注於沼此有御札靜宇榜梁間以洗心滌慮西曰凝芳東曰積翠南曰瓊林北有洞曰玉宇石自壁隱出嶄嵓峻立竒花異木扶疏茂密後有沼曰環碧兩傍有亭曰臨漪華渚治次有山殿曰雲華閣曰太寧石右躡道以登中道有亭曰琳霄垂雲騫鳯層巒百尺髙峻仰視峭壁攢峯如深山大壑次曰會春閣下有殿曰玊華前殿之側有御榜曰三洞瓊文之殿以奉髙真有種玊緑雲軒相峙日午謁者引宰執以下入女童四百靴袍玉帶列排場下肅然無敢謦咳者宫人珠籠中立束帶秉扇拂壺巾劍鉞持香毬擁御座以次立亦莫敢離行失次者上顧謂羣臣承平無事君臣同樂宜略去苛禮飲食坐次當自便無間執事者以寶器進上酌酒以賜命皇太子嘉王楷宣勸又以惠山泉建溪異毫命烹新貢太平佳瑞茶飲之上曰日未晡可令奏樂殿上笙竽琵琶箜篌方響筝簫登陛合奏宫娥妙舞上又曰可起觀羣臣憑欄以觀又命宫娥撫琴擘阮已而羣臣皆盡醉禁史學從監察御史李彥章之請也詔士勿兼習史學初翰林學士蔡嶷等請令人復試時務䇿參以漢唐歷代為問至是令寢前詔勿行罷鬻官田范坦等坐獻鬻田之䇿安置廣州五月却羡餘貢利州路轉運副使張臣獻羡餘三十萬緡為言者所論詔特罷之尋除名編管池州蔡京落致仕赴都堂議事三日一至都堂罷科舉秋八月焚元祐制詞九月改官名以太宰易左右僕射詔以太師太傅太保為三公少師少傅少保為三孤以左輔右輔太宰少宰易侍中中書令左右僕射之名舊以太尉司徒司空為三公及尚書置令並罷又詔武選官稱以通侍正侍中侍中亮中衛左武右武大夫易內客省延福宮景福殿客省引進四方館東西上閣門使凡七階中亮中衛郎易客省引進副使左武右武郎易東西上閣門副使凡四階並為橫行以武功武德武顯武節武略武經武義武翼大夫易皇城至供備庫使凡八階以武功武德武顯武節武略武經武義武翼郎易副使亦八階為大使臣故內殿承制至三班借職為敦武修武從義秉義中訓中翊成忠保義承節承信郎進武進義校尉凡十二階為小使臣軍將等為進武進義副尉守闕進義副尉凡三階殿侍為下班祗應醫官亦易為成全保和保安大夫成全保和保安郎又詔太尉係古官舊掌武事名稱已改為武選一品位在節度使之上其儀物班序居執政之次尋又罷婦人封郡縣君立夫人至孺人凡八等六年詔假將仕郎去假字假承務郎為登仕郎假承奉承事為從事舊將仕為迪功舊登仕為修職舊通仕為從政餘並仍舊通為十階又詔於武臣橫行內增親衛翊衛拱衛協忠履正宣正大夫通舊為十三階郎亦如之惟不置通侍改諸州幕職判司置六曹參軍并掾以郡大小事繁簡而定其員數凡添五百四十一員以革員多闕少之弊時四選官凡四萬三千有竒而闕止一萬四千有竒冬十一月戊寅日南至御大慶殿受元圭大赦內臣談稹經營河東邊事至晉州得異物於民間似石非石似銅非銅長尺餘濶寸餘厚二三分色赤黑首末素質中有古篆籀文其上兩傍橫出兩尖如雲氣之狀莫知何物也稹歸以古物進蔡京見之謂此為元圭即天錫禹者晉堯所都也遂令守臣呂公雅奏陳公雅又尋得石文隱約四字曰天正堯瑞於是行大朝會禮受圭於正衙大赦天下赦文云錫乃元圭維時大寶內赤外黑上鋭下方藴隂陽之全精體乾坤之盛德溫潤而澤有雲行雨施之文追琢其章著地平天成之象或言此圭乃開德府通判王景文家藏舊物獻之於朝景文遂有增秩與郡之命蔡京進封魯國公何執中進少傅改太宰仍兼門下侍郎行給地牧馬法初熙寧中嘗詔給地牧馬才行於陜西未幾而止是年詔復行之先自京東河北以舊牧地募人養馬然後推之於諸路受田一頃仍蠲其稅令牧馬一萬諸路至九萬匹宣和二年罷之以民户所養馬填闕馬禁軍五年復給地牧馬法癸巳政和三年春正月王安石追封舒王尋詔封其子雱為臨川伯配享文宣王廟後改從祀二月崇恩太后劉氏暴崩后負其才每曰章獻明肅大誤矣何不裹起幞頭出臨百官上嘗謂蔡京曰朕前日大病那箇便有垂簾意那箇者謂后也又曰朕不得不關防使人當殿門與之劒若非宣召勿問何人入門者便斬之至是后以不謹無疾而崩死之日天為黃霾異常始事覺上諭輔臣以后不謹且重曰不幸京曰宮禁比修造多凡事失防護宜有此等且古今自有故事不足煩聖心憂悶何執中忽進曰太后左右願陛下多置人侍奉以婦人女子加之愧懼萬一不虞則陛下不可負殺嫂之名也上愕然因曰不欲即此決之晚當召卿來議晚果復召輔臣既入殿議將廢之而太后已崩蓋為左右所逼自即簾鈎而縊焉上曰孟氏已廢今崇恩又廢則泰陵無配矣會其已崩故掩其事云罷勳官三月壬子朔日有食之夏四月玉清和陽宮成即福寧殿東誕聖之地作宮至是成奉安道像上詣宮行禮七年改為玉清神霄宮時道教之盛自道士徐知常始賜號沖虛先生徐守信賜虛靜先生劉混康賜葆真觀妙沖和先生後並贈大中大夫置俊選士改內外舍為之赦梓夔路以築漆椿八州畢也是嵗南平夷戎州保州夷各納土頒五禮新儀大觀初詔置儀禮局於尚書省二年詔訪求古禮器又詔討論臣庶祭禮又詔言禮當追述三代之意開元禮不足法今親制冠禮沿革付議禮局五禮率視此編次至是書成局罷又置禮制局討論古今宮室車服冠冕之度冠婚喪祭之節中丞王黼亦乞頒宣和殿博古圖命儒臣考古以正今之失乃詔改造禮器自是鼎俎豆籩之屬精巧殆與古同六年制婦人祭器初以士民吉凶多用委巷之禮乃頒新儀吏奉行甚嚴民更苦之宣和年詔罷二年禮制局及大晟府製造所協聲律官並罷閠月改公主號改公主為帝姬易國號以美名二字兩國者以四字郡縣主為宗姬族姬五月葬昭懷皇后附永泰陵定宮闈內省官制置尚書內省以掌外省六曹所主之事有內宰副及治中等官內史及都事以下吏員秋七月頒新燕樂此樂乃古徵角招君臣相悅之樂也先是并制匏笙塤箎八聲始備詔頒焉貴妃劉氏薨追諡明達皇后尋祔神主於惠恭皇后别廟七月保和殿成上自記之有曰乃詔有司徙屯營於宮垣之外移百舍宇俾就便利得其地遷延福宮於宮城之北即延福舊址作保和殿五楹挾三東側殿曰出光西側殿曰保光保和之後有殿曰燕頤西傍有殿曰怡神曰凝神其楹數如保和總為屋七十五間工製甚巧人致其力始於四月癸巳至九月丙午殿成上飾純緑下漆以朱無文藻繪畫五采垣墉無粉澤淺黑作寒林平逺禽竹而已前種竹木犀梅桐橙橘蘭蕙有嵗寒秋香洞庭吳會之趣後列太湖之石引滄浪之水波池連綿若起若伏支流𣲖判縈紆清泚方壺長江逺渚之興左實典謨訓誥經史以憲章古昔有典有則右藏三代鼎彛爼豆敦盤尊罍以省象制器參於神明薦於郊廟東序置古今書畫第其品秩玩心遊思可喜可愕西挾收琴阮簫硯以揮毫灑墨放懷適情云云冬十一月癸未郊上搢大圭執元圭以道士百人執儀衛前導蔡攸為執綏官玉輅出南薰門至玉津園上忽曰玉津園東若有樓臺重復是何處也攸即奏見雲間樓臺殿閣隱隱數重既而審視皆去地數十丈頃之上又曰見人物否攸即奏若有道流童子持節蓋相繼而出雲間衣服眉目歷歷可識攸遂請付史館京率百官稱賀甲午政和四年春正月置道階凡二十六等先生處士八字六字四字二字視中大夫至將仕郎而不給俸重和初别置道官自太虛大夫至金壇郎凡十六等同文臣中大夫至迪功郎道職自沖和殿侍晨至凝神殿校經凡十一等侍晨同待制檢籍同修撰校經同直閣皆給告身印紙經道籙院磨勘功過注授加官差遣八品用蔭如命官夏四月閲雅樂初閲宗子雅樂有官者並遷秩無官者二百八十人並與承信郎次閲太學辟雍諸生雅樂大司成以下並遷秩諸生量與推恩五月丙戌祭地奉太祖配赦蔡京奏祭之日城中大雨幾尺而鑾輅自宮至郊日光照耀又太史奏是夕五緯循軌典掌官吏稱有隊仗風雨之聲鬼神之狀又有黑氣數十丈貫於壇壝皆陛下嚴恭之應乞宣付史館從之內侍楊戩加節度賞製樂傳宣之勞也秋八月宣和殿檜生玉芝又詔有鶴三萬餘隻盤旋雲端之上並許稱賀云延福宮成上親記之略曰延福宮舊占京城之西北隅連禁禦通仙韶瞰城堙背班直下窄桷榱僅足蔽風雨爰筮爰問詢於師言克協朕志合於大同乃役禁旅及敞永巷城之西序大興營造增光前烈而徙延福於拱宸之北宮為南向適得地中因宮名次曰蕊珠又為之書其亭曰碧琅玕晨暉傍於闕千秋方繚以修廊連亘千柱聳以殿閣增固面勢宮之左為位二其殿則有穆清成平會寧睿謨凝和崑玉羣玉而蕙馥報瓊蟠桃春錦疊瓊芬芳麗玉寒香拂雲偃蓋翠葆鉛英雲錦蘭薰摘金之閣居其東繁英雪香鉛華瓊華文綺絳葩穠華緑漪瑶碧清隂秋香叢玉扶玉絳雲之閣居其北會寧之北疊石為山而上起殿曰翠微旁為二亭曰雲巋曰層巘凝和之次閣曰明春髙為層重自下而睥睨之百一十丈有竒徑量之十楹而袤閣之側為殿二曰玉英曰玉澗其背則附城築土植杏名岡覆茅為亭修竹萬竿其下翠幹碧欄交相隱映宮之右為位二閣曰宴春自方取之凡十二丈又舞臺四列山亭三峙為圓池以名海列二亭以跨海架石梁以升山亭曰飛華橫度之四百尺而贏縱數之二百六十七尺而減叢石為基疏泉為湖湖之中作堤以接亭堤之中作梁以通湖梁之上為茅亭以待憩寒松怪石嘉花異木鬭竒而爭妍龜鶴亭莊鹿寨蓮濠孔雀之柵椒漆杏花之園西抵麗澤不類塵境舊有延福宮祖宗以為燕會之所而制不甚廣京欲以宮室媚上召內侍童貫楊戩賈詳何欣藍從熙諷以禁中逼窄之狀五人聽命乃盡徙內酒坊諸司又遷二僧寺并軍營於他所五人者既有分地因各出新意故號延福五位五位既成樓閣相望引闕水天源河築土山其間竒花怪石嵓壑幽勝宛若生成置延康述古殿學士改端明殿學士為延康殿學士樞密直學士為述古殿學士冬十月是嵗女真破遼國寧江府初遼主天祚刑賞僭濫色禽俱荒女真東北五國與為鄰五國之東接大海出名鷹自海東來者謂之海東青小而狡健能擒鵝鶩爪白者尤以為異遼人酷愛之嵗終求之女真女真至五國戰鬭而後得女真不勝其煩又沿邊諸帥如東京留守黃龍府尹等每封官名邀女真禮物於是諸郡皆潛附阿固達謀舉兵以拒遼人二年春天祚如混同江釣魚界外女真之長在十里外者以故事皆來會酒酣天祚使諸人歌舞為娛阿固達獨不從天祚謂樞密使蕭奉先曰阿固達意氣雄豪顧視不常宜以事誅之奉先曰小人何知殺之傷向化心阿固達既歸疑契丹知其意即先謀稱兵吞併鄰郡部族天祚雖屢遣人呼之不復至矣於是尼堪烏舍等為謀主尼楚赫伊里羅索實默等為將帥秋集女真諸部甲馬二千犯混同江東至寧江州時天祚射鹿慶州秋山聞之不以耿意遣海州刺史髙仙夀討之為女真所敗失寧江州先是州有𣙜場女真以北珠生金人參松實白附子蜜蠟麻布之類為市州人低其值且拘辱之謂之打女真州既陷殺之無遺類獲契丹甲馬三千退保長白山之阿勒楚喀阿勒楚喀者女真所居之地以水為名也是時天祚出秋山赴顯州冬山射虎聞警不行以蕭奉先弟嗣先帥奚契丹五千人屯珠楚店臨白江與寧江州女真對壘女真潛伏混同江掩擊之嗣先兵潰骨肉輜重牛羊金帛悉為女真所得復以兵追殺又獲甲馬四千女真皆騎兵刻小木牌繫人馬為號五十人為一隊前二十人重甲持戈矛後三十人輕甲持弓矢每遇敵必二人躍馬而出先觀陳之虛實四面結隊而馳擊百步之外弓矢齊發無不中者其分合出入應變周旋人自為戰所以勝也契丹故事軍國大議漢人無與天祚自兩敗後謂奉先不知兵召宰相張琳吳庸付兵十萬人使討之即降宣制中京上京長春西遼四路計人户家貫備一軍富人有出一二百軍者家産隨竭琳輩又非經濟才統御無法器甲聽人從便往往以槍刀氊甲充數弓弩鐵甲百無一有於是分四路並進獨拉林河一軍深入遇女真交鋒稍却走還其壁都統沃哩布者以為漢軍遁即領契丹兵棄營而奔漢兵尚三萬餘推將作少監武朝彥為都統再與女真戰遂大敗餘三路聞之亦退歸其域既而盡為女真所攻陷千里蕭然丁壯斬戮幾盡嬰兒則貫縛索上為戲應遼東界屬女真阿固達悉虜之為用至有鐵騎萬餘初珠赫之敗兵多逃歸蕭奉先懼其弟嗣先獲罪妄云潰兵懼誅若不一赦將為腹心患天祚從之自是人皆曰戰則有死而無功退則有生而無罪每遇敵輒奔女真遂有輕契丹之心矣乙未政和五年春正月濾南晏夷叛尋討平之瀘南熟夷晏州六縣其衆黠勇喜鬭為諸夷所畏瀘南安撫賈宗諒嘗以斂竹木擾之至是以非罪殺其酋長夷人憤怨大酋卜漏結諸夷有衆十萬餘人分兵四出攻圍樂共城及長寧武寧二縣遂陷梅嶺堡梓路轉運趙遹提刑賈若水急督宗諒進兵江安縣以當賊分三路入晏州賊守隘甚嚴纍石柵設伏左右遹前知賊謀即以兵掩擊賊伏兵官軍鏖戰連日未解遹遣偏將自間道出賊不意賊腹背受擊大潰悉破其隘柵賊退走遂平之生擒卜漏拓地千里十二月捷書至御殿受賀宰執各進一秩曲赦四川二月立定王桓為皇太子赦以童貫領六路邊事以承奉殿前處分邊防司為名三月親試舉人賜何栗以下六百九十二人及第出身有差夏人寇邊夏四月建葆真宫置右文殿改集賢殿為之置宣和殿學士以蔡攸為之後以犯紀年改保和殿六月天成聖功二橋成都水使者孟昌齡請開鑿大伾三山兩河回引河流於河陽作浮梁二至是畢工睗名頒德音於河北京東西諸路皆調夫赴役凡數十萬人兩河之人愁苦殆不聊生未幾水漲橋壞秋七月戊辰朔日有食之八月建明堂詔立明堂於大內丙地命蔡京為明堂使蔡攸討論指畫制度蔡絛蔡翛與殿中監宋升參詳梁師成為都監童師敏為承受分置官屬月役二萬人於是徙內藏左藏諸庫及祕書省於外即其地建焉內出小樣示百官其制兼取夏世室商重屋周九尺之筵而黜諸儒臆説內立四柱為太室外立八柱為四室并太室而五上八窗為圓屋下四隅為方屋而堂之制則取唐則天故事以塗金雲龍為之故詔書有考古皆合其制大備等語時祕書省移於宣德門之東亦類古之東觀云竄陳邦光居池州先是邦光為太子詹事會蔡京獻太子以大食國琉璃酒器羅列宮庭太子怒曰天子大臣不聞以道德相訓乃持玩好之器蕩吾志即命左右碎之京聞邦光實激太子諷言者擊逐之流星出柳急流至濁沒赤黃色有尾迹照地占者以為天子宗廟有喜國家建造宮室之象蔡京率百官表賀浙西水冬十一月高麗遣士入學凡五人明年親䇿賜四人上舍及第遣歸其國是嵗女真敗遼師於混同江天祚下詔親征女真率蕃漢十萬人出長春路命蕭奉先為御營都統耶律章努副之以精兵二萬為先鋒餘分五部北出駱駝口車騎亘百里别以漢軍步騎三萬人命蕭呼都克為都統柴誼副之南出寧江州齎數月之糧期必滅女真師至鴨緑江人心疑懼阿固達以刀剺面仰天大哭謂其部落曰不若殺我以降諸臣皆拜曰事至此當誓死一戰乃與延禧遇乘其未陳三面急擊之天祚大敗女真亦不急追徐收所棄輜重而已天祚晝夜馳五百里退保長春女真乘勝遂并渤海遼陽等五十四州時朝廷遣侯益使遼留兩月竟不及見遼主而還丙申政和六年遼天慶六年春正月以童貫為陜西兩河宣撫使閏月置道學重和元年詔州縣學兼養道流增置士名自元士至志士凡十三品嵗大比襴襆就試宣和二年罷道學二月上清寶籙宮成蔡京命童貫等廣延褔宮以媚上宮成既跨舊城取壕外地又自名第六位跨城之外浚壕深者水三丈東則景龍門橋西則天波門橋二橋之下壘石為固引舟相通而橋上人物自通行不覺也名曰景龍江江之外為鶴莊鹿寨文禽孔翠諸柵多聚逺方珍怪蹄尾動數千實之又為村居野店酒肆青簾於其間每嵗冬至後即放燈自東華門以北并不禁夜徙市民行鋪夾道以居縱博羣飲至上元後乃罷謂之先賞後又闢之東過景龍門至封邱門時溫州林靈素因徐知常得幸於上託言有天人降云天上神霄玉清府長生大帝君青華大帝君是其弟皆玉帝之子又有左元仙伯書罰仙吏禇慧等八百餘官乃謂上為長生大帝君蔡京為左元仙伯而已即禇慧也上喜又以景龍門對晨暉門作上清寶籙宮宮中山包平地環以佳水清流列之館舍臺閣多以美材為楹棟不施五采有自然之勝上下立亭宇不可勝計若江南陳后主三品之石姑蘇白樂天手植之檜皆取以實之又於宮前作仁濟輔政二亭命道士施水藥於民上時登皇城下視之由是開景龍門城上作復道通寶籙宮以便齋醮之路上數從復道上往來未幾則有期門之事矣明年又詔創神霄玉清萬壽宮於天下以舊天寧觀為之無觀則以寺充仍設長生大帝君青華大帝君之像尋詔以宰執兼宮使副修御河新堤科免夫役詔距役所一百二十里以上州軍合起夫並許納錢免役廣京城詔朕荷天祐序男女僅五十人可令有司展築京城繕諸王外第與帝姬下嫁仍不得移民居夏四月何執中致仕以太傅就第朝朔望恩數如舊上曰自相位得謝古難其人本朝數十年無此事執中曰惟張士遜以太傅鄧國公就第以蔡京總治三省事三日一朝仍赴都堂及輪往逐省視事未幾又令朝朔望三日一知印當筆五月鄭居中劉正夫為太宰兼門下中書侍郎初哲宗實録蔡京專一編修政和三年成及上用鄭居中而京懼乃收用蔡確子懋為兩制討論其父確元豐間䇿立功遂以王圭為不忠以沮居中居中圭壻也懋誣詆宣仁尤甚乞改修哲宗實録尚未為快又乞修哲宗正史作哲宗紀及列傳皆加以御製之目使人不得擬議六月皇太子納妃朱氏伯材之女也秋七月沅州土豪叛討平之先是沅州得明堂巨木於盧陽縣調丁夫入水凌寒挽之水澀氷重偶挽折其鼻吏以為罪羅織箠楚衆懼斂錢賂吏吏不許於是土豪黃安俊遂舉衆叛知州張建侯知縣王憲出兵討之皆遇害進圍沅州湖北都鈐轄劉亞遣兵擊之安俊為其黨所殺餘衆悉平曲赦湖北築震武城尋升為軍童貫以進築功加開府自崇寧初用王厚之議再收復湟鄯至是唃厮羅之地悉為郡縣矣詔豐豫盛時毋為裁損計詔戒羣臣挾姦罔上當豐亨豫大極盛之時毋為五季變亂裁損之計榜朝堂刻石尚書省八月修玉牒屬籍宗正寺奏修玉牒屬籍太祖以下德惟從世令子伯師太宗以下元允宗仲士不善汝魏王以下德承克叔之公彥夫以昭穆分世置亷訪使者改走馬承受為之靖康初復舊尋罷兩浙水九月詣和陽宫上玉皇徽號大赦赦京西路以修京西大內成也置荆南及鼎澧路分湖北路置之增貼職詔舊貼職惟直祕閣直龍圗閣右文修撰不足以待多士可增置直徽猷顯謨寶文天章閣祕閣集英殿修撰并舊為九等冬十一月詔樞密事令童貫與議須面議者許赴院面議當同進呈者許同進呈己亥郊置提舉坑冶官提舉東道九道坑冶其後罷復不常不盡録宣和初蔡京言臣自崇寧初承乏宰事誠不自揆行其所知而陛下以堯禹自任幸聽其説故得施一二永惟理財之源當不取於民國用自富故取貨於地而修坑冶之官復鼓鑄之法自崇寧迄政和五年在京𣙜貨於庫務所積一千三百餘萬諸監所鑄九百餘萬諸路所儲三千餘萬通內外所有凡五千萬有竒未嘗有不足之憂既而邪臣在位肆行更革坑冶官徐堙稿置千里乃罷鑄錢監既無地寶又無泉貨遂括天下白地增四方酒價取其毫末以為足國之計今京師雖復鹽法僅足日用外方漕計闕乏見侵常平錢米及用諸司封樁迄今逮盡前日改法之人懼罪難逭乃倡為浮言曰自崇寧以前失於措置以至於此臣不敢生受暗默故輒具本末臣鼠技已窮無以上助萬一欲及兹時內委宰執六曹外付諸路監司講求措置庶無後時之悔明年熙豐諸路錢監十九處嵗鑄錢僅六百萬言東南惟存廢迹利源既失公私匱之宜復其舊令復提舉坑冶官鑄錢十二月劉正夫致仕自張商英罷相蔡京益變法度鄭居中在右府每為上言之及為相四方欣然望治訖不能制京至是以疾致仕正夫既罷厥後王黼誤國召亂余深白時中李邦彥輩皆鄙夫患失之徒云創公田所京西舊多曠土寶元康定間時輕其賦募民墾闢地無遺利政和初始議增稅民已不能支未幾後苑作使臣杜公才獻言汝州有地可為稻田乃置稻田務主以內侍楊戩皆按契劵而以樂尺打量其贏則拘入官而又并河東北三路皆括之於是大擾農民困敝僅能輸公田錢而正稅不充矣時內侍張玉營繕所亦效後苑公田所為取足無算及戩死而公田營繕事皆併入西城所以內侍李彥主之其縱暴病民又甚於前矣是嵗女真陷遼白海軍遼渤海人髙永昌殺其東京留守蕭保先自稱大渤海國皇帝據遼東五十餘州遼主遣其宰相張琳討之至瀋州女真遣兵來援渤海琳敗績乃以燕王淳為都元帥仍募遼東人號怨軍者二萬以行至乾州武朝彥等謀殺淳不克復召淳還遣蕭德恭耶律伊都等屯田為備既而女真擊破渤海軍斬髙永昌其衆散為盜所至虜掠而遼不能制丁酉政和七年遼天慶七年春三月以童貫領樞密院事初命貫帶同簽書樞密院事尋以元豐官制不置簽書遂改命焉時邊人屢奏遼無故聚兵易州恐有他意詔諸路調兵赴沿邊將以邊事付貫命督師以駐尋落城茂州夷寇邉將官李泳等死之夏四月羣臣䇿上為教主道君皇帝詔道院略曰朕乃上帝元子為太霄帝君憫中華被金狄之教遂懇上帝願為人主令天下歸於正道卿等可上表章䇿朕為教主道君皇帝止用於教門章疏尋詔翰林學士承旨王黼宣和殿學士蔡攸盛章等至宣和殿觀神霄降臨黼作記上之自後神怪之事不悉書五月祭地先詔玉虛殿上皇地祗徽號至是祭地於方澤降德音六月置承宣使改節度觀察留後為之是月大雨雹大如拳或似一升器物兩時而止先是夏雨有兩魚落殿中省廳事屋上秋七月熙河環慶涇原地震旬日不止壞城壁廬舍民居壓死者甚衆時上以旱乾災異為念侍御史黃葆光上疏言今之所以致隂陽之變者蓋陛下恭儉敦朴以先天下而蔡京侈大過甚陛下以紹述為心而京所行乃背元豐之法陛下隨宜增益追崇先烈而京強悍自專不肯上承德意兼鄭居中余深依違畏避不能任天下之責此天氣下而地不應也疏入不報置提舉御前人船所時東南監司郡守二廣市舶率有應奉又有不待旨但送物至都計會宦者以獻大率靈壁太湖慈溪武康諸石二浙竒竹異花海錯福建荔枝橄欖龍眼南海椰實登萊文石湖湘文竹四川佳果木皆越海渡江毁橋梁穿城郭而至植之皆生而異味珍苞則以健步捷走雖甚逺數日即達色香未變也至是蔡京言陛下無聲色犬馬之奉所尚者山林間物乃人之所棄但有司奉行之過因以致擾願節其浮濫乃請作提舉淮浙人船所命內侍鄧文誥領之京以曩備東封船二千艘及廣濟兵士四營又增制作牽駕人乞詔人船所比直達綱法自後所用即從御前降下使許應奉如數貢入餘皆不許妄進又詔不許為糧綱船及役百姓且戒毁人墳墓廬舍及黃封帕蒙人園囿所植凡十餘事獨令朱勔等六人任事由是稍戢不兩嵗益甚於舊勔由是授節鉞諸路大擾以至於亂八月鄭居中罷母喪去位九月辛卯大饗明堂初禮部尚書孔光凝等言月令秋季大享帝説者謂遍祭五帝也曲禮大享不問卜説者謂祭五帝於明堂莫適卜也周官太宰祀五帝則掌百官誓戒説者謂祀五帝於四郊及明堂而王安石以謂五帝者五精之君昊天之佐也惟其為五精之君故分位於五室惟其為昊天之佐故與享於明堂自神宗下詔惟以英宗配上帝而悉去從祀羣神陛下肇視宏規秋季大享位五帝於其室既無比以稱神之嫌止祀五帝又無羣神從祀之黷則神宗黜六天於前陛下正五室於後其揆一也從之乃詔併祀五帝盜起淮西命內侍談稹討平之是月初約宗室科條徒以下宗正訓治徒以上制勘冬十月初御明堂以是月天運政治布告天下又頒來嵗嵗運厯自是月朔布政孟春頒厯率推考氣運具之文辭而以為常十一月詔蔡京五日一朝時童貫欲生北釁密遣人使海上約女真而京不能遏因上章劾貫且謂貫本臣薦他日恐纍况與臣同列臣實恥之上欲罷貫所領改為司空令致仕時官制無司空將特命之會京子攸救止於是京告老詔罷省細務五日一朝赴都堂視事而貫日赴朝班若京是日入則貫避不出朝他日則如故此乃蔡攸别録之語恐未必然姑存之鄭居中起復太宰余深少宰有星如月徐徐南行而落光照人物與月無異十二月天神降坤寧殿上自作記修神保觀神保觀者俗謂二郎神也都人素畏之自春及夏傾城男女負土以獻名曰獻土又有飾作鬼使巡門催納土者人物絡繹乘輿亦微幸以觀之或謂蔡京曰獻土納土非佳語也後數日有旨禁絶作萬壽山上之初即位也皇嗣未廣道士劉混康以法籙符水入禁中建言宫城西北隅地協堪輿倘形勢加以少髙當有多男之祥始命為數仞岡阜已而後宫占羆不絶上甚喜於是崇信道教土木之工興矣一時佞幸因而逢迎遂竭國力而經營之至是命户部侍郎孟揆築土增髙以象餘杭之鳯凰山號萬壽山後因神降有艮嶽排空之語因名艮嶽宣和四年始告成御製記文凡數千言六年有金芝産於萬嵗峯改名壽嶽門號陽華入門兩傍有丹荔八十株大石曰神運昭功者立其中旁有兩檜一夭矯者名曰朝日升龍之檜一偃蹇者名曰卧雲伏龍之檜皆玉牌填金字書之巖曰玉京獨秀太平巖峯曰慶雲萬態竒峯又有綘霄樓金碧相間勢極髙峻在雲表盡工藝之巧無以出此運四方花竹石積纍二十餘年山林髙深千巖萬壑麋鹿成羣樓觀臺殿不可勝計戊戌重和元年春正月御大慶殿受定命寶大赦初八寶既備上曰八寶者國之神器也命再創乃我受命者也因詔于闐國上美玉久而得之為璽九寸用魚蟲篆其文曰範圍天地幽贊神明保合太和萬夀無疆號定命寶至是御殿受之百官稱賀二月夏人冦邊將官張迪死之初通使女真約夾攻遼建隆以來女真嘗自其國之蘇州泛海至登州賣馬故道猶存去夏有漢兒髙藥師者泛海來具言女真攻遼國事登州守臣王師中以聞乃詔蔡京童貫共議命師中募人同藥師等齎市馬詔以往而不能達至是復委貫選人使之遂遣馬政同藥師講買馬舊好由海道入蘇州至其國阿固達所居按春川拉林河其長男曰阿古及侄尼堪烏舍輩皆用事呼郎君問遣使之由政對以貴朝在大宋太祖皇帝建隆二年時遣使來賣馬今主上聞貴朝攻陷契丹五十餘城欲與貴朝通前好兼聞契丹天怒人怨本朝欲與貴朝共行弔伐以救生靈塗炭雖本朝未有書來特遣政等軍前共議若允許後必有國使來也阿固達與尼堪等共議數日遂質登州小校六人遣渤海人李善慶生熟女真二人齎國書并北珠生金貂子等來是春正月遼燕王淳將討怨軍而女真遽至淳與之遇於徽州未陳而潰淳與麾下五百餘人退保長伯魚務於是女真度遼西大掠經新成懿壕渭五州皆降之又遣棟摩王攻怨軍亦敗之天祚在中京聞報震懼令內庫裒珠玉珍玩五百餘囊擇駿馬二千匹私謂左右曰若女真必來吾與南宋為兄弟夏國為甥舅何憂哉及女真歸邊備稍寬天祚益自肆矣貫嘗與熙河鈐轄趙隆議燕雲事隆極言不可貫曰君與此當有異拜隆曰隆武夫豈敢干賞以敗祖宗二百年之好異時釁生雖萬死不足以謝天下三月赦四川以城石泉軍增築九堡畢工又綿茂州夷平也知成都府劉義叟言綿茂開拓甚廣自唐以來八國巢穴已空詔許百僚稱賀以蔡鞗為宣和殿待制鞗京之子尚康福帝姬駙馬都尉帶文階自鞗始親試舉人賜王昻以下七百八十一人及第出身有差敕令皇子嘉王楷赴廷對有司考為第一上不欲令魁多士升昻為榜首夏四月竄張根根時為淮南運使坐論東南諸路闕乏之由遂及修造之侈賜第錫帶之濫又言花石綱騷擾之害大忤權貴由是落職監信州商稅尋又貶置郴州五月壬子朔日有食之置經制司尚書省置司講畫諸路財賦六月王宷劉昺坐妖訕誅竄詔朝奉大夫前知峽州王宷資政殿學士劉昺酬倡詩歌悖逆妖訛不道宷伏誅劉昺長流瓊州赦陜西河東以童貫奏攻破夏人建築城塞也宰執並進官秋七月東南大水遣使賑之九月又詔截上供米四十萬賑濟八月童貫進太保領樞密院事三路宣撫使以夏秋以來進築靖夏制戎制羌三城之功也九月辛巳大享明堂去年已行是夏詔曰自今每嵗季秋親祠明堂如孟月行獻禮與三年當郊之嵗行明堂之禮後不録閏月罷白地等錢初鄭居中置講畫經費局使户部尚書髙伸推行之諸路有僦房廊為浮造簷厦侵官地者則會其丈尺令輸錢謂之白地錢又添酒價取醋息及𣙜場等事給事中吳敏駁之以為白地錢何異於德宗之稅間架至是上詔曰自頃庶事大臣以為可行朕采諸民多不謂便如拘白地與禁𣙜貨增方田增酒價取醋息河北加折耗米東南火災強糴皆掊克苛削可即日罷諸害民蠧國如上比者三省悉以聞朕不憚改鄭居中罷乞持餘服上從之行鹽鈔對帶法時國用日廣而經費多仰於𣙜貨務先是鄭居中再相與童貫相表裏貫主解鹽欲以實陜西而擅其利故居中為罷東北鹽而利入頓少至是上悟乃詔昨有司言解鹽便於煮海故用之而商販無利邊糴不行其復行末鹽於是蔡京私語人曰我作鹽法尚未盡也上知之詢其所未盡京請改袋制且計所過指其稅袋制既與昔不同必便更買新鈔方帶舊鈔號對帶法亦曰帶搭指揮既出一日間入納者三千餘萬緡上大駭而後知搭帶之利也不一二嵗必復為之商人每覺鈔行略滯以待改法謂之起新鈔自是鹽商大困宣和三年詔河北京東兩路稅鹽與鈔鹽並行故商旅不通可並行鈔鹽許客人任從通販四年春詔曰末鹽顆鹽祖宗以來並行不廢崇慶中以解池顆鹽不多止行本路而煮海甚博行於數路各不相妨政和積錢至二千萬貫而有司挾情議改難以復舊商旅疑惑可下諸路諭以今來改不改鈔法秋七月又詔解鹽闕末鹽通商法備敢有搖扇以違御筆論時鹽闕陜西錢四百萬緡以代解鹽課又河朔嵗賜亦不下三百萬緡自𣙜貨務出見錢以寄外廊而後給關子付諸路糴買俟商賈來請故謂之轉廊錢王黼秉政用日益窘既無見錢但虛出關子付外路商賈已絶糧草得關子赴京務請錢率不能給則以急緩新久次為七等商賈莫能久候因賤貨之交引鋪時上自督課茶鹽日令具奏比較才不及數必加峻責提舉𣙜貨務魏伯芻乃與交引鋪以四六為約若請萬緡則留四千緡入納乃得之故日有四五萬緡所入若真入納則無幾蓋徒以昧上應課實非所願既鹽鈔猥多故客貨不行伯芻乃獻言於王黼設限立額重為賞罰始者嵗校俄至月校法令苛峻州縣官恐罪遂以鈔敷上户始一户數十鈔則貼錢若干與鹽鋪户嵗中有至數次科者又爭要客販所至則以鹽詣官復科之於民其後遂至於計口而給家至户到雖嬰兒不免矣七年春詔崇寧初罷官賣以通商賈至收億萬之利比嵗變法遂分配民户可修復新鈔務通財貨以復舊制大內火大火自甲夜達曉爇五千餘間後苑廣聖宫及宫人所居幾盡被焚死者甚多時天大雨火發雨如傾略不少止而火益熾或傳上是夜微宿於外然事祕不可得知録周後除封崇義公外以其長世世為宣義郎監周陵廟與知縣請給為國三恪冬十月御寶籙宫度籙度玉清神霄祕籙會者八百人凡天神降臨事蓋發端於王老志而極於林靈素於是宦官道士有所不快必託為帝誥則莫不如志及為大會引羣臣人士入殿聽靈素講經上為設幄其側靈素據髙坐使人於下請問然靈素所言無殊絶者雜以滑稽媟語上下為大閧笑莫有君臣禮矣時道士有俸每一齋施動獲數十萬每一宫觀給田亦不下數百千頃皆外蓄妻子置姬媵以青膠刷鬢美衣玉食者幾二萬人一會殆費數萬緡貧下之人多買青布幅巾以赴日得一飫餐而襯施錢三百謂之千道會云宣和四年冬御殿度王黼等祕籙十一月朔改元大赦安堯臣補官堯臣闕陛下臨御之初嘗下詔求言於是諤士效忠而憸人乃誤陛下加以詆誣之罪使陛下負拒諫之謗故比年天下杜口以言為諱乃者宦寺交結權臣共唱北伐而宰執以下無一人肯為陛下言者臣謂啓燕雲之役異時唇亡齒寒堅甲利兵必伺吾隙而逞其所欲矣臣謹按童貫起自卑微本無智謀陛下付以兵柄俾典機密專務欺罔虛立城寨以奏捷易置將吏以植其黨通餽遺鬻官爵超躐除授紊亂典常巧媚者登拂忤者斥山西徑卒盡選為親兵戰則他兵臨陳賞則親兵冒功意果安在每得內帑以濟軍需乃委充私藏而立軍期之法取償於州縣民不堪命士為解體而貫方且凶焰勃然臺諫之臣間有一議已中危法使天下不敢言而歸怨陛下矣咸謂貫深結蔡京同納趙良嗣之謀經營既久國用匱乏乃方田以增稅均糴以充儲茶鹽之法朝行夕改加之以飢饉迫之以重斂事勢必無自全而患有至於不可禦者陛下倘優遊不斷異時雖悔何及臣非不知計行身戮蓋忠憤所激不能自己至是上下詔略曰頃大臣建議欲復燕雲而堯臣以逺方孤生獨陳不可或謂妄阻大事請置諸法朕以言路久壅敢諫之士宜導以賞令吏部先次補堯臣承務郎堯臣惇族子也就以惇遺澤授之十二月置裕民局以延康殿學士徐處仁言科斂折變充用坐倉之為害民故也仍設五事命蔡京提舉處仁為詳定官於是用事者恐其過有裁損不悅之矣時京欲復行夾錫錢於中州處仁言錫錢但可行於關陜耳京恐其不附已欲去之諷侍御史張朴劾處仁罪出知揚州而局亦尋罷是月鳳翔府慶州諸縣皆納農器以避科斂上聞之惻然詔罪其官吏是嵗女真阿固達始稱帝國號金女真其初部族本新羅人號完顔氏完顔猶漢言王女真妻之以女生二子其長烏古鼐也自此傳三人至英格太師以至阿固達身長八尺狀貌雄偉沉毅寡言笑顧視不常少有大志膽力絶人是時女真趍遼中京天祚恐其襲已女真衆中有楊朴者遼東人也勸阿固達稱皇帝以王為姓以旻為名以其國産金故稱大金改元天輔皆從之朴又勸阿固達遣人詣天祚求封册天祚付南北面大臣議蕭奉先喜以為自此可無患矣請許之天祚遂遣使備衮冕之服册阿固達東懷皇帝阿固達召楊朴等觀驗以儀物不純用天子之制大怒欲斬其使諸臣為謝乃解猶人笞百餘尋遣還要其稱大金皇帝兄不然則提兵取上京天祚惡聞女真事蕭奉先揣其意不以聞明年上京破和議遂格己亥宣和元年春正月改佛號詔改佛號大覺金仙餘為仙人大士僧稱德士行者稱德童而冠服之但道冠有徽德冠無徽又以寺為宮院為觀尋改女冠為女道尼為女德明年詔復舊金使來女真使李善慶入國門詔蔡京童貫及鄧文誥見之諭以夾攻取燕之意善慶等唯唯居十餘日遣趙有開馬政齎詔及禮物與善慶等渡海聘之初議報阿固達儀趙良嗣欲以國書用國信禮有開曰女真之長止節度使常慕中國恨不得臣屬止用詔足矣問善慶何如善慶曰皆可於是從有開言有開與善慶等行至登州而死會諜者言契丹已割遼東封女真為東懷皇帝乃詔政勿行止差平海軍校呼慶持登州牒送善慶等歸呼慶至阿固達軍前阿固逹及尼堪等責以中輟且云登州不當打牒留半年始遣之臨行語之曰跨海求好非吾家事吾巳獲大遼數路其他可以俯拾汝歸見皇帝果欲結好請早示國書若仍用詔決難從也初髙麗來求醫上遣二醫往是秋還以其事及語録奏聞然後知實非求醫乃彼知中國將與女真圖契丹因是勸止中國謂茍存契丹猶可為國家捍邉女真強敵不可交也宜早為之備上聞之不樂後三年遣使往聘欲促其共舉髙麗雖恭順終不得其要領而歸以余深為太宰王黼為少宰黼即甫也上賜今名闕之䇿太宰鄭居中及知樞密院鄧洵武皆以闕其計以身任之曰我與遼雖為兄弟之邦然百餘年間彼之所以開邊慢我者多矣且兼弱攻昧武之善經也今而勿取女真即強吾不免事之中原故地恐非復我有於是上向其言左司員外郎倪濤獨以為非且曰景德以來遼守約不敢犯邉盟誓固在不可渝也天下久安士不習戰軍儲又乏莫敢議論以為後患黼怒曰左司敢沮軍耶顯謨閣待制知湖州葛勝仲與黼連姻亦與書曰天下無事則宰相安宰相生事則天下危願公享宰相之安無使天下至於危也時諜者云天祚有亡國之相或言陳堯臣者善丹青人曽登科為畫學正黼聞之甚喜薦堯臣以將使事堯臣即挾畫學生二員俱行同繪天祚像以歸入對即云遼主望之不似人君臣謹畫其容以進若以相法言之亡在旦夕幸速進兵兼弱攻昧此其時也并圖其山川險易以上上大喜即擢堯臣右司諌賜豫巨萬燕雲之役遂決堯臣後遷至侍御史躬耕籍田後不書二月朔改元上之改元重和也左丞范致虛言此號契丹嘗稱之蓋彼先有重熙年後主名隆禧其國中因避熙而稱重和遂復改焉三月皇后親蠶於延福宫後不書政和初詔建蠶宫親蠶殿以無斁為名劉法兵殱于統安城熙河經略童貫迫法令進師攻城不得已引軍出塞夏人伏兵擊之士卒陷沒者數十萬貫更以捷聞百官入賀議者切齒而不敢言夏人冦邉貫以鄜延環慶兵入西界大破夏人平其三城既又破之於震威軍夏四月丙子朔日有食之赦陜西河東五月有物如龍形見京師民家大水犯都城西北赤氣亘天忽有水髙十餘丈犯都城未作前雨數日如傾及霽開封縣茶肆人晨起拭床榻睹若有大犬蹲榻下者明視之龍也其人驚呼而倒適與軍器作坊近來觀作坊兵衆取而食之不敢以聞都人皆圖畫傳玩身僅六七尺若世所繪龍鱗蒼黑色驢首而兩頰如魚頭色正緑頂有角角極長於其際始分兩岐有聲如牛十日而水至初龍降後一夕五鼓西北有赤氣數十道亘天犯紫宫北斗仰視星皆若隔絳紗方起時拆裂有聲然後大發後數夕又作聲益大格格且久其發更猛而赤氣出北數十百道其中又間以白黑二氣然赤氣為多自西方俄入東北又延及東南且聲亦不絶迫曉乃止水之作也宰相率出郭視之水已破汴隄諸內侍以役夫擔草運土障之不能禦上憂甚命戶部侍郎唐恪治之或請決汴南河以護宫城者恪曰水漲而決是無可奈何今決而浸之是棄民也乃止詔府界監司募人決水下流遂由城北五丈河以泄起居郎李綱言國家都汴百六十年未嘗有變今城西巨浸湍悍峻激東南而流其勢未艾或淹旬時因以風雨不可不慮夫變不虛生必有感召之災災非易禦必有消弭之䇿望陛下斷自宸衷詔廷臣各具所見而採行其説濟危圖安以答天戒又乞直前奏事庶盡狂瞽詔都城外積水緣有司失職隄防不修即非災異忠言讜論未始不求豈假天災然後降詔綱挾姦弄直送吏部監當尋又降一官與逺小處時上命唐恪決水恪即日乘水舟覽水之勢而求所以導之上登樓遙見問之乃恪也為之出涕未幾水平恪入對上勞之曰宗社得安卿之功也恪懷出疏曰水隂類也至犯城闕天其或者以隂盛之漸警告陛下乎願垂意於馭臣鄰逺女寵去小人備夷狄以益謹天戒上嘉納之六月夏人納欵詔六路罷兵初夏國恃橫山諸族帳強徑善戰故用以抗中國慶厯間姚嗣宗發收橫山之議范仲淹用之既而元昊納欵元豐中种諤亦以為言故興靈州之師及王師失利李憲始獻進築之議神宗厭兵不克行童貫本出李憲之門欲成憲志政和以來合諸路兵出塞進築遂得橫山之地夏國失所恃乃因遼人納欵請和以誓表進許之前所未有也已而夏使來賀生辰授以誓詔辭不受貫強使持去及境遂棄之延安帥取以上貫始大沮祖宗法凡番人授漢官有功只於番官遷轉而俸祿不甚增弓箭手有定所而得以保其鄉里墳墓禁軍逃亡並誅戮而不敢避難至童貫為宣撫引屬户至有為節度使者舊弓箭手皆徙居新邉禁軍逃亡者許改刺别軍又擇諸路精兵刺勝捷軍以自衛夏人納欵而邉備軍法自貫壞矣秋八月復鈔旁定帖錢初元豐中議者謂民之貿鬻輸納賴官為之據官司亦利其入遂有所謂鈔旁定帖錢後數用數止至是諸路爭為應奉時兩浙轉運李祉乃請復其法然息不得過三分而朝廷許之祉言本路所收約數十萬貫以此給應奉自可足用今為蘇杭兩處守臣以御筆拘去而本司所置花木并御前物色須上項錢庶不侵經費從之明年七月詔江浙湖廣福建鈔旁定帖錢並令漕臣拘充糴本輒乞撥者以違御筆論靖康初罷之九月燕蔡京保和新殿蔡京等請見安妃許之京作記以進略曰皇帝召臣京臣黼臣俁臣偲臣楷臣貫臣仲忽臣熙載臣攸燕保和新殿臣鯈臣翛臣鞗臣行臣徽臣術侍賜食文字庫於是由臨華殿門入侍班東曲水朝於玉華殿上步至西曲水循荼䕷洞至太寧閣登層巒琳霄褰風垂雲亭至保和屋三楹時成於八月而髙竹崇檜已森隂蓊鬱中楹置御榻東西二間列寶玩與古鼎彛玉芝左挾閣曰妙有右挾閣曰宣道上御步前行至稽古閣有宣王石鼓歷邃古尚古鑑古作古訪古博古祕古諸閣上親指示為言其槩抵玉林軒過宣和殿列岫軒太真閣凝真閣東崇巖峭壁髙百尺林壑茂密倍於昔見過翹翠燕虔閣賜茶全真殿乃出瓊林殿中使傳旨留題乃題曰瓊瑶錯落密成林檜竹交加午有隂恩許塵凡時縱步不知身在五雲深頃之就坐女童作樂坐間香圓荔子黃橙金柑相間布列前後命鄧文誥剖橙分賜酒五行少休詔至玉真軒軒在保和殿西南廡即安妃粧閣命使傳旨曰雅燕酒酣添逸興玉真軒內見安妃且詔臣賡補成篇臣即題曰燕和新殿麗秋暉詔許塵凡到綺闈於是人人以為得見安妃矣既而但挂畫像西垣臣即以詩謝奏曰玉真軒檻暖如春即見丹青未見人月裏姮娥終有恨鑑中姑射未應真須臾中使傳旨至玉華閣上持詩曰因卿有詩姻家自應相見臣曰頃緣葭莩已得拜望故敢以詩請上大笑闕上持大觥酌酒命闕勸太師臣因進曰禮無不報於是持瓶酒注授使以進再坐撤女童命羯鼓御侍奏細樂作蘭陵王揚州教水調勸酬交錯日且暮臣奏曰久勤聖躬不敢安上曰闕更勸迭進酒行無算上忽憶紹聖春燕口號二句問曰卿所作否餘句云何臣曰臣所進也嵗久不記上曰朕是時以疾告假哲宗召至宣和閣因問所以告假對曰臣有負薪之疾不果奉清燕哲宗曰蔡承旨有佳記云紅蠟青煙寒食後翠華黃屋太微間不可不赴臣謝曰臣操筆注思於今二十年陛下語及方省倣佛然不記一字陛下藩邸已知臣蓋非今日臣豈勝榮幸上輪指曰二十四年矣臣曰臣在兩朝且老無毫髮報稱上曰屢見哲宗道卿但為章惇輩沮忌朕時年八嵗垂髫侍側一日哲宗疑慮默然若有所思問曰大臣以為不可紹述朕思疑之對曰臣聞子紹父業不當問人何疑之有哲宗駭曰是兒大知由是劉摯吕大防相繼斥逐紹述自此而始臣奏曰陛下曲燕而追繼紹述非特臣幸天下社稷之幸臣請序其事以示後世知今日宴樂非酒肴而已二鼓五籌衆前奏曰請罷始退幸道德院觀金芝遂幸蔡京第時道德院生金芝上幸觀焉遂由景龍江泛舟至京第鳴鑾堂淑妃從上曰今嵗四幸鳴鑾矣賜京酒於是京作鳴鑾記以進初京侍上每進君臣相悅之説於是以鞗尚主而攸最親幸上時輕車小輦幸京第命坐賜酒略用家人禮表謝有云主婦上夀請酬而肯從稚子牽衣挽留而不却攸嘗勸上曰所謂人主當以四海為家太平為娛嵗月能幾何豈徒自勞苦上納其言遂微行都山上方為期門之事故園囿皆效江浙為白屋不施五采多為村居野店及聚珍禽異獸動數千百以實其中都下每秋風夜靜禽獸之聲四徹宛若山林陂澤之間識者以為不祥蔡攸加開府攸進見無時便辟趨走或塗青紅優雜侏儒多道市井淫媟謔浪之語以蠱上心妻朱氏出入禁中子行領殿中監寵信傾其父京矣冬十一月乙卯郊屏太學生鄧肅時朱勔以花石綱媚上東南騷動肅進十詩諷諌末句云但願君王安百姓圃中何日不春風上即宣取時皇太子在側上曰此忠臣也蔡京奏曰今不殺肅恐浮言亂天下上不答即詔放歸田里蓋保全之也靖康初以承務郎召為鴻臚簿髙宗初興遂除右正言十二月竄曹輔初上之微行也外人尚未知因蔡京表有曰輕車小輦七賜臨幸邸報傳之四方盡知之時上下俱溺於宴安天下病焉無敢言者輔時為正字上書極論上優容之初不加怒有旨赴都堂問狀余深曰小官何敢言大事輔曰大臣不言故小官言之王黼以京奏表有輕車小輦之語詰輔所從意欲中京而輔語不酬遂編管郴州人皆為輔危而輔獨怡然自若至是清議翕然歸之大雨雹九朝編年備要卷二十八
