body:
  text: 九朝編年備要原序莆田陳君均以其所輯皇朝編年舉要與備要之書合若干巻踵門而告曰均之幼也侍從祖丞相正獻公獲觀國朝史録諸書及眉山李氏續通鑑長編意酷嗜之獨患篇帙之繁未易識其本末則欲刪繁撮要為一書以便省閲時方從事舉子業未之能也晚滯場屋決意復藏林壑間又以出入當世名流之門得盡見先儒所纂次若司馬文正公之稽古録侍郎徐分度之國紀以及九朝通略等書亡慮十數家博攷而互訂之于是輯成此編而綱本李氏而其異同詳略之際則或參以他書昔嘗讀朱文公通鑑綱目歎其義例之精密蓋所謂綱者春秋書事之法也而所謂目者左氏備言之體也自司馬公目録舉要之作至是始集大成觀者亡復遺憾均竊不自揆輒放而依之然文公所述前代之史故其書法或寓褒貶于其間均今所書則惟據事實録而已不敢盡同文公之法也願一言以述之何如徳秀讀其書彌月始盡巻則喟然曰美哉書乎聖祖神孫之功徳元臣故老之事業赫赫乎鍠鍠乎備于此矣然綜其要而求之則自藝祖以來凡所以祈天永命垂萬世無疆之休者大抵弗越數端蓋其以仁立國而不雜五伯權利之謀以儒立教而不溷百家雜駁之説求治寧悠緩而不為一朝迫切之計用人寧檏鈍而不取小而輕鋭之才嘉祐治平以前廊廟之訏謨搢紳之論建相與葆衞扶植如恐失之此其所以大治也自熙寧輔臣出新意改舊法髙談古始旁祖筦商而國脈病矣名為尊經實尚空寂而學術荒矣謂葠苓耆术不急于起疾而一切雜進者皆決腸破胃之藥根本安得而弗傷謂鼎鼐琮璧不足以適用而錯然前陳者皆竒佹淫靡之具風俗安得而弗壊章吕鼓其波二蔡熾其燄更倡遞述至于黼貫極矣此其所以致亂也凡百有六十七年之行事可喜可慕可歎可愕者一攬而盡得之真我宋千萬年之龜鑒也吁是豈獨學者所當熟復哉睿明在御垂精典訓有髙宗成王之風使是書獲陳于前則所以啟發天聰緝熙聖徳者何可勝既窮閻下士雖無階可以自進然夜光明月之珍藴藏山海終有不可揜者安知侍從蕃宣之彦無以是聞于上者乎君逮事正獻公得其家學既又出從賢士大夫㳺以博其見聞故于是書斟酌損益皆有條理非安危所繫則畧而弗書其志固將有補于世非徒區區事記覽而已也君嘗與計偕繼游天子之學今以累舉恩當對大廷不願就獨朝夕矻矻于此既積十餘年之力纂而成之又將次及于中興之後聞四方之士可與商㩁者不憚千百里槖其書而從之忘其道涂之囏羈旅之苦也此其用志豈世俗所可量哉迂愚不敏竊獨嘉之故為之述如此若書之凡例則君既列之篇端矣故不復云紹定二年三月辛卯建安真徳秀謹書國史尚矣太祖太宗真宗為三朝仁宗英宗為兩朝神哲徽欽四宗為四朝史用班馬體非一世一有司所能就也續通鑑長編稽國史倣温公運之左氏則眉山李氏専其家聞有提綱挈領之書書未之見今所見者太學生莆陽陳均為之名曰皇朝編年舉要備要其取類博其収功精夫紀事之約未易言也孔子序書及筆削春秋嚴矣司馬温公雖未為本朝通鑑先為稽古錄祖春秋意亦本朝史籍之綱也此書又取司馬氏之綱而時有修飾取李氏之目而頗加節文且網羅天下放失舊聞質之鉅工中為衡度以禆金匱石室之藏日昃清問乙夜觀書庶㡬有取焉是於昭代史學不其多益乎我國家超越漢唐比方虞周者以仁立本也若乃陰陽之消長君子小人之進退前事不忘後事之師者二公既言之兹不贅云紹定二年冬十一月日南至朝議大夫直敷文閣新知漳州林岊敬書平甫與余遊從廿年矣足不出書室口不及世事利害得喪不足以動其心師友淵源蓋得所漸孜孜為學未見其止也一日告余曰我朝祖功宗徳相業臣謨惟長編一書包括無遺本末可考但浩如煙海學者莫知涯涘僕之鈍尤不能强識欲纂作二書一舉其要一備其目事之相聨屬者亦或互見參稽國史出入諸書訂其異以㑹其同約其詳而補其略庶㡬文公朱先生所脩通鑑綱目之意而非敢僭以自比焉此書幸成則得以私便誦記不敢外示也積年而書成余與二三同志先得觀之傳示寖廣人各欲得其書而力不能録遂相與鋟木願朋友共之非平甫志也平甫從容語余而色不懌余應之曰祖宗以仁厚得民以紀綱立國如前代閹寺女寵外戚强臣與夫大刑戮之事悉杜其漸而窒其源聖子神孫世守弗失盖將與典謨並行此其澤在斯人法垂後世為君而得是書則可以彌綸天道扶植人紀為臣而得是書則可以寅亮天工輔成君徳況子之所纂舉宏撮要在㡬務之繁尤便省覽子其能終祕之而私為衡茅書生記誦之具乎平甫曰不敢遂書於其後紹定己丑中秋長樂鄭性之書皇朝國史諸書勒琬琰揚日月固將與五三載籍相為無窮均衡茅下士蓋嘗拜手稽首斂衽肅容竊觀皇綱帝範巨麗之萬一邈若層霄茫乎漲海有非蠡管所能窺測況以均之資禀魯鈍不能强識輯成此書深以詮次失倫而有所乖剌是懼私質諸朋友或有誚均者曰子志良苦力良勞其如犯三不韙何以私家而裒國史以偏見而折衷諸書則僭冊書重大未易編摩而以數十萬言該之則疎諸書雜出寧免牴牾去取之間一或失當則舛均敬應之曰國朝信史與夫名公鉅儒所纂諸書並行於世家傳人誦今所輯者特欲便繙繹備遺忘固非敢求與之並行而偕傳也奚其僭掎摭所及博參諸書文雖少損於舊事則不増於前諸書固自若也雖無此書誰無此書奚其疎若夫舛誠有之無所逃罪抑今所記或原其始或要其終或以附見或以類從舉宏撮要主於事實而不敢必以日月為㫁亦信其可信闕其可疑云爾如欲質其疑求其詳則有太史氏及諸書在既以對或人因併書于下方前太學生莆田陳均拜手稽首謹識凡例以一字為褒貶者春秋之法也據事實録而善惡自見者後世作史之體也故自司馬氏以来各立凡例不敢純用春秋之法朱文公資治通鑑綱目間或㕘用春秋之法而不盡用今紀載本朝之事則雖綱目之例亦不敢盡用謹摭本朝諸帝紀及文公綱目㕘訂立為正例雜例凡十五條其餘變例有該括不盡者隨事斟酌而書之正例一災祥厯代諸紀凡例各不同按文公綱目惟日食地震大水江河決溢旱蝗火災必書今從其例如只一方小小災變非因事不書自餘星變災異之類或因避殿減膳下詔求言或因臣僚奏論則書之一沿革凡制度改更及申明科禁之屬一號令凡詔誥命令之屬以上二條凡有關於治體民俗者必書之一征伐貞觀三年以李靖為某道行軍總管討突厥四年李靖襲破突厥于陰山頡利可汗遁去夏四月行軍副總管張寳相擒頡利可汗以獻此書大征伐例也其餘小征伐多書云某國犯邊命某人禦之又如徽宗紀云宣和二年十月睦州青溪妖賊方臘反十二月以童貫為江淮荆浙宣撫使以討之三年春正月方臘陷婺州又陷衢州守臣彭汝方死之夏四月賊平此書大盗賊例也小者書法又從簡畧以上二條今倣其例隨事斟酌書之或疆場小警及小小冦盗則不書一殺生貞觀二年冬十月殺瀛州刺史盧祖尚四年秋八月殺大理丞張藴古永徽四年二月散騎常侍房遺愛及髙陽公主謀反伏誅麟徳元年郇公孝協坐贓賜死以上三例今用後二例斟酌書之一除拜立后厯代帝紀皆云立某封某氏為皇后封號已見前者不書如自外聘入者書云納皇后某氏建儲武徳九年立子承乾為皇太子以上二條今從其例書之公主下嫁貞觀十一年以南平公主嫁王敬直十五年以文成公主嫁吐蕃内職本朝帝紀凡妃號皆書綱目惟有關繫者則書以上二條今㕘酌用之宰執本朝帝紀凡宰執拜罷貶降薨卒皆書今於宰相必書執政以下有關繫則書否則畧除拜書法如貞觀三年二月以房𤣥齡杜如晦為僕射魏徴守祕書監㕘預朝政舊官未見前則如永徽六年以中書侍郎李義府參知政事拜罷並書如哲宗紀元祐元年閏二月蔡確罷司馬光為僕射兼門下侍郎以上二條今斟酌用之罷則前史及綱目其書法不同或云罷或云免或云罷為某官今倣綱目例皆書罷其所除授之官見於備要注文無甚關繫則畧之薨卒書法諸史例皆不同本朝諸帝紀凡大臣在位及雖去位而非貶責者皆書薨綱目皆書卒今從帝紀在位者皆書去位者有所關繫則書執政以下及諸臣之卒有所關繫雖微必書或附書其官並見備要注文否則雖貴不書致仕書法與上同貶降書法綱目或書貶某人為某官或云黜或云降或云削今隨事斟酌用之安置居住之屬書法如儀鳳元年郇王素節袁州安置又如哲宗紀紹聖四年二月追貶吕公著為建武軍節度副使司馬光為清海軍節度副使王巖叟為雷州别駕奪趙瞻傅堯俞贈諡韓維致仕及孫固范百禄遣表恩澤又云貶吕大防為舒州團練副使劉摯為鼎州團練副使蘇轍為化州别駕梁燾為雷州别駕范純仁為武安軍節度副使安置于循新雷化永五州劉奉世為光禄卿分司南京黜韓維以下三十一人輕重有差此詳書法也綱目顯慶二年秋八月貶韓瑗来濟禇遂良皆為逺州刺史此畧書法也今隨事斟酌用之所貶之官所居之州見備要注文宗室自國公以上及外戚内臣之貴者其除拜本朝帝紀皆書今以有所關繫則書否則畧雜例一行幸貞觀六年九月如慶善宫此書行幸近地之例也十二月帝如雒陽觀砥柱祠禹廟遂至蒲州閏二月朔帝還宫此書行幸逺地之例也永徽元年二月御安福門觀百戲此又一例一賜宴貞觀六年七月宴近臣于丹霄殿十二月宴五品以上于東宫一繕脩貞觀六年九月修雒陽宫開元二年六月作興慶宫五年以明堂為乾元殿十年冬十月復以乾元殿為明堂以上三條今於逺地行幸必書餘則斟酌有所關繫則書賜宴繕修亦然大工役如修京城築河隄之類必書一郊祠諸史書例不一今於郊祀明堂必書郊祀通鑑曰郊分祭合祭以其帝配則隨時書之明堂亦然其餘祠事創始則書有所關繫則書宗廟升祔之類亦同一賞賜貞觀四年加李靖光禄大夫七年賜太子庶子于志寧孔穎逹等束帛此皆或因事而書今從之一進書貞觀十七年房𤣥齡等上髙祖今上實録開元二十年九月開元禮成一振䘏貞觀七年九月山東四十餘州水遣使振之以上二條今斟酌用一蠻夷朝貢貞觀三年十二月突厥突利可汗入朝閏十二月蠻酋謝元琮等来朝四年林邑遣使入貢今於其始通中國則書或因事而見則書一蠻夷君長死立永徽四年十二月西突厥吐陸可汗死此書死例也貞觀十二年西突厥乙毗可汗立此書其國中自立例也開元二十八年以阿史那興為付姓可汗或書冊或書立此皆書自朝廷立之之例也今於遼國髙麗西夏交趾諸國斟酌輕重書于年末餘則不正之變者例不盡諧欽定四庫全書史部二九朝編年備要目録編年類巻一太祖皇帝建隆元年建隆二年建隆三年乾徳元年乾徳二年乾徳三年乾徳四年巻二太祖皇帝乾徳五年開寳元年開寳二年開寳三年開寳四年開寳五年開寳六年開寳七年開寳八年開寳九年十二月改太平興國元年巻三太宗皇帝太平興國二年太平興國三年太平興國四年太平興國五年太平興國六年太平興國七年太平興國八年雍熈元年雍熈二年巻四太宗皇帝雍熈三年雍熈四年端拱元年端拱二年淳化元年淳化二年淳化三年淳化四年巻五太宗皇帝淳化五年至道元年至道二年至道三年巻六真宗皇帝咸平元年咸平二年咸平三年咸平四年咸平五年咸平六年巻七真宗皇帝景徳元年景徳二年景徳三年景徳四年大中祥符元年大中祥符二年大中祥符三年大中祥符四年巻八真宗皇帝大中祥符五年大中祥符六年大中祥符七年大中祥符八年大中祥符九年天禧元年天禧二年天禧三年天禧四年天禧五年乾興元年巻九仁宗皇帝天聖元年天聖二年天聖三年天聖四年天聖五年天聖六年天聖七年天聖八年天聖九年明道元年明道二年巻十仁宗皇帝景祐元年景祐二年景祐三年景祐四年寳元元年寳元二年巻十一仁宗皇帝康定元年慶厯元年慶厯二年巻十二仁宗皇帝慶厯三年慶厯四年巻十三仁宗皇帝慶厯五年慶厯六年慶厯七年慶厯八年巻十四仁宗皇帝皇祐元年皇祐二年皇祐三年皇祐四年皇祐五年巻十五仁宗皇帝至和元年至和二年嘉祐元年嘉祐二年嘉祐三年巻十六仁宗皇帝嘉祐四年嘉祐五年嘉祐六年嘉祐七年嘉祐八年巻十七英宗皇帝治平元年治平二年治平三年治平四年巻十八神宗皇帝熈寧元年熈寧二年熈寧三年巻十九神宗皇帝熈寧四年熈寧五年熈寧六年熈寧七年巻二十神宗皇帝熈寧八年熈寧九年熈寧十年元豐元年元豐二年元豐三年巻二十一神宗皇帝元豐四年元豐五年元豐六年元豐七年元豐八年巻二十二哲宗皇帝元祐元年元祐二年元祐三年巻二十三哲宗皇帝元祐四年元祐五年元祐六年元祐七年元祐八年巻二十四哲宗皇帝紹聖元年紹聖二年紹聖三年紹聖四年巻二十五哲宗皇帝元符元年元符二年元符三年巻二十六徽宗皇帝建中靖國元年崇寧元年崇寧二年巻二十七徽宗皇帝崇寧三年崇寧四年崇寧五年大觀元年大觀二年大觀三年大觀四年巻二十八徽宗皇帝政和元年政和二年政和三年政和四年政和五年政和六年政和七年重和元年宣和元年巻二十九徽宗皇帝宣和二年宣和三年宣和四年宣和五年宣和六年宣和七年巻三十欽宗皇帝靖康元年靖康二年正月至四月臣等謹案九朝編年備要三十巻宋陳均撰均字平甫號雲巖莆田人端平初有言是書於朝者勅下福州宣取賜均官迪功郎馬端臨文獻通考載均編年舉要三十巻備要三十巻又有中興舉要十四巻備要十四巻今中興舉要備要皆佚此書前有紹定二年真徳秀序稱皇朝編年舉要與備要合若干巻則當時舉要備要本共為一書今其舉要亦佚存者惟此編耳其書取日厯實録及李燾續通鑑長編刪繁撮要勒成一帙兼採司馬光徐度趙汝愚等十數家之書博攷互訂始太祖訖欽宗凡九朝事迹欲其篇帙省約便於尋閲故茍非大事則略而不書林岊序謂取司馬氏之綱而時有修飾取李氏之目而頗加節文足以括其體例然實以通鑑綱目為式特據事直書不加褒貶耳觀均自序其宗㫖可見也乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
