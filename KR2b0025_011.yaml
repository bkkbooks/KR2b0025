body:
  text: 九朝編年備要巻十一宋陳均撰仁宗皇帝起庚辰康定元年止壬午慶厯二年庚辰康定元年春正月丙辰朔日有食之知諫院富弼請罷宴徹樂遼使在館宜就賜飲食而已參知政事宋庠以為不可弼曰萬一彼行之為朝廷羞後使遼者還云遼罷宴如弼言上深悔之元昊冦邊劉平石元孫死之初元昊聲言將攻延州范雍懼甚奏請濟師未報而元昊詐遣人乞和雍信之不為備元昊乃盛兵攻保安軍自土門路入聲言取金明寨李士彬嚴兵待之夜分不至士彬解甲而寢翌日奄至士彬父子俱被擒遂乗勝抵延州雍先以檄召平於慶州使至保安與元孫合軍趍土門及是復召平元孫還救延州至三川口與賊遇賊以輕兵薄戰官軍少却鄜延都監黄徳和居陣後引衆先遁我師遂敗平與元孫皆被執賊圍延州凡七日及失二將城中憂沮不知所為會大雪遂解去城得不陷徳和既走使人誣奏平元孫降賊夏守斌頗辨其枉尋命殿中侍御史文彦博鞫之盡得其實腰斬徳和於河中府仍追贈平元孫錄其子孫厚䘏其家募陜西强壯尋詔諸州㸃集强壯止令防䕶城池不刺手面閱習外無得他役二月以夏守贇為陜西都部署内侍王守忠為都鈐鎋守贇尋兼緣邊招討使知諫院富弼言用守贇既非而守忠乃與唐中官監軍無異將吏必懼三司使晏殊亦請罷内臣監兵不以陣圖授諸將及出宫中長物助邊費凡他司之領財利者悉還度支去韓琦安撫陜西時賊兵尚圍塞門安逺寨延州諸將畏避莫敢出捄及聞范雍責命衆憂駭訴於琦願無使雍去琦奏雍二府舊臣盡瘁邊事邊人徳之且乞畱雍以安衆心趙振麤勇俾為部署可矣若謂雍節制無狀勢當必易則宜召知越州范仲淹委任之方陛下焦勞之際臣豈敢避形迹不言若涉朋比誤國家當族括京淮馬初命括京東西淮南陜西馬韓琦乞免陜西一路從之詔二府同議邊事時邊事専委樞宻而中書不與知諫院富弼請如國初以宰臣兼樞宻使乃降是詔求直言自范仲淹貶禁中外越職言事富弼因論日食謂應天變莫若通下情願降詔求直言盡除越職之禁上嘉納焉三月詔近臣陳陜西攻守䇿同知樞宻院事陳執中言元昊竊發西陲以游兵困勁卒以甘言恱守臣一旦連犯亭障延安幾至不保自金明破而並邊籬落大壊塞門至金明二百里今宜别修三城城屯千人冦大至則入保小至則出鬭又以二千人屬盧闗都巡檢以為三寨之聲援且戎狄貪而無親議者欲結西域諸國恐徒耗金帛若交兵之際與賊互出首尾則疆場之憂百倍於前且邊兵小屈皮膚之傷也民力既窮腹心之患也請且修沿邊城池不過五七處仍須廣土兵減騎卒蓋土兵增則守禦有備騎卒減則轉饟可蠲静守以驕其志蓄銳以挫其鋒更須主張將臣使横議不及則虎士得以盡節上嘉納之學士丁度奏曰中國抗夷狄可以智勝不可以戰鬭蓋地形武技與中國異也羌戎上下山版出入溪澗中國之馬不如也隘險傾側且馳且射中國之技不如也為今之䇿莫若謹亭障逺斥堠控扼要害為制禦之全計因上十䇿名曰備邊要覽同修起居注吳育言漢通西域諸國謂之斷匈奴右臂唐太宗嘗賜回鶻可汗詔書真宗亦命博囉齊攻李繼遷今宜募士往諭嘉勒斯賚及他蕃部以散其黨此真伐謀之要也育因錄真宗朝通西域諸蕃幷昊賊父祖本末上之其後殿中侍御史文彦博言將權不可不専軍法不可不峻兵法曰畏我者不畏敵畏敵者不畏我使之畏我非嚴刑何以濟乎古者什伍之長皆得専殺今統馭之重乃不能誅一小校則軍中之令可謂隳矣議者以今冦非大敵師非深入將校有犯宜從中覆夫冦非大敵師未深入尚臨戰先退倘遇大敵則孰肯奮耶國朝著令禁軍將校之有過則從中覆當施之於平居無事之時今邊防用人逾數十萬將不峻法何以御之哉黑風晝晦申詔中外言事先是已下詔求直言羣下猶未有所獻故也其後陜西都轉運使龎籍上言連年灾異天久不雨臣謂弭灾消禍在朝廷自修比年費用奢廣出納不嚴内中須索既多有司以憑由除破無緣鈎較虚實臣竊謂乘輿所用宫中所費宜取先朝為則今宿師西鄙力戰重傷方復賞功而内官醫官樂官無功時享豐賜故天下指目謂之三官願少裁損無厚賚予専勵戰功外冦不足平也王鬷陳執中張觀罷初天聖中鬷使河北過真定見曹瑋瑋謂曰君異日當柄用願畱意邊防鬷曰何以教之瑋曰吾聞趙徳明常使人𣙜易漢物不如意欲殺之元昊諫曰我戎人本從事鞍馬間而與漢𣙜易不急之物已非䇿又從而斬之失衆心不可徳明為貰不殺吾使人覘元昊狀貌異常它日必為邊患鬷時莫究所謂比再入樞宻元昊果叛上數問邊計不能對及劉平石元孫等敗議刺鄉兵久不決故三人及夏守贇皆以是罷樞宻詔參政同議邊事夏四月增募河北强壯從知制誥王拱辰之言也拱辰言契丹不畏官軍而畏土兵故有是命五月張士遜致仕本朝以宰相得謝者自士遜始先是詔揀輦官為禁軍輦官千餘人遮兩府喧唱不遜士遜馬驚墜地中丞栁植請付有司鞫之時朝廷多事士遜無所補諫官韓琦上疏曰政事府豈養病坊耶士遜不安上章請老故罷未幾斬輦官二人配二十人揀為禁軍如初詔以吕夷簡為平章事初徙知越州范仲淹知永興軍未至又改陜西都轉運使至是仲淹過闕上諭仲淹與夷簡釋憾仲淹頓首曰臣向所論國家事於夷簡何憾也置陜西都部署兼經畧安撫招討使以知永興軍夏竦為使范仲淹韓琦副之召夏守贇王守忠等赴闕仲淹疏言近邊城寨有五七分之備而闗中之備無二三分若昊賊深入乘闗中之虛或東阻潼闗隔兩川貢賦則朝廷不得髙枕矣為今之計莫若且嚴戒邊城使持久可守實其闗内使無虛可乘若冦至使邊城清野不與大戰闗中稍實豈敢深入既不得大戰又不能深入二三年間彼自困弱此上䇿也又聞邊臣多請五路入討臣恐未可輕舉太宗朝以宿將精兵而西討艱難終未收復況今承平嵗久無宿將精兵一旦興深入之謀臣謂國之安危未可知也惟陛下圖之鄜延路鈐轄張亢上言今每路總管鈐轄都監多至十四五員權均勢敵不相統制凡有論議互執不同請别創使處分所貴事出於一又請逐路以馬步軍萬人擇才位兼髙者為總領以下為三將賊小入則一將出大入則大將出又量賊數多少使隣路出兵而應接之此所謂常山蛇也又諸路騎兵不能馳險計其芻粟一馬之費可養歩軍五人馬不髙者宜遣還坊監止留十之二以步人代之又用兵以來屢出無功一旦更議五路深入臣竊以為未可後多施用者仲淹辟歐陽修掌書記修以親為辭且曰今世所謂四六者非修所好兼此末事有不修而能者又曰古人所與成事者必有國士共之非惟在上者以知人為難士雖貧賤以身許人固亦未易欲其盡死必深相知知之不盡士不為用今竒怪豪俊之士往往已䝉收擇顧用之如何爾然尚慮山林草莽有挺特知義慷慨自重之士未得出門下也宜少思焉修尋除秘閣校勘元昊冦邊陷塞門安逺筝寨寨主王繼元蔡沂等死之時著作佐郎張方平上平戎十䇿大畧以為宜屯重兵河東示以形勢賊入冦必自延渭而興州巢穴之守必虛我師自麟府渡河不十日可至此所謂攻其所必救形格勢禁之道也宰臣吕夷簡見之謂知樞密宋綬曰大科得人矣六月增募河陜京東西鄉弓手强壯初陜西河北有神銳忠勇及鄉弓手强壯而神銳忠勇已廢至是詔二路選補增廣其數倂及諸路焉河東都轉運使楊偕言方今兵不為少茍多而不練則其勢易以敗又困國而難供時論者惟務多兵而偕之論如此尋詔河北河東路强壯陜西京東西路新置弓手皆以二十五人為團置押官四團為都置正副都頭各一人五都為指揮置指揮使各以階級伏事二十係籍六十免取家人或它户代之聴私置弓弩每嵗十月後正月前分番上州教閱半月即遣歸農或遇非時勾集守城及捕盜日給糧二升嵗正月縣以簿上州州以籍奏兵部按舉不如法者秋八月禁以金箔飾佛像以范仲淹兼知延州先是詔分邊兵部署領萬人鈐轄五千人都監領三千人有冦則官卑者先出仲淹曰不量賊衆寡而出戰以官為先後取敗之道也乃分州兵為六將將三千人分部教之量賊衆寡使更出禦賊賊不敢犯既而諸邊取法焉賊相戒曰無以延州為意今小范老子腹中自有數萬甲兵不比大范老子可欺也大范盖指雍云都監周美請于仲淹曰賊新得志其勢必復來金明當邊衝我之蔽也今不亟修將遂失之仲淹因屬美復城如故數日賊果來其衆數萬薄金明陣於延安城北三十里美領衆二千力戰會暮不見援兵乃徙軍止北多設疑兵賊望見以為救至即引去時諸將多不利美十餘戰平族帳二百焚其寨二十復故城堡甚衆九月河決滑州以葉清臣為三司使中書進擬三司使清臣不在選上謂清臣才可用遂命之清臣奏編前後詔勅使吏不能欺簿帳之叢冗者一切刪去内東門御厨皆内侍領之凡所呼索有司不敢問乃為合同以檢其出入定禁衛儀制初三駕皆以待禮事而近出止用常從以行惟前有駕頭後擁繖扇而已議者以為近於簡畧於是參知政事宋庠言漢魏有大小法駕之儀至唐又分殿中諸衛黄麾等仗國朝承五代簡畧鳴鑾游豫儀衛寡薄頗同藩鎮宜委近臣討繹於三駕諸仗酌取其中稍增儀物詔禮院與兩制詳定遂增清道馬及騎而執䍐罼徒而執哥舒與前後牙門旗等物又禁乘樓下瞰垂簾外蔽頗著于令其後亦寖弛云元昊冦邊冦鎮戎軍三川寨都巡檢楊保吉等死之又陷乾溝等三堡韓琦即命任福攻白豹城克之置奉宸庫在延福内舊名宜聖殿等五庫今合為一築青澗城初寨門承平諸寨既廢延州東路無復籓籬鄜州判官种世衡請營故寛州州西南直延安二百里當冦衝右捍延安左可致河東粟北可圖銀夏范仲淹然之奏用其䇿詔世衡即廢壘興築壘近寇寇屢出争世衡且戰且城之初苦無水鑿地百五十尺至石而不及泉工以為不可穿世衡命屑石一畚酬百金卒得甘泉城成賜今名遷世衡内殿崇班知城事開營田三千頃募商貸以本錢使通貨得利城遂富實間出行部族慰勞酋長或與所服帶會客飲有得寇事來告者即與飲器由是屬羌皆樂為用因命世衡兼鄜延都監尋又請募土兵别為一軍從之世衡放子也冬十月詔内降許執奏上性寛仁宗戚近倖有求内降者或不能違乃詔有内降升遷者許執奏製調兵銅符木契端明殿學士李淑所定也銅符木契傳信牌銅符刻曰某處發兵飾以虎豹而中分之右留樞宻院左降總管掌之凡發兵五千人以下一虎一豹符以上用雙虎雙豹符命使者齎宣同下勘畢即發兵復緘右符以還木契題曰某處契中剖之上留總管下付州軍城寨掌之總管發兵遣指使齎牒同往驗合即發兵復緘上契以還傳信牌中為槽藏筆墨紙每臨陣傳命主將書以報兵官兵官復書事宜而還明年冬有詔罷之浙東軍叛討平之浙東軍士鄂鄰等殺巡檢使張懐信聚兵剽刼湖南福建廣南諸州縣逃入海懐信内臣性苛虐衆號張列挈鄰等積怨忿作亂明年獲鄰於占城國戮之十二月置神御庫直秘閣趙希言奏據古僖順二祖當遷國家道觀佛寺並建别殿以奉神御豈若每主為一廟一寢更立祧廟逐室各題廟號同判太常寺宋祁言周制有寢有廟以象前有廟後有寢也廟藏神主寢藏衣冠至秦乃出寢於墓側故陵上更稱寢殿今宗廟無寢蓋本於兹荀卿王肅等皆云天子七廟僖祖至真宗方及六世不應别立祧廟自周漢每常自立廟晉宋以來多同殿異室國朝以七室代七廟相承已久不可輕改自是室題廟號如希言所陳又建神御庫於宗正寺南命涇原鄜延路討元昊命以正月上旬出兵自元昊冦鎮戎官軍不利有詔責夏竦於是竦上攻守䇿令副使韓琦判官尹洙取決於朝廷宰臣吕夷簡欲用攻䇿樞宻副使杜衍以為僥倖出師非萬全計争議久之上命用攻䇿故有是詔於是衍求罷不許知延州范仲淹言正月起兵塞外雨雪大寒暴露僵仆我師可憂萬有一失噬臍何及春深漸暖方賊馬瘦人饑其勢易制此得天時之便又可以擾其耕作且元昊謂國家太平忘戰邊城無備是以恣其桀驁今備邊漸飭賊至則擊願許臣稍以恩信示之或可招納不然臣恐情意阻隔偃兵無期若用臣策嵗月無效徐圖舉兵先取綏宥據其要害屯兵營田為持久之計則横山人户必掣旗來歸拓疆禦冦莫此之利上用其議於是仲淹固守鄜延館閣校勘歐陽修上書曰自元昊叛逆三十萬之兵食於西者二嵗矣又有十四五萬之鄉兵不耕而自食其民自古未有四五十萬之兵連年仰食而國力不困也夫兵攻守而已然皆以財用為强弱臣謂通漕運盡地力𣙜商賈三術並濟則財用足而兵可久以守以攻惟上所使謹上便宜三事一曰通漕運漢唐都雍天下之物皆可西至也隋漕闗東之粟至渭南然尚有三門之險自唐裴耀卿於三門東西置倉開山路十八里為陸運以避其險嵗運二三百萬劉晏遵耀卿之路悉漕江淮之米以實闗西今江淮之米歳入於汴者六百萬石誠能分一二百萬石以給闗西浚治汴渠使運不阻然後按求耀卿之迹不憚十許里陸運之勞則河漕通而物可致以紓闗西之困此水運之利也漢髙祖自南陽而入武闗臣常至南陽問其路云自鄧西北至永興六七百里小商賈往往行此今誠能按求而通之沿漢十二州之物皆漕而頓之南陽為輕車置十五六舖而逓之入闗前日陛下賜禁帑錢十萬以給西用而道逺踰年不至豈若較南陽之旁郡度其道里入於武闗以至京師近逺等者皆使輸於闗西京師有不足則以禁帑出賜有司者代而充用此陸運之利也其二曰盡地利自京以西地之不闢者不知其數今河東河北闗西之鄉兵此猶有用若京東西者平居不足以備盜而水旱適足以為灾其尤可患者京西素貧之地非有山澤之饒民惟力農是仰今三夫之家一人五夫之家二人為游手凡十八九州以少言之尚可四五萬人不耕而食誠能驅之使耕其棄地官貸其種嵗入與之中分如民之法則民之願耕者衆矣且鄉兵本農也籍而為兵遂棄其業今承其去農不久尚可驅還田畝使不得羣遊飲博以為父兄之患此民之願也三曰𣙜商賈夫興利廣而上難専必與下共之然後通流而不滯今議者方欲奪商賈之利一歸於公上而専之故每一變法一嵗之間所損數百萬是欲専而反損今為國之利多者茶與鹽爾茶自變法以來商賈不復一嵗之失數年莫補所在積朽棄而焚之議者屢言三説之法為便誠能復之使商賈有利而通行則上下濟矣解池之鹽積若山阜今宜暫下其價先為令曰三年將復舊價則貪利者争先而凑矣夫茶者生於山而無窮鹽者出於水而不竭二物之所以貴者以能資國之錢幣爾今不散而積之是惜朽壌也夫何用哉巴蜀江淛饑越明年春遣翰林學士王堯臣等十六人分路體量安撫旌隱士是嵗賜永興軍草澤髙懌號安業處士後間有不錄辛巳慶厯元年春正月元昊請和元昊遣塞門寨主髙延徳還延州令見知州范仲淹約和仲淹不聞之朝廷乃自為書遺元昊諭以禍福於是韓琦聞之謂人曰是知我欲大舉而為欵兵之計不然懈我邊防又將入冦時走馬承受崔宣亦以賊請和事奏上謂輔臣曰賊多詭計欲懈我師爾乃詔逐路益嚴備之二月冦渭州韓琦命任福等禦於好水川戰敗福及耿傳桑懌王珪武英等並死之將佐軍士死者六千餘初夏竦令尹洙趍延州與范仲淹議出兵而仲淹固執前奏竦又上言兩路協力尚恐未能挫敵而仲淹却以牽制為名止欲委涇原之師以嘗冦正墮賊計詔以竦奏示仲淹龎籍亦言臣度朝議以屯兵已久上費國力欲決於攻取或且汰去冗兵只留精銳在邊則數少而費寛然後乘釁大舉庶有萬全之策陜西經略判言田況亦言兩路大舉必招大悔其不可者有七乞召大臣定議但令嚴邊備不必先有輕舉乃罷出師至是元昊入冦琦徑趍鎮戎軍出兵萬八千人召環慶副總管任福至涇原計事使將以擊賊涇原駐泊桑懌為先鋒鈐轄朱觀及都監武英王珪繼之將作監丞耿傳參行營軍事琦授方畧令倂兵合勢自懐逺城趍得勝寨出賊之後未可戰則據險設伏待其歸擊之福違約束自引輕騎數十趍懐逺城與賊戰于張家堡之南斬首數百賊佯北懌引騎趨之福踵其後暮屯好水川英及觀屯籠洛川相距隔山五里約明日會兵川口不使賊得逸去諜者傳賊兵少故福等悉力逐之不知賊之誘也路既逺糧不繼遂力戰死之方元昊傾國入冦而福所統者皆非素撫之兵臨敵受命法制不立既又分出趨利故至甚敗奏聞上嗟悼之皆贈官有差福之敗也琦即上章自劾孫沔等請削琦官會夏竦奏琦嘗以檄戒福貪利輕進上知福違節制取敗罪不専在琦手詔慰撫之尋乃奪琦使權徙知秦州福之敗士好議論者多咎其喪師陜西經畧判官尹洙作憫忠一篇曰甚哉世人謀其身之周也山外之戰諸將以力死明白不可欺或者咎其失計且不與其死也忠義世之所髙死人之所難以甚難之節而負至髙之名茍與之則已當蹈之矣惡所以謀其身者哉善謀身者則非之以喪兵沮威雖死吾弗與然後享其富保其身為無愧為身之計豈不周乎冦讐在境兵師在行欲必生以保功難乎哉嗚呼喪兵以取死豈諸將心耶亦不幸而已為國家者無使謀身者終其幸死義者重不幸則節士勸矣又作辨誣一篇曰山外之役耿傳死於陣人或誣曰傳督諸將輕進使與大敵卒遇賊傳致也後得傳與諸將書戒且持重慮為彼誘此豈督諸將進耶宋興八十載文吏死軍事者或以城守之責或不幸與禍會其死義一也至如臨大敵不懾與驍雄之士争致其命如傳比者亦鮮悲夫謀既不用又後之死猶不免於誣者豈喜於立異耶豈惡夫為忠耶募京東西等九路宣毅軍京東西河東北江淮荆浙福建九路大州二營水州一營為就糧禁軍合十萬餘人知院張方平言其不便以為去嵗初降勅命點差强壯弓手之時民間喧然皆言此時差點雖以强壯弓手為名實欲黜補軍籍敕㫖屢下丁寧再三諭以朝廷點差之意只要各䕶鄉閭必不起從征戍郡縣多方安輯民猶猜譁及經去冬教習尋放歸業鄉閭竊語方以少定然名在弓手之籍者居常心恐不自安每聞一使出行州縣輒相扇動謂來調發今此命忽下果如所料命令無復可信凡再疏不報京師雨藥夏五月嚴銅錢出界法一貫以上為首者死宋庠罷先是吕夷簡當國同列不敢預事唯諾書紙尾而已庠為參知政事數與争論夷簡不恱上顧庠頗厚夷簡忌之巧求所以中庠者未得及范仲淹擅通書元昊又焚其報夷簡從容謂庠曰人臣無外交希文何敢如此庠以夷簡誠深罪仲淹也他日於上前議其事庠遽請斬仲淹樞宻副使杜衍力言其不可庠謂夷簡必助已而夷簡終無一言上問夷簡夷簡徐曰杜衍之言是也止可薄責而已上從之庠遂倉皇失措論者喧然皆咎庠然不知實為夷簡所賣也遂罷以富弼知制誥初内侍劉從愿妻遂國夫人王氏以罪奪封至是復命之弼繳還詞頭封命遂寢唐制惟給事中得封還詔書而舍人繳詞頭蓋自弼始六月以范雍知永興軍初命夏竦判永興又以陳執中知永興及兩人分出按邊而領府事猶如故乃復使雍守京兆於是一府三守分吏奔趍往來不勝其擾自昔未嘗有也雍卒於慶厯六年諡曰忠獻雍為治尚恕好謀而少成然知人喜薦士後多至公卿者守延安時狄青為小校坐法當斬雍貸之詔西邊嚴備初陜西經畧判官田況上兵䇿十四事略曰内帑之積祖宗本為用兵臣願朝廷發内帑之財募陜西河東强壯之民五七萬屯鄜延環慶涇原三路甫及防秋則以逐路弓手分守城寨而參以正兵每路及五六萬人軍氣自振必曰募民則衆情不安增邊戍則大費不贍此循常之論也且出財選募非同差點必有樂為用者又曰好水川之戰任福為大將不能指揮乃自率一隊前當劇鋒勢窮而陷忠雖可憫然其才止一卒之用欲矯此弊在乎峻大將之權如葛懐敏為鄜延總管張亢為鈐轄乃平牒往來動皆鈞禮韓琦范仲淹為經畧副使葛懐敏見之禮容甚慢上下姑息三軍何所法耶又曰賊將伊哷剛朗凌裕勒且之徒分廂主兵皆近漢界出入從者不過一二人若能隂募死士陷胸碎首去賊之手足但朝廷不惜美官重祿則功豈難圖又曰環慶屬户未經殘破若綏御有術可得精兵數萬請以養兵萬人一嵗之費為招撫之具則無不濟自來屬户販青白鹽以求厚利令一切禁絶之無以資其生太宗朝鄭文寶言禁白鹽以困邊賊可不戰而屈人兵詔市之者皆死其法紀甚衆内屬萬餘帳歸繼遷命錢若水馳傳視之因復舊制戎人始附今若寛鹽禁則屬户無不得其用且國家通嘉勒斯賚誘以為用賜帛二萬促其出師終無實報招撫屬户不猶愈於彼乎又曰昊賊擾邊以來淮上兵踴躍争先而其請給不及東軍之下者若優加特支或定南郊賞例以激其心則立功不在東軍之後矣又曰戍邊之兵軍額髙者無如龍衛聞有不能披甲上馬者況驍勝雲武二騎之類挽弓不過五六斗請宻益步兵而減騎軍以一騎軍之費可贍步軍二人又寛市馬之煩擾違害就利莫善於兹又曰西賊至諸寨不出戰皆以軍法從事使趙奢李牧周亞夫授任於今必獲罪矣今若遇冦大至且堅壁以守賊若不多而怯懦不追並行誅之又曰任福在慶州蕃漢信服一旦徙涇原適值賊至將校都不識面勢不得不陷今請諸路将佐非大故毋得輕易庶責其成功又曰中國器用非戎狄可及今賊甲皆冷鍜而堅滑光瑩非勁弩可入豈中國技巧不如一小羌乎由彼専而精我慢而畧故也今請下逐處悉令工匠冷砧打造純鋼甲鏃發赴緣邊上嘉納之陜西體量安撫王堯臣言陜西兵二十萬而分屯四路然可戰者止十萬賊每由一路入冦常數倍官軍故三至而三勝涇原最當要害請益兵三萬人一萬屯涇州以控闗中二萬屯渭州以制山外又於環慶秦三州各益萬人如此則賊不敢輕出而犯寨也又言韓琦范仲淹皆忠義智勇不當置之散地又請結塞下屬羌使之自将出境破蕩生户以弱其勢又宋庠先請治函谷闗樓櫓闗中大恐堯臣極陳其不可乃詔毁之秋七月置萬勝軍凡二十指揮選神勇宣武虎翼軍之在營者為之初名神捷後改萬勝元昊冦邊先圍麟州遂陷寧逺寨寨主王世亶等死之復攻府州不能克圍豐州逾月城陷知州王餘慶等死之朝廷遣張元管勾麟府路軍馬收兵擊賊大破之然賊自是攻城掠野不已時將校張岊等戰比有功名振一軍卒皆不至顯官八月括河北馬緣邊七州軍免括九月令河東鑄大鐵錢從范雍之請也初令陜西行鐵錢未幾倂河東亦行之增江湖路鹽酒價於是嵗增課三十萬六千餘緡復義倉自乾徳初置義倉未久而罷明道三年詔復之不果景祐中王琪上疏引隋唐故事請復置仍令五等以上户計正稅二㪷輸一升貯之事下有司議者多異同而止至是琪復上其議上納之已而衆論紛然以為不便遂詔第令上三等户輸粟尋復罷之冬十月修河北城池罷都部署分四路置使兼經畧安撫招討使以知秦州韓琦渭州王㳂慶州范仲淹延州龎籍分領秦鳳涇原環慶鄜延四路先是夏竦陳執中同節制陜西議論多不合又久無功知諌院張方平言竦為四路統帥空國事邊於兹三嵗師惟不出出則致敗冦惟不來來必殘蕩安有擁握大衆至於覆軍殺將而曰我不與知是安用為統帥也於是移竦判河東執中知陜州分陜西為四路令琦等領之初元昊反隂誘屬羌為助環慶酋長六百餘人約與賊為鄉道後雖首露猶懐去就仲淹至部即奏行邊以詔書犒賞諸羌閲其人馬與立條約諸羌受命恱服自是始為漢用慶州之西北有寨當復橋川口深在賊腰中仲淹城之詔賜名大順與白豹金湯皆截然屹立環慶冦盜少矣時延州金明等寨及五龍川已破陷邊民焚掠幾盡籍至州葺治之戍卒十餘萬未有壁壘散處城中畏籍無敢逃去金明西北有橋子谷冦出入之隘道籍乃令指揮使狄青領萬餘人築招安寨於谷旁却賊數萬募民耕植得粟以濟軍又襲取承平寨又築龍安寨悉取冦所據故地凡築十一城置陜西營田務仍令總管轉運並兼營田使十一月置涇原弓弩手置彊人弓弩手凡十指揮從部署司之請也鑄鐵錢令江饒池三州凡鑄三百萬緡備陜西邊費也詔許延州招納元昊先是知諌院張方平言元昊為冦雖嘗得逞而絶俸賜禁闗市今賊中尺布直錢數百以此揣賊安得不困但其勢未能自通宜因郊赦特示招來願陛下計而行之上覽之大喜方平至中書見吕夷簡夷簡亦曰舍人有此言社稷之福也右正言吳育亦嘗上言天下久安人情翫習有議及邊防則謂之生事夏州久有人往來中國窺見朝廷有因循之勢遂發姦謀望陛下延對大臣討論闕政修節用愛民之經求調兵練將之䇿則一方小警不足慮也上嘉納之育繼又上疏言聖人之待外臣羈縻而已況夷狄之性喜事剽急因而偽遁以致王師武夫貪功或蹈詐偽之機今當堅壁清野以挫其鋒而徐觀其勢時羣臣争言小醜可即誅滅育獨建言元昊名為藩臣其尺賦斗租不入縣官窮漠之外服叛不常且已僭輿服誇示酋豪勢必不能自削宜援國初江南故事稍易其名可以順撫而收之越明年正月范仲淹亦上言自西戎犯邊議攻者謂守則示弱議守者謂攻則速禍今臣思之乃知攻有利害守有安危蓋攻其逺者則害必至攻其近者其利必隨守以土兵則安守以東兵則危今覩赦文謂彼無騷動則我不侵掠臣願朝廷於守䇿之外更備攻術寧有備而不行豈當行而無備也自古兵馬精勁西戎之所長金帛豐富中國之所有禮義不可化干戈不可取則當任其所有勝其所長臣前知越州嵗納稅絹三千萬儻以啖戎是費一郡之入而息天下之弊也詔下陜西諸路帥司參議丙寅郊十二月置陜西䕶塞軍除見充保毅强壯人弓箭手外别置季一閱外有警調集即廩給之毋出本路後韓琦奏罷之定資政殿學士員大學士二員以舊相罷免者為之學士三員從梁適請也慶厯二年春正月復京師𣙜鹽法用三司使姚仲孫之請也自元昊反軍興用度不足因聴並邊入中芻粟予劵趍京師𣙜貨務受錢若金銀入中它貨與劵償以池鹽由是羽毛筋角之類一切以鹽易之猾商貪人與吏為姦虛費池鹽不可勝計鹽直益賤販者不行於是仲孫與范宗傑為制置解鹽使往經度之詔復京師𣙜法凡商人以虛估受券及已受鹽未鬻者皆計直輸虧官錢内地州軍民間鹽悉收市入官為置場增價而出之復禁永興軍等十一州通商官自輦運以衙前主之仍禁私鹽入蜀置折博務於永興鳳翔聴人入錢及蜀貨易鹽趍蜀中以貨二月詔北邊嚴備知保州王果言聞契丹與元昊相結將謀興師請豫為備故也置兩河義勇陜西保捷等軍詔河北諸州强壯自三月後並赴州閱習委知州擇其强勁者刺手皆為義勇軍不願者釋之而存其籍以備守葺城池自是强壯寢廢矣詔始下人情洶洶乃詔河北轉運使李昭述安撫之日行數舍開諭父老衆始安焉踰月又詔河東選鄉弓手有武勇者不刺面為義勇指揮陜西弓手刺面為保捷指揮尋又詔刺環慶路保毅强兵為軍時知渭州王㳂亦請刺本路弓箭手三萬人為軍從之冬十一月從韓琦之請刺陜西秦鳳路義勇為保捷軍凡一百八十五指揮秦州既刺保捷又增收保毅及三千人凡諸州保毅軍總六千五百餘人為指揮三十一而河北河東陜西選强壯抄民丁為義勇河北總十八萬九千人河東總七萬七千人陜西至治平初總十五萬六千人親試舉人賜楊寘以下四百餘人及第出身有差寘初試國子監禮部皆第一及是上臨軒詹封見姓名喜動於色曰楊寘也公卿相賀為得人後竟未霑祿而卒先是知制誥富弼言省試有二長殿試有三短唐武后時始有殿試此何足法請自今止令南省放榜必恐恩歸有司則宜引於殿庭然後賜第則與殿庭無異矣詔罷殿試而學士王堯臣等多言其隳故事乃詔且如舊契丹使來求闗南地契丹遣其臣蕭英劉六符來求石晉所割瓦橋闗十縣其書略曰李元昊於北朝為甥舅之親設罪合致討曷不以一介為報況營築長堤填塞隘路歸決塘水添置邊軍既稔猜疑慮隳信睦倘思久好共遣疑懐以晉陽舊附之區闗南元割之縣見歸敝國共康黎元初有涿州進士梁濟世嘗主文書遼帳下一日得罪來歸言彼將有割地之請又知雄州杜推序亦先得其事以聞至是上發書示輔臣色皆不動六符亦疑其書之先漏時朝廷厯選可報使者命知制誥富弼為接伴弼入對便殿叩頭曰主憂臣辱臣不敢愛其死上為動色北使入境遣使慰勞英託足疾不拜弼曰吾嘗使北卧病車中聞命輒起拜使至而君不起此何禮也英矍然起拜弼察其心自以為先違盟約懼事變乃與之開懐盡言冀以鈎得其情二人遂無隱謂弼曰事可從從之不則更以事塞之勿失舊好也由是朝廷悉知彼情時中丞賈昌朝充館伴使六符謂昌朝曰塘濼何為者耶一葦可航投鞭可平不然決其堤十萬土囊遂可路矣上以問知制誥王拱辰對曰兵事尚詭彼誠有謀不應與語乃六符夸言爾設險守國先王不廢而祖宗所以限敵騎也時朝議欲許宗室女與其子或增嵗遺獨弼以許婚為不可乃以弼為樞宻直學士辭不受夏四月議省冗費時西兵不解財用益屈張方平屢乞選官與三司較國用嵗計之數量入以為出參究利害之原剗革因循之弊大畧謂今聚師境上調發寖廣倚于經入則財不給加以横斂則人不堪捄兹交急特在陛下身先率下惟事事得其撙節而已又曰夫減省所為者自下而議上則於體不順由上以率下則于名為正上乃詔内侍以先帝及先聖初籍較近嵗禁中用度增損外則命中丞賈昌朝諫官田況張方平等與三司議議者尋減皇后宗室婦郊賜之半又詔皇后嬪御進奉乾元節回賜權罷於是皇后嬪御各上俸錢以助軍費宗室刺史以上亦納公使錢之半荆王元儼盡納公使錢詔以半給之富弼使契丹報書畧曰元昊狡謀狂僭嚮議討除已嘗達復夫築堤埭開陂澤蓋霖潦衍溢當致繕防閱集兵夫蓋邊臣常職彼此何疑遽興請地之言殊匪載書之約時宰相吕夷簡任事人莫敢抗弼數侵之又論駁其所黨吏益以為恨欲因事罪弼于是集賢校理歐陽修引顔真卿使希烈事奏留不報而弼受命不少辭以供備使張茂實副之初遼書曰太宗無名之師直抵燕薊一時莫知所答王拱辰獨請間曰河東之役本誅僭偽契丹遣使行在致誠矣已而冦石嶺闗潛假兵以擾我太宗怒其反覆既平繼元遂下令北征安得謂之無名上喜曰事本末乃如此因諭執政曰非拱辰詳識故事卒難答也初劉六符之來上命沔北都轉運使李昭述城澶州而以治隄為名調兵農八萬六符過之以為真治隄也及還而城已就六符甚駭焉詔三館言事仍許請對于是集賢校理歐陽修上疏畧言自古王者之治天下雖有憂勤之心而不知治理之要則心愈勞而事愈乖雖有納諫之明而無力行之果斷則言愈多而聴愈惑又曰當今所最闕者不過曰無兵也無將也無財用也無禦戎之道也無可任之臣也而臣謂今皆有之國家創業之初四方割據中國地狹兵民不多惟善用之故不覺其少豈如今日承平盡有天下之富强人衆物盛十倍國初故臣敢曰有兵有將有財用有禦戎之䇿有可任之臣然陛下皆不得而用者朝廷有三大弊故也何謂三大弊一曰不謹號令二曰不明賞罰三曰不責功實夫言多變而不信令頻改則難從今出令之初不加審謹行之未久尋又更張以不信之言行難從之令故每有處置之事州縣知朝廷未是一定之命則官吏咸相謂曰且未要行不久必須更改或曰備禮行下畧與應破指揮旦夕之間果然又變此不謹號令之弊也古今用人之法不過賞罰而已然賞及無功則恩不足勸罰失有罪則威無所懼雖有人不可用矣用兵以來賞罰之際是非莫分大将以無功而依舊居官偏禆畏懦逗留法皆當斬或暫貶而尋遷或不貶而依舊所謂賞不足勸罰無所懼如此而欲用人其可得乎此不明賞罰之弊也兵動以來處置之事不少然多有名無實新兵多是老弱小懦之人兵額空多可用者少所在數習又無訓齊精練之術此有點兵之虚名而無得兵之實效有教兵之虚名而無訓兵之實效也諸州所造器械數不少矣工作之際已勞民力運輦搬送久苦道路而鐵刃不剛筋膠不固長短小大多不中度此又有器械之虚名而無器械之實用也以草草之法教老弱之兵執鈍折不堪之器械百戰百敗理在不疑臨事而悟何可及乎故事無大小悉皆鹵莽此不責功實之弊也萬事未可盡言請先言其大者五事其一曰兵臣聞攻人之謀不以力用兵鬭智不鬬多前代用兵之人多者常敗少者常勝況於外域尤難以力争只可以計取故善用兵者以少而為多不善用兵者雖多愈少今沿邊之兵不下七八十萬然訓練不精又有老弱虚數十人不當一人是七八十萬之兵不得七八萬人之用若精加訓練去其老弱七八十萬可得四五十萬今不思實效但務添多耗國耗民遷延日月賊雖不至天下已困二曰将臣聞古語将相無種故或出於卒伍或出於奴僕或出於盜賊惟能不次而用之乃為名将爾今求将之意雖切選将之路太狹願革去舊弊奮然精求豪杰之士不須限以下位知畧之人不必試以弓馬山林之傑不必薄其貧賤陛下以非常之禮待人人臣亦将以非常之效報國又何患於無将哉三曰財用臣又聞善治病者必醫其受病之處善救弊者必塞起弊之原今天下財用困乏其弊安在起於兵興而費大也昔漢武帝好窮兵用盡累世之財當時耀兵單于臺不過十八萬尚能困其國力況今日七八十萬連四年而不解所以罄天地之所生竭萬民之膏血而用不足也今雖有智者物不能增而計無所出矣唯有減冗兵之虚費練精兵而速戰功成兵罷自然足矣其四曰禦戎之䇿臣又聞兵法曰上兵伐謀其次伐交北國通好僅四十年不敢妄動今一旦發其狂謀者其意有在蓋見中國頻為元昊所敗故各啟其貪心伺隙而動爾今督勵諸将選兵秣馬疾入西界但能痛攻昊賊一陣則吾軍威大振而彼計沮矣此所謂上兵伐謀者也今論者皆知西北欲倂二國之力窺我河北陜西若使二國並冦則難以力支今若我先擊敗一國則其勢減半不能獨舉此兵法所謂伐交者也茍失此時而使二國先來則吾無䇿矣五曰可任之臣今文武常選之官盈於朝廷徧於天下其間非有材智之人陛下總治萬機之大既不暇盡識其人固不能躬自進賢而退不肖執政大臣動循舊例又不敢進賢而退不肖審官吏部三班之職但掌文簿差除而已又不敢越次進賢而退不肖是上自天子下至有司無一人得進賢而退不肖所以賢愚混雜僥倖相容今議者或謂以舉子轉官為進賢犯罪即黜為退不肖此不知其弊之深也大凡善惡之人各以類聚故好贓濫者各舉貪濁之人好財利者各舉謀求之人性庸懦者各舉不才之人守廉節者乃舉公幹之人朝廷不問是非但見舉主數足便與遷官則公幹者進矣貪濁者亦進矣不才者亦進矣混淆如此便可為進賢之法乎方今黜責官吏豈有澄清糾按之法哉唯犯贓之人因民論訴者乃能黜之耳夫既舞弄文法而求財賄者亦强黠之吏政事必由已出故雖誅剝豪民尚或不及貧弱至於不才之人不能主事衆胥羣吏共為奸欺則民無貧富一時受弊以此而言則贓吏與不才之人為害等耳今贓吏因事自敗者十不去一二至於不才之人上下共知而不問寛縱容奸其弊如此便可為退不肖之法乎賢不肖既無别則宜乎設官雖多而無人可用也臣願陛下明賞罰責功實則才不才皆列於前矣臣故曰五者皆有然陛下不得而用者為有弊也陞大名府為北京以程琳知府事兼留守初景祐中范仲淹知開封建議城洛陽以備急難及契丹将渝盟言事者請從仲淹之請吕夷簡謂敵畏壯侮怯遽城洛陽亡以示威必長彼勢景徳之役非乘輿濟河則彼未易服也宜建都大名示将親征以伐其謀詔既下仲淹又言此可張虚聲耳未足恃也城洛陽既寢又請速修京城議者多附仲淹議夷簡曰此囊瓦城郢計也使彼得渡河而固守京師天下殆矣故設備宜在河北卒建北京識者韙之仲淹疏畧曰臣聞天有九閽帝居九重是以王者法天設險以安萬國也或曰京城王者之居髙城深池恐失其體臣聞後唐末契丹以四十萬衆送石祖入朝而京師無備閔宗遂亡石晉時叛臣張彦澤引契丹犯闕而京師無備少主乃陷此無備而亡何言其失體哉至于西洛帝王之宅太祖營修蓋意在子孫表裏山河應接東京之事勢連屬闗陜之形勝又河陽據大川之險當河東之會要為西洛之北門又長安自古興王之都天下勝地皆願朝廷畱意常委才謀重臣預為之備天下幸甚契丹既就盟仲淹復上疏以為朝廷未修東京而先修北都臣謂東京根本也北都枝葉也若將巡幸臣謂有可慮者五近代外夷為京師之禍者數四矣不可不大為之防京東分東西路分京東為東西兩路以知青州陳執中鄆州張觀兼領安撫使時契丹雖通使而所徴兵始大集幽州故河北京東益為備也以王徳用判定州兼三路都部署徳用日教士卒習戰頃之士勇皆可用契丹遣人來覘或請捕收之徳用曰彼得其實以告是服人之兵以不戰也明日大閱於郊乃下令具糗糧聴吾鼓聲視吾旗所向覘者歸告北中謂漢兵将大入至是復議和兵乃解申嚴銷金禁自宫掖始秋七月以吕夷簡兼判樞宻院章得象晏殊兼使殊仍加平章事初富弼建議宰相兼樞宻使上曰軍國之務當悉歸中書樞宻非古官然未欲遽廢故止令中書同議樞宻院事及張方平請廢樞宻院上乃追用弼議而有是命議者以判名太重夷簡亦不敢當尋復使名富弼再使契丹先是弼至契丹與北人往反難論力拒其割地意及見遼主宗真弼曰兩朝人主父子繼好垂四十年一旦求割地何也宗真曰南朝違約塞鴈門增塘水治城隍籍民兵意将何為羣臣請舉兵吾止之故遣使求地而已弼曰北朝忘章聖皇帝之大徳乎澶淵之役若從諸将言北兵無一得脫者且與中國通好則主專其利而臣下無所獲若用兵則利歸於臣下而主受其禍故欲用兵者皆為身謀非國計也宗真驚曰何也弼曰晉末帝時中國狹小上下離叛故契丹全師獨克雖虜獲金幣充牣大臣之家而壯士健馬斃者大半此誰任其禍者今中國提封萬里精兵百萬號令修明中外一心北朝欲用兵能保其必勝乎曰不能弼曰勝負未可知借使必勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶嵗幣盡歸人主臣下所得止奉使者嵗一二人耳羣臣何利焉宗真大悟首肯者久之弼又曰塞雁門備元昊也塘水始於何承矩事在通好前地卑水聚勢不得不增城隍皆修舊民兵亦補其闕耳非違約也晉髙祖以盧龍一道賂契丹周世宗復伐取闗南皆異代事宋興已九十年若欲各求異代故地豈北朝利哉今主上命使臣有詞矣曰朕為祖宗守國必不敢以其地與人北朝所欲不過利其租賦耳朕不欲因争地多殺兩朝赤子故屈已增幣以代賦入若必欲得地是志在敗盟假此為詞耳朕亦安得獨避用兵乎澶淵之盟天地鬼神豈可欺哉宗真感悟遂欲求婚弼對婚姻易以生隙不若嵗幣之久也本朝長公主齎送不過十萬緡豈若嵗幣無窮之利宗真曰而且歸矣再來當擇一事為報宜遂以誓書來弼既歸復命再同張茂實往聘詔弼草答詔及誓書弼請增誓書三事毋廣開溏淀增屯兵騎容受叛亡錄副以行中使持誓書追至武彊授之時宰相吕夷簡害之弼私念三事前與遼約萬一書詞同異則無以反命乃宻啟觀之果如所料即奏列其事先遣屬官蔡挺馳白執政上亟召對弼以禮物屬茂實疾馳至京師以晡入見一夕易書而行弼初奉使一女卒至是一男生皆不知得家書不發焚之曰徒亂人意八月䇿制科武舉錢明逸制舉入等易之子也契丹使同富弼來修好弼至契丹其主宗真専欲增幣曰南朝遺我書當曰獻否則曰納弼争不可宗真曰厚幣遺我既懼我矣何愛此為吾擁兵而南得無禍乃國乎弼曰皇帝兼愛南北之民不忍使蹈鋒鏑故屈已增幣何名為懼若不得已用兵當以曲直為勝負非使臣所憂也宗真曰勿固執古亦有之弼曰自古惟唐髙祖借兵於突厥故臣事之當時所遺或稱獻納則不可知其後頡利為太宗所擒豈復有此禮哉彼知不可奪於是留增幣誓書復使劉六符及耶律仁先以其國誓書來求獻納至闕弼奏曰臣昨力排之彼氣折矣可勿許彼無能為也時契丹誓書曰來書云聖章皇帝與昭聖皇帝誓書每嵗以絹二十萬疋銀十萬兩以助軍旅之費今以兩朝修睦三紀於兹闗南縣邑本朝傳守已久愧難依從每年更增絹十萬疋銀十萬兩恭惟二聖威靈在天顧兹纂承各當遵奉共循大體無介小嫌餘依景徳統和兩朝誓書於是嵗增幣二十萬而朝廷國書卒用納字弼争不能得尋以弼為翰林學士弼力辭不就職言于上曰增金帛與北和非臣本志也特以朝廷方討元昊未暇與彼角故不敢以死争耳功於何有而敢受賞乎願陛下益修武備無忘國恥卒辭不拜遼既復修和好有忌弼功髙妄指他事譛弼奉使不力乞斬於都市上雖不聴而弼深畏恐故每遷官輒力辭焉時契丹實顧惜盟好特為虛聲以動中國中國方困西兵宰相吕夷簡等持之不堅許與過厚彼既嵗得金帛五十萬因勒碑紀功擢劉六符為顯官云時識者欲以金帛啗契丹使攻元昊中丞賈昌朝曰契丹許我而有功則責報無窮且以我市于元昊昔尚結賛欲助唐討朱泚而陸贄以為不可後乃知吐蕃隂與泚合今安知契丹計不出此耶乃上言太祖初有天下監唐末五代方鎮之盛盡收其權為萬世利及太宗所命將帥多攀附舊臣而猶稟成算所向有功自此以來兵不復振西羌之叛驟擇将領士不素練戰必致敗此削方鎮之弊也且親舊恩倖已任軍職者出即為將帥素不曉兵而一旦付以十萬卒之命為庸人驅之死地此用親舊恩倖之弊也臣謂守方鎮者宜無數易管軍之官宜授有功如楊崇勲李昭亮輩皆恩倖之人尚在邊任宜速選人代之此救弊之端也臣請復陳當今備邊六事一曰馭將帥今每命將帥錫與金帛鉅萬而無感恱者以例所當得也用兵之際須出非常然後可以動其心又陜西四路主將不専號令故動則必敗請今命將去疑貳推恩意爵賞威刑得便宜從事偏禆而下不聴令者以軍法論筦𣙜賦稅皆得用之二曰復土兵河東河北强壯已定其法每鄉為軍擇其才者籍記姓名而陜西弓箭手貪召募錢糧多刺為兵今宜復其田疇安其廬舍使力耕死戰出為邊用三曰訓營卒太祖下令諸軍食無肉衣無帛異時被甲鎧冒風霜無不一當百今營卒驕惰臨敵無勇又兵器不精宜以時教之使上下相援令之曰失一隊長則斬一隊何慮衆不為用乎四曰制戎裔契丹近嵗兼用燕人治國建官一同中夏昊賊據河南列郡而行賞罰善于用人如嘉勒斯賚敏珠黙赫藏舒克女真髙麗新羅等處舊皆通中國今為二國隔絶可募人往使誘之來朝則二國必疑諸國而為備則勢分五曰綏畨部請令沿邊知州皆帶安撫畨部之名務在招集擇其族盛而有勞者以為酋帥如河東折氏髙氏之比庶可為藩籬六曰明探候今西鄙刺事所遺不過數千錢但略訪境上道聴傳言塞命而已夫入萬死之地探索機會非有重賂厚賞肯自効乎願監藝祖任將之制邊城財用一切委之使募死力以為覘候而望敵知來免陷兵之恥也書奏多施用之閏月元昊冦邊葛懐敏等死之先是元昊聲言入冦王㳂命懐敏等將兵禦之至瓦亭寨懐敏與諸將分兵屯鎮戎城而趙珣謂懐敏曰賊逺來宜速戰宜扼賊歸路固守鎮戎以便餉道懐敏不聴命諸將分四路趍定州寨賊毁橋斷其歸路四面圍之懐敏突圍走行至長城濠路已斷遂及曹莫等十四人皆遇害餘軍九千四百餘人馬六百餘匹悉陷於賊時韓質等領軍數千保蓮花堡劉湛等領軍一千保向家峽皆不赴援於是賊長驅直抵渭州幅員六七百里焚蕩廬舍屠掠居民而去邠涇以東皆固壘自守時天陰晦者十日人情慘沮范仲淹自將慶州兵來援知涇州滕宗諒大設牛酒迥橋於是士卒感發邊民稍安上聞之喜曰吾固知仲淹可用也自劉平敗於延州任福敗於鎮戎懐敏敗於渭州賊聲益震然所以復守巢穴者蓋鄜延路屯兵六萬八千環慶路五萬涇原路七萬秦鳳路二萬七千有以牽制之故也冬十月詔恤陣亡將校女口無依者養禁中先是王仁嶼為歸峽等州都巡檢使與蠻賊戰没其子乞贈官中書以嵗久重於施行上曰死鋒鏑之下人之所難豈可以嵗月為限乎乃加贈仁嶼為崇儀使建州觀察使康繼英請以南郊所加恩回贈祖再遇一官上以其祖死事之臣仍優贈之十一月復都部署兼招討等使命仲淹及韓琦知延州龎籍並領之琦仲淹開府涇州文彦博帥秦鳳滕宗諒帥環慶張亢帥涇原皆從仲淹之請也上以涇原傷夷擬除彦博滑州移仲淹于涇原遣内侍諭㫖仲淹謝曰涇原重地臣不足以獨當此路願與韓琦同經畧初王堯臣安撫陜西歸請先備涇原時琦坐好水川兵敗徙秦州仲淹亦以擅復元昊書降耀州堯臣言二人者皆忠義智勇不當置之散地及葛懐敏敗上乃思其言復任二人為統帥實自堯臣發之至是堯臣又言今琦仲淹籍既總四路則四路當稟節制而尚帶經畧使名者九人宜並罷之滕宗諒亦以為言於是逐路帥臣罷兼副使以孫復為國子監直講復隱於泰山學春秋著尊王發微郡人石介以下皆師之介既為學官語人曰孫先生非隱者也於是范仲淹富弼皆言復有經術故有是命復為直講凡六年卒於嘉祐二年之冬復治春秋不惑傳註其言簡易明於諸侯大夫功罪以考時之盛衰而推見王道之治亂得經之本義為多復惡胡瑗之為人在太學常相避瑗治經不如復其教養諸生過之九朝編年備要巻十一
