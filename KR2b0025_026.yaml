body:
  text: 九朝編年備要卷二十六宋陳均撰徽宗皇帝起辛巳建中靖國元年止癸未崇寧二年辛巳建中靖國元年初韓忠彥性柔懦天下事多決於曾布布乃議以元祐紹聖均為有失欲以大公至正消釋朋黨乃詔改今元或以建中乃德宗太平時號上曰太平乃梁末帝禪位時號太宗不以為嫌詔下中丞王覿曰義雖取于皇極然襲前代之號乞以德宗為戒左正言任伯雨亦曰人才固不應分黨與然自古未有君子小人雜然並進可以致治者蓋君子易退而小人難退二者並用必至君子盡去小人獨留唐德宗坐此致播遷之禍建中乃其即位改元之號不可不戒春正月朔有流星光燭地自西南入尾抵距星是夕有赤氣起東北方亘西南中函白氣至將散復有黑氣在傍任伯雨言正歲之始建寅之月其卦為泰年方改元時方孟春居正首日為壬戌是陛下本命而赤氣起于暮夜之幽以一日言之日為陽夜為隂以四方言之東南為陽西北為隂從五色推之赤為陽黑與白為隂從事推之朝廷為陽宫禁為隂中國為陽外域為隂君子為陽小人為隂德為陽兵為隂此宫禁隂謀下干上之證也漸衝正西散而為白而白主兵此外域竊發之證也漢五行志云視之不眀是為不哲時則有亦眚赤祥又曰不明善惡親昵近習無功者受賞有罪者不殺時則有赤祥其説蓋出于洪範五事故唐世自大厯貞元寶厯間屢有赤氣之異惟文宗太和中為多是時宦官用事朋黨交結今陛下以堯舜之資當千載眀盛之時固非唐世衰末之比然天心愛陛下以災異為警戒不可不深思逺慮也願陛下收主柄抑臣下嚴勑宫禁以防慮幾微訓飭將帥以遏絶生事進忠良黜邪佞正名分擊姦惡事至必斷無以寬仁傷大義使邪佞小人無得生犯上之心則變異之起可變為休祥矣范純仁薨時以觀文殿大學士為中太一宮使口占遺表勸上清心寡欲約已使民絶朋黨之論察邪正之歸毋輕議邊事易逐言官辨眀宣仁誣謗略曰若宣仁之誣謗未眀至保佑之憂勤未顯皆權臣務快其私忿非泰陵實謂之當然上聞訃痛悼恩恤有加書其碑首曰世濟忠直諡曰忠宣純仁賦性寬簡嘗曰吾平日好學得之忠恕二字而已自為布衣至宰相勤儉如一俸賜悉以廣義莊前後任子恩多先疏族歿之日幼子五孫皆未官初貶永州諸子聞韓維謫筠州其子告章惇韓維執政日與司馬光議多不合得免行欲以純仁與司馬光議役法不同為言純仁曰吾用君實薦以至宰相同朝論事不合則可汝輩以為今日之言不可也有愧而生者不若無愧而死諸子遂止皇太后向氏崩追尊太妃陳氏為欽慈皇后以趙挺之為御史中丞時曾布為皇太后山陵使挺之為儀仗使布與宫官劉援交通知禁中密旨就陵下諭挺之建議紹述以合上意自此擊元祐舊臣不遺餘力而國論一變矣于是任伯雨言挺之無素行止出入曾布之門恐其觀望宜加察焉行入粟補官法行于河東陜西路自奉職借職太廟齋郎其直各有差仍免試注官二月以吕希純知瀛州時賢士大夫經紹聖貶責者稍稍還朝乃無所統一咸願推希純名數與執政侍從道之曾布等忌希純因其請覲未及見亟託以闕新有喪髙陽遼帥迫遣之其實邊鄙未嘗有警也雨雹再竄章惇任伯雨纍疏言惇簾前異議乞正典刑未蒙施行自古姦邪未有不先犯名分而能為亂者也遂貶雷州司戶自雷三移睦越湖州卒于崇寧四年初蘇軾責雷州不許占官舍遂僦民屋而惇以為強奪民居下州追民究治及惇責雷州亦問舍于民民曰前蘇公來為章丞相幾破我家今不可也初天下既苦王安石新法宣仁臨朝一切罷易之而一時用事小人反側不安興造姦謀伺候事變而惇及蔡卞實為之首及相謂他事不足移人主意若以先帝為言則易以激怒可資于報復私忿由是紹述之論興焉知卞及林希張商英最怨元祐大臣故力引之以為用與呂惠卿外相善而忌之不召也又深結中人藍從熙郝隨劉友端以自助惇獨相八年事無不如意士大夫一語少異即以為遏絶紹聖動搖國是天下士皆結舌而元祐黨禍起矣惇以實録詆熙寧政事由是前史官趙彥若等坐竄責尋用商英等章吕大防劉摰蘇軾蘇轍等又再與司馬光吕公著以下皆貶使林希主行謫詞惇猶奏曰前日再責吕大防等衆咸以為寬哲宗不聽又請編類元豐八年五月以來至元祐九年四月臣僚章疏及申請事自宰執侍從臺諫及職事兩省起居舍人以上并經筵史院帥臣監司逐名編録識者知搢紳之禍未巳尋又言司馬光吕公著詆毁先烈變更政事由是光以下再行追貶劉奉世等并皆遷謫其上書論及朝政者無不除名編管被罪者數千人自惇貶謫諸人悉以白帖子行之安燾李清臣與爭哲宗疑之鄭雍謂熙寧中王安石嘗行之取案牘以白上乃止卞猶慮所及者未廣又請置局看詳取元祐初訴理所公牘由是得罪甚衆惇等讎毁宣仁而所以釋憾于兀祐者猶未巳也以孟后宣仁之所厚忌之一旦掖庭祕獄起惇即迎合與郝隨相表裏以擠后孟后既發惇等念極毁宣仁事未有實欲因追滅元祐數大臣召邢恕為中丞與之誣造劉摯梁燾王巗叟謀為廢立事以為宣仁實屬意雍王又教蔡確之子渭進文及甫廋語欲因加摯等以大逆誘髙遵裕之子士京言王圭遣士充問其父當誰立事又引劉安世范祖禹論顧乳媪謂上已親女寵欲有傾搖于是同文館之詔獄起矣又欲遣使嶺表置獄連逮元祐之臣盡誅之又請發司馬光墓上並不聽甚至請追廢宣仁上雖不從然猶遣使杖殺陳衍等於海島徙司馬光等家屬毁拆宣仁故宫常侍宫人皆逐出有誅者鄒浩之竄也惇以士大夫與語言交通或致簡敘别賂遺白上置獄劾浩自京師至新州連逮數百人黜蔣之奇以下數十人天下之士益以寃憤初惇之經制南北江也定懿洽建沅州乘勢得梅山然二年之間死傷凡二十萬兵所至不以有罪無罪肆行誅戮無辜死者亦十八九南方兵禍自此始而所謂田畝租稅皆妄為鄧綰所劾及為相首以開邊勸上因言元祐臣僚蹙國棄地之罪謫降之外欲誅范純粹以行法紀夏人歲賜不通和市遣使議畫地界使孫路王贍張詢等再造青唐邈川邉事而安南渠陽等事皆起贍等進築城塞至五十所不復計地勢逺近險易汝遮城本元豐欲築而未敢者至是進築猶越汝遮二百五十里外築之贍等遂言克復青唐邈川宗哥城池惇不及告同列即入奏請率百官賀且白上將乘兵勢威夏國四方賀表繼至而湟州已告急熙河帥种朴敗死上為之震駭遂復棄鄯州關中由此大困開封民有因醉狂語者惇請論如指斥乘輿法上特貸死惇再取旨不已自是妄言者莫不誅死雖多殺不禁也初卞清臣布皆與惇比而為惡惇疑清臣嘗圖相位起田嗣宗獄置之極刑清臣由此逐去惇卞亦意好晚乖二人紛紛各立黨與政以此日亂矣三月以江公望為左司諫公望言人主寡欲以養心則心常虛而疏通端意以寧神則神常靜而淵默道之所集理之所會雖一日二日萬幾若乾坤自然之運豈弊弊然以事為哉又言天下大器置之安則安置之危則危此知置之之地未知運之之手天下神器為者敗之執者失之此知運之之手未知藏之之道藏天下于天下而不得避此所以為道也天下有常安之理聖人操妙用之手至人藏不動之道不動常動動常不動運常不運不運常運安常不安不安常安此牽制天下之妙理嗟夫戰國之縱橫秦漢之并吞有為之敗執之失故其妙不知所以藏其粗不知所以置亦幸爾今有器焉蟲而不飭蕩而不綱漏而不苴置之能安以否身坐其中雖巨有力焉能運行以否一日為有力者負之而去謂之善藏以否器既如是天下亦然陛下以仁為朴以義為削以信為繩以智為巧以禮為繪政以制其用刑以支其蠧啾啾萬鳴蠢蠢羣動同在一器虛而不實故衆實之所會靜而不動故羣動之所止止而不止則動亦寂矣會無所會故實亦空矣虛實一體動靜同役莫測其隱莫窺其用陛下以此藏之誰能移之也得之于天人非容心也視之若敝屣非有愛也承之于宗廟非敢忽也行一不義殺一不辜非敢為也人愛亦愛之人棄亦棄之示至公也上而公輔下而有司百執事或坐而論道或作而行之各當其力也不在一曲不滯一隅東顧西盻左提右挈有如掌握之上陛下以此運之孰能弊也不畏多難而以無為為憂不矜無過而以改過為美居安慮危在治思亂以山河為金湯以夷狄為赤子外之郡國若犬牙之相制內之宗族若磐石之鎮安建極於四達之途躋民於仁夀之域陛下以此制之孰能危也藝祖神考能還而藏之者也仁宗能安而置之者也今舉以付陛下如之何而不思也棄湟州時既棄鄯州于是大酋希巴烏迎懷德之弟錫羅薩勒入居之言者又論知湟州王厚首建開邉之䇿及盜青唐物上不欲竟其事姑從薄責而知河州姚雄又奏諸蕃怨贍等入骨樞密院請斬贍以謝一方議者又多請棄湟州朝廷問姚雄以棄守利害雄遣部將陳迪諭意于知湟州雷秀秀以為可棄無疑朝廷委雄措置雄命秀將湟州兵由京王關以歸統制官劉玠命居商旅由安鄉關以歸遂以湟州畀趙懷德而轄正與懷德俱還湟州于是懷德與希巴烏錫羅薩勒合追咎轄正先降轄正不安求內徙詔轄正居鄧州未幾卒解任伯雨言職時紹述之論已興伯雨居言職僅半載所上百有餘疏皆係天下治亂安危宫禁宗廟者細故不論曾布方用事伯雨欲擊之布覺乃先出伯雨知虢州夏四月辛卯日有食之隂雲不見復宗學元祐六年詔置未及成以賜蔡確至是復置宣和二年賜宗學宗子及第出身有差五月朔大雨雹以徐績為翰林學士時為給事中直學士院上疏言六事曰時要任賢求諫選用破朋黨明賞罰謂治國者未有用此而不治舍此而不亂大率皆指陳當時之弊上嘉納之曾布初以熙豐法行之嵗久當補其弊已而布背前議以為熙豐之法萬世不可改力陳紹述之説上久不決以問績績曰臣觀聖意所以未決得非欲兩存乎上曰朕意正爾績曰天下之事有是與非朝廷之人有忠與佞若不考實姑務兩存臣未見其可也又問以棄湟州何如對曰青唐不毛之地自收復以來歲費億萬計皆仰給內郡是徒有得地之名無獲地之實棄之使陛下以此為鑒自今勿惑小人之言妄興邊事無邉事則朝廷之福有邉事則臣下之利上然之遂有是命葬欽聖憲肅皇后欽慈皇后附永裕陵六月集禧觀火翰林學士王覿言臣聞漢史曰賢佞分别官人有序則火性得又京房易傳曰上不儉下不節則火數起臣望謹留聖意正厥事以應之則變可銷祥可兆矣解陳祐言職祐前後七章論曾布不從遂罷右司諫出通判滁州責辭略曰觀望以言意在推引豈不失朕用汝之本旨乎翌日宣押布視事布察上意恱因及祐章且言祐欲逐臣復行元祐之政則不由聖意不回也上曰安有此理又言岑象求輩揚言云軾轍不相不已當并逐之後兩日左諫議陳次升對有劄子救祐上不顧次升自袖去而左司諫江公望對請祐責詞所謂觀望推引之語上曰欲逐曾布引李清臣為相且曰如之何可容又言曾布安可去公望遽曰陛下臨御以來易三言官逐七諫臣非天下所期望今祐言宰相過失自其職也豈可便謂有他哉人君之于諫臣養之不可不素用之不可不審遇之不可不厚聽之不可不察去之不可不謹如知此數者則用諫官之道盡矣上然之又抗疏論主紹述分元豐元祐起禍亂之源言甚懇切先是祐因進對上謂曰凡有公事與江公望議論可乃來祐見公望公望曰榻前一磚之地是人臣對君父極言天下事去處唯上不欺天中不欺君下不欺心則可免戾人見各有不同唯不可傅會他日為上誦之上以為名言范純禮罷純禮奏言近見朝廷是元豐而非元祐元豐之政盡出先帝規模宜無不善然官吏奉行未必一一皆如法意故民雖受賜亦或被害元祐之治其初執政者雖小有潤色亦多先帝法度今議論之官有不得志于元祐者以此藉口動陛下之心耳未必皆為國事蓋乘時以要利者也又言自古天下治亂顧用人何如耳今略陳祖宗用人之要吕餘慶有才行太祖自負郎擢為諫議大夫王禹稱有文學太宗自大理評事擢為直史館張知白屢上書言事真宗自河陽判官擢為右正言遂大用夫人君欲得魁傑之士必出於非次擢用若惟侍輔薦舉左右論列其間有孤寒寡援正直自守者則終身冥晦雖有忠赤報國之心何由而見之純禮剛正數以言事忤上意而曾布憚之謂駙馬都尉王銑曰上欲除君都承旨范右丞不可先是銑嘗求為承旨欽聖謂銑浮薄遂以命王師約布妄言出于純禮以激怒銑銑信而恨銑館伴遼使稱純禮狎宴席間語犯御名為中丞趙挺之諫議陳次升所劾惟諫官江公望獨眀純禮無過而純禮不復辨遂出知潁昌府自此韓忠彥之客相繼被逐矣秋七月嚴河東火葬禁轉運使孫賁言河東習俗儉陋死者焚之韓琦知太原官營墓域使葬其後龎藉奏蠲地稅孫沔乞令三寺主之歲度一僧仁宗悉從其請逮今嵗久敝俗如故乞令守臣同運使官常加禁切無廢前規應河東州縣依此從之曾肇徙知應天府先是肇知太原府曾布言肇不習邊事乞别除一郡上許之且言肇性與卿逈别不同布曰肇性耿介自守但畏謹小心性頗執滯實無他也肇嘗以書責布略曰兄方當國得君正宜引用善人扶持正道使小人道消邪説不作以杜絶章惇蔡卞復起之萌而數月以來世所謂善人儒士者相繼去朝其在內者亦皆置之間地而所進用以為輔臣從官臺諫者皆惇卞之黨今日兄用事方盛彼固不敢言然其心豈忘惇卞哉一旦兄勢稍不如今日曾氏之禍豈可逃耶思之可為寒心可為慟哭不知曾思之否况君行令亦豈有常安可不先事而慮願兄虛心克已凡用人行事詢謀僉同然後為之必無過舉但使正人聚於朝自然小人道消惇卞之黨無自入矣此乃安身保位全家族愛子孫之長計此不為而為彼曾氏禍至無曰矣其可忽哉布答書略曰上踐阼之初深知前日之弊故收元祐竄斥之人而元祐之人持偏如故凡議論于上前無非譽元祐而非熙豐故上意憤鬱日厭元祐之黨乃復歸咎于布必欲逐之上意益以不平上之所向未見其不當于理若使布俯順衆人共為違咈則誠所不敢也布每自謂存心無愧於天與無負於人神之聽之介爾景福元祐及惇卞之黨亦何能禍加於我哉恐不致家族之禍為祖考之羞而纍及親友也惇卞素與之異趨今日乃欲與之解仇雖使甚愚如元祐之人亦不至此區區所以將順上德但欲置天下和平安靜之域其使布黽勉於此則元祐之人未必至受祻布朝失此則京輩暮至矣于斯時也元祐之人蹈覆轍而不已者其可為之痛心慟哭也惇卞所以嫁元祐之禍者以其毁先烈故加以無君之惡此禍奚為至我哉若自謂所引者皆正人所扶者皆正道以此杜絶惇卞復起之萌則元祐已試之效可見矣布則不然守常循理持平畏罪而無害物之心以保守而已廢興莫不有命仇怨之來但當引避使惇卞輩時至命通非常安民所能除亦非稷易之徒所能禦也此乃至理願味其言及蔡京既至布與肇皆不免重修神宗實録詔略曰日者史官或懷私見議論去取各有所偏參錯異同宜歸至當夫熙寧元豐事實具備元祐紹聖編録並存訂正討論其在今日筆則筆削則削宜公乃心是謂是非謂非無忝厥職其令史官取索元祐紹聖所修實録應于文字討論事迹參詳去取務不失實初陳瓘言王安石日録七十餘卷具載熙寧奏對議論之語紹聖再修神宗實録史官請以此書付史院專據此書追議刑賞遂使裕陵之美皆為私史所攘所有實録願詔史臣别行刪修十月以左正言范致虛言詔前降實録參取元祐及陳瓘已刪除王安石日録等指揮使勿行仍詔實録以朱墨本進朱墨本者紹聖初别修去取之事也在元祐所修則以墨本上以雌黃塗之謂之墨本入紹聖所修則以朱修之謂之朱本江公望朱紱罷殿直劉闕告蔡王府闕吏鄧鐸去年九月曾寫云隨龍人三班借職鄧鐸詔下開封府命推官吳師禮按治上問公望以師禮之為人公望以實對遂擢師禮為右司諫公望又言孝治之世豈容小人一門骨肉向章惇簾前妄議已有其迹蔡王年幼望陛下勿以無根之言加諸至親只治府吏流諸嶺表以示天倫之愛詔出公望知淮陽軍紱為給事中亦坐繳奏出知夀州其後獄成鐸伏誅蔡邸不挂吏議上頗以獄詞平反太過蓋法官不肯以指斥切害之罪罪之也先是公望言增益邏者通舊為七十人夫婦醜詆之言仇隙讎怨之語增情飾非摘隱抉伏豈清時所宜有又言陛下近來畜能鳴善鬬之禽籠竒羽佳音之鳥夫志有欲而不禁則志荒志荒則政怠矣又言傳聞有姓賈中貴人臂鷂鶻入後苑中逐禽鳥臣未之信然終疑而不釋也夫從禽乃少年諸王事以天子為諸王少年事何自輕乃爾非萬乘取重於天下之道也上悉命縱之惟一鷴畜久頗馴以麈杖逐之不去乃刻公望姓名于杖頭以志之及言鐸事竟坐罷黜安燾罷燾將請去密奏紹聖元符以來用事者持紹述之虛名以誑惑君父上則欲固位而快私讎下則欲希進而肆朋附并為一談牢不可破彼自為謀則善矣未嘗有毫髮為朝廷計也夫聽言之道必以事觀臣不敢逺引獨以神考之事切于今者為證不知果為紹述耶非耶當熙寧元豐內外府庫無不充盈至小邑所積見錢穀粟不下一二十萬自紹聖元豐以來傾府庫竭倉廪以供開邊之費大臣用以為遷延固寵之計故軍無見糧吏無月俸公私罄竭未有甚於今日而反謂紹述豈不誣哉今夷狄之情難測水患之變不常又慮盜賊潛謀承間竊發願陛下罷無益之人厚公私之積早計而預備之無使飾詞以為身謀者得行其説則天下幸甚又論東京黨錮之禍唐末近習之患今皆有其漸履霜堅冰不可不戒其言甚切遂自知樞密院出知河陽府蘇軾卒于常州吳越之人識與不識皆咨嗟出涕太學之士數百人相率飯僧于佛舍軾獎善詆惡蓋其天性見義勇為不顧其害用此數困然終不以為悔乾道間詔贈太師諡曰文忠八月陳瓘罷瓘奏言臣嘗乞别修神宗實録以成一代之典而不聞施行蓋紹聖之臣今為宰相故也不報時瓘兼權給事中曾布將薦之即真或以告瓘瓘曰吾與布議事不合是以官爵相餌也若受其薦進而復爾異同則公議私恩兩有所愧矣至是瓘詣政事堂以書見布略曰尊私史而壓宗廟緣邊費而壞先政二者閣下之過也瓘所撰日録辨所謂尊私史而壓宗廟者可見矣又以一年之內連下五勑而諸路三十年之蓄皆運于西邊因述國用須知所謂沿邊費而壞先政者可見矣遂以副夲納布布謂瓘所論為元祐單見淺聞之説又曰雖有十書布亦不動瓘遂申三省乞劾妄言之罪行竄黜宰相上之布云瓘責臣尊私史壓宗廟緣邉費壞先政皆非是上令責瓘韓忠彥陸佃曰瓘言誠過曾布當涵容遂自左司員外郎出知泰州瓘所奏五敕貼黃云朝廷應副邊事虛內事外非一日也故五敕之所取雖有别用之處然前後相同以致匱乏至于今日遂使天下根本乏財者初緣邊事也一元符三年九月勑府界諸路見管坊場錢留出本路一年合支外剩數留一半準備支用餘一半特令起發上京其年十一月勑起發見管常平免役錢如前勑一建中靖國元年二月勑諸路提舉司將見在抵當息錢並起發上京一其年三月勑起發諸路量添酒依抵當指揮一其年三月又勑諸路助役錢內撥一半充常平糴本餘一半計置起發上京兊那往三路添助常平糴本又曰自元豐七年以常平等積剩錢補助邊費歲取二百萬緡為額只以三年為期蓋不欲多費天下民財以資邊用神考愛民之慮可謂深矣豈宜取三十年間根本蓄藏之賜一旦大違成憲而偏用於一方乎西邊財匱竭則必取諸東南東南積剩之物今於無事之時既巧取而偏用之矣或東南有意外之患又將取之何地乎又曰五勑之後其年五月又降一勑以廣西錢一百萬貫預和買紬絹其文曰人戶願請價錢若干年例外支散可以接濟其實則人戶不願也且以無為軍言之民間買絹一匹須用一貫四伯文足人戶請常年一貫文耳今於年例外創添支散之數此乃聚斂之術臣恐自此一勑之後相繼無已又况侵削十路百姓只得絹一百萬匹未足充陜三兩月之費此豈神考接濟之法乎九月傅楫朝補之罷上以楫潛藩舊寮多所咨訪楫每以遵祖宗法度安靜自然為獻曾布自以于楫有所汲引恩兾其助已楫巋然守正凡命令不當必極言之又嘗論救王右范純禮布滋不悅至是楫以時事寖更數求去遂自中書舍人出知亳州補之亦自吏部郎中出知河中府曾布自敘云補之等日與其黨計議傾搖必有達於上聽者又為管師仁輩所攻師仁謂軾轍皆深毁先帝而補之庭堅等皆其門下士不可聚於朝又自豐稷而下召還以來無不譽元祐而毁熙豐故上追省憤疾日甚一日自布在樞密院時上已嘗諭布詆毁神考第一是豐稷其次張舜民然元祐之人尚以為皆出于布本非上意至此上意已眀而韓忠彥李清臣等猶欲回天衆莫不笑之忠彥嘗敷陳實録不當削韓琦章疏上數語人曰忠彥尚能主張韓琦朕豈不能主張神宗冬十月李清臣罷清臣與曾布有隙每於上前互相訾毁諫官陳祐論布過失上以祐與清臣交結欲黜布而援清臣御史彭汝霖遂承望風旨纍論清臣之姦又初議建景靈西宫清臣嘗諫止之及宫成清臣漸見踈斥求有以自固因奏西宫之成都人歡喜上不答清臣不自安且再為汝霖所劾遂自門下侍郎出知大名府十一月復平凖務崇寧二年又分為南北兩務庚辰郊罷合祭奉太祖配詔改明年元初詔以郊見天地之始冬祀權合祭圜丘而起居郎周常以合祭天地為非禮雖權於一時恐自今遂以為常且言臣頃嘗備員禮職見當時議者以合祭為非禮神宗下禮文所詳定而臣寮所見不同或欲省儀衛均賜豫而以乘輿躬行一至北郊者陳襄之議也或欲乘輿親行南郊七日戒之後三日宿之時宿太廟以告祖宗宿北郊以祭地祗宿南郊以祭天神者李清臣之議也或欲用先朝躬耕祫享故事皆因三歲郊天之期暫輟郊祀而于孟冬之月有事于地郊者王存之議也或欲以冬至親郊祠上帝用至日報天之説因即圜丘之北别祠皇地祗者陸佃之議也或欲以郊之嵗夏至之日盛禮容具樂舞遣冢宰攝事者張璪之議也神宗獨用璪議遂罷合祭陛下方欲繼述神宗要當一正舊典以為子孫長守之制乞下羣臣更議而御史彭汝霖亦論合祭非禮上亦欲罷前命而韓忠彥陸佃以為疑忠彥曰神祗非差除比被臺諫攻便罷曾布進曰權合祭元祐七年指揮乃以蘇轍之論而廢神宗之正論也且不畏炎熱而親祠北郊乃盡誠以祀天地何疑之有忠彥堅持不可上意向布乃詔權罷鄧洵武進愛莫助之圖時為起居郎嘗因對言陛下乃先帝之子忠彥乃琦之子先帝行新法以利民琦嘗論其非今忠彥為相將先帝之法更張之是忠彥為能繼父志而陛下不能繼父志也陛下必欲繼志述事非用蔡京不可乃進此圖其説以為陛下方紹述先志羣臣無能助者其圖如史記年表别為旁通分為左右自宰相執政侍從臺諫郎官館閣學校分為七隔左曰紹述右曰元祐左序助紹述者宰執中溫益一人而已其餘每隔止三四人如趙挺之范致虛王能甫錢適是也右序舉朝輔相公卿百執事皆在其間至百餘人又有左序别立一頂用小帖揭去曾布進呈因密稟羣寮姓名上曰洵武言非相蔡京不可以不與卿同故揭去布曰洵武所陳既與臣所見不同自不當與議乞納下眀日遂付右丞溫益欣然奉行乞籍記異論之臣於是上決意用京豐稷罷稷言近日建宫以寧神營寺以崇考復置御前生活以供內庭之用而外議不曉竊謂好修造尚華美稷所陳大抵以崇儉愛人為言至君子小人之際必反覆切究既數以言事忤權近自禮書出知蘇州十二月邢恕等敘復恕知隨州呂嘉問路昌衡知蘄州滁州安惇蹇序辰蔡卞並復官宫觀尋與郡召張商英等赴闕河東地震內嵐州樓煩縣經半月震不已是歲遼主洪基死孫延禧立洪基將殂戒其孫延禧曰南朝通好嵗久汝性剛切勿生事又戒大臣曰嗣君若妄動當力諫止延禧即天祚也是嵗改乾統政和初改天慶宣和三改保大女真阿固達立女真自大中祥符以後絶不與中國通元豐中嘗降詔髙麗令女真驅馬來市亦無至者女真凡數種有謂之生女真者其類尤繁有曰堪布者其長也裔孫曰英格號英格太師雄長諸部英格子曰阿固達為人沉毅而有大志初契丹國舊帳蕭轄哩聚衆為盜捕之不獲潛奔女真因命英格圖之英格遷延數月獨斬轄哩遣阿固達獻首級餘悉不遣謾云已誅絶契丹不得已反進其父子官自是隂懷異志力農積粟練兵收馬多市金玉以賂契丹權貴如此十餘年未有以發也是嵗英格死阿固達立壬午崇寧元年春正月河東地震太原府潞晉隰代石嵐岢威勝保化寧逺等州軍地震彌旬晝夜不止壞城壁屋舍人畜死甚衆詔官給錢瘞奠優恤死傷之家鄧州録參朱肱言伏自陛下即位以來兩次日食在正陽之月河東二十二郡曉夜震動自古災異未有如此今録所上宰相曾布書隨狀進呈其書略曰比年以來日蝕者二地震者一夫日蝕雖盛世不免然四月正陽之月也薄食正陽闕異為大河東二十二郡曉夜震動者凡十一郡不知相公闕弭之也臺諫天子耳目之官必天子自擇今監察御史闕相公門人右正言范致虛乃相公姪壻范致虛親弟闕舉燾言之則忘恩致虛爭之則忤親若皆不言則闕此日月之所以薄蝕天地之所以震動也慶厯中杜闕歐陽文忠公力辨數公不可去朝今安燾守西闕安豐稷守會稽賈易守南陽而鄧浩又乞東闕宰執百官而端人正士相繼求去此日月所以薄蝕天地所以震動也紹聖初章惇為宰相安燾在政闕燾一出而惇遂無所顧忌時相公在樞府坐闕得為無過也若以西府不當與議則遊談侍從闕思之職况執政乎再貶元祐臣寮范純仁能言之相公未嘗救也廢元祐皇后龔夬能言之相公未嘗救也闕鄒浩能言之相公未嘗救也置諫官於死黃履能言之相公未嘗救也洎欽聖付神器於陛下相公英聲偉闕在潛邸注意委重天下之士傾心翹首以觀考闕之效天變見於上地理逆於下肱竊疑之伏惟相公遇災而懼然後可以弭天變聞善則遷然後可以來直言肱之區區所望於相公者如此而已詔付三省二月以蔡確配饗哲宗廟庭時確之黨上書言元豐末確嘗密説皇太后令勿從靈駕保佑哲廟以銅匕箸以飲水亦必為之親嘗故也五年賜確墓碑曰元豐受遺定䇿宰臣蔡確之墓宣和二年蔡京引確之子懋上殿述其父有定䇿功詔追封汝南郡王趙諗伏誅諗江津人少敏給紹聖中擢甲科教授成都因章惇逐元祐大臣不合人心欲以此為名起兵據蜀與所親何奬王師直賈成時及日者羅京等同謀借姓孟起兵以從蜀人之屬望上登極赦到諗謂奬等曰章惇必敗天下既安人心難動前事願勿出口遂入京除太學博士請假還家欲回止諸人而黨中有發其謀者獄具當族有詔誅之家屬分配湖廣太妃朱氏薨追諡欽成皇后三月命內侍童貫如杭州監製器製造御前生活四年九月詔兩浙轉運使差開江兵卒駕杭州造作局御前生活物色舟自是楊戬始用事夏五月嚴內降執奏法詔略曰應被受傳內降特旨並許三省密院契勘若有戾祖宗格法可眀具奏更不施行韓忠彥罷忠彥至都堂左司諫吳材右正言王能甫以狀申忠彥云具論奏乞罷免忠彥得狀驚曰又似李邦直矣徑歸避位材及能甫之言大略云哲宗踐阼之初退托不言大臣因緣為姦變神考之法度逐神考之人材者司馬光吕公著陛下踐阼之初退托不言大臣因緣為姦變神考之法度逐神考之人材者韓忠彥李清臣此四人者罪同惡均難議差别光與公著嘗被追貶清臣已係殁亡所有忠彥偃然據位若令善去何以為姦邪之警材又言臣進三奏忠彥引用元祐姦黨盡變神考法度賴陛下照見姦謀力持紹述之議而忠彥不知愧恥終無引去之意乞檢會臣前後章疏付外遂出忠彥知大名府先是王能甫言知滁州劉安世曾解官為司馬光持服知潁州吕希純當時言事吕公著多聽用之乞削職罷差遣遂並自待制除修撰而差遣如故再奪司馬光等官諫官吳材王能甫輩排元祐不止諫議大夫彭汝霖與御史徐餘郭熙等共論以為元祐人罪狀有紹聖貶籍具在昨元符末敘復太優自是朝廷撿舉裁削數日可畢不須俟彈章人人指名然後行之於是曾布用其説悉具姓名以進乃詔司馬光吕公著文彥博吕大防梁燾范純仁劉摯王巗叟王存傅堯俞鄭雍以下四十有四人各奪官有差惟韓維孫固以神考潛邸舊臣有旨特免尋詔毁范純仁神道碑議定諡官各罰金籍黨人詔元祐并元符末今來責降人除韓忠彥曾任宰相安燾係前任執政官王覿豐稷見任侍從外蘇轍范純禮劉奉世范純粹劉安世賈易吕希純張舜民陳次升韓川吕仲甫張耒歐陽棐吕希哲劉唐老吳安詩黃庭堅黃隱畢仲遊常安民劉當時孔平仲徐常王鞏張保源朝補之商倚張庭堅謝良佐韓跂馬琮陳彥默李祉陳祐任伯雨陳郛朱光裔蘇嘉鄭俠劉昱魯君貺陳瓘龔夬江衍余爽湯彧程頥朱光庭張巽張士良曾燾趙約談扆楊稱陳殉張琳裴彥臣凡五十餘人並令三省籍記不得與在京差遣尋下詔略曰昔在元祐姦臣擅邦倡率邪朋誣詆先烈言翕言翕訿訿必欲一變熙豐之法度凡所論列深駭聽聞已擇其尤者苐加裁削外一切釋而不問在言職者亦勿復言令榜朝廷七月又詔知和州曾肇罷右丞陸佃知海州王覿知常州豐稷知隨州王古宫觀李格非知濮州謝文瓘永州安置鄒浩八人並依五月乙亥詔籍記尋又禁司馬光等二十一人子孫仕京尋又禁羇置人入京及諸色人妄議宗廟指斥乘輿并許人告賞錢三千貫白身與三班借職有官人轉兩官葬欽成皇后附永裕陵旌孝行周奇處州麗水人九歲喪母臥墳側二年有赤雀十數巢其傍可俯而窺詔旌以束帛時又有仙井監民樊談母病割股以療母五月思橙談泣立橙木下得實以饋有詔補榮州助教閠六月曾布罷布於元符末欲以元祐兼紹聖而行故力排蔡京逐出之至崇寧初知上意有所向又力排韓忠彥而專其政引京以自助復京翰林承旨尋遷尚書左丞京大與布異會布擬河北轉運使陳祐甫為戶部侍郎祐甫之子迪布之愛壻京奏曰爵祿者陛下之爵祿也奈何使執政私其親布忿辨久之聲色少厲中書侍郎溫益叱布曰曾布於上前安得失禮上不恱於是殿中侍御史錢適言布援元祐之姦黨擠紹聖之忠良而布亦連章乞罷遂出知潤州尋落職太平州居住又以嘗薦趙諗責散官知衡州眀年論棄湟州罪責賀州别駕言者再攻布詔置獄開封而府尹吕嘉問挾宿憾逮布諸子煆煉窮治由是曾紆曾繅等一百五十餘人坐責有差降布為廉州司戶並依舊衡州安置卒於大觀元年布初用王安石薦上前所言皆安石所欲建眀也青苖助役市易保甲遣使四出興農田水利皆布與惠卿建議而士大夫多爭之布上書欲上專任安石以刑罰脅制天下使毋敢言哲宗親政宰相章惇托紹述以挾私憤布贊之甚力惇興大獄布無能解救或隂擠之然以士心不附惇乃詭請薦陳瓘張庭堅又請毋毁司馬光吕公著碑又言今自丞弼以至言者知畏宰相而不知畏陛下皆欲以傾惇而未能也會上即位惇逐而布總揆乃議以元祐紹聖均為有失欲消釋朋黨邪正雜用及韓忠彥罷布獨當國始進紹述之説崇寧初上始專意有所向于是京用而布得罪矣竄鄒浩初劉后為賢妃生子中宫虛位后因是得立然才三月而薨諡獻愍太子后之立也浩三疏諫隨削其稿尋得罪貶上初即位召浩還朝首及諫立后事褒歎再三詢諫藁安在對曰焚之矣退告陳瓘瓘曰禍其在此乎異時姦人妄出緘不可辨矣及是蔡京用事素忌浩乃使其黨為偽疏謂本宫人卓姬生子后殺其母而取之其辭云殺卓氏而奪其子欺人可也詎可以欺天乎詔暴其事安置永州眀年移昭州浩在昭州作青詞告上帝有追省當時奏御之三章初無殺母取子之一字蓋為是云浩母張氏絶賢浩之為諫官也恐貽親憂欲固辭母曰兒能報國無愧於公議吾固何憂凡兩適嶺表不易初志追貶李清臣竄豐稷張舜民中書檢會清臣嘗有劄子言哲宗天資仁厚自元豐八年歷元祐紹聖未嘗有過失及章惇為相開導以殘忍殺民之事或托謗訕宗廟或稱謀危上躬受禍者一千餘家凡士民有暗昧語言加以榜釘手足剝割皮膚斬頭拔舌之刑至於道路以目不敢偶語有悮聖時有傷和氣也詔貶武安節副又以言者論稷及舜民在元祐時用事紹聖中行遣最輕至於元符末首為言官倡𨗳姦謀殊無忌憚二人辭謝言官上表皆譏謗先朝內舜民表云乃者藥石不進鳬雁僅存仗馬一鳴茅茹未巳南窮海表北踐江湖脫禁錮者何啻二千人計水陸者不止一萬里死者傷嗟之不及生者匍匐以來歸昔居輔弼之崇謀謨帝所終作蠻夷之鬼棄擲道傍古今未之或聞畢竟不知其罪敢望桑榆之晚景獲依日月之末光招魂於楚水之涯拭目於雲臺之表手遮西日口誦離騷等語於是並責授散官睦州商州安置上即位擢舜民為右諫議大夫在諫垣七日所上六十餘章其陳陜西之弊有曰以庸將而御老師役飢民而爭曠土時以為名言秋七月行久任法詔臺省寺監外監司郡守並三年成任宣和二年又詔內外官並以三年為任以治績聞者再任永為式以蔡京為右僕射自曾布罷免而相位闕者踰月時知樞密院蔣之奇門下侍郎許將皆應次補京乃自尚書左丞超拜右相制下中外大駭賜京坐延和殿上命之曰昔神宗創法立制中道未究先帝繼之而兩遭簾帷變更國事未定朕欲上述父兄之志歷觀在廷無與為治者今朕相卿其將何以教之京頓首謝願盡死云時四方承平帑庾盈溢京倡為豐亨豫大之説視官爵財物如糞土纍朝所儲大抵掃地矣上嘗出玉盞玉巵以示輔臣曰朕此器久已就深懼人言故未用耳京曰事茍當於理多言不足畏也陛下當享太平之奉區區玉器何足道哉置講議司命蔡京提舉用條例司故事置於都省仍令遴柬臣僚共議因革時京初得志天下仰其所為乃托紹述之柄首置是司講議元豐已行法度及神宗所欲為而未暇者京請以吳居厚張商英及劉庾充詳定官范致虛王漢之黎珣葉棣充參詳官又奏臣伏讀手詔如宗室冗官國用商旅鹽澤賦調及尹牧事皆政之大者臣欲每事委官三員討論乞並差充檢討文字有見任者令兼領不兼可及在外者並令斥罷見任赴司供職又言熙寧條例司檢詳文字編修及編定并在司分遣出外相度共十九人今事有多寡力有餘或不足乞從本司隨事分委仍乞以喬方沈錫充尹牧檢討官強浚明李詩鮑貽慶充宗室檢討官李琰陶節夫吳儲充冗官檢討官家安國王覺崔彪充國用檢討官李充虞防林據充賦調檢討官韓敦立曾説余授充商旅檢討官馮諶李憕吕悰充鹽澤檢討官未幾樞密院亦立講議司請以曹誘為詳定官曾孝藴為參詳官並從之三年夏罷講議司密院之司亦隨罷自京當國每除吏一啓擬毋慮數千人皆駭聞張閣韓靜為郎官皆資淺中書舍人吳伯傳繳詞頭京怒出伯傳知揚州焚元祐法竄張耒耒以向者聞蘇軾身亡出已俸飯僧縞素而哭也言者謂三代而上教出於一而天下同歸乎至治未嘗有專門之學三代而下政教法度不自天子出故國異政家殊俗雖有專門之學未嘗為師弟子之服若蘇軾張耒者適然相投遂為門下死黨非古人比者古之有道者猶且不為之服而况率然相投之人耶張耒素輕朝廷今又略無忌憚託為門弟子之名而肆為人臣所不敢為之禮原其情意天下且得共誅之詔責房州别駕黃州安置罷春秋博士仍詔進士勿治春秋以臣寮言元符末范柔中請置春秋博士非神考意故也元祐初至紹聖廢之八月置安濟坊以處民之有疾病而無告者初令諸郡置之尋復推行於縣復令進士兼試律如元豐制置居養院以處鰥寡孤獨尋詔以戶絶財産給其費不限月數乞丐法給米豆如不足即支常平司錢遺棄小兒仍雇人乳養復紹聖役法論變法罪貶徐彥孚等官彥孚朱彥陳察向紏劉唐老歐陽棐鍾正甫論端卿李昭玘陳瓘周鼎臣十一人並坐為户刑部官及尚書左右司朋附柄臣倡寬從之説刪改元符敕條降官落職有差十月劉奉世等二十七人皆坐垂簾之際黨與變法並罷所居官奉宫觀及吕希純周常龔原范純粹劉安世王覿王古謝文瓘于沂汝婺和鄂光江台洪州居住九月籍元符末上書人為邪正等初上出其書付蔡京京以付其子攸與其客強浚明葉夢得詳省第為正上正中正下邪等尤甚邪上邪中邪下七等計五百八十二人詔中書省籍記姓名先是鹿敏求等並坐上書追官有差又詔進士劉復上書深詆哲宗政事以廢后為惑聰明以授璽為妖妄以牽敘元祐罪惡為賢者不自私其黨以復用元祐姦黨為咨老成而舉八凱謂嬴秦作璽世道短促欲恐脅妖聽又言哲宗罰及賢者子孫毁其碑碣生者飲恨於遐方死者銜寃於幽壤三省宜子細看詳送所司考正合得情罪昭示君臣分義以戒詆毁誣罔宗廟之人十月詔元符上書議論純正京朝官喬世材等九人合閣門引對選入八人令三省審驗在外乘驛赴闕十二月詔元符之末下詔求言比以章疏付有司考其邪正其言當於理陳父子兄弟友恭之義者為正等三自鍾世美以下四十一人悉加旌擢其附會誣詆先帝政事者為邪等四自范柔中以下總五百餘人內取其謗斥尤甚者柔中等三十八人責逐逺行次等者梁寬等四十一人各與等第責降於是世美已卒贈諫議大夫餘人悉令擢用柔中等並特勒停羈管諸州梁寬等各降黜有差初崔鶠應詔上書言故宰相司馬光陛下左右以為姦而天下皆曰忠今宰相章惇陛下左右以為忠而天下皆曰姦此何理也於是亦入邪等知延安府范純粹坐欲害役法乞輪差鄉户充衙前與宫觀都水監丞李美簡坐欲害經術乞兼詩賦取進士勒停何執中言上書邪等不宜令到闕蔡京主之刻御書黨籍端禮門奉御寶批應元祐謫籍并元符末敘復過當之人各具元籍定姓名人數進入仍常切覺察不得與在京差遣文臣曾任宰相執政官文彥博吕公著司馬光吕大防劉摯范純仁韓忠彥王圭梁燾王巖叟王存鄭雍傅堯俞趙瞻韓維孫固范百祿胡宗愈李清臣蘇轍劉奉世范純禮安燾陸佃曾任待制以上官蘇軾范祖禹王欽臣姚勔顧臨趙君錫馬默孔武仲王汶孔文仲朱光庭吳安持錢協李之純孫覺鮮于侁趙彥若趙禼孫升李周劉安世韓川賈易吕希純曾肇王覿范純粹王畏吕陶王古陳次升豐稷謝文瓘鄒浩張爵民餘官秦觀湯彧杜純司馬康宋保國吳安詩張耒歐陽棐吕希哲劉唐老朝補之黃庭堅黃隱畢仲遊常安民孔平仲王鞏張保源汪術余爽鄭俠常立程頥唐義問余卞李格非商倚張廷堅李祉陳祐任伯雨朱光裔陳郛陳瓘蘇嘉龔夬吕希續歐陽中立吳儔吕仲甫徐常劉當時馬琮謝良佐陳彥默劉昱魯君貺韓跂內臣張士良魯燾趙約談扆王稱陳詢張琳裴彥臣武臣王獻可張巽李備胡田凡一百一十九人御書刻石端禮門尋詔黨人子孫有官無官並不許到闕明年又詔宗室不得與黨人子孫及有服人為婚姻又詔應責降人子弟令參選人於衆狀內開其父親兄弟係與不係黨籍之人其後吕仲甫徐常劉當時馬琮謝良佐陳彥默劉昱魯君貺韓跂九人並出籍招陜西河東弓箭手陽景信等四人分使陜西通行交子蔡京言茶馬司將川交子通入陜西民已取信今欲追三百萬貫令陜西與見錢鹽鈔兼行仍撥成都常平銅錢一百萬貫充本從之四年四月詔淮南許通行交子六月又詔交子並依舊法路分兼通行諸路惟不入京冬十月蔣之竒罷初之竒奏河湟事蔡京曰棄之可惜之竒以為當時兵敗糧乏蓋不得已上入蔡語每對執政言之竒昏老且曰湟㵛雖未能復然須責當日議棄者意在之竒也之竒覺上眷衰上章求去遂自知樞密院出知杭州之竒為都使者十二任六典都府所至以治辨稱置外學賜名辟雍初蔡京言興學為今日先務乞天下置學養士取解額三之一不入學者止許請解而在學者既許請解復得求旨充貢士額大郡置教授倣太學三舍為選補之法諸縣亦置學仍更制小學又建外學於國南待四方之士以國子祭酒總治內外學别置外學司業以下官處上舍內舍於太學處外舍於外學待其歲考行藝引之太學上舍三百人內舍六百人外舍三千人至是詔賜外學名辟雍宣和三年罷復廢元祐皇后孟氏貶韓忠彥等二十餘人時元符皇后閣官郝隨者諷蔡京再廢元祐皇后京未得間既而昌州判官馮澥上書論復皇后為非於是臺臣錢適石豫左膚等連書論韓忠彥李清臣黃履乘一布衣狂言復瑶華之廢后掠流俗之虛譽乞詢考大臣斷以大義慰宗廟神明蔡京與執政許將溫益趙挺之張商英皆主臺臣之説上不得已從之詔罷元祐皇后之號復居瑶華宫且竄治韓忠彥李清臣黃履曾布曾肇豐稷陳瓘龔夬等有差閻守勤以下編置者又十三人尋又責降任伯雨張廷堅曾布之子紆布壻吳則禮及陳次升等十一月置兩京宗正司講議司奏宗室量試法及置官莊贍給外或陳乞宗室願居兩京輔郡者各置敦宗院仍於西南兩置外宗正司擇其資之髙者使一人掌焉從之十二月論棄湟州罪再貶韓忠彥等九人韓忠彥散官安置濟州曾布散官仍舊衡州安燾濮陽蔣之竒以下六人皆責降有差明年八月再論棄湟州罪移張廷堅編管象州及安燾等十人罪徙有差忠彥卒於大觀三年忠彥之去位也右相曾布實譛之諫官吳材王能甫助之初中外之拭目新政也上意欲以中道合異論以忠彥忠厚和柔故相之忠彥亦承上意然是時紹聖用事之臣尚列要路隂得左右其黨及布之相復倡紹述之説改元崇寧小人比肩而進忠彥黜而布亦為蔡京所排自是黨議復起議者以忠彥不能大有建明為可恨云更茶法從蔡京之請也江淮等七路自乾德二年立𣙜法嘉祐初罷之京言十三山場茶慶厯以前歲取五百餘萬嘉祐通商今歲入不過八十餘萬欲復行禁𣙜仍給緍錢三百萬充本官自置場市之令客人於在京𣙜貨入納請長短引赴諸場受茶販易仍命遣官四員往諸路措置他日就緒即總以都大提舉一員餘並罷明年置淮浙路茶場四年罷茶場并入市易務令客人赴官請引自以園户買茶赴官盤稱納息批引販賣重和元年御筆買茶引限滿并令拘收别買新引增私販法行打套折鈔法蔡京初拜相有巨商六七輩負官鈔至庭下投牒索價且曰此章相公開邊時此曾相公罷邊時所用合三百七十萬緍不能償者至會罷邊棄地之費乃過於開邊也京奏之上戚然曰辱國且奈何京進曰臣請償之上喜曰卿果能為朕償之耶時國用常匱視三百七十萬餘緍為未易償故京因創行打套折鈔之法命官剗刷諸司庫務故弊之物若幕帟漆器牙禮錦段之屬及粗細色香皆入套為錢其直若干等立字號而支焉套始出客猶不願請有出而試者其間惟乳香一物足償其本而他物利又自倍於是欣然不半年盡償所費然打套有三或謂之折鈔套者此也或謂之乳香套者皆乳香也或謂之香藥套者粗細色香藥也癸未崇寧二年春正月辰沅州蠻納土辰州故黔中地漢唐皆建郡縣五代棄而不通自熙寧始復置沅辰元祐又棄之猺人恃險作冦去秋詔以知南康軍舒亶知荆南府又以荆南去辰州七百里非用兵應急之術令亶交府事與監司親往辰州措置至是奏知誠州楊晟臻等一千六百餘人及李閲奏知徽州楊昌簽等六百餘人納土訖奏告太廟及永裕陵加亶待制羣臣表賀未幾曲赦兩路改誠州為靖州論誣詆罪貶竄任伯雨等十四人伯雨昌化軍陳瓘廉州龔夬象州髙涓豐州陳祐歸州李深復州張廷堅鼎州江公望安州軍並編管鄒浩昭州王覿臨江軍豐稷建州陳次升建昌軍謝文瓘邵武軍張舜民房州並居住以知樞密院蔡卞追讐元符末言者疏已罪惡而伯雨論其欲追廢宣仁一事尤切至乃上疏力辨以伯雨為首於是三省檢會伯雨等前為諫官曾入章疏詆誣先朝故貶伯雨居三年以量移居道州宣和初卒以蔡京為左僕射二月尊元符皇后為太后宫名崇恩置殿中監初太府卿林顔因按內藏庫見乘輿御服雜然百物之中乃乞復殿中監六尚官制以嚴奉至尊既而上出神宗所度殿中省圖命三省行之乃詔立殿中監尚食尚藥尚醖尚衣尚舍尚輦凡六局自唐以來殿中內侍各自有省元豐官制雖未及新作殿中省及除人按本志監少丞皆與祕省官相聨則亦是文官之職矣本志又云舊制判省事二人以無職朝官充雖有六尚局名别而事存凡官隨局而移不領於本省而殿中監視祕監為寄祿官而已又長編載張誠一嘗請於內侍為殿中省官神宗不可或謂蓋不欲外官與宦官同意或然歟蓋唐六尚之職今多屬宦者大抵元豐更制武官及內侍皆未暇及非獨此也崇寧監少監亦用文臣惟六尚乃用宦者北司之盛此亦一端竄黃庭堅河北通判陳舉奏庭堅撰荆南承天院記言涉謗訕也其記略曰儒者嘗論一佛寺之費蓋中民萬家産也實生民穀帛之蠧雖余亦謂之然然自余省事以來觀天下財力屈竭之端國家無大軍旅勤民于賦之政則旱蝗水溢或疾疫連數十州此豈生民之共業盈虛有數非人力所能勝者耶然天下之善人少而不善常多王者之刑賞以治其外佛者之禍福以治其內則於世教豈少補哉而儒者常欲合而軌之是何理也詔編管宜州修大內內侍郝隨復以修內司進用於是始繕修大內及諸官司屋宇并修創景靈宫元符等十一殿及殿中監工役大作三月親試舉人賜霍端友以下五百餘人及第有差時李階為禮部進士第一深之子而陳瓘之甥也時奏名安忱對策云使黨人之子得魁南宫多士無以示天下遂奪階出身而賜忱第忱惇兄也又黃足等十八人皆上書入邪等上臨軒召謂之曰卿等攻朕短可也神宗哲宗何負於卿等亦并黜之後至大觀四年赦並與改官復市易務抵當庫諸州及萬户縣並置官自後復置不書夏四月毁唐鑑蘇黃等集削景靈西宫元祐臣寮畫像吕公著及司馬光吕大防范純仁劉摰范百祿梁燾鄭雍趙瞻王巖叟凡十人大赦以初謁景靈西宫故也程頤除名言者謂學術頗僻素行詭誕專以詭異聾瞽愚俗頃在元祐中因姦黨薦引朝廷遂命以官勸講經筵則進迂闊不經之論有輕視人主之意議法太學則專出私見以變亂神考成憲為事紹聖中雖嘗明正罪罰而元符之末敘復過優尚以通籍致仕田野出處自如朝廷有大政令則其徒更唱迭和指而議之毁壞風俗莫此為甚訪聞本人近以入山著書為名未委所著書是何等文字竊意如野史小説之類妄及朝廷政事欺惑天下後世不可不察詔除名所著書令監司嚴切覺察更鹽法舊法陜西諸路軍儲皆募商人入中以鈔給之令赴解池諸鹽及在京𣙜貨務請錢復以都茶場引錢輸糴貨務故商至無滯先是蔡京欲變法乃取熙寧紹聖間酌中歲會諸路所得若干以較令商人納請鈔歲終約若干知所入多寡殊絶始為新法鹽鈔以通泰煮海號東南鹽行之東南諸路濱滄煮海號東北鹽行之東北及畿甸諸處而畿甸諸處舊解鹽界也今以東北鹽充之而解鹽獨行於陜西與河東是以西鈔多滯雨池天産殆與土壤俱積而錢鈔至都又為𣙜貨務所阻故諸路軍須失措京乃請歲給陜錢四百萬緍以代解鹽之課京意蓋欲囊括四方之錢實中都以誇富盛而固寵凡米鹽鈔盡令商人絶私市鈔法始行一日務官入鈔三百萬緍京以進呈上駭曰直有爾許耶左丞張商英曰此皆虛數京曰臣據有司申如此今商英以為虛錢乞各選郎官一員視其虛實上命即差官視之果實有在庫翌日復奏商英自劾為人所誤始不安於位九月講議司言曰去年九月十七日權行新法東北鹽十月九日闕入闕狀算請至今年九月二日終收趂到緡錢一百六十四萬有竒本錢一十四萬緡有竒餘皆息錢遂詔旌講議司官府四年秋詔自今以陜西舊鹽鈔易東南末鹽每有百貫以見錢三分舊鈔七分方聽換易自新鹽鈔法行州縣假借商賈率用大舟載鹽雜販禁物植以黃旗所過關津皆莫敢問往往得志然見行之法錢通輒復變之凡舊鈔皆勿得用富商巨賈或至轉為流丐有赴水自溺死者提點江淮東刑獄章繹見而憐之上言鈔法誤民請如約以示大信蔡京怒奪繹官至是尚書省言新鹽鈔已及一千萬緡內外鈔價及東南鹽價皆增長乞立賞禁人搖煽鈔法從之大觀四年詔曰東南鹽法大壞適時變通理合增損差左司郎張察出詔四路講求聞奏以措置東南鹽事所為名於是復行熙豐舊鈔法政和二年東南鹽罷官般官賣令客人以見錢等請已支舊鹽則納見錢三分仍以新鈔鹽帶賈五年令客舊搭帶剩鹽見在者沒入之正鹽限一月賈鈔帶賣遲者亦沒入初蔡京委故省吏魏伯芻提舉𣙜貨務令作料次關子百萬進入上大喜特以示左右曰此太師所與我俸料也是冬伯芻上言朝廷歲用沛然有餘者惟𣙜鹽之入厚也頃年未有定制姦弊百出買則稱重以困亭户支則重以惠商人自政和立法頗絶弊源蓋緣東南鹽一法用袋遂無夾帶請鹽支則置合同號簿而真偽自明𣙜貨務異時日收不及二萬緡今乃常及四五萬緡有一郡而客鈔錢及五十萬貫者處州是也有一倉而客請鹽及四十萬袋者泰州是也新法今才二年而已收四千萬貫乞宣付史館從之後伯芻所進愈多不復由京而自以為功京不能平七年詔東南東北鹽與解鹽地分並依政和舊法五月廢內侍寄資法昭宣使以下正使以上各繫真官請俸奏為恩例等置依本官無寄資內侍省凖此按舊制內侍至東頭供奉官止一內朝大使臣若在內庭只許暗理資級恩數俸料并未該受謂之寄資轉出方正授以所寄之官今直轉正官不用寄理只以官上冠以入內內侍省若內侍省字恩數俸給皆得之此乃蔡京媚近習變亂法度之大者下改都知等官亦此意也又按仁宗朝因趙槩之請詔御藥院當轉出外而特留者毋得纍寄所遷資序司馬光吕誨於英宗朝同論祖宗之制勾當御藥院常用供奉官以下至內殿崇班則出近歲居此皆暗理資食其廩祿非祖宗本意則知寄資已是弊法况可盡廢之乎置內侍知省同知簽書官改都知為知入內內侍省事副都知為同知押班為簽書鑄當五錢去冬令陜西鑄折五銅錢至是户部尚書吳居厚言江池饒建四監歲鑄緡錢一百三十餘萬近年寖少欲别定勸沮之格詔從之又言江池饒建舒睦衡鄂八州將每年上供小平錢縮減萬餘增入料例鑄當五大錢以聖宋通寶為文其背鑄當五二字三年春以陜西所鑄當十錢便於行使遂詔江淮荆浙路諸監以每年所鑄小平錢一百三十三萬四百貫文料例并崇寧元年朝旨減退到銅五十萬斤依陜西樣制並鑄當十大錢前制當五錢指揮遂寢尋命韶州永豐監以歲鑄當二錢二十萬緡改鑄當十錢十六萬五十緡錢又於京城外置監并復徐州寶豐監衛州黎陽監并改當二錢作當十大錢當二錢期過一年不用明年六月詔福建廣南路更不行使當十錢或言蔡京私其鄉故也十一月又詔荆湖江浙當十大錢并改作當五錢十二月又詔淮南路重寶錢作當五行錢五年春罷鑄當十錢改鑄小平錢六月詔當十錢惟京師陜西兩河許行餘路並罷令民於諸縣鎮寨送納給以小鈔自一百至十貫止並令通行使如川鈔引法東南十監歲鑄凡二百八十九萬緡而歲闕銅二百餘萬斤詔尚書省措置大觀初詔止令京畿鑄當十大錢餘路並用小平錢政和初改當十為當三夾錫錢始於二年河東運判洪中孚言西北以中國鐵錢為兵器若雜以鉛錫則脆不可用請改鑄夾錫當二鐵錢詔從之尋又命陜西轉運許天啓鑄夾錫當二及當十大錢四年京西北路提刑宋喬年請於汝州魯山縣興置錢監及河東北京西陜西諸路十八監鑄夾錫當二錢從之尋詔夾錫錢通行天下其後罷復不常不盡録鐵錢亦然六月中太一宫火復湟州先是王厚童貫合諸道兵十餘萬乞進兵上止之既而厚奏可保萬全遂聽焉會禁中火上以手札止貫貫視之遽納靴中厚訪其故貫曰上趣成功爾遂遣統制官高永年與蕃將新知熙州李忠權蘭州姚師閔及熙河諸將辛敘獻等九人提兵分道並進希巴烏錫羅薩勒誘羣冦拒我師我師稍衄厚等休士鼓行而前連日大捷希巴烏等遁去而竒凌等二十一族及蘭藏等皆來降既而大軍畢至王厚率諸將盡鋭攻城三日拔之并復管下城寨一十所尋論功行賞蔡京等並進官曲赦熙河蘭會路明年春上御端門納懷德降封安化郡王蔡京言熙河措置邊事司奏收西寧州招降到錫木阿爾大酋領青唐偽宰相貴鄂雅等約千餘人自蘭州至關沿宗河而上取湟州臨宗寨乳洛河至西寧州管下宣威城青海薩納克威朗博雅東南直趨溪哥城至河州循化城入洮州自洮州取龎公原循山後出懷羌來羌城沿黃河至來賓城過䇿凌沁納木沁南抵京玉關幅員疆境五千餘里計二十萬户今懷德將蕃界一帶人户并諸處城寨獻納共二十七處各相去四五程或七八程並乞納土歸朝率百官表賀大觀二年春賜河南蕃首密實羅蒙姓趙名用中封兩使留後秋七月學士院火詔毋以戚里充執政詔自今勿復援韓忠彥例以戚里宗親為執政官三省世世守之著為申令八月張商英罷初商英與蔡京在神宗朝同為講官雅相好及是言多不合商英言京姦邪有才為相國志在逢君等語中丞石豫御史朱紱余深以為張商英非所宜言且論商英元祐中嘗為河東守臣李昭敘作嘉禾篇又作宣仁聖德頌及任開封推官日撰祭司馬光文并交通宦官圖為右相於是自左丞出知亳州入元祐黨籍未幾改蘄州九月置醫官定選階從刑部尚書鄧洵武之請也改留守節察判官為承直郎書記支使防團判官為儒林郎留守節察推官軍監判官為文林郎防團推官為從事郎令録為通仕郎知令録為登仕郎判司備尉為將仕郎後改通仕為從事登仕為修職將仕為迪功詔諸州立黨碑詔以御書元祐姦黨姓名頒天下監司長吏立石刋記時有長安石工王安民當鐫字辭曰民愚人固不知立碑之意但如司馬光相公者海內稱其正直今謂之姦邪民不忍刻也官府怒欲加罪泣曰被役不敢辭乞免書安民二字於石末恐得罪於後世聞者愧之尋又詔置黨籍及上書邪等人姓名籍於州縣學置崇寧寺觀蔡京以聖節甫近乞令諸州置寺從之尋又命節鎮置觀及至政和初寺觀並改天寧萬夀觀尋又改神霄玉清萬夀宫立考課法凡三十條冬十月置湟州茶馬司置都大軍器所令諸路分造河北五十將器械於京城置都大提舉製造軍器所以領之初知渭州邢恕建兵車之議下諸路創造凡數千乘及是蔡碩又請置河北兵器及兵車萬乘云十二月新法文字許徑上省詔見行新法如茶鹽香藥市易錢法學校邊事文字許直達尚書省祧宣祖詔及憲皇后神主藏西夾室初有李沖元上書言元符末不祧宣祖為不當又以哲宗不得為一世詔下其議而侍從官皆是沖元之説至是三省奏本朝自僖祖至仁宗始備七世當英宗祔廟上祧順祖暨神宗祔廟又祧翼祖則哲宗祔廟父子相承當為一世祧遷之序典禮有稽而太常寺亦言宣祖當祧故也立措置邊事司以王厚及內侍童貫領之上留意西邊嘗問知樞密院蔡卞鄯湟可復否曰可問誰可將曰王厚可為大將高永年可統兵是春乃以厚為洮西安撫知河州令措置招納尋令權熙河蘭會經略永年為統制官蔡京又言童貫頃十使陜右審五路利害與諸將之能否為甚大力薦之遂用李憲故事命貫為監軍專切往來幹當至是置司專命二人主之趙挺之云蔡京每以復湟鄯啓迪上上意向之京亦知緣邊之糧兵未可動乃勸上多出金帛官爵厚誘其酋首來降挺之謂京初不習西事本末妄以為湟鄯諸羌亦如沅辰邵之溪洞貪利畏威相率歸順又以為大隆贊既嘗至中國可指呼而用之不知其大隆贊已據有河南地豈復肯歸漢為匹夫而都爾伯朗阿克章方為小隆贊謀主皆不可致但得其地近漢蕃挨五七人或十數人出漢乞以白旗立要約名為招納而已然所給散朝廷之金已不可勝計卒致用兵云熙河蘭會路尋改為熙河湟鄯路再改為熙河蘭湟路開遇明河自真至泗二百餘里分五年畢是歲髙麗王顒死子俱立在位十八年顒本名熙後避遼主諱改之九朝編年備要卷二十六
