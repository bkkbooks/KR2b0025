body:
  text: 九朝編年備要卷二十宋陳均撰神宗皇帝起乙卯熙寧八年止庚申元豐二年乙卯熙寧八年春正月京東分東西路雨木冰治臺獄改竄鄭俠初議保甲養馬如周官丘乘之制而馮京不以為然又祕閣校理王安國見其兄安石為政嘗面折吕惠卿惠卿乘間白上曰俠書言青苗免役流民等事衆所共知若禁中有人被甲登殿詬罵俠安從知此蓋俠前後所言皆京使安國道之乞付獄窮治詔送御史臺又詔鄧潤甫同推究惠卿議俠當大辟上曰俠所言非為身也忠誠可念豈宜深罪遂罷京政事出知亳州俠改竄英州安國追勒放歸田里二月以王安石同平章事始安石薦韓絳吕惠卿代已惠卿既得勢恐安石復入遂逆閉其途既出安石私書有曰毋使齊年知及毋使上知者進之於上又起李逢獄事連李士寧士寧有道安石居喪與同處數年意欲并中安石也又起鄭俠獄事連安石弟安國罪至追勒凡可以害安石者無所不用其智又數與絳忤絳乘間白上復相安石上從之惠卿聞安石再相愕然安石聞命不復辭自金陵七日至闕大閲始唐李靖兵法無全書而雜見通典詔中書檢正官王震解釋又令入內押班李憲關殿前司步軍二千八百人教習之上諭憲曰黃帝始置八陳法敗蚩尤於涿鹿諸葛亮造八陳圖桓溫見之曰此常山蛇勢也此即九軍陳法至隋韓擒虎深明此法以授李靖靖以時久遭亂曉其法者頗多故作六花陳以變九軍之法使世人不能曉之大抵八陳即九軍九軍者方陳也六花陳即七軍七軍者圓陳也蓋陳以圓為體方陳者內圓而外方圓陳即內外俱圓故今以方圓物驗之則方以八包一圓以六包一此九軍六花之大體也六軍者左右虞候各一軍為二虞候軍左右廂各二軍為四廂軍與中軍共為七軍八陳者加前後二軍共為九軍開國以來置殿前馬步軍三帥即中軍前後軍帥之别名而馬步軍都虞候是為二虞候軍天武捧日龍神衛四廂是為四廂軍也中軍帥統制九軍即殿前都虞候專總中軍一軍之事務是其名實與古九軍及六花陳相符而不少差朕今採古之法酌今之宜曰陳曰營本出於一法而已止則曰營行則曰陳在竒正言之則營為正陳為竒也乃製八陳法而大閲八軍陳於城南之荆家陂行户馬法從河北察訪曽孝寬之請也孝寬言慶厯八年嘗詔河北州軍坊郭第三等鄉村第二等每户養被甲馬一匹以備非時官買乞檢會施行詔從之元豐三年春宣徽南院使王拱辰請行其法於諸路詔以國馬未備今開封府界京東西河北陜西河東物力户自買馬牧養坊郭户家業及三千緡鄉村及五千緡養一匹各及一倍二匹至三匹止以四尺三寸以上為斷仍令提舉司置籍於是逐路提舉司上當養馬數開封府界四千六百餘匹河北東路六百餘匹西路八百餘匹秦鳯路六百餘匹永興路千五百餘匹河東三百餘匹京東路七百餘匹西路九百餘匹京西南路五百餘匹北路七百餘匹七年詔京東西路保甲免教閲每一都保養馬五十匹匹給十千限以京東十年京西十五年而數足罷鄉村先以物力養馬之令尚養户馬者免保馬於是京東西户馬更為保馬矣三月遼使復來沈括報使初詔劉忱等與北人會議天池廟黃嵬山麓土斷有明據可理諭之既而會於大黃平北使指蔚朔應三州分水嶺土隴為界及忱與之行視無土隴乃但云以分水嶺為界凡山有分水彼意至時可以罔取也相持久之遼主復遣蕭禧來致圖書以忱等遷延為言輔臣及西上閣門副使吕大忠集議將從其請衆未對大忠進曰他日遣魏王英弼來盡索關南地將何以處之上默然乃命韓縝張誠一代忱等與遼使議縝等與禧爭辨或至夜分禧執分水嶺之説不變又且久留不肯還遂命沈括詣北廷面議括時按獄御史臺忽有是命客皆為括危之括曰力不足以敵愾是為憂死生禍福非所慮也即日請對上謂括曰敵情難測設欲危使人何以處之括曰臣以死任之上曰卿忠義固當如此然卿此行係一時安危卿安則邉計安禮義由中國出較虛氣無補於國切弗為也括尋詣樞密院閲案牘得契丹頃嵗始議地畔書指石表長城為分界今所爭乃黃嵬山相逺三十餘里表論之上喜説謂括曰兩府不究本末幾誤朕使以圖示禧仍賜括銀千兩曰微卿毋以折邉訟初上以敵情無厭橫使再至賜前宰臣韓琦富弼文彥博曽公亮手詔以待遇之要備禦之方令密具以聞琦言近年朝廷舉事似不以大敵為恤北人見形生疑必謂我有復燕之意故引先發制人之説遣使以爭理地界為名觀我應之之實如何耳所以致彼之疑者七事招髙麗一也建熙河二也西山植榆栁三也創保甲四也築河北城池五也創都作院降弓刀新樣六也置河北三十七將七也臣嘗切計始為陛下謀者必曰自祖宗以來因循茍且治國之本當富強則可以鞭笞四夷復唐之故疆然後制作以文太平故新制日下更改無常夫欲攘四夷以興太平而先使邦國困搖衆心離怨此則為陛下始謀者大誤也謂宜遣使報聘優致禮幣具言朝廷向來興作乃修備之常豈有他意如將官之類因而罷之以釋彼疑陛下益養民力選賢任能使天下悅服塞下有餘蓄帑中有羡財俟彼果有衰亂之形然後可以振威武而復舊疆弼言近年西南用兵不息傳有人上平燕之䇿北國必聞朝廷簡士馬繕城池利器械聚芻糧加之招致髙麗欲為牽制又置河北三十七將所以先期造釁既發爭端勢未肯已也今橫使再至便要可否違之則速患順之則遺患臣謂不若一委邉臣堅持久來圖籍盡力相詰然北國非不自知理曲蓋欲生事遂興干戈萬一入冦事不得已但嚴兵以待之來則禦戰去則備守此自古中國防邉之要也若便欲深入實慮萬有一跌其害非細彥博言中國禦戎守信為上慶厯誓書明載雄州所管白溝兩朝遵守已久今蕭禧欲以雄州北亭為界但以誓書為證彼雖詭詞難奪正諭又事有逆順理有曲直若彼意敢萌犯順朝廷已嚴於預備矣大抵中國之兵利在為主以主待客理必勝矣或傳陛下決為親征之謀事若如此則是以我虛聲招彼實來也張虛聲者必有疏略之虞作實來者必盡周密之慮臣謂因今橫使之來可以其疑我數事諭之曰凡為武備乃中國常事非欲外興征伐向來小蕃有過者須當問罪若吾二大邦通好已久詎可輕渝彼緣朝廷嵗與方成國計豈無顧藉臣更恐有迎合聖意者陛下不宜偏聽今又河朔薦飢若兵連未解即金湯不守先事而慮乃無後艱公亮言邊圉之情畏強侮弱要在控制得術乞擇臣報聘諭以彼國生事中國包容之意至於疆界按驗既明不可侵越使其主曉然不為邀功之臣所惑必未敢萌犯順之意且今日之勢與雍熙景德之間不同河北兵既倍增又益以民兵及行陳訓練多出廟算不為無備或謂河北戍兵不經征討則陜西河北近有戰勝之兵自可調發北人萬一犯邉願先絶其嵗賜臨之以良將徑兵彼亦自亡之時也但定州最為控扼若初入界口吾以重兵夾攻無不克者又大河之險可敵堅城數重寇至北岸前不得進後不得奔王師仍列強弩於南岸持之此必勝之勢也夏四月詔禘祫奉僖祖東嚮罷河南北監牧從都承旨曽孝寬之請也孝寬請以其地豫民以其租為芻秣費乃詔惟存沙苑一監𨽻羣牧司餘八監并廢之以牧地租給市易務茶本錢餘寄常平籍出息以給售馬之直國朝馬政內有騏驥兩院天駟四監大廄二場及上下監外則河南北之為監者十二皆掌於羣牧司已又分置河南北兩使至是議廢監羣牧制置使文彥博言其非便詔元絳蔡確校其利害上之於是中書密院言河南北十二監起熙寧二年至五年出馬一千六百四十匹可給騎兵者二百六十四餘僅足配郵傳而兩監牧吏卒雜費及所占地租嵗為緡錢五十三萬九千有竒計所出馬為錢三萬六千四百餘緡而已今三監廢度九監見馬三萬若不更制則日就損耗於是卒廢之以其善馬分𨽻諸監餘馬皆斥賣河東馬軍有見馬九千五百餘匹兵部請罷支填候減及五千匹益以義勇保甲馬五千匹共萬匹為額樞密院言保甲養馬不免抑配兼恐芻牧失時不善調馭緩急無以應用又當存官馬以寬民間之數與中書難久之上卒從其議詔且依舊支填候教成義勇保甲取旨湖南水潭衡道邵四郡行奉元厯先是詔更造新厯提舉司天監沈括言淮南人衛朴通厯法召朴至朴言崇天厯氣後天明天厯朔後天詔朴改造朴自以已學為之視明天厯朔減二刻至是厯成括上之賜名奉元罷耆户長壯丁以其雇錢募人承帖𨽻保正每上户十至三十輪丁一充保頭主催稅一稅一替保內被盜五十日不獲備賞錢竊盜毋過二千強盜毋過五千貧户免輸上曰既令出錢免役又却令保丁催既失信於百姓又保丁只合令習兵不可令二事王安石曰保丁户長皆出於百姓為之今罷差户長保丁催稅無向時勾追呼集科擾之苦而數年或十年以來方一次催稅不過三十餘家於人情無所苦上又曰既出錢免役又出賞錢如何安石曰強盜每户出錢六十竊盜每户出錢三十貧乏又免無所苦也上曰利害加天下極宜審之他日上又欲以役錢代賞且言二百五十家同任責非是當令二十五家均出寧厚無傷亦所以懲之安石請如上命施行然不可厚也世居等謀反伏誅羽林大將軍世居坐與前餘姚縣主簿李逢等謀不軌賜世居死逢等伏誅録趙普後五月雨土及黃毛六月導汴入蔡河以通京西之漕頒王安石經義於學官加安石左僕射兼門下侍郎吕惠卿王雱吕升卿遷秩有差安石辭所遷官上曰卿修經義有勞也乃欲以卿道德唱導天下士大夫故有此拜不足辭也安石又為字説二十四卷學者乃傳習之自是先儒之傳注悉廢矣雱辭賞上欲終命之惠卿以為雱引疾避寵宜聽故從之由是王吕之怨益深定嫡孫承重法詔五服敕增入嫡子死無衆子然後嫡孫承重即嫡孫襲封爵者雖有衆子猶承重韓琦薨時判相州未薨前一夕大星殞州治櫪馬皆驚上聞訃輟朝發哀復命顧恤其家甚厚御製碑文載其大節篆首曰兩朝顧命定䇿元勳之碑諡忠獻琦天資忠厚能決大事辭氣雍容人不見其憂喜之色凡所建明顧義如何不私於已輕財好施家無餘資折節下士無貴賤禮之如一奬拔賢俊茍公論所與雖素所不悅必收用之後之論賢相者必稱首焉尋詔以配享英宗廟庭秋七月命韓縝如河東割地初蕭禧至館中留不肯行必欲以分水嶺為界上遣內侍李憲許之以長連城六蕃嶺為界禧猶不從王安石勸上曰將欲取之必姑與之於是詔於分水嶺畫界遣使以圖持示禧禧乃去至是命縝往河東割新疆與之凡東西失地七百里邵伯溫曰嗚呼祖宗故地誰敢以尺寸不入王會圖哉安石輕以畀鄰國又建以與為取之論使後世姦臣以伐燕為神宗遺意致天下之亂安石之罪可勝數哉上嘗問張方平祖宗禦戎之䇿孰長方平曰太祖不勤逺略如夏州李彛興靈武馮暉河西折御卿皆因其酋豪許以世襲故邉圉無事董遵誨捍環州郭進守西山李漢超保關南皆十餘年優其祿賜寬其文法而少遣兵諸將財力豐而威令行間諜精審吏士用命賊入輒先知併兵禦之戰無不克故以十五萬人而獲百萬之用終太祖之世邉鄙不聳天下安樂及太宗平并州欲遂取燕薊自是嵗有契丹之虞曹彬劉廷讓傅潛等數十戰各亡士卒十餘萬又內徙李彛興馮暉之數族致繼遷之變三邉皆擾而朝始旰食矣真宗之初趙德明納欵及澶淵之克遂與契丹盟至今人不識兵革祖宗之事大略如此亦可以鑒矣近嵗邉臣建開拓之議皆行險僥幸之人欲以天下安危試之一擲事成則身蒙其利不成則陛下任其患不可聽也八月庚寅朔日有食之陰雲不見蝗命捕之易以粟韓絳罷絳居相位數與吕惠卿異議王安石復相論政愈駁絳屢稱疾求罷至是罷知許州修京城發河北京東兵及發監牧卒修之元豐元年冬畢功城周五十里有竒髙四丈廣五丈九尺外距隍空十五步內空十步命知制誥李清臣撰記刻石南薰門九月立武舉絶倫法冬十月吕惠卿罷王吕之怨日深惠卿因安石遣堂吏齎御史中丞鄧綰章示之乃上疏自辨且言安石常言用法須嚴召分雖使有智者不敢出諸口則事體歸一安石之意不徒為身為國亦欲如此天下即是敵人雖能禁近者言如天下何又曰安石每與陛下言執狐疑之心者來讒賊之口持不斷之慮者開羣枉之門安石却不自達此理每日祇被吕嘉問練亨甫幾箇圍合了其餘人更下言語不得昨安石初到臣請去位陛下以為安石莫疑否臣猶以為不然今觀安石如此卻是臣兄弟純不思至此也御史蔡承禧奏惠卿發口則欺君執筆則玩法秉心則立黨結朋移步則肆姦作偽避權畏義之士則以為庸為鄙盡心去邪之人則以為害人害物貪利希附之者則為賢為善更相推舉彼可侍從彼可監司及其事實十餘條於是詔出惠卿知陳州綰等先言惠卿託知華亭縣張若濟借富民錢買田事詔遣司農寺簿王古劾若濟尋又詔徐禧等同古根究綰言惠卿事敗乞行誅竄且言四凶象恭之誅豈須檢法兩觀偽辨之戮無事計贓承禧亦言惠卿罪惡彰著而徐禧等務為掩覆乃命浙東運使蹇周輔往秀州鞫其獄既而惠卿上疏曰周輔鄧綰鄉人於法有礙乃命秦鳯提刑李竦同鞫初安石既與惠卿交惡令徐禧王古等按華亭獄不得惠卿罪更使周輔按之安石子雱猶恐弗得切責練亨甫吕嘉問亨甫嘉問遂共議取鄧綰所條惠卿以狀上聞上以示安石安石謝無有歸而問雱雱乃言其情安石由是自愧數告上求去上待安石自是意亦稍衰矣十年春獄具若濟坐枉法贓杖脊流沙門島鄭膺坐詭名射田溫卿坐借舊任弓手錢衝替轉運王廷老提刑朝端彥坐纍降罰有差膺惠卿舅也勢橫兩浙人呼為鄭六舅云先是周輔及竦同鞫得吕氏姦利事推治甚急會綰敗吕氏家人饋藥名藥曰綰出湯因以告周輔周輔聞之遂不肯為王氏盡力末減吕氏事而上其獄彗出軫大赦求直言詔曰比年以來災異數見山崩地震旱暵相仍今彗出東方變尤大者遂詔內外臣僚直言朝政得失王安石曰晉武帝五年彗實出軫十年軫又有孛而其在位二十八年蓋天道逺所當盡者人事而已稗竈言火而驗及欲禳之國僑不可鄭亦不復火有如禆竈未免妄誕况今星翁豈足道哉富弼言臣近日忽聞特宣大赦出於非常又聞别降手詔許中外臣僚直言朝政之闕失士庶喧呼鼓舞道路臣再詳手詔乃陛下親筆非學士所作以至纍年災異如山摧地震旱蝗之類前後包括一一歸咎於已詞旨哀痛深切明白忠義之士讀之莫不感泣故至變不旋踵而減去年久旱陛下曽降手詔許臣僚上封論事人方喜悅日俟朝廷施設不知何人上纍聖德遽成反汗於是天下大失所望今天變益大詔命益切陛下必不復蹈前車之誤况詔云朝廷闕失朕將虛已以改此足以見聖意畏天愛民其已至矣然竊聞外議皆云天下弊病甚衆官家多應不知臣願陛下盡取羣奏不遺疏賤萬幾之暇一一親閲擇其衆説所合者斷在不惑力賜施行踐虛心以改之詞應天文尤大之變使澤及普率急若置郵則人心悅服而天道助順矣若但委臣僚置局恐有顧望隱蔽則誤聖君畏天愛民不吝改過之意也張方平言新法行已六年事之利害非一二可悉人為天地心天地之變人心實為之故和氣不應災異荐至顧其事必有不協於民者矣法既未協事須必改若為憚改人將不堪此臣所以為陛下痛心疾首一夕而九興也又曰大事有失於前者不可不悔患有在於後者不可不懼如救焚溺勢不可緩緩則無及於救矣吕公著言臣今所言亦非謂今日法令皆不可行也陛下誠能廣開聰明延納正直公聽並觀盡天下之議事之善者固當存之其未善者則宜捐之茍其非便不以已行而憚改言有可取不以異議而見廢如此則不勞陛下神明不驚衆人耳目而庶事條理百姓安定百姓安定然後可以足兵食而禦外侮矣又曰子産之為政也一年而輿人誦之曰孰殺子産吾其與之三年又誦之曰子産而死誰其嗣之今陛下垂拱仰成七年矣輿人之誦未聞異於七年之前也豈左右之臣蒙蔽陛下使天下之事不得上聞乎舜曰在知人在安民願陛下以知人安民為先除穢布新以答天譴罷手實法時奉使者至析秋毫天下病之司農又下諸路不時施行以違制論知密州蘇軾不肯行謂提舉常平官曰違制之罪若自朝廷誰敢不從今出於司農自擅造律也若何使者驚曰姑徐之至是御史鄧綰亦奏陳其利害遂有是詔十一月王安石求退不許先是安石以疾居家上遣中使勞問自朝至暮十七反醫官脈狀皆使駚行親事齎奏既愈復給假十日將安又給三日又命輔臣即其家議事時有不附新法者安石欲深罪之上不可安石爭之曰不然法不行上曰聞民間亦頗苦新法安石曰祁寒暑雨民猶咨怨此豈足恤也上曰豈若并祁寒暑雨之怨亦無耶安石不悅退而屬疾上遣使慰勉之乃出其黨為安石謀曰今不取門下士上素所不喜者暴進用之則權輕將有窺人間隙者矣安石從之上亦喜安石之出凡所進擬皆聽由是安石之權益重交趾冦邉陷欽亷等州命趙髙及內侍李憲討之先是知桂州沈起劉彛相繼遣官入溪洞集土丁為保甲繼命於海濱集舟師寓教水戰禁止州縣與交人貿易交人疑大舉分三道入冦衆號八萬圍雍州十一月陷欽州至是陷亷州所破城邑即為露布揭之衢路言所部叛入中國者官吏庇匿訴於桂管不報故我帥兵追捕叛者又言桂管點閲洞丁言欲見伐又言中國作青苗助役之法窮困生民我今出兵欲相拯救安石怒薦髙為安南招討使總九將軍進討李憲燕達為副仍自草詔諭之詔詞有云天示助順既兆布新之祥人知侮亡咸懷敵愾之氣安石最不信洪範災異之説於彗星乃推之於交趾云正月陷雍州廣西都監張守節率兵救雍州敗於崑崙關死之州被圍四十日知州蘇緘日夜行勞士卒發神臂弓仆賊殪衆不可勝計賊四面攻城城上發火箭焚其梯衝前後殺數萬人賊計已盡欲引去而外援不至會有教賊囊土傅城以登者城遂陷緘曰吾義不死賊手乃還州廨命其家三十六人皆先死藏尸於坎縱火自焚賊至求緘不得殺吏卒民丁五萬餘人以百首為一積凡五百八十積并欽亷州死者無慮十萬人并毁其城初州受圍久糧儲既竭井泉皆涸人飢渴汲漚麻汙水以飲多病下痢死者相枕而人無叛志尋贈緘奉國軍節度諡忠勇賜京城第一區上田十頃官其親族七人以其子元為閣門祇候奪服充召募舟師副將賜對便殿上撫諭甚至且曰雍州若非卿父守禦如欽亷二州賊至城破乘勝奔突則賔象桂州皆不得保矣昔張巡許逺以睢陽蔽捍江淮較之卿父未為逺過也按四朝國史忠義傳自緘而下至吳革凡三十八人外亦有繫於列傳者今隨事附見於後丙辰熙寧九年春二月竄沈起劉彛自王安石秉政首用王韶取熙河以斷西夏右臂又欲取靈武以斷遼人右臂又用章惇為察訪使以取湖北夔峽之蠻於是獻言者謂交趾已為占城所敗衆不滿萬亦可計日以取安石乃以起知桂州起至則遣官入溪洞點集土丁為保伍又於融州疆置城寨誅殺人以千數交人以為言上親批諭中書曰熙河方用兵未息而沈起又於南方干賞妄作宜速罷起治其擅招納之罪於是以彛代之彛至復生事於是交人大舉入冦至是竄起郢州彛隨州尋除名編管涪州以郭逵為安南招討趙髙副之雨雹三月親試舉人賜徐鐸以下進士千一百餘人及第出身有差舊例賜期集錢三千緡諸科七百緡言者謂其多假設名目妄有費用乃詔賜五百千諸科二百千西蕃果莊冦邉韓存寶敗之夏四月茂州夷冦邉命內侍王中正經制之五月兩浙分東西路秋七月詔録昭憲太后族詔自今遇大禮官其族一人八月罷鬻祠廟判應天府張方平言近降新制應祠廟依坊場河渡募人承買收取淨利管下五十餘祠百姓盡已承買閼伯主祀火火為國家盛德所乘微子開國於宋亦本朝受命建號所因又有雙廟乃唐張巡許逺今既許承買小人以利為事必於其間營為招聚紛雜冗褻嵗收甚微實損大體欲乞不賣此三廟以稱國家嚴恭之意上批司農寺鬻天下祠廟辱國黷神莫此為甚司速令更不施行今後市易司創改條例並進呈取旨明年二月中丞鄧潤甫言興利之臣議前代帝王陵寢許令請射耕墾而司農可之緣此唐之諸陵悉見芟刈聞昭陵已剪伐無遺乞下所屬依舊禁止詔從之冬十月鄧綰練亨甫罷綰自中丞奪職知虢州亨甫自中書户房習學罷為漳州判官初王安石以病求去杜門不出綰建言宜用其子且薦其壻又為安石求賜第舉彭汝礪為御史既而又自陳失舉請代以他官上怒安石聞之奏綰為國司直乃為宰相祈恩極傷國體臣聞彭汝礪曽與練亨甫相失鄧綰聽亨甫遊説故乞别舉官如綰豈可令執法在論思之地亨甫亦不當備宰屬乞以臣所奏付外處以典刑遂有是命綰始以附會安石居言職及安石與吕惠卿相傾綰極力助安石上益厭安石所為綰懼安石出而失勢屢留之於上益無所顧忌亨甫險薄諂事安石子雱以進至是皆斥王安石罷安石之再相也屢謝病求去及子雱死尤悲傷不堪力請解機務上益厭安石所為遂出判江寧府安石既罷去即堅請奉祠退居鍾山盡元豐不復召用晚於鍾山書室多寫福建子三字蓋恨為吕惠卿所陷悔為惠卿所誤也初司馬光以書諭安石爭青苗法且言巧言令色鮮矣仁彼忠信之士於公當路時雖齟齬可憎後必徐得其力諂諛之士於今誠有順適之快一旦失勢必有賣公以自售者意謂吕惠卿對賔客輒指目之曰覆王氏者必惠卿也小人本以利合勢傾利移何所不至其後六年而惠卿叛安石上書告其罪茍可以覆王氏者靡不為也由是天下服光先知雱之卒也在六月年三十三雱先病疽又聞吕惠卿發其私忿恚增劇而死雱性刻深喜殺常稱商君以為豪傑之士言不誅異議者法不行嘗勸安石誅不用命大臣安石曰兒誤矣元豐七年安石請以所居上元縣園屋為僧寺詔賜額報寧或云安石愛雱雱性險惡安石在政府日凡其所為不近人情者雱實使之既死安石哀悼久而不忘嘗恍惚見雱負鐵枷如重罪狀遂有是請蓋為雱求救於佛也以吳充王圭同平章事十二月命內侍李憲措置秦鳯熙河邉事諸將並聽節制先是鄧潤甫等言李憲名為措置邉事其實諸將皆受節制唐憲宗時王承宗叛以吐突承璀為招討處置使諌官白居易等言古無中人任大帥恐貽笑四方今陛下所行皆將為法於萬世豈可使國史書宋以中人將兵自陛下始又言自古未有以兵寄閹人而不為亂者言甚激切上優容之交趾納欵郭逵敗交趾兵於富良江去交州三十里獲偽太子洪真李乾德請降得其廣源等五州之地而還以廣源州為順州是役也官軍八萬死者十六逵始欲濟江趨交州已而曰願以一身活十萬人命乃班師丁巳熙寧十年遼太康三年春正月以范純仁知慶州純仁代楚建中擅發常平封樁粟麥收恤流亡多所全活會蓬生蔽野結實如粟公私皆取給焉復為營求稼穡之具嵗以穰或言純仁廩貸過多遣使按視民間皆爭先輸官比使者至則已無負邠寧間有叢塜使者發塜數骸劾純仁全活不實之罪詔窮治乃建中所封也朝廷欲罪建中純仁奏建中循守法度方申請措置而民已多死臣但因其措置茍免流亡非臣才術能然也建中坐罰銅二月果莊寇岷州种諤敗之立鹽鈔貼納法初詔三司講畫鹽法利害至是三司言鹽法之弊由熙河鈔溢額故價賤而芻糧貴又東西南三路通商郡縣權買官鹽故商旅不行今鹽法當改官賣當罷請先權舊鈔印識之舊鹽行加納之法官盡收舊鈔其已出鹽約聽商人自承凖新價增之印鹽席給符驗提舉司賣鹽並用新價錢承買舊鈔商人願對行算請者聽而别定官賣鹽地舊制河南曹濮以西皆食解鹽自仁宗時解鹽通商官不復𣙜熙寧中市易司始𣙜開封曹濮等州八年張景溫提舉出賣解鹽於是開封府界陽武等十一縣曹濮河中府等八州皆官自賣未幾復用商人議分通商及官賣州縣鹽價既增民不肯買乃課民自買官鹽隨其貧富作業為多少之差有買賣私鹽者聽人告重給賞以犯人家財充買官鹽食之不盡留經宿者同私鹽法於是民間騷怨鹽鈔舊每席六緡時祇二緡有餘商不入粟邉儲失備乃議所以更之召陜西轉運皮公弼入議公弼極言官賣鹽不便沈括為三司使不能奪公弼議王安石方主景溫括希安石意乃言通商則嵗失官賣緡錢二十餘萬安石去位括在三司乃言官賣當罷於是河陽同華等州陳留等縣通商其入不及官賣者官復自賣澶濮陽武等州縣官賣如故上嘗謂輔臣曰向以陜西用不足使市鈔京師蓋欲權鹽價飛錢於塞下而出錢五百萬緡不能救其弊也朝廷措置經始所當謹重便國者姑安靜以待之元豐元年從轉運使蹇周輔之請更福建鹽法周輔言建劔汀邵武請罷去官賣稍減鹽價募上户為鋪户官給券定月所賣從官場買之於是嵗課比舊額頗增羡四年更江西鹽法亦從蹇周輔之請也初嵗運淮鹽十二綱至虔州及章惇察訪湖南符本路提刑措置搬運廣鹽添額出賣然未及行惇既參政有郟亶者迎合惇意推倣湖南之法請運廣鹽於江西詔周輔往江西相度遂奏通廣鹽於虔州南安軍復均淮鹽於洪吉筠袁等州以補舊額立法峻剝民被其害舊江西鹽場許民買朴悉籍於官賣之夏四月河北京東盜起遣使安撫五月初給貧民糧詔諸州檢籍老疾而貧不能自存者籍之日給粟豆自十一月至三月止盜廖恩犯南劔秋七月命內侍王中正討之初命劉定體量安撫尋以中正為都大提舉福建招捉盜賊應兵官及捕盜官並聽中正指揮凡劄下劉定並令中正處置河大決北流斷絶溢衛州王供及汲縣上下掃懷州黃沁滑州韓村遂大決於澶州曹村澶淵北流斷絶河道南徙東滙於梁山張澤濼分為二𣲖一合南清河入於淮一合北清河入於海凡灌州縣四十五而濮齊鄆徐尤甚壞民田三十萬頃廬舍三十八萬家詔遣內侍張茂則同判都水監劉澮相度閉塞決口尋詔泛溢民田官為疏畎被災州縣放賦稅老幼疾病不能自存者日給口食知大名府文彥博言臣正月嘗奏德州河底淤澱泄水稽緩上流必至壅遏若不預為經制必溢魏博恩澶等州之境而都水略無設施止固護東流北岸而已今者果大決溢此非天災實人力不至也十一月詔河北京東西淮南等路出夫赴河役者去役所七百里外願納免夫錢者聽每夫錢止三百五十八月廖恩降九月贈邵雍官初朝廷授雍將作監簿雍辭之至是卒贈著作郎諡康節以河南府言雍行義聞於鄉里乞贈恤也雍字堯夫衛州人刻厲為學夜不枕席者數年有王豫者以師自居聞雍學易召而教之與語三日蹶然起拜少自雄其才慷慨有大志既學力慕髙逺講先王之事為必可致及其學益老德益超玩心髙明觀天地之運化陰陽之消長以達乎萬物之變然後頺然其順涉然其歸嘗適吳楚通秦魯客晉梁後徙於洛在洛幾三十年蓬蓽環堵不蔽風雨躬㸑以養其父母居平務為講學於家未嘗強以語人而就問者日衆士人道洛者必過其廬與人言必依孝悌忠信樂道人之善不及其惡故賢不肖無不親之每嵗春二月出四月止八月出十一月止每出人皆倒履迎致爭具酒饌不復呼姓名但云吾家先生至也鄉人如其所居安樂窩起屋以待其來謂之行窩既沒有挽之云春風秋月嬉遊處冷落行窩十二家洛陽風俗之美如此雍之學得之於李之才挺之挺之言得之於穆修伯長推其源流逺有端緒至於純一不雜汪洋髙大乃其所自得者有書十二卷曰皇極經世詩曰擊壤集程皓嘗語人曰皓接人多矣不雜者三人張子厚卲堯夫司馬君實云立義倉自畿內始後遍行於諸路冬十月罷鬻祭服時三作坊退賣祭服言者謂祭祀之物轉移他用則非所以尊奉神靈也詔勿賣十一月立內侍觀察使止法詔兩省都知觀察押班已至觀察使者如年勞及有功祗許轉使額雖有特旨令樞臣執奏甲戌郊十二月張載卒時同知太常禮院謁告西歸行次臨潼卒康定用兵時載方年十八慨然以功名自許上書謁范仲淹仲淹知其逺器欲成就之反責之曰儒者自有名教何事於兵因勸讀中庸載讀其書雖愛之猶以為未足於是又訪諸釋老之書纍年盡究其説知無所得反而求之六經嘉祐初見二程於京師共語學道之要乃涣然自信曰吾道自足何事旁求於是盡棄異學淳如也為雲巖令政事大抵以崇本善俗為先每以俸給具酒食召鄉人髙年會於縣庭親為勸酬使人知養老事長之義因問民間疾苦及其訓教子弟之意上嗣位之二年以吕公著薦召入見上問治道以漸復三代為對上説曰卿宜入見二府議事朕且將大用卿載他日見執政執政語曰新政之更懼不能任事求助於子何如對曰朝廷將大有為天下之士願與下風若與人為善則孰敢不盡力如教玉人追琢則人亦固有不能執政默然所語多不合命校書崇文辭未得謝復按獄浙東獄成造朝會弟戩以言得罪益不安乃謁告西歸橫渠後復召還舊職會有言者欲講行冠婚喪祭之禮詔下禮官禮官安習故常以古今異俗為説載獨以為可行然議卒不決郊廟之禮禮官與焉載見禮不致嚴亟正之而衆莫之助載益不説會有疾謁告而歸載退居橫渠也終日危坐一室左右簡編俯而讀仰而思時有得則識之或中夜起坐取燭以書集所立言謂之正蒙出示門人曰此書豫歷年致思之所得其殆與前聖合然大約發端示人而巳其觸類廣之則吾將有待於學者學者有問多告以知禮成性變化氣質之道學必聖人而後已聞者莫不動心有進近世治喪無法惟致隆三年自期以下未始有衰麻之變祭先之禮亦用流俗節序薦享不嚴載始治喪服輕重如禮家祭始行四時之薦曲盡誠潔嘗慨然有意三代之治曰仁政必自經界始貧富不均教養無法雖欲言治皆茍而已世之病難行者未始不以亟奪富民之田為辭然茲法之行悅之者衆茍處之有術期以數年不刑一人而可復所病者上之未行耳門人欲諡載為明誠中子質於程皓皓疑之訪於司馬光光答書曰竊惟子厚平生用心欲率今世之人復三代之禮者也與其以陳文範陶靖節王文中孟貞耀為比曷若以孔子為比乎遂己戊午元豐元年春正月命官詳定郊廟禮文置詳定禮文局命陳衮黃覆等詳定安燾使髙麗髙麗比年遣使朝貢上嘉其勤誠遣燾使之閏月曽公亮薨臨其喪諡曰宣靖上篆其碑首曰兩朝顧命定䇿亞勳之碑及葬前一日車駕又臨之特恩非故事也上嘗語輔臣曰公亮可方漢張安世公亮喜薦士多得人然性吝嗇殖貨至巨萬持祿固位為世所譏尋詔以配享英宗廟庭夏五月曹村決河塞名其掃曰靈平河還北流元用土乙百九十餘萬木一千二百萬有竒錢米各三十萬堤長一百四十里六月癸卯朔日有食之太史言日當食驗之不食有大星裂於內階東南有光燭地大星出瓠瓜聲如雷治臺獄停陳安民等官安民及竇萃皆停官太常博士吳安持大理評事文及甫前檢正刑房公事劉奉世論罰有差初上任王安石而吳充在政府數乘間言政事非便安石罷充遂相充陰欲有所變更王圭忌之會堂後官周清駁相州殺賊徒三人為失入死罪大理處相州斷是萃白奉世奉世曰君為法官自圖之何必相示萃曰然則不可為失入奉世曰君自依常法此豈必欲君為失入耶於是相州斷清再駁大理不服安民為相州判官懼得罪求救於充之壻文及甫而充之子安持受其囑知諌院蔡確知安民與充有親乃密言事關大臣非開封可了移其獄於御史臺命鄧潤甫上官均與確雜治之事多不實潤甫均欲辨理於上前確劾潤甫均黨有罪未幾皆罷於是確專其獄凡朝士繫獄者令獄卒與之同室而處同席而寢飲食旋溷共在一室置大盆於前凡饋食者羮飯餅餌悉投其中以杓混攪之飼之如犬豕故繫者無罪不承獄成安民等既坐罰確猶言罪安持太輕上曰彼第為親戚請託不得已而應之此亦常事何足深罪卿輩但欲共攻吳充去之此何意也以確奏劄還之言者乃已瀘夷冦邉命韓存寶經制之瀘州納溪夷入冦秋九月交趾來貢且請還廣源蘇茂等州上賜李乾德詔俟雍欽亷三州人口歸復舊地即以廣源等處復還之明年來歸所略三州人丁詔廢順州以其地賜之初趙高請弗與嵗戍以三千人每十損五六上曰順州荒忽瘴癘之地朝廷得之未為利豈可驅戍兵投之瘴土一夫不獲朕尚憫之况十損五六乎七年又詔以界外六縣三洞之地賜之冬十一月罷功臣號十二月復置大理獄上以國初廢大理獄非是又開封囚猥多乃命復置輕復讎刑名初青州民王贇父九思為楊五鬼毆迫自縊贇才七嵗常欲復讎而以幼未能至是十九嵗以槍刺五鬼斷其頭及手祭父墓乃自首法當斬上以贇殺讎祭父又自歸罪命末減之配𨽻鄰州置景福殿庫上每憤北國崛強慨然有恢復幽燕之志即景福殿聚金帛為兵費是年始更庫名自製詩以揭之曰五季失圖玁狁孔熾藝祖造邦思有懲艾爰設內府期以募士曽孫保之敢忘厥志凡三十二庫復揭以詩曰每虔少惕心妄意遵遺業慚豫不武資何日成戎捷己未元豐二年春正月趙抃致仕自知杭州告老退居於衢有溪山松竹之勝後六年卒諡清獻賜其碑名愛直王安石初參政事下視廟堂如無人一日爭新法怒目曰公輩坐不讀書耳抃折之曰君失言矣如臯夔稷契之時有何書可讀安石默然兩知成都其始往也攜一龜一鶴以行其再往也屏去龜鶴止一蒼頭張公裕送以詩云馬諳舊路行來滑龜放長江不共來抃和易長厚氣貌清逸人不見其喜愠年四十九即居外寢自號知非子熙寧中嘗知越州時兩浙旱蝗米價湧貴餓死十五六諸州皆榜通衢禁人增米價抃獨令有米者任增價糴之於是米商輻輳價為之賤民無餓死者三月給京畿貧民葬地貸以錢無主者官瘞之親試舉人賜時彥以下千三百餘人及第出身有差詔新進士依舊式賜錢五百千為宴集費外特賜千緡諸科三百千夏四月幸金明池觀水嬉燕射瓊林苑上射中的上自即位始再幸池苑後不復至矣又奉太皇太后皇太后幸金明池上扶太皇太后登輦預為百寶酒船馳以上夀導洛通汴西頭供奉官張從惠言汴口嵗開塞又修堤防勞費因陳引洛入汴之利都水使者范子淵亦畫十利以獻上乃命內臣宋用臣往視用臣言其便乃命董役明年夏訖工章惇上記詔以元豐導洛記為名刻石於洛口廟仍改導洛司為汴河堤岸司秋八月許二史直前奏事修起居注王存乞復唐貞觀二史之職執筆隨相入殿上是其言又故事左右史雖日侍立而欲奏事必稟中書俟旨存與同修注王安禮因對及之乃詔許直前著為令九月陳世儒伏誅并妻李婢髙張等十九人並處死世儒執中嬖妾張所出執中死張氏為尼世儒既長迎歸與妻李氏事之不謹李龍圖閣學士師中女其母夷簡孫也世儒知舒州太湖縣庸騃不樂為外官與李諷諸婢謀殺張欲以憂去毒之不死以釘陷其腦骨為諸婢告發遂正典刑冬十月置籍田詳定禮文所請於京城東南度田千畝為籍田置令一員從之太皇太后曹氏崩上事后誠孝后待上慈愛亦甚至每遇朝退晚后必親至屏扆候之或自持飲食以食上及后崩上哀慕毁瘠殆不勝喪初后既感疾以文字一函封鐍甚固付上曰吾死開之惟不可因此罪人上哭受后上仙上開函視之乃仁宗欲立英宗時臣僚異議之書上執書痛哭以遺制不敢追咎其人故宫中服三年之喪以報慈德后卧內緘封一匱上發視之則舊合同寶也仁宗時因火失寶更鑄之後淘井得舊寶故后藏之匱中而人無知者十一月貶黃履等官初太學生虞蕃訟學官受贓不法事付開封推治詞連上舍生屬逼禮部試知府許將奏無罪釋之蕃併指將妻弟及鄉人為不法乃移御史臺命中丞蔡確御史何正臣舒亶治其獄由是追逮遍四方鍛錬嵗餘連坐者甚衆皆確及亶正臣實為之辭連判監黃履參政元絳於是絳罷知亳州履落職將知蘄州學官王沇之除名余中王沔之等並黜責有差雨土十二月頒學令太學置八十齋齋容三十人外舍生二千人內舍生三百人上舍生百人總二千四百月一私試歲一公試補內舍生間嵗一舍試補上舍生封彌謄録如貢舉法而上舍試則學官不與考校公試外舍生入第一第二等以所書行藝與籍者升內舍內舍試入優平二等參以行藝升上舍上舍分三等俱優為上一優一平為中俱平或若一優一否為下上等命以官中等免禮部試下等免解學正增為五人學録增為十人學録參以學生為之竄蘇軾貶黃州團副本州安置應天府判官蘇轍監筠州酒稅駙馬都尉王銑與軾遊漏禁中語亦停官祕書正字王鞏責外州監當其餘坐受軾詩黜罰者張方平司馬光以下二十二人初軾知湖州中丞李定言軾自熙寧以來作為文章怨謗君父交通戚里舒亶亦言軾上表頗譏時事且陛下發錢本以業貧民則曰贏得兒童語音好一年強半在城中陛下明法以課試郡吏則曰讀書萬卷不讀律致君堯舜終無術陛下興水利則曰東海若知明主意應教斥鹵變桑田陛下謹鹽禁則曰豈是聞韶解忘味邇來三月食無鹽其他觸物即事應口所言無一不以譏謗為主小則鏤板大則刻石傳播中外自以為能乃詔定與知諌院張璪推治時莫敢言者宰臣吳充見上曰魏武帝何如人上曰何足道充曰陛下以堯舜為法薄魏武固宜然魏武猜忌如此而能容禰衡陛下法堯舜而不能容蘇軾何也上曰朕無他意祇令核是詩爾行且釋之王安禮亦乘間進曰自古大度之主不以言語罪人軾文士本以才自奮謂爵位可立取顧碌碌如此其中不能無觖望今若置之於法後世必謂不能容才願陛下毋竟其獄上曰朕固不深譴特欲開言者路爾即為貸之至是獄成而有是命七年正月徙汝州軾言汝州無田産乞居常州從之初軾繫御史獄上本無意罪之宰臣王圭忽言軾有不臣意上曰軾固有罪然於朕不應至是圭舉軾檜詩根到九泉無曲處世間惟有蟄龍知之句且曰陛下飛龍而軾欲求之地下之蟄龍非不臣而何上曰彼自詠檜何與朕事圭語塞上遂薄其罪然上每憐之一日上曰國史大事欲俾蘇軾成之執政有難色既而有旨起軾知江州蔡確張璪受命王震當詞頭明日改知江州太平觀又明日命格不下於是出手札徙軾汝州有軾黜居思咎閲嵗滋深人才實難不忍終棄之語軾即上表謝前此京師盛傳軾已白日仙去上聞嗟惜久之故軾於此表有曰疾痛連年人皆相傳為已死飢寒併日臣亦自厭其餘生忠州雨豆庚申元豐三年春正月嚴失入法詔審刑部斷議官失入者嵗具數罰之三月吳充罷為中太一宫使踰年卒世譏充心正而力不足知不可而不能勇退云葬慈聖光獻皇后祔永昭陵時推恩曹氏進官被賞者百四十餘人初欲以曹佾為中書令樞密吕公著言正中書令自宋興以來未嘗除人况不帶節度使即宰相也非所以寵外戚乃加佾司徒以護國節度兼中書令公著因言自古亡國亂家不過親小人任宦官通女謁寵外戚數事而已上深以為然時內侍王中正宋用臣等任事故公著假此以諷上既退同知薛向以公著為敢言八月佾封濟陽郡王御史范鏜言祖宗以來未有佾比不王乃所以保安曹氏不從夏四月瀘夷冦邉乞弟入冦戎州兵官王宣王慎言死之復命韓存寶經制五月定國子生員取清要官親戚為之以二百人為額秋七月河決澶州彗出太微垣占者以為主京城有兵變於是修京城置樓櫓保户養馬趣其間限督訓保甲除軍數以備之求直言知制誥王安禮上疏曰和氣致祥乖氣致沴意者大臣是非好惡有不遵道乘權射利者不察主上惠養元元之意用力殫於溝瘠取利究於園夫殆有以召天變臣願省不急之政務舒弗勝之工力至於祈禳小數貶損舊章恐非應天以實者上覽疏嘉歎安禮他日進對上曰王圭欲使卿條具所以朕謂大臣當宣導下情以達於上不應沮格人言以壅蔽人主今以一指蔽目雖太華在前不之見也近習之蔽君何以異此朕今信卿卿苐言之九月正官名國家建官多循唐制而間有損益三省長官惟除侍中亦罕預政而以平章事為宰相之任六曹不釐本務給舍不領本職諌垣不專諌爭史官不修記注總計有使封駁有司而審官審刑各有院凡臺省寺監往往他官兼領故議者多以正名為請知制誥李清臣亦言本朝官制踵襲前代陳迹不究其實官與職不相準差遣與官職又不相準勳階爵秩又皆不相準乞詔有司並加釐正以成一代之法上慨然從之乃置詳定官制房於中書命翰林學士張璪樞密副承旨張承一領之詔曰國家承平百年四海承德惟兹官政尚愧前聞今欲推治作之原參酌損益使臺省寺監之官實領職事其餘空名者一切罷去而與之以階因此以制祿凡厥恩數一如舊章至是頒以階易官寄祿新格改侍中中書令同平章事為開府儀同三司左右僕射為特進吏部尚書為金紫大夫五尚書為銀青光祿大夫左右丞為光祿大夫六曹侍郎為正議大夫給事中為通議大夫左右諫議為大中大夫祕書監為中大夫光祿卿至少府監為中散大夫太常至司農少卿為朝議大夫六曹前行中行後行郎中為朝請朝散朝奉大夫凡三等前行中行後行員外郎為朝請朝散朝奉郎侍御史左右起居舍人司諌亦如之凡三等左右正言太常國子博士為承議郎太常祕書殿中丞著作郎為奉議郎太子中允贊善大夫中書洗馬為通直郎著作佐郎大理寺丞為宣德郎光祿衛尉寺將作監丞為宣義郎大理評事為承事郎校書正字將作監主簿為承務郎開府儀同三司至通議大夫以上無磨勘法大中大夫至承務郎應磨勘待制以上六年遷兩官至大中大夫止承務郎以上四年遷一官至朝議大夫止候朝議大夫有闕次補其朝議大夫以七十員為額選人磨勘並依吏部法遷升朝官依今新定制宣德郎後避宣德門改宣教郎辛巳大饗明堂惟以英宗配上帝悉罷從祀羣神十一月朔日有食之太史局言日食六分驗之不及所食分數置元豐庫本朝財用舊屬三司自熙寧改法王安石為相始持冢宰掌邦計之説遂與三司分權凡稅賦征𣙜常貢之利方歸三司而摘山煮海鹽場坑冶絶户沒官禁軍闕額之類皆號朝廷封樁法行既久儲積贏羡是年於司農寺南創元豐庫貯之三司不與焉及官制行户部歲入才四百餘萬緡其他盡入元豐庫以待非常之用云應有所用必有司月數上之宰執聚議同奏降旨下庫始可支焉蓋雖天子不得而用其制之嚴如此自熙寧以前諸道𣙜酤坊場率以酬衙前之陪備官費者至熙寧行役法乃罷酒場聽民增直以雇取其價以給衙前時有坊場錢至元豐初司農請發坊場百萬緡輸中都至是遂置庫貯之後五年十月詔户部右曹於京東淮浙江湖福建十二路發常平錢八百萬緡輸元豐庫時知三班院曽鞏上疏論經費略曰宋興承五代之弊六聖相承與民休息故生齒既庶而財用有餘且以景德皇祐治平校之嵗入皇祐治平皆一億萬以上費亦一億萬以上景德官一萬餘員治平二萬四千員景德郊費六百萬皇祐一千二百萬治平一千三百萬以二者校之官之衆郊之費皆一倍於景德願詔有司講求其故使官之數郊之費皆同於景德則所省蓋半矣又曰臣待罪三班按國初承舊以供奉官左右殿直為三班立都知行首領之又有殿前承旨班院别立行首領之端拱以後分東西供奉又置左右侍禁及承旨借職皆領于三班三班之稱亦不改初三班吏員止於三百至天禧乃總四千餘員至於今乃總一萬一千餘員宗室又八百餘蓋景德員數已十倍於初而以今考之殆三倍於景德臣之所知者三班也吏部東西審官與他費尚必有加於此者惟誠加考察以類求之使天下嵗入億萬而所省者付三司計三十年之通當有十五年之蓄九朝編年備要卷二十
