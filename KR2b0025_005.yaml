body:
  text: 九朝編年備要卷五宋陳均撰太宗皇帝起甲午淳化五年止丁酉至道三年甲午淳化五年春正月御樓賜宴以上元節賜從臣宴上曰五代之際生靈雕喪當時謂無復太平之日矣朕躬覽庶政萬事粗理每念上天之貺致此繁盛乃知治亂在人呂蒙正避席曰乘輿所在士庶走集故繁盛如此臣嘗見都城外不數里飢寒死者甚衆不必盡然願陛下視近以及遠蒼生之幸也上變色不言蒙正侃然復位京西江浙大飢寬飢民罪因飢持杖劫人家藏粟止誅為首者餘悉以減死論時飢民多相率持棒投券富家取其粟坐強盜棄市者甚衆蔡州民張渚等三百一十八人皆當抵死知州張榮判官江嗣宗止議取其為首者杖脊餘悉減杖以其事上聞上嘉之下詔褒之令本州大發廩賑飢民遣使分巡諸道巡撫上親臨遣謂之曰彼皆平民因飢取餱糧以圖活命爾察其情非巨蠧悉為原減不可從強盜之例其凶狠難制為患閭里者可便宜從事於是全活者甚衆趙保吉冦邉命李繼隆討之保吉擾邉上怒命繼隆為河西都部署帥師討之左正言王禹稱上言謂不煩大兵如梁太祖捉劉知俊故事重賞之下必有勇夫繼遷身首不梟即擒又此賊通連北國擊東南而備西北正在此時吏部尚書宋琪上言臣頃任延州節度判官經涉五年西戎之事頗熟聞知昔李仁福既死彛超擅立詔邠州藥彥稠總兵五萬送延州安從進與彛超換鎮彛超據夏州不奉詔時頓兵城下議欲攻取軍儲不繼遽命班師而振旅之時不能整失戈棄甲遂為戎人之利臣又聞黨頃號為小蕃本非勍敵若其出山布陳止勞一戰便可蕩除深入則餽運難繼窮追則窟穴幽邃莫若沿邊州鎮分屯重兵候其入界方可掩擊非惟飬勇亦足安邊凡烏合之徒勢不能久利於速鬭以騁兵鋒莫若持重守疆以挫其鋭彼無城守衆乏糗糧威賞不行部族分散然後密令覘其保聚之處預於麟府延慶靈武等州約期會兵四面齊進絶其奔走之路合勢攻之可以剪除俾無噍類仍先告諭諸軍凡獲賊中生口資蓄許為已有官司不問如此則人百其勇矣以王繼恩為兩川招安使討李順時宋琪上書言夏州成都事宜密付李繼隆等擇利而行蠲逋租計二百五十餘萬緍石二月李順陷成都僭號蜀王改元應運守臣郭載率官屬奔梓州上謂近臣曰豈謂賊勢猖獗如此乃命蘄州刺史王杲帥兵趨劍門崇儀使尹元由峽路進並聽王繼恩節制賊自成都分其衆攻劍門成都監軍宿翰兵至與劍門都監上官正合軍擊賊衆殺戮殆盡令轉輸用官船仍給其費上謂宰臣曰幸門如鼠穴何可塞之但去其甚者斯可矣近來綱運之上舟人水工有少販鬻但不妨公一切不問却得官物至京無虧損耳呂蒙正對曰水至清則無魚人至察則無徒小人詐偽君子豈不知但以大度容之則庶事俱濟陛下此言深合黃老之道三月改授陳舜封官舜封舉進士及第後因奏事頗捷給舉止類倡優上問誰之子舜封自言其父為伶官上曰此宰相不為國家澄汰流品所致也遂自大理評事改授殿直李繼隆入夏州趙保吉徙綏州民於平夏左都押衙高文岯擊走之以綏州內屬乃命文岯知州事趙保忠聞王師來討保吉乃先攜其母及妻子吏卒避野外上言已與保吉解讎乞罷兵上怒命繼隆先移兵討之保吉反圖保忠夜襲之保忠竟以身免走還城中為趙光嗣所執開門納王師繼隆入夏州檻保忠送闕下保吉引衆遁去尋詔削保吉所賜姓名夏四月墮夏州城上以夏州深在沙漠本姦雄竊據之地欲墮其城呂蒙正等言此誠萬世之利乃隳之遷其民於綏銀等州給之以田置起居院張泌請置起居院修左右史之職為起居注上乃置院於禁中命梁周翰掌起居郎事李宗諤掌起居舍人事周翰請以所撰先進御後降付史館從之起居注進御始此五月趙保忠降王繼恩獲李順復成都先是順之黨二十萬圍梓州城凡八十餘日守臣張雍等協力拒却之賊退遣衆襲擊之大捷解閬州圍進平蓬州判官陳世卿善射城守日獨當一面親中數百人賊浸盛同幕者皆謀圖全之計世卿正色曰食君祿當身先報國奈何欲避難為已圖耶捷書至上手詔悉加褒賞焉繼恩之克劍州也馬知節實為先鋒繼恩疾其不附已遣守彭州配以羸兵三百州之舊卒悉召還成都賊十萬衆攻城知節率兵力戰自寅至申衆寡不敵士多死者逮暮知節慨然嘆曰死賊手非壯夫也即橫槊潰圍而出休於郊外黎明救兵至遂鼓噪而入賊敗去上聞而嘉嘆遂以知節為益州鈐轄繼恩遣部將王文壽領卒三千至遂州討賊文壽御下嚴急禆將張嶙殺之以所部五百人與賊合奏至有司請戮其孥上曰此不須殺乃命悉索營中書遣使招撫士卒杲斬嶙首送繼恩因使為鄉導以擊賊敗之順黨張餘復聚衆為盜討平之賊攻陷嘉戎等州開州監軍秦傳序死之賊進攻夔州巡檢白繼贇大破之斬獲不計賊之奄至開州也長吏以下奔竄獨傳序率衆拒戰力屈乃為蠟書遣人間道上言臣盡死力戰誓不降賊城既破傳序投火死其家寄荆湘間子奭聞父死泝峽求其父尸船覆而死人謂父死於忠子死於孝奏至上嗟惻久之録其次子賜其家錢十萬賊五萬來攻陵州城州兵才百四十六人舊無城塹守臣張旦修完戰具設鹿角招集民丁拒戰大破之斬首五千餘級賊平賜詔褒之越明年春獲餘於嘉州其冬以上官正雷有終為西川招安使召繼恩歸闕正等盡降餘冦劍南以寧尋遣使采訪川峽諸州守二能否七人以稱職聞賜詔奬之遂州通判查道與焉道徙知果州時賊餘黨尚有伏岩穴依險為棚者詔書招諭未下咸請發兵殄之道曰彼愚人也始懼罪欲停數刻命爾豈無詿誤耶即微服直趍賊所諭以詔意或識之曰郡守也嘗聞其仁是寧害我者乃相率捨兵羅拜請罪悉給券縱令歸農驛奏之秋七月髙麗請伐契丹詔却之髙麗為契丹所侵掠來求援上以北邊甫寧不欲出兵優詔答之自是不復入貢八月置宣政使以王繼恩為之繼恩有平賊功中書擬以為宣徽使上曰朕不欲宦官預政事宣徽使執政之漸也因詔别制是名立在昭宣使上以授之繼恩初自昭宣使出為兩川招安使昭宣使置在四年九月改內侍省班院名以內班院為內侍省內侍班院以入內黃門班院為內侍入內內侍班院內侍省自唐有之國初有內班院入內黃門班院至是改焉景德三年始别內侍省為入內內侍省遂號為省以侍殿中供灑掃之職役使雜品者𨽻內侍省為南班以通侍禁中服役褻近者𨽻入內內侍省為北司各置都知副都知押班由是內侍省進見有時而入內內侍省寵任重矣蔡京用事改入內內侍省都知為知入內內侍省事副都知為同知押班為簽書以效樞府而省官與執政等靖康改正依舊名稱至紹興三十年併內侍省歸入內內侍省以襄王元侃為開封尹封壽王用冦準之言也自馮拯等斥嶺南中外無敢言建儲者至是凖自青州召還入見上曰朕諸子孰可以付神器者凖曰陛下誠為天下擇君謀及婦人中官不可也惟陛下擇所以副天下望者上俯首久之屏左右曰壽王可乎對曰知子莫若父聖意既以為可願即決定上謂壽王曰夫政教之設在乎得人心而不擾之爾得人心者莫若示之以誠信不擾之實無如鎮之以清靜惟是而行雖虎兕亦當馴狎況於人乎書云撫我則后虐我則讎信哉斯言也爾宜謹之大赦下詔罪已以蜀冦漸平也初命翰林學士錢若水草詔既成進御上笑謂若水曰朕為卿潤色可乎若水頓首謝因命筆親竄數字皆引咎深切尤為精當詔辭略曰朕委任非當燭理不明致彼親民之官不以惠和為政管𣙜之吏惟務刻削為功撓我蒸民起為狂冦又曰念兹失德是務責躬改而更張永鑒前弊而今而後庶或警余以張詠知益州時城中屯兵尚三萬人無半月之食詠知民間舊苦鹽貴而廩有餘積乃下其估聽民以米易鹽未踰月得米數十萬斛詠度有二嵗備乃奏罷陕西運糧上喜曰此人何事不能了朕無憂矣詠告諭賊黨許其自新一日繼恩械賊數十人請行法詠釋之繼恩恚以問詠詠曰前日李順脅民為賊僕今日化賊為民不亦可乎繼恩御軍無政其下暴橫詠密奏請近臣至蜀分屯師旅冬十一月幸國子監賜直講孫奭五品服因幸武成王廟復幸國子監令奭講尚書説命三篇至事不師古以克永世匪説攸聞上曰誠哉是言也上意欲切勵輔臣因嘆曰天以良弼賚商朕獨不得耶乃飲從臣酒賜奭束帛十一月令宰相以下薦士上言多士盈朝欲求一材堪轉運使三司判官者了不可得呂蒙正對曰臣等職在選掄而令陛下孜孜勞於求賢臣等之罪也上因詔蒙正以下各舉有器業可任事者一人蒙正奏言宰相可以進退百官今獨舉一二人是示天下不廣也上因命之上將勵精求治聽政之暇盡索兩制清望官名籍閲有德行者悉令舉官上嘗欲遣使朔方諭中書選可任者蒙正退以名上上不許他日凡三問終不易上怒擲其奏於地曰何太執耶蒙正曰臣非執蓋陛下未諒爾上退謂親信曰蒙正器量我不如既而卒用其人覆命果大稱旨十二月戊寅朔日有食之隂雪不見羣臣稱賀賀日食不見始此三司復各置使命陳恕等領之恕峭直守公性靡阿順每奏事上或未察至形誚讓即斂板退縮俟上意解復進如是三四終不易上亦多從之嘗題於殿柱曰真鹽鐵陳恕恕出入三司首尾十八年言稱職者亦以恕為首焉乙未至道元年春正月上清宫成車駕親謁上嘗謂左右曰朕在藩邸時先帝所賜悉以營此為百姓祈福不用庫錢也遣使經度陳許等州水田尋罷之度支判官陳堯叟請於陳許鄧潁等州至壽春因水利墾田積穀可省江淮漕運命皇甫選何亮經度之選等尋上言先受詔往諸州興水利按鄭渠引涇水溉田四萬頃三白渠溉田四千五百頃今之存者不及二千頃乃二十二分之一分也皆由渠堰寖壞失其水利又言鄧許陳潁蔡宿亳七州之地其公私間田凡三百五十一處合二十二萬餘頃蓋民力不能盡耕漢魏以來杜預召信臣任峻司馬宣王鄧艾等立制墾闢之地內南陽界穿山開嶺疏導河水散入唐鄧襄三州以溉田又諸處陂塘坊堰若增築勞費頗甚欲望於隄防未壞可興水利者先耕二萬餘頃他處漸圖建置時著作佐郎孫冕總監三白渠詔冕依選等奏行之募民耕墾七州之田自鄧州始皆免賦入復令選等舉一人與鄧州通判同掌其事選與亮分路按察焉未幾罷之契丹冦府州折御卿敗之契丹自振武入冦御卿大破之於子河汊敵死亡甚衆上曰朕常戒邊將勿與爭鋒待其深入分兵以要其歸路必無遺類今果如吾言御卿世將習知邊情忠勇感慨常欲立功以報朝廷朝廷亦以麟府逼近戎羯倚為一面自子河汊之役戎人喪氣不敢深入為冦矣未幾御卿卒以其子惟正嗣知州事惟正尋以疾召入朝以其弟惟昌代之趙贊鄭昌嗣賜死時並為度支都監初上以贊與昌嗣頗似忠直任用之後所為多不法並賜死上因謂近臣曰君子小人如芝蘭荆棘不能絶其類在人甄别耳茍盡君子則何用刑罰焉冦凖對曰帝堯之時四凶在庭則三代以前世質民淳已有小人矣今之衣儒服居清列者亦頗朋附小人為自安之計如昌嗣輩奔走賤吏不足言也以堂後官欒崇吉為度支副使崇吉提點中書五房公事明習文法清白勤事故上越次而用之即召堂後官著作郎楊文質為祕書丞代掌五房事謂之曰汝見擢用欒崇吉否當自勉也二月令節度至刺史勿與金穀刑獄只委通判及判官三月貸京畿民菽種有司請量留以供國馬上曰但竭廩以給之國馬飼以芻藁可矣夏四月呂蒙正罷為右僕射上詔蒙正曰僕射乃師長百僚朕以中書多務與朕均勞逸耳以呂端為平章事復令宰執更押班知印從呂端之請也端為相持重識大體以清靜簡易為務每奏事同列多異議端罕所建明一日內札戒諭自今中書事必經呂端詳酌乃得奏聞初趙普獨相太祖置參知政事以佐之其後普恩弛始均為真相既而復有釐革端初與凖同列及先居相位慮凖不平乃請參知政事與宰相分日押班知印同升政事堂從之契丹冦雄州守臣何承矩敗之先自滄州徙雄州承矩推誠御衆同其甘苦邊民有告機事者屏左右與之欵接無所猜忌故敵動息皆能前知及敵敗於子河汊承矩條其殺獲揭於市敵諜知愧忿將襲取承矩以雪恥夜引衆入冦反為承矩所敗上視捷奏具知敵所以入冦之由謂承矩輕脫生事失守禦體尋命還滄州旱命侍御史分決諸道獄後二日雨開寶皇后宋氏崩諡曰孝章皇后后之崩也羣臣不成服王禹稱與客言后嘗母天下當遵用舊禮或以告上不悅尋出禹稱知滁州禹稱在位多所論奏數忤權貴宫官尤惡之上嘗曰禹稱文章獨步當世然賦性剛直不能容物耳纍命執政召至中書戒諭終不能改禹稱嘗為李繼遷草制繼遷送馬五十匹以狀不如式却之及在滁州有言禹稱買馬虧價上曰彼能却繼遷五十匹馬顧肯虧馬價哉六月限僧尼額秋七月置江淮兩浙發運使未幾任中正為江南轉運副使至部歲大稔有羡盈發運使王子輿欲悉調餉京師中正曰東南嵗輸五百餘萬石江南所出過半今雖有餘餉後或小歉則數不登將急取吾民乎子輿乃止蠲陳許等州夏稅雜征京西轉運使姚鉸奏民經災傷牛多死上覽奏惻然詔除之尋詔州縣部內流亡及失租調什之一者書下考又令民間自織縑帛非鬻市勿算八月立壽王元侃為皇太子大赦改名恆自唐天祐以來中國多故不遑立儲二將及百年至是始舉而行中外胥悅楊徽之畢士安兼左右庶子喬維嶽楊礪兼左右諭德夏侯嶠兼中舍李至李沆兼賔客見太子如師傅之儀初置左春坊謁者以壽邸導吏闕繼闕為左清道率府副率兼領之按謁者本內侍之職而太子有通事舍人掌傳宣導引之事不名謁者又十率品秩頗崇非趨走左右者所宜為蓋執政之失也九月李繼遷犯邉夏州之役繼遷竄於漠北往嵗八月遣其弟延信表待罪且言違叛事出保忠願赦勿誅上喜召見延信面加諭撫錫賚甚厚詔復賜姓名是歲六月上遣使賚詔諭令移鎮鄜州繼遷不奉詔至是冦清逺軍詔奪所賜姓名冬十一月置轉運司承受公事選朝官及三班為之每路二員常事與轉運聫署施行非常事許乘驛入奏上曰逺民有事不能自達故置是職十二月詔議言事者賞罰詔百官及諸色人自今起請制置事如施行後顯有利濟當議旌賞或虧損公私亦重行朝典銅候儀成秋官正韓顯符所造也詔置之司天臺丙申至道二年春正月辛亥郊亦用上辛祈穀之典也上以文物仗衛之盛詔有司畫為南郊圖禁增冶利轉運司言成州金坑嵗課虧少請遣使按行上曰朕所寶惟穀何必言利勦吾民乎遂廢之是歲有司又言鳯州出銅礦定州出銀礦請置官掌其事上曰非不愛寶當與衆庶共之不許夏四月命李繼隆討李繼遷先是洛苑使白志榮自環慶護芻糧往靈州繼遷伏兵於浦洛河襲之芻粟四十萬悉為所獲志榮僅以身免上怒命繼隆為環慶都部署討之定任子出官制先是五品以上官子孫每覃慶中書皆授攝官未幾即補正員不十數年遂通閨籍上以其太濫乃詔自今任子只賜同學究出身依例赴選集五月詔輔臣陳靈州事宜時繼遷冦靈州陕西民運芻糧詣靈州度沙磧為虜所劫掠及飢渴死者不可勝計詔曰靈州孤絶救援不及賊繼遷猖獗未就誅夷宜令宰臣吕端知樞密院事趙鎔等各述所見利害直書其事言不必文只今曰實封來上端等對請共為一狀張洎越次奏曰上有所詢端等緘默不言深失訏謨之體端曰洎欲有言不過揣摩陛下意耳洎退上疏極言棄之便上初有意棄靈州既而悔之及覽洎奏不恱却以付洎語之曰卿所陳朕不曉一句洎惶恐流汗而退乃召向敏中等語之曰張洎上言果為呂端所料蜀盜王鸕鷀叛討平之偽稱卭南王西川巡檢石普言蜀之亂由賦斂迫急望一切蠲其租上許之揭榜告諭蜀民無不感悅尋討平之秋七月汴決穀熟命塞之以陳靖為勸農使靖時為直史館疏言古者強幹弱枝之道必先富實之於內今京畿周環二十三州地之墾者十才二三望擇大臣一人兼領司農事典領於中又於郎官中選為副者執事於外自京東西擇膏腴未耕之地申以勸課如授臣斯任則可勉况賢者乎遂罷之出知鄧州閏月詔宰相獨押班知印上既罷凖仍詔自今參知政事不知印押班甎位列宰相後不升政事堂並如舊制然押敕齊銜行並馬亦自凖始至今不易也九月復命李繼隆等分五路討李繼遷初上遣李繼隆等分環慶延夏麟五路並進抵烏白池皆先授以方略既而繼隆欲直抵繼遷巢穴不及延靈州遣其弟繼和入奏上怒曰汝兄如此必敗吾事矣因手書切責比至已與慶州路兵先發不見虜乃復引還獨范廷召王超兵至烏白池斬獲甚衆繼遷遁去雖頻克捷而諸將失期士卒困乏終不能擒賊焉上先閲兵崇政殿以方略授諸將且令多設強弩及遇賊布陳萬弩齊發賊皆走凡十六戰皆捷先是運糧靈州上亦令丁夫悉持弓矢為方陳而行冦至則成列以待之後諸將亦卒以違節制致敗時命户部使張鑑調陕西芻糧入靈州遣使持節督之鑑上疏曰伏以關輔之民數年以來并有科役畜産蕩盡室廬頓空加以浦洛之行曽經剽劫原州之役又至遷延非獨令之勿從實緣力所不逮況復先棄糧草見今逐處追科本户稅租互遣他州送納往返千里費耗十倍愁苦怨嗟充塞路歧自春徂冬曾無暫息餱糧乏絶力用殫窮顧此疲羸尤堪軫恤今若復有差率益致流亡縱令驅迫而前復恐逗撓而潰願陛下特垂詔旨無使重勞因兹首春俾競東作慎固邦本詳求武經況靈州一方僻居塞外雖曰西陲之要地實為中夏之蠧區竭物力以供須困甲兵而援送事當深慮理要預防若待川決而後隄火熾而方戢則焚溺之患深矣雖欲拯救其可得乎環慶等州地震冬十月併三司勾院為一先是上嘗召三司孔目官李溥等二十七人問以錢穀之務溥等言不可口占願得條對上許之因謂宰相曰此輩自幼寢處其中必周知本末卿等但假以顔色引令剖析宜有所資益三司使陳恕等終不肯降意後上召恕等責以吏事廢弛恕言國用所需浩瀚臣等時舉利權朝廷慮侵民皆不行又時有災沴必盡蠲其積欠雖桑𢎞羊復生亦所不逮也上曰卿等清而不通且如簿領一處節目未備即十年五年不決此卿等之過也皆頓首謝溥等條上利害七十一事中書參校其四十四事可行遂著於籍其十九事令恕議定而後行之上因謂侍臣曰朕豈不知以崇髙自任耶錢穀細務亦自與用心區分者蓋以如前代帝王昏弱者天下十分財賦未有一分入於王室唐德宗在梁洋公私窘乏韓滉專制鎮海積聚財貨德宗遣其子臯往來得百萬斛以救艱危則當時朝廷事勢可見矣朕今收拾天下遺利以贍軍國以濟窮困若豪戶猾民望吾毫髮之惠不可得也元年因三司孔目官楊元實等所陳條目置行帳司檢校三司帳籍命御史知雜張秉主之官物羡溢者凡三百三十八萬五千餘緡上以元實等首為規畫悉遷其秩充逐部孔目官上又欲併三司為一命官總判令鹽鐵使陳恕議其可否恕言三司繁委若為三部各設主司此為良䇿其勾院磨勘兩司出於舊制關防之要莫加於此理欠憑由二司雖非舊制亦為允當其行帳司近日權置了絶舊帳司額自除提點司是中旨特置提振三司廢怠之事固非有司敢得擬議上然之是秋遂併理欠憑由司為一廢提點司至是復有是命十一月置簽署提點樞密宣徽院諸房公事以周瑩及內侍劉承規為之上以二人久侍禁闥常立戰功故特加寵遇以瑩為客省使承規為六宅使並為簽書提點凡重務一以委之樞密使不敢專決內臣簽書樞密蓋始此然禮不得視執政也丁酉至道三年春正月以溫仲舒王化基參知政事時邊境多事上垂欲相仲舒而罷吕端會不豫乃止化基寬中有度量不以廕補諸子官然能訓導皆有所立葬孝章皇后初以隂陽拘忌權窆於都城之西北至是祔葬永昌陵神主祔别廟在孝惠皇后上二月李繼隆遣將擊李繼遷敗之繼遷遁去上不豫三月上崩於萬嵗殿年五十九在位二十二年諡曰神功聖德文武廟號太宗上嘗語宰相曰大凡為君為臣嘗宜兢畏不可放逸後唐莊宗夾河相持千征萬戰備嘗艱苦天下甫定便恣溺惑不及三年果致傾覆可為鑑哉上每旦受朝畢崇政殿決事至日中尚未御食淳化中謝泌請退朝進食畢然後御殿上不答又嘗曰統制區夏自有道理若得其要不為難事必先正其身則孰敢不正至於內外官吏皆量材任職譬如匠者架屋棟梁榱桷咸不可闕也宋琪曰近見陛下自供奉殿直諸州抵邸吏咸加進擢內外無不知勸所謂竹頭木屑亦不棄遺者也又嘗曰清靜致治黃老之深旨也呂端對曰國家若行黃老之道其效甚速呂蒙正亦謂老子稱治大國若烹小鮮邇來上封事議制置者甚多願陛下漸行清靜之化以鎮之上曰朕意不欲塞人言耳又嘗曰治國在乎修德四夷當置度外往嵗觀兵薊北過桑乾河不由橋梁往則奮鋭居先還乃勒兵後殿靜而思之亦可為戒又嘗曰寸隂可惜茍終日為善百年之間亦無幾耳時有京畿民詣登聞鼓院訴家奴失猳豬詔賜千錢償其直因語宰相曰似此細事悉訴於朕亦為聽決大可笑也然推此心以臨天下可以無寃民矣又嘗語近臣曰天下事急若奔駟日日聽斷尚恐有燭照不至者而況唐末帝王深處九重民間疾苦何嘗得知每一思之誠可驚畏又曰唐末帝王臣下少得見面縱開延英亦祇中人在側何曽君臣言得一事趙昌言曰每開延英茍逾數刻史臣書之以為美談今天下茍非陛下聽斷不倦則封疆萬里豈致肅清斯所謂一人有慶兆民賴之也嘗有日本國僧來朝言其國主姓王氏自始祖至今凡六十四世八十五王矣其臣亦皆世官上聞之太息因謂宰相曰此島夷亦尚存古道中國自唐季海內分裂五代世數尤促朕雖德不及往聖然孜孜求理惟恐庶獄有寃未嘗敢自暇逸以畋逰聲妓為樂兾上穹降鑒庶幾子孫長久運祚悠逺大臣亦世守祿位卿等各宜盡心輔朕無令逺夷獨享斯慶也咸平中三司上經費數真宗曰先帝以財賦國之大本莫不求諸中道而為其永制輔臣曰先帝非止愛人嗇費至於損節服用躬御浣濯之衣蓋前古哲王莫能階也皇太子即皇帝位初太宗不豫李皇后與宣政使王繼恩忌上英明隂與參知政事李昌齡知制誥胡旦謀立元佐太宗崩后使繼恩召呂端端知有變鎖繼恩於閣內使人守之而入后謂曰宫車晏駕立嗣以長順也今將何如端曰先帝立太子正為今日豈容更有異議后默然上既即位端平立殿下不拜請捲簾升殿審視始降階率羣臣拜呼萬嵗昌齡等尋坐交通請託漏泄禁中語貶昌齡忠武軍行軍司馬繼恩右監門衛將軍均州安置仍籍沒其家資旦削籍流潯州仍詔中外臣寮與交通者一切不問夏四月大赦尊皇后為皇太后宫曰萬安以郭贄知大名府贄求對懇辭上謂輔臣曰朕初即位命贄治大藩而不行則何以使人卒遣之梁周翰知制誥故事入西閣皆中書召試制誥三篇各二百字一篇百字惟周翰不召試而命焉黎桓封南平王五月求直言直集賢院田錫上疏略曰去年永興等六州同日地震此下動之象也靈州餽運糧草二十五萬到者才七八萬百姓死者十餘萬人陕西二十五州不勝困敝臣以為地動方位既在關輔豈無在下者輒動乎萬一關輔有變則臣慮西川保無劍閣之危南方復恃長江之阻上出其疏令詳酌行之右正言孫何獻五議其議參用儒將曰古謂元戎無所統攝爰自近代又有供軍糧料隨軍轉運之目使者往復託稱上旨動必中覆實戾成算請擇文儒委以邊任勿使小人撓其權境內𣙜利租稅一以與之監陳先鋒之類悉任偏將受其節度其二議申明太學曰使寒雋之士由鄉里以升聞世祿之家自成均而出仕太學不得補庶人之子神州不得貢卿士之門郡縣皆按舊典立學官嚴課試薦延之法其三議釐定遷轉曰伏見圜丘霈澤並許敘遷今之班簿臺省宫寺凡七百員若十年之內肆赦相仍必致官僚過於胥徒朝臣多於州縣其四議復制科其五議復鄉飲監察御史王濟上疏略曰守小謹者似德懷怯懦者似恕容姦惡者似仁藴佞諛者似恭恣傾險者似智好詆訿者似直樹朋黨者似義肆苛刻者似明急貪祿者似勤若斯之流雖愚而類賢用之則速亂之基也又曰官多則事煩吏多則民殘欲事不煩莫若省官欲民皆安莫若省吏又曰官多俸薄不如俸厚而官少衣食既足亷恥自興刑部員外郎馬亮疏言陛下初政軍賞宜速而所在不時給又云州縣逋負至多赦書雖為蠲除而有司督責如故又言契丹仍歲入冦河朔蕭然請修好以息邊民吏部員外郎刁衎疏言私賞毋及於小人私罰毋施於君子開諫諍之門塞讒賊之口毋以春秋鼎盛而耽於逸逰毋以血氣方剛而惑於聲色罷發運使及轉運司承受上初親政務從簡易也出宫人立夫人郭氏為皇后上為襄王時潘氏卒太宗復為上娶郭守文之女淳化中封魯國夫人因謂近臣曰唐肅宗實仁孝之主在東宫時已髮白明皇臨幸乃知未有正妃於掖庭選籍沒之女賜之而生代宗朕常以戒諸王曰今兹姻偶悉皆將相大臣之家六禮具備朕蓋欲厚人倫壯王室也可不自重乎追尊上母夫人李氏為賢妃防禦使英之女上及楚王元佐皆妃所生也六月禁獻珍禽竒獸及諸祥瑞罷三司副使追册皇后潘氏諡曰莊懷後改諡章懷陵曰保泰錢若水罷自同知樞密院事罷為集賢院學士判院事先是太宗為若水言士之學古入官遭時得位紆金拖紫躍馬食肉前呼後擁近賞宗族此足以為榮矣豈得不竭誠報國乎若水對曰髙尚之士固不以名位為光寵忠貞之士亦不以窮達易志操其或以爵祿榮進之故而效忠於上中人以下者之所為也太宗然其言及劉昌言罷太宗問趙鎔曰見昌言否鎔等曰屢見之上曰涕泣否曰與臣等言多至流涕若水曰昌言實未嘗涕泣蓋鎔等迎合上意耳吕蒙正罷太宗又謂若水曰人臣當思竭節以保富貴蒙正前日一布衣朕擢為宰相今退在班列想其目穿望復位矣若水對曰蒙正雖登顯貴然其風望亦不為忝冒且蒙正固未嘗以退罷鬱悒當今岩穴髙士不求榮爵者甚多如臣輩誠不足重上默然若水因自念人主待輔臣如此將俟嵗滿即移疾會太宗晏駕未果至是以母老請解機務章再上乃得請秋七月令轉運迭入對詢以民間利病寬商征上封者言嶺南村墟聚落間日集禆販謂之墟市請降條約令於城邑交易兾增市稅上曰徒擾民耳可仍其舊戒西邊謹疆事上謂輔臣曰朕已戒疆吏但謹斥候嚴卒乘即驅逐去勿追之仍遣使與邊臣議靈州事宜悠久之便庶關輔之民息肩有日也八月以周瑩為宣徽北院使舊制宣徽使班在樞密副使之上瑩請居其下詔從之初瑩與劉承規同簽署提點樞密宣徽院諸房公事瑩既遷承規亦罷自後不復置西川戍卒劉旴叛攻掠蜀漢等州討平之益州鈐轄馬知節領兵追擊旴招安使上官正飛書召知莭知節曰賊兵已數千若少緩之必倍勞費即復引還正亦尋至遂破旴平其黨旴自起至滅凡十日正始無出兵意張詠以言激之正將行舉酒屬諸校曰此行亟殄賊不然則此地還為爾死所矣正由是倍道疾戰冬十月葬太宗於永熙陵祔廟且以懿德皇后配祔莊懷皇后於别廟趙易安謂以序當用淑德皇后詔有司詳議以聞禮官言淑德皇后無位號懿德享封大國用懿德為是詔恭依有司尋上言冬至祀圜丘孟夏祀雩夏至祭方丘請奉太宗配上辛祈穀季秋大享明堂奉太祖配上辛祀感生帝孟冬祭神州地祗奉宣祖配其親郊圜丘奉太祖太宗並配詔可十一月復分勾院為三命王欽若等分判之初欽若為亳州監倉時久雨倉司以穀濕不為受欽若命悉輸之且奏不拘年次先支濕穀太宗大喜手詔褒答因識其姓名及開封府以旱蠲租時有言所蠲放皆不實太宗不悅選命欽若等覆按欽若獨乞全放至是擢用上語輔臣曰當此時朕亦自疑懼欽若小官獨敢為百姓伸理此大臣莭也時天下宿逋有自五代迄今理督未已者欽若悉奏除之上大驚曰先帝顧不知耶欽若徐曰先帝固知之殆留與陛下收天下心耳十二月追尊賢妃李氏為元德皇太后别立廟李繼遷除加定難節度復賜姓名封以夏綏銀宥靜五州先是上詢宰執以靈州事宜李至上言靈州自鄭文寶為國生事關輔生靈轉困村堡多沒巋然空壁老我師徒張頥待飼者不下五千送糧四十萬而止獲六萬彼之户口四千有餘今則不盈數百矣彼之租課四十五萬二千有竒今則無孑遺矣安可復守之耶至是繼遷遣使修貢求備邊任上雖察其變詐時方在諒隂姑務寧靜從其請上初命翰林學士宋湜草保吉制湜知上意必欲歸其事於太宗因進辭曰先皇帝早深西顧將議真封屬軒鼎之俄遷建漢壇而未及眷兹遺命實付眇躬爾宜望弓劍以拜恩守封疆而效節上甚悅以禹稱知制誥初禹稱知揚州應詔上書言五事一曰謹邊防使輦運之民有所休息乞通使遼疆以夏州與繼遷亦足見陛下屈已而為民也二曰減冗兵併冗吏使山澤之饒稍流於下國初兵鋭而將專故強自後兵衆而不盡鋭將衆而不自專又言開寶中設官至少每州止有刺史一人司户一人未嘗缺事及太平興國中復有通判副使判官推官司理及監酒監庫等官問其租稅則減於曩日問其人民則少於昔時又曰國家山澤之利可謂盡矣唐元和中始建茶法嵗得四十萬貫今至數百萬矣三曰艱難選舉使入官不濫太祖之世進士不過三十人諸科五十人先帝在位逾二紀登第近萬人宜稍為防制使入官不濫四曰沙汰僧尼使無耗失五曰親大臣逺小人使忠良蹇諤之士知進而不疑姦險傾巧之徒知退而有懼疏奏即召禹稱還朝既用其䇿以五州地賜趙保吉而有是命咸平中知蘄州卒禹稱學問敏贍鋒氣峻峭極談世事臧否人物以直躬行道為己任雖處危困封章無輟分天下為十五路一曰京東路二曰京西路三曰河北路四曰河東路五曰陕西路六曰淮南路七曰江南路八曰荆湖南路九曰荆湖北路十曰兩浙路十一曰福建路十二曰西川路十三曰峽路十四曰廣南東路十五曰廣南西路仁宗天聖八年分江南為東西路分兩川為益梓利夔四路凡十八路九朝編年備要卷五
