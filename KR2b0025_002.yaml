body:
  text: 九朝編年備要卷二宋陳均撰太祖皇帝起丁卯乾德五年止丙子開寶九年丁卯乾德五年唐國吳越漳泉奉正朔南漢大寶十年北漢天會十二年春正月修河堤以曹彬為宣徽南院使領義成節度上賞曹彬特優彬辭上曰卿有功無過茍有纎芥之纍王仁瞻豈為卿隱又以劉光義張廷翰李進卿平蜀不擾命領鎮安彰國保順節度使先是或告王全斌等在蜀掠奪子女隱沒貨財上令併按以擅尅軍士裝錢及殺降致冦之由罪當死上赦之乃責全斌及崔彥進崇義昭化留後王仁瞻右衛大將軍沈義倫為樞密副使初義倫為隨軍轉運使入成都獨居僧寺蔬食偽蜀羣臣有以珍寶竒巧之物為獻者皆却之東歸篋中所有唯圖書數卷而已上聞其清節過人故擢用之覆試進士盧多遜知舉上復詔參知政事薛居正于中書覆試皆合格乃賜及第建隆間詔及第人不得于知舉稱門生乾德元年令貢舉不得用朝臣公薦至是又加覆試而貢舉條令益密矣故事每嵗知舉官將赴貢院臺閣近臣得薦抱至藝者號曰公薦然去取不能無所私故禁之韓重贇罷時為殿前都指揮使有譛其私取親兵為腹心者上怒欲誅之趙普曰若重贇以譛誅即人人懼罪誰敢為陛下將者上乃止命重贇出領彰德節度重贇聞普救已他日詣普謝普拒弗見重贇罷後殿前都指揮使六年不除至開寶六年始以楊義為之三月趙普加左僕射五星聚奎初竇儼與盧多遜楊徽之周顯德中同為諫官儼善推星步厯嘗謂徽之等曰丁卯嵗五星聚奎自此天下太平二拾遺見之儼不與也夏四月馬士元致仕士元時為給事中謁沈義倫適有吏白事不顧士元士元曰我為臺省近臣不為執政所禮可以去矣六月戊午朔日有食之秋八月河決衛州入其郛殺數百人九月李彛興卒子克睿嗣領軍務冬十月置綾錦院因平蜀得錦工數百人而置院戊辰開寶元年十一月改元唐國吳越漳泉奉正朔南漢大寶十一年北漢主劉繼元立改天會十三年為廣運元年春正月修京城修大內初上命增修大內至是營繕畢賜諸門名上坐寢殿令洞闢諸門皆端直軒豁無有蔽壅因謂左右曰此如我心少有邪曲人皆見之矣上又嘗語宰相曰古之為君鮮能正身自致無過之地朕當夙夜畏懼防非窒欲庶幾以德化人之義如唐太宗受人諫疏直詆其失曾不愧恥豈若不為之而使下無間言哉為臣者或不終其名節陷于不義蓋忠信之薄而獲福亦淺鮮斯可戒矣二月納皇后宋氏忠武節度使延渥之長女也延渥尋改名渥行覆試法王祐知舉陶榖子邴登第上曰榖不能訓子邴安得第遽命中書覆試因詔自今舉人凡關食祿之家皆令覆試夏五月賜米麥賑唐飢唐飢賜米麥十萬斛以賑之六月以董遵誨為通逺軍使上以通逺軍西戎近邊命遵誨守焉遵誨既至召諸族酋長宴勞之諭以朝廷威德衆皆悅服後數月復入冦遵誨率兵深入俘斬甚衆夷落以定上嘉其功就拜羅州刺史使如故遵誨嘗遣其外弟劉綜來貢馬及還上解所服真珠盤龍衣使齎賜之初遵誨父宗本仕漢為隨州刺史上微時嘗往依焉遵誨慿藉父勢多所凌忽及上即位遵誨纍遷至驍武指揮使一日便殿召見遵誨伏地請死上令左右扶起未幾部下有訴其不法之事遵誨惶恐待罪上諭之曰朕方赦過責功豈念舊惡遵誨再拜感泣又問遵誨母安在對曰母氏在幽州患難暌隔上乃厚賞購得其母還之上之不念舊惡推赤心以待臣下類如此遵誨太平興國中兼領靈州路巡檢在通逺凡十四年秋七月北漢主鈞卒養子繼恩立遣使告終稱嗣于契丹契丹許之然後即位初漢世祖女適薛氏生子繼恩再適何氏生子繼元俱幼孤世祖以鈞無子使養之皆冒姓劉氏鈞寢疾召平章事郭無為執繼恩手付以後事繼恩嗣位諡鈞為孝和皇帝上自即位數出微行或幸功臣之家不可測趙普每退朝不敢脫衣冠一夕大雪普謂上不復出矣久之扣門聲異甚亟出則上立雪中普惶恐迎拜上曰已約吾弟矣已而開封尹光義至即普堂設重裀地坐熾炭燒肉普妻行酒上以嫂呼之普從容問曰夜久寒甚陛下何以出上曰吾睡不能著一榻之外皆他人家也故來見卿普曰陛下小天下耶南征北伐今其時也願聞威算所向上曰吾欲取太原普默然良久曰非臣所知也上問其故普曰太原當西北二邊使一舉而下則邊患我獨當之何不姑留以俟削平諸國彼彈丸黑子之地將何所逃上笑曰吾意政爾姑試卿爾于是用師荆湖繼取西川嘗因北漢界上諜者謂北漢主曰君家與周氏世仇宜不屈今我與爾無所間何為苦此一方之人也若志中國宜下太行以決勝負北漢主遣諜者復命曰河東土地兵甲不足當中國之萬一區區守此蓋懼漢氏之不血食也上哀其言笑謂諜者曰為我語劉鈞開爾一路以為生故終劉鈞之世不以大軍北伐九月嚴銅錢出界禁五貫以上者死以下抵罪有差北漢弒其主繼恩弟繼元立改元廣運初北漢主惡無為之專欲逐之而未果未幾供奉官侯霸榮等作亂殺之繼恩立才六十餘日而難作或言無為實使之亟誅霸榮以滅口云李繼勳擊北漢敗之繼元始立王師已入其境乃亟上表契丹求援又遣將領軍扼團柏李繼勳及何繼筠等擊破之于銅鍋河北漢尋復入冦大掠晉絳二州之境貶雷德驤官德驤判大理寺其官屬與堂吏附會宰相擅增減刑名德驤憤惋求見欲面白其事未及引對即旦詣講武殿奏之辭色俱厲并言趙普強市人宅第聚斂財賄上怒叱之曰鼎鐺猶有耳汝不聞吾之趙普社稷臣乎引柱斧擊折其上齶二齒命左右曵出詔處以極刑既而怒解止用闖入之罪黜焉上又嘗彈雀後苑或稱有亟事請見者亟召見之乃常奏上詰之對曰臣以為尚急于彈雀上愈怒以斧柄橦其口墜兩齒已而復召賜之金帛冬十月吳越王俶使子惟濬來貢十一月癸卯郊大赦改元先是上親享太廟見其所陳籩豆簠簋問曰此何物也左右以禮器對上曰吾祖宗寧識此亟命撤去進常膳如平生既而曰古禮亦不可廢也命復設之於是判太常寺和峴言按唐天寶中享太廟禮器外每室加常食一牙盤五代以來遂廢其禮今請如唐故事乃詔别設牙盤食禘祫時享皆用之十二月趙普起復乙巳開寶二年唐國吳越漳泉奉正朔南漢大寶十二年北漢廣運二年春二月命曹彬等伐北漢上親征三月圍太原決晉水以灌之從陳承昭之䇿也後又決汾水灌之夏四月契丹分道救北漢何繼筠等敗之初上料契丹必由鎮定入援太原乃使韓重贇倍道兼行赴之又聞契丹兵二道其一自石嶺關入乃驛召繼筠授以方略使往拒之且曰翌日亭午候卿捷書至也繼筠如期果大敗契丹于陽曲重贇亦擊破其衆于定州境五月命諸州恤刑上以暑氣方盛深念縲紲之苦乃詔諸州獄吏五日一檢視灑掃獄户洗滌杻械貧者給食病者給藥小罪即時遣決自是每嵗仲夏必申明是詔閏月詔班師太原圍急郭無為勸北漢主出降漢主不聽或言其反狀明白遂殺之以徇太原城久不下王廷義石漢卿皆力戰死李懷義亦幾斃趙廷翰復願先登急擊上曰汝曹皆我所訓練無不一當百所以備肘腋同休戚也我寧不得太原豈忍使汝曹蹈必死之地乎衆皆感泣再拜會暑雨疾疫太常博士李光贊上言請班師上覽其奏甚喜乃詔班師北漢主籍我所棄軍儲得粟三十萬石茶綵各數萬喪敗罄竭賴此少濟北漢主決城下水水落而城多圮契丹使者見曰王師若知先浸而復涸則并人無遺矣徙太原民萬餘户于山東河南用絳之薛光化之䇿也光化言伐木必先取枝葉今河東外有契丹之助內有人户賦輸恐嵗月間未能下宜于太原及河北山東諸處建城寨扼契丹援兵徙其部內人户於襄鄧諸州以絶其供饋上納之六月加賀惟忠官時知易州上以其捍邊有功遷易州刺史而不易其任仍令兼易定祁等州巡檢使唐主煜使弟從謙來貢見于胙城縣唐水部員外郎查元方掌從謙箋奏上命知制誥盧多遜燕從謙于館多遜奕棋次謂元方曰江南竟如何元方斂衽對曰江南事大朝十餘年極盡藩臣之禮不知其他多遜愧謝曰孰謂江南無人去嵗唐主納周氏為后昭惠后之妹也美姿容以姻戚往來先得幸于唐主昭惠既殂嘗出入禁中至是納以為后其與燕羣臣韓熙載等皆賦詩以風唐主亦不之譴也初議婚禮詔中書令徐鉉知制誥潘佑與禮官參定婚禮古不用樂佑以為古今不相沿襲固請用樂又按禮房中樂無鐘鼓佑謂鉉曰窈窕淑女鐘鼓樂之此非房中樂而何后初見帝北齊禮有后先拜後起帝後拜先起之文蓋冠禮所謂母答子拜者也鉉以為夫婦人倫之本所以承宗祖主祭祀請答拜佑以為王者婚禮不與庶人同請不答拜又車服之制多所駁異議久不決唐主命徐遊詳其是非時佑方有寵遊希旨奏用佑議尋病疽鉉戲謂人曰周孔亦能祟乎唐主既納周后頗留情樂府監察御史張憲上疏其略曰大展教坊廣開第宅下條制則教人亷隅處宫苑則多方竒巧唐主奬諭賜帛然終不能改上至自太原車駕之次鎮州也幸道士蘇登房問以養生之術對曰臣養生不過精思鍊氣耳帝王養生則異是老子我無為而民自化我無欲而民自立無為無欲怡神太和昔黃帝唐堯享國永年用此道也上悅厚賜之秋九月初收印契錢令民典賣田宅限兩月輸錢印契以段思恭知靈州靈武馮繼業舉族來朝上徙繼業領靜難以考功郎中段思恭代之仍詔之曰繼業言靈州非蕃帥主之戎人不服雖衛霍名將必見逐矣意謂非我他人不能治也思恭至鎮夷民安之初鼎澧辰沅邵五州蠻洞數為邊患上既平荆湖選蠻酋秦再雄知辰州使自辟吏屬盡與一州租稅再雄盡瘁撫綏一方以寧冬十月鳳翔王彥超等罷節鎮用趙普之謀也上宴藩臣于後苑酒酣從容詔之曰卿等皆國宿舊久臨劇鎮王事鞅掌非朕所以優賢之意也彥超喻上旨即自陳請老于是及武行德郭從義白重贊楊廷璋五人皆罷置豐州契丹酋長王甲來降置豐州以處之未幾甲卒以其子承美知州給西川等路舉人劵山南荆湖等路往還給劵十一月以李昉盧多遜直學士院是嵗契丹弒其主舒嚕伯父之子明紀立舒嚕性嚴急會醉索食不得欲斬庖人庖人因進食挾刃弒之舒嚕立凡十九年諡穆宗號大順皇帝無子諸部迎立天授皇帝烏雲之子明紀號天贊皇帝更名賢改元保寧以髙勳守政事令封秦王蕭守興為尚書令封魏王每朝必命坐議國事納守興女雅雅為皇后初烏雲與妻同日遇害明紀年九嵗有以氊束之藏于積薪中由是得免及即位嬰風疾國事皆雅雅決之太平興國四年明紀改元乾亨庚午開寶三年唐國吳越漳泉奉正朔南漢大寶十三年北漢廣運三年春正月修河堤詔舉孝悌德行諸州滿五千户聽舉一人竒才異行不限此數三月賜貢士纍舉人出身初詔禮部貢院閲貢士及諸例十五舉以上終場者具名以聞至是籍列司馬浦等一百六人並賜本科出身此初行特奏名恩例也召處士王昭素對昭素酸棗人也少篤學有志行上聞其名召見便殿時年已七十餘上問曰何以不仕致相見之晚昭素謝不能上令講乾卦至九五飛龍在天則斂容曰此爻正當陛下今日之事引援證據因示風諫微旨上甚悅訪以民事昭素所言誠實無隱上益嘉之又問治世養身之術昭素曰治世莫若愛民養身莫若寡欲上愛其語嘗書屏几間留月餘數求歸乃命以國子博士致仕年八十九乃卒于家夏四月辛卯朔日有食之除河北鹽禁任商旅貿易收其征五月置便錢務上取唐朝飛錢故事許民入錢于左藏庫以諸州錢給之至是始置務于京師令入錢者即日輦致而受劵于左藏庫仍詔諸州候劵至即給之秋七月省州縣官增其俸八月加李謙溥官謙溥為刺史在隰州十年敵人不敢犯其境上令加團練使部將劉進者勇力絶人謙溥待之甚厚得其死力北漢乃為蠟彈書以間之謙溥請以舉家四十口保其無他上釋之令自效九月命潘美伐南漢初上聞南漢主劉鋹奢侈殘酷曰吾當救此一方之民然猶未欲遽加以兵乃命唐主諭之竟不聼囚其使者上始決意討之美進拔富州賀州昭州桂州所至克捷以次下連州韶州雄州美州修前代帝王陵初詔諸道檢校厯代帝王陵寢至是西京鳳翔及雄耀等州奏周文成康三王秦始皇漢髙祖文景武元成哀七帝後魏孝文西魏文帝後周太祖文帝唐髙祖太宗肅代德順文武宣懿僖昭十二宗凡二十七陵并曾經開發詔每帝製造禮衣一副常服一襲具棺椁重葬仍令各處長令致祭冬十一月減冶金額上覽桂陽軍嵗入白金數曰山澤之利雖多頗聞採納不易詔減舊額三分之一契丹入冦田欽祚敗之初契丹六萬騎冦定州欽祚領兵三千禦之上謂欽祚曰彼衆我寡但背城列陳以待之敵至即戰勿與迫逐欽祚與敵戰蒲城敵騎小却乘勝至遂城敵圍之數日欽祚度城中糧少整兵開南門突圍一角出是夕至保塞軍中不亡一矢北邊傳言三千打六萬捷奏至上喜謂左右曰敵數犯邊我以二十匹絹購一敵人首其精兵不過十萬人止費我二百萬匹絹則敵盡矣自是益修邊備十二月修河堤辛未開寶四年是嵗南漢平唐國吳越漳泉奉正朔北漢廣運四年春二月潘美克廣州劉鋹降南漢平鋹先遣使乞降美因諭以上意以為彼若能戰則與之戰不能戰則勸之守不能守則諭之降不降則死不能死則亡非此五者不得受使者泣即部送赴闕未幾鋹復遣其弟保興率衆拒戰鋹衆十五萬阻山谷堅壁以待美用火攻大破之遂至廣州鋹出降美承制釋之有閹人五百餘輩盛服請見悉命斬之凡得州六十縣二百四十户十七萬詔特放選以州縣闕多員少故也仍聽超折注擬夏四月以潘美尹崇琦同知廣州美討平諸為亂者嶺表遂安𣙜嶺南鹽弛酒麯禁詔除嶺南苛政堆鹽許官賣以佐州縣之費五月獻南漢俘初議其禮朝臣莫能知乃遣使問吏部尚書致仕張昭昭卧病口占以授使者遂用之上責賜鋹酒鋹疑不敢飲捧杯乞貸死上笑曰朕推赤心置人腹安有此事取其酒自飲别酌以賜鋹上責鋹反覆及焚府庫之罪鋹歸咎龔澄樞李托等詔誅之而釋鋹尋封鋹恩赦侯六月置廣州市舶司命知州兼之秋七月劉溫叟卒溫叟為中丞十二年上難其代終不許解職溫叟重厚方正好執禮事繼母孝皇弟開封尹光義嘗送錢五百千遺之溫叟不敢却受而封之及卒上曰必得純厚如溫叟者乃可遂命邊光範兼判御史臺事居半嵗始為中丞初上以亡蜀故相歐陽炯為翰林學士炯性坦平無檢束雅善長笛上聞召至便殿奏曲溫叟叩殿門求見諌曰禁署之職典司誥命不可作伶人事上曰朕頃聞孟昶君臣溺于聲樂炯至宰相尚習此技故為我擒所以召炯欲驗之耳溫叟謝曰臣愚不識陛下鑒戒之微旨自是亦不復召炯矣溫叟一日晚歸過明德門西闕前上方與中黃門數人登樓溫叟知之令傳呼依常而過翌日請對且言人主非時登樓則下必希望恩賞臣所以呼導而過故示衆以陛下非時不登樓也上善之減廣南租耗米初劉鋹私制大量重斂于民每石凡輸一石八斗運使王明上言乃革之每石輸耗二升是年右補闕梁周翰上疏請寬民力其略曰西蜀淮南荆潭桂廣之地皆已為王土陛下誠能以三方所得之利減諸道租賦之入則德澤均而民力寬矣上嘉納其言初上以周翰有文辭欲用為知制誥周翰知之遽上表謝上不悅其命遂寢八月詔却尊號羣臣請加興化成功答曰豫雖以興化為心未能力致倘便以成功自大實所難安表再上訖不允冬十月癸亥朔日有食之十一月唐主煜使弟從善來貢乞去唐號改印文為江南國主乞賜詔呼名從之先是唐以銀五萬兩遺宰相趙普普告于上上令受之普辭讓上曰大國之體不可自為削弱當使之弗測及從善入貢常賜外密賚白金如遺普之數江南君臣聞之皆駭服上欲經理江南遂留從善不遣未幾加從善泰寧節度煜聞之大懼始損制度下令稱教改中書門下為左右內史府尚書省為司會府御史臺為司憲府翰林為修文館樞密院為光政院從善從鎰從謙皆降封國公上使從善致書風煜入朝不從但增嵗貢朝廷忌唐南都留守林仁肇威名用計間之唐殺仁肇吳越王俶使子惟濬來貢上嘗幸趙普第時吳越方遣使遺普書及海物十瓶上命啓之則滿貯皆瓜子黃金也普惶恐謝曰臣未發書實不知上笑曰彼謂國家事皆汝書生耶因命普謝而受之癸未郊初用繡衣鹵簿大赦廢川班內殿直初上擇蜀兵百餘輩為川班內殿直廪給與御馬直等至是郊禮行賞上以御馬直扈從時命增給川班內殿直援例擊登聞鼓陳乞上怒曰朕之所與即為恩澤又安有例哉命斬其妄訴者四十餘人餘悉配𨽻諸軍遂廢其班時內臣有李承進者逮事後唐上問曰莊宗以英武定中原享國不久何也承進曰莊宗好畋獵務姑息每出次近郊禁兵衛卒必控馬首希求恩賞即隨其所欲給之蓋威令不行賞賚無節因以兆亂上撫髀歎曰二十年夾河戰爭取得天下不能用軍法約束此輩縱其無厭之求以茲臨御誠為兒戲朕今撫養士卒固不吝惜爵賞茍犯吾法惟有劍耳河決澶州東滙于鄆濮壞民田廬上怒官吏不即以聞通判姚恕坐棄市知州杜審肇免官恕初為開封判官謁趙普閽者不即為通恕怒而去普亟使人謝焉恕不反普由是憾之後竟坐法誅投其尸于河人謂恕罪不至此蓋普報私怨耳壬申開寶五年江南吳越漳泉奉正朔北漢廣運五年春二月制放取士榜初嵗取進士不過十數人知貢舉奏合格人姓名而已至是禮部試列進士安守亮等十一人及諸科十七人上召對講武殿始下制放榜新制也夏四月大水遣使分視民田省嶺南郡縣五月廢媚川都先是劉鋹于海門鎮募兵能探珠者三十人號媚川都嵗溺死者甚衆鋹所居皆飾以玳瑁珠翠至是詔罷之河大決濮陽未幾又決朝城決陽武汴水亦決大霖雨出宫人六月塞河決命曾翰董其役上詔翰曰霖雨不止又聞河決朕信宿以來焚香上禱于天若天災流行願在朕躬勿施于民又嘗語宰相曰霖雨不止朕日夜焦勞罔知所措得非時政有闕使之然耶趙普謝曰陛下憂勤庶務若雨為災乃是臣等失職上曰朕久思之恐掖庭幽閉者衆昨遣百五十餘人歸其家禁鋪翠皇女承慶公主嘗衣鋪翠襦入宫上謂主曰汝當以此與我自今不復為此飾主笑曰此所用翠羽幾何上曰不然主家服此宫闈戚里必相效京城翠羽價髙小民逐利展轉販易傷生浸廣實汝之由主慙謝主又嘗因侍坐與皇后因言曰官家作天子日久豈不能用黃金裝肩輿乘以出入上笑曰我以四海之富宫殿悉以金銀為飾力亦可辦但念我為天下守財耳豈可妄用古稱以一人治天下不以天下奉一人茍以自奉養為意使天下之人何仰哉秋八月廣南獠賊反遣內臣李神佑督戰平之嶺南初下所在盜起濵海為亂尹崇琦擊之上遣神祐督戰未幾盡平其黨內臣督戰始此以李符為京西轉運符先知歸州轉運司制置有不便者符即上言上嘉之至是上以京西諸州錢幣不登故任之上書李符到處似朕親行八字賜之符前後條奏便宜凡百餘條其四十八事皆施行著于令九月乙巳朔日有食之李崇矩罷崇矩與趙普厚相交結以其女妻普子承宗上聞之不悅先是宰相以樞密使候對同止廬中上始令分異之有鄭伸者客崇矩門下僅十年崇矩知其無行待之漸薄伸乃誣告崇矩受舉人金為私託知舉扈蒙引劉審瓊為證審瓊對上言其誣上怒稍解崇矩遂罷賜伸同進士出身為酸棗縣主簿後伸死其母貧餓詣崇矩子繼昌乞丐家人競前詬逐繼昌獨召見與金時人稱其長者更漕運法先是三司言倉儲月給只及明年二月請分屯諸軍盡率民船以資江淮漕運上大怒切責三司楚昭輔以為不素計度茍有所闕必罪爾以謝衆昭輔惶懼詣皇弟光義泣告乞于上前解釋稍寬其罪使得盡力光義以問牙將陳從信對曰從信常遊楚泗間見糧運停阻之由良以舟人日食必于所厯州縣勘給故多留滯若自起發即計日併支必可以責其程限又楚泗間運米入船至京師輦米入倉宜各宿備運卒令即時出納如此每運可減數十日楚泗至京千里舊定八十日一軍一嵗三運今去其淹留之虛日則嵗可增一運矣又聞三司欲籍民船若不許則無以責辦若盡取用之則冬中京師薪炭殆絶不若募其船之堅實者令運糧其損敗者任民載樵薪則公私俱濟又言市中米貴官乃定價斗錢七十商賈以其不獲利而不至富家亦復閉糴光義然之具以告上悉從其言由是蔡汴兩河漕江淮米十萬至京師倉儲無乏昭輔亦免責焉汴河及黃河惠民河廣濟河嵗運粟共止二百五十萬石張治因為上言汴水疏鑿之由曰惠民金水五丈汴水等四渠派引脈分會于天邑舳艫相接贍足京師以無匱乏大飢冬十一月命參政薛居正等提點諸路水陸轉運使事居正兼提點三司淮南湖南嶺南吕餘慶兼提點三司荆南劍南是嵗嚴階級法詔諸禁軍將校有帶邊郡者許以客禮見自餘廂都指揮使至員寮各依職次一階一級全歸伏事之儀癸酉開寶六年江南吳越漳泉奉正朔北漢廣運六年春正月修河隄二月賑曹州飢運京師米二萬石以賑之三月周鄭王殂于房州上發哀輟視朝十日命還葬慶陵之側曰順陵諡曰恭帝初御殿親試舉人李昉知舉取宋準等十一人上以進士武濟川三傳劉睿材質最陋詘去之濟川者昉鄉人也上頗不悅會有人訴昉用情取人上乃令籍終場下第人姓名得三百六十八皆召見擇其一百九十五人并準以下乃御講武殿各賜紙札别試詩賦命殿中侍御史李瑩等為考官得進士二十六人五經四人開元禮七人三禮三十八人三傳二十六人三史三人學究十八人明法五人皆賜及第又賜錢二十萬以張宴會尋昉等皆坐責自茲殿試遂為常式夏四月限度僧法諸州僧不及百人者每嵗許度一人行開寶通禮初御史中丞劉溫叟等上開寶通禮二百卷至是翰林學士盧多遜等上開寶通禮儀纂一百卷詔付有司施行改鄉貢開元禮為開寶通禮並以新書試問盧多遜使江南及還艤舟宣化口遣白其國主曰朝廷重修天下圖經獨闕江東諸州願各求一本于是江南之十九州地理之逺近户口多寡多遜盡得之歸言江南可取狀上嘉其謀始有意用之是嵗江南主殺其臣潘佑李平佑為內史舍人平為户部侍郎最相親善佑嘗言于國主曰富國之本在厚農桑因請復井田之法深抑兼并有買貧者田皆令歸之又依周禮造民籍造牛籍使盡闢曠土以種桑薦平判司農寺以督之符命行下急于星火百姓大擾國主遂詔罷之佑疑執政沮已乃厯詆大臣請誅宰相湯悅等數十人又抗疏斥國主以為不及桀紂孫皓國主大怒使按治之皆自殺佑初與張洎為忘形之交其後俱為中書舍人稍相傾軋佑之死洎頗有力焉洎時為清輝殿學士參預機密恩寵莫比清輝殿在苑中國主不欲洎逺離左右故授此職洎與臨汝郡公徐遼義安郡公徐遊别居澄心堂密札中旨多自澄心堂出遊從子元楀等出入宣行之中書密院乃同散地嚴堂後官選上知堂後官擅權多為姦贓欲更用士人命選令録簿尉充之而有司所選終不及數乃召舊任者四人面加勸勵令復故五月以馮炳判御史臺上留意聽斷專事欽恤御史大理官屬尤加選擇嘗召炳謂曰朕每讀漢書見張釋之于定國治獄天下無寃民此所望于汝也賜金紫以勉之京城左右軍巡院典司按鞫舊選牙校任之上哀矜庶獄至是改用士人又改諸州馬步院為司冦院以新及第人為司冦參軍太宗太平興國五年改司冦參軍為司理參軍令選厯任清白能折獄者為之秩滿免選赴年尋又詔諸州察其不職者以名聞蔽匿不舉者罪之授交趾丁璉靜海節度初交趾吳昌文世受南漢爵命為靜海節度使安南都護乾德初昌文死其參謀吳處玶與諸將爭立攝歡州刺史丁部領與其子璉統兵三萬破處玶等自領交州境內以安其民德之乃推部領為帥號萬勝王私署其子璉為節度使部領立三年璉襲父位至是七年矣聞上平定嶺南懼而上表求內附詔以璉為靜海軍節度使安南都護及八年秋封璉父部領交趾王六月御便殿閲試吏召見百司吏七百餘人親加閲試敕歸農者四百餘人減西川折帛價初蜀民所輸兩稅皆以匹帛折充其後市價愈髙而官所收止依舊例上慮其傷民詔準市價令宰執同議政更知印押班秋七月以辛仲甫為三司户部判官賜錢百萬初上問趙普曰儒臣有武幹者何人普以知彭州辛仲甫對上因謂普曰五代方鎮殘虐民受其禍朕今選儒臣才幹者百餘分治大藩縱皆貪濁亦不及武臣一人也至是用為三司時三司吏三十餘輩通嵗課三十餘萬緡連年械繫死者數人終無所償仲甫奏除之又請百官折俸令給實直初上以仲甫知彭州謂之曰蜀土始平怙侈之俗未革爾有文武才幹是用命爾仲甫既至州兵誘屯戍軍謀以長春節宴集日作亂仲甫初未之覺因出近郊見壕中草深恐藏伏姦慝悉命燒剃之其黨懼謀泄遂有告者禽百餘人悉就戮八月趙普罷領河陽三城節度使同平章事先是有劉偉者雖經攝一任而失其解由偽造印得送銓又乾德中趙孚授西川官稱疾不之任雷德驤之子有鄰上章言皆普庇之悉下御史獄鞫實上始有疑普意詔參知政事吕餘慶薛居正升政事堂與宰相同議政事未幾又詔與普更知印押班奏事以分其權至是罷相普獨相二十年沈毅果斷以天下為己任上倚信之嘗欲除其人為某官上不用明日又奏之上怒裂其奏普徐拾奏歸補綴以進上悟乃可其奏後果以稱職聞又有立功當遷官者上素嫌其為人不與普力請之上曰朕故不與遷官奈何普曰刑賞天下之刑賞陛下安得以私喜怒專之上不聽起普隨之上入宫普立于宫門良久不去上卒從之普常設大瓦壺于閣中凡表疏意不可者投諸壺焚之其多得謗咎殆由此九月吕餘慶罷以疾解職遷尚書左丞餘慶上霸府元僚趙普李處耘先進用餘慶恬然不以介意及處耘與普得罪餘慶悉為明辨時稱長者光義封晉王以薛居正沈義倫同平章事冬十二月頒循資格盧多遜等重修自是銓選有倫矣甲戌開寶七年吳越漳泉奉正朔江南只稱甲戌北漢廣運七年春二月庚辰朔日有食之夏四月遣使按廣南民田賈黃中亷直平恕逺人便之使還奏利害數十事皆稱旨秋九月命曹彬伐江南初上命有司造大第號禮賢宅以待李煜及錢俶先來朝者賜之乃相繼遣梁迎李穆使江南諭旨令煜入朝煜辭疾不至而繕守備乃命彬及潘美等伐之上謂彬曰南方之事一以委卿切勿暴掠生民務廣威信使自歸順不須急擊也且以匣劒授彬曰副將而下不用命者斬之諸將皆失色自王全斌平蜀多殺人上每恨之彬性仁厚故專任焉仍命吳越王錢俶出兵夾攻之彬尋克池州俶克常州初江南人樊若水舉進士不第上書言事不報乃釣魚采石江上以繩度江廣狹詣闕陳取江南䇿上令學士召試賜及第遣使往荆南如若水之䇿造大艦為浮梁以濟師冬閏十月江南主煜使弟從鎰來貢上留之不遣及江南捷書纍至羣臣入賀從鎰奉表請罪上嘉其得禮命李穆送從鎰歸其國手詔之促國主來降且令諸將緩攻以待之初命輔臣專記時政史館修撰扈蒙上言昔唐太宗每開延英召大臣論事必命起居郎舍人執筆立殿側以記時政故太宗實録今最詳備後唐明宗亦命端明殿學士及樞密直學士輪修日厯送史館近來每季雖有內庭日厯樞密院録送史館然所記者不過對見辭謝而已自今凡有裁制之事優恤之言發自宸衷可書簡䇿者并委寄臣及參知政事每月輪知抄録送史館以撰日厯詔從之命盧多遜專其職十一月契丹請和契丹邊臣貽知雄州孫全興書言狀全興以聞上命全興答書許之是嵗占城大食國來貢占城在中國西南與雲南真臘為鄰其風俗與大食同前世不與中國通周顯德中始遣使朝貢自後遂以為常大食波斯之别種也大厯中有波斯胡糾合亡命渡常曷水劫奪商旅其衆漸盛割據波斯之西境自立為王大食其王之氏也乙亥開寶八年是嵗江南平吳越漳泉奉正朔北漢廣運八年春正月曹彬圍金陵彬遣田欽祚敗江南軍于溧水斬其統軍張雄等十七人初李景之割江也雄為江南義軍首領拒周有功厯袁汀二州刺史至是為統軍使戒諸子曰吾必死于國難爾曹其勉之是役也雄父子八人偕死不同行者亦沒于他陳彬遂進圍金陵江南朱令贇自湖口以衆入援號十萬順流而下將焚采石浮梁王明率所部屯獨樹口遣其子馳入奏且請增造戰船以襲令贇上曰此非救急之䇿也令贇朝夕至金陵之圍解矣乃密遣使令明於州浦間多立長木若帆檣之狀令贇望見疑有伏即稍逗遛時江水淺涸不利行舟令贇獨乘大航建大將旌旗至皖口步軍都指揮使劉遇急擊之令贇縱火拒戰會北風甚火反及之其衆大潰遂生擒令贇等金陵獨恃此援于是孤城愈危蹙矣王師初起江南以京口要害當選良將以守劉澄舊事藩邸國主尤親任之乃擢為潤州留後澄至鎮無鬭志吳越兵初至營壘未成左右請出兵攻之澄不從聞金陵圍急遂以城降二月親試舉人時王祐權知貢舉扈蒙梁周翰雷德驤並權同知同知貢舉始此上引王祐所奏合格舉人因語之曰向者登科名級多為勢家所取今朕躬親臨試盡革疇昔之弊於是出詩賦題覆試得王嗣宗等三十一人嗣宗初受秦州司冦參軍契丹來聘夏四月衛德仁遷太樂署令教坊使衛德仁以老求外官且援同光故事乞領郡上曰用伶人為刺史此莊宗失政豈可效之耶宰相擬上州司馬上曰上佐乃士人所處資望甚優亦不可輕授此輩但當于樂部遷轉耳六月河決頓丘命塞之彗出栁長四丈晨見東方西南指厯輿鬼距東壁九十一舍八十三日乃滅秋七月辛未朔日有食之初通使契丹九月畋近郊上因逐兔馬蹶而墜自是不復獵矣冬十月修西京宫闕始謀西幸也十一月曹彬克金陵李煜降江南平得州十九軍三縣一百有八户六十五萬五千初李從鎰至江南諭上旨李煜欲降陳喬張洎廣陳符命以為金陵之固易守難攻北軍旦夕當自退矣煜疑而止李穆既還上復命諸將進兵及潤州平外圍愈急始遣徐鉉入貢求緩兵大臣言鉉博學有才辨宜有以待之上笑曰苐去非爾所知既而鉉至言煜以小事大如子事父其説纍數百言上徐謂曰爾謂父子為兩家可乎鉉不能對鉉還尋復入奏言江南無罪辭氣益厲上怒按劍謂鉉曰不須多言江南亦有何罪但天下一家卧榻之側豈容他人鼾睡乎鉉惶恐而退先是彬等列三寨上曰此宜保溝自固南人必以夜來冦命使亟還語彬等併力速成之不然將為所乘賜使者食且詔樞密使楚昭輔草詔使食畢即行彬等承命自督丁夫掘塹塹成江南人果夜出兵襲北寨彬等縱其至乃徐擊之皆殱焉初金陵被圍自春徂冬勢愈窮蹙上因使者諭彬以勿傷城中人若猶困鬭李煜一門切無加害於是彬終欲降之故每緩攻纍遣人告李煜曰某月某日城必破宜早為之所不聽一日彬忽稱疾不視事諸將來問疾彬曰諸公若共為信誓破城日不妄殺一人則彬之疾愈矣諸將皆許諾遂相焚香約誓彬乃稱疾愈翌日城陷彬整軍至于宫城李煜奉表納降與其羣臣迎拜于門彬安慰之申嚴禁暴之令士大夫皆賴彬保全倉廪府庫委轉運使按籍檢視一無所問及還舟中惟圖籍衣衾而已捷書至羣臣入賀上泣謂左右曰宇縣分割民受其禍思布聲教以撫養之攻城之際必有橫罹鋒刃者此實可哀也即詔出米十萬石賑城中飢民曹彬遣使送李煜至闕有司議獻俘之禮如劉鋹上曰煜嘗奉正朔非鋹比也乃封煜為違命侯而録用其子弟大臣召見徐鉉責以不早勸煜歸朝聲色甚厲鉉對曰臣為江南大臣而國滅亡罪固當死不當問其他上曰忠臣也事我如事李氏賜坐撫慰之又責張洎曰汝教李煜不降使至今日因出帛書示之乃王師圍城洎所草召江上救兵蠟彈書也洎頓首請死曰書臣之所為然犬吠非其主此其一爾他尚多今得死臣之分也辭色不變上欲殺洎及是竒之謂曰卿大有膽朕不罪卿今事我無替即爾之忠也以鉉為太子率更洎為太子中允鉉質直無矯飾故人子弟及親族之孤貧者來依鉉鉉必分俸開館以納之初洎在江南與陳喬同建不降之䇿及事急又相要以同死社稷然洎實無死志入見國主喬引咎自殺洎乃曰臣當俱死但今陛下入朝誰與辨明此事所以不死者將有所待也江南將髙彥馬承信及弟承俊俱率數百人力戰而死勤政殿學士鍾倩朝服坐于家兵及門舉族死之初江南主以徐元楀刁衎為內殿傳詔邊書告急元楀等匿之北軍屯城南十餘里江南主猶不知也初升州既破曹彬命李煜手書告諭統內州縣皆以城降江州刺史謝彥賓集衆謀納欵指揮使胡則謂其下曰吾屬世受李氏恩安可負之刺史不忠欲背國爾曹能從我乎衆皆聽命乃與同列宋德明等攻彥賓彥賓逃簷霤中執而殺之據府第號令驅迫丁壯日夜守禦曹翰圍之屢遣使招諭則不從城陷翰責之數其拒命之罪對曰犬吠非其主公何怪也翰腰斬之并殺宋德明初上命右補闕張霽知江州與翰偕來既入城兵掠民家家訴于霽霽按誅翰兵翰以江民拒守又忿其訴發怒屠城死者數萬人投尸井坎既滿餘棄江中先是上聞江州垂破遣使持詔諭翰毋殺戮使者至獨樹浦值大風不能渡至既屠矣民家財貨巨萬翰悉取之置渭州保毅軍周廣順中點秦州稅户充保毅軍是嵗發渭州平涼潘原二縣民治城濠因置保毅弓箭手分鎮城寨能自置馬者免役逃死者以親屬代焉蓋因廣順之制即所謂義軍也咸平五年始置營辨為禁軍丙子開寶九年吳越漳泉奉正朔北漢廣運九年春二月詔却尊號初請加一統太平以燕晉未平不許以曹彬為樞密使領忠武節度以山南東道節度潘美領宣徽北院使賞平江南之功也樞密領節度節度領宣徽自彬美始彬歸自江南詣閣門進榜子云奉敕差往江南勾當公事回時人多其不伐初彬之行上許彬以使相為賞及還語彬曰姑徐之更為我取太原因密賜錢五十萬彬退而歎曰好官亦不過多得錢耳何必使相也凡以檢校官兼中書令侍中同平章事者並謂之使相唐制皆署敕五代以來不預政事朝會親王則分班餘官則綴本官班正衙見謝則押班凡定制除受者敕尾存其銜而不署側注使字吳越王俶來朝命居禮賢宅寵賚甚厚俶辭歸國上賜以一黃袱封緘甚固曰途中宜密視及啓之皆羣臣乞留俶奏疏也俶益感懼加作坊使魏丕官加代州刺史仍典作坊時京師有作坊諸州有作坊皆有常課作坊所造兵器每旬一進上必親閲之列五庫以貯焉尋又分作坊為南北别置弓弩院初上即位嘗召丕謂曰作坊積弊爾為我修整之即授作坊副使丕在職甚盡力居八年乃遷正使凡有征討者先期諭旨令治兵器無不精辦舊床子弩射止七百步丕增造射至千步三月上如西京詣安陵夏四月庚子郊大赦都民垂白者相謂曰我輩少經亂離不圖今日復睹太平天子儀衛有泣下者上至自西京上生于洛陽樂其風土意欲留居之起居郎李符上書陳八難晉王亦言非便上曰遷河南未已久當遷長安晉王叩頭切諫上曰吾將西遷者無他欲據山河之勝而去冗兵耳因謂左右曰晉王之言固善今姑從之百年天下民力殫矣秋八月命黨進等伐北漢以楚昭輔王仁瞻分領宣徽南北院昭輔時為樞密副使王仁瞻判三司自後宣徽使闕即命樞密使副兼領院事冬十月癸丑上崩于萬嵗殿上年五十在位十七年諡曰英武聖文神德廟號太祖上仁孝豁達有大度陳橋之變迫于衆心自入京師市不易肆惟王彥升專殺韓通雖以佐命不加誅而終身不與旌鉞專務抑奪諸侯愛養民力常衣浣濯之衣寢殿青布緣葦簾皇弟光義言服用太朴素上正色曰爾不記居夾馬營中時耶自五代以來藩鎮強盛每移鎮受代皆先命近臣諭旨仍發兵備之尚或不奉詔上之受禪也異姓封王及帶相印者猶不下數十人上漸削其權專命儒臣分理郡國自是諸侯勢輕禍難不作矣晚節好讀書嘗歎曰堯舜之世四凶之罪止從投竄何近代法網之密耶然好弋獵開寶中狩于近郊嘗逐走兔馬蹶而墜因引佩刀刺馬殺之既而悔曰吾為天下主而輕事畋遊非馬之罪也自是不復獵元年有州一百一十一户九十六萬末年有州二百九十七户二百五十萬晉王性仁孝上雅鍾愛之尹京十五年庶務修舉上數幸其府恩禮甚厚嘗疾病殆不知人上亟往視親為灼艾王覺痛上亦取艾自灸自辰至酉王汗洽蘇息上乃還疾良愈復往視之賜以龍鳳氊褥又嘗宴宫中王醉不能乘馬上起送至殿階親掖之間謂近臣曰晉王龍行虎步且生時有異必為太平天子福德吾不及也至是上不豫壬子夜召晉王屬以後事其言左右皆不得聞但遙見燭影下晉王離席若有遜避之狀既而上引柱斧戳地大聲曰好為之癸丑上崩時夜漏四鼓或云宋皇后使王繼恩召皇子德芳繼恩徑召晉王后見晉王愕然遽呼曰吾母子之命皆托于官家晉王曰共保富貴莫憂也甲寅皇弟晉王即皇帝位尋改名炅大赦以皇弟廷美為開封尹封齊王皇子德昭封郡王德芳節度使德昭德芳太祖子也上友愛尤篤不欲其與上諸子異稱詔與王石魏氏三公主皆依舊稱皇子皇女以薛居正沈義倫為左右僕射盧多遜中書侍郎並同章事曹彬同平章事李漢超郭進加觀察使漢超在徐州十七年為政簡易吏民信愛嘗詣闕請立碑頌德詔太子率更令徐鉉為之文與士卒絶甘分少及其死軍中皆流涕進守西山凡二十年少貧賤無賴依巨鹿富人家富人子欲殺之其婦竺氏潛以告進得免及為邢州郡使訪竺氏婦時已死家甚困得其女撫養之如己子及長擇良配嫁焉在洛州日城四面悉令種栁壕中雜植荷芰蒲葦後益繁茂州人見之有泣下者曰此郭公所種也禁增場務課詔場務不聽商人添額買十一月罷奉户追册尹氏淑德皇后符氏懿德皇后令轉運以三科察舉政績尤異為上恪居官次職務粗治為中臨事弛慢所蒞無狀為下嵗終以聞以張洎直舍人院直舍人院始此十二月大赦改太平興國元年置三司副使以賈琰為之三司置副使始此是嵗髙麗王昭死弟胄立九朝編年備要卷二
