body:
  text: 九朝編年備要卷十七宋陳均撰英宗皇帝起甲辰治平元年止丁未治平四年甲辰治平元年春三月以少卿監𨽻審官院雨土出宮人夏五月濬三股五股河太后徹簾上既康復韓琦久欲太后罷垂簾嘗一日取十餘事稟上上裁決悉當琦即詣東殿覆奏太后每事稱善琦因白太后求去太后曰相公安可求退老身合居深宫每日在此甚非得已琦即稱前代如馬鄧之賢不免貪戀權勢今太后能復辟誠馬鄧所不及審決以何日徹簾太后遽起琦即厲聲命儀鸞使徹簾簾既落猶於殿屛後微見太后衣尋上太后宫名曰慈夀先是司馬光言陛下昔在藩邸事濮王承順顔色備盡孝道凡宫中事濮王皆委陛下幹之無不平允陛下事太后當一如濮王然後可視天下之政當一如宫中之事然後可濮王之親以恩皇太后之親以義其奉養之謹非特有所加則無以取信也宫中之事小天下之事大其聽斷之勤非特有所加則無以致治也吕誨亦言陛下孝養之禮臣不得而知之安親之道誠有未至何則纍聖成業靡思經緝邦國大事都無裁處獻納之言盡決於簾帷之下是陛下自處休逸而遺聖后以煩勞虧損聖德莫斯為甚又言於太后曰皇帝躬親治道勤勵為民在於聖慮宜於慰安臣愚以為東殿簾帷宜五七日一御尋以定䇿勳進輔臣官富弼辭曰臣聞制辭取嘉祐中嘗議建儲推恩此特絲髮之微勞何足嘉賞今陛下録臣先帝時微勞而仁宗皇太后於陛下有天地之恩尚未聞所以為報可謂倒置不思之甚再奏卒不聽弼乃受閏月以唐介為御史中丞上諭介曰卿在先朝有直聲今出自朕選非由左右言也六月皇子頊封潁王初王封淮陽郡王出閣辭兩宫悲泣不自勝太后亦泣慰諭遣之自是日再入朝仁宗之葬及虞於郊王見百官班道左下馬望齋宫却蓋步進觀者歎息王性謙虛眷禮官僚遇記室韓維尤厚一日維侍王坐內侍以弓樣靴進維曰王安用舞靴王令毁去又嘗諫王曰上已失太后心王宜孝恭以彌縫王感悟太后曰皇子近日殊有禮增置宗室學官時睦親宅廣親宅宗室自率府副率以上八百餘人其奉朝請者四百餘人而教學之官六員而已於是增置講書四員教授五員小學教授十二員並舊六員為二十七員以分教之仍賜詔戒勉之初宗室坐序爵仍自為賓主講官坐主席之東隅於是睦宗院都講吳申不肯坐移書大宗正謂宗室當以親族尊卑為序與講官分賓主大宗正不能決因內朝出申二書上是之宗室正講席自申始尋增置同知大宗正事一員以宗惠為之上在藩邸頗賢宗惠故擢用焉諸路大水命監司分詣水災州軍存恤未幾又詔水災諸路帥臣監司督責知通存恤又分官體量南京等路出上供米賑宿亳州飢民秋八月録周後竄內侍任守忠初仁宗未有嗣屬意聖明守忠居中建議欲援立昏弱以邀大利及上即位又醖造語言交鬬兩宫至是司馬光吕誨言之上雖未行一日韓琦出空頭敕一道參政歐陽修已僉趙概難之問修曰何如修曰第書之韓公必自有説琦坐政事堂立守忠庭下曰汝罪當死責蘄州安置取空頭敕填與之即日押行琦意以為少緩則中變也九月復武舉詔日開講筵重陽節當罷講吕公著司馬光言先帝時無事常開講筵近以聖體不安遂於端午及冬至後盛暑盛寒之際權罷數月今陛下初政清明宜親近儒雅講求治術願不惜頃刻之間日御講筵從之夏人寇邉詔遣使詰問冬十月詔明堂奉仁宗配故事冬夏至祀昊天上帝皇地祇以太祖配正月上辛祈穀孟夏雩祀立冬祭神州地祇以太宗配孟夏祀感生帝以宣祖配祭學士王圭等與禮官上議請循周公嚴父之道以仁宗配享明堂知制誥錢公輔獨上議曰以周公言之則嚴父以成王言之則嚴祖是時政則周公祭則成王亦安在乎必嚴其父我將之詩是也我太祖則周之后稷配郊者也太宗則周之文王配明堂者也真宗則周之武王仁宗則周之成王雖有配天之業而無配天之祭未聞成康以嚴父之故廢文王配天之祭而移之也以孔子之心推周公之志則嚴父也以周公之心攝成王之祭則嚴祖也嚴父嚴祖其義一也東漢孝明始建明堂以光武配適符嚴父之説及時異事遷章安二帝亦弗之變此最為近古而合乎禮者也當仁宗初立倘有建是論則配天之祭常在乎太祖太宗矣願詔有司博議使配天之祭不膠於嚴父而嚴父之道不專乎配天詔臺諫講官兩制禮院再詳定學士孫抃等同獻議曰在易先王作樂崇德薦之上帝以配祖考則祖考配帝從來遠矣祖考皆可配帝郊與明堂不可同位不可謂嚴祖嚴父其義一也公輔謂不聞周家廢文配而移於武廢武配而移於成夫六經以簡易立法周家三十六王若代代著嚴父之訓則六經乃記事之日歷爾安在其簡易也故易之配考孝經之嚴父歷代循守今一旦黜宣祖真宗之祀廟而不配而仁宗功德祔廟之始又抑而不得配帝皆非也諫官司馬光吕誨曰孝子之心誰不欲尊其父而聖人之制禮不敢踰也詩曰思文后稷克配彼天又我將祀文王於明堂下此皆不見於經矣前漢以髙祖配天後漢以光武配明堂自非建邦啓土者皆無配天之文故周之成康漢之景明德業雖美而不以配天避祖宗也近世祀明堂皆以其父配上帝此乃誤釋孝經之意景祐中以太祖比周之后稷太宗真宗比周之文武然則以真宗配明堂亦未失古禮仁宗功德雖盛而不在二祧之位議者乃欲舍真宗而以仁宗配祀明堂恐於祭法不合詔從抃等議十一月刺陕西義軍韓琦奏云唐置府兵最為近古今之義勇河北幾十五萬河東幾八萬勇悍純實而有物力資産即唐之府兵也陕西當西事之初亦常三丁選一為弓手其後刺為保捷正軍及夏國納欵朝廷㨂放所存無幾河北河東陕西事同一體今若陕西亦點義勇軍止刺手背不復刺面可無驚駭詔從之命徐億等往除商虢二州不籍餘悉集義勇凡主户家三丁選一六丁選二九丁選三二十至五十材勇者充嵗以十月畨上教閲一月而罷又詔秦州成紀等六縣有買保毅田承名額者悉以為義勇總得十五萬六千人知諫院司馬光言今議者但怪陕西獨無義勇不知陜西之民三丁巳有一丁充保捷矣古者兵出民間民耕桑之所得皆以衣食其家今既斂農民之粟帛以贍軍又籍農民之身以為兵是一家任二家之事也臣愚以為河北河東已刺之民猶當放散况陕西未刺之民乎上不聽光又六奏及申中書自劾求去亦終不許嘗至中書與琦詰難琦無以對竟不為止其後十年義勇運糧戍邉率以為常一如光之言矣復內侍養子令十二月雨土以內臣為陜西諸路鈐轄王昭明等四人令體測軍情治其訴訟有賞罰則與其帥議大事以聞各許歲乘驛奏事諫官吕誨言唐舉兵不利未有不自監軍始者我朝因循未革奈何又增置此員如走馬承受官品至卑已不勝其害今鈐轄重寄其權與安撫使均矣欲乞朝廷罷之精擇帥臣專制閫外之權御史傅堯俞趙瞻皆有論列不從選修起居注官時起居注闕官中書擬集賢校理宋敏求楊繪上問修注選何等人輔臣對近例以制科進士髙等與館職才望者繪進士第二人今當次補上曰修注即知制誥豈可以次補命以韓維易繪與宋敏求並命乙巳治平二年春正月遣使募京畿淮南兵司馬光言邉臣之請兵無窮朝廷之募兵無已倉庫之粟帛有限百姓之膏血有涯臣願斷自聖志罷招禁軍訓練舊有之兵自可備禦二月罷修慶寧宫吕公著言今京畿諸縣及京東西淮南飢饉多有餓殍力役之事皆宜權罷從之司馬光亦言近日修造稍多大凡九百間皇城諸門四邉行廊南薰門之類無不重修役人極衆勞費不少又在京倉廩疏漏甚多未暇修葺粟帛大有損失古者將營宫室宗廟為先廏庫為次居室為後今之所修緩急先後母乃不得其宜乎又言皇子三位所修規模侈大非所以納之於義方應大內裏外屋舍非至切要者乞罷興造蔡襄罷自三司使出知杭州上自濮邸立為皇子近臣中有異議人疑為襄上即位數問襄何如人一日因其請假變色謂中書曰三司事繁襄多在假何不用他人韓琦為救解上意不回襄既請罷琦因質於上上曰內中不見文字在慶寧即已聞之琦曰事出曖昧更乞審察曽公亮歐陽修皆言疑似難明不可以此陷害忠良上曰造謗者因何不及他人遂命襄出以吕公弼代之至和初公弼為三司使上在潛邸以賜馬不善求易之公弼不許至是奏事畢上曰朕往在宫中卿不為朕易馬是時已知卿也又曰卿繼蔡襄為使襄訴訟不能決頗多留事公弼知上不悅襄對曰襄未嘗懈恐言者妄爾上益以公弼為長者先是上以王廣淵直集賢院司馬光言廣淵好奔競善進取在仁宗時私以文獻陛下為忠謹者果如此乎漢衛綰不從太子飲景帝待之過於他臣周張美以錢穀私假世宗世宗薄之陛下於廣淵不治其罪而又賞之何以厲臣節不報王疇薨臨其喪時為樞密副使大風晝晦賜舉人第彭汝礪以下三百六十一人賜及第出身有差三月行明天厯判司天監周琮等所造也琮言崇天厯氣節後天詔范鎮等校定是非新書為密乃賜名明天厯詔翰林王圭序之其後亦不可用琮等皆奪所遷官以吕誨為御史知雜誨以嘗言中丞賈黯辭職黯奏曰御史人主耳目一時公言非有嫌怨且其人方正謹重若得與之共事必能協濟詔以諭誨誨乃受命誨因言朝廷之事臺諫官不得與聞及見行下亟正其失則曰已行之命難於追改是執政常自取勝耳目之官與不設同矣又言近日臣僚建議以為先帝信任臺諫太過欲陛下矯先帝之為凡事堅執不可易行一繆令進一匪人則倡言於外曰出自清衷誰敢動搖是窒塞聖聰恐非福也更宜沈慮已行之事果有不便無憚更張恤朱烈女家越州上虞縣朱回女母早亡養於祖媪年方十歲里中人有與媪競持刀欲殺媪一家驚潰獨朱號呼突前擁救之媪以故得脫朱連被數十刀以死事聞命賜其家米帛其後會稽人為朱立像於曹娥廟以祀之分寧農家女彭氏從父入山伐薪父遇虎女拔刀斫虎奪其父還事聞詔賜粟帛敕州縣歲時存問合淝包繶妻崔氏女也繶樞密拯之子早亡惟一稚子拯夫婦意崔不能守也使左右嘗其心崔蓬垢涕泣出堂下見拯曰生為包氏婦死為包氏鬼誓無他也其後稚子亦卒母吕自荆州來誘而欲嫁其族人因謂曰喪夫守子子死孰守崔曰昔之留也非以子也舅姑故也今舅沒姑老忍舍而去乎呂怒詛罵我寧死此決不獨歸須爾同往也崔泣曰母遠來義不當使母獨往然至荆山倘以不義見迫必絶於尺組之下欲以尸還包氏遂偕去母見誓必死卒還包氏開封民婦朱氏家貧鬻巾屨簮珥以給其夫夫日與俠少飲博不以家為事犯罪將逺徙父母欲奪而嫁之一夕自經死且曰及吾夫未死使知我不為不義屈也嘉州娼家女郝節娥母迫令世其娼陵虐百端卒不奪自投江以死自乾興訖治平五十年間義烈女婦見於史者十數人而蒙朝廷褒頌者朱娥張氏彭氏而已貝州之趙不屈於賊義節尤著而有司不以聞史幾失之則其他湮沒而不傳者蓋有之矣夏四月詔議崇奉濮王典禮元年五月宰臣韓琦等奏請下有司議濮安懿王及譙國太夫人王氏襄國太夫人韓氏仙遊縣君任氏合行典禮詔須大祥後議之至是進呈乃有是詔翰林學士王圭等相顧不敢先知諫院司馬光獨奮筆立議略曰為人後者為之子不敢復顧其私親秦漢以來有自旁支入承大統推尊其父母為帝后皆見非當時取譏後世不敢引以為聖朝法臣以為濮王宜尊以髙官大爵稱皇伯而不名賈黯之議亦同王圭敕吏以光手藁為案議上歐陽修以為自古無以所生父改稱伯者圭等言非是中書奏漢孝宣光武皆稱父為皇考太后聞之手書詰責輔臣以不當議稱皇考上詔如聞集議議論不一宜權罷議當令有司博求典故務合禮經判太常寺范鎮率禮官上言陛下既考仁宗又考濮王其議未當具列儀禮及漢儒議論魏明帝詔為五篇奏之於是臺官自中丞賈黯以下各有奏知雜呂誨亦言陛下入繼大統皆先帝之德當從王圭等議為定封濮安懿王大國諸夫人典禮稱是奏皆留中不報司馬光又上言曰伏見向者詔羣臣議濮安懿王合行典禮王圭等二十餘人皆以為宜凖先朝封贈期親尊屬故事凡兩次會議無一人異辭而政府之意獨欲尊濮王為皇考巧飾詞説誤惑聖聽政府言儀禮本文五服年月敕皆云為人後者為其父母之服者不謂之父母不知如何立文此乃政府欺罔夫天下之大謂其皆不識文理也又言漢宣帝光武皆稱其父為皇考臣按宣帝承昭帝之後以孫繼祖故尊其父為皇考而不敢尊其祖為皇祖者以與昭帝昭穆同也光武起布衣誅王莽冒矢石以得天下名為中興其實創業雖自立七廟猶非太過况但稱皇考其謙損甚矣今陛下親為仁宗之子以承大業傳曰國無二君家無二尊若復尊濮王為皇考則置仁宗於何地乎五月詔皇子及卑屬勿授師傅官時封皇子並除檢校師傅中丞賈黯以為子為父師實有未安故有是詔六月親擢御史以范純仁為殿中侍御史吕大防為監察御史裏行近制御史有闕則命翰林學士御史中丞知雜事遞送舉二人而自上擇取一人為之至是闕兩員舉者未上內出純仁大防名而命之秋七月詔減乘輿服御詔曰凡郊廟所以奉天地祖宗者宜如故事若乘輿服御之費其務減損德寧公主將降其資送減康國長公主三之一富弼罷以疾求罷章二十餘上自樞密出判河陽出宫人賈昌朝薨臨其喪諡曰文元御篆其碑曰大儒元老之碑昌朝在侍從為名臣及執政不為善人所與咸以為結宫人宦官數為言者所攻八月大水壞官私廬舍漂沒人民畜産不可勝數求直言詔中外實封言事司馬光上疏略云陛下即位以來災異甚衆日有黑子江淮之水或溢或涸去夏霖雨涉秋不止京畿東南十有餘州廬舍沈於深淵浮苴棲於木末老弱流離捐瘠道路許潁之間積尸成邱今夏疫癘大作彌數千里秋未穫暴雨大至都城之內道路乘桴官府民居覆沒殆盡死於壓溺者不可勝紀陛下安得不側身恐懼思其所以致此者乎又曰當陛下初得疾之時外間傳言太后於梓宫前叩頭祈請額為之傷豈可謂非慈愛之心不幸讒人交間遂使兩宫之情有隙且先帝擢陛下於衆人中升為太子惟以一后數公主託陛下而梓宮在殯已失太后歡心長公主數人屛居間宫希曽省見此陛下所以失人心之始也又曰凡百奏請不肯與奪知人之賢不能舉知人不肖不能去知事之非不能改知事之是不能從或非才而驟進或有罪而見寬此天下所以重失望也又曰臺諫天子耳目其有所言當以聖意察其是非不一宜付大臣初上降詔責躬求言學士草詔有大臣思天變之語上夜批出言淫雨為災專戒不德命更其語知荆州鄭獬上疏曰陛下發明詔求忠言未知將為實用耶將應故事以文之耶茍欲文之固無可議必欲實用臣謂宜選官更直便殿從容條講可者行之不可者罷之却尊號司馬光言陛下將有事於南郊羣臣循襲故事請上尊號屬者暴雨為災深宜抑損以答天譴乞拒而勿受呂誨亦以為言上嘉納之羣臣凡五表不允置陕西北城兵九月太常因革禮成歐陽修等所纂也䇿制科武舉以范百祿為祕書丞李清臣為著作佐郎百祿鎮從子也百祿䇿略曰五行傳曰簡宗廟廢祭祀則水不潤下魯莊公丹桓宫楹又刻其桷以示夸大天應是而大水夫傅飾非典猶不卑其先君其變猶且若是况今朝廷稱奏顯言欲為兩統二父之舉簡宗廟者豈有愈於斯乎時大霖雨災異數見論者多咎濮邸之議將廷試或謂清臣宜以簡宗廟水不潤下為證則必合矣清臣曰此漢儒説吾不能知民間豈無疾痛可列乎因言天地之大譬人之腹心有所攻塞則五官不寧民者天地之腹心也日月星辰天地之五官也善止異者止民之疾痛而已歐陽修竒其文以為似蘇軾文及試文至中書未發修迎語曰考官不置清臣第一則繆矣發視果第一武舉六人冬十月雨大水以邵必知諫院先是呂誨言臺諫者人主之耳目臣觀天聖景祐間三院御史常有二十員後雖衰減猶不下十數員今御史臺闕中丞御史五員差出者人封章十上報罷八九諫官司馬光遷他職傳堯俞使北諍臣已同廢置自古言路壅塞無如今日也十一月壬午郊先是久雨隂晦及車駕赴青城中道開霽人心大説故事親祠皇帝將就版位祠官皆回班向上侍臣跪讀册至御名則興至是詔勿回班及勿興時呂公著攝太僕卿參乘為上言仁宗親祠徹黃道以登虛小次不入上皆循用之定娶宗室女法初所娶宗室女者除文官委主昏訪問不復由內侍省元祐六年詔娶宗室女得官者止朝請大夫皇城使丙午治平三年春正月范鎮罷知陳州韓琦求去鎮在翰林批答曰周公不之魯欲天下之一乎周上以鎮不當引聖人比宰相欲罷內職鎮遂請外而有是命或曰鎮以議濮王追崇事忤歐陽意修為上言鎮以周公待韓琦是以孺子待陛下也鎮以是出立濮王園廟以宗朴為濮國公奉濮王祀先是太后手書濮安懿王譙國太夫人王氏襄國太夫人韓氏仙逰縣君任氏可令皇帝稱親尊王為濮安懿皇譙國襄國仙逰並稱后上手詔曰稱親之禮謹遵慈訓追崇之典豈易克當且欲以塋為園即園立廟皇太后已賜俞允仍改封宗朴侍讀吕公著上言稱親之説仍漢史皇孫故事皇孫即宣帝所生父宣帝為昭帝後是以兄孫遙嗣祖統無兩考之嫌故且稱親其後既立諡只稱悼園今陛下以旁支繼大統建立園廟以王子承祀於濮王無絶父之義於仁宗無兩考之嫌可謂兼得其親字既稱謂難立且義理不安乞寢罷不報上嘗以稱親之議質於天章閣待制兼侍講王獵獵以為不可上曰王相待素厚亦當爾耶對曰臣被王恩厚故不敢以非禮名號加於王所為報也解呂誨等言職御史吕誨知蘄州范純仁通判安州吕大防知休寧縣誨纍疏乞依王圭等議早定濮安懿王追崇典禮皆不報乞免臺職又不報遂劾韓琦專權導諛略曰琦請議濮王典禮再下兩制用漢宣光二帝故事欲稱皇考本非陛下之意皆琦導諛之過也永昭陵土未乾玉几遺音猶在乃心已革謂天可欺言者辨論半年不決琦猶遂非不為改正得謂之忠乎又與純仁大防等合奏論參知政事歐陽修首開邪議妄引經據欲纍濮王以不正之號陷陛下於過舉之譏韓琦飾非傅會曽公亮趙概備位政府茍且依違伏請下修于理及正琦等之罪尋又劾修不置且曰修博識古今精習文史明知師丹之議為正董宏之説為邪利誘其衷神奪其鑒虞主始祔陵土未乾遽聞越禮之言欲遵衰世之迹致陛下外失四海臣庶之心內違左右卿士之議原修之罪安得而赦中書亦以劄子自辨略曰皇伯之稱考於經史皆無據是無稽之臆説也謹按儀禮喪服記曰為人後者為其父母服齊衰期謂之降服者以明服可降父母之名不可改也夫為人後者既以所後為父矣聖人又存其所生父母者非曲為之意也蓋自有天地以來未有無父而生之子也既有父而生則不可諱其所生矣夫無子者得以宗人為後是禮之所許然安得無父而生之子以為後乎此聖人所以不諱無子者立人之子以為後也亦不諱為人後者有父而生蓋不欺天不誣人也誨等論列不已繳納誥敕居家待罪上以御寶封誥敕遣內侍趣誨等赴臺供職誨等以所言不用雖受詔敕猶家居待罪及太后降手書誨等又奏言蓋首議者欲變兹事自外制中茍逭深責使天下怨謗歸於人主今復移於母后况濮王封大國典禮終闕前有權罷之旨後有且欲之言傳於四夷又誰敢信即園立廟皆非所宜嗣子襲封於禮為允欲乞更賜講求以期至當若不歸罪首議之人天下疑惑莫之能解范純仁又獨奏云皇太后自撤簾之後未嘗預聞外政豈當復降詔今有所建置蓋是政府臣僚茍欲遂非掩過不思朝廷禍亂之原且三代未嘗有母后詔令施於朝廷者秦漢以來方預少主之政自此權臣欲為非常之事必假母后之詔令以行其志往往出於迫脅而天下卒不知事由權臣今陛下以長君臨御於兹四年萬機之務出宸斷濮王典禮陛下自可採擇公議而行何必用母后之命施於長君之朝也琦見純仁奏謂同列曰琦與希文恩如兄弟視純仁如子姪乃忍如此相攻乎是日閣門兩以詔諭誨等赴臺供職誨等又纍奏乞罪首啓邪議之臣具言令日事體與漢宣不同當時太子與皇孫俱死於外因其地葬之故曰戾園悼園即位後八年有司言父為士子為天子祭以天子者乃謂堯舜禹湯周文漢髙受命之君非為繼統為後者皇考廟悼園宜毁勿修乃從其請今濮王陪葬熙陵别子孫之序奉邑守衛皆已嚴具其必别立園寢增廣制度當須改卜易其靈竁不惟熙寧隔絶亦與商王分别顧其典禮疑有未安漢悼皇止一子是為宣帝雖承大宗不絶小宗之祀故設立寢廟不為過矣議者猶曰考廟悼園宜毁勿修蓋祀不踰間而當專意於昭帝也又言臣等本以歐陽修首啓邪謀疑誤聖心得罪祖宗無可赦之理韓琦與內臣表裏矯託以惑中外為臣不忠無大於是又謂太后手書稱親之意蓋用漢宣故事欲行於今乃與中書所建皇考之議大扺相依此不免於兩統二父之失所以議者紛然皆謂母后手書非出慈夀本意皆建議之臣眩惑交結成就其謀欲自掩其惡而杜言者之口也陛下親受仁宗詔命而為人子故先帝遺詔誕告多方謂陛下為皇太子即皇帝位四夷諸夏莫不具聞乃復稱濮王為親則先帝治命之詔不行而陛下繼體之義不一况后與政府大臣並受先帝顧託言猶在耳永昭陵土未乾止因一二姦臣之謀遂忘而不顧陷兩宫於有過之地使四方夷狄惑先帝遺詔疑陛下過舉移謳歌欣戴之心為忠憤不平之氣可不痛哉萬一黠冦姦民有以先帝遺詔為問則執政大臣將何辭以對之然則稱親之禮豈宜輕用首議之臣安得不誅臣等待罪於家屢蒙詔旨趣令供職而踧踖未敢承命以此故也上又令中書降劄子趣使起臺供職誨等繳還劄子並前後所奏七狀申中書堅辭臺職中書進呈上問當如何琦對曰臣等有罪當留御史若以臣等無罪則取聖旨上猶豫久之乃令出御史既而曰不宜責之太重也故事知雜御史解官皆有誥詞時知制誥韓維當直兼領封駁執政恐維不草制及封駁敕命遂徑以敕送誨等家維言罷黜御史事關政體而不使有司與聞紀綱之失無甚於此乞追還誨等敕命使臣得申議論以正官法司馬光吕公著皆切諫並不從其後修著濮議引喪服記曰為人後者為其父母服服者齊衰期也謂之降服親不可降者降其外物爾喪服是也其必降者示有所屈也以其承大宗之重尊祖而為之屈爾屈於此以伸彼也生莫重於父母而為之屈者以見承大宗者亦重此以義制者也父子之道天性也臨之以大義有可以降其外物而本之於至仁則不可絶其天性絶仁道而滅天理此不仁者之或不為也故聖人制服為降三年為期而不沒其父母之名以見服可降而名不可沒也此以仁存者也又曰今議者欲以為人後之故使一旦反視父母若未嘗生我者絶之已甚矣使其真絶之歟非人情也迫於義而偽絶之歟是仁義者教人為偽也所議大略如此二月以蘇軾直史館上在藩邸聞軾名欲召入翰林知制誥韓琦曰軾遠大器也在朝廷培養使天下畏慕降伏今驟用之人情未必皆以為然上曰與修起居注可乎琦曰記注與制誥為鄰不若召試館職上曰未知能否故試若軾有不能耶琦不可乃試而命之他日歐陽修以告軾軾曰韓公所以待軾乃君子愛人以德也三月彗見西方庚申晨見於室本大如月長七尺許辛巳昏見於昴如太白長丈有五尺壬午孛於畢如月至五月沒解傅堯俞等言職諫官傅堯俞知和州御史趙鼎趙瞻通判淄州汾州堯俞鼎瞻使契丹還以嘗與呂誨言濮王事家居待罪上數諭留堯俞等終求去故出司馬光亦言臣與堯俞等六人共論濮王典禮今堯俞等六人盡已補外獨臣尚留天下之人必謂臣為顧惜祿位乞早賜罷棟戬加節度使去嵗嘉勒斯賚卒棟戬襲位其弟轄戬摩珍嘉勒各擁衆據城邑於是唃氏地分為三夏四月以郭逵同簽書樞密院同簽書始此知制誥邵必言逵武力之士不可置廟堂望留誥敕熟議不聽或以咎韓琦琦曰吾亦知逵望輕故事西府當用一武臣上欲命李端願吾知端願傾邪故以逵當之或以上本意用張方平琦知方平不附已猥曰西府久不用武臣宜復故事逵既用諫官御史交章論列不報秋八月呂公著罷自侍講出知蔡州公著嘗言濮安懿王不當稱親及請追還呂誨等不從即稱疾請外上曰學士朕所重豈得輕去家居百日上遣內侍即其家諭勉且戒內侍曰公著徑直宜徐開曉諭勿太迫又令公著兄公弼勸之公著起就職方數月復上章請外故有是命九月壬子朔日有食之禁銷金皇城司嘗捕銷金衣送開封府推官竇卞上殿請其獄有以內庭為言者上疑之卞曰真宗禁銷金自掖庭始上曰然文王刑于寡妻至于兄弟以御于家邦正謂此爾詔如卞請京朝官以上磨勘定上慨然思革天下之弊時方患官冗言者皆謂由三歲一磨勘其進甚亟稍遷至髙位故獲進者衆乃詔自今待制以上六年磨勘至諫議大夫止京朝官四年磨勘前行郎中止少卿監以七十為定員有闕則補其擢任及有功者皆不用此法夏人寇邉環慶安撫經略蔡挺斥堠明知諒祚將入寇即分屯要害以大順城堅難破不益兵柔逺城惡張玊將兵守之諒祚步騎數萬圍大順三日蕃官趙明與官兵合擊之挺又遣強弩列於壕外注矢下射諒祚中流矢道去移攻柔逺張玊命三千人夜出擾賊營賊遂驚潰諒祚退屯金湯聲言益發十萬騎復攻圍大順會朝廷發歲賜鄜延安撫經略陸銑止留不與諒祚果大沮乃報言邉吏擅興兵行且誅之冬十月詔三歲一貢舉禮部奏名進士以三百人為額明經諸科不得過此數以簽書郭逵宣撫陕西判渭州上曰第領樞職往重使權自呂餘慶以參知政事知成都其後是任執政無守藩者至逵始以簽書出鎮命宰執舉館職各五人先是上謂中書曰水潦為災言事者云咎在不能進賢何也歐陽修曰近年進賢路狹上曰何如修曰往時入館有三路今塞其二矣上曰何謂三路修曰進士髙科一路也大臣薦舉一路也因差遣例除一路也往年進士五人以上皆得試第一人有不十年即至輔相者今第一人兩任方得試而第二人以下不復試是髙科路塞矣往歲大臣薦舉即召試今止令上簿候闕人乃試是薦舉路塞矣惟有因差遣例除者半是年勞老病之人此臣所謂薦賢路狹也上嘉納之故有是命韓琦曽公亮趙概等舉蔡延慶以下凡二十人皆令召試宰臣以為人多難之上曰既委公等舉之茍賢豈患多也先召試蔡延慶等十人餘須後時士人以登臺閣升禁從為顯官而不以官之遲速為榮滯故為之語曰寧登瀛不為卿寧抱槧不為監十一月上不豫十二月立皇子潁王頊為皇太子先是上久服藥韓琦等問起居退潁王憂形於色顧琦曰奈何琦曰願大王勿離左右曰此乃人子之職琦曰非為此也王感悟未幾上疾增劇琦復奏曰陛下久不視朝內外憂惶宜早立太子上頷之琦請上親筆指揮上乃書曰立大大王為皇太子琦曰必潁王也煩聖躬更書之上乃批曰潁王頊琦即召學士草制學士張方平至榻前稟命上憑几出數語方平不能辨方平因進筆上書來日降制立某為皇太子十字所書名不甚明方平又請上再書潁王二字又書大大王三字方平退而草制上既用輔臣議立皇太子因泫然下淚文彥博退謂韓琦曰見上顔色否人生至此雖父子亦不能不動也大赦是歲契丹改號大遼時咸熙二年也熙寧八改太慶元豐八改大安紹聖二改夀昌丁未治平四年春正月朔大風霾賜私造寺觀名詔民間先私造寺觀及三十間者悉存之賜名夀聖上崩於福寧殿年三十八在位五年諡曰憲文肅武宣孝廟號英宗上居潛邸以孝聞閉門讀書終日未嘗宴遊慢戲服御儉素如儒者遇人恂恂惟恐傷之教授雖朝夕見必以朝服曰教授吾師也何敢弗為禮濮安懿王薨以所服玩物分諸子上所得悉以與王府舊人宗室有假金帶者以銅帶歸之主吏以告上曰此真吾帶也受之嘗令殿侍鬻犀帶直三十萬亡之遂不問諸王欲求遷宫迫以合奏上遜辭求免竊語左右曰不以其道得貧賤不可去不以其道求爵祿可乎吳充為吳王宫教授時進宮室六針仁宗以示大宗正司上書之屛風視以自戒受詔為皇子辭至十餘奏及就召戒舍人曰善守吾舍有適嗣吾歸矣初即位執政奏事必問朝廷故事如何於古當何如命近臣必以官而不名大臣從容以為言上曰朕雖宫中命小臣亦未嘗名郊祀習儀尚書例賜酒食有郎官醉飽嘔吐為御史所劾上特令放罪曰失儀薄罰也使士大夫以酒食得過難施面目矣皇太子即皇帝位尊皇太后為太皇太后後名宫曰慶夀皇后為皇太后宮曰寶慈二月上始親政初御紫宸殿退御延和殿視事韓維上疏云天下大事不可猝為人君施設自有次第惟加意謹重立夫人向氏為皇后故相敏中之孫女也上為皇子時納焉封安國夫人詔公主執婦道詔尚帝女者毋得躐升尊行公主行見舅姑之禮神宗熙寧九年中書言治平四年詔陳國公主降王師約不升行及行舅姑之禮令韓國大長公主降錢景臻其見舅姑禮請依此神宗曰大長公主朕宫中每見必拜雖皇太后亦敘姑嫂儀不可與朕諸妹等也宜止依兖國公主出降之禮三月彭思永蔣之竒罷思永自中丞出知黃州之竒自御史出監道州酒稅朝論以濮王追崇事疾歐陽修欲擊之會修妻之從弟薛良孺被劾修言不可以臣故原貸良孺怨修因誣修以帷薄事事連修長子婦吳氏劉瑾修之仇家於是騰謗思永聞之以語之竒之竒劾修乞肆市朝上疑不然之竒引思永為證思永亦助之竒言修當貶竄上以之竒思永所奏付密院修上章曰之竒誣罔臣者臣茍有之是犯天下大惡茍無之是負天下至寃犯大惡而不誅負至寃而不雪則上纍聖政其體不細乞詔公正之臣為臣辨理且詰問之竒所言自何而得上初訹修密問孫思恭思恭救解上悟復取之竒思永所奏並修奏付中書令思永之竒分析具傳達人姓名以聞之竒言得自思永思永以出於風聞上復批付中書曰朝廷小有闕失故許傳議聞奏豈有致人大惡可以風聞為託令思永等具傳達人姓名並所聞因依以聞思永乃言偶以所聞告之竒然曖昧無實常戒之竒勿言之竒亦奏此事臣止得之思永故思永之竒並黜手詔諭修事理既明勿恤前言賜舉人第許安世以下三百五人賜及第出身有差歐陽修罷出知亳州彭思永等既罷御史蘇寀吳申言猶不已修亦三表乞罷故也初英宗以疾未親政太皇太后垂簾修與二三大臣主國論前此執政多媕婀不明是非修必一二數之曰某事可行某事不可行於是怨修者多英宗嘗稱修性直不避怨修亦嘗誦故相王曾之言曰恩欲歸已怨使誰當既出守連六表乞致仕不從以吳奎參知政事上初欲用奎宰相言陳升之有輔立陛下功上曰奎輔立先帝遂越次用之奎入謝因言仁宗本意止在先帝更無他擇此天地之恩不可忘也追崇濮王事誠牽私意上曰此為歐陽修所誤奎對曰韓琦於此亦失衆心他日奎進言陛下在推誠以應天天意無他合人心而已若至誠格物物莫不以至誠應於上自然感召和氣又曰帝王之職惟在判别忠邪自餘庶務各有司存但不使小人得害君子君子嘗居要近則自治矣閏月更試館職法舊試詩賦初令試論䇿從吳申之請也求直言尋命張方平司馬光詳定以聞以王安石知江寧府初安石既除喪詔赴闕引疾乞分司上語輔臣曰安石歷先帝一朝不起或云不恭今召之又不至果病耶曽公亮曰安石真輔相材必不欺吳奎曰臣嘗與安石同領郡牧備見其迂濶護非萬一用之必亂紀綱上未省奎重言之遂有是命又謂安石必辭及詔到即詣府視事或曰公亮薦安石蓋所以傾韓琦也申詔二府參議邉事同知諫院滕甫言中書密院議邉事多不合趙明與西人戰中書賞功而密院降約束郭逵修堡册密院方詰之而中書已下褒語夫越守大事也安危所係願敕大臣凡有戰守除帥議同然後下上令依慶歷故事參議以呂公著司馬光為翰林學士時並為龍圖閣直學士光辭以不能四六上曰如兩漢制詔可也光曰本朝政事不可上遣內侍強光受詔光拜而不受詔以誥置光懷中光不得已乃受於是光上疏論修心之要三曰仁曰明曰武治國之要三曰用人曰信賞曰必罰且曰臣嘗以此六事事仁宗其後以獻英宗今又以獻陛下誠以臣平生為學所得至精至要者盡在於是願陛下勿以為迂濶而加省察焉夏四月王陶罷自中丞出知陳州先是召知渭州郭逵還領樞密陶奏用達非先帝意外則韓琦薦引內則髙居簡納賂上曰事於先朝義實難處陶言既不行即以不赴文德殿押常參班劾琦等略曰忽千官瞻視之庭蔑如房闥艱再拜表儀之禮重若邱山琦與曽公亮待罪上命翰林學士司馬光為御史中丞與陶兩易其職光又對曰言職人所憚臣不敢辭但王陶論宰相不押班未行而陶罷職則中丞不可復為請俟丞相押班受詔上許之時光中丞誥已進入而陶學士之命中書持之不下參政吳奎趙概堅請黜陶於外上不許復請以為羣牧使許之既而上批付中書以陶為翰林學士奎即具奏邇來寒暄不節暴雨屢作時雨愆亢螟螣滋生過不在他止一王陶而已陶挾持舊恩排抑端良韓琦曽公亮不押班事蓋以久來相承非是始於二臣今若又行內批指揮除陶為翰林學士乃是美遷且使天下謂陛下為何如主唐德宗疑大臣信任羣小陸贄以直道昌言及見斥逐裴延齡輩以纎屑狡獪倚為腹心天下至今稱德宗為至暗之主王陶不黜陛下無以責大臣展布臣違制旨合正典刑於是卧家乞罷上封奎奏示陶陶復奏劾奎聽宰相欺天子六罪吳申奏故事御史因言事居家待罪降旨不允或宣召入臺未有罷免遄速如此之甚也乞留陶供職並上疏劾奎有無君之心上手札趣知制誥邵元進入陶學士誥元遂言御史職在糾彈隂陽不和咎在執政奎所言顛倒至是上批付中書王陶吳申過毁大臣陶知陳州申罰銅四十斤奎位執政而劾中丞以手詔為內批三日不下除知青州司馬光奏外議皆以奎為不當去所以然者由奎名望素重於陶欲望收還青州敕誥上留奎在政府公亮亦請留奎復為參政奎既復位邵元更以為言上曰此無他欲起堅卧者耳堅卧指琦也初建東宫英宗命以蔡抗為詹事琦因薦陶文彥博謂琦盍止用抗琦不從及琦為陶所攻彥博謂琦曰頗記除詹事時否琦大愧曰見事之晚直宜受辱罷漳同等貢物上出諸州貢物名件自漳州山薑花藕朵已不至同州榅桲二千顆凡四十二州七十種慮其耗蠧民力詔罷之以司馬光為御史中丞先是光除中丞以乞留吳奎上不懌告在閣門上復收三日始付中書光尋言勾當御藥院髙居簡資性姦回工讒善佞久處近職罪惡甚多上曰祔廟畢自當去光曰閨閣小臣何山陵先後舜去四凶不為不忠仁宗貶丁謂不為不孝居簡狡猾膽大不惟離間君臣恐陛下母子兄弟夫婦皆將不寧光繼又纍章劾之且云臣與居簡難於兩留乞罷中丞與郡一日光復請對立殿陛下上曰已來矣呂公弼曰光今日必決去就陛下欲留居簡則逐光欲留光則逐居簡居簡內臣光中丞陛下擇其重者上命與供備庫使既而又用王中正李舜舉勾當御藥院光奏云王中正素聞姦猾頗好招權今處之要職是去一居簡得一居簡也乞令補外不聽五月置寶文閣學士直學士待制以翰林學士呂公著知制誥邵必同知諫院傅卞為之六月以趙抃知諫院抃獻疏言任道德重輔弼别邪正去侈心信號令平賞罰謹幾密備不虞勿數赦容諫諍十事又言吕誨傅堯俞范純仁呂大防趙瞻趙鼎馬默皆骨鯁敢言久譴不復又論五費謂宮掖宗室濫兵冗員土木之費多見納用故事近臣自成都還將大用必更省府大臣為言上曰用趙抃為諫官賴其言耳茍欲用之何傷及謝上謂之曰聞卿匹馬入蜀以一琴一鶴自隨為政簡易亦稱是耶議差役法先是韓絳言聞京東民有父子二丁將為衙前役者其父告其子云吾當求死使汝曹免凍餒也遂自經死又聞江南有嫁其祖母及老母析居以避役者又有鬻田産於官户田歸不役之家而役併增於同等戶中丞司馬光亦言自罷里正置鄉戶衙前而民戶愈困重至於破家願詢謀以及天下使民休息遂詔逐路條具差役利害役法之議始此置陕西內臣鈐轄秋七月詔明堂奉英宗配宇文之卲致仕先是之卲為曲水縣令歲飢轉運司以輕薄絹髙價使縣配賣之卲不可拂轉運司意罷官而歸繼又上書言事不報乃致其仕屛居十五年而卒司馬光曰吾聞志不行顧祿位如錙銖道不同視富貴如土芥於之卲見之八月京師地震上謂輔臣曰地震何祥也曽公亮曰天裂陽不足地震隂有餘上曰誰為隂公亮曰臣者君之隂子者父之隂小人者君子之隂皆宜戒之吳奎曰但為小人黨盛耳上不懌葬英宗於永厚陵九月祔英宗祧僖祖及文懿皇后先是禮院言凖嘉祐詔書定太廟七世八室之制請以大行皇帝神主祔八室僖祖文懿皇后神主依唐故事祧藏於西夾室以待禘祫自仁宗而上至順祖以次升遷詔恭依録周後以王安石為翰林學士上謂吳奎曰安石真翰林學士也奎曰安石文行誠髙出於人上曰當事如何奎曰恐迂濶上不之信也以張方平參知政事司馬光言方平文章之外更無所長姦邪貪猥衆所共知故仁宗不用上曰有何實事光曰請言臣所目見者上作色曰每除拜衆言輒紛紛非朝廷好事光曰此乃好事也知人帝堯難之况陛下乎陛下新即位萬一用一姦邪臺諫不言陛下何從知之司馬光仍翰林學士兼侍讀學士光言臣昨論張方平未蒙施行若臣所言果是則方平當罷政事若其非是則臣當逺貶豈宜復遷美職未敢祇受新命呂公著亦封駁云議者謂光因論列新除柄臣故有此命臣職在封駁未敢行下上手詔諭光換卿翰林復兼勸講蓋欲朝夕討論以規遺闕若以言事罪卿豈復更遷美職可便受誥呂公著所以封還者蓋不知此意俟對當自諭旨於是取誥敕付光光請先上殿然後受誥上令先受誥敕然後登對光又奏臣愚暗恐因纍公著上手批付公著可一日來對以釋卿疑漳泉潮等州地震冬十月開經筵侍講王安石因講禮記雜記者之非是上以為然詔勿講故事講官得坐自孫奭為侍講以仁宗尚幼跋案而聽之因請立講議者不以為是明年夏侍講吕公著王安石請如舊制下太常議韓維等謂宜如天禧舊制龔鼎臣言侍臣見天子應對顧問不可安坐詔從鼎臣議御製資治通鑑序初英宗命司馬光編厯代君臣事迹光以紀傳之體文字煩多遂約戰國至秦二世如左氏體為編年一書名曰通志上之英宗悅其書命光續之光請用劉恕趙君錫范祖禹同修後君錫以父喪不赴命劉攽代之光每修一代畢即上至是上賜書名仍親為製序种諤復綏州威明山降初夏諒祚迫遷橫山種落於興州有威明山者因衆不樂以所統橫山部族內附种諤時知青澗城不俟報即間道通蠟書且言乘釁可復河南地鄜延經略使陸詵難之獨轉運使薛向主諤司馬光上疏極諫以為橫山之衆若能勝諒祚是滅一諒祚生一諒祚若其不勝必引衆突塞不知何以待之文彥博亦謂諒祚稱臣奉貢或襲取其地無名上不聽遣諤及向迎之取綏州凡費六十萬萬西方用兵蓋始於此諒祚將以兵報復西邉皆警上乃以韓琦判永興兼陕府五路經略安撫使手札趣治裝琦即奏曰薛向始議招誘橫山一帶蕃族己而种諤擅取綏州環慶李肅之領衆七千破蕩族帳涇原蔡挺又欲令環慶直趨興靈肆意妄作取怨夷狄臣引道非難但須稟朝廷成算琦尋至長安有詔相度綏州可棄可守以聞已而西人誘殺知保安軍楊定及都巡檢使侍其臻等琦即奏若此則綏州不可棄矣且言西賊誘害緣邉知軍巡檢不接詔匣賀登極正旦人使更不過界是不復顧藉和好今朝廷己納其降人威明山等幾萬人若盡撥在近城裏寨居止不惟無地可處彼亦未必肯與本族下人戶分處住坐况綏州見已修就城池若令威明山等據之自然並力扞禦諒祚萬一他日不能撫而失之亦不係國家邉鄙利害而諒祚所捐多矣諒祚戰數敗國中飢困將求和而諒祚死子秉常立乞遣使告哀琦因奏既當此變尤非棄城之時彥博及呂公弼恥於中變督促棄城如初琦條陳不已上遣使賫詔訪琦利害琦復具奏乃詔存綏州如琦議越熙寧二年十月改為綏德城不復以易二寨明年二月諤坐擅興奪四官安置隨州史臣曰祖宗務廣德不務廣地初開井門匪夜匪棘北棄幽都西捐朔方四夷左袵罔不咸賴由建隆初迄治平末總一百四年凡地理沿革無大增減熙寧始務開拓未及改元种諤先取綏州韓絳繼取銀州王韶取熙河章惇取懿洽謝景溫取徽誠熊本取南平郭逵取廣源最後李憲取蘭州沈括取葭蘆等四寨雖嘗以河東邉界七百里地乞遼人而王安石之議蓋曰將欲取之寧姑與之逮元祐更張舉葭蘆等四寨給賜夏人而分畫久弗能定紹聖遂罷分畫督諸路各乘勢攻討進築自三年秋迄元符二年冬凡陕西河東建州一軍二關三城九寨二十八堡十又取青唐邈川寧塞龍支等城武節赫然見矣建中靖國悉還吐蕃故壤稍紓民力崇寧亟變前議專以紹述為事蔡京始任童貫王厚更取湟鄯廓三州二十餘壘陶節夫鍾傳邢恕胡宗回曽孝序之徒又相與鑿空架虛馳騖乎元符封域之表迄於重和既立靖夏制戎制羌三城雖夏人寖衰而吾民力亦敝西事粗定北事踵起蓋自崇寧以來梓益夔黔廣西荆湖南北遞相視效斥大土宇鮮有寧歲凡所建州軍關城寨堡紛然殆不可勝紀最後建燕山雲中兩路甫及三歲而禍變遽作中原板蕩故開邊不可不慎也十一月增轉對員詔以星變地震起居日增轉對官二人令極論時政得失十二月詔以瘐死定吏罪詔天下以囚死之多寡定吏罪具為令嚴監司長吏選上嘗曰朕見祖宗百戰并天下今以一州生靈付一庸人嘗痛心疾首韓琦當國用監司或有非其人者崔公孺曰居陶鎔之地者宜法造化為心造化者以蛇虎為害人之物故置蛇於藪澤置虎於山林今置之通衢使為民害可乎公孺者諫議大夫立之子琦之妻弟九朝編年備要卷十七
