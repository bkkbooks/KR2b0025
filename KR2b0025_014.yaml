body:
  text: 九朝編年備要卷十四宋陳均撰仁宗皇帝起己丑皇祐元年止癸巳皇祐五年己丑皇祐元年春正月甲午朔日有食之張士遜薨臨其喪翌日上謂輔臣曰昨有言庚戌是朕本命朕以師臣之舊故不避文彥博曰唐太宗辰日哭張公謹陛下過之逺矣尋篆其碑首曰舊德二月彗出虛晨見東方西南指歷紫微垣至婁凡一百一十四日而沒求直言行考課監司法轉運使副官滿差兩制臣寮考校分上中下六等嘉祐二年命翰林承㫖孫汴中丞張升磨勘諸路轉運提刑課績六年頒行新定轉運使副提㸃刑獄課績院條制瀘蠻冦邉詔近臣陳備邉䇿時契丹聚兵近塞上御便殿訪近臣以備邉之䇿三司使葉清臣上對曰陛下臨御二十八年未嘗一日暇逸而契丹頻歲為患者豈其將相大臣不得其人不能為陛下張威德而俾懷畏乎慶厯初劉六符來執政無術略以破狡謀逺致二十萬物永匱膏血以奉溪壑今詔問北使詣闕以西伐為名即有邀求何以答之臣聞誓書所載彼此無求况討元昊纍年契丹豈有毫髮之助今彼出師輒求我助違約甚矣若使辨士判其曲直要之一戰外破其謀豈不憚服茍肆侵凌方河朔災傷之餘野無廬舍我堅壁自守其能久居然後設伏出竒邀擊首尾若不就擒亦大敗矣詔問輔翊之能方面之才與夫帥領偏禆孰可任者臣以為不患無人患有人而不能用耳今輔翊莫如富弼范仲淹夏竦鄭戩方面莫如韓琦田况劉渙孫沔帥領則王德用龎籍偏禆則狄青范金蔣楷張亢劉貽孫王德基皆其選也而威禦綏寧即竦戩尤其所長詔謂朔方災傷軍儲闕乏此則三司失計置轉運不舉職非一日也如施昌言方欲辦事一與賈昌朝違戾遂被移徙軍儲何由不之先朝置內帑本備非常今為主者之吝自分彼我緩急不以為備則臣不知其所為也至如粒食難轉莫若使豪民詿誤得入粟以免杖笞必能速辦詔問戰馬乏絶何䇿可足臣前在三司嘗陳監牧之弊占良田九萬頃嵗費錢百萬緡天間之數才三四萬急有征調一不可用今莫若賦馬於河北河東陜西京東五路上户一中户二户共一馬養馬者復其一丁則坐致戰馬二十萬不為難矣時户部副使包拯亦對西北形勢山川扼塞及所以先事選士積穀之䇿三月葉清臣罷罷三司使出知河陽初河北轉運使失計軍儲清臣自汴漕米七十餘萬給之又請發大名府軍錢以佐邉糴而賈昌朝格詔不從清臣固爭且疏其跋扈不臣宰相欲兩平之因徙昌朝判鄭州而清臣有是命清臣天資爽邁遇事敢行奏對無所屈郭承祐妻華王元稱女封郡主給俸及承祐為殿前副都指揮使妻以不加封請增月給清臣執奏不可上曰承祐管軍妻又諸王女當優之清臣曰是終為僥幸遂卷其奏置懷中不行清臣至河陽未幾卒四年秋昌朝除母喪以使相入見召赴邇英閣講乾卦上曰將相侍講天下盛事昌朝稽首謝尋命知許州親試舉人賜馮京等四百九十餘人及第出身有差夏五月幸後苑觀刈麥御寶政殿觀之謂輔臣曰朕新作此殿不欲植花卉而歲以種麥庶知穡事之不易也六月初置觀文殿大學士以祥源觀使賈昌朝為之仍命判都督朝會班中書門下視其儀物仍詔非嘗為宰相者毋得除秋八月陳執中罷先是河決民流災異數見執中無建明但延接卜相術士言者屢攻之至是以足疾辭位罷去以宋庠同平章事庠為相儒雅練故事自初執政遇事輒分别是非可否用是斥退及再登用遂浮沉自安然天資忠厚嘗曰逆詐恃明殘人矜才吾終身不為也䇿制科武舉賢良方正能直言極諫殿中丞吳奎入第四等武舉三十七人九月嶺南蠻儂智髙冦邉雍州西南有廣源州雖號雍管羈縻其實服役於交趾初知儻猶州儂全福為交趾所虜其妻阿儂嫁商人生智髙因冒儂姓本雷火峒久之復與其母出據儻猶州建國曰大歷交趾拔之執智髙釋其罪使知廣源州居四年內怨交趾襲據安德州僣稱為南天王改元景瑞至是冦雍州詔江南福建發兵捕之罷武舉冬十二月汰諸路兵時天下患兵冗於是文彥博與樞密院龎籍同議省兵議者紛然以為不可上以為疑文彥博與龎籍共奏曰公私困極正坐冗兵果有患二臣請死之上意乃决於是汰陜西保捷軍及諸路羸兵為民者六萬減廪糧之半者二萬又詔減陜西兵屯內地以實邉費庚寅皇祐二年春正月行入中對貼法自慶厯末河北行四說法鹽課其一而并邉芻粟皆虛估數倍劵至京師反為富賈所抑鹽八百斤舊售錢十萬至是止六萬商又以賤估受劵取鹽不復入錢京師帑藏益乏乃詔王堯臣等同三司較近嵗天下財賦之數堯臣等請商人復入錢京師法視舊入錢數稍增與鹽而并入邉中先得劵受鹽者河東陜西入芻粟直錢十萬止給鹽直七萬河北又損六萬五千且令入錢十萬於京師乃聽兼給謂之對貼於是入錢京師稍復如故夏六月定舉主員先是京師提刑張易官滿將代並舉縣令十六人上意其請託乃詔監司以所部州之多少裁定其後又增縣令舉主至三員蓋官冗浸極保薦之法初略而後詳也秋九月辛亥大饗明堂三聖並侑詔曰國朝三嵗親郊即合祭天地祖宗并配而百神從祀今祀明堂而禮官所定祭天不及地配坐不及祖宗未合三朝之制且移郊為大饗蓋為民祈福宜合祭皇地祗奉太祖太宗真宗并配而五帝神州地祗亦灌獻之日月河海諸神悉如圜丘從祀因謂輔臣曰禮非天降地出緣人情耳今禮官習拘儒之舊傳舍三朝之成法非朕所以昭孝息民也先是內出手詔明堂禮畢毋得上尊號文彥博等固請不從先是宋庠建議以今年當郊而日至在晦用建隆故事宜有所避因請季秋大享於明堂詔從之上謂輔臣曰明堂者布政之宫天子路寢今大慶殿是也况明堂初已合祀天地於此乃以大慶殿為明堂又詔祠明堂宜盡物以遵典禮自乘輿服御諸物令有司裁簡之宋祁上明堂通議二篇祁自叙略曰上採三代旁搜漢唐禮之過者折之說之謬者正之以合開寶一王之典聊佐乙夜觀書之勤尋以御撰明堂八曲𨽻太常及改文舞曰右文化俗武舞曰成功睿德於是百官皆進秩初彥博議覃恩參知政事髙若訥曰官濫久矣未有以節止今又啓之何也不聽及扈駕宿景靈宫有傳赦語百官遷秩者御史彭思永亟上言不宜濫恩時三司使張堯佐覬執政內侍王守忠求為節度使思永率同列言之或曰宜待命行思永曰寧先事而言使己得罪不可使命出移過朝廷遂獨奏曰外戚秉政宦官用事非宗社福上怒詔詰所從受知諫院吳奎言御史許風聞言事若窮核主名則後無敢告以事者是朝廷自蔽耳目也中丞郭勸亦言思永納忠不宜深罪堯佐守忠之議遂格而思永尋罷御史知宣州尋命彥博等編修大享明堂記越明年二月上之先是資政殿學士知杭州范仲淹建言祀明堂曠禮宜召元老舊德陪位于廷乃詔南京起太子太保杜衍西京起太子少傅任布陪祀且供帳都亭驛待之既而二人皆以老疾力辭不至遂賜衣帶器幣自後每遇大禮而前兩府致仕者率有詔召焉然亦無至者申嚴內降執奏法詔內降指揮許執奏敢因緣干請者臺諫察舉先是上諭輔臣可於赦文中禁止內降庶澄清宿弊輔臣等言載之赦文恐未盡聖意乃别下此詔至和元年又詔內侍傳宣令都知司劄報被受者覆奏景祐五年又詔今後臣僚於內侍省御藥院內東門進文字者令逐處申文書再取㫖諫官韓絳嘗因對言曰天子之柄不可下移當間出睿斷上曰朕固不憚自有處分所慮未中理而有司奉行則害己加於人故先盡大臣之慮而後行之絳又言有林獻可者遣其子以書詆臣多斥中外大臣之失臣不敢不以聞上曰朕不欲留中恐開隂訐之路苐焚之冬閏十一月置詳定大樂局詔中書門下集兩制太常官置局於祕閣詳定大樂翰林學士王堯臣請命天章閣待制趙師民預詳定仍乞借髙若訥所校十五等古尺並從之落胡瑗致仕為國子監直講同議大樂又召益州進士房庶除校書郎宋祁嘗上庶所著樂書補亡二篇既召赴闕庶自言嘗得古本漢志云度起於黃鐘之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黃鐘之長一為一分今文脫之起積一千二百黍八字故自前世以來纍黍為尺以制律是律生於尺尺非起於黃鐘也且漢志一為一分者蓋九十分之一後儒誤以一黍為一分其法非是當以秬黍中者一千二百實管中黍盡得九十分為黃鍾之長九寸加一以為尺則律定矣直祕閣范鎮是之乃言曰李照以縱黍纍尺管空徑三分容黍千七百三十胡瑗以橫黍纍尺管容黍一千二百而空徑三分四釐六毫是皆以尺生律不合古法今庶所言實千二百黍於管以為黃鍾之長就取三分以為空徑則無容受不合之差校前二說為定蓋纍黍為尺始失於隋書當時議者以其容受不合棄而不用及隋平陳得古樂器髙祖聞而歎曰華夏舊聲也遂傳用之唐祖孝孫張文收號稱知音亦不能更造尺律止法隋之古樂制定聲器朝廷久以鍾律未正屢下詔書博訪羣議冀有所獲今庶所言以律生尺誠衆論所不及請如其法試造尺律更以古器參考當得其真乃詔王洙與鎮同于修制所如庶說造律尺籥律徑三分圍九分長九十分籥徑九分深一寸尺起黃鍾之長加十分而律容千二百黍初庶言太常樂髙古樂五律比律成才下三律以為今所用黍非古之所謂一稃二米黍也尺比橫黍所纍者長一寸四分庶又言古有五音而今無正徴音國家以火德王徴屬火不宜闕今以旋相五音相生法得徴音又言尚書同律度量衡所以齊一風俗今太常教坊鈞容及天下州縣樂各自為律非書同律之義且古者帝王巡狩方嶽以考禮樂同異以行誅賞謂宜頒律格自京師及州縣無容輒異有擅髙下者論之上召輔臣睹庶所進律尺籥又令庶自陳其法因問律吕旋相為宫事令撰圖以進其論以五正二變配五音迭相為生衍之成八十四調舊以宫商角徴羽五音次第配七聲然後加變宫變徴二聲以足之庶推以旋相之法謂五行相戾非是當改變徴為變羽易變為閏隨音加之則十二月各以其律為宫而五行相生終始無窮詔以其圖送詳定所庶又論吹律以聽軍聲者謂以五行逆順可以知吉凶先儒之說略矣是時胡瑗等制樂己有定議特推恩而遣之鎮為論于執政曰今律之與尺所以不得其真由纍黍為之也纍黍為之者史之脫文也古人豈以難曉不合之法書之於史以為後世惑乎殆不然也易曉而必合也房庶之法是矣今庶自言其法依古以律而起尺其長與空徑與容受與一千二百黍之數無不合之誠如庶言此至真之法也且黃鍾之實一千二百黍積實分八百一十于算法圓積之則空徑三分圍九分長九十分積實八百一十分古律也律體本圓積之是也今律方積則空徑三分四釐六毫比古大矣故圍十分三釐八毫而其長止七十六分二釐積實亦八百一十分律體本不方方積之非也其空徑三分圍九分長九十分積實八百一十分非外來者也皆起於律也以一黍起於九十尺與一千二百黍之起於律皆取於黍今議者獨於律則謂之索虛而求分亦非也其空徑三分圍九分長九十分之起於律與空徑三分四釐六毫圍十分三釐八毫長七十六分二釐之起於尺古今之法疏密之課其不同較然可見何所疑哉若以為工作既久而復改為則淹久歲月計費益廣又非朝廷制作之意也其淹久而計費廣者為之不敏也今庶言太常樂無姑洗夾鍾太蔟等數律就令其律與其說相應鍾磬每編才易數枚因舊而圖新敏而為之則旬月之功也又何淹久而廣費哉執政不聽四年冬知制誥王洙等獻新樂議者以為鐘磬皆不合古遂復命廷臣詳定仍命參政劉沆梁適監議而當議者各安所習久而不决乃命諸家各作鍾律以獻五年九月親臨視之遷胡瑗阮逸等官而議者謂黃鍾為萬事根本故尺量權衡皆起於黃鍾至隋用纍黍為尺而制律容受卒不能合及平陳得古樂遂用之唐興因其聲以制樂其器無法而其聲猶不失於古五代之樂大樂淪散王朴始用尺定律而聲與器皆失之故太祖患其聲髙特減一律至是又減半然太常樂比唐聲尤髙五律比今燕樂髙三律上雖勤勞於制作未能得其當者有司失之於以尺生律也史臣蒲宗孟李清臣曰世號太常為雅樂而未嘗施於燕享豈以正聲為不美聽哉夫樂者樂也其道雖微妙難知至於奏之而使人悅豫和平此不待知者而後能也嘗竊觀於太常其樂縣鍾磬塤篪搏拊之器與夫舞綴羽籥干戚之制蓋皆放諸古矣建振作之則聽者不知為樂而觀者厭焉豈所謂古樂其聲真若此哉孔子惡鄭聲恐其亂雅亂之云者似是而非也孟子亦曰今樂猶古樂然今太常獨與教坊樂音殊絶何哉昔者李照胡瑗阮逸改鑄鐘磬處士徐復笑之曰聖人寓器以聲不能求其聲而更其器其可用乎照瑗逸制作久之卒無成蜀人房庶亦深訂其非是因著書論古樂與今樂本末不逺其大略以為上古世質器與聲朴後世稍變焉金石鍾磬也後人易之為方響絲竹琴簫也後世變之為箏笛匏笙也攢之以斗塤土也變而為甌革麻料也擊而為鼓木柷敔也貫之為板此八音者於世甚便而不逹者指廟樂鎛鍾鎛磬宫懸為正聲而概謂胡部鹵部為淫聲殊不知大輅起於椎輪龍艘生於落葉其變則然也古者以俎豆食後世易之以杯盂古者簟席以為安後世更之以榻桉雖使聖人復生不能捨杯盂榻桉而復俎豆簟席之質也然則八音之器豈異於此哉孔子曰放鄭聲鄭聲淫者意以其器不若古哉亦疾其聲之變耳試使知樂者由今之器寄古之聲去其惉懘靡曼而歸之中和雅正則感人心導和氣不曰治世之音乎然則世所謂雅樂者未必如古而教坊所奏豈盡為淫聲哉數子紛紛改制鍾律而復庶之論獨如此故綴其語存之以俟知音焉時知諫院范鎮上書論樂略曰陛下制樂三年有司之論紛然未决蓋由不識其本而爭其末也樂者和氣也發和氣者聲音也而聲音生於無形古人以有形之物傳其法然後無形之聲音得而和氣可導有形者秬黍也律也尺也籥也釜也斛也算數也權衡也鍾也磬也是十者必相合然後為得而今皆相戻按詩誕降嘉種維秬維秠許慎云秠一稃二米今秬黍皆一米律尺籥釜斛形制皆與古異算法則以方法算圓分又權衡起於黍而黍未真臣固知其無形之聲音不可得而知也議者謂當今宜先政令而禮樂非所急此臣之所惑也倘使有司合禮樂之論是其所是非其所非陛下親臨决之顧於政令不已大乎昔漢諸儒議鹽鐵後世猶傳鹽鐵論方今定雅樂願令有司人人各議合為一書則孰不自竭請權罷詳定修制二局俟真黍至然後為樂則必得至當而無事乎浮費也詔送詳定所鎮說自謂得古法然集賢校理司馬光數與之論難以為勿合世鮮律鍾之樂卒莫能辨其是非焉詔后妃家勿除二府初慶厯中諫官余靖言張堯佐親聨宫掖不宜任事至是諫官吳奎又言郭承祐以舊恩為宣徽前知應天所為多不法詔奪承祐宣徽使而有是命時堯臣為宣徽南院使淮康軍節度景運宫使復加郡牧制置使又賜堯佐二子出身於是知諫院包拯等言陛下即位僅三十年未有失道敗德之事自五六年來擢用堯佐羣臣皆竊議以為其過不在陛下在女謁近習與執政大臣也蓋女謁近習知陛下繼嗣未立既有所私莫不潜有趨向執政大臣不能進規以義乃從諛順㫖髙官要職以委堯佐惟恐不滿其意况下制之日陽精晦塞氛霧䝉孛望陛下斷以大義亟命追寢必不得已宣徽節度擇與一焉如此則合天地順人情矣中丞王舉正言堯佐緣妃家一日領四使使賢士大夫無所勸不報舉正後與御史唐介及臺諫官合奏請中丞留百官班廷諍有詔止之上曰言事者謂堯佐不可為執政當優與之官爵今其言反覆朕終不欲加言者以罪樞密副使梁適曰臺諫論事乃其職堯佐領四使誠過恐非所以全之乃罷堯佐宣徽景靈二使秀州地震有聲如雷十二月班家廟制本朝士大夫無襲爵故不建家廟而四時祭於屋室慶歷初雖赦書許立而有司未能推述先典至是宋庠言禮官既不講求私家何緣擅立乃下有司詳定學士承㫖王堯臣等定平章事以上立四廟尚書節度使以上立三廟餘官祭於寢凡得立廟者許嫡子孫襲祭以主祭至是班其制而議者不一遂終不果行三司上會計録三司使田况約景德會計録以今財賦所入較多於景德而嵗之所出又多於所入因著皇祐會計録上之是年正月命近臣同三司校財賦出入數王堯臣等以慶厯皇祐總四年凡財賦出入參其登耗皇祐元年入一億一千餘萬而所出無餘至四年春書成上之詔付三司取一嵗中數以為定式英宗治平中韓絳上會計録內外嵗入一億一千餘萬出一億二千餘萬諸路積一億萬而京師不與焉時兵數少損𨽻籍者猶百十六萬而宗室吏員視皇祐亡慮增十之三河北水詔蠲其租仍出內藏錢四千萬緡紬絹四十萬匹下本路便糴糧草詔戒安撫運使不得以物帛責擾民間且諭宰執曰朕宫中不妄用一錢惟以寬民賦豈可惜費也辛卯皇祐三年春正月淮南分東西路二月復入中見錢法自三說四說二法並行不數年間茶法復壞芻粟之直大率虛估居十之八劵至京師為南商所抑北商無利三司患之請行貼直之法每劵值十萬比市估三千倍為六千復入錢四萬四千貼為五萬給茶直十萬詔又損錢一萬然亦不足以平其直入中者少公私大弊知定州韓琦以為言下三司議三司奏自改法至今凡得穀二百二十八萬石芻五十六萬圍而費緡錢一千二百九十五萬茶鹽香藥民用有限今散於民間既多積而不售價日益損𣙜貨務稅課不過五百萬緡其利害灼然可見請復行見錢法詔從其請仍一用景祐三年約束又懼好事者之橫議也乃詔自今議者並須究知厥理審可施用若事己上而驗問無狀者置之重罰時戍兵多苦食不足陜西轉運李參視民闕乏時令自隱度穀麥之入預貸以官錢麥熟則償謂之青苖錢數年兵食常有餘其後青苗法皆取諸此朝廷患入中法嵗費增廣參請飛錢於邉郡以平估糴權罷入中此參之去省𣙜貨錢以千萬計三月宋庠罷知河南府以言者論其不戢子弟在政府無所建明也治平三年卒諡元憲英宗篆其碑曰忠規懿範夏四月以曾公亮為翰林學士公亮自為集賢校禮郎預經筵凡十餘年上每厚遇之及遷學士管勾三班公亮盡取前後條目置於座側案以從事老胥皆束手無能為也後至者卒莫能易五月置河渠司於三司六月視大長公主疾齊國大長公主喪自后妃以下候問進拜用家人禮上親舐主目左右皆感泣上亦悲慟秋七月定太學生員舊制二百人如不能充數以百人為限復用孔氏知仙源縣詔用以孔氏知縣近廢不行宜復舊治平初復從京東提刑王綱之請勿用孔氏以重養民之官更樂名曰大安河决大名府館陶郭固口命塞之罷徙州長吏十六人上謂輔臣曰近日職司以長吏不理聞者多矣長吏者民之性命而可不重乎宜擇其甚者罷之小者易之楊景宗嘗請郡上曰景宗章惠太后之弟豈不念之但貪戾之性老而益甚不可與郡減丁米減郴永等州凡十萬餘石是冬減漳泉興化軍丁米主户三之一客户半減之八月京東淮浙等七路饑遣李兑等四人體量安撫又以武臣副之時七路饑長吏多非其人又轉運使頗肆科擾民不聊生上乃命中書擇使者按視之諫官吳奎言近歲以來水不潤下盜賊橫起皆隂盛所致夫帝王之美莫大乎進賢退不肖今陛下知賢不能進知不肖不能退重以內寵驕恣近習回撓夷狄桀驁讒邪交傷隂盛如此寧不致大異哉且朝廷之過常在乎無事之時因循而不為有事之後顛沛而失措中外臣僚平時建一䇿舉一官雖有可取皆抑而不行又從而媒孽謂之生事如河東河北盜賊行路之人皆已傳布而大臣不以為事至執通判傷巡檢然後倉皇於數路之間移易官守重賞以募之不亦晚乎事將有大於此者陛下幸留意焉時大理寺言信州民有劫米而傷主者法當死上謂輔臣曰飢而劫民則可哀盜而傷主則難恕雖然細民無知終緣飢耳遂貸之罷遣馮道孫舜卿馮道曾孫舜卿上道官誥二十通乞録之上謂輔臣曰道相四朝而偷生茍祿無可旌之節所上官誥其給還之九月為夏竦成服竦薨訃聞上謂輔臣曰竦嘗事東宫情所憫傷若依禮官所擇日子則在大燕之後豈可先作樂而後舉哀也乃命以甲子曰成服於苑中賜侍講筵官坐侍讀官當侍講讀者立侍餘皆賜坐冬十月除解鹽禁初范祥議解鹽通商論者爭以為非是朝廷察其可用委祥推行而御史知雜何剡復以為言遣户部使包拯馳視還言行之便至是磨勘司李徽之猶以為不便驛召祥至與三司雜議皆是祥所建詔從之於是三司使田况請久任祥以專其事就擢祥為轉運使以寵之祥初言歲入緡錢可二百三十萬是年入二百二十萬明年二百十五萬校慶歷六年增六十八萬七年增二十萬又舊歲出𣙜貨務緡錢慶歷中或六百四十萬或四百八十萬至是𣙜貨務錢不復出其後嵗所入雖盈縮不常至五年猶及百七十八萬唐介貶先是張堯佐復除宣徽使殿中侍御史裏行唐介謂同列曰是欲與宣徽而假河陽為名耳爭之未聽自劾亦不報介又言平章事文彥博向守蜀為間金竒錦因中官獻宫掖得為執政甘陵討賊因明鎬功遂叨相位前日堯佐除命臣面承諭乃知出於中書擬進蓋彥博顯用堯佐隂結貴妃陷人主有私後宫之名而自為榮身之計彥博頃求外補諫官吳奎觀望挾奸言其才未可聽引去由是彥博專政威福在己雖有過人不敢議望賜斥罷以富弼代之上怒甚却其奏勿視曰將貶若矣介徐讀竟又言愚臣忠憤所激雖鼎鑊不避也上即座召二府視之曰介論事不足責至謂彥博因緣妃嬪進用此何言耶樞密副使梁適叱介下殿命舍人草詔殿廬貶春州别駕修記注蔡襄中丞王舉正皆言介貶太重而上亦中悔敕朝堂曉諭百官因謂輔臣曰介有母徙便地然後徙介英州别駕遣中使護送之復取其奏以入介自是直聲聞天下御史知雜陳升之上章曰為國如介者有幾今投之瘴癘臣恐言者箝口矣越明年正月徙介監郴州酒稅文彥博罷出知許州或言張堯封彥博父客也彥博知益州貴妃有力焉因風彥博織燈籠錦以進貴妃服之上驚顧曰何從得此妃正色曰文彥博所織也彥博與妾父有舊然妾焉能使之特以陛下故耳上悅自是意屬彥博及為參知政事明鎬討王則未克上甚憂之語妃曰大臣無一人為國了事日日上殿何益妃密令人語彥博翌日彥博入對乞身往破賊上大喜彥博知恩州十數日賊果平即軍中拜相議者謂彥博因鎬以成功其得相由妃力也介既用是深詆彥博雖坐貶彥博亦出其事之有無卒莫辨云以龎籍為平章事吳奎罷自知諫院出知密州知諫院包拯言唐介彈大臣并以中奎乞且留奎供言職上曰介言奎拯皆隂結文彥博今觀此奏非誣也因謂宰臣曰諫官御史必用忠厚淳直通世務明治體之人以革浮廢之弊宰相既承聖諭自是凡詔舉臺職必載上語敕中壬辰皇祐四年春三月包拯罷自知諌院出為河北都轉運拯在諌院數論大臣斥權幸請罷河北屯兵分之河南諸郡遇警即發如或戍兵不可遽減則訓練義勇以鎮邉備雖小給餱糧每嵗不當屯兵一月之費用一州賦可給義勇十八萬事卒不行夏四月儂智髙陷雍橫等州先是智髙復貢金函書請內屬知雍州陳珙上聞不報時雍州庭中有白氣而江水溢司戶孔宗旦以為兵象度智髙必反以書告珙不聽智髙既不得請日與交趾為讐且擅山澤之利遂招納亡命數出敝衣易穀食紿言洞中飢部落離散故雍不設備智髙乃與廣州進士黃師宓及其黨日夜謀入冦一夕焚其巢穴紿衆曰平生積聚今為天火所焚無以為生計窮矣當拔雍州據廣州以為王否則兵死是月率衆五千沿江東下攻破雍州橫江寨張日新等死之陷雍州都監張立司戶孔宗旦罵賊而死珙以下皆遇害於是智髙即州僞建大南國僣號仁惠皇帝改年啓歷赦境內師宓等皆稱中國官名進陷橫貴龔藤梧封康端州惟封州守臣曹覲康州守臣趙師旦監押馬貴戰死諸州守臣張仲李植江滋丁寶臣等並遁覲修古兄子也修古無子以覲為後覲死録其子且以其弟現為建安簿官滿修古妻又乞别養凡三注現建州官慶厯間蠻嘗入冦知雍州盧革移書安撫使杜杞言嶺外小郡地里相近者可量合併之使緩急冦至可以共禦圍廣州前二日有告急者知州仲簡以為妄囚之下令曰有言賊至者斬以故民不為備及賊至乃令民入城民爭以金貝遺閽者求先入踐死者甚衆餘皆附賊賊勢益張廣惠等州提舉捉賊武日宣惠州巡檢魏成憲邀擊於城下並死之范仲淹薨仲淹內剛外和為政忠厚所至有恩邠慶二州之民皆畫像立生祠其卒也哭之如父諡文正上篆其碑首曰褒賢初羣盜剽劫淮南將過髙郵知軍朝仲約諭富民出金帛具牛酒往迎之盜悅徑去不為暴事聞富弼議誅仲約以正法仲淹欲宥之爭於上前上卒從仲淹言既而弼愠甚謂仲淹曰方今患法不舉法舉而多方沮之何以整衆仲淹密告之曰祖宗以來未嘗輕殺臣下夫輕道人主以誅殺它日手滑雖吾輩亦未敢自保也弼終不謂然其後兩人相繼出使弼還自河北至國門不許入未測上意比夜傍徨不能寐繞床歎曰范六丈聖人也六月以狄青為樞密副使中丞王舉正言青出兵伍為執政本朝所無恐四方輕朝廷左司諫賈黯亦言國初武臣有忠勳者不可勝數然未聞以卒伍登帷幄者今不可有五四夷聞之有輕中國心一也小人無知翕然向之撼搖人心二也大臣將恥與為伍三也不守祖宗成規而自比五季亂政四也青雖才勇未聞有破敵功失駕馭之術五也皆不能奪秋七月智髙遁初魏瓘知廣州築城鑿井蓄水作大弩為守備至是智髙為雲梯土山攻城甚急又斷流水而地堅井飲不竭弩發輒中中輒洞潰智髙力屈時知英州蘇緘募壯勇數千人赴難屯邉渡村扼其歸路得黃師宓父縳之以徇又畨禺縣令蕭注亦募土丁及海上强壯三千餘人與智髙衆格鬭焚其戰艦即日發縣門援兵及民持牛酒芻糧相繼入城城中始有生意時轉運使王罕方往潮州議鹽事知廣州仲簡募人置書足間間要罕罕得書即亟歸行至惠州州之惡少乘人不寧相率為盜田里驚擾罕入城鎮撫及郊遮罕求救護者數千人罕慰諭之曰己召兵行至矣然其實未知䇿所出也乃思其父嘗言遇事有疑當謀諸老者老者未必智過人但涉世久故也乃遣左右擇父老可與語者得數十人召問之父老曰某屬各有佃客少者數家多者數十家欲隨鄉村自召集家有兵器者願授之使相保聚罕曰有佃客者計如是得矣無佃客奈何吾有以處此矣時罕所至村有耆長三人人有壯丁五七至十人𨽻之乃召耆長令發田民增壯丁人各二百又召尉亦令發里民增弓手二千已時下令約申時而集有榜募有才伎方略者皆聽自效許有功大者賞以官次者賞以金帛頃之得數千人閲試可用尤善者以為大甲頭次者以為小甲頭約使領衆而耆長所發久之無至者時有一婦人訴僕夫奪其叉珥且汚辱之罕斬以徇曰此耆長發為壯丁不肯行者又得剽掠者十八人皆斬之徇如初於是民相傳竦動至申時耆長三人得壯丁六百尉得弩手二千皆集罕使十人為小甲置小甲頭百人為大甲置大甲頭及副主之取庫絹染緋為大小旗幟授之得牛羊數千令戶出湯割革為盾形柔之湯中每革削竹籖十六夾穿之以木為鼻使持以自蔽又斬枯竹數千銛其首使持以為兵得公私弓矢刀槍皆以授民約令備守田里遂安因檄告境內及傍州縣皆准此行之數日衆大集威望遂振州之惡少年皆已𨽻行伍不得復動外之他盜亦不敢發罕於其間選鋭士得三千人又選鋭卒魁梧有材伎者得數十人以舟百四十艘載之建旗幟作樂順流趨廣州未至從卒有進言者曰廣之南門去水尚百餘步賊兵在旁如吾衆趨門賊若來搏之必亂矣於是使士皆登岸斬木為鹿角得數千既至使從卒魁梧有材技者先以鹿角登岸上屬於南門須臾積之髙數尺智髙建黃蓋擁衆臨觀相去二三十步間見已設鹿角遂不犯罕徐勤兵作樂開南門以入於是蔬薪食物始通人心稍安益修守備智髙知不可拔凡圍五十七日始解去自清逺濟江擁婦女作樂而行攻賀州不克張忠楊逵李貴邀擊之于白舊路口龍岫峒並死之陷昭州鈐轄李正隆死焉又襲殺蔣偕於太平埸八月以孫沔為廣南安撫使內侍石全彬副之初以沔知秦州入見上以秦事勉之對曰臣雖老然秦州不足煩聖慮陛下當以嶺南為憂也臣觀賊勢方張官軍朝夕當有敗奏既而張忠等敗聞上聞南事誠如沔料時己命余靖經制廣東西盜賊乃除沔湖南江西安撫使沔以南方兵連為賊所破氣懾不可用請益發騎兵且增選偏禆二十人求武庫精甲五千參政梁適折沔曰毋張皇沔曰前日惟無備故至此今指期滅賊非可以邀幸勝乃欲示鎮靜耶夫實備不至而貌為鎮靜危亡之道也居二日促行才與兵七百沔憂賊度嶺而北乃檄湖南江西曰大兵且至其繕治營壘多具燕犒賊疑不敢復侵沔行至鼎州復有詔加廣南東西路安撫使九月命狄青討智髙上己命孫沔余靖而猶以為憂於是青上表請行青入對自言臣起行伍非戰無以報國願得蕃落數百騎益以禁兵羈賊首致闕下上壯其言遂除青宣徽南院使宣撫荆湖經制廣南賊盜事入內都知任守忠為之副知諫院李廣言唐失其政以宦者觀軍容致主將掣肘是不足法遂罷守忠青以賊便於乘髙履險步兵力不能抗故每戰必敗願得西邉蕃落兵自從或謂南方非騎兵所宜髙若訥言蕃落善射耐艱苦上下山如平地當瘴未發時疾馳破之必勝之道也青卒用騎兵破賊冬十月智髙陷賔州守臣程東美遁復入雍州守臣宋克隆遁廣西分三路置宜容雍三州安撫都監樞密副使王堯臣請析廣西宜容雍州為三路以融柳象𨽻宜州白髙賓雷觀鬱林化滕梧龔瓊𨽻容州欽賔亷橫潯貴𨽻雍州遇蠻入冦三路會支郡兵經略安撫居桂州以統制焉亦益募澄海忠敢土軍分屯全永道三州米以餉之罷遣北兵逺戍詔狄青審議青以為便遂行之十一月壬寅朔日有食之十二月録唐顔真卿後癸巳皇祐五年春正月詔止交趾援兵從狄青之請也初交趾請出兵助討智髙余靖以便宜許而請於朝狄青奏曰假兵於外以除內冦非我利也以一智髙橫踐二廣力不能制乃假蠻夷兵蠻夷貪得無義因而啓亂何以禦之願罷交趾助兵上從之丁度薨臨其喪時為參知政事是日旬休上趣駕臨奠度性純質居一室十餘年無姬侍一日召諸子謂曰王旦為相十五年其子猶為布衣汝曹宜自力吾不復有請矣後諡曰文穆會靈觀災狄青敗智髙於雍州先是命廣西鈐轄陳曙擊智髙於金城驛曙素無威令既遇賊士卒猶聚博營中乃倉卒被甲以前遂致覆軍王承吉等並死之狄青合孫沔余靖之兵自桂州次賔州青以張忠蔣偕皆輕敵取死軍聲大沮前戒諸將無得妄與賊鬭聽吾所為曙恐青獨有功乘青未至以步卒八千犯賊潰於崑崙關其下殿直袁用等皆遁青曰令之不齊兵所以敗晨會諸將堂上揖曙起并召用等三十二人按所以敗亡狀驅出軍門斬之沔靖相顧愕然靖嘗迫曙出戰因離席而拜曰曙失律亦靖節制之罪青曰舍人文臣軍旅之責非所任也諸將皆股栗青頓申令軍中休十日賊覘者還以為軍未即進或說智髙曰騎兵利平地宜遣兵守崑崙勿使度險俟官軍疲而食盡擊之無不勝智髙驟勝而輕官軍不用其言明日整軍青將前陳沔將次陳靖將後陳以一晝夜絶崑崙關出賊不意陳歸仁鋪智髙悉衆列陳以拒官軍使驍勇執大標槍衣絳衣望之若火而羸弱在後青陳少却先鋒將孫節死之賊氣鋭甚沔等懼失色時青匿蕃落騎兵在後前鋒將楊遂出挑戰殺十數人青登高自執五色旗麾騎兵張左右翼從後出夾攻左者右右者左已而左者復左右者復右禆將張玉率騎兵出陳前而橫貫其壘賊大潰會日暮智髙復趨雍官軍追五十里斬數千級獲僞官黃師宓以下五十七人先是青誓曰不待令而舉者斬右軍將賈逵恐賊先據髙乃引軍趨山賊至逵擁衆而下擊斷其陳賊既潰詣帳下請罪青拊其背曰違令而勝權也尚何罪智髙夜焚城遁由合江口入大理國遲明青按兵入城梟師宓等首城下收金帛馬牛以巨萬計斂尸五千築為京觀時有賊尸衣金龍衣衆以為智髙已死欲以上聞青曰安知非詐乎寧失智髙不敢以誣朝廷貪功也時瘴霧昏塞或謂賊毒水上流飲者多死青甚憂之一日有泉湧寨下汲之甘衆遂以濟謠言農家種糴家收至是符之智髙暴殘一方凡一年吏民不勝其毒捷奏至上喜謂龎籍曰青破賊皆卿執議之力智髙母阿儂氏弟智光子繼宗繼隆檻至京師後智髙死於大理國函首至乃悉棄市以宋祁知定州祁前在成德軍請弛河東陜西馬禁蕃落民間自相買賣民養馬勿升户等居三月徙定州又上言天下根本在河北河北根本在鎮定以其扼敵衝為國門户又曰欲兵之强莫如多榖與財欲士訓練莫如擇將欲人樂鬭莫如賞重而罰嚴欲敵顧望莫敢前莫如使鎮重而定强又曰天下久平馬益少臣請多用步軍臣料朝廷與敵相攻必不深入窮追驅而去之及境則止然則不待馬而步可用矣臣請損馬而益步故馬少則騎精步多則鬭健我能用步所長雖契丹多馬無所用之又曰夫鎮定一體也自先帝以來為一道帥專而兵不分故定揕其胸則鎮犄其脅勢自然耳今判而為二其顯顯有害者北塞山川要險之地裂而有之平時號令文移不能一敵脫叩營壘則彼此不相謀誰肯任責耶臣請合鎮定為一路願以將相大臣領之無事時以鎮為治所有事則遷治定指授諸將權一而責有歸士無茍且之意䇿之上也又曰河東馬强士習善馳突與鎮定若表裏然東下井陘不百里入鎮定矣敵若深入以河東健馬佐鎮定兵掩其惰若歸者萬出萬全此一竒也又上禦戎七論二月復以狄青為樞密副使兼宣徽南院使上欲擢青為樞密使同平章事龎籍曰昔曹彬平江南太祖只賜錢二十萬緡而已青雖有功未若彬之大若賞以此官富貴極矣異日更立功將何官以賞之乃有是命仍賜第及優進其諸子咨詠等官三月親試舉人賜鄭獬以下及諸科九百餘人及第出身有差奉三聖像如滁并澶州安奉太祖太宗真宗御容於三州神御殿集禧觀成即會靈觀也因火更作至是成遂改今名夏五月髙若訥罷以狄青為樞密使時凡內降恩髙若訥多覆奏不行入內都知王守忠欲得節度使若訥固執以為不可又欲直留後若訥持之若訥畏惕少過而前騶毆路人至死御史奏彈之議者方以為青賞薄而內侍石全斌又為青訟功於中乃罷若訥而遷青中丞王舉正力爭不能奪故事罷樞密使降麻及若訥罷但舍人草制遂為例孫忭御史中丞忭性篤厚寡言質略無威儀雖久處顯要循循無所建明及制下諫官韓絳論奏忭非糾繩才不可任風憲忭即手疏曰臣觀方今士人趨進者多亷退者少以善求事為精神以能訐人為風采捷給若嗇夫者謂之有議論刻深若酷吏者謂之有政事諫官所謂才者毋乃謂是乎若然臣誠不能也上察其言趣令視事且命知審官院忭辭以任言事不當兼事局乃止求直言待制以下許請對許奏封事秋七月作鎮國神寶奉宸庫有良玉上不欲以為服玩詔天子有八璽乃命參知政事梁適撰名曰鎮國神寶而刻之閏月定內侍員內侍供奉官至黃門以一百八十人為額龎籍罷出知鄆州以言者論其黨庇親戚堂吏受賂也以陳執中梁適為平章事八月䇿制科武舉趙彥若所對疏濶罷之先是制舉就祕閣試者凡十八人有司獨取彥若於是又被黜去議者謂宰相陳執中不由科第以進故隂諷有司專抑儒士非彥若實不能也武舉五十一人授官有差前詔罷武舉今所擢皆祕閣舊經試者云以唐介為御史中丞是後介入對上褒諭曰聞卿守節自被謫未嘗以私書至京師介頓首謝卒無一言以自明介貶斥不二嵗復召議者言天子優容言事之臣自古未有也冬十一月丙申朔日有食之龍圖閣直學士知耀州趙師民上疏曰近太陽蝕於正朔此是天意欲以感動聖心臣非瞽史不知天道但率愚意言之其月在亥亥為水水為正隂其日在丙丙為火火為正陽月侵日隂侵陽下蔽上之象也今聖心慈仁恭儉動循典禮自非下蒙上邪撓正使主恩不下究而誰之咎欲望陛下咨心膂之臣洎耳目之官其忠而純者與之遴簡內外百執州縣牧宰使主恩下究而不為羣邪所蔽則億兆之幸也時著作佐郎劉義叟見日蝕心又胡瑗鑄鍾弇而直聲鬱而不發及陕西鑄大錢乃曰此所謂害金再興與周景王同占上其惑腹心之疾又月入太微義叟曰後宫將有喪乎解唐介言職介數論事因言於上曰臣繼今言不行必將固爭爭之急或更坐黜是臣重纍陛下願聽解言職許之改直集賢院欲以安全之也旱蝗時左司諫賈黯言水旱之災雖堯湯所不能免臣讀隋史見所立社倉取之以時藏之於民下足備凶災而上實無所利願效隋制立法乃下其說司農寺復下諸路度可否其以為可行者才四路餘或謂賦稅之外兩重供輸或謂恐招盜賊或謂已有常平足以贍給或謂置倉煩擾於是黯復奏諸路所陳類皆妄議若謂賦稅外兩重供輸則法意乃教民儲積以備水旱官非自利若謂恐招盜賊則盜賊利在輕貨不在粟麥若謂已有常平則常平之設蓋所以平穀價使無甚貴甚賤之傷又今國用頗乏所蓄不厚近歲非無常平小有水旱輒流離餓殍則是常平果不足以賑救也若謂置倉斂財煩擾則義倉之設本為百姓宜無所憚况今州縣治郵傳驛舍皆斂於民豈於義倉獨畏煩擾人情可與樂成不可與謀始如臣言可采願斷而行之然牽於衆論卒不果行十一月己巳郊三聖並侑先是有詔自今南郊三聖並侑十二月禁轉運進羡餘有增盈者留為本路移用先是嘗命李中師為淮南轉運使中師入辭上謂曰比聞諸路轉運使多獻羡餘以希進然遇災傷不免暴取於民此朕所不取也其戒之以吳中復為監察御史用中丞孫忭所薦也忭未始識其面或問之忭曰昔人恥為呈身御史今豈薦識面臺郎耶九朝編年備要卷十四
