body:
  text: 九朝編年備要巻十二宋陳均撰仁宗皇帝起癸未慶厯三年止甲申慶厯四年癸未慶厯三年春正月置徳順軍建渭州籠竿城為之從王堯臣之議也堯臣再安撫陜西歸奏言鄜延環慶其地皆險固易守惟涇原為戎人之衝今置帥府於涇州誠合事機因論禦戎之䇿其一鎮戎軍接賊界西北則有三川定川劉璠等寨皆漢蕭闗故地朝廷若謂葛懐敏之敗諸寨不足禦扞遂為棄地則鎮戎為孤壘矣其二渭州籠竿羊牧隆城静邊得勝四寨内則為渭州藩籬外則為秦隴襟帶請建置為軍擇路分都監一員知軍專提舉四寨其三原州西有路通環州與敏珠黙藏等族相接須擇武臣知環原二州相為表裏使招輯蕃部其四儀州城纔四五里三分軍民二分在外設若賊至居民必大遭剽掠亦宜預備其五涇州雖為次邊然沿涇河大川道路平易當賊騎之衝此實近裏控扼之會其張村直入州路宜營作闗栅或斷為長塹以遏奔衝其一路事勢如此望下韓琦范仲淹相度施行從之初曹瑋開山外地置籠竿等四寨募弓箭手給田使耕戰自守其後將帥失撫御稍侵奪之衆怨怒遂刼徳勝寨主姚貴閉城門叛堯臣適過境上作書射城中諭以禍福且發近兵討之吏白堯臣曰公奉使且歸報天子耳貴叛非公事也堯臣曰貴土豪頗得士心然初非叛者今不乗其未定速招降之後必生事為朝廷患貴果出降堯臣為申明約束如瑋之舊乃歸錄唐狄仁傑後元昊請納欵初元昊黨有伊哷剛朗凌裕勒且三人皆有材謀剛朗凌即旺榮也親信用事時邊臣多欲以謀間之會剛朗凌令朗黙特善沁瑪囊等三人詣知青澗城种世衡請降以欵我師世衡知其詐曰不若因以為間使監商稅有僧王光信者趫勇善射習知彼中山川道路世衡嘗使為鄉導奏補官改名嵩世衡為蠟書遺剛朗凌遣言朗黙特等已至朝廷知王有向漢心命為夏州節度使旌節已至趣其歸附以棗綴畫龜喻意剛朗凌得書大懼自所治執嵩歸元昊元昊頗疑其貳已不得還治所且錮嵩穽乃遣李文貴以剛朗凌㫖報世衡且言不達所遺書意豈欲通和乎世衡白龎籍籍疑其詐留文貴青澗城數月賊果大入敗懐敏於定川籍於是自青澗城召李文貴至諭以禍福逆順縱使還報元昊得報乃出王嵩禮之甚厚使與文貴復以伊哷旺榮書來會朝廷厭兵且議招懐使籍報以書而謂旺榮為太尉籍言太尉三公非陪臣所得稱使旺榮當之則元昊不可得臣矣今其書自謂寧令或謨寧令皆畨中官稱於義亡嫌至是元昊遣偽官賀從朂與文貴俱來稱男邦泥定國烏珠朗霄上書父大宋皇帝籍不敢以聞從朂曰子事父猶臣事君也若得至京師天子不許則更歸議之籍上言敵今辭禮浸順必有改事中國之心請遣使者同往申諭之於是命梁適往延州與定議范仲淹韓琦言元昊如大言過望為不改僭號之請則有不可許者三如卑辭厚禮從烏珠之稱亦有大可防者三朝廷以其名分未正遣著作佐郎邵良佐與從朂至其國更議之集賢校理余靖言挫北戎之氣折西羌之銳不如不和最為得䇿又曰必不得已而與貨財須作料錢公使名目使將靈鹽寧夏作兩鎮則賜予倍於往時而君臣名分不改矣或欲速成和好而屈名分則天下共恥之雖强兵在境有喪氣而已矣元昊尋遣使同良佐來所要請凡十一事其欲稱男而不為臣猶執前議鹽鐵判官任顓為館伴一切折以義辭屈而去命張子奭報使是冬元昊復遣其臣張延夀等繼來時元昊已稱臣而猶欲自賣買及以青鹽通中國增嵗賜至三十萬詔惟許置𣙜場博易增賜五萬其議乃顓所上者初右正言孫甫言與西人議和有四害契丹嘗使人諭之使臣中國今必恃功一也邊備復弛二也元昊得專力以制嘉勒斯賚三也朝廷始議更張救弊今茍和又復安逸四也願陛下熟圖之至是甫又言今日尤在預擇將帥夫擇將之術無他在於責大臣而已昔周世宗以秦鳳之亂命宰臣王溥擇將而得向拱既成功而世宗謂溥曰平秦鳳卿之力也蓋自古良將多由輔臣薦用去嵗定川之敗陛下憂憤未已大臣乃言懐敏非材所致而邊事未足以煩聖念此實欺君之言且西戎為邊患數年大臣不能選良將及其敗也則曰將帥非材以茍免其過豈非欺君之言乎責成之術不可更循前失今陜西兵官惟种世衡狄青王信材勇可戰可守自餘闇懦險貪者大臣不可謂不知也茍不知何以共謀國事既知而更置惟在於速而議者或謂秦州有嘉勒斯賚之援賊必不敢入此又不料事機之甚也嘉勒斯賚自為曹瑋所敗豈無怨心近嵗朝廷授以節制使圖元昊受命以來未嘗有一毫之效前月元昊破轄戬而嘉勒斯賚不敢出救既不敢救其子況能為秦州之援乎惟朝廷謹擇將帥而深圖之二月立四門學以士庶子弟為生員三月吕夷簡罷守司徒同議軍國大事先是夷簡數求罷陜西轉運孫沔上言祖宗有天下垂八十餘載未嘗以言廢人景祐以前紀綱未甚廢猶有感激進說之士觀今之政是可痛哭無一人為陛下言者由宰相多忌而不用正人也夷簡在中書二十年三冠輔相言聴計行有宋得君一人而已未知何以為陛下報夷簡意謂四方已寧百度已正欲因病默默而去無一言啟沃上心别白賢不肖雖盡南山之竹不足盡其罪也若薦賢材合公議雖失之於始猶得之於終猶可寛天下萬世之責茍遂容身不救前過以柔而易制者升為腹背以姦而可使者保為羽翼以諂佞為君子以庸懦為長者使之在廊廟布臺閣上惑聖明下害生靈是張禹不獨生於漢而李林甫復見於今也在陛下察之而已書聞上不加罪議者喜其直至是夷簡以久疾求去上嘗剪髭賜之和藥未幾有是命增諫官員命王素歐陽修知諫院余靖為右正言諫院供職時陜西師老兵頓京東西盜起吕夷簡既罷相上遂欲更天下弊事故增諫官員命素等為之未幾蔡襄以詩賀素等言多勸激素等以其詩奏之遂命襄知諫院當時謂之四諫夏四月以韓琦范仲淹為樞宻副使命鄭戩為陜西四路都部署兼招討等使以代之琦仲淹以西事未寧凡五辭不許而後就道富弼言天下之人皆謂朝廷進用大臣常在此日太平不難致然西冦未殄亦須藉材若二人俱來或恐闕事羣論皆願召來一名使處于内一名就授副樞之命且令在邊表裏相應事無不集以臣愚亦謂此說甚當未幾諌官歐陽修亦言琦仲淹久在陜西備諳邊事是朝廷親信委任之人況二臣才識不類常人其所言所見之事不同常式陛下最宜加意訪問望時御便殿特召琦等從容訪問使其盡陳西邊事宜合如何處置杜衍為樞宻使初以樞宻使召夏竦於蔡州臺諌交章論竦在陜西畏懦茍且元昊嘗榜塞下得竦首予錢三千為賊所輕如此會竦至國門言者益衆王拱辰對上極言上未省遽起拱辰引上裾畢其說前後言者合十八疏上乃罷竦歸本鎮而用衍代之王堯臣為三司使堯臣始受命言於上曰今國與民皆弊矣在陛下任臣者如何請自擇僚屬上納其言于是辟張昷之杜杞十餘人為副使判官後果以辨治聞是嵗堯臣取陜西河北河東三路未用兵前及用兵後嵗出入錢帛糧草之數計之寶元元年未用兵陜西入一千九百七十萬出二千一百五十萬河北入二千一十萬出一千八百一十萬河東入一千三十萬出八百五十萬用兵後陜西入三千三百九十萬出三千三百六十萬河北入二千七百四十萬出二千五百五十萬河東入一千一百七十萬出一千三百萬又計京師出入金帛寶元元年入一千九百五十萬出二千八百八十萬是嵗郊祀故出入之數視常嵗為多慶厯二年入二千九百二十萬出二千六百一十萬皆有竒時入内都知張永和建議取民僦舍錢十之三以助軍費堯臣入對曰此衰世之事召怨而擕民唐徳宗所以致朱泚之亂也鹽鐵副使杜濰畏永和附會其説堯臣奏黜濰議乃定堯臣為三司使凡三年前使借内藏錢數百萬堯臣皆按籍還之而軍國之費猶沛然有餘益梓䕫三路轉運皆乞增鹽井課堯臣以上恩未嘗及逺人反牟取厚利適足以斂怨請罷之吕夷簡歸第蔡襄論之也㝷加司徒致仕初夷簡罷相以樞使召夏竦㝷代以杜衍同時進用富弼韓琦范仲淹在二府歐陽修等為諫官於是國子監直講石介喜曰此盛徳事也歌頌吾職其可已乎乃作慶厯聖徳詩略曰皇帝龍興蹙然言曰予有大業實賴輔弼汝得象殊重謹㣲宻君仍相予笙鏞斯協昌朝儒者學問該洽汝貳二相庶績咸秩又曰惟仲淹弼一䕫一契天實賚予予其敢忽曰衍汝來汝予黄髮遂長樞府兵政無蹶予早識琦琦有竒骨可屬大事敦厚如勃又曰惟修惟靖立朝䡾䡾素相之後含中履潔並為諌官正色在列衆賢之進如茅斯拔大姦之去如距斯脫予望太平日不踰浹詩所稱多一時名臣其言大姦蓋指竦也詩出孫復曰子禍始於此矣時仲淹琦適自陜西還朝道中得詩仲淹撫股謂琦曰為此怪鬼輩壊了事也琦曰天下事不可如此如此必壊時介出入大臣之門頗招賓客預政事人多指目介不自安求出通判濮州未赴卒後上謂輔臣曰自昔小人多為朋黨亦有君子之黨乎仲淹對曰臣在邊時見好戰者自為黨而怯戰者亦自為黨其在朝廷邪正之黨亦然惟聖心所察爾茍朋而為善則於國家何害也竦銜介而仲淹等皆修素所厚善修言事一意徑行不以形迹嫌疑顧避竦因與其黨造為黨論目衍仲淹及修為黨人修乃作朋黨論上之略曰朋黨之說自古有之惟幸人君辨其君子小人而已又曰小人無朋惟君子則有之小人所好者利祿也所貪者財貨也當其同利之時暫相黨引以為朋者偽也及其見利而争先或利盡而交疎則反相賊害雖其兄弟親戚不能相保故臣謂小人無朋其暫為朋者偽也君子則不然所守者道義所行者忠信所惜者名節以之修身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者但當退小人之偽朋用君子之真朋則天下治矣又曰書曰受有臣億萬惟億萬心周有臣三千惟一心億萬人各異心可謂無朋矣而紂用以亡三千人惟一心可謂大朋矣而周用以興蓋君子之朋雖多而不厭故也於是為黨論者惡修擿語其情狀乃使内侍藍元震宻疏言范仲淹歐陽修尹洙余靖前日蔡襄謂之四賢斥去未幾復還四人得志遂引襄為同列以爵祿為私惠膠固朋黨轉相汲引不過三二年布滿要路則誤朝迷國誰敢有言上終不之信也五月丁卯朔日有食之忻州地大震命轉運提刑並兼按察參用歐陽修之言也仍詔嵗具官吏能否以聞提㸃刑獄雖不帶使名並准此築欽天壇先是大旱得雨輔臣稱賀上曰天久不雨將害民田朕每焚香上禱於天昨夕寢殿中忽聞㣲雷遽起冠帶露立殿下須臾雨至衣皆沾濕移刻雨霽再拜以謝方敢升階自此尚冀槁苗可救也章得象曰非陛下至誠曷以致天應若此上曰比欲下詔罪己撤樂減膳又恐近於崇飾虚名不若夙夜精心宻禱為佳爾㝷命築壇於禁中曰欽天置武學于武成王廟沂州卒王倫叛討平之殺巡檢使朱進欲冦青州不得入遂轉掠淮南所向莫敢當是秋獲於和州斬之歐陽修言近日四方盜賊寖多可謂腹心之疾今沂州軍賊王倫所過楚泰等州連騎揚旗如入無人之境而巡尉返赴賊奪其衣甲器械皆約束而歸之假令王倫周游江海之上南掠閩廣而斷大嶺西入巴峽而窺西蜀殺官吏據城邑誰為扞禦者此可謂腹心之大憂為今計者必先峻法令法令峻則人知所畏自趍而擊賊請自今賊所經州縣奪衣甲官吏並追官勒停巡尉仍除名若賊入州城而不能捕知州亦勒停都監監押仍除名若賊發而朝廷别差人捕獲其本界巡尉仍坐全火不獲之罪詔送樞宻院施行余靖亦乞嚴為督賊賞罰等法從之六月詔諸路條茶鹽等利害詔曰議者多言天下茶鹽礬鐵銅銀坑冶之有遺利朕懼開掊刻之政嘗抑而弗宣然尚慮有過取而傷民者轉運使其諭所部官吏條上利害以聞初議欲弛茶鹽之禁及減商稅既而范仲淹以為茶鹽商稅之入但分減商賈之利固於商賈未甚有害也今國用未省嵗入不可闕既不取之於山澤及商賈必取之於農與其害農孰若取之商賈今為計莫若省國用國用有餘當先寛賦役然後及商賈弛禁非所當先也其議遂寢秋七月詔二府請對許非時請對定文武臣解官持服制詔自今三司副使以上非領邊寄而遭父母喪者並聽從官終制武臣非當邊而願解官者亦聽之嘉祐四年九月詔帶閤門祇候使臣内殿崇班以上太子率府率及正刺史以上遭父母喪並聽解官行服宗室解官仍給全俸罷陜西内地營田從韓琦之言也琦言興置營田本欲助邊以寛民力除沿邊有空閑膏腴土地可以開墾外其近裏州縣官吏不能體朝廷之意將逺年瘠薄無人請佃逃田抑勒近鄰人户分種或令送納租課緣人户自用兵以來科率勞弊至於已業尚多荒廢實無餘力更及營田其所出租課多是虚抱送納請應陜西近裏州軍營田一切廢罷從之范仲淹宣撫陜西先是諫官歐陽修等言仲淹有宰輔才不宜局在兵府願罷王舉正以仲淹代之上從其請以仲淹為叅政富弼為樞宻副使仲淹曰執政可由諫官而得乎固辭不拜弼直攜誥命納於上前口陳所以牢避之意因乞補外不許仲淹既辭叅政願與韓琦迭出行邊上因付以西事而仲淹又言河東亦當為備任師中嘗守并州上即命使河東兩人留京師地先移文兩路仲淹又請近臣同使每事議而後行庶無差失詔命田況為副使八月詔諌官日赴内朝從知制誥田況之請也況言唐兩省自諫議大夫至拾遺補闕共二十人每宰相奏事諌官隨而入有所闕失即時規正皆中書門下之屬官也今諫議大夫無復職業自司諫正言知諫院皆補遺之任而朝廷皆責其言如大夫之職矣然地勢不親位序不正在朝廷間與衆人同臣前在諫院每聞一事皆諸處采問比及論列或至後時兼王素歐陽修蔡襄皆以他官知諫院居兩省之職而不得預其列於理未便詔送兩制詳定奏乞欲今後比龍圖閣及修起居注例令日赴内朝從之況嘗奏事論及政體上頗以好名為非意在遵故常況退而著論上之畧曰名者由實以生非徒好而自至者也堯舜三代之君非好名者而鴻名休徳倬若日月不能纎晦者有實而然也又曰陛下儻奮乾剛明聴斷則有英睿之名行威令懾奸宄則有神武之名斥奢汰革風俗則有崇儉之名澄冗濫輕會斂則有廣愛之名恱亮直惡諛媚則有納諫之名務咨詢達壅蔽則有勤政之名責功實抑僥倖則有求治之名今皆非之而不為則天下何所望乎抑又聖賢之道曰名教忠誼之訓曰名節此羣臣諸儒所以尊輔朝廷紀綱人倫之大本也陛下從而非之則教化㣲節義廢奊詬無恥之徒争進而勸沮之方不行矣豈聖王率下之意乎時蝗潦繼作上責身引咎躬祈道佛並走羣望況又言所以致災由役斂重而民愁怨役斂之重由國計日窘國計日窘由冗兵日繁今兵踰百萬比先朝幾三倍矣陜西河北河東三路民力耗敝人共知之不足言矣江淮菽麥已登而官責民輸錢物遂大賤其他科調不可勝計中産以下往往絶食民愁如此未聞陛下與兩府大臣議所以救之乃欲以一爐香數祝牌上塞譴咎臣所以不得已而言也夫國之養兵其上者戰其下者役茍不堪此則為冗食今諸路宣毅廣捷等軍其間孱弱者甚衆大不堪戰小不堪役逐處惟務廣募以邀賞格豈復顧國家之利害哉宜分遣幹臣㨂選諸路宣毅廣捷等兵不堪戰者並降為廂軍不堪役者並放停議者必曰兵驕日久恐以致亂此慮事之踈者也往年韓琦汰邊兵萬餘人豈聞有為亂者今天下財用不足以贍冗兵尚或顧惜不思救弊之原臣竊憂之以范仲淹參知政事富弼為樞宻副使初弼以奉使賈昌朝以館伴有勞弼除樞宻副使昌朝參知政事弼力辭上奏其意堅特改命弼為翰林侍讀學士至是復以命弼弼猶固辭會元昊使辭羣臣班紫宸殿門上俟弼綴樞宻院班且坐乃使宰臣諭曰此朝廷特用非以使北故也弼不得已乃受知諫院蔡襄言已差仲淹宣撫陜西又除參知政事未有巡邊之日竊以西賊遣使入朝其言驕慢必無可從之理原其狡心本無欲和之意朝廷既罷遣之其勢必須用兵邊將雖多莫如朝廷輟柄臣以臨之柄臣之中莫如仲淹自行望於西人未行之間早遣巡邊無使後時以失大計韓琦宣撫陜西先是范仲淹任師中分路宣撫踰月皆未行琦言賊恐乗忿盜邊當速遣仲淹河東臣方壯可備奔走師中宿舊大臣毋勞往乃詔琦代仲淹師中卒不行琦既至陜西屬嵗大饑羣盜嘯聚商虢之郊張海郭貌山黨君子范三李宗者為之渠率而光化軍叛卒邵興亦聚衆為亂琦遣官屬授方畧悉討平之闗輔遂安堵是嵗大旱河中同華等十餘州饑民相率東徙琦選官分詣州縣發省倉以賑之蒲華同三州所活百五十四萬餘人他州人稱是又選禁軍不堪征戰者停放一萬二千人是冬召琦歸闕罷武學既立武學而議者以為古名將如諸葛羊祐杜預裴度等豈嘗専學孫吳立學無謂乃罷之九月桂陽蠻冦邊河南提刑楊畋募兵討之平其六峒命輔臣條奏急務上既擢范仲淹韓琦富弼等每進見必以太平責之數令條奏當世之務仲淹語人曰上用我至矣然事有後先且革弊於久安非朝夕可能也上再賜手詔復曰比以中外人望不次用卿等今琦暫往陜西仲淹弼宜與宰臣章得象盡心事國毋或有所顧避其當世急務有可建明者悉為朕陳之既又開天章閣召對賜坐給筆札使疏於前仲淹弼皆惶恐避席退列奏十事一曰明黜陟文武不論勞逸賢否一以嵗月叙遷非堯舜考績之法請二府非有大功大善不遷内外官須在職滿三年在京百司非保舉選差者須通滿五年乃得磨勘二曰抑僥倖任子法敝冗濫日增請罷少卿監以上乾元節恩澤正郎以下若監司邊任須在職二年始得䕃子弟大臣不得薦子弟任館閣三曰精貢舉進士試詞賦諸科試墨義不考經行請諸路州軍學皆置教授其取士科進士先䇿論後詩賦諸科兼通經義發解者不封巻首參考履行無闕者以名聞四曰擇官長刺史縣令計資而遷多不得人請委二府先選轉運使提點刑獄大藩知州次委兩制三司御史臺開封府官諸路監司舉知州知州舉知縣限其人數以舉主多者從中書選除五曰均公田外官職田不均吏祿薄不能安廉請均其入而第給之六曰厚農桑臣知蘇州日檢點簿書一州之田係出稅者三萬四千頃中稔之利每畝得米二石至三石計出米七百餘萬石東南每嵗上供之數六百萬石乃一州所出臣詢訪髙年則云曩時兩浙未歸朝廷蘇州有營田軍四都共七八千人專為田事導河築堤以減水患於時民間錢五十文糴白米一石今江浙圩塘大半隳廢故縣官責糴於民京東西所在積水請每嵗預下諸路令吏民言農田利害選官治之别定勸課之法以減漕運七曰修武備聚兵京師財力不給請約府兵法募畿輔强壯五萬為衛士以助正兵三時教戰省給贍之費畿輔有成法則諸道舉皆可行八曰減徭役户口耗而吏員不減民所以重困也請省縣邑户少者為鎮倂使州兩院為一職官白直給以州兵其不應受役者悉歸之農九曰覃恩信三嵗一赦蠲除逋責而所在廢格主恩請違者重寘於法每赦後别遣使按視其所當行者十曰重命令百司建立法度率爾頒行旋復釐改請先委政事之臣參議可以久行者删去煩冗裁為制勅行下既而弼復以二國隂相連結自契丹得燕薊以北拓拔得靈夏以西其間豪傑皆為之用文書法令畧與中國等而勁兵驍將尤其所長者我尚待以勍敵庶幾可禦乃别為二䇿以上槩以止僥倖去宿弊為本及欲漸易監司之不才者使澄汰所部吏其言如是而上方信嚮仲淹悉用其說當著為令者皆以詔書畫一頒下獨府兵輔臣共以為不可而止以章得象監修國史兼譯經潤文使自是譯經潤文降麻入銜矣冬十月光化軍兵亂討平之嚴監司選以張昷之王素沈邈為河北淮南京東路都轉運按察便用范仲淹富弼等之言也先是仲淹等請詔二府通選轉運按察使既得人即委逐路自擇知州知州自擇知縣於是昷之等首被兹選時以髙易簡祖無擇王鼎宋選楊畢分使諸路既而又選京朝官劉緯周沆李上交髙惟幾梁戢張固王綽王罕曹穎叔為之諫官歐陽修亦乞差按察使糾察年老病患贓汙不才四色之人並行澄汰且曰天下之事積弊已多欲事事更變則力未能周而煩擾難行欲漸漸整緝則弊已極而未能速效如欲用功少為利博及民速於事公則莫若精選明幹朝臣十許人分行天下盡籍官吏能否坐而升黜之如臣前所陳而後可淮南舊以二稅折變得羨緡數十萬素至罷之嵗計亦辦素未嘗以細故摘發官吏初若濶於事情然所布耳目甚廣間有被按者皆罪法必得故人人若素坐視其家莫敢為非矣㝷又以李絢為京西轉運按察使時范雍知河南王舉正知許州任師中知陳州任布知河陽並二府舊臣絢皆以不才奏之仲淹之選監司也取班簿視不才監司每見一人姓名一筆勾之弼曰一筆勾之甚易焉知一家哭矣仲淹曰一家哭何如一路哭耶遂悉罷之㝷又用杜杞為廣西轉運按察復轉運判官定遷秩格用范仲淹所上十事其一者明黜陟也詔畧曰兩府臣僚非有勲徳善狀不得非時進秩罷者毋以轉官帶職為例兩省以上舊四年一遷官今具履厯聴㫖京朝官磨勘年限内有無勞績及舉者數取㫖朝官須三年無私罪而有監司若清望官五人為保任方遷員外郎舉者數不足增二年遷郎中少卿監亦如之遷大卿監諫議弗為常例悉聴㫖監物務入親民次通判知州皆用舉者數不足毋輒闗陞城水洛初徳順軍之西南二百里有城曰水洛川平土沃環城雜氐數萬帳又有水輸銀銅之利曹瑋在秦州時嘗經營不能其後静邊寨主劉滬宻使人說城主多斯曩令内附會陜西都部署鄭戩行邊滬遂召多斯曩來獻水洛給公地為屬户戩言若就築為城可得蕃兵三五萬人共捍西賊從之戩即令滬將兵往受地既至而氐情中變聚兵數萬圍之滬兵纔千數前後數百里無援滬坐胡床指揮進退一戰而氐潰追奔至石門皆稽顙請服因盡驅其衆𨽻麾下以通秦渭之路樞宻副使韓琦言臣宣撫陜西至涇原聞修水洛城頗為未便蓋其功以百萬計又須三四千兵守之所費如此止求一日通秦渭援兵況滬等進兵小蕃亦豈能阻是雖無水洛之援官軍自可往來乃詔罷戩四路都部署改知永興軍而戩又極言城之便命滬董士廉督役如故知渭州尹洙亦以為不便召滬士廉歸不聴洙怒乃使副都部署狄青械滬士廉送徳順軍獄氐衆驚擾收積聚殺吏民為亂戩力争於朝乃命鹽鐵副使魚周詢與戩相其利害既至而氐衆詣詢願助工役詢是戩議乃復以滬為寨主而坐城之滬坐違本路帥命詔降一秩而士廉亦罰金後士亷詣闕訴洙知渭州日以公使錢貨與部將及私自貸詔遣御史劉湜就鞫於渭州湜希宰相意頗傅致重法洙竟坐貶湜既還擢知雜御史㝷除鹽鐵副使洙後與孫甫相遇二人皆好辨論對榻語幾日無所不道而洙未嘗一言及湜者甫問曰劉湜乃欲致師魯於死者而師魯未嘗一言及之何也洙曰洙與湜本無不足其希時宰意欲害洙乃湜不能自立爾洙何恨於湜乎甫由是深服其識量十一月上清宫災㝷有詔以宫地為禁軍營定館職格此用范仲淹所上十事二曰抑僥倖也詔兩府及大兩省官不得乞子弟為館職及讀書之類進士上三人一任回進文召試補之復監察御史裏行以李京包拯為之二人中丞王拱辰所薦也景祐初置殿中侍御史裏行監察御史裏行凡四人既而乆闕不除於是詔以兩人為額京嘗知魏縣奉法嚴正吏不便欲以竒中京遂相率遁去監司果議以苛刻斥知府任布曰如此適墮吏計中京賴以免拯合淝人事父母以孝聞嘗知天長縣有訴盜割牛舌者拯使歸屠其牛鬻之既而又有告殺牛者拯曰何為割某家牛舌而又告之盜者驚伏徙知端州州嵗貢研前守緣貢率取十倍以遺權貴人拯命製者才足貢數嵗滿不持一研歸更䕃補法亦用范仲淹所上十事其二曰抑僥倖也詔略曰今之䕃補推恩大廣疎宗稚齒並皆仕進其著為令使夫冢嗣先錄以篤為後之體支子限年以明入官之重設考課之格立保任之條宰相使相舊䕃子為將作監丞期親太祝奉禮郎參樞子太祝奉禮郎朞親校書郎僕射尚書三司使翰林至樞宻直學士丞郎子校書郎或正字朞親寺監主簿今子及朞親尊屬如舊餘屬第補試銜龍圖閣直學士至知雜子寺丞主簿朞親試銜惟長子如舊餘屬第補試銜郎中省府推判官館職舊郊恩許薦補其嘗以贓抵罪復官至郎中及員外郎任官職者止䕃一子凡選人年二十五以上遇郊限半年赴銓投狀於尚書試論或賦經義律文及格者放選不中者守選三試不中有京朝官三人保任者補逺地判司簿尉京官年二十五以上赴試於國子監考法如選人中格者調官其武臣使相樞宻宣徽節度使子為供奉官朞親侍禁統軍至内客省使子侍禁朞親殿直客省至閤門使子殿直朞親奉職刺史至諸房副承㫖子奉職期親借職子及期親尊屬如舊餘屬第官之參班者於軍頭司試弓弩三班院試書算試六韜孫吳義中格而兼弓弩或試武藝而兼通書算者皆為優等補邊任武藝不羣而答䇿詳備者為異等引見聴㫖長子不限年餘子孫年過十五弟姪年過二十乃得䕃自是任子之恩殺矣然猶未大艾也限職田此用范仲淹等所上十事其五曰均公田也自大藩長吏二十頃至簿尉監當各有差自此人有定制土有定限吏以職田抵罪比前日稍希濶焉五星同出東方司天監言主中國大安十二月以南京府學為國子監禁獻祥瑞是月澧州獻瑞木有文曰太平之道諫官歐陽修言方今西羌叛逆未平之患在前北陲驕悖藏伏之禍在後一患未減一患已萌加以西則瀘戎南則湖嶺凡與西夷連接無一處無事而又内則百姓困敝盜賊縱横昨京西陜西出兵八九千人捕數百人之盜不能一時翦滅只是僅能潰散然却於别處結集今張海雖死而達州軍賊已數百人又殺使臣其勢不小興州又奏八九千人州縣惶惶何以存濟以臣視之乃是四海騷然萬物失所實未見太平之象臣聞天道貴信示人不欺臣不敢逺引他事只以今年内事騐之昨夏秋之間太白經天累月不滅金木相掩近在端門考於星占皆是天下大兵將起之象豈有纔出大兵之象又出太平之字一嵗之内前後頓殊星象麗天異不虛出宜於戒懼常合修省而草木萬類變化無常不可信慿臣又思若使木文不偽實是天生則亦有深意蓋其文止曰太平之道其意可推也夫自古帝王之太平皆自有道得其道則太平失其道則危亂臣視方今但見其失未見其得也願陛下憂勤萬務舉賢納善常如近日不生逸豫則三二嵗間漸期修理若以前賊張海等小衰便謂後賊不足憂以近京得雪便謂天下大豐熟見北陲不舉兵便謂必無事見西賊通使便謂可罷兵指望太平漸生安逸則此瑞木乃誤事之妖木爾上納之詔諸祥瑞不許進獻皇祐三年無為軍獻芝草上曰朕以豐年為瑞賢臣為寶至於草木魚蟲之異焉足尚哉詔却之知軍茹孝標特免罪仍戒天下自今毋得以聞河北雨赤雪河東地震凡五六日不止孫甫上疏言赤雪者赤眚也人君舒緩之應晉太康中河隂降赤雪時武帝怠於政事荒宴後宫每見臣下多道常事不及經國逺圖故招赤眚之怪終致晉亂地震者隂盛也隂之象臣也後宫也戎狄也三者不可過盛盛則隂為變而動矣唐髙宗本封於晉及即位晉州經嵗地震宰相張行成言恐女謁用事大臣隂謀宜制於未萌其後武昭儀專恣幾移唐祚天地災變固不虚應今陛下救舒緩之失莫若自主威福時出英斷以懾奸邪救隂盛之變莫若外謹戎備内制後宫此應天之實也甫又曰景福内庫祖宗積經費之餘以備非常之用近嵗諸路之物多入内庫昔唐置瓊林大盈二庫率供燕侈楊炎陸䞇請罷之今景福之積頗類唐二庫且後宫之數臣雖不知但聞三司計肉食者千餘人近聞染院染綾甚急以備宫中支用而左藏所積紅羅去冬已絶他物稱此則浮費可知也惟陛下罷省之立可感動人心以消災譴上曰用物在有司朕恨不知耳甲申慶厯四年春正月宜州蠻歐希範反討平之是夏以杜杞為廣西轉運按察兼安撫趣明年討平之杞誘殺希範及降者六百餘人寶元初朝廷出兵討安化叛蠻杞時知横州言横為邕欽廉三郡咽喉可屯兵應援三郡願擇文臣練嶺外事者以為牧守使經制邊事於是執政請用杞諌官余靖言朝廷蓄養賢俊當如民家收蓄財貨平時先有營度至急乃得其用伏自去年已來陜西舉知州始用杜杞三司擇判官則又用杞京西多盜賊則又用杞今兹蠻人作叛則又用杞皆席未遑煖而移之是使杜杞有奔命之勞朝廷有乏賢之歎如斯事體良亦可惜今二年之内講求賢俊只知有一杜杞何觀聴之不廣示天下之狹也設使别路更有賊盜則將又移杜杞無乃取笑四方乎每見大臣謀事當平居無事時優游暇逸如不足憂者及一隅有警則倉皇移易如素不經心者且去年冬兩府大臣共選諸路轉運使田瑜為廣西轉運使梁載為判官必謂才能出人今蠻徼纔動未見瑜等如何處置有甚利害早已疑之此擇人之術不自信矣始若不知則如勿用只如近差王絲往河南安撫待其奏報不中事節乃其人不可委任知人不明為害不細伏望陛下敕諭兩府大臣廣思博採天下賢才以應萬務無使臨事倉卒有乏才之歎則社稷之福二月賑陜西饑出内庫銀三萬兩罷陜西都部署復分路置使從韓琦之言也開經筵上御迎陽門召輔臣觀圖畫皆前世帝王之迹可為規戒者因命天章閣侍講曾公亮丁度翰林侍讀學士王洙等講讀數刻乃罷自元昊反罷進講崇政殿說書趙師民寶元二年上書言十五事畧曰輔相之本在於進賢退愚不可使浮躁之徒以希附獲進幽素之倫以間隔見廢又曰將帥敗衂亦慮陛下將將之未盡善又曰今兹之近侍將來之宰輔也當謀於老臣考其篤行又曰用兵以來吏能尤鮮嚴督責以為善治促賦斂以為能才外飾拊養之名内行苛刻之實或束疲民以為軍卒受招募之賞或縱姦吏傍緣公賦逞率割之欲又曰將領之臣私其左右而暴虐吏士衣食之不恤器械之不利舉天下之衆困於小夷用是故也又曰昔晁錯上言募人徙邊今近塞數千里而田氓將百萬徒患所以教養馴馭未盡其方人力殫盡國用衰減有邊民而不善用也茍知積聚之術盡發縱之能比之逺戍之士新募之卒其才勇豈但倍哉又曰諫官御史不務規正專為伺察掎摭纎㣲之釁訐揚幽昧之私豈諍臣皆非其人所以諮詢之義未當也又曰帝王治經與品庶異不獨玩空文占古語也天下無事右文之治於是在天下有事經武之圖於是出今方外小有事臣等不復進見二年矣茍不足奉大問則屛斥之無足惜以為先王之遺籍故人之陳篇可以講無事之朝不足贊有為之世臣愚以為過矣又曰唐徳宗中才之主遜於畿甸一詔罪己天下知其中興近詔書之下先自稱美其有災咎又為文飾士民識者豈無觀笑代言之臣非皆求媚習使然爾累千餘言又為勸講箴以獻至是乃復命講讀經史上嘗謂公亮等曰卿等宿儒博學多所發明朕雖盛暑亦未嘗倦但恐卿等勞耳丁度進曰自古帝王臨御日久非内惑聲色則外窮兵黷武陛下即位三十年孜孜聖學雖堯舜之聰明不是過因頓首稱謝三月詔州縣立學更定科舉法此用范仲淹等所上十事其三曰精貢舉也仲淹意欲復古勸學數言興學校本行實詔近臣議於是翰林學士宋祁等合奏言今教不本於學校士不察於鄉里則不能覈名實有司束以聲病學者專於記誦不足盡人材臣等參考衆說擇其便於今者莫若使皆土著而教之於學校則學者修飭矣先䇿論則文詞者留心於治亂矣簡程式則閎博者得以馳騁矣問大義則執經者不專於記誦矣乃詔州縣立學本使者選屬部為教授不足則取於鄉里宿學之有道業者士須在學三百日乃聴預秋試舊嘗充試者百日而止試於州者令相保任有匿服犯刑虧行冒名等禁三場先䇿次論次詩賦通考為去取而罷帖經墨義士通經術願對大義者試十道可為永式初保寧軍推官胡瑗教授湖州科條纎悉備具諸生信愛如其子弟至是下湖州取其法著為學令是冬詔罷日限以余靖言廣黌舍所以待有志之士去日限所以寛食貧之人或者謂仲淹既去而執政意皆異故有是詔賜近臣御書御邇英閣出御書十三軸凡三十五事一曰遵祖宗訓至三十五曰一善可求小瑕不廢大抵皆述上念祖宗下思政治安危成敗忠邪善惡等事及危竿論一篇上顧學士丁度等曰朕觀書之暇取臣僚上言及進對事目可施於政治者書以分賜卿等度暨天章閣侍講曾公亮楊安國王洙等既拜賜請釋其義許之既而度等上答邇英聖問一巻上覽之終篇指其中大者六事付中書樞宻院行之答聖問者即所釋三十五事也其序畧曰自古求治之主行此數事在明與威斷爾明則不惑威則善柄斷則能行總是三者守而勿失非聖人孰能為之唐憲宗留心庶政宰臣陳說政要必曰卿等既為朕言之當須行之勿空陳而已李絳對曰非知之艱行之惟艱臣等亦願陛下日與輔臣舉而行之無使唐之君臣專美前代也上嘗謂輔臣曰朕每令講讀官敷經義於前未嘗令有諱避近講詩國風多刺譏亂世之事殊得以為鑒戒章得象對曰陛下留思六經能逺監前代興亡之迹此誠圖治之要皇祐四年夏内出欹器以示講讀官丁度等初太宗嘗作此器真宗著論上製後述焉江淮兩浙旱夏四月以錫慶院為太學尋罷之判國子監王拱辰等言首善自京師漢太學二百四十房千八百餘室生徒三萬人唐學舍亦千二百間今國子監才二百楹不足以容學者請以錫慶院為太學從之越來春以三司言更造錫慶院財乏費多而北使錫宴之所不可闕詔别擇地瀘夷冦邊五月忻州地震有聲如雷幸國子監謁文宣王舊儀揖上特再拜次詣武成王廟皆非常禮元昊復稱臣自號夏國主復遣其臣尹興則楊守素來議事諫官余靖言景徳中契丹舉國深入先帝與之對壘河上止以三十萬物通和今元昊解仇與物遂至二十六萬且元昊書其名雖順其詞甚悖自言通和之事非其本心今與物雖多豈敢撤備又契丹聞元昊得物之數寧不生心凡元昊所求不宜盡許惟審計之先是樞宻副使韓琦參知政事范仲淹並對上四䇿曰元昊定川之戰作偽詔誘邊人欲定闗中蓋漢多叛人陷於窮漠必以符秦元魏事游說元昊使其侵取漢地而以漢人守之則富貴可如其意乃知非獨元昊志在侵漢實漢之叛人為賊謀也為今之䇿當以和好為權宜以戰守為實務試畫一言之其一曰元昊屢乗戰勝而乃輒求通順所獲者大利所屈者虚稱國家以生靈為念不可不納此和䇿之得也其二曰久守之計則莫若蓄土兵蓋其衆諳山川而習戰鬭比之東兵其功相倍然沿邊土兵數少當益招置之若有近裏土兵願改𨽻邊寨者即遷其家而團聚之此守䇿之得也其三曰元昊巢穴實在河東河外之兵懦而罕戰惟横山一帶人馬精勁恱習戰鬭與漢界相附毎入冦必為前鋒請於鄜延環慶涇原三路各為三軍觀賊之隙使三軍互掠於横山元昊若失横山之勢可謂斷去右臂此攻䇿之得也其四曰臣等既以三䇿陳之又以北陲為憂請朝廷力行七事以防大患一宻為經畧二再議屯兵三專於選將四急於教戰五訓練義勇六修京師外城七宻定討伐之謀其二論再議屯兵以為自來真定府定州髙陽闗分為三路其所轄兵馬未甚整齊乃有一州兵馬却屬兩路之處又未曉本路將來於何處控扼合用重兵若干又甚處只宜固守合屯兵若干及三路互相應援次第須差近臣徃彼宻為經略方可預定法制臨時不至差失其四論急於教戰以為今河北所籍義勇雖約唐之府兵法制三時務農一時教戰然未建府衛之官而法制不行號令不一須别選知縣縣令可治兵者幷增將校使人人各知軍中之法應敵可用斯為强兵制勝之本矣其六論修京師外城以為後唐無備契丹一舉直陷京師契丹之心於今驕慢且邊城堅而難攻京師坦而無備北戎一朝稱兵必謀深入我以京師無備必促河朔重兵與之力戰彼戰或勝則更無所顧直趨澶淵若京城堅固則戒河朔之兵勿與戰彼不得戰則無乗勢之氣欲謀深入則前有堅城後有重兵必將沮而自退退而不堅則邀之擊之皆可故修京城者非徒禦冦誠以伐深入之謀是日琦仲淹指陳上前數刻乃罷諫官余靖言竊聞大臣建議内有修京城置府兵二事伏以廟堂議論天下具瞻帝王言動萬世為法安危所繫舉措非輕事之幾㣲不可不重難與慮始人之常情臣願陛下深思逺慮以安民為本臣請縷陳二事望陛下擇其可否臣聞西賊僭號之初宋郊請修函谷闗此時闗中動搖謂朝廷棄闗西而自守今無故而修京城乃是捨天下之大而為嬰城自守之計四方聞之豈不動搖强弱之勢正在此矣無戎而城春秋所譏守在四夷義不如此又前嵗以邊鄙之警而河北諸路揀點鄉兵天下百萬農夫皆失其業北陲嫚書亦隨而至乃是鄉兵之利未集而先致其害也況今北陲之賂既厚西戎之好既講雖知信誓不可卒保嗷嗷蒼生咸望帖泰而都畿之下先自擾之根本不寧四方何所望哉昔魏侯恃險吳起以為失詞宣王料民山甫言其害政惟是二者皆古今之所戒而安危之所起願陛下捨此二䇿别議逺圖之術二䇿竟不果行時仲淹受命主西事富弼主北事弼㝷條上河北守禦十二䇿大畧守䇿其一曰河北三十六州軍沿邊次邊北京雄霸等冀祁保瀛莫滄鎮定十一州廣信等七軍北平一寨總十九城皆要害之地定為右臂滄為左臂瀛為腹心北京為頭角此四城乃河朔之望也餘十五城為指爪支節乃四城之所使也瀛定滄各置一帥北京置一大帥餘十五城分屬定瀛滄三路擇善將守之都用兵三十萬分置十九城左敗則右救縱失則横援其外十七城不復置兵只以本郡鄉兵堅守不使出戰其二曰十九州軍寨在河朔尤為要害乞選差長吏並使久於其任其三曰除上十九州軍寨長吏選人久任外其餘小大文武官並十九州軍長吏以下並乞詔本路監司帥臣舉充或委樞宻院三班審官銓司選擇其四曰備軍食據守邊兵合留外駐泊屯駐就糧諸軍分屯於河南等州遇有警急發符召之不旬月可到又緣大河置敖倉支河南民稅及漕江淮粟實之亦足以寛河朔乏困之民其五曰河北最號勁兵處敵每入境惟懼北兵臣願自入河北募土人為禁兵每一指揮即代南一指揮歸營不數年三十萬盡得北兵又教之精勇則匈奴自當畏服其六曰北國風俗貴親率以近親為名王將相以治國事以掌兵柄而信任焉所以視中國用人亦如己國燕王威望著於北國燕薊小兒夜啼輒曰八大王來也於是小兒輒止啼每牽牛馬渡河旅拒未進又曰必是八大王在河裏其畏如此北使每見南使未嘗不問王安否及所在今年王薨識者亦憂之謂王之生北國以朝廷為重王之薨北國以朝廷為輕矣臣願陛下擇宗室中年長知書識道理曉人事數人為王幾千里内州内可以藩屛王室外可以威示四夷此有國之急務也禦䇿其一曰北國惟懼邊兵每聞以南兵替入内地北人大喜願自今北國若入冦緣邊土兵只在本處不復令部署司抽移若逐處土兵尚少却以南兵益加其二曰彼且守盟不動則無先發但用臣上篇屯兵之法足以固守萬一渝盟入冦用臣之䇿可以轉禍為福逞志洩憤矣何以陳之今敵若冦邊必由廣信西而來敵騎初入詔緣邊州軍堅壁示若不得出敵兵必不顧而進將及鎮定亦堅壁敵必易我而懈於是令廣信安肅保州三城開壁會兵張擊之揚聲而不與戰敵必分兵備禦已而令鎮定亦閉壁不與戰敵既前後受敵必不敢長驅而南於是我急從滄州取海上路以數千艘出輕兵三萬趍平州入符家砦口則咫尺燕薊矣雄霸之間即景徳敵騎東歸之路也又出精兵二萬直抵燕京會滄州兵擣其腹心破其積聚敵見兩下兵入莫知為計矣燕地既亂入冦者必有歸心又為王師所縈而不能遂去於是乗其向背之際使沿邊三城及鎮定兵合擊必大破之追奔及燕盡逐敵騎過山後以兵守居庸闗古北口松亭闗符家砦則敵騎無復南者因其妄動可以一舉而復全燕之地拔數郡陷蕃之族平累朝切骨之恨臣自謂無遺䇿矣假陛下謹重未欲為此即請冦入之後屯重兵於西山下敵雖有所掠而東出無路進退不遂於是以十九城之兵分布掩擊必使退敗敵勢既屈於和則久亦制匈奴之下䇿也其三曰結燕薊豪傑使為内應其四曰招納髙麗使有牽制内顧之憂其五曰鎮定西山有谷口十餘道盡通北界山後之路景徳以前溪峒峻狹林木壅遏故敵騎罕由斯路而入今聞契丹自山後斬伐林木開鑿道路直抵西山漢界今則往來通快可以行師當得廉幹謹宻者隂往經制如何屯戍如何禦捍先事而定以待其來其六曰祁深舊非要郡宿兵至少城壘迫而痺陋宜廣而髙之以防攻迫其七曰漢唐以前匈奴入冦率由上郡鴈門代州定襄等路蓋中國據全燕之地有險可守自石晉割燕薊入契丹中國無險可守故敵騎直出燕南不復㝷定襄等路今朝廷若留意河朔邊郡有備敵不可得而入須從别路以來或雖可入冦第取定襄等路為之防凡此守禦十二䇿十三條是臣庚辰壬午年奉使契丹日於河北往回十餘次詢沿邊土豪幷内地父老博採叅較得之甚詳伏望陛下令兩府會議可者速行之其未可者更相致詰而是正之又曰惟願解臣宻職典河朔一要郡得以拙勤經營邊事或可稍寛陛下北顧之憂疏凡累千言弼疏所指八大王者謂燕王元儼也乃太宗子薨於是年春諡恭肅六月開寶寺塔災修起居注余靖上疏曰五行之占本是災變宜戒懼以答天意而聞有詔取舊瘞舍利入禁中道路傳言舍利在内庭有光怪竊恐巧佞之人推為靈異再圖營造臣聞帝王之道能勤儉厥徳咸得人心則雖危險後必安濟近自西陲用兵國帑虚竭民亡儲蓄十室九空陛下如不恤民病廣事浮費以奉佛求福非天下所望也若以舍利經火不壊即本在土中火所不及若言舍利能出光怪必有神佛慿之此妄言也且一塔不能自衛為火所毁況藉其福以庇於民哉昔梁武帝造長干塔時舍利亦常有光及臺城之敗何能致福況乎外夷軍校皆呼舍利入宫不諱之語尤可惡也范仲淹宣撫陜西河東始仲淹以忤吕夷簡放逐者數年士大夫指二人曲直交指為朋黨及陜西用兵天子以仲淹士望所屬拔用䕶邊及夷簡罷召還倚以為治中外想望其功業而仲淹亦感激眷遇以天下為己任遂與富弼日夜謀慮興致太平然規模濶大論者以為難行及按察使多所舉劾人心不自安任子恩薄磨勘法宻僥倖者不便於是謗毁浸盛而朋黨之論滋不可解然仲淹弼守所議弗變先是石介奏記于弼責以行伊周之事夏竦怨介斥己又欲因是傾弼等乃使女奴隂習介書久之習成遂改伊周曰伊霍而偽作介為弼撰廢立詔草飛語上聞上雖不信而仲淹弼始恐懼不敢自安於朝皆請出按西北邊未許適有邊奏仲淹因請行乃有是命時仲淹疑契丹入冦欲大發兵為備杜衍謂契丹必不來兵不可妄出仲淹争議上前詆衍語甚切仲淹嘗以父事衍衍不以為恨既退仲淹猶力争韓琦曰若爾則琦當請行不須朝廷一人一騎仲淹怒再求對首奏琦語然兵卒不發仲淹亦不以為忤也初仲淹之出也過鄭州因見吕夷簡問何事遽出仲淹對以暫往經撫兩路事畢即還夷簡曰君此行正蹈危機豈復再入仲淹未喻其㫖京師旱蝗上謂輔臣曰方嵗旱而飛蝗滋甚百姓何罪而罹此默禱上帝願歸咎於眇躬章得象對曰臣等不能輔理宣化致災斯民且貽陛下憂今聖言及此必有以上感天心矣諫官余靖等言臣等伏覩陛下以災變屢見飛蝗為孽責躬引過祈於天地宗廟社稷不令殃及萬方臣等伏念災異之來實由人事政治闕失感動天地今陛下既有引過之言達於天地神祇矣伏乞陛下必踐其言必行其實踐言行實之要莫若專聴斷攬威權號令信於人恩澤及於下則災異消而和氣生矣秋七月宗室徳文封東平王始用富弼議次第封拜宗室為郡王國公者凡十人以徳文屬尊且賢方漢東平王蒼故事封東平王契丹來告伐元昊曰元昊負中國當誅今將兵臨賊境或元昊乞稱臣幸無亟許其實以納契丹降人討之託中國為名也上以契丹來書及朝廷復書宣示承㫖丁度學士王堯臣吳育宋祁中丞王拱辰知雜沈邈度等謂來書大意以元昊不順朝廷遂乗釁興兵恐深入之後却歸朝廷乞拒而不納今答書便云於元昊理難拒絶則是得新附之小羌違久和之强敵莫若以大義而兩存之臣謂宜降詔與元昊言昨許再盟蓋因契丹有書來言彼是甥舅之親遂議開納今却知國中誘契丹邊户虧事大之體違納欵之本意當須復順契丹早除嫌隙則誓書封册便可施行仍乞於契丹回書中言已降詔與元昊若執迷不復則議絶未晩如此則於西人無斗絶之曲於北鄙無結怨之端於是復書略曰聞親師徒直臨賊境若以元昊於北朝失事大之體則自宜問罪若以其於本朝稽効順之故則不煩出師況延州近奏元昊已遣楊宗素賫誓文入界若不依初約則猶可沮還如盡遵承則何以却也乃命右正言余靖報使宗真親將至夏國境上各據山嚴兵相待曩霄奉巵酒為夀大合樂折箭為誓及罷契丹夜以兵劫曩霄反為所敗曩霄縱其去韓琦言今朝廷若便謂太平則後有大患者三若慮及經逺則後有大利者一羌人雖暫稱臣而嵗邀厚賂且契丹勢素强而夏人尚敢與之抗若使其國充實我邊備少弛則必窺圖闗輔此大憂一也契丹西討不得志而見朝廷封册曩霄心必不樂異日或隳盟誓此大憂二也今嵗遺契丹五十萬夏國二十五萬取之於民日以朘削不幸數乗水旱之災則患生腹心此大憂三也契丹恃强欲吞夏人而反敗恐自此交兵未已若能練將卒蓄財用坐待二國之弊則幽冀靈夏一舉可圖此大利一也陜西四路雖罷招討使而邊備不可弛請選近臣為之主帥委以大任使其經營一方又諸路昨招置宣毅兵僅十一萬欲乞除河東河北外其京東西淮浙江湖福建等路人每指揮可減以三百人為額上悉用其言八月保州軍亂討平之真定府定州路安撫田況遣李昭亮招降之降者二千餘其造逆四百餘人況盡得其姓名命楊懐敏率兵入城悉坑殺之餘悉分𨽻諸州宣撫使富弼恐復生變與都轉運使歐陽修相遇於内黄夜半屛人謀欲使諸州同日誅之修曰禍莫大於殺已降況脅從乎既非朝命諸州有一不從為變不細弼悟乃止富弼宣撫河北弼内求出以避夏竦之謗也以歐陽修為河北轉運按察使上面諭修曰勿為久居計有事第言之修對以諫官乃得風聞今在外使事有指越職罪也上曰事茍宜聞不可以中外為辭越明年修上言向被宻㫖令圖本道利害隂為邊備而臣之本司不得與機事非欲侵邊臣之權蓋調度軍儲須量舒急按察將吏宜知當否欲請與聞從之修又言北國近於界首添建城寨又侵過地界朝廷未有分明嚴切指揮令邊臣以理争辨竊料朝廷之意必謂争之恐有引惹之虞乃慮之過而計之失也臣又見朝廷有懼敵之色而無憂敵之心夫憂之與懼名近而意殊憂者深思極慮而不敢暫忘懼者臨事皇惑而莫知所措今邊防之事措置多失其機者懼敵之意過深也若能察其强弱之形得其情偽之實則目今之事誠不足懼而將來之患深有可憂奈何不憂其深可憂而反懼其不足懼自國家困於西鄙用兵常慮北戎合謀乘隙而動及見二國相失而交攻議者皆云中國之福夫幸其相攻為我之福則不幸使其解仇而復合豈不為我禍乎臣謂北國昨所以敗於元昊者亦其久不用兵驟戰而逢勍敵爾聞其自敗衂已來君臣恐懼日夜謀議選招丁口簡募甲兵處處開教閱之場家家括糧馬之數以其天姿驍勇之俗加以日夜訓練之勤則其强難敵矣今彼國雖未有人然大抵為國者久無事則人難見因用兵則將自出使其交戰既頻而謀臣猛將争能並出則是夾山一敗警其四十年因循之弊變驕心而為憤志化惰卒而為勁兵因屢戰而得驍將此乃北國之福非中國之福也此臣所謂將來之患者也然二國勢非久相攻者也一二年間不能相并則必復合使北國驅新勵之强兵無西人之後患而南向以窺河北又將來之大患也臣雖不知朝廷顧河北為如何但於本路之事以今年較去年則亦可見去年以前河北官吏無大小皆得舉材而擇能急於用人如不及者惟恐事之失計故也自今春以來差除漸循舊弊凡幹敏之吏熟於北方事者舉留奏乞百不一從不惟使材臣能吏不勸而怠亦足見朝廷不憂河北之事辦否也至如廢沿邊久任之制而徙劉貽孫以王世文當冀州李中吉當廣信王中庸當保州劉忠順當邢州如此數人于閑慢州軍尚憂敗政況於邊要之任乎然臣謂為國計者若不以北事為憂又怯懼如此既曰懼矣則於用人之際又若忽而不憂此臣之所未喻也夫事之利害激切而言則議者以為太過言不激切則聴者或未動心此自古以為難也況未形之事雖曰必然而敢冀盡信乎伏望陛下留意聴納不以人而廢言庶竭愚瞽少禆萬一初修有甥張氏少鞠於家嫁其姪晟後與僕姦事發鞫於開封修素以言事切直忤權貴争為惡言欲傾修詔户部判官蘇安世與中貴人雜治之卒白其寃修竟坐以張氏資買田立己名降知滁州安世詘監泰州稅詔戒按察苛刻從劉湜包拯之言也朝廷既降勅約束備載臺官所上之言歐陽修奏以為臣自聞降此約束日夜驚嗟竊思國家方此多事難了之時正當責人展效之際奬之猶恐不竭力疑之誰肯盡其心昨大選諸路按察之初兩府聚議數日盡破常例不次用人中外翕然皆謂一時之極選凡被選之人亦負其材業久無人知常患無所施為一旦忽䝉選用各思宣力争奮所長不惟欲報朝廷寧不更希進用豈可頓為欺罔便徇私情任人之術自古所難能立主張猶或有沮況過生疑異使其各自心䦨安能集事欲乞聖㫖令兩府召臺官上言者至中書問其何路之人因挾私怒茍有迹狀乞下所司辨明若實無人乃是妄說其近降劄子乞賜抽還不使四方自沮按察之權而為貪贓老繆之吏所快詔毋以輔臣所薦充臺諫九月吕夷簡薨上見輔臣涕下曰安得憂國忘身如夷簡者贈太師中書令諡文靖自上初立太后臨朝十餘年内外無間天下晏然夷簡之功為多其後元昊反四方久不用兵師出數敗契丹乘之遣使求闗南地頗賴夷簡計畫選一時有名之臣報契丹經畧西夏二邊以寧然建募萬勝軍雜市井小人浮脆不任戰鬭用宗室補環衛官驟增俸賜又加遺契丹嵗金繒二十萬當時不深計之至於後世費大而不可止夷簡當國柄最久雖數為言者所詆上眷倚不衰其所斥士旋復收用亦不終廢其於天下事屈伸舒巻動有操術後卒配食廟廷為世名相始王旦竒夷簡謂王曾曰君其善交之卒與曾並居相位後曾家請御篆墓碑上因慘然思夷簡書懐忠之碑四字以賜之晏殊罷殊初入相擢歐陽修等為諫官既而苦其論事煩數或面折之及修出使河北諌官奏留修不許孫甫蔡襄遂言章懿誕生聖躬為天下主而殊嘗被詔誌章懿墓没而不言又奏論殊役官兵治僦舍以規利坐是故絀然殊以章獻方臨朝不敢斥言而所役官兵乃輔臣例宜借者時以為非殊之罪云以杜衍為平章事兼樞宻使衍務裁僥倖每内降恩率寝格不行積詔㫖至十數輒納上前上嘗詔諫官歐陽修曰外人知杜衍封還内降耶凡有求干朕每以衍不可告之而止者多於所封還也冬十月蔡襄罷襄罷知福州襄與孫甫俱論陳執中不可執政不從於是兩人俱求出襄以親老乞鄉郡而孫甫使契丹未還也襄之知福州也薦進士周希孟為本州教授閩士多好學而專用詩賦以應舉襄得希孟專用經術傳授學者至數百人襄親至學舍執經講問為諸生率延見處士陳烈尊以師禮陳襄鄭穆學行著稱襄皆折節待之閩俗重凶事其奉浮圖會賓客以盡力豐侈為孝至有親亡不舉哭必破産辦具而後敢發喪襄下令禁止至於巫覡主病蠱毒殺人之類皆痛斷絶之其子弟有不率教令者條其事作五戒以訓敕之及襄去閩人為立徳政碑襄工筆札上尤愛之御製李用和碑文詔命襄書之其後温成皇后父清河郡王碑文上復命襄書之襄辭曰此待詔職也卒不奉詔十一月治進奏院獄罷黜蘇舜欽等監進奏院劉巽集賢校理蘇舜飲除名勒停史官檢討王洙等降責有差先是杜衍范仲淹富弼等同執政多引用一時聞人欲更張庶事御史中丞王拱辰等不便其所為而舜欽仲淹所薦其妻又衍女也少年能文章議論稍侵權貴會進奏院祠神舜欽循前比用鬻故紙公錢召妓女開席會賓客侍講王洙修注吕臻館職刁約章岷江休復宋敏求王益柔等與焉而益柔為衍所知或言益柔嘗戲作傲歌於是拱辰諷其屬魚周詢等劾舜欽易故紙得錢請屬吏燕飲因以危衍下開封府治其事拱辰遂言舜欽放肆狂率詆玩先聖實為害教舜欽巽俱坐自盜除名洙等皆得罪逐出世以為過薄而拱辰等方自喜曰吾一舉網盡矣獄事起樞宻副使韓琦言於上曰昨聞宦者操文符捕館職甚急衆聴紛駭舜欽等一醉飽之過止可付有司治之何至是陛下聖徳素仁厚獨自為是何也上悔見於色自仲淹等出使讒者益深而益柔亦仲淹所薦拱辰既劾奏宋祁張方平又助之力言益柔作傲歌罪當誅蓋欲因益柔以累仲淹也章得象無所可否賈昌朝隂主拱辰等議及輔臣進白琦獨言益柔少年狂語何足深治天下大事固不少近臣同國休戚置此不言而攻一王益柔此其意有所在不特為傲歌可見也上悟稍寛之時兩府合班奏事琦必盡言事雖屬中書琦亦對上陳其實同列尤不恱上獨識之曰韓琦性直詔戒朋黨苛刻畧曰朕聞至治之世元凱共朝不為朋黨何其盛也朕昃食厲志庶幾治古而承平之弊澆競相䝉人務交遊家為激訐更有附離以沽聲譽至或隂招賄賂陽托薦賢又按察將命者恣為苛刻搆織罪端奏鞫縱横以重多辟壬午郊十二月册元昊為夏國王嵗賜銀絹茶綵二十五萬五千元昊獻誓表乃以誓詔答之約稱臣稟正朔改所賜敕為詔而不名置𣙜場於保安軍及髙平寨第不用青鹽种世衡卒環原之間有敏珠宻藏康諾爾三族最大其北有二川交通西界宣撫使范仲淹議築古細腰城斷其路命世衡及知原州蔣偕幹其事世衡時之環州方卧病檄至即將所部甲士晝夜興築城成而世衡卒世衡善撫士卒得人死力在邊數年積穀通貨所至不煩縣官益兵增饋及卒青澗及環人皆畫像祠之時偕又築堡未成而為敏珠宻藏設伏邀擊偕從間道遁歸渭州伏庭下請死經畧使王素貸其罪令畢功自贖偕卒成之致其酋戮於市世衡之在環州也屬羌有牛努額素崛强未嘗出見州官聞世衡至乃來郊迎世衡與約明日當至其帳慰勞部落是夕雪深三尺左右曰努額凶詐難信且道險不可行世衡曰吾方以信結諸胡可失期耶遂冒雪而往既至努額尚寝世衡蹴起之努額大驚曰吾世居此山漢官無敢至者公了不疑我耶帥部落羅拜皆感激心服世衡又教土人習弧矢以佐官軍吏民有謀某事辭某事者必咸使之射從其中否而與奪之坐過失者亦用此得贖吏農工商無不樂射焉由是緣邊諸城獨環不求增兵不煩益糧而武功自振夏戎聞屬羌不可誘土人皆善射乃不復以環為意九朝編年備要巻十二
