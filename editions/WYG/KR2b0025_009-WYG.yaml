body:
  text: 九朝編年備要巻九宋陳均撰仁宗皇帝起癸亥天聖元年止癸酉明道二年癸亥天聖元年春正月議省浮費置計置司從三司使李諮之請也自宋興而吴蜀江南荆湖南粤皆號富強相繼降附太祖太宗因其蓄藏守以恭儉簡易方是時天下生齒尚寡而養兵未甚蕃任官未甚冗佛老之徒未甚熾外無夷狄金繒之遺百姓亦各安其生不為巧偽放侈故上下給足府庫羡溢承平既久户口嵗増兵籍益廣吏員益衆佛老夷狄蠧耗中國縣官之費數倍昔時百姓亦稍縱侈而上下始困於財矣諮言戍兵雖未可減宜裁省浮費鹽鐵判官俞獻卿亦言今天下穀帛日耗稻苗未生而和糴桑葉未吐而和買自天禧以下日甚一日宜與大臣議救正之上納其言乃命中丞劉筠與三司取景徳一嵗用度校天禧中所費省其不急者又詔三路軍儲出於山澤之利比聞移用不足遂置司領以樞副張士遜㕘政吕夷簡魯宗道至道末天下兩税嵗收穀二千一百七十萬石錢四百六十萬貫絹一百六十二萬疋它物不預焉上供錢一百六十九萬貫絹一百七十萬疋金一萬四千兩銀三十七萬兩又𣙜利所獲總一千一百萬貫皆有竒凡邦國内外舉一嵗之費錢一千六百萬貫金一萬四千兩銀六十二萬两絹三百三十萬疋粟二千一百九十萬石芻二千二百萬圍一嵗舉京城給文武官及諸司人奉錢四萬五百貫糧五十四萬石騎軍一嵗給錢六十八萬貫禄粟一萬四千石糧一百一十八萬石步軍一嵗給錢七十一萬貫糧一百八十二萬石皆有竒大抵若此而亦有盈縮焉天禧末天下總收錢二千六百餘萬貫總費錢二千七百一十餘萬貫穀帛之數不與焉國家三嵗一親郊祀計五百餘萬貫景徳郊祀七百餘萬東封八百五十餘萬祀汾隂上寳册後又増二十萬至道中兩京諸州𣙜酒嵗銅錢一百二十一萬餘貫天禧末増至七百七十九萬餘貫鐡錢不與焉其他賣麴及關市津渡等税率増倍之鹽有二類引池為鹽曰陜西解州解安邑兩池煑海為鹽曰京東河北淮南兩浙福建廣南凡六路煑井則川陜四路至道末顆鹽錢七十二萬餘貫末鹽錢一百六十三萬餘貫錢有銅鐡二等銅錢四監在饒池江建四州至道中嵗鑄八十萬貫景徳末至一百八十三萬貫大中祥符後銅坑多不發天禧末鑄一百五萬貫鐡錢三監在卭嘉興三州嵗鑄總二十一萬貫銅錢行於天下鐡錢止於川陜産金有商饒歙撫四州及南安軍産銀有桂陽開寳龍焙三監又五十一場在饒䖍信建等州京東淮南水遣使安撫三月行祟天厯行貼射茶法初茶法屢更然不能無弊上詔三府大臣經度乃命李諮與劉筠校歳入登耗更定其法至是因請罷三説行貼射茶法以淮南十三場本息併計其數罷官給本錢使商人與園户自相交易一切定為中估而官收其息然必輦茶入官隨商人所指而與之給劵為騐以防私售故有貼茶之名夏四月罷禮儀院令近臣舉官充臺諫翰林學士至三司副使知雜御史各舉太常博士以上堪充諫官御史者一人五月行邉郡入中芻糧見錢法亦從李諮之請也舊法商人入粟邉郡算請茶與犀象緡錢虛實三估至用十四錢易官錢百及諮變法以實錢入粟實錢售茶二者不得相為輕重既行而商人果失厚利怨謗蠭起秋七月罷廣東進異花天聖六年又詔温鼎廣等州嵗貢柑不得以貢餘為名餉遺近臣八月芝生大安殿召輔臣觀之御史鞠詠言陛下新即位河決未塞霖雨害稼宜思所以應灾變臣願陛下以進忠良斥邪佞為國寳以訓兵農積倉廩為天瑞草木之怪何足尚哉先是錢惟演自河陽赴亳州因朝京師意圗入相詠言惟演姦險嘗與丁謂為婚姻緣此大用後揣謂將敗恐併得禍因力攻謂若遂以為相大失天下望太后遣内侍齎奏示之惟演猶顧望不行詠語諫官劉隨曰若相惟演當取白麻庭毁之惟演聞之亟去九月馮拯罷拯氣貌嚴重宦者或傳詔至中書不延坐以病去位尋薨以王欽若同平章事欽若時知江寧府先是太后有復相欽若意上嘗為飛白書王欽若字太后因取字緘置湯藥合遣中人齎以賜且口宣召之欽若再相以上初臨政謂百官叙進皆有常法為叙進圖以獻冀便省覽然亦不能大用事如真宗朝矣閏月冦準卒于雷州初太宗常得通天犀命工為二帶其一命以賜準及是遣人取自洛既至後數日沐浴具朝服束帶北面再拜呼左右趣設卧具就榻而沒詔許歸𦵏道出荆南公安縣人皆設祭于路折竹植地掛紙錢焚之逾年枯竹盡出筍因為立廟號竹林冦公祠冬十月禁江南諸路巫邪江西俗尚鬼為巫覡以惑民病者不服藥而聽命於神雖欲飲食若曰神未許則寧忍饑以待故病人多死凡已之所資假神而言無求不可時夏竦知洪州索部中得一千九百餘家勒令還農毁其淫祠且以上聞故詔禁之嚴贓吏法知漣水軍鄧餘慶等四人坐贓決配嶺南後不盡錄尋詔犯入已贓毋入親民置益州交子務初蜀人以鐡錢重私為劵謂之交子以便貿易富民十六户主之其後富者資稍寡不能償所負争訟數起祥符末薛田為轉運使請官置交子務以權其出入議久不決至是始詔置務官主之錄行義時江州言義門陳藴年八十家同居二百年食口二千有行義補本州助教六年追號江南䖏士史虛白沖靖先生甲子天聖二年春三月賜舉人第宋郊葉清臣鄭戬以下及諸科凡四百八十餘人賜及第出身有差先是上封事者言經學未究經㫖乞於本科問策一道對者紕繆上以執經肄業不善為文特命取其所長用廣仕路並不黜落國朝策擢髙第者自清臣始郊與弟祁俱以詞賦得名時奏祁第一太后不欲弟先兄乃擢郊第一祁第十夏四月秋八月幸國子監謁文宣王退召直講馬龜符講論語又閲七十二賢賛述觀東序禮器圗因問待制馬元三代制度元悉引經以對上嘉歎之因幸武成王廟冬十一月丁巳郊先是上諭輔臣曰郊祀重事令禮官草具其儀朕欲先於禁中習之納皇后郭氏先是故兼中書令郭崇孫女及左驍衛上將軍張美女同被選入宫上欲立張氏而太后雅意属郭氏而以張氏為美人乙丑天聖三年春正月夏四月以劉煜知河南府煜先代郡人後魏遷都因家河南唐末五代之亂衣冠舊族世系多無所考惟劉氏自十二代祖北齊中書侍郎環雋以下仕者相繼至煜十一世皆𦵏河南而世諜具存煜知開封府嘗獨召見太后問曰知卿名族欲一見卿家譜恐與吾同宗也煜曰不敢它日數問煜無以對因偽風眩仆而出乃免六月涇原属羌冦邉趙士龍等死之遣使體量安撫陜西秋八月蠲責益州舉人館劵初益州舉人自張詠為守以來皆給館劵至京師及是三司移文乃責償於吏知州薛田以為言上曰漢貢士續食施於郡國今獨不能行之於逺方耶悉蠲之冬十月以王欽若兼譯經使十一月罷貼射茶入中復用三説法初李諮貼射茶法行之期年豪商大賈不能軒輊為輕重而論者謂邉糴償以見錢恐京師府藏不繼爭言其不便㑹江淮制置司言茶有滯積壊敗者焚棄之朝廷疑變法之弊諮等因條上利害且言乾興用三説法東南緡錢售八萬三千而京師實入緡錢五十七萬邉儲芻二百餘萬圍粟凡三百萬石天聖用新法東南緡錢十五萬五百而京師實入緡錢増一百四萬邉儲芻増一千餘萬圍粟増二百餘萬石二府大臣亦言所省又増收計為緡錢六百五十餘萬異時邉儲有不足以給一嵗者至是多者有四年少者有二年之蓄東南茶亦無滯積制置司請焚棄者特累年壊敗不可用者爾因言新法已見功緒盖積年侵蠧之源一朝閉塞商賈利於復故有以搖動而論者不察其實助為游説願力行之無為浮議所易於是詔有司榜諭商賈以推行不變之意賜典吏錢絹有差然論者不已乃詔侍講學士孫奭知制誥夏竦同究利害奭等因言十三場茶積而未售者六百餘萬斤盖許商人貼射則善茶皆入商人其入官者皆麄惡不時故人莫肯售又奸人倚貼射為名強市盜販而侵官利宜革其弊乃有是詔入中舊給東南緡錢者以京師𣙜貨務錢償之奭等議既用明年遂摭計置司所上天聖増虧數差繆付御史臺雜治獄成詔與議者條析吕夷簡等言自變法以來京師積錢多邉計不聞吿乏惟三司比視數目差互非執政所能親自校計於是張士遜魯宗道及夷簡皆罰俸一月出諮知洪州而竄典吏焉後有建議更茶法者上以問三司使冦瑊瑊曰議者未知其要爾河北入中兵食皆仰給於商人若官盡其利則商人不能行而邉民困於餽運矣茶法不可以數更上然之因詔輔臣曰茶鹽民所食強設法以禁之致犯法者衆但緣經費尚廣未能弛之安可數更其法也王欽若薨臨其喪太后臨奠錄親属二十餘人國朝以來宰相䘏恩未有欽若比者後上謂輔臣曰王欽若久在政府察其所為真奸邪也王曾曰欽若與丁謂林特陳彭年劉承珪時號五鬼其奸邪誠如聖諭十二月以張知白同平章事國朝故事叙班以宰相為首親王次之使相又次之樞宻使雖檢校三師兼侍中尚書中書令猶班宰相下咸平初曹彬以樞宻使兼侍中位户部侍郎平章事李沆下循故事也乾興初王曾由次相為㑹靈觀使曹利用由樞密使領景靈宫使時以宫觀使為重詔利用班曽上然議者深以為非至是曾進昭文館大學士玉清昭應宫使同集殿廬將告謝而利用猶欲班曾上閣門不敢裁上與太后坐承明殿久至遣押班江徳明趨閣門閣門皇惑莫知所出曾抗聲目吏曰但奏宰相王曾等吿謝班既定利用鬱鬱不平上使張士遜慰曉之尋詔宰相樞密使序班如故事而利用志驕尚居次相張知白上及聞召張旻于河陽為樞密使疑代已始悔懼焉丙寅天聖四年春正月夏四月卻川陜獻繡織初知寧州楊及因乾元節獻繡佛上謂輔臣曰及佞人也民安政舉乃守臣之職焉用此為詔還之併有是命越明年春詔罷瓊州玳瑁紫貝等貢五月詔大辟疑者以聞雖不當奏有司毋得舉駁先是天下雖聽奏覆而多以不應奏得罪故不敢上讞而寃獄常多判刑部燕肅言唐決刑在京五覆奏諸州三覆奏故貞觀開元間斷死罪少者二十九多者五十八今生齒未加於唐而天聖三年斷大辟二千四百有竒視唐幾至百倍望準唐故事天下死罪皆得一覆而不當讞者官吏不坐下其章中書王曾謂天下獄皆一覆奏則必死者徒充犴獄而久不得決乃降是詔其後上請者多得貸議自肅發之嘉祐五年同判刑部李誕言一嵗死刑二千五百六十而殺親属者一百四十欲條列所斷嵗上朝廷以助觀覽從之閏月定江淮嵗増額為六百萬石景徳中嵗漕不過四百五萬石後増至六百五十萬石先是發運司請於六路計民税一石量糴一斗五升嵗可更得二百萬石上不許曰常賦外増量糴是重擾吾民也時東南穀貴都官員外郎吴耀卿請約舊數立為中制乃降是詔然東南災荒輒減嵗漕數幾百萬或數十萬又轉移以給他路者時有焉召輔臣侍經筵時於崇政殿觀宋綬等讀唐書上因曰朕觀舊史見裴寂劉文静俱佐命之臣而不保其終王曾曰寂等及禍良以成功而不知退也皇太后命綬擇書上覽綬錄孝經論語要言及唐太宗帝範明皇聖無君臣政理論上之上嘗謂輔臣曰比以大暑罷講讀適已召孫奭等説書卿等公事暇可暫至經筵奭嘗掇五經切治道者為五十篇號經典微言上之後因邇英進讀三朝經武聖畧上曰真宗時李至言鄭文寳廷議禁西界青鹽為失策如何侍讀髙若訥奏青鹽之禁西人至今失其厚利乃策之得至言殆偏見也又讀至真宗朝李繼和上言國初李漢超在關南以私錢貿易佐公用人或繩奏之太祖及令盡除所過税上曰任人如此孰不用力哉六月大水上避殿減膳肆赦蠲田租撫流民時京師大雨平地水數尺壊民舎壓死數百人京東西及河北江淮以南皆大水故有是詔又令所在官物被水漂者並蠲除之水之作也宰相方晨朝未入俄有㫖散朝王曾亟附中使奏曰天變甚異乃臣等爕理無狀豈可退安私室恬然自處亟請入見陳所以備禦之道同列有先歸者聞之皆媿服焉時又傳言汴口決水且大至都人恐皆欲東奔上以問曾曾曰河決奏未至此第民間訛言相驚不足慮也已而果然秋七月罷陜西醋務初陜西轉運置醋務以榷利且請推其法於天下王曾曰𣙜酒盖出於前代之不得已未能省去若醋又𣙜則甚矣故罷之減兩川錦綺貢減嵗貢錦綺鹿胎透背等之半其上供花紗仍令改織絹以供邉費明道二年冬又詔以兩川嵗貢綾錦羅綺透背花紗三之一易為紬絹以供軍需九月廢襄唐二州營田務以田賦民租收半税先是二州荒田咸平初轉運使耿望奏置務嵗入甚廣後轉運張巽改其法務遂廢景徳中轉運許逖復奏興之至是轉運使言其非便詔遣屯田員外郎劉漢傑按視漢傑言二務共得穀三十九萬餘石為緡錢十一萬餘而吏與兵俸廩官牛雜費凡十七萬餘緡得不償失故廢之冬十月甲戌日有食之十二月賑京城饑凡出米六十萬斛丁夘天聖五年春正月朔旦上皇太后夀于㑹慶殿晏殊罷殊嘗論張耆不可為樞密使頗忤太后㫖至是因從幸玉清昭應宫坐以笏擊僕為御史王㳂曹修古所論罷知宣州俄改應天府殊至府乃大興學校范仲淹方居母憂殊延之以教諸生自五代以來天下學廢興自殊始三月親試舉人賜王堯臣以下三百七十餘人及第出身有差先是詔禮部勿專用詩賦定去留其以論策兼考之聞喜宴賜御詩及中庸篇一軸上先命中書錄中庸篇令張知白進讀至修身治人之道必使反覆陳之是年正月詔進士奏名勿過五百人諸科勿過千人秦州地震夏四月夀寧觀災五月徳明冦邉守將敗之秋八月解曹修古言職先是司天監主簿苖舜臣言土宿留參太白晝見詔日官同考定日官奏土宿留參順不相犯太白晝見日未過午舜臣等坐妄言災變被罰修古時為監察御史言日官所定希㫖悦上不足為信今罰舜臣等其事甚小然恐人人自此畏避佞媚取容以災為福天變不告所損至大禁中以翡翠羽為服玩詔市於南越修古以為重傷物命且真宗嘗採狨毛故事未逺宜罷之時方崇建塔廟議營金閣費不勝計修古極陳其不可出知歙州九月同華等州旱秘閣校理謝絳言去年大水今年枯旱皆大異也宜下罪已之詔修順時之令宣羣臣以導壅斥近倖以損隂而聖心優柔重在改作號令所發未聞有以當天心者夫風雨寒暑之於天時為大信也近日制命有踰宿輒改隨行遽止而欲風雨以信其可得乎天下之廣萬幾之衆不出房闥豈能盡知而在庭之臣上下䝉蔽其應不虛兩漢日蝕地震水旱之變則策免三公以示戒懼陛下進用丞弼極一時之選而天時未順豈大臣輔佐不明耶陛下信任不篤耶必若使之宜推心責成以極其效謂之不然則更選賢者願下詔引咎許之譏切時病罷不急之役省無名之斂勿崇私恩更進直道至誠動天惠浹於下豈有時澤之艱哉以程琳為御史中丞張知白最器琳當除命喜曰不辱吾筆矣琳上疏請罷土木營造蠲被災郡縣逋租冬十月罷陜西青苗錢先是陜西糴穀嵗預給青苗價錢至是罷之自後不復給頒五服勅滑州決河塞自天禧中河決積九載是秋七月始命治之役之初興朝議以嵗饑将復罷知滑州冦瑊言病民者在芻藁耳幸調率已集若積之經年則朽腐為棄物乃詔訖役以河平百官稱賀遂燕崇徳殿十一月癸丑郊以翰林學士宋綬攝太僕陪玉輦輅上問儀物典故綬占對辨給因使綬集官撰集為天聖鹵簿圗記越明年冬上之十二月以孔道輔為龍圗閣待制時使契丹未還契丹優人以文宣王為戲道輔艴然徑出契丹使主客者邀道輔還坐且令謝道輔正色曰中國與北朝通好以禮文相接今俳優之徒侮慢先聖而不之禁北朝之過也道輔何謝契丹君臣黙然又酌大巵謂曰方天寒飲此可以致和氣道輔曰不和固無害既還言者以為生事且開爭端上問其故道輔曰契丹比為黒水所破勢甚蹙每漢使至為侮慢臣若不校恐益易中國上然之道輔孔子四十五代孫也戊辰天聖六年春正月罷提㸃刑獄九年十月罷益梓廣南路轉運判官二月大風晝晦張知白薨知白在相位惜名器無毫髮私常以盛滿為戒雖貴顯清約如寒士諡曰文節三月丙申朔日有食之以張士遜同平章事從曹利用之請也作西太一宫夏四月交趾冦邉河北饑遣使安撫之有星流于西南大如斗聲如雷自北流于西南光燭殿庭尾長數丈久之散為蒼白雲上以星變齋居五日降繫囚罷力役振流民時輔郡又旱㑹命禬禳於文徳殿御史李佐奏曰天子布政之宫每遇災異輒命緇黄讃咒于其間非所以嚴外朝也御史鞠詠亦條五事上之五月河北京東蝗六月免瀘戎等州穀税秋七月劉隨罷出知濟州隨在諫職前後所論甚衆上益明習天下事而太后猶未歸政隨請軍國常務專取上㫖太后不悦㑹隨請外因出之江淮兩浙水遣使安撫蔡齊罷出知河南府初皇太后出金帛修景徳寺遣内侍羅崇勲主之齊時為翰林學士命齊為記崇勲隂使人誘齊曰趣為記當得參知政事齊遲其記不上崇勲譛於后故出之參知政事魯宗道固爭留之不能得尋以親老易密州太后諭宰相取記齊始上之八月河北水遣使安撫河決澶州命塞之劉筠罷出知廬州筠三入翰林與楊億齊名世號楊劉錄唐張九齡後九月以陳從易楊大雅知制誥文自景徳後文士以雕靡相尚一時學者嚮之而從易獨自守不變與大雅相厚皆好古篤行無所阿附朝廷欲矯文章之弊故並進之以風天下冬十二月以范仲淹為祕閣校理初仲淹遭母喪家居自念忠孝者天下之大本也孝不逮矣忠可忘乎且不可以一心之戚而忘天下之憂乃條天下之事移書執政曰周漢之興聖賢共理使天下為富夀數百年則當時致君者功可知矣周漢之衰奸雄競起使天下為血肉數百年則當時致君者罪可知矣唐之興衰也亦然我宋之有天下經營長育以至太平累聖之功大矣然否極者泰窮則變變則通通則久不知變者其能久乎朝廷久無憂矣天下久太平矣兵久弗用士曽未教中外方奢侈百姓反窮困朝廷無憂則苦言難入天下久平則倚伏可畏兵久不用則武備不堅士曽未教則賢材不充中外奢侈則國用無度百姓困窮則天下無恩苦言難入則國聽不聰矣倚伏可畏則奸雄或伺其時矣武備不堅則戎狄或伺其隙矣賢材不充則名器或假於人矣國用無度則民力已竭矣天下無恩則邦本不固矣倘相有思變其道與國家磐固基本使天下為富為夀數百年相府致君之功也不然但維持嵗月一旦亂階復作使天下為血為肉數百年亦相府負天下之過也為今之計正在乎固邦本厚民力重名器備戎狄杜奸雄明國聽也固邦本者在乎舉縣令擇郡守厚民力者在乎復游散去冗僣重名器者在乎慎選舉惇教育備戎狄者在乎育將材實邉郡杜奸雄者在乎朝廷無過生靈無怨明國聽者在乎保直人斥佞人又曰人之未病則苦口之藥鮮進國之未危則逆耳之言鮮用故佞人易進直臣易退及其既病也藥必錯雜而進故鮮效及其既危也言必錯雜而用故鮮功朝廷久安苦言不用勢使之然也伏聞京師去嵗大水今嵗大疫盖京師政教之所出君相之所居禍未盈而天未絶故鑑戒形焉不獨恐懼其心必使修省其政國家之徳尚可隆天下之道尚可行也倘弗懼于心非修其政漸盈于禍漸絶于天則國家四海將如何哉或謂災祥之數非為政教審爾九疇之書乃妖言也茍有善則歸諸已有禍則歸諸人豈聖朝之用心哉願黜術士之言奉先王之訓必不謬矣必無過矣書凡數千言先是天聖三年仲淹為大理丞上書請救文弊復武舉重三館之選賞直諫之臣革賞延之敝且曰臣又聞古帝王與佞臣治天下天下必亂與忠臣治天下天下必治然忠臣骨鯁而易疎奸臣柔順而易親柔順似忠多為美言骨鯁似強多所直諫美言者得進則佞人盈朝直諫者見疎則忠臣避世王者進退何以辨之但日聞美言則知佞人未去此國家之可憂也日聞直諫則知忠臣左右此國家之可喜也伏惟聖明不可不察自古王者外防夷狄内防姦邪夷狄侵國姦邪敗徳國侵則害加黎庶徳敗則禍起蕭牆乃知姦邪之凶甚於夷狄之患伏惟聖明當好正直以杜姦邪此至要之務也臣又聞人主納逺大之謀久而成王道納淺末之謀久而成亂政方今聖人在上賢人在列取舍之際豈其未至然而刑法之吏言絲髮之重輕錢穀之司舉錙銖之利病則徃徃謂之急務響應而行或有言政教之流弊議風俗之厚薄陳聖賢之事業論文武之得失則徃徃謂之迂説廢而不行豈朝廷薄逺大之謀好淺末之議哉伏望聖慈納人之謀用人之議不以逺大為迂説以淺末為急務則王道大成天下幸甚仲淹蘓州人也少有大節慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂其事上遇人一以自信不擇利害為趨舍其所有為必盡其力曰為之自我者當如是其成與否有不在我者雖聖賢不能必吾豈茍哉王曾見而偉之亦知仲淹乃晏殊客也於是殊薦入充館職曽謂殊曰已為公置不行宜更薦是夏出内藏錢市軍儲二十萬緡後不盡錄己巳天聖七年春正月曹利用罷以使相判鄧州尋降知徐州初太后臨朝威震天下中人與貴戚稍能軒輊為禍利用以勲舊自居凡内降恩力持不與左右多怨或屢卻而不復下則有黽勉從之者久之人測知其然或紿后曰䝉恩得内降雖屢却于樞密院今利用之家媪隂諾臣請可必得矣下之而驗后疑其私頗銜怒内侍羅崇勲嘗得罪后使利用召戒飭之利用去其冠幘罪詈斥良久崇勲恥恨㑹利用從子汭為趙州監押而州民有詣闕訴其不法者奏上崇勲方侍即請行乃詔王博文等與崇勲同徃鞫之博文希太后㫖縱崇勲窮按其獄汭坐被酒衣黄衣令人呼萬嵗杖死且傅致汭辭云利用實教之上以問輔臣皆顧望未有對者張士遜徐曰此獨不肖子為之利用大臣宜不知状王曾亦為解后曰卿嘗言利用横今何解也曾曰利用恃恩臣故以理折之今加以大惡則非臣所知也利用黨皆畏罪亦從而毁之獨羣牧判官司馬池颺言稱其枉朝廷亦不問利用復坐貸景靈宫錢貶崇信軍節度副使房州安置命内侍楊懐敏䕶送行至襄陽驛懐敏不肯前以語逼之利用素剛遂投繯而死以暴卒聞二月視魯宗道疾臨其喪宗道屢有獻替太后嘗問唐武后何如主對曰唐之罪人也幾危社稷后黙然時有請立劉氏七廟者后以問輔臣皆不敢對宗道獨曰不可退謂同列曰若立劉氏七廟如嗣君何時將幸慈孝寺后欲以大安輦前上行宗道以婦人有三從之義爭之后乃命輦後乗輿行時貴戚用事者莫不憚之目為魚頭參政因其姓且言骨鯁也諡肅簡張士遜罷出知江寕府士遜之相曹利用之薦也利用慿寵自恣士遜依違其間時人目之為和鼓利用既斥士遜亦罷以吕夷簡同平章事賑河北水灾是秋復大水遣使安撫之閏月禁剏寺觀復制舉等科六科以待京朝官増置書判拔萃科以待選人髙蹈丘園沉淪草澤茂材異等三科以待布衣武舉以待方畧勇力之士其法先上藝業于有司有司校之然後試秘閣中格然後天子親策之若武舉則仍閲其騎射焉初盛度請于真宗請設科以取士景徳二年遂設六科盖因度之議也及議封禪吏部科目皆廢夏竦執政建請復置上從之復理檢院仍命中丞領使時上封者言自至道三年廢理檢院而下情寢不上聞乃詔復置其登聞檢院匭函改為檢闕如指陳軍國大事並赴檢院令畫時進入常事五日一進其稱寃濫枉屈而檢院鼓院不為進者並許詣理檢使審問以聞三月給契丹流民田契丹饑流民至境上上曰皆吾赤子也可不賑救之詔給以唐鄧州間田仍令所過州縣給食復轉對上廣開言路設制策之科建登聞之匭以達芻言尚慮朝廷恥於自列復下是詔令極言時政得失在外者實封以聞既而上謂輔臣曰宜増朋黨之戒盖患羣臣為私也於是羣牧判官龐籍司馬池皆因轉對言事籍言舊制不以國馬假臣下重武備也樞密院以帶甲馬二借内侍楊懐敏羣牧覆奏乃賜一馬三日而復借之數日而復罷樞密掌機命反覆如此平時百官奏事上前不自批章止得送中書樞密院盖防偏請以唘倖門近日傳宣内降寖多於舊臣恐法度自是隳也池言唐制詔書之出有不便者門下得以封還今門下雖有封駁之名而詔書一切自中書下非所以防過舉也時内侍皇甫繼明兼領估馬司自言估馬有羡利乞遷官事下羣牧司閲無羡利繼明方用事自制置以下皆欲附㑹為奏池獨不可既而除池開封推官敇至閣門為繼明黨所沮而罷夏四月大赦京師自三月朔雨不止前赦一夕而霽李徳政封交趾郡王徳政來告其父公藴卒詔加封爵六月大雨震電玉清昭應宫灾為屋二千六百餘楹至曉而盡獨長生崇夀殿存焉皇太后泣謂輔臣曰先帝力成此宫一夕延燔殆盡猶幸一二小殿存爾范雍揣后意即抗言曰不若燔之盡也且先朝以此竭天下之力遽罹灰燼非出人意如因其存將又葺之則民不堪命非所以祗天威也吕夷簡亦推洪範灾異以諫后黙然滎陽縣尉蘓舜欽上疏曰積隂生陽陽生則火災見焉乗夏之氣發洩於玉清昭應宫雷雨雜下烈熖四起樓觀萬疊數刻而盡非慢於火備乃天之垂戒也陛下當責躬下詔罷非業之作拯失職之民察輔弼及左右無禆國體者罷之竊㺯威權者去之念政刑之失收芻蕘之論庶幾變灾為福浹日之間未聞為此而將計工役以圗修復都人聞之駭惑聚首横議咸謂非宜舜欽易簡孫也有司舉火所從起繫守衛者于御史獄議者又疑復修中丞王曙言魯桓僖宫灾孔子以為桓僖親盡當毁漢遼東髙廟不當居陵旁故灾所建宫非應經義思灾變之來若有警者願罷之以應天變右司諫范諷亦言此天之戒告乃復置獄窮治非所以應天也又曰山木已盡人力已竭宫必不成上與皇太后感悟遂薄守衛者罪詔罷修宫以所存殿為萬夀殿觀王曾罷先是后受册攝御大安殿曾執以為不可后左右姻家稍通謁曾多所裁制后滋不悦㑹昭應宫灾罷相出知兖州曾所進退士人莫有知者范仲淹嘗以問曾曾曰夫執政者恩欲歸已怨使誰當仲淹服其言秋七月罷諸宫觀使八月丁夘朔日有食之罷職田上封者言天下職田不均於量詔以其租送官計所直均給之冬十月京師地震十一月范仲淹罷時上率以冬至上皇太后夀于㑹慶殿仲淹為秘閣校理因冬至上夀奏疏言天子有事親之道無為臣之禮有南面之位無北面之儀若奉親于内行家人禮可也今顧與百官同列虧君體損主威不可為後世法疏入不報晏殊初薦仲淹為館職聞之大懼召仲淹詰以狂率邀名且將累薦者仲淹正色抗言曰仲淹謬辱公舉每懼不稱為知己羞今日反以忠直獲罪門下殊不能荅仲淹退又作書遺殊申理前奏不少屈殊卒媿謝焉又奏疏請皇太后還政亦不報遂乞補外尋出為河南府通判庚午天聖八年春正月曹瑋薨瑋將兵幾四十年未嘗少失利雖不如其父之寛然自為一家鎮天雄日契丹使過必隂勅其下毋敢疾趨者在渭州或告戍卒叛入夏州方對客奕碁遽曰吾使之去爾勿言也繼遷聞之即斬叛者投其首境上環属羌土田多為邉人市致單弱不能自存瑋盡令還其故田後有犯者徙其家内地始置弓箭手規塞上棄地使人相角力勝者給二頃再經秋穫課市馬一馬必勝甲然後官為印益賦田五十畆至三百人以上團為一指揮即要害䖏為築堡使自塹其地為方田以環之及立馬社一馬死衆為出錢市馬又制羌属百長以上其百領為族軍主將校止於本軍叙進不徙他軍以其習知虜情與山川形勢也所措置大抵如此後皆以為法云作㑹聖宫于西京永安縣越明年二月成奉太祖太宗真容御容三月親試舉人賜進士王拱夀以下及諸科及第出身有差凡八百餘人詔更拱夀名曰拱辰夏五月大雨雹六月親試書判拔萃科及武舉得余靖尹洙武舉十二人景祐四年韓億言武臣宜知兵機而禁不得傳請纂其要以授之於是出神武秘畧以賜邉臣秋七月策制科賢良方正能直言極諫科何詠茂材異等富弼九月罷轉對自復轉對言事者頗衆大臣不悦故復罷之冬十月除解鹽禁行通商法先是天聖初置司議茶鹽利害因言解鹽兩池舊募商人入錢在京榷貨務乾興初計嵗入纔二十三萬緡視天禧中年數損十四萬請罷之專令入中並邉芻粟久之復令入錢于京從商人所便時解鹽皆𣙜之民困於轉輸至是上書者言縣官禁鹽利微而害博兩池積鹽為阜數莫可校請聽通商遜命學士盛度中丞王隨與胡則議更其制度等上通商五利於是詔弛其禁聽商入錢若金銀在京𣙜貨務受鹽兩池而人便之詔下蒲解之民皆作感聖恩齋自是雖商錢流行而嵗課入官者耗矣置天章閣待制以鞠詠范諷為之越明年王鬷杜衍並加是職時馬季良上言京師賈人常以賤價居茶鹽交引請官置務收市之季良方用事有司莫敢忤其意鬷獨不可曰與民競利豈國體耶它日上見鬷勞之曰官商交引賴卿力言罷之甚善有司臨事當如是也薛顔死其家屬衍為墓誌衍卻之及在三司因奏事上謂衍曰薛顔有醜行卿不與誌墓誠清識也自是有意大用十一月戊辰郊抑勢要是嵗引改官人李師錫薦舉凡三十餘人上知其為王徳用甥曰但薦勢要使寒士何由進止令循資其後胡旦子宗克以磨勘保官多亦止循資髙麗來貢辛未天聖九年春二月復職田䖏女真降人于濠州晏竭等一百餘人八十四人自登州來内附詔徙濠州給田䖏之三月賜青州州學九經從王曾之請也自是州郡當立學者皆得賜書矣夏五月親試書判拔萃科秋七月命陳執中赴諫院供職國朝承五代之弊官失其守故官職差遣離而為二官號纔以定俸入而不親其職事諫議大夫司諌正言皆須别降敇許赴諫院供職者乃曰諫官執中初權度支判官至是罷權冬十月宋綬罷自翰林學士出知順天府時太后循稱制五日一御承明殿垂簾決事而上未始獨對羣臣也綬言唐先天中睿宗為太上皇五日一受朝䖏分軍國重務除三品以上官決重刑明皇日聽朝除三品以下決徒刑今宜約先天制度令羣臣對前殿非軍國大事及除拜皆前殿取㫖書上忤太后意故令出守侍御史知雜事劉隨殿中侍御史郭勸並言綬有辭學當留本朝不宜處外不聽閏月宴孫奭於太清樓奭時為翰林侍講學士每御經筵設象架皮書策外向以便侍講讀奭年髙視昏或隂雨即每移御坐於閣外奭每講至前世亂君亡國必反復規諷上竦然聽之嘗書無逸圗以進上施於講閣三請致仕不許奭以年逾七十固請泣下上亦惻然以不得請求近郡命知兖州仍詔須宴而後行宴日召太子少保致仕晁迥上各賜以飛白書詔侍臣即席賦詩太后特出禁中珍器勸奭及迥所以寵賚之甚厚及行賜宴瑞聖園又賜詩詔近臣皆賦寳元間翰林侍講學士梅詢以足疾請外補出知許州故事侍讀學士無出外者天禧中張知白罷參知政事領此職出知大名府非歴二府而出者自詢始十一月除兩川礬禁解曹修古等言職初太后兄子劉從徳以外家故恩寵無比從徳死以遺表推恩錄内外姻戚及僮僕凡八十人待制馬季良集賢校理錢曖皆緣遺奏超授官秩於是御史曹修古郭勸楊偕及推直官段少連皆上言推恩太濫太后怒出修古同判杭州未行改知興化軍勸偕監濰州舒州税少連漣水軍監酒修古鯁直有氣節當太后臨朝權倖用事人人顧望畏忌而修古遇事輒言無所回撓尋卒于官貧不能歸𦵏賓佐賻錢五十萬季女泣白其母曰奈何以是累吾先人也卒拒不納上思其忠贈右諫議大夫賜其家錢二十萬修古無子官其壻劉勳是嵗契丹主隆緒死子宗真立隆緒自與朝廷通好嵗貢方物無巨細必親閲之守約甚堅至是病劇召東平王蕭孝先使輔立其子宗真且戒毋失朝廷信誓隆緒妻號齊天聖后妾號順聖元妃順聖生宗真小名茂布固隆緒遺命以齊天為皇太后順聖為皇太妃順聖匿之乃自為皇太后令人誣告齊天謀叛縊殺之於是宗真立改元景福諡其父曰天輔皇帝廟號聖宗上聞其喪為輟視朝七日遣使慰之及賀宗真立宗真明年改元重熙壬申明道元年春二月三朝寳訓成初王曾為相言唐有貞觀政要今欲求祖宗事不入正史者别為一書從之至是成號三朝寳訓以張士遜同平章事册上母順容李氏為宸妃是日薨初皇太后以上為已子而順容李氏黙黙䖏先朝嬪御中未嘗自異人畏后亦無敢言者至是疾革進位是日薨始宫中未治喪吕夷簡奏事簾前因曰聞有宫嬪亡者后矍然曰宰相亦與宫中事耶引上偕起有頃獨出曰卿何為間我子母也夷簡曰太后他日不欲全劉氏乎司天希后㫖言嵗月𦵏未利夷簡黜其説於是三宫發哀成服備宫服𦵏之仍命三司使晏殊為墓記三月竄林獻可坐上書請太后還政忤后㫖也竄于嶺南於是御史張存言陛下嗣統以來延納至言罔有忌諱人情欣然自秋前忽罷百官轉對又去冬御史曹修古等皆以言事忤㫖降黜近復聞進士林獻可因上封事逺竄自爾中外惶惑盖忠直之言逆耳人君聽之甚難佞䛕之辭遜志人君納之甚易是以自昔為佞者多效忠者少遂使人君多聞其美鮮知其失是以政之理亂民之疾苦事之安危俗之衰敝或乃壅而不聞此非人君之要道也江淮旱遣使體量安撫蠲婺秀州身丁錢轉運司言大中祥符六年已放諸路丁身錢而二州輸錢如故詔蠲之夏四月秋七月置諫院先朝雖除諫官未嘗置院至是因諫官陳執中之請而置之八月授嘉勒斯賚温博竒官邈川雅仁結二部首領也初嘉勒斯賚與曹瑋戰三都谷不勝又襲西涼兵敗遂與立遵不協更徙邈川用温博竒為倫布數使人來秦州求内属於是命嘉勒斯賚為寧逺大將軍博竒為歸化將軍既而博竒作亂斯賚集兵殺之乃徙居青唐大内災延燒崇徳長春滋福㑹殿崇徽天和承明延慶八殿上與皇太后避火于苑中移延福殿百官晨朝而宫門不開輔臣請對上御拱宸門追班百官拜樓下吕夷簡不拜上使人問其故曰宫庭有變羣臣願一見清光上舉簾見之乃拜有司究火所起多引宫人屬吏御史蔣堂言火起無跡安知非天意陛下宜修徳應變有司乃欲歸咎宫人宫人屬吏何求不可而遂賜之死是重天譴也時宦者治獄得縫人火斗已誣伏下開封府使具獄知府程琳辨其非是乃命工圗火所經處且言後宫人多此殆天災不可以罪人殿中丞滕宗諒秘書丞劉越皆上疏諫宗諒曰婦人柔弱何求不可萬一懐寃足累和氣上為罷詔獄宗諒又言國家以火徳王天下火失其政由政失其本因請皇太后還政而越亦言之求直言大赦九月重作受命册寳以舊册寳為宫火所焚也冬十一月大内成先是内藏出金銀器與左藏緡錢二十萬助修大内至是成改崇徳殿曰紫宸長春殿曰垂拱滋福殿曰皇儀㑹殿曰集英承明殿曰瑞明延慶殿曰福寧崇徽殿曰寳慈天和殿曰觀文大寧門曰宣祐宣和門曰迎陽左右勤政門曰左右嘉福後又改正陽門曰宣徳大安殿曰大慶端明殿曰延和恭謝大安殿大赦改元元昊封西平王兼定難節使初徳明娶三姓宻穆克氏生元昊黙宻氏生成遇額藏渠懐氏生成嵬元昊小名葉邁羌語謂惜為葉福貴為邁元昊性鷙猜忌通漢文字數諫徳明毋臣中國徳明曰吾族三十年衣錦綺此聖宋天子恩不可負也元昊曰英雄之生當王霸爾何錦綺為至是徳明死遂命元昊襲爵時改元明道而元昊避其父名自稱顯道癸酉明道二年春正月振江淮饑賜米百萬斛二月有星孛于東北光芒長二尺司天言含譽星見然觀者皆以為彗皇太后朝饗太廟去冬詔以來年耕籍田先請皇太后恭謝太廟罷南郊禮及議后謁廟儀注后欲被天子黼冕參知政事薛奎曰必御此若何為拜固執以為不可卒不見聽至是后服褘衣乗玉輅至太廟改衮衣儀天冠朝饗皇太妃亞獻皇后終獻親耕籍田大赦兩川饑遣使體量安撫三月大赦以皇太后不豫故也皇太后崩遺誥尊皇太妃楊氏為皇太后遺誥尊皇太妃楊氏為皇太后與皇帝同議軍國事後名所居宫曰保慶稱保慶太后上見輔臣泣曰太后疾不能言而猶數引其衣若有所屬何也薛奎曰其在黼冕也然服之豈可見先帝乎上悟卒以后服斂閣門趣百官賀楊太后中丞蔡齊目吏毋追班乃入白執政曰上春秋長習知天下情偽今始親政事豈宜使女后相繼稱制乎遂詔刪去遺誥之語禮院言百官上楊太后牋曰陛下稱敇㫖或懿慈而不表從之初小臣方仲弓上書請依武后故事立劉氏廟而程琳亦獻武后臨朝圗太后擲其書于地曰吾不作此負祖宗之事太后稱制凡十一年以上幼沖乃諭輔臣曰皇帝聽斷之暇宜詔名儒講習經書以輔其徳於是設幄崇政殿之西廡而日命近臣侍講讀丁謂曹利用既以侮權貶竄天下惕然畏之晚年稍進外家而任信内官上春秋髙猶不知為宸妃所出終太后之世無毫髮間隙盖上能盡孝而太后亦慈愛保䕶之至也時言事者多暴垂簾時事右司諫范仲淹曰太后受遺先帝保佑聖躬者十餘年宜掩其小故以全大徳於是詔戒中外毋得言垂簾事夏四月追尊宸妃李氏為皇太后後諡曰荘懿太后既崩左右有以宸妃事聞者上號慟累日不絶乃追加尊號初三司使晏殊為宸妃墓誌云生一女早卒無子至是上出誌文示宰臣曰先后誕育朕躬殊為侍從安得不知此何意也吕夷簡曰宫中事秘臣備位宰臣但知其畧殊之不審理容有之然方太后臨朝若明言先后實生聖躬事得安否上黙然上始親政詔宗戚毋得禁中通表祈恩凡傳宣内批有司未得即行者審取䖏分於是中外聞之大悦吕夷簡以上始親政事手疏陳八事曰正朝綱塞邪徑禁貨賂辨佞壬絶女謁疎近習罷力役節冗費勸上語甚切上嘗謂輔臣曰朕每退朝凡天下之奏必親覽之夷簡曰若小事皆關聽覽恐非所以輔養聖神上曰朕承先帝之託况以萬幾之重敢自泰乎又曰朕日不欲事珍美衣服多以縑繒為之至屢經澣濯而宫人或以為笑太官進膳有蟲在食器中朕掩而不言恐罪及有司也夷簡曰陛下孝以奉先儉以臨下雖古盛徳何以加此上曰此偶與卿等言之非欲聞於外嫌其近名爾吕夷簡罷張耆夏竦陳堯佐范雍趙稹晏殊並罷上與夷簡謀以耆竦等皆太后所任用悉罷之退告郭皇后后曰夷簡獨不附太后耶但多機巧善應變耳由是並罷夷簡及宣制夷簡方押班聞唱其名大駭不知其故而夷簡素厚内侍副都知閻文應因使為中詗久之乃知事由皇后云以李迪同平章事王徳用簽署樞密院事初徳用為步軍副都指揮使時太后臨朝有求内降補軍吏者徳用曰補吏軍政也敢挾此干軍政乎不與后固欲與之卒不奉詔太后之喪有司請衛士坐甲徳用曰故事無為后䘮坐甲者久不奉詔五月焚垂簾儀制詔從殿中侍御史龎籍之請也籍又奏陛下躬親萬幾用人宜辨邪正防朋黨勿使受恩人主歸善權臣進擢近列願采公論毋令出於執政孔道輔嘗謂人曰言事官多觀望宰相意獨龎君可謂天子御史罷羣牧制置使六月甲午朔日有食之京東江淮饑命陳執中范仲淹二人分路安撫仲淹時為右司諫以江淮京東災傷請遣使巡行未報仲淹請間曰宫掖中半日不食當如何今數路艱食安可置而不恤乃以命仲淹仲淹奉使所至開倉廩賑乏絶禁淫祀奏蠲廬舒折役茶江東丁口鹽錢饑民有食烏昧草者擷草進御請示六宫貴戚以戒侈心又以為今東南一饑公私空竭其病在於用度不節乃條上八事上嘉納之兩京河陜路蝗食草木殆盡詔省尊號以旱故詔省睿文聖武四字求直言秋八月置端明殿學士以宋綬為之綬因言帝王御天下在總攬威柄自陛下躬親萬務宜懲違革弊以新百姓之耳目而賞罰號令未能有過於垂簾之日盖頃者恩出太后今又出大臣大臣市恩以招權小人趨利以售進此風浸長有蠧邦政太宗嘗曰國家若無外憂必有内患外憂不過邉事皆可預防至奸邪共濟必為内患深可憂也真宗亦曰唐朝朋黨尤甚以至王室卑弱願陛下思祖宗之訓念王業之艱整齊紀綱正在今日越明年綬以上春秋髙天下無事上言自古守成之君皆兢兢抑畏不忘顧省何者人心逸於久安而患害生於所忽故常立防於無事之始銷變於未萌之前願敇羣司勿以承平自怠又言馭下之道有三臨事尚乎守當機貴乎斷兆謀先乎密能守則奸莫由移能斷則邪莫由惑能密則事莫能變斯安危之所繫願陛下深念之出内藏錢賜三司凡百萬緡三司言自籍田後繼有賞賚用度不足請假於内藏上因謂宰相張士遜曰國家禁錢本無内外盖以助經費耳對曰不然則有司未免侵漁百姓也尋又出内藏絹代京東嵗輸景祐四年内藏庫言自天禧三年嵗斥緡錢六十萬以助三司即詔毋得更貸而明道距今纔四年所貸錢帛凡九百餘萬請以舊詔申飭之然三司迫於用度緩急不能無請上亦無所吝焉冬十月葬莊獻明肅皇后章懿皇后祔𦵏永定陵神主並祔奉慈廟國朝皇后二諡稱制者則加四諡先是錢惟演請以章獻明肅章懿並祔真宗之室詔禮院議禮官言夏商以來父昭子穆皆有配坐每室一帝一后禮之正儀開元肅明皇后始有並祔惟演引唐武宗母韋太后祔穆宗孝明孝章祔太祖故事穆宗惟以韋太后配更無别后太祖未嘗以孝章配伏尋先帝以懿徳配饗太宗及明徳園陵禮畢遂得升祔元徳自追尊後凡十七年始克升配今章穆著位長秋祔食真宗斯為正禮章獻母儀天下與明徳例同莊懿帝母之尊與元徳例同然前代無同日並祔之文惟上裁之詔三省與禮官更議皆謂章穆皇后位崇中壼與懿徳皇后無異已祔真宗廟室自叶一帝一后之文章獻明肅䖏坤元之尊章懿感日符之貴皆功徳莫與為比謂宜崇建新廟同殿異室嵗時薦享一用太廟之儀仍别立廟名以崇世享於是有司請以奉慈為名詔從之至慶厯五年用禮院議遷祔二后於真宗廟室序於章穆之次是時詔尚書省集議帶職官並赴既而宗正丞趙良規言若三省悉集則帶職官皆赴景祐四年御史臺又奏尚書省集議亦皆赴但依兩制班别一行坐如臺省畢集則各自作行其書議亦如之上參以諸議乃詔三司副使以上不赴如議大事特令赴省即别設坐張士遜罷判河南府先是天下旱蝗仍見士遜居首相不能有所發明上頗復思吕夷簡適臺臣有議其他過者遂罷制詞猶以均勞佚為名也以吕夷簡為平章事夷簡嘗奏令參知政事宋綬類中書總例景祐二年上之凡四百二十九册夷簡語人曰自吾有此例使一庸夫執之皆可為宰相矣十一月追册美人張氏為皇后上雅意所屬故也贈冦準官贈中書令復萊國公賜諡忠愍十二月復提㸃刑獄令轉運嵗出巡徧歴所部止以兩吏自隨委諸州具所至月日以聞修周廟嚴選用臺官法先是宰相李迪除張沔韓瀆為臺官言者謂臺官必由中㫖乃祖宗法也既數月吕夷簡復入相因議其事於上前上曰祖宗法不可壊也宰相自用臺官則宰相過失無敢言者矣迪等皆惶恐遂出沔知信州瀆知岳州仍詔自今臺官有缺非中丞知雜保薦者毋得除授出宫人上時屢出宫人吕夷簡曰此聖朝美事然民間物貴恐出宫或有失所者亦宜念之上因曰曩者大后臨朝臣僚戚屬多進女口入宫今已悉遣還其家矣廢皇后郭氏出臺諫官孔道輔范仲淹先是美人尚氏於上前有侵皇后語后不勝忿批其頰上自起救之誤批上頸上大怒入内都知閻文應因與上謀廢后且勸上以爪痕示執政上乃示宰臣吕夷簡且告之故夷簡以前罷相故怨后乃曰古亦有之乃詔皇后願入道宜封淨妃玉京沖妙仙師賜名清悟於是中丞孔道輔率諫官御史孫祖徳范仲淹段少連蔣堂郭勸楊偕馬絳宋郊劉渙十人伏閣言后無過不可廢上遣内侍諭道輔等至中書夷簡以皇后當廢状告之且曰廢后固漢唐故事道輔曰人臣當導君以堯舜豈得引漢唐失徳為法耶夷簡不答明日將留百官揖宰相廷爭夷簡奏言伏閣請對非太平美事有詔出道輔知泰州出仲淹知睦州祖徳等罰金遂詔諫官御史自今毋得相率請對於是偕言願得與道輔等皆貶勸言正家以御天下后非有大故不可廢少連言陛下親政以來開闢言路而執政大臣假天威以出道輔仲淹而斷來者之説且伏閣上疏豈非故事今遽絶之則國家復有大事誰敢旅進而言者又言盖自祖宗以來未嘗有廢后之事時河陽簽判富弼亦言朝廷一舉而二失縱不復后宜還仲淹以來言者疏入皆不聼郭淨妃尋賜號金庭教主宫名瑤華後近臣有獻詩百篇者執政請除龍圖閣直學士上曰是詩雖多不如孔道輔一言遂以命道輔議者因是知前日之斥果非上意也禁増沿邉堡寨景祐間河北塘水因嵗旱涸知雄州楊懐敏慮契丹使至知其廣深乃擁界河水注之塘復如故又請立木為水則以限盈縮懐敏每自以為塘水捍冦其功愈於兵嘗入奏指圖曰臣於邉為陛下置虎翼軍一百萬又上平燕策云是嵗邛部川蠻乞嵗貢京師詔令五嵗一貢旌良吏是嵗十月詔知耀州富平縣張龜年興利除害抱公滅私絶蠧弊之原洽柔良之譽特除著作佐郎再任九朝編年備要巻九
