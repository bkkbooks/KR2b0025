body:
  text: 九朝編年備要巻二十三宋陳均撰哲宗皇帝起己巳元祐四年止癸酉元祐八年己巳元祐四年春正月罷回河及修減水河范百禄趙君錫行視東北二河見東流髙北流下知河決不可回且奏曰元豐以前未嘗有回河之説八年以後王孝先俞瑾乃敢妄議回河於是范純仁請罷之二月吕公著薨臨其喪贈申國公諡正獻公公著識慮深敏量閎而學粹茍便於國家不以私利害動其心與人至誠不事表襮其好士樂善出於天性士大夫有以人物為意者必問其所知與其所聞相㕘覈以待上求神宗嘗曰吕公著之于人才其言不欺如權衡之稱物上前議政事盡誠去飾博取衆人之善以為善至其所守毅然不可動也上題其碑曰純誠厚徳初神宗朝有欲復肉刑者詔輔臣議公著曰後世禮教疏而刑獄繁肉辟不可遽復將有踊貴屨賤之譏宰臣呉充議復圜土衆亦以為難行參政王珪欲取天府死囚試劓刖之公著曰不可刖而不死則此法遂行矣遂寢議三月作渾天儀象七年六月成晝有流星出東北蘇軾罷從所請自翰林學士知杭州既踰月軾上䟽曰臣以臂疾乞郡䝉恩差知杭州但謂朝廷哀憐衰疾許從私便及出朝㕘乃聞臺官論劾甚多陛下庇臣不肯降出故許其去臣平生愚拙罪戾不少至于非義之事自保必無夫君子所重者名節也故有捨生取義殺身成仁可殺不可奪之語而爵位利禄葢古者有志之士所謂鴻毛敝屣也人臣知此輕重然後可以事君父言忠孝矣今陛下不肯降出臺官章䟽不過為愛惜臣子恐其或有此事不免降出而不知臣之無事空受誣衊給事中趙君錫亦言軾文追六經蹈藉班馬中間為李定輩中傷幾蹈不測二聖臨朝首加拔擢軾知無不言言之可行所補非一故士人畏憚為之銷縮公論倚重隱如長城誠雄俊之寶臣也今飄然去國實係邪正消長之機乞寢新除復寘禁林侍經幄夏五月竄蔡確李常等坐黜先是知漢陽軍呉處厚言朝廷牽復知鄧州蔡確觀文殿學士此則朝廷念舊推恩無負於確矣然確昨謫安州不自循省包藏怨心實有負於朝廷昨夏中登車葢亭十詩五涉譏訕而二篇尤甚上及君親忠憤所激須至冒瀆天聴確詩云矯矯名臣郝甑山忠言直節上元間釣臺蕪沒知何處嘆息思君俯碧灣此篇譏謗朝廷情理切害臣按唐郝處俊封甑山公上元初曾事髙宗時髙宗多疾欲遜位武后處俊諫曰天子治陽道后治隂徳然則帝與后猶日之與月陽之與隂各有所主不相奪也昔魏文帝著令不許皇后臨朝陛下奈何欲傳位天后乎由是事沮臣竊以太皇太后垂簾盡用章獻故事不似前朝荒亂之政而確公肆譏謗形于篇什處今之世思古之人不思于他而思處俊此其意何也又云喧豗六月浩無津行見沙洲束兩濱如帶溪流何足道沈沈蒼海㑹揚塵此篇稱沈沈蒼海會揚塵言海㑹有揚塵時人壽幾何尤非佳語詔確開具因依仍令安州繳進元題詩本安州尋言確詩初題于碑及移鄧州行一驛復取碑去盡洗其詩以碑還公使庫確亦上䟽條列自辨太皇怒甚貶確分司南京臺諫論確不已遂責授英州别駕新州安置吕大防劉摯等皆以確母老不欲令過嶺太后曰山可移州不可移大防等遂不敢言范純仁復留身揖左丞王存進説以為不宜置確死地不聽純仁退謂大防曰此路荆棘八十年矣奈何開之吾曹正恐不免耳退又上䟽略曰陛下臨御以來庶政清明如青天白日無輕氛薄翳道徳醇備如精金美玉無纖瑕小疵今以一蔡確煩朝廷行希濶之刑天下久安人所罕見必生疑駭乞付師臣以下商量常坐為御史中丞不言確為諫官所攻罷新除兵部尚書之命知鄧州彭汝礪坐營救確并不草確責詞出知徐州曾肇除給事中辭請外補從之命知潁州坐呉安詩論肇不自救確教彭汝礪使言也邢恕候服闋日降官先自恕自襄州移河陽専詣確謀造定䇿事及司馬康赴闕恕招康過河陽勸康作書稱確以為他日全身保家計康恕同年登科恕又出光門下作書如恕言葢以康為光子言確有定䇿功世必見信既而梁燾以諫議召恕亦要燾至河陽連日夜論確功不休且以康書為證燾不悦㑹吳處厚奏確詩燾遂與劉安世共請誅確確既竄恕服闋落職降官監永州鹽倉康初欲從恕招邵雍之子伯温謂康曰公休除喪未見君不宜枉道先見朋友康曰已諾之伯温曰恕傾巧或以事要公休若從之必為異日之悔公休康字也及燾論確恕罪亦命康分析康乃悔之范純仁罷知潁昌府司諫呉安詩正言劉安世交章攻純仁黨蔡確太皇曰人言純仁黨確恐不然但所見偏繆耳邵伯温論曰公卿大夫當知國體以蔡確奸邪投之死地何足惜然嘗為宰相當宰相待之范忠宣公有文正公餘風知國體者也故欲薄確之罪言既不用退而行確詞命然後求去君子長者仁人用心也確死南荒豈獨有傷國體哉劉摯梁燾王巖叟劉安世忠直有餘然疾惡已甚不知國體以貽後日搢紳之禍不能無過也葢君子小人相為消長能使君子在上小人在下君子在内小人在外各安其分足矣豈可殺而絶之哉一呉處厚以前宰相詩為譏謗非所以厚風俗罪之可也蔡確故大臣不問以愧其心可也朝廷當治確及其黨妄貪定䇿之功令同時執政各具立太子事使誣罔之迹曉然以詔天下後世罪其造謀者可也詩不當罪也嗚呼紹聖初亦賢者可以有為之時也而用章惇之凶暴蔡卞之奸邪一時輕躁險薄之徒皆進使宣仁被謗哲宗致疑離間骨肉禍患幾五十年不解卒致傾覆之亂悲夫六月夏人來貢初朝議以米脂等四寨與夏人權涇原經畧劉昌祚力陳不可以為夷狄無厭夏人素與西蕃不恊今解仇結好往來不已其志豈淺異日請蘭州亦從之乎不報既而夏國宥州牒已送到陷沒人口尋有㫖給四寨仍約以委官畫地界至是夏國遣使入貢樞密院擬荅曰蘭州寨門兩處地前已明言毋復更請將來送永樂人口慮嵗久死亡與元報人數不同亦計口支給賞絹仍將四寨約賜詔鄜延趙卨主分畫之議熙河帥范育請先畫疆界後歸四寨卨不以為然秋八月復修河司范純仁既罷相都水監用其幹當公事李偉之言復興河議云已開發孫村口故道通行請乗勢閉塞北流乃置司差都水使者呉安持提舉外都水使者范子竒同提舉而李偉為管勾回河等事范祖禹傅堯俞力諫不聴是役也梁燾劉安世初主東流之説復不堅王巖叟則終以東流為是立縣令課績法以徳義有聞清謹素著公平可稱恪勤匪懈為四善以獄訟無寃催科不擾水利興修為勸課之最屏除姦盜賑恤貧困為撫養之最分為三等及十事為上五事為中餘為下知通考察申監司類聚審覆九月辛巳大饗明堂冬十月權罷講越月諫議大夫劉安世言前一月未有㫖權罷講筵時近興龍節意謂將有燕饗是以暫輟邇英之幸用成慶禮今復半月别無故事亦非有大寒苦雪而講筵之臣不得望見清光臣固已疑之矣乃民間喧傳禁中見求乳母臣竊謂陛下未納后未敢輒信近日傳者益衆頗有實狀臣忝備言職當諫其漸望為宗廟社稷大計清閑之燕即御經筵仍引近臣與之論議前古治亂之要當今政事之宜悉俾開陳以助聖學無溺所愛而忘所戒先是安世呼牙媪為嫂求乳母踰月無所得曰累日内東門司要乳母十人今日方了安世不信媪具言東門司指揮府司責軍令狀無漏洩任府司者適安世故人亟以手簡問之非妄安世遂抗章論列他日吕大防對太后諭曰劉安世有文字言禁中求乳母事意則甚善但渠不知耳此亦非官家所要乃先帝一二小公主尚飲乳也官家常在老身榻前閣内寢處可説與安世令休入文字給事中范祖禹亦上䟽太后略曰皇帝今年十四其實猶十三嵗千金之家有十三嵗子猶不肯使近女色而况於萬乗之主乎陛下愛子孫而不留意於此非愛子孫之道也譬如美材方長正當封植培壅以待其蔽日凌雲若戕伐其根豈不害哉其後章惇為相上語惇曰元祐中太皇太后遣宫嬪在朕左右者凡二十人皆年長一日覺十人者非素使令頃之十人還者皆色慘沮若嘗涕泣者朕甚駭不敢問後乃知因劉安世等上䟽太皇太后詰之惇與蔡卞謀誣元祐大臣嘗有廢立議指安世祖禹言為根二人遂得罪幾死十二月修減水河庚午元祐五年春正月録石介後以其子師中為郊社齋郎二月文彦博致仕元豐中王堯臣之子同老上其父所撰立英宗為皇子詔且言彦博與富弼等皆有議立儲功時彦博自大名移判河陽適入覲上問之對曰至和以來中外之臣獻言者甚衆臣等雖嘗有請弗果行其後韓琦等訖就大功葢琦功也上以發端為難是時仁宗意已定嘉祐之末止申前詔爾如丙吉霍光功不相掩也遂加彦博兩鎮節度使彦博辭不受劉摯王巖叟在臺亦嘗申明韓琦立英宗之功踰三年莫有言者殿中侍御史賈易先以譏切彦博被逐至是韓忠彦執政因言彦博在元豐中録進立英宗本末多不可信且富弼治平中辭官表嘗云竊觀制詞叙臣在中書亦嘗議建儲以此推恩臣雖泛議建儲然未見形象安得如韓琦功深切明著如弼所言則何有彦博等堅請之事太皇乃出易䟽宣示大臣叙琦定䇿本末甚詳忠彦即拜於簾前並摯巖叟三䟽付實録院于是彦博不安於位累章求去遂命彦博為開府儀同三司以兩鎮節度致仕彦博力辭只帶河東一鎮從之夏四月詔經筵官留奏對詔自今講讀官經筵退留二人奏對邇英殿孫固薨臨其喪時知樞密院賜其碑曰純亮五月雨自去冬無雪至是始雨六月夏人冦邊質姑勝如二堡秋八月解梁燾等職初翰林承㫖鄧伯温以母喪去終制去秋除吏部尚書燾權給事中駁之改知亳州至是復以承㫖召燾為中丞與左諫議劉安世右諫議朱光庭交章論之不聴改除燾權户部尚書安世右諫議朱光庭中書舍人光庭給事中並辭不受求去益堅乃出燾知鄭州光庭知亳州安世提舉崇福宫中丞蘇轍及御史孫升言伏見梁燾朱光庭劉安世並從外補三人極言切諫者意在愛國尊君明至公大義于天下後世而已臣不量螻蟻之力冐凟天聴至於再三與三人無異也今三人既去微臣豈能自安望罷言職少慰公議不報時吕大防與中書侍郎劉摯建言欲引用元豐黨人以平舊怨謂之調停太后頗惑之蘇轍上疏略曰東晉桓温之亂諸桓親黨布滿中外及温死謝安代之為政以三桓分涖三州彼此無怨江右遂安故晉史稱安有經逺無競之美然竊謂安之於諸桓亦用之於外而已未嘗引之于内與之共政也臣願陛下謹守元祐之初政久而彌堅擇用左右之近臣無雜邪正至于在外臣子以恩意待之使嫌隙無自而生則垂拱無為安意為善愈久而愈無患矣未幾復力陳其不可略曰今者政令已孚事勢大定而議者惑于浮説乃欲招納已去之人與之共事謂之調停臣竊謂此人若返豈肯徒然而已哉必將戕害正人漸復舊事以快私忿人臣被禍葢不足言而臣所惜者宗廟朝廷也臣願陛下斷自聖心不為流言所惑毋使小人一進後有噬臍之悔則天下幸甚䟽奏太后命宰執于簾前讀之仍宣諭曰蘇轍疑吾君臣兼用邪正其言極中理宰執從而和之自是兼用邪正之説稍息是年六月也侍讀范百禄亦嘗上言乞分别邪正略云自古所難惟察言觀行考其事實凡導人主以質實使之虛中聴納則為公正導人主以諂諛使之諱過拒諫則為奸邪導人主以徳義則為公正導人主以術數則為姦邪導人主以尊宗廟敬祭祀則為公正導人主以簡宗廟略神祇則為奸邪導人主以敦睦九族惠養耆老則為公正導人主以疏薄骨肉棄老遺年則為姦邪導人主以恭儉清靜奉循典法則為公正導人主以驕侈放肆不顧舊章則為奸邪導人主以稼穡艱難惠及鰥寡則為公正導人主以輕鄙農事不恤惸獨則為奸邪導人主以柔逺息兵則為公正導人主以用兵攻戰則為奸邪導人主以原情審罰則為公正導人主以峻法立威則為姦邪導人主以安民利衆則為公正導人主以勞民動衆則為奸邪導人主以進君子用善良則為公正導人主以近小人用惡徳則為奸邪伏望特留聖意推此事類以觀人情則邪正分而聰明無惑矣九月復集賢院學士紹聖二年改為集賢殿修撰直集賢院為直秘閣集賢校理為秘閣校理冬十月罷修河司時范祖禹除給事中愈力言回河之害知潁昌府范純仁亦馳奏謂河無可回之理吕大防堅主河議格之不行一日簾中忽宣諭純仁之言有理宜從其請又罷河役及蘇轍為御史中丞乃請併罷修河司流竄李偉以正國法辛未元祐六年春正月詔祠祭游幸母用羔開分水河呉安持請播引漲水納之故道從之御史中丞蘇轍上䟽畧曰大河行流自來東西移徙皆有常理葢河水重濁所至輒淤淤填既髙必就下而決以往事騐之皆東行至泰山之麓則決而西西行至西山之麓則決而東向者天禧中河至泰山決而西行於今僅八十年自是以來避髙就下至今屢決始決天臺次決龍門次決王楚次決横隴次決商胡至元豐中決於大河每其始決朝廷多議閉塞今復行故道故道既行不久輙又衝決要之水性潤下導之下流河乃得安雖先帝天錫智勇喜立事功亦導使行不敢復塞兹實至當之舉也今河本無事而生事之人公然欺罔坐使公私俱弊臣實痛之且自置修河司以來使過朝廷應副見錢四十九萬餘貫其他公私所費猶不在此今嵗春夫共役一十萬人而北流止得三萬東流獨用七萬葢自河北只管一河東西兩岸而已今為分水之故添為兩河東西四㟁内北流横添四十五埽使臣三十四員清河兵士三千六百餘人物料七百十六萬餘束其為耗蠧何可勝言葢都水官吏專欲成就決不可行之故道而疵病已行之北流其欲成就故道則孫村河開馬頭等役當罷而不罷其欲疵病北流則深州武强等患當講而不講建議分水之人利在深州危急以顯北流可廢而東流當開其為不忠莫甚於此北京靈平陽武諸處危急實由分水所致則諱而不言深瀛恩冀去嵗無害實由北流隄防稍立之功則指為分水之勞其為罔上衆所憤嘆今河上夫役不過二月半下手乞急差官前去定奪所貴大役之前早見可否不悞興役越明年十月安持以河復東流賜章服其後元符中東流竟廢李偉卒以貶云二月以劉摯為右僕射王巖叟簽書樞密院巖叟面謝因進曰或聞有以君子小人雜用之説告陛下者不知果否此乃深欲誤陛下者也自古君子小人無參用之理聖人之説君子在内小人在外則成泰小人在内君子在外則成否小人既退君子不肯與小人爭進自然引去不可不察願陛下用心于此太后曰會得巖叟嘗從容勸上讀書上曰如何得入道深對曰要入道深自有訣須將先帝之言一一着心承當便如先帝專為陛下説此事則承當得有力讀書方濟事其善者受之以為法不善者受之以為戒如此便如終日與先聖先師説話聖學日新矣三月親試舉人賜馬涓以下進士及第出身有差夏四月罷賞花燕先是吕大防以御試妨春燕請為賞花釣魚之會以修故事詔用三月二十六日而連隂不解天氣作寒未有花意别擇四月上旬及將改朔寒益甚給事中朱光庭請罷燕大防意未然及對太后諭曰天意不順宜罷燕衆皆竦服他日王巖叟言昨見有㫖罷賞花釣魚此事甚善人以陛下敬天意極慇悦今又入夏猶寒天意不順陛下皆不忽大是好事太后曰天道安敢忽巖叟曰自古人君常患上則忽天意下則忽人言今陛下乃上畏天意下畏人言此盛徳之事願常以此存心天下幸甚復開寶通禮科五月己未朔日有食之不及元奏分數吕大防等稱賀六月夏人冦邊時知熙州范育言朝廷昨詔本路與夏國分畫自定西以北二十里與秦州隴諾堡界一抹取直及質孤勝如堡外亦打量二十里本路再陳汝遮形勢及一抹取直等處各乞隨本路利害分畫亦䝉許令與夏國商量然夏國自去年舉兵攻質孤勝如二堡及指隴諾取直等事以為翻異又云南朝真有就和之意請勿再説及隴諾堡上取直及二堡之事其言詞簡慢不遜况無質孤勝如則金城必危無定西以北之地則定西必危金城危則熙州有奔衝之虞定西危則通逺有扼吭之患二州危則賊可攘臂於中河岷焉得而守也臣望朝廷無以今日之不用兵為可安而深為異日慮奏至執政㑹議蘇轍曰今日欲議此事須先定用兵不用兵大防曰如合用兵亦不得不用轍曰欲用兵先論理之曲直我若不直則兵決不可用朝廷頃與夏人商量地界欲用慶歴舊例以漢蕃見今住坐處當中為界此理最為簡直夏人不從朝廷遂不固執葢朝廷臨事常患先易後難此所謂先易者也既而許於非所賜城寨依綏州别以二十里為界十里為堡鋪十里為草地非所賜城寨盖如延州寨門義合石門呉堡蘭州諸城寨及通逺軍定西城要約纔定朝廷又要於兩寨界首相望侵係蕃地一抹取直夏人黽勉見從要約未定朝廷又要蕃界草地更留十里通前三十里夏人亦又見許凡此所謂後難者也今者又欲於定西城與秦州隴諾堡一抹取直所侵蕃地凡百數十里則此不直致冦之大者也劉摯曰持不用兵之説雖然美事有須用兵者亦不可固執轍曰相公必欲用兵須道理十全敵人横來相加勢不得已然後可耳今吾不直如此兵起之後三五年不得休將奈何乃定議不從有言明日面奏轍曰夏人引兵十萬直壓熙河不於他處作過專於所爭處殺人掘崖巉此意可見此非兩人之罪皆朝廷不直之故大防曰朝廷指揮亦不到大段不直轍曰熙河帥臣輙敢生事奏乞不守誠信乗夏人抽兵之際移築堡寨臣以為方今堡寨雖或可築至秋深馬肥夏人復引大兵來爭此否大防等皆言今已不許之矣轍曰臣欲詰責帥臣皆曰俟其再請詰責未晚太后曰邊防妄生事宜早約束大防等乃聴退都堂行約束轍欲多為詰責語巖叟曰當職官論列職事有何惡意强敵在境若重阻之教如何作事乃止增顯屬生事一白巖叟主育議也以梁燾為禮部尚書燾奏疏太后言日灾之應主弱臣强下陵上險侵陽之謂也宜舉三務以銷之願陛下外飭政事以明主道勸上進學以强君徳早正中宫之位以為内助是冬燾奏疏論用人略曰臣等累曾奏聞以謂邪正不可並用陛下深以為然是知邪正之必相攻也今並用矣臣等又謂邪人在外正人在内則可治陛下亦以為然是知邪人在内則害正也今邪人在内矣臣等又謂使邪人少正人多則可治陛下亦以為然是知邪人之多交相朋比損正人之道也今邪人多矣以在内衆多之邪人與寡少之正人並用勢自不敵豈能久安而終無憂患乎奈何與前日之聖意不同耶有姦人移惑聖意也又曰有向來奸黨已用之人今復在要路者又有姦黨後進之人今在言路者又有奔競僥倖者雖素非姦而今日屈意以求助以濟其謀為自進之計隂相交通以白為黑以是為非者專欲惑亂聰明離間君臣傾害忠良不可不察也姦黨漸漸進用在衆人皆知而無一人為陛下言之忠耶不忠耶公耶私耶曲耶直耶浙西水杭州死者五十萬蘇州三十萬翰林學士承㫖蘇軾極陳浙西水灾朝廷賜米百萬石錢二十萬緡賑給之侍御史賈易奏議考騐虛實於是詔本路具灾傷分數賑濟次第以聞有不實則治其尤者給事范祖禹封還録黄曰唐大歴中霖雨損稼渭南令獨稱縣境不損後按實損三千餘頃代宗歎息久之曰縣令字人之官不損猶應言損何不仁如是乎貶渭南令為南浦尉徳宗貞元中江淮大水宰相陸贄請遣使賑恤帝曰聞所損未必即應優恤恐生奸欺贄上䟽曰所費者財用所収者人心茍不失人何憂乏用乃遣使宣撫憲宗元和中南方旱饑遣使賑䘏將行帝戒之曰朕宫中用帛一疋皆籍其數唯賑百姓則不計費卿輩當體此意七年又謂宰相曰卿輩屢言淮浙去嵗水旱近有御史自彼還言不至為灾事竟如何對曰按淮南浙東奏狀皆言水旱人多流亡求設法招撫其意自恐朝廷罪之者豈肯無灾而妄言有灾耶此葢御史欲為奸諛以惑上意耳帝曰卿言是也朕葢不思而言命連蠲其租賦此皆古之人君聞有灾患惟恐不及於事之意也夫奏灾傷分數過實賑濟用物稍廣此乃過之小者正當濶略不問以救人命若因此懲戒一人則自今官司將坐視百姓之死而不救矣易所言乞不施行從之秋七月復制置解鹽使八月蘇軾賈易罷軾知潁州易知廬州先是易上䟽言右丞蘇轍厚貌深情險於山川詖言殄行甚於蛇豕其兄軾既立異行以背先帝尚䝉恩宥全其首領先帝厭代軾乃作詩自慶曰山寺歸來聞好語野花啼鳥亦欣然書於揚州上方僧寺後不自安又增以别詩二首以元豐八年五月一日既而語諸人曰我寄人置田書報已成故作此詩且置田極小事何至野花啼鳥亦欣然哉及作舘職䇿題又形譏毁言者固嘗論之其作吕大防麻制尤更悖慢其辭曰民亦勞止庶臻康靖之期聞者為之股慄先朝行免役則以差役為良法及陛下復行差役則以免役為便民其在杭州務以暴横之威決配税户顔章兄弟皆是無罪之人今則漸䝉貸免專為姑息以干小人之譽如累年灾傷不過一二分軾張大其言以為甚於熙寧七年之患又浚治西湖聞亦不免科借居民什器畚鍤之類虐使捍江廂卒築長堤於湖以事游觀監司畏之無敢觸其鋒者况敢檢按耶今既召還盛引貪利小人相與倡言必求外補非首相不可留伏望睿斷特行免斥疏奏簾前宣諭曰賈易排擊人太深須與責降吕大防對曰易誠過當今若早欲定疊不若併軾兩罷遂有是命軾自辨云賈易等言臣元豐八年五月一日題詩揚州僧寺有欣幸先帝上仙之意臣今省憶自有因依是嵗二月六日聞先帝遺詔于南京舉哀掛服了當迤邐往常州五月初至揚州行西寺見百姓父老十數人相與笑語其間有以兩手加額云見説好个少官家臣實聞百姓謳歌吾君之子又是時得請歸耕淮浙所在豐熟因作詩云此生已覺都無事今嵗仍逢大有年山寺歸來聞好語野花啼鳥亦欣然葢喜聞此語記之以詩書之當塗僧舍臣若稍有他意豈敢復書壁上以示人乎閠月夏人冦邊冦麟州及神木等寨衆十五萬諸將不敢與戰蕃漢居民為所殺掠焚蕩廬舍驅虜畜産甚衆九月定太學生員上舍生一百人内舍生三百人外舍生一千人越明年夏禮部言廣文館生員以一千四百人為額䇿制科得王普司馬槱二人上清儲祥宮成出内庫緡錢助邊詔嵗出五十萬緡赴元豐庫樁管助邊自後降賜不一不復盡録冬十月幸太學詣至聖文宣王殿行釋奠禮一獻再拜御敦化堂召宰相親王以下賜坐三學生坐於東西廡國子祭酒豐稷講尚書無逸終篇賜稷三品服學官賜帛有差或謂吕大防曰祖宗視學非有爵命之賞則有金帛之賜今皆無之何也吕大防曰古者天子視學盖常事也徳意在焉小惠何足道哉吾固欲天子時一幸學金爵之賚後日何可繼哉正恐惜費而止耳聞者乃服建諸宫院小學十一月劉摯罷御史中丞鄭雍論摯威福自恣乞罷去以收主柄又論王巖叟等三十人皆為摯黨殿中侍御史楊畏亦論摯父死于衡委而不葬章十餘上初邢恕謫官過京師以書抵摯摯荅有自愛以俟休復之語㑹排㟁司茹東濟有求于摯不獲見其書隂錄以示雍畏二人方論摯得此乃釋其語上之曰俟休復者俟他日太后復辟也又章惇諸子故與摯游摯亦間與之接言者謂摯預交惇子為囊槖以覬後福二聖不悦摯亦求去甚力遂命除職出知鄆州給事中朱光庭繳還摯麻詞光庭罷巖叟梁燾等果救摯以畏言先入不納然雍之攻摯人以為附左相吕大防云傅堯俞薨臨其喪時為中書侍郎司馬光嘗謂邵雍曰清直勇三徳人所難兼吾於欽之畏焉雍曰欽之清而不耀直而不激勇而温尤為難太后嘆曰傅侍郎清直一節終始不變金玉君子人也兩宫臨其喪哭之慟諡獻簡行觀天歴壬申元祐七年春正月夏五月納皇后孟氏故馬軍都虞候贈太尉元之孫女也太常修納后儀納采問名納吉納成告期發册奉迎尚宫導皇帝詣福寧殿之大次日晡後后車入宣徳門侍中奏中嚴内侍轉奏皇帝服通天冠絳紗袍御福寧殿尚宫引后出次詣殿庭之東西面立尚儀奏外辦請帝降坐行禮尚宫引詣庭中之西東面揖后以入帝導后升自西階入室各就榻前立尚食跪奏食具帝揖后皆坐尚食以饌進帝及后皆食三飯尚食以酒進帝后俱受爵飲尚食以饌從再飲如初三飲用卺如再飲尚儀跪奏禮畢帝后俱興尚宫請帝御常服尚寢請后釋禮服入幄次日以禮見太皇太后皇太后參皇太妃如宫中之儀初太皇太后因輔臣進呈景祐時各故事遂問當時喪娶大臣不言何也神宗亦嘗問此不知何故王巖叟具對以所聞于韓琦者太后曰固疑其有以也忠彦曰應是妃嬪中有驟進者太后曰此等寧識君臣事體巖叟曰須正后則事體自正太后曰亦嘗語皇帝選得賢后有内助之功此非細事巖叟曰内助則賴賢后其如正家須皇帝聖人言正家而天下定當謹之於始太后以巖叟言謂上曰正家須在皇帝如是者再巖叟退取歴代皇后事跡可以為法者編成一書號中宫懿範上之未幾梁燾上疏請太皇太后還政略曰太皇太后擁䕶聖躬夙夜不倦保佑之功永福宗社今來選正中宫已得賢淑冬至大禮自當郊見天地天意人事上下恊應惟是政機之繁久勞同聴歸斷人主不可過時此陛下今日甚盛之舉也退託深宫頤神内典逺光前古垂法萬世豈不美歟是冬吏部侍郎彭汝礪亦上䟽略曰皇帝以盛徳履位今八年矣内無過行外無過舉非太皇太后扶持擁䕶何至于此然謙虛退託隠而未發於言也存所聞而無所問于事也有所知而無所命臣聞詩曰弗躬弗親庶民不信弗問弗仕勿罔君子此言人君擅開闔予奪之權以制萬物之命而後能治其國家今其行則弗躬也其事則弗親也雖有至徳民有所不信矣弗能問以盡其事弗能察以盡其物於是小人得以勿罔君子矣庶民不信則不能安民矣勿罔君子則不能知人矣夫人君之失不獨殘暴威虐馳騁田獵而後為之憂不能知人不能安民其憂莫大焉今則皆曰太皇太后無意於任天下且將還政臣謂太皇太后還政非難俾皇帝不失其道為難其道無他在教之知人安民而已臣願皇帝同御前殿特令近臣及知州職司入對庶稍見人才察其邪正賢不肖之實遂聞知天下之事三省進呈公事以發聴斷俾日見之行事進選道徳忠信之士置之左右前後告其所已知規其所未至損其所有餘補其所不足使一日專政則利害不能惑君子小人不能蔽以事天地而饗以治萬物而安以承宗廟而固太皇太后所以輔護皇帝者至此乃可謂全矣城定逺罷侍從轉對從吏部尚書王存之言專責以朝夕論思之效也六月寛淮浙積逋先是知揚州蘇軾上疏略曰方今民荷寛政無他疾苦但為積欠所壓如負千鈞而行免于僵仆則幸矣何暇舉首奮臂以營求於一飽之外哉今大姓富家昔日號為無比户者皆為市易所破十無一二其餘小民大率皆有積欠監司督守令守令督吏卒文符日至其門鞭笞日加其身雖有白圭猗頓亦化為篳門圭竇矣于是詔云訪聞淮浙積欠最多累嵗灾荒人民流移相屬今淮東始得一麥浙西未保收成應令淮東西兩浙路諸般欠負不問新舊有無官本並特與權住催理一年内已有寛限者即依元降指揮軾聞之即與吕大防書云頃者所論積欠䝉示諭已有定議此殆一洗天下瘡痏也以蘇頌為右僕射秋七月復翰林侍讀學士以翰林學士范祖禹為之祖禹尋上帝學疏略曰學始於伏羲至於成王易詩書所稱聖人所述為萬世法由漢以下其道不純故可稱者鮮自古以來治日常少亂日常多者推原其本由人君不學方今䝉被涵養徳澤深厚逺過前世皆由以道徳仁義文治天下人主無不好學故也今人有寶器猶且愛惜之恐其傷闕况祖宗百三十有餘年全盛之天下可不務學以守之乎今臣所録八篇上起伏羲下訖神宗伏惟陛下憲道於三皇稽徳於五帝軌儀于三代法象於祖宗集羣聖之所行體乾剛之不息則四海格於太和矣時侍讀顧臨因進讀仁宗寶訓至鈔法事吕大防奏曰臣敢陳法本末仰祈陛下通知利害之詳國初輦運香藥茶帛犀象金錢等物赴陜西變易糧草嵗計率不下二百四十萬自鈔法之行始許商賈於沿邊入中是錢糧草却於京師或解池請鹽赴沿邊出賣一則人户無科買之擾二則商旅無折開之弊三則邊儲無不足之患四則貨物無搬運之勞實於官司為利上因喜之王巖叟奏曰陛下宫中何以消日上曰並無所好惟是好書巖叟曰大抵聖學要在專勤屏去他事則可以謂之專久而不倦則可以謂之勤如此天下幸甚蠲網船征税舊發運司主東南漕其法聴操舟者載私貨征商不得留難故操舟者富厚以官舟為家時補其敝而周船夫之乏凡所載率無虞而逺達自導洛司置官舟載客貨而網船不許搭載比導洛司既廢然嚴立征商之法制一切禁之故所過多滯舟敝人困即盜所載以濟饑寒公私皆病知揚州蘇軾奏乞復故詔從之八月王存罷自吏部尚書出知大名府時在廷朋黨之論寖熾存入對首言人臣朋黨誠不可長然不察則濫及善人東漢黨錮之獄是也慶歴中或指韓琦富弼范仲淹歐陽修為朋黨賴仁宗聖明不惑今日果有進此説者望陛下察之由是與用事者不合遂補外九月永興軍等州地震蘭州鎮戎軍環州冬十月夏人冦邊圍環州十日解去初知慶州章楶數遣輕兵出討斬獲甚衆楶䇿其必報乃取黠羌啗以厚利笞而遣之若得罪而逸者因使事虜刺其舉兵所向即馳歸以告果知羌人將冦環州楶乃選精兵萬餘統以二驍將使營逺塞而授之䇿曰賊進一舍我退一舍彼必謂我怯為自衞計不備吾邊壘乃銜枚由間道遶出其後或乗堡障或伏山谷伺間以擊其歸又以境外皆沙磧近城百里有牛圏所儲水足以飲人馬乃夜寘毒藥虜圍環州數日無所獲而歸所遣驍將祁可適屯師洪徳城虜退識其母梁氏旗幟城中鼓譟而出馳突蹂躪虜大敗而去斬首千餘級獲牛馬槖駞鎧仗以萬計過牛圈飲其水且盡人馬被毒而奔迸蹂踐墮塹谷而死重傷而歸者不可勝計戎母幾不得脱盡棄其供帳襜褕之物而逃前此邊上功狀多虛或以易為難或奪甲與乙廣張俘級習以為常楶獨覈實第勞無小欺徼倖者不悦頗有謗言楶弗恤也十一月癸巳冬至郊復合祭合祭之夕夜月澄爽雲物晏温比還御樓肆赦終日和煦翼日風寒相屬時雪如期宰執侍從進詩御史請付史舘從之上之在太廟也内中朱車子十餘兩争道于乾明寺前有張紅葢者鹵簿使蘇軾劾其不肅上亟遣人以疏白太后有㫖申飭攸司嚴整仗衞上自太廟還后以下皆不復迎謁中道矣先是詔集議合祭議臣謂不可者二十二人謂可者八人進呈吕大防言先帝因禮文所建議遂令諸儒定北郊之禮然未經親行今來皇帝臨御之始當親見天地而地祇獨不設位恐亦未安今日宜勉行權制候將來定議北郊制度及太廟饗禮行之未晚遂詔宜依熙寧十年故事設皇地示位以嚴並祀之報厥後躬行方澤之祀則修元豐六年五月之制俟郊禮畢集官詳議禮部尚書蘇軾尋上奏略曰議者欲變祖宗之舊圜丘祀天而不祀地不過以為冬至祀天于南郊陽時陽位也夏至祀地於北郊隂時隂位也以類求神則陽時陽位不可以求隂也是大不然秋分夕月於西郊亦可謂隂位至於從祀上帝則以冬至而祀月於南郊不以為疑今祭地祇於圜丘而獨以為不可過矣詩之序曰昊天有成命郊祀天地也議者乃謂合祭天地始於王莽臣謂禮當論其是非不當以人廢光武親誅莽者也尚采用之三輔故事祭於圜丘上帝后土位皆南面則漢嘗合祭矣明皇天寶元年合祭天地于南郊則唐嘗合祭矣今議者欲冬至祀天夏至祀地葢以為周禮也自太祖受命建隆初郊先饗宗廟並祀天地真宗以來三嵗一郊此國朝之禮也今所行皆非周禮而獨以地祇則曰周禮不當祭於圜丘此何義也議者必曰今之寒暑與古無異而宣王六月出師則夏至日何為不可祭乎臣曰舜一嵗巡狩四岳五月方暑而南至衡山十一月方寒而北至恒山後世之人主能行之乎周所以十二嵗一巡狩唯不能如舜也夫周已不能行舜之禮則後世豈必能行周禮乎議者必又曰夏至不能行禮則遣官攝祭亦有故事此非臣之所知也周禮大宗伯若王不與祭則攝位鄭氏之注曰王有故則代行其祭事疏曰有故謂王有疾及哀慘皆是也然則攝事非安吉之禮也議者必又曰省去繁文則一嵗可以再郊臣曰古者以親郊為常禮故無繁文今世以親郊為大禮則繁文有不能省也國家三年一郊傾竭帑藏以賞軍猶恐不足若一年再賞國力何以給分而與之人情豈不失望議者必又曰三年一祭天又三年一祭地三年一郊已為疏濶若獨祭地而不祭天是因事地而愈疏於事天也議者必又曰郊之嵗以十月神州之祭易夏至方澤之祀又非臣之所知也夫欲從周禮而以十月易夏至以神州易方澤此周禮耶十月親祭地十一月親祭天先天後地禮也先地後天古無是禮議者必又曰郊之嵗以夏至祀地示于方澤上不親郊而通權火天子于禁中望祀此又非臣之所知也書之望秩謂山川在境内故逺望而祭也今俛則見地而云望祭是為京師不見地乎此六議者合祭可否之決也按劉安世集云初詔議北郊典禮蘇軾主合祭之議從之者五人安世主分祭從之者四十人又有三人欲於十月以神州地祇之祭易夏至方澤之祀又有一人欲上不親祠而通權火天子于禁中望拜俄而朝廷復送下三狀再令詳定安世復議略云蘇軾謂合祭圜丘於禮為得不可復改臣等謹按周禮天子親祀上帝凡九國朝三嵗一郊固已疏闊豈可因循謬誤不加考正古者求神以類天陽物也地隂物也嵗月日時方位牲器樂舞皆從其類今議者於聖人成法則棄而不行猥用王莽不經之説至引夫婦同牢私䙝之語黷亂天地又引昊天有成命之詩以為證臣等竊詳此詩終篇未嘗有合祭之文序乃後儒之辭亦謂成周之世圜丘方澤各歌此詩以為樂章耳如潛之序曰季冬獻魚春薦鮪也豐年之序曰豐年秋冬報也噫嘻之詩曰春夏祈穀于上帝也如此之類不知為一祭耶抑二祭耶若郊祀賜予乃五代姑息之敝法聖朝寛仁不欲遽罷若分而為二何所不可議者乃欲因此造為險語以動上聽又引禍福殃咎之説劫持朝廷必欲從已甚無謂也大抵臣等所守乃先王之正禮而蘇軾之議皆後世之便宜權之與正決不可合伏望聖慈詳審其當上以體神考之志下以正千載之惑豈勝幸甚方送同議官簽書其徒馳告軾曰若劉承㫖議上決恐難答時蘇轍為門下侍郎遂因軾令請降㫖罷議安世議狀竟不得上越明年四月遂詔今後南郊合祭天地依元祐七年例施行癸酉元祐八年春正月范祖禹上仁皇訓典序略曰本朝祖宗以聖繼聖其治尚仁而仁宗得其粹焉臣謹録天禧以來訖于嘉祐止十年之事凡三百十有七篇為六巻名其書曰仁皇訓典以助睿覽又奏云陛下近者郊見天地雷止風和景氣清霽神祇響答福應尤甚都城之人瞻望玉色歡呼洋溢皆云陛下克類仁宗臣觀天意人心如此實宗社無疆之福也然臣愚竊以為聖人福至而益戒則能長饗其福譽美而副之以實則能永保其譽唯兢兢業業不自暇逸乃可以答天休衆之所欲因而從之乃可以副民望若一有滿假之意則今日之福乃他日危亂之基也不能副之以實則今日之譽乃他日怨誹之端也故臣願陛下既受天福又獲民譽益思戒謹惟勤修徳修徳之實惟法祖宗恭惟一祖五宗畏天憂民後嗣子孫皆當取法惟是仁宗在位垂久徳澤深厚結於天下是以百姓思慕終古不忘陛下誠能上應天意下順民心專法仁宗則垂拱無為海内宴安成康之隆不難致也蔡確卒卒於新州三月蘇頌罷言者交論之遂命除職與宫觀楊畏先攻劉摯出之意謂必用蘇轍而朝廷乃相頌畏又與來之邵言頌留賈易謫命不下為稽詔命中丞李之純號長者為畏所劫亦上疏乞早行罷黜從之夏五月董敦逸黄慶基罷時並為監察御史言禮部尚書蘇軾為舍人時因行吕惠卿等制詞指斥先帝而其弟尚書右丞轍怙勢曲法相為肘腋當正典刑宰相吕大防曰先帝欲富强中國鞭撻四夷而一時羣臣奉承太過事或失當二聖臨御因民所欲隨事救改葢理之當然真宗即位弛逋欠以厚民財仁宗即位罷宫觀以息民力皆因時施宜以補先朝闕政未聞當時以為謗先帝者也近來言官擊人多以謗先帝為辭非惟中傷正人亦欲揺動朝廷言極不善若不禁止久逺不便轍亦為其兄辨析撰吕惠卿謫詞初非譏訕太后曰先帝追悔往事至于泣下大防曰聞永樂之敗先帝至曰兩府無一人能諫然則一時過舉非先帝本意明矣太后曰此事官家宜深知大防曰皇帝聖明必能照察遂出敦逸為湖北運判慶基為福建運判未幾改敦逸知臨江軍慶基知南安軍六月梁燾罷時為尚書左丞以議邊事不合移疾求罷章累上遣使封還仍問所以求去密訪人才燾曰信任不篤言不見聴而詢人才之可用者非臣所敢當也使者再至乃奏陛下必欲知可用之人無過且圖任舊人中堅正純厚有人望者既而授醴泉觀使又四上章求補外尋出知潁昌府遣内侍賜茶藥宣諭曰已用卿言復用范純仁矣蘇軾等上陸贄奏議是夏軾同吕希哲呉安詩豐稷趙彦若范祖禹顧臨上陸贄奏議疏畧曰人臣之納忠譬如醫者之用藥藥雖進於醫者方多傳于古人若已經效於世間不必皆從于已出伏見唐陸贄才本王佐學為帝師論深切於事情言不離於道徳用人聴言之法治邊御將之方罪己以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼在躬之膏盲使徳宗盡用其言則貞觀可得而復臣等私相告語以陛下聖明必善贄論欲稍加校正繕寫進呈秋七月令陜西沿邊專行鐵錢以范純仁為右僕射時知潁昌府遣内侍齎詔賜之令乗驛赴闕殿中侍御史來之邵論純仁師事程頤闇狠不才於國無補不可復相侍御史楊畏亦攻純仁皆不報至是入對尋有是命純仁辭至六七不允又三遣中使促令就位既入謝太后宣諭曰相公且與吕大防等同心協力他日又曰公父仲淹可謂忠臣在章獻垂簾時惟勸章獻盡母道及仁宗親政惟勸仁宗盡子道可謂忠臣相公名望衆人所歸必能繼紹前人純仁頓首謝曰臣不肖何足以當勸奬委使之意然不敢不勉八月兩京河北淮南水分遣使者往賑之赦九月太皇太后髙氏崩先是太皇太后不豫吕大防范純仁蘇轍鄭雍韓忠彦劉奉世入崇慶殿後閣問聖體太皇諭曰今疾勢有加與相公等必不相見且善輔相官家為朝廷社稷大防等欲退太后獨留純仁意欲有所屬也上令大防以下皆住太后曰老身受神宗顧託同官家御殿聴斷公等試言九年間曾施私恩於髙氏否大防對曰陛下以至公御天下何嘗以私恩及外家太后曰固然只為至公一兒一女病且死皆不得見言訖泣下大防曰近聞聖體尚安乞稍寛聖慮太后曰不然政欲對官家説破老身沒後必多有調戲官家者宜勿聴之公等亦宜早退令官家别用一番人乃呼左右問曾賜出社飯否因曰公各去喫一匙社飯明年社飯時思量老身也冬十月上始親政翰林學士兼侍讀范祖禹疏略曰陛下初攬庶政延見羣臣此乃宋室隆替之本社稷安危之基天下治亂之端生民休戚之始君子小人消長進退之際天命人心去就離合之時不可不謹也太皇太后内定大䇿擁護陛下百姓呼舞未嘗有毫髮假族人不惟族人而已徐王魏王皆親子也以朝廷之故疏逺隔絶魏王病既沒然後一往太皇太后疾已革然後徐王一入進退羣臣必從天下之望不以己意為喜怒賞罰至公無私焦勞刻苦凡皆為趙氏社稷宋家天下專心一意保佑陛下也斥絶奸邪裁抑僥倖九年之間始終如一故雖徳澤深厚結於百姓而小人怨者亦不少矣今必有小人進言曰太皇太后不當改先帝之政逐先帝之臣此乃離間之言不可不察也當陛下即位之初中外臣民上書言政令不便者以萬數太皇太后因天下人心之欲改與陛下同改之非以已之私而改也既改其法則作法之人及主其人者有罪當逐陛下與太皇太后亦以人言而逐之其所逐者皆上負先帝下負萬民天下之所讎疾而欲去之者也太皇太后豈有憎愛於其間哉顧不如此則天下不安耳惟陛下留心照理察其是非有以此言惑聖聴者宜正其罪痛懲一人以儆羣慝則帖然無事矣陛下若稍入其語則奸言繼進不已萬一追報之禮少有不至此于太皇太后聖徳無損而虧陛下孝道必有以大失人心人心離于下天變見於上陛下雖欲救之無及矣今乃小人乗間之時也此等既上誤先帝又欲復誤陛下天下事豈堪小人再破壞耶蘇軾先約祖禹皆上章論列軾章已就見祖禹章曰公之文經世之文也軾於朝廷文字失于過當不若公之言皆可行也願附名止于臣下加一等字中書舍人吕陶亦言太皇太后保祐聖躬于今九年屏出凶邪故小人不能無憾偶一奸言熒惑聖聴謂陛下既親萬機則某人當復用某事當復行此安危治亂之機在陛下察之而已明肅之政間有短闕仁宗念其保䕶尚降詔書不容小人議論况太皇太后所行之政皆已便民所逐之臣各已當罪無可議論者乎范祖禹懷不能已又上奏略曰自元豐以來時運艱厄先帝蚤棄天下陛下嗣位幸賴先太皇太后以大公至正為心罷王安石吕惠卿等所造新法而行祖宗舊政故社稷危而復安人心離而復合乃至契丹主亦與宰相議曰南朝專行仁宗皇帝政事可勅燕京留守使戒邊吏守約束無生事陛下觀戎狄之情如此則中國人心可知也先太皇太后日夜苦心勞力以為陛下立太平之基九年之間安靜無事已有成功陛下但由此以持循之則成康之隆不難致也又曰陛下聖學稽古不必逺師前世之事唯是儀刑仁宗法則使天下熙熙然至於凡昆蟲草木莫不各安其生此則臣之至願也召内侍劉援等十人並為入内供奉官尋又以内侍劉惟簡梁從政為内侍省押班中書舍人吕希純封還詞頭吕大防等進呈上曰只為禁中闕人兼有近例蘇轍曰此事非謂無例葢為政之初先擢内臣故衆心驚疑耳劉奉世曰雖有近例外人不可户曉上釋然曰除命且留俟祔廟取㫖可也范祖禹言漢有天下四百年唐有天下三百年及其亡皆由宦官同一軌轍葢與亂同事未有不亡也漢自元帝任用石顯委以政事殺蕭望之周堪廢劉向等漢之基業壞於元帝唐自明皇使髙力士省決章奏宦官始盛李林甫楊國忠皆自力士以進唐亡之禍基於開元熙寧元豐間内臣中李憲王中正宋用臣者三人最為魁傑憲總兵熙河中正總兵河東其勢震動内外憲陳再舉之䇿以至永樂陷沒用臣興土木之役為國斂怨此三人者雖加誅戮未足以謝萬姓朝廷只從寛典量加廢黜雖憲已死中正用臣猶存陛下近召内臣十人續又召數人而李憲王中正之子皆在其中又除押班二人帶御器械一人中外無不駭愕既而聞二人以執政言其有過先罷三人以舍人繳詞頭且輟然前來指揮首違故事又李憲王中正之子既得入侍則中正用臣亦將進用人心不得不憂臣所以敢極言之陛下與太皇太后同聴政外逐蔡確章惇吕惠卿等及羣小人故朝廷清肅内逐李憲王中正宋用臣等及羣小人故宫禁清肅内外皆無凶人故天下安靜臣歴觀近古内外安靜葢未有如今日也陛下誠能聴臣之言悉追罷除用内臣指揮未到者别與差遣已入者復授外官則内外之人稱頌聖徳萬口一辭矣上曰卿所論朕已曉祖禹曰陛下既以為然臣乞攜此章示執政且詰責之上曰且留此朕欲再㸔又曰所召内臣朕豈有意任用止欲各與差遣耳祖禹乃退十一月楊畏入對畏為禮部侍郎首叛吕大防上疏言神宗更法立制以垂萬世乞賜講求以成繼述之道上即召對詢以先朝故臣孰可召用者畏即疏列章惇安燾吕惠卿鄧温伯李清臣等行義各加品題且言神宗所以建立法度之意乞召惇為相上皆納焉十二月復章惇吕惠卿王中正官惇除資政殿學士惠卿復中大夫中正復遥郡團練使給事中呉安詩不書惇録黄中書舍人姚勔不草惠卿中正誥詞皆不聴是嵗河決内黄口九朝編年備要巻二十三
