body:
  text: 九朝編年備要巻一宋陳均撰太祖皇帝起庚申建隆元年止丙寅乾徳四年庚申建隆元年是嵗周禪位唐國主李景呉越王錢俶荆南髙保融湖南周行逢漳泉劉從效奉正朔蜀主孟昶稱廣政二十三年南漢主劉鋹大寳三年北漢主劉鈞天㑹五年春正月甲辰上受周禪即皇帝位辛丑翔北邊奏契丹北漢連兵犯邊周帝命上領宿衛諸將禦之上在周朝掌軍政凡六年士卒服其恩威數從征伐立大功于是主少國危中外始有推戴之議壬寅殿前都副㸃檢慕容延釗帥前軍先發癸夘大軍繼出軍校苖訓號知天文見日下復有一日黒光相盪指謂上親吏曰此天命也是夕次陳橋驛軍士聚于驛門議曰主上幼弱我輩出死力破賊誰則知之不如先立㸃檢為天子然後北征都押衙李處耘具以事白上弟匡義及掌書記趙普因共以事理曉譬之諸將不可乃遣人馳告殿前都指揮使石守信都虞候王審琦二人皆素歸心上者將士環列待旦上醉卧初不省黎明軍士擐甲執兵直叩寢門曰諸將無主願䇿太尉為天子上驚起披衣未及應則相與共扶出㕔事或被上身以黄袍且羅拜庭下呼萬嵗上固拒之不可共扶上上馬擁逼南行匡義叩馬請曰治天下者當使百姓戴若君父京師天下根本願號令諸將禁戢攘奪上曰甚善乃攬轡誓諸將曰汝等自貪富貴欲立我為天子能從我命則可不然我不能為若主也衆皆下馬曰惟命是聽上曰少帝及太后我皆北面事之公卿大臣皆我比肩之人也汝等無得凌暴近世帝王初入京城皆縱兵大掠擅刼府庫汝等无得復然事定當厚賞汝不然當族誅汝衆皆拜乃整軍自仁和門入秋毫無所犯上歸公署諸將擁范質等至上嗚咽流涕曰吾受世宗恩為六軍所逼一旦至此慙負天地將若之何質等未及對羅彦瓌挺劍而前曰我輩無主今日必得天子上叱之不退質等不知所為王溥降階先拜質不得已從之乃奉上詣崇元殿行禪代禮班定獨未有周帝禪位制書翰林承㫖陶穀出於袖中遂用之宣徽使引上就龍墀北面拜受訖宰相扶上升殿易服東序還即位羣臣拜賀奉周帝為鄭王太后為周太后遷居西宫上一日罷朝坐便殿不樂者久之左右請其故上曰爾謂為天子容易耶乗快指揮一事而誤故不樂耳上之初即位也欲陰察羣情頗為微行或諫上輕出上笑曰帝王之興自有天命周世宗見諸將方面大耳者皆殺之我終日侍側不能害也既而微行愈數曰有天命者任自為之不汝禁也軍校有獻手檛者曰可備不虞上笑投之地曰使我親用此事將奈何且當是時此物固足恃乎乙巳詔定有天下之號曰宋因所領節度州名也大赦改元贈周韓通官嘉其臨難不茍免也通與上同掌禁衞上之入京師也通時為副都指揮使欲率衆備禦王彦昇殺之上追贈通中書令仍以禮葬之以彦昇棄命專殺終身不授節鉞超進石守信等官職守信自殿前都指揮使易鎮為侍衞馬步軍副都指揮使髙懐徳自馬步軍都指揮使易鎮為殿前副都㸃檢張令鐸自步軍都指揮使易鎮為馬步軍都虞候王審琦自殿前都虞候升防禦為節度為殿前都指揮使張光翰自虎捷左廂都指揮使為馬步軍都指揮使趙彦徽自虎捷右廂都指揮使為步軍都指揮使遣使詣諸州振貸以趙普為右諫議大夫樞宻直學士初上領宋鎮普為書記與節度判官劉熈古觀察判官吕餘慶攝推官沈義倫皆在幕府至是普以佐命功遷乃召熈古為左諫議大夫餘慶端明殿學士義倫户部郎中皇弟匡義加睦州防禦使賜名光義立太廟從有司之請也嵗以四孟月及季冬凡五享朔望薦食薦新三年一祫以孟冬五年一禘以孟夏其七祀春祀司命及户夏祀竈季夏祀中霤秋祀門及厲冬祀行皆竇儀所定也尋上髙祖朓諡曰文獻廟號僖祖陵曰欽陵妣崔氏諡曰文懿曾祖珽諡曰惠元廟號順祖陵曰康陵妣桑氏諡曰惠明祖敬諡曰簡恭廟號翼祖陵曰定陵妣劉氏諡曰簡穆考𢎞殷諡曰昭武廟號宣祖陵曰安陵陵名諡號皆竇儀所撰定也時聶崇義所上郊廟器玉新圖尹拙等多所駁難乃悉令儀裁定頒行二月尊母太夫人杜氏為皇太后加范質王溥魏仁浦呉廷祚官上待周三相並以優禮質自司徒平章事昭文舘大學士參知樞宻院事加侍中溥自右僕射平章事監脩國史參知樞宻院事加司空仁浦自樞宻院中書侍郎平章事集賢殿大學士加右僕射自唐以来三大舘職皆宰臣兼之首相昭文次監修次集賢國朝因焉時質溥皆罷參知樞宻又加樞宻使呉延祚同二品以其父名璋故避之三月定色尚赤臘用戍有司言周木徳木生火故也夏四月定樂名改周樂文舞崇徳之舞為文徳之舞武舞衆咸之舞為武功之舞十二順為十二安樂章皆竇儀所定也昭義李筠據澤州命石守信等討之筠在鎮逾八年陰為跋扈之計周世宗每優容之上遣使諭以受禪筠既延使者置酒張樂遽索周祖畫像置㕔壁泣涕不已潜遣其親吏往北漢納欵求援從事閭丘仲卿説筠曰公孤軍舉事其勢甚危雖倚河東之援恐亦不得其力大梁甲兵精鋭難與爭鋒不如西下太行直抵懐孟塞虎牢據洛邑東向而爭天下計之上也筠不能用北漢主傾國南下羣臣餞之汾水趙華曰李筠舉事輕易必无成陛下掃境赴之臣未見其可北漢主拂衣上馬軍于太平驛遣其平章衞融宣徽使盧賛將兵救筠筠留其長子守節守上黨自帥其衆南出與守信等遇于長平守信等大破之盧賛溺死筠走保澤州諸軍五月己亥朔日有食之遷周廟初詔改作周六廟于西京至是成遣官奉神主遷焉郭進加洺州防禦兼西山巡檢備北漢也上親征李筠六月克之赦秋七月上至自澤州筠自焚獲北漢衞融進攻潞州筠子守節以城降北漢主遁歸謂趙華曰果如卿言吾幸全師以歸但恨失衞融盧賛爾由是重文學之士久之華請老時已罷為左僕射遂使食其禄終身以趙𢎞兼平章事尋以融為太府卿初融之被執也上詰融曰汝教劉鈞助李筠反何也融從容對曰犬各吠非其主臣四十口衣食劉氏誠不忍負之陛下冝速殺臣臣必不為陛下用縱不殺臣終當間道走河東耳上怒命左右以鐵檛擊其首血流被面融呼曰臣得死所矣上曰忠臣也釋之命以良藥敷其瘡上命融致書于劉鈞求周光遜李廷玉約亦歸融太原鈞不報融遂留以昝居潤權知鎮州初以知州易方鎮也八月朔御崇元殿行入閣儀置待制候對官賜廊下食入閣唐制起于天寳明皇以无為守成詔晏朝喚仗百官從容至閣門入蓋唐前含元殿非正至大朝㑹不御次宣政殿謂之正殿每坐朝必立仗于正衙或御紫宸殿即喚正衙仗自宣政殿兩門入是謂東西上閣門故謂之入閣其後遂為常朝之儀五代以来既廢正衙立仗而入閣亦希濶不講至是復行之然御前殿非唐舊矣崇元殿即大慶殿前殿也待制候對者亦唐制也每正衙待制官兩員正衙退後又令六品以下于延英候對皆所以備顧問其後每入閣即有待制次對官後唐天成中廢至是復行之廊下食起唐貞觀其後常參官每日朝退賜食謂之廊飱唐末浸廢但於入閣起居日賜食今循其制以皇弟光義領泰寧節度立夫人王氏為皇后彰徳節度使饒之女也頒新權衡以趙普為樞宻副使上之征澤潞也普請行上笑曰卿豈勝甲胄耶至是師還論功上曰普冝在優等遂遷九月命石守信等討淮南李重進重進周太祖之甥也上之受禪重進請入朝上賜詔止之重進自以前朝舊親恐不得全乃決意反遣使請援于唐唐主不敢納荆南髙保融卒弟保朂領軍務保融性迂緩御軍治民皆無法髙氏始衰貶趙逢官逢時為中書舍人上之征澤潞也山徑狹隘多石上自取數石于馬上抱之下皆爭負逢憚險偽傷足留懐州及師還將大有除拜逢又稱疾請于私第草制上怒貶房州司户呉越𣙜酒酤冬十月河決厭次又決靈河荆罕儒襲北漢汾州死之詔誅其部將不用命者二十九人罕儒時為晉州鈐轄詔流内銓選士詔吏部流内銓選用士人上親征李重進十一月克之重進自焚誅唐叛臣杜著上使諸軍習戰艦于迎鑾唐主懼甚其小臣杜著頗有辭辨偽作商人由建安渡来歸而彭澤令薛良坐事責池州文學亦挺身來犇且獻平南䇿唐主聞之益懼上命斬著于下蜀市良配𨽻廬州牙校十二月上至自揚州定縣望以户籍為率户四千以上為望次為𦂳為上為中為下凡五等三年一定版籍之數國初户數凡九十六萬七千有竒唐泉州留從效稱藩寛商征自唐末藩鎮擅利其後諸國分據故征𣙜尤繁是年詔所在毋得苛留旅人非有當筭之幣勿捜其篋是嵗幸國子監通鑑書在四月范祖禹帝學書在正月次月又幸籍記人才應内外官為時所推者别籍之以待不次選用辛酉建隆二年唐國呉越荆南湖南漳泉奉正朔蜀稱廣政二十四年南漢大寳四年北漢天㑹六年春正月幸造船務閲習水戰遣使度民田周末遣使度田多失實至是上精擇其人仍加戒飭未幾館陶令坐括田不實杖流海島而人始知畏浚蔡渠通淮右之漕也命右領軍陳承昭督其役二月幸飛山營閲炮車浚五丈渠通東北之漕也亦命陳承昭督之夾汴河造斗門上曰河渠之役非獲己煩民奉己之事朕不為也後改蔡渠為惠民河五丈渠為廣濟河汴都仰給漕運嵗調丁夫浚河糧皆自齎上初即位即詔官給其食遣使監輸民租懲五代藩鎮重斂之弊也時符彦卿在天雄軍取民尤悉上更賜公粟以媿之後閆式等並坐監輸增羡貶秩常盈倉更以多入民租棄市而民力方少甦唐李景遷南昌立呉王從嘉為太子監國守建康以左僕射嚴續知樞宻院事湯悦佐之悦即殷崇義也姓犯宣祖諱改焉唐主至南都城邑迫隘宫府營廨十不容一二羣臣日夜思歸唐主大怒欲誅始謀者唐鎬發病卒三月内酒坊火酒工乗火入三司盜官物酒坊使左承規等坐棄市誅酒工五十人宰相極諫上遽命釋之獲免者尚十二人却長春節及他慶賀貢獻幸作坊宴射上酒酣顧謂王彦超曰卿向在復州朕往依卿何不納朕彦超頓首曰當時臣一刺史耳勺水豈能容神龍乎上笑而罷翌日彦超上表待罪上遣中使􅇺撫之因謂侍臣曰沈湎于酒何以為人朕或宴㑹至醉經宿未嘗不悔也閏月解慕容延釗韓令坤兵權延釗自殿前都㸃檢罷為山南西道節度令坤自侍衞親軍都指揮使為成徳節度自是殿前都檢㸃不復除授京師之兵以殿前侍衞二司領之時殿前司領騎兵之額三十七步兵之額二十六侍衞司領騎兵之額三十五步兵之額八十三金房等州飢遣使賑之夏四月癸巳朔日有食之嚴贓吏法時商河令李瑶坐贓杖殺自是贓墨之吏間有寘極刑者寛麯鹽酒禁漢法犯私麯者並棄市周祖始令至五斤死至是詔犯私麯十五斤以私酒入城至三十者始處極刑其餘論罪有差又以前朝鹽法太峻定以官鹽䦨入禁地貿易至五十斤私煮至三斤者坐死以鈔鹽入城市三十斤以上者奏裁越明年及乾徳四年申下詔寛之罪至死者奏裁法益輕而犯者益鮮累朝復從寛減不復用死刑矣五月赦皇太后寢疾上憂懼乃降是赦置諸軍剰員以處退兵令所在揀閲升驍勇退老弱罷常參官序遷法舊制皆以嵗月序遷上曰此非循名責實之道㑹監門衞將軍魏仁滌等治市征有羡並詔增秩自是不以序遷矣募傳置卒先是調丁夫為之民以為苦嚴故入法五代以来牧守多武人率意用刑至是金州防禦仇超判官左抶並坐故入抵罪自後人始知奉法六月皇太后杜氏崩后聰明有智度每與上參決大事猶呼趙普為書記曰趙書記且為盡心吾兒未更事也及寢疾戒上傳位光義曰若周有長君汝安得至此因命趙普于榻前為誓書其尾曰臣普記藏之金匱唐主景死子煜立即從嘉也煜遂以景喪歸金陵尊母鍾氏為大后后父名泰章易號曰聖尊后立妃周氏為國后封其諸弟從善從鎰從諫從度從信以嚴續為司空平章事湯悦右僕射樞宻使罷諸屯田務歸出縣先是唐用辱徳明等議興復曠土為屯田典掌者非人大為民患至是罷之民稍休息秋七月解石守信等兵權上既誅李筠及重進一日召趙普問吾欲息天下兵與國家為長久之計其道何如普因言自唐季以来帝王數易由節鎮太重君弱臣强而已今莫若少奪其權制以錢榖收其精兵則天下自安又言石守信王審琦等皆非統馭才冝授以他職上悟于是召守信等宴酒酣屏左右謂曰我非爾曹之力不得至此念爾曹之徳无有窮盡然終夕未嘗敢安枕而卧也守信等皆曰何故上曰是不難知居此位者誰不欲為之守信等皆頓首曰陛下何為出此言今天命已定誰敢復有異心上曰不然汝曹雖無異心如麾下之人欲富貴者何一旦以黄袍加汝之身爾雖不欲為其可得乎皆頓首涕泣曰臣等愚不及此惟陛下哀矜指示可生之途上曰人生如白駒過隙所為好富貴者不過欲多積金錢自娯樂使子孫無貧乏耳爾曹何不釋去兵權出守大藩擇便好田宅市之為子孫計多置歌兒舞女日飲酒相歡以終其天年我且與爾曹約為婚姻君臣之間兩无猜疑上下相安不亦善乎皆拜謝曰陛下念臣等至此所謂生死而骨肉也明日皆稱疾請罷乃以侍衞都指揮使石守信為天平節度殿前副㸃檢髙懐徳為歸徳節度殿前都指揮使王審琦為忠正節度侍衞都虞候張令鐸為鎮寧節度皆罷軍職獨守信兼侍衞都指揮使如故其寔兵權不在也殿前副都㸃檢自是亦不復除授以皇弟光義為開封尹同平章事張瓊為殿前都虞候上謂衞士如虎狼非瓊不能制内客省使王賛知揚州上以江南未下素知賛有材有意大用之賛之任船覆溺死上悼之曰溺吾樞宻使也初唐制百職皆九寺三監分典自開元中置諸司使而寺監之務始多歸焉國朝因之自内客省使至閤門使謂之横班皇城使以下二十名謂之東班宫苑使以下二十名謂之西班八月削義武孫行友官行友在鎮逾八年上初即位行友不自安累乞解官歸山上不許行友懼乃繕合甲兵將還據狼山以叛兵馬都監宻表其事上遣閤門副使武懐節馳騎㑹鎮趙之兵偽稱巡邊直入定州行友不之覺既而出詔示之令舉族歸朝行友倉皇聽命既至削奪官爵禁錮私第女真貢馬女真本名朱里真土語舌音訛為女真或曰慮真避契丹諱又曰女直肅慎之遺黎而渤海之别族也或曰本姓挐三韓辰韓之後三國志所謂挹婁元魏所謂勿吉唐所謂黒水靺鞨者即其地也有七十二部落不相統制唐貞觀中渤海来朝太宗問其風俗因言及女真自是聞于中國契丹阿保機乘唐衰取北方諸蕃三十六女真在其中自後雖曰臣屬契丹然亦服叛不常契丹覊縻而已與契丹言語不通無文字地皆山林險絶其俗剛勇善射其居以樺皮為屋官之尊者以九曜二十八宿為號職皆曰勃極列猶中國摠管也宗室謂之郎君事無大小必以郎君摠之至是以名馬来貢九月唐主煜使馮謐来貢唐主手表自陳本志沖淡不得已而紹襲事大國不敢有二鄰于呉越恐為所讒上優詔以荅焉初周世宗既取江北貽書江南如唐與囘鶻可汗之式呼國主上因之於是始改書稱詔以髙保朂為荆南節度保朂淫恣記室孫光憲諫之不聽遣使如唐弔祭上召見面賜約束因謂左右曰朕每遣使四方常諭以謹敕頗聞鮮克由禮逺人何觀焉左右請齊之以刑上曰齊之以刑豈若其自然耶要當審擇其人耳冬十月禁邊民出塞盜馬初五代募民盜戎人馬官給其直籍數以補戰騎之闕上欲保境息民遂加禁止前所盜馬盡還之由是夷狄畏慕不敢内侮明憲皇后祔葬安陵後改諡昭憲十一月幸國子監十二月囘鶻于闐来貢初囘鶻既為黠戞斯及唐將石雄等所破餘衆西奔吐蕃寘之甘州可汗景瓊其後也至是遣使来貢于闐王聖文自言出于唐宗室云壬戌建隆三年唐國呉越荆南湖南漳泉奉正朔蜀稱廣政二十五年南漢大寳五年北漢天㑹七年春正月賑淮南飢初沈義倫使呉越歸言揚泗飢民多死郡儲尚多可貸之至秋收新粟有司沮曰若嵗荐飢將無所取償上以詰義倫對曰國家方行仁政自宜感召和氣立致豐稔上悦從之詔長吏觀課農桑自後或因嵗首必下此詔幸國子監二月嚴舉主連坐法去嵗太僕少卿王承哲坐舉官失實貶至是命常參官舉幕職令録有罪連坐乾徳間命陶榖等各舉其充郡佐者謬舉者坐罪詔百官轉對每五日内殿起居以次轉對指陳時政得失事關急切者許非時上章定竊盜贓滿法滿五貫足陌者死幸國子監三月定大辟詳覆法懲五代藩鎮專殺之弊初令諸州巻大辟案委刑部詳覆既又從宗正丞趙郃之請令諸州録參與司法掾同斷獄上嘗讀堯典歎曰堯舜之世四凶之罪止從投竄何近代憲網之宻耶蓋有意于措刑也故自開寳以後犯大辟非情理深害者多貸其死八年三月有司言自二年至今計所貸死罪凡四千六百八人上性寛仁多恕尚食供膳有蝨縁食器旁謂左右曰勿令掌膳者知詔以官車送軍衣送戍卒衣並官給車乗毋得調民開寳初詔諸道輦送上供錢帛舟車並從官給勿以擾民更定合班儀制升六曹侍郎在給舍上郎中在補闕上員外郎在拾遺上節度使在六曹侍郎上中書侍郎下故事北省官為侍從班五品壓南省四品六品壓南省五品節度使在諸司二品下至是改焉又故事臺省官為侍從班内殿起居立于一品之前乾徳間上見太子太保王漙班在臺省官後謂左右曰溥舊相當寵異之乃詔分臺省于東西遂為定制禁火葬留從效卒兄從願之子紹鎡嗣領軍務未幾衙將陳洪進誣紹鎡謀附錢氏執送于唐推張漢思為留後夏四月追册皇后賀氏諡曰孝惠定難李彛興貢馬上方命工治玉帶即遣使以帶賜之彛興感服彛興即彛殷也李氏世為定難軍節度使彛興後唐清泰中襲兄彛超之位周顯徳中封西平王遣使按河北旱田是年七月復遣乾徳二年詔長吏視旱即蠲其租勿俟報五月嚴差役法詔令佐檢察差役有不平許民自相糾舉京百司補吏須不碍役乃聽差司古法也國初循舊制衙前以主官物里正户長鄉書手以課督賦税耆長弓手壯丁以逐捕盗賊承符人力手力散從官以奔走驅使在縣曹司至押録在州曹司至孔目官下至雜職院虞候楝搯等人各以鄉户等第差充熈寧四年始議使民出錢官為雇役謂之免役錢六年行保甲法置保正副大小保長譏察盗賊七年輪保丁充甲頭催稅罷募户長壯丁八年罷耆長令保正大保長管幹别立庸直雇承帖人𨽻其下元豐八年有言耆壯之役則歸于保甲之正長户長之役則歸于催税甲頭是使民出錢免役而復使之執役也有㫖耆户長壯丁並募充等第給雇錢其舊以保正代耆長催税甲頭代保長承帖人代壯丁并罷紹聖元年復雇役二年始以大保長催税一税一替罷差保頭以舊耆長錢支保正户長錢支保長壯丁錢支承帖人建中靖國元年拘收大保長雇錢紹興二年拘收耆户長雇錢十二年拘收壯丁雇錢蓋自保正長承帖人雇錢并起發而充役如故民力于是困矣此其大畧也而其患皆起于保甲代役户寛狹不均重為民病呉延祚罷自樞宻使出領雄武夕陽鎮古伏羌之地也西北接大藪材植所出戎人久擅其利及呉防知秦州置采造務嵗發大木萬本以給京師西戎酋長率衆來爭防出兵與戰上不欲邊境生事命延祚齎詔赴秦州釋所繫戎俘罷采造務六月脩學祠初上命增葺學舍祠宇至是成上自賛孔顔命宰以下撰餘賛上一再臨幸命崔頌判監事頌始聚生徒講書上聞而嘉之遣中使徧賜酒果又命脩武成王廟秋八月命劇可久致仕以其年逾七十无請老意也時為大理卿九月復書判拔萃科冬十月班循資格及長定格編勅十二條武平周行逢卒子保權嗣領軍務衡州太守張文表聞保權立遂作亂自衡州起兵據潭州保權表聞請救幸岳臺閲騎射趙普檢校太保樞宻使樞宻使不帶正官自普始十一月大閲辛酉大閲西郊甲子又閲上謂近臣曰晉漢以来衞士不下數十萬然可用者寡頃閲去冗弱又親校其藝今悉為精鋭矣荆南髙保朂卒兄子繼沖嗣髙麗来貢其王王昭也初班厯于唐十二月定强盗贓滿法滿三千足陌者死復置縣尉自萬户至千户置弓手有差盗賊鬭訟事皆歸令尉五代以来節度使補親隨為鎮將與令抗禮今還統于縣鎮將所領不及鄉村但郭内而已從趙普之請也乾徳三年仍詔諸州監軍巡檢不得與州縣事以姚内斌為慶州刺史時西羌屢為邊患故遣用之上曰分邊寄者朕每優恤其家厚其爵禄多與公錢及屬州課利使得市易特免征筭聽其召募驍勇以為爪牙朕雖減後宫之數極于儉約以備邊費亦無所惜也時諸僣偽之國未下而西北二境未賓先是周翰已命李漢超守關南馮繼業守靈武何繼筠守棣州郭進守洺州上受禪皆因其任又益選將帥之忠勇者委以邊寄于是得李繼勲于潞州賀惟忠于易州姚内斌于慶州延州有趙賛原州有王彦昇隰州有李謙溥瀛州有馬仁瑀通逺軍有董遵誨其家族在京師者撫之甚厚郡中筦㩁之利悉與之恣其圖囘貿易免所過征税許令召募驍勇以為爪牙凡軍中事許從便宜每来朝必召對命坐賜以飲食錫齎殊異以遣之由是邊臣皆富于財得以養募死力使為間諜洞知蕃情每入冦必先知之預為之備設覆掩擊多致克捷自此無西北之虞得以盡力東南取荆湖川廣呉楚之地得猛士守四方推赤心待人之效也繼筠居北邊前後二十年深沉有智畧得士卒死力邉人畏伏惟忠曉兵法有方畧得士卒心用兵所向無敵名振北境十餘年間不敢冦邊内斌在州逾十年逺人畏服目之為姚大蟲蠲河北租時天下旱蝗河北尤甚蜀括逋租龍游令田淳上疏切諫蜀主不能用淳嘗謂所親曰吾觀僣偽改㕔堂為宫殿紫綬為黄服前驅為警蹕僚佐為卿相妻妾為妃后何如常稱成都尹無滅族之慮乎或謂之曰如君之才固堪重寄宜少抵抑淳曰吾安能附狗鼠哉蓋指王昭逺輩也是歳周鄭王遷居房州開寳中以辛文悦為知州上幼從文悦肄業及即位召見授太子中允判太府寺鄭王時在房上以文悦長者故用之癸亥乾徳元年十一月改元是嵗荆南湖南平唐國呉趙漳泉奉正朔蜀稱廣政二十六年南漢大寳六年北漢天㑹八年春二月天雄符彦卿来朝上欲使之典兵趙普諫不聽宣已出復懐入從容言之上曰彦卿豈負朕耶普曰陛下何以能負周世宗上黙然事遂寢彦卿武勇有謀善用兵契丹既滅晉北歸耶律徳光毋問其左右曰彦卿安在或對曰在徐州毋曰不與彦卿来何失䇿之甚也命慕容延釗等㑹周保權討張文表師出江陵髙繼沖降荆南平復以繼沖領荆南上命延釗等欲因假道取江陵髙繼沖使來犒師李處耘遂將輕騎徑往襲之繼沖大懼奉表以三州十七縣十四萬二千户口来歸初李景威請於荆門中道險隘處設伏襲王師繼沖不從扼吭而死上聞之曰忠臣也命厚䘏其家未幾繼沖表請陪祀詔許之因舉族歸朝十二月命鎮武寧澶滑等州飢遣使賑之延釗至湖南保權拒守三月入朗州獲保權湖南平王師之未至也張文表已敗死保權聞王師既下荆南懼而備守遂命進討平之得州十四監一縣六十六户九萬七千定折杖法徒流笞杖各有數凡流刑四曰加役流杖二十配役三年流三千里杖二十二千五百里杖十八二千里杖十七並配役一年徒刑五曰徒三年杖二十二年半杖十八二年杖十七一年半杖十五一年杖十三杖刑五曰杖一百為杖二十九十為十八八十為十七七十為十五六十為十三笞刑五曰笞五十為十下四十三十為八二十十為七舊據獄官令用杖至是定折杖法常行官杖厚薄長短如周顯徳中制徒流笞杖通用常行杖徒罪決而不役徒流者皆背受杖復義倉一石别収一斗乾徳中詔發義倉賑飢民者勿待報夏四月赦荆湖置諸州通判命文臣知州分節度使刺史之權也或節度使刺史有闕則以文臣代之於是賈玭等通判湖南等州李昉權衡州乾徳五年仍詔通判鈐轄都監等毋得受節度使添給幸國子監幸武成王廟閲習水戰鑿池于朱明門外選卒號水虎捷習戰池中上數臨視焉行應天厯王處訥所上上為之序幸玉津園閲騎射五月命文頴致仕先是上命執政擇廷臣董在京諸倉頴以工部侍郎充首選自以清望官辭不肯為上曰惟致仕乃免頴遂請老建隆初下揚州以樞宻院直學士杜韓監州税以朝臣監諸州税始此國初承舊制用三司大將領糧料之職開寳六年改任京官以著作郎陸光範為糧料使未幾京城左右軍巡院亦改用士人以館陶令李蕚安豐令趙中衡兼左右軍巡檢尋又以京官為三司孔目司泉州陳洪進廢張漢思自領軍務六月定武成王廟從祀先是上臨幸觀所畫名將指曰起殺已降不武命去之乃詔張昭竇儀髙錫等取厯代謀臣名將功業始終無瑕者配享梁周翰言昭等所定未當上以升黜之意有所勸懲不報脩前厯代帝王祀典詔先代帝王每三年一享堯廟在臨汾舜廟在河中禹廟在陜湯廟在偃師文王在豐武王在鎬漢髙祖在長陵宜更立光武廟于南陽唐太宗廟于醴泉澶濮等州蝗定蜡社日太常博士和峴上言蜡臘之别名聖朝以戌日為臘而前日辛夘行蜡禮非是按唐貞觀中以前寅蜡百神夘祭社稷辰日臘享宗廟開元定禮三祭皆用臘辰以應土徳有司請用開元禮三祭同用戌日從之定進馬齋郎員唐制禮部簡試太廟齋郎文資也兵部簡試千牛備身及太子千牛武資也蓋文武䕃補之制也後唐天成中定齋郎嵗以三十人為限同光中定千牛左右仗各六員嵗以十二員為限至是減之兵部每嵗補進馬十員禮部補齋郎十五員臺省六品諸司五品登朝第一任方得䕃補命朝官知縣大理正奚嶼知館陶縣監察御史王祐知魏縣楊應夢知永濟縣屯田員外郎于繼微知臨清縣常參官知縣自嶼等始也時符彦卿久鎮大名專恣不法屬邑頗不治故特選强幹者往莅之其後右賛善大夫周渭亦知永濟彦卿郊迎渭揖于馬上就館始與彦卿相見畧不降屈縣有盗傷人而逸渭捕獲暴其罪斬之不以送府渭先是為白馬主簿縣大吏犯法渭即斬之上竒其才故擢右賛善大夫秋七月幸武成王廟幸新池閲習水戰八月河決濟州頒新刑統竇儀等所定也張瓊自殺時軍校史珪石漢卿等方得幸瓊輕侮之二人因譛瓊養部曲百餘人擅威上召諭之不伏下有司案鞫瓊自殺上旋聞其家无餘財只有奴三人甚悔以責漢卿漢卿曰瓊所養一敵百耳上命優䘏瓊家亦不罪漢卿女真来貢蠲登州沙門島居民租賦令專治舟船渡所貢馬九月北漢冦平晉軍郭進等救之未至冦遁時北漢以契丹兵入冦進往救之郭進御軍嚴每入北漢境无不克捷上時遣戍卒必諭之曰汝輩當謹奉法我猶赦汝郭進殺汝矣嘗選御馬直三十人𨽻進麾下押隊屬與北漢人戰往往退怯進斬十餘人奏至上方閲武便殿厲聲曰御馬直千百人中始得一二小違節度郭進遽殺之誠如此壟種健兒亦不足供之乃潜遣中使奬諭之嘗有軍校詣闕訴進不法事上謂近臣曰所訴事多非實蓋進御下嚴此人有過懼而誣之耳即執付進令自誅之㑹北漢入冦進謂之曰我赦汝罪汝能殺㓂則薦汝于朝其人果立功而還奏遷其秩後上令有司為進治第用筩瓦有司言惟親王公主始得用此上怒曰郭進控扼西山逾十年使我無西顧之憂我視進豈減兒女耶十月作版籍户帖户鈔十一月陳洪進稱藩甲子郊奉宣祖配大赦改元先是詔以冬至有事南郊有司言冬至乃十一月晦前一日皇帝始郊不應近晦乃改用十六日甲子郊天之禮唐制每嵗冬至圜丘正月上辛祈榖孟夏雩祀季秋大享凡四祭昊天上帝親祀則并設皇地祇位國朝因之作壇于國城之南每嵗命有司奉祀于南郊其祭皇地祗及神州地祗亦因唐制皇地祗祭以夏至作方丘宫城北十四里神州地祗祭以孟夏别為壇于北郊云太常博士和峴言祭不欲數今十一月十六日親祀南郊請權停二十九日南至之祀從之司徒兼侍中范質為南郊大禮使翰林學士承㫖禮部尚書陶榖禮儀使吏部尚書張昭鹵簿使御史中丞劉温叟儀仗使皇弟開封尹光義橋道頓遞使先是上命范質等講求典故質乃詳定為南郊行禮圖令司天監定從祀星辰圖上之癸亥享太廟是夕陰時夜分開霽上初詣太廟乗玉輅左諫議大夫崔頌攝太僕上問儀仗名物甚悉頌應對詳敏上大悦將升壇有司具黄褥為道上曰朕潔誠事天不必如此命徹之還官將駕金輅顧左右曰于典故可以輦否左右對以無害乃乗輦壬申以南郊禮成大宴廣政殿號曰飲福自是為例十二月皇后王氏崩諡曰孝明后之事昭憲太后也曲盡孝敬得其歡心出鄭起楊徽之為縣令起顯徳中嘗貽書范質言上有人望不宜握禁兵徽之亦嘗以是言于世宗上即位將因事誅之皇弟光義曰此周忠臣也不宜得罪至是並出之鄭起一作孟起閏月覆試拔萃科改卜安陵於西京北漢冦府州折徳扆敗之奉赤帝為感生帝從聶崇義之請也國朝因唐制每嵗四郊迎氣及土王曰祀五方五帝以五人帝配五官三辰七宿從祀崇義言國家以火徳王宜别祀赤帝于是以正月上辛祠之奉宣祖配甲子乾徳二年唐國呉越漳泉奉正朔蜀稱廣政二十七年南漢大寳七年北漢天㑹九年春正月行四時參選法不俟冬集以張去華為右補闕去華為秘書郎上書自薦願與知制誥張澹並試上命承㫖陶榖試之于講武殿澹不應䇿問責授左司員外郎以去華為右補闕朝議薄去華躁進以是不遷秩者十六年范質王溥魏仁浦罷以質等再表求退故也自唐以来宰相入見必命坐大政事則面議之從容賜茶而退自除號令除拜刑賞廢置但入執狀畫可降出即行之質等自以前朝舊臣稍存形迹每事具劄子進呈退即批所得聖㫖同列書字以志之由是奏議浸多而賜茶之禮遂廢未幾質卒自質寢疾上數親臨視器皿不具者賜之質以亷介自持門無私謁五代以来宰相多取給方鎮質始絶之為相日命刺史縣令必以户口版籍為急每遣使者按民田及獄皆召見為述天子憂勤之意時號賢相上後因講求輔弼謂左右曰范質居第之外不營資産真宰相也太宗亦素重質以為前朝宰相循規矩重名器持亷節无出質之右者但欠世宗一死耳以趙普同平章事李崇矩為樞宻使上既除普及崇矩无宰相書勅使問翰林陶榖榖謂自昔輔相未嘗虛位唯唐太和中甘露事數日无宰相時左僕射令狐楚等奉行制書今尚書亦南省長官可以書勅竇儀曰榖所陳非承平令典令皇弟開封尹同平章事即宰相之任也上從之尋命普監脩國史先是宰相兼職皆内降制處分至是止用勅非舊典也夏四月親䇿制科周設賢良經學吏理三科至是親䇿賢良科得博州判官頴贄改葬宣祖及昭憲皇后于安陵以孝明孝惠二后祔尋以神主祔别廟孝明居上孝惠次之置㕘知政事上欲為普置副而難其名稱召問陶榖下宰相一等何官榖引唐㕘知政事為對薛居正時為樞宻直學士吕餘慶為兵部侍郎乃命二人并以本官兼之不宣制不押班不知印不升政事堂蓋未欲遽令與普齊也史臣曰按唐㕘預朝政㕘知政事等職皆宰相任也髙宗嘗欲用郭待舉㕘知政事復以其資淺止令同承受平章事則平章事亞于㕘政矣榖言失之六月以皇子徳昭為防禦使前代皇子出閣即封王上以徳昭未冠特殺其禮非舊典也紹聖中皇子初命即封國公遂為故事河南北陜西蝗秋七月定選法陶榖所上詔行之自是銓選漸有倫矣初張昭領選凡京官七品以下猶屬銓自後京官以上无選中書門下時除而使府不許辟召募職悉由銓授詔吏部奏擢選人上慮銓衡止凴資厯英俊或沉下僚命取選人堪升擢者上之八月置𣙜貨務置于京師及沿江令商旅入金帛京師執引詣沿江給茶九月永安折徳扆卒以其子御勲嗣知府州自是世襲冬十一月命王全斌等伐蜀蜀主以蠟書遺北漢謀連兵入冦上曰吾西討有名乃命全斌等將兵三萬由鳯州道劉光義等將兵二萬由歸州道進討崔彦進曹彬等副之上詔諸將毋得侵暴違者以軍法從事又為蜀主治第以待其至蜀主聞王師出命王昭逺趙崇韜韓保正李進分兵拒戰全斌攻拔興州又敗蜀兵于三泉禽保正及進初蜀于夔州鎖江為浮梁上設敵樓二重夾江列礟上出地圖指其處謂諸將曰泝江至此切勿以舟師爭勝當先遣步騎潜擊俟其稍却乃引戰棹夾攻可必勝也光義至如上䇿攻克之髙彦儔戰死于是蜀將焚浮梁而遁時京師大雪上設氊帷于講武殿衣紫貂裘㡌以視事忽謂左右曰我被服如此體尚覺寒西征將帥衝犯霏霰何以堪處即解裘㡌遣中黄門馳驛齎賜全斌且諭㫖諸將以不能徧及也全斌拜賜感泣乙丑乾徳三年是嵗蜀平唐國呉越漳泉奉正朔南漢大寳八年北漢天㑹十年春正月克劔門下劒州孟昶降蜀平全斌等趨劒門次益光得降卒言益光江東越大山數重有狹徑名來蘇蜀人于江西置柵對岸可渡自此出劒門南二十里至青彊與官道合若行此路則劍門不足恃也乃分兵趨来蘇跨江為浮梁以濟蜀人見之棄塞而遁遂至青彊與大軍夾擊劍門破之執王昭逺趙崇韜劉光義等進克萬施開忠四州峽中郡縣悉下次遂州知州陳愈舉城降盡出府庫金帛以給將士初諸將辭行上謂之曰所破郡縣當傾帑藏為朕賞戰士國家所取惟土疆耳故人皆效命所至成功如席巻之易云是時蜀兵所在潰奔蜀主聞之大懼司空李昊勸昶降昶命昊草表前蜀之亡也降表亦昊為之蜀人夜書其門曰世脩降表李家表至全斌以聞昶詣軍降自全斌等發京師至昶降凡六十六日得州四十六縣二百四十户五十三萬四千為西川路初王師之下西蜀也諸將所過咸欲屠戮以逞獨曹彬禁止之故峽路兵終始秋毫不犯上聞之喜曰吾任得其人矣賜詔褒之王仁瞻自蜀返厯詆諸將獨曰清亷畏謹不負陛下使者唯曹彬一人耳上嘗從容問彬以官吏能否彬惟薦沈義倫可任昶尋至闕上表待罪詔釋罪昶入見上勞執之賜賚甚厚始議伐蜀也詔有司治昶第一區凡五百餘間遂以賜之加昶檢校太師中書令秦國公仍授其子弟及偽相李昊等官未幾昶卒昶母李氏不哭舉酒酹地曰汝不能死社稷貪生至今日吾所以忍死者為汝在耳今汝既死吾安用生因不食數日亦卒二月壬寅朔日當食不虧赦西蜀賜師所過租除科役賦調之无名者賑貧乏赦羣盜訪賢才叙官吏蜀人以安自是下嶺表平江南皆如之上聞西川行營有大校割民妻乳而殺之者亟召斬之近臣營救頗切上流涕曰興師弔伐婦人何罪殘忍至此當使置法以償其寃時蜀中群盗四起將士多驕恣全斌等不能禁命吕餘慶知成都餘慶至捕斬軍校為刼者民乃寧居馮瓉知梓州瓉視事纔數日㑹亂卒嘯聚夜攻州城瓉曰烏合之衆必無固志旦自潰矣城中止有三百人分守諸門瓉坐城樓宻令促其更籌未夜分擊五鼓賊遁去三月令諸州令入輸京師自唐天寳以来方鎮屯重兵以賦入自贍上供殊鮮五代方鎮益强率厚自利故趙普勸上革其弊時方鎮闕帥稍命文臣權所在場院間遣京朝官廷臣監臨又置轉運使通判由是利歸公上外權削矣開寳六年令諸州錢物盡數係省毋得妄有支費置封樁庫國初貢賦悉入左藏庫及取荆湖下西蜀儲積充羡上顧左右曰軍旅飢饉當預為之備不可臨事厚歛于民乃于講武殿後别為内庫以貯金帛凡嵗終用度之餘皆入焉夏五月大赦秋七月河決陽武八月籍諸道驍勇補禁衞上親臨試之用趙普之謀也按建隆中以諸郡本城兵供百役或更戍他郡三司禁旅就糧州郡亦不得常坐食于京師自列郡各置禁軍嚴差出占破之令而壯城作院各置指揮由是禁軍无就糧者而廂軍亦升為禁軍不復戍役矣按祥符天聖徧勅諸郡自騎射至牢城凡名額二百二十三總為本城而已所謂禁兵者皆三司之卒分屯而更戍令之屯駐駐泊之名而鈐轄都監監押之官所部領者也三邊之兵間因事宜升為禁軍者則所謂四十四處禁軍如咸平中并陜西選中保捷慶厯中升河北教閲本城為禁軍之類是已是為就糧自元昊叛而西北有保毅王倫叛而東南有宣毅於是列郡稍置禁軍嘉祐中詔東南帥司各置威果凡二十五指揮亦无過九大郡熈寧按天下廂軍之籍五十萬人而不足以戰于是教閲之法起其後以廂軍省併為額則今之兩浙崇節福建保節之類是也教閲之兵因别為額而𨽻之將下則今兩浙雄節福建廣節之類是也五年始排立就糧禁軍之下元豐兵令悉以雄節之類升同禁軍由是禁軍始遍天下矣九月河決澶州命治之御講武殿閲兵以馬軍為驍雄步軍為雄武并屬侍衞司初上命給諸軍緡錢俾取妻王繼勲主雄武軍不能戢下凡百餘人掠人妻女上聞大怒命捕杖之小黄門見而不奏亦杖數十𣙜蘄黄等州茶從淮南轉運使蘇曉之請也蘄黄舒廬夀嵗入百餘萬緡冬十二月更定舅姑服制初令婦為舅姑服三年丙寅乾徳四年唐國呉越漳泉奉正朔南漢大寳九年北漢天㑹十一年春三月廢義倉夏四月禁獻羡餘詔曰出納之吝謂之有司張全操所言諸場院有羡餘芻粟者請行賞典此非掊克民租私減軍食何以致之宜寢其事仍嚴加止絶五月收蜀圖書上遣使收蜀圖書法物所上法物見昶七寳裝溺器曰自奉如此欲无亡得乎遽命碎之初上命宰相撰前世所无年號以改今元既平蜀得蜀鏡有乾徳四年字上召陶榖竇儀問之儀曰昔偽蜀王衍有此年號上歎曰宰相須用讀書人由是益重儒臣嘗謂近臣曰今之武臣欲盡令讀書貴知為治之道近臣莫對上性嚴重寡言獨喜讀書雖在軍中手不釋巻顯徳中從世宗平淮甸或譛上曰趙某下夀州所載數車皆重寳也世宗遣使按之唯書數千巻无他物世宗召諭曰卿方為朕作將帥何用書為上頓首曰臣無竒謀上賛聖徳所以聚書欲廣聞見增智慮也六月定内侍養子法年滿三十无養子者聽養一子䇿制科於紫雲樓下上從容謂翰林學士承㫖陶榖等曰則天女主耳雖刑罰枉濫而終不殺仁傑所以能享國者良由此也因論前代帝王得失日晡乃罷田涉等所試文理疎畧并賜酒食遣之河決灌城秋七月置俸户聽州縣官各置俸户月輸錢五百以安守忠為漢州刺史上每遣使必戒之曰安守忠在蜀能自律已汝輩宜慕效之八月河決靈河發夫卒數萬命韓重斌等董其役治之以孔宜為曲阜縣主簿孔子四十四代孫也舉進士不中因上書述其家世特命之宴近臣宴紫雲樓下上因論及民事謂趙普等曰愚下之民雖不分菽麥如藩侯不為撫養務行苛虐朕斷不容之普對曰陛下愛民如此乃堯舜之用心也開寳中又嘗謂宰臣曰年榖豐登人物繁盛若非上天垂祐何以及此所宜宣恩濟治振舉闕政庶幾開太平之基也閠月求遺書九月寛縁坐法時蜀戍卒有亡命在賊黨中者或請按誅其妻子上曰朕慮其間有被賊驅脅非本心者乃盡釋之免者幾萬餘人以党進領侍衞步軍司先是禁軍校自軍都虞候以上悉以所掌卒伍數細書于所執之梃謂之杖記如笏記焉進本出戎虜不識文字上一日問進兵籍幾何進不能對舉梃曰盡在是矣上笑謂其忠實益厚之進每擐甲胄則髭髯皆䜿目光如電望之若神人冬十一月初用雅樂日南至上御乾元殿受朝畢常服御大明殿羣臣上夀初用雅樂登歌文徳武功二舞先是上以禮樂之器尚多淪廢命太常司和峴講求修復皆如舊制又以雅樂聲髙命峴討論峴請以司天臺景表石尺為準取王朴所定尺校之短于石尺四分樂聲之髙由此乃别造新尺并黄鐘九寸之管使工人校其聲實下于朴所定管一律遂别造十二律管以取聲音始和暢至是用之十二月竇儀卒上以儀在滁州不與親吏交每嘉其有守屢欲用儀為相趙普忌儀剛直遽引薛居正吕餘慶為副又與陶榖趙逢髙錫等共排之事遂寢卒終于翰林學士上憫然曰天何奪我竇儀之速也上嘗岸幘跣足召儀儀不肯入亟索冠帶而後召入儀因進曰陛下創業垂統宜以禮示天下上歛容謝之由是對近臣未嘗不冠帶也陶榖文翰冠一時自以久次意且大用然為人傾側狠媚事魏仁浦望塵而拜上素薄之遂不用九朝編年備要巻一
