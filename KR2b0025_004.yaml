body:
  text: 九朝編年備要卷四宋陳均撰太宗皇帝起丙戌雍熙三年止癸巳淳化四年丙戌雍熙三年春正月命曹彬等分道伐契丹彬克涿州田重進降飛狐靈邱二縣及蔚州潘美降寰朔應三州克雲州尋命遷四州民於許汝間夏五月詔班師先是知雄州賀令圖等上言契丹主年幼國事决於其母請乘釁取幽薊上始命彬等北伐時李惟清張鑑李至等並切諫皆不聽彬等之行也上諭以潘美之師但先趣雲應卿以十萬之衆聲言取幽州持重緩行毋貪小利彼聞大兵至必悉衆救范陽不暇援山後矣彬至涿州留十餘日食盡退師雄州以援供饋上聞之大駭曰豈有敵人在前而却軍以援粟乎亟遣使止之彬所部聞美及重進屢捷恥不能有所攻取乃再趍涿州復以糧食不繼退師至岐溝關契丹追及之我師大敗彬等未還趙普上疏切諫曰陛下出師將以取復幽薊今戰鬬不息民疲師老臣以為克復未可期也上優詔答之上以諸將違詔失律作自勉詩賜近臣初議興兵上獨與樞密院計議一日至六召中書不預聞及敗召樞密使王顯副使張齊賢王沔謂曰卿等共視朕自今復作如此事否上既推誠悔過顯等咸愧懼若無所容宰相李昉等相率上疏言漢髙祖文帝和親事請密諭諸將微露事機庶幾可弭邉塵六月戊戌朔日有食之選滄霸等州守臣張永德知滄州宋渥知霸州劉廷讓知雄州趙廷溥知貝州廷讓等皆宿將久罷節鎮上欲令擊敵自效故與廷溥並命初上選楊延慶等分知諸州因謂宰相曰刺史之任最為親民苟非其人則民受其祻者昔秦彭守潁川崇尚儒雅教化大行境內乃有鳯凰麒麟嘉禾甘露之瑞足為善政也秋七月以李繼隆為馬軍都虞候初米信等軍敗獨繼隆所部成列而還即命繼隆知定州及詔分屯諸軍繼隆令書吏盡録其詔旬日有敗卒集城下不知所向繼隆按詔給券俾各持詣所部上嘉其有謀故命之田重進馬步軍都虞候自張令鐸罷凡二十五年不除人幽州之役惟重進之師不敗故特命之上之為晉王也嘗以酒炙饋重進重進拒不受使者曰晉王之賜何可拒重進曰我知陛下何晉王也卒不受上由是愈重之始終委遇焉遣使賑劔州饑八月契丹陷寰州契丹復據雲應朔等州初遷四州之民屬潘美楊業以所部護送之敵兵邀擊之業力戰自日中至暮手刃數百人馬重傷不能進遂為敵所擒業太息曰上遇我甚厚何面目求活於敵中乃不食三日而死業不知書忠烈武勇有智謀練習攻戰與士卒同甘苦故士卒樂為之用其敗也麾下尚有百餘人業慰遣之皆感泣不肯去遂俱死無生還者上聞業死甚悼之詔削美三任賜業官錫其家粟帛録其子五人冬十月授黎桓靜海節度命李若拙李覺齎詔往使桓拜詔盡恭燕享日以竒貨異物列於前若拙一不留眄又却其私覿十二月契丹冦瀛州劉廷讓禦之戰於君子館全軍敗沒廷讓僅以身免賀令圖為契丹所紿縳而去令圖貪功生事輕而無謀初與其父懷浦首謀北伐一嵗中父子皆敗天下笑之冦代州守臣張齊賢敗之兵薄城下神衛都校馬正率所部禦之衆寡不敵副部署盧漢贇畏懦保壁自守齊賢選廂軍二千出禦之左右誓衆感慨一以當百敵少却先是齊賢約潘美以并師來㑹間使為敵所得既而美使至謂有㫖令毋出師齊賢乃閉其使室中夜遣兵由城西南持幟燃炬敵見謂并師至駭而北走齊賢先伏兵掩擊大敗之齊賢悉歸功於漢贇漢贇以捷音聞上優詔褒答後知漢贇未嘗接戰罷之丁亥雍熙四年春正月遣使按察川廣江浙等路韓援等八人契丹入冦陷深欣德易等州詔寬恤邉郡釋潰卒之罪贍戰沒之家録用勞績及死事者子孫蠲河北逋租經戎冦蹂踐處給賜有差自曹彬及劉廷讓等相繼敗覆緣邉瘡痍之卒不滿萬人河朔震恐無復鬬志敵長驅深入虜掠士民魏博以北咸被其祻上深哀痛焉故下是詔增築河北城壘時陳恕知大名府器用多取於民不時集恕怒命禽府中大豪一人將斬之叩頭流血請限翌日辨其事過朞甘死不數日而功就夏四月募河北義軍上將大討契丹令河南北諸州募丁壯為義軍京東轉運李惟清三疏爭之李昉等相率上言河南百姓世習農業罔知戰鬬或慮人情搖動相聚為盜陳王元僖亦言願且於河北諸州㸃集上納之詔陳禦戎䇿侍御史趙孚上言大略謂宜內修戰備外許歡盟上嘉其言併水陸發運為一司五月許文臣換武殿中侍御史栁開上言願效死北邉上亦欲並用文武戡定冦亂於是開與鄭宣等並換授焉遣使諸路市馬越明年冬國子博士李覺上疏論馬政略曰市馬之費嵗益而廏牧之數不加者蓋失其生息之理也且戎人畜牧轉徙旋逐水草騰駒遊牝順其物性由是浸以蕃滋也暨乎市易之馬至於中國則縶之維之飼以枯槁離析牝牡制其生性𤣥黃虺隤因而減耗宜然矣又不同中國之馬服習成性食枯芻處華廏率以為常故多生息日無耗失今軍伍中牝馬甚多而孳息之數尤鮮者何也皆云官給秣飼之費不充又馬多産則羸弱駒能食則侵其芻粟馬母愈瘠飬馬之卒有罪無利是以駒子生乃令嗅灰而死其後官司知有此蠧於是議及養駒之卒量給賞緡其如所賜無幾而尚習前弊今竊揣量國家所市戎馬直之少者匹不下二十千往來資給賜豫復在數外是貴市於外夷而賤棄於中國非理之得也國家縱未能别擇牝馬以分畜牧宜且減市馬之半直賜畜駒之將卒增其月給俟其後納馬即止是貨不出中國而馬有滋也大率牝馬二萬而駒牧其半亦可嵗得萬匹況復駒又生駒十數年間馬必增倍後趙守倫復建議行之牧馬頗蕃息矣賜諸將陳圖名曰平戎萬全陳圖召潘美田重進崔翰等親授之並書將有五材十過之說以賜焉秋七月置三班院初供奉官殿直殿前承㫖悉𨽻宣徽院至是以其衆多别置三班院領之十二月詔以取士之職歸有司先是上閲試舉人纍日方畢宰相屢請以春官之職歸於有司如唐故事乃詔嵗命春官知舉戊子端拱元年春正月親耕籍田上作東郊籍田詩賜近臣因曰國之上瑞惟豐年耳自纍嵗登稔人無疾疫求治雖切而德化未洽天貺至是能無懼乎大赦二月置司諫正言改左右補闕拾遺為之上以時多循默失建官本意故更以新名欲使舉職也禁獻珍禽異獸李昉罷為右僕射先是有翟馬周擊登聞鼓訟昉不憂邉思職但飲酒賦詩并置女樂等事於是上召賈黃中草制令切責之黃中言僕射師長百寮舊宰相之任今自工部尚書拜乃殊遷非斥責義若以文昌務簡均逸為辭庶幾得體上然之以趙普為太保兼侍中吕䝉正平章事普舊德元老䝉正晚出驟進與普同位普甚推許之皇子元僖封許王上手詔戒元僖等大略謂帝子親王先須克己勵精聽卑納諫每著一衣則憫蠶婦每餐一食則念耕夫至於聽斷之間勿先恣其喜怒元僖尹開封御史中丞因事劾奏之元僖訴於上乞賜寬宥上曰此朝廷儀制孰敢違之朕若有過臣下尚加糾擲論罰如式駙馬都尉王承衍石保吉等自鎮藩入朝御史召詣臺參承衍等訴之上曰風憲之職朝綱在焉汝當亟往詔諸路賑饑申警官吏上勵精求理欲聞讜論患羣下莫肯自盡下詔申警之俾悉當上言振職其後上封事頗衆有詔閣門非涉僥望乃許受之三月求直言侯莫陳利用伏誅利用成都人初以左道得幸官至團練使大為姦利趙普發其事請誅之上欲貸其死普固以請且曰陛下不誅是亂天下法法可惜此何足惜哉上竟為誅之夏四月復北邉互市仍禁戍卒侵略纍歲征行民力雕耗上頗有厭兵之意矣尋以郭守文為鎮州都部署上面命之曰朝廷以鎮定髙陽控扼往來咽喉敵若敢踰鎮定汝但勿與戰守文得俸祿皆市牛酒以犒軍士卒之日家無餘財武夫悍卒皆為流涕先是將臣以重兵戍邉者多生事致冦以守文沈靜有謀略命鎮常山及卒上擇可繼守文者默然良久曰劉廷翰其人也罷水陸發運以其事分𨽻排岸司五月置祕閣於崇文院分三館書以實之淳化初詔與三館並列從李至之請也先是求古書竒畫墨跡悉集祕閣圖籍之盛近世所未有也三年李至請賜新額上飛白書二大字作贊及詩賜之淳化二年至為祕書監進新校御書三百八十卷上因從容謂之曰人之嗜好不可不戒不必遠取前古祇如近世符彥卿纍任節鎮以射獵馳逐為樂於是近習窺測其意爭獻鷹犬彥卿多假借之其下因恣橫擾故知人君當淡然無欲勿使嗜好形見於外則姦佞無自入焉朕平常他無所愛但喜讀書多見古今成敗善者從之不善者改之如斯而已矣賜李繼捧姓名授定難節度命招討李繼遷賜姓趙名保忠命管夏銀綏宥靜五州初朝廷數諭繼遷不肯降益侵盜邉境用趙普之議復繼捧夏臺故地令圖之閏月親試下第舉人先是禮部侍郎宋白知貢舉放進士程宿以下二十八人諸科百人榜既出謗議蜂起或擊登聞鼓求别試上意其遺才召下第人覆試得進士馬國祥以下及諸科凡七百人令樞密院用白紙為牒賜之以試中為目令權知諸縣簿尉上既親擢國祥等猶恐遺才又命王世則等召下第進士及諸科人試得合格數百人上覆試詩賦又擢進士葉齊以下及諸科凡百餘人並賜及第秋七月除蜀鹽禁八月幸國子監命博士李覺講周易之泰卦上大悅賜帛百匹冬十月置四廂都指揮使以范廷召孔守正為之馬步軍龍衛神衛四廂殿前捧日天武四廂放五方鷹犬禁來獻以樊知古為河北兩路都轉運都轉運始此知古即若水也上賜今名十一月李繼隆敗契丹於唐河敵騎大至唐河北將入冦諸將欲以詔書從事堅壁勿戰監軍袁繼忠獨請死於敵中黃門五人猶執詔書止之定州都部署李繼隆曰閫外之事將帥得專焉乃與繼忠出兵拒戰敵騎大潰捷音聞上降璽書褒奬賜豫甚厚十二月寬緣坐法靈州河外寨主李瓊以城降賊有司將坐其家屬上曰窮邉孤壘又無援兵緣坐之法朕甚不忍行也己丑端拱二年春正月詔陳備邉䇿户部郎中張洎奏言國家自飛狐以東重關復嶺為契丹所有燕薊以南平壤千里蕃漢共之失地利矣河朔郡縣列壁相望然敵騎南馳衆寡不敵咸嬰城自固莫敢出戰此分兵力之過也今既未能克復幽薊宜悉聚河朔之兵建三鎮鼎據而守焉又言涿州之戰元戎將校各不相管轄以謙謹自任未嘗賞一效用戮一叛命宜反其道又言稍舉通和之䇿俟兵食有餘然後大舉幽薊未復終不得髙卧右拾遺直史館王禹稱上言兵藝患在不合將臣患在無權請於遠邉建三軍軍十萬人使互相救援又言北戎婦人任政荒淫不法請捐厚利啖其酋長以離其心又言國家西有趙保忠折御卿宜敕此二帥以麟府銀夏綏五州張犄角之勢內則可並省官吏二三千員減俸數十萬以供邉用寬民賦又言舉進士者或不數年致位顯達一言可采寵錫動逾十萬宜稍艱難選舉抑儒臣而激武士又言曹彬北伐及招置義軍等事大臣皆不預知望自今聽朝之暇頻召大臣共議邉事毋使小臣間厠又言今郡縣雖多除河北備邉之外惟東至登萊西盡秦鳯南抵淮泗而已此數十州中土之根本不可不惜也望少度僧尼少崇寺觀勸風俗務田農上覽其奏深加賞歎趙普尤器之知制誥田錫上言用間諜及委任宰相大略與禹稱奏同又言將帥非材即無威名宜精加選用既得其人不必降以陳圖不須授之方略自然成功吏部尚書宋琪本燕人知敵中形勢亦上疏言備邉之計且曰兵凶器聖人不得已而用之若選使通和弭戰息民此亦䇿之得也疏入頗采之右僕射李昉亦引漢唐故事深以屈已修好為言時論稱之二月以陳恕等為河北等路營田使議者請為方田以限戎馬恕入辭曰今之戎士皆以募致又使之服田恐其生變通判鎮州裴莊度支使李惟清皆言其不便其議遂寢下詔罪已寬恤邉郡大略如雍熙四年之詔三月親試舉人得陳堯叟以下一百八十餘人諸科四百餘人賜宴始令三館文臣並㑹賜堯叟等針一首勉以修身謹行稽古效官之意時有中書吏人及第上令奪所授敕牒乃詔禁吏人應舉夏旱自三月至五月録繫囚遣使分路決獄是夕雨秋七月以冦凖為樞密直學士凖時為左正言直史館承詔極言北邊利害上器之謂宰相曰朕欲擢用凖當授何官宰相以開封府推官對上曰此官豈所以符凖者邪宰相又擬是官上沈思良久曰且使為是官可也凖嘗知巴東成安二縣其治一以恩信每期㑹賦役未嘗出符移惟具鄉里姓名揭縣門而百姓爭赴無稽違者彗出東井凡三十日上避殿減膳初上以區宇乂寧嵗時豐稔欲告謝宗廟以彗星見而止趙普奏言司天妄以妖星為合滅契丹俱是諂諛所宜審聼契丹冦威虜軍擊敗之尹繼倫李繼隆敗之於唐徐河間殺其相皮室其大將裕悅被傷遁走俘獲甚衆自是不敢大入冦以繼倫面黑相戒曰當避黑大王張洎言威虜軍可廢又言凡邊境軍壘其甲卒不滿三萬人者皆可廢以𨽻緣邊大鎮詔廢威虜尋復之八月大赦是夕彗沒開寶寺塔成所費億萬前後踰八年乃成田錫嘗奏疏其言甚切有曰衆以為金碧熒煌臣以為塗膏釁血上亦不怒九月鎮星熒惑入南斗冬十月趙保忠加同平章事旱上減膳賜宰臣詔深自責已趙普時在告呂䝉正等入謝乞依漢制䇿免上慰勉之王禹稱上言乞自乘輿服御以下百官俸料悉第減之且言臣於朝行中最貧願首減以贖耗蠧之咎田錫上言此實隂陽失和燮調倒置上侵下之職而燭理未盡下知上之失而切諫未能奏上上及宰臣皆不悅出錫知陳州令樞密録聖語中書門下言所録時政緣御前殿樞密使以下先上宰臣未上所有宣諭聖語乞差樞密副使二人逐旋抄録送中書同修為一書而授史官自後副使或知院二人同掌之十二月省尊號上曰皇帝兼稱已為不可朕欲稱王但嫌與諸子同耳羣臣又上法天崇道文武皇帝詔去文武二字餘許之是嵗罷沿邉互市庚寅淳化元年春正月趙普罷普卧病上屢幸其第省問普疾篤三上表致政上不得已以普為西京留守兼中書令普既罷呂䝉正以寬簡居相位辛仲甫從容其間政事多決於王沔沔聰察敏辨有適時材用然性苛刻不以至誠待人進退非允人多怨之蓬州司法鄭侃伏誅坐受賕故入死罪杖殺知州通判並免官削任仍詔戒天下初囚三人被誣為劫盜侃案致死罪獄已具録事參軍邵曄察其枉不署牘白知州楊全乞别鞫之全性悍不聽引囚抵法囚號呼不伏乃别繫獄既而捕獲正盜因得釋逮繫侃等詔獄坐其罪曄代還上召勞之曰汝能活吾平民深可嘉也遂遷秩賜金以旌之賜江浙等路諸州書荆湖福建廣南並賜印本九經令長吏與衆官共閲之二月賑登州饑登州二縣饑詔賑之仍坐長吏蔽匿之罪夏四月夏州敗李繼遷尋又敗之於安慶澤於王庭鎮五月置詳覆推勘官刑部詳覆官六貟御史推勘官二十員若諸州有大獄則乘傳就鞫辭日上必親諭曰無滋蔓無留滯還必召見問以所推事狀滿三嵗考殿最而斥陟之鑄淳化元寶錢國初錢文曰宋元通寶後曰太平通寶至是改鑄上親書其文作真草行三體自後每改元必鑄以年號元寶為文秋八月毁左藏金銀器上性節儉退食常著華陽巾布褐紬縧內服惟絁絹咸屢經浣濯乘輿給用無所增益冬十二月立覆奏法從謝泌之請也時羣臣奉事者既可其奏皆得專達於有司頗容巧妄泌請自今凡政事送中書機事送樞密院財貨送三司覆奏而後行遂著為定制中外所上書疏亦如之辛卯淳化二年春正月置內殿崇班等職左右侍禁三班奉職借職二月知晉州祖吉伏誅坐贓杖殺王化基治祖吉獄詢其土豪王姓者云吾小民見州將貧乏相醵率為之夀時豈知其犯法哉悵歎不已化基詰其前後郡守王言三十年已來惟梁都官不受一錢餘無免者梁都官乃勗也有文詞太祖嘗欲令知制誥為時宰所忌遂止後化基因言於上時勗已老病不任吏事淳化五年以勗為鎮國行軍司馬賜鄭文寶張觀五品服文寶時為殿中丞奉使川陕均稅奏蠲商人到岸稅錢行次渝涪聞䕫州戍卒百餘人劫庫兵為亂乃乘輕舸順流一夕數百里至則悉擒斬之使還上面加賞激賜服觀時為監察御史三司言劍外稅輕上欲增之觀奏言逺方之民易動難安遂止後上疏言陛下優容羣臣將順簿書叢脞咸以上聞豈徒䙝瀆至尊抑亦輕紊國體誠願陛下聽斷之暇宴息之餘禮貌大臣與之揚榷使沃心造膝極意論思則治體化源何所不至臣又嘗讀唐史見貞觀初始置崇文館命學士耆儒更直互進聽朝之隙則引入內殿講論文義商確時政或日旰忘倦或宵分始罷況陛下左右前後皆端士偉人伏望端拱凝旒收視反聽釋循常之務養浩然之氣深詔近臣闡揚真風與夫較量金榖剖析毫釐以有限之光隂役無涯之細務安可同年而語哉上覽而善之召賜服遷度支判官尋以文寶為陕西轉運許以便宜從事聽用庫兵錢㑹歲歉文寶誘豪户出粟三萬斛活饑民八萬六千餘人閏月辛未朔日有食之除陜路米麥等稅寬商征除商賈貨殖外負販細算不征違者罪之命近臣兼差遣院及流內銓翰林學士賈黃中蘇易簡領差遣院李沆同判流內銓三年冬置磨勘院命王沔等知京朝官考課張宏等知幕職州縣官考課又命魏廷式等同較三班殿直以上功過沔考課條目細碎視士君子如吏卒設開格以防之物論甚譁四年春改磨勘院為審官考課院京朝官屬審官幕職州縣官屬考課尋廢京朝官差遣院歸審官以考課院歸流內銓凡常調選人流內銓主之奏舉及厯任有殿最者考課院主之并吏員而省司局議者咸以為當從蘇易簡之請也三月詔以旱蝗欲自焚翌日雨蝗盡殪先是上召近臣問以時政得失冦凖言刑罰偏頗所致上問其故凖曰頃祖吉王淮皆受贓數萬計吉既伏誅而淮以參知政事沔之母弟止杖於私室非偏頗而何上大悟明日召沔切責之夏五月置諸路轉運司提㸃刑獄官州府十日一具囚帳供報有疑獄即往視命員外郎董循等十人分充之置折博倉初募商人輸粟優其價令執券抵江淮給以茶鹽謂之入中或言其弊罷之自是嵗失巨萬之入端拱二年復之嵗旱中止至是復置甚濟國用商人便之以謝泌為左司諫上修正殿頗施綵繪泌為左正言因對陳其事即日命代以赭堊賜泌金紫而遷之泌謝曰陛下從諌如流故臣得輸誠昔唐末有孟昌圖者朝上疏諫暮不知所在如此安得不亂上動容久之六月汴決浚儀上親督衛士塞之自辰及午水復故道尋又決宋州命塞之又決亳州遂東流秋七月令三司均節財用上謂三司使李惟清等曰夫貨財所以濟用度或取之不以其道違惠養庶民之意豈能召和氣乎當共務均節毋致厚斂於下朝廷自克平諸國財力雄富然聚兵京師外州無留財支用悉出三司故上孜孜庶務或至親為裁處必以愛民惜費為本有司言油衣帟幕破損欲弃之上悉浣染為旗幟數千又調給薪司退材作長牀數百李繼遷降賜姓名授官賜姓趙氏名保吉授銀州觀察使先是趙保忠奏繼遷誘蕃戎入冦來乞師正月命翟守素帥師屯夏州以助之至是繼遷聞守素將兵來討恐懼奉表歸順八月置審刑院於禁中以李昌齡知院事仍置詳議六員上慮大理刑部吏舞文巧詆凡獄具上奏者先申審刑院印訖以付大理寺刑部斷覆以聞乃下審刑院申覆裁決訖以付中書當者即行之其未允者宰相復以聞始命論決九月呂䝉正罷為吏部尚書上嘗謂近臣曰纍有人言儲二事朕頗讀書見前代治亂豈不在心但諸子幼冲未有成人之性所命屬僚悉擇良善之士至於臺𨽻輩朕亦自揀選不欲姦隂巧佞在其左右讀書聽講咸有課程待其長成自有裁制何言者未諒此心至是度支判官宋沆等五人伏閣上疏請立許王元僖為皇太子詞意狂率上怒甚以沆乃䝉正妻族故罷之以李昉張齊賢同平章事王化基為御史中丞化基嘗慕范滂攬轡澄清之志獻澄清略言五事其一請復尚書省曰國家立制動必法天尚書省上應天象對臨紫垣六卿擬喉舌之官郎吏應星辰之位三司使額乃近代權制請廢三司止於尚書省設六尚書分掌其事二曰謹公舉其三曰懲貪吏其四曰省冗官以為州郡設監臨事務朝官及使臣等數倍於舊乞待裁減其五曰擇逺官上嘉納之置知樞密院及同知以張遜為知院溫仲舒冦凖為同知知院之名始此遜仲舒凖仍並帶副使自後或以正官或檢校官為之秩與副使同冬十一月復次對詔自今內殿起居日復令常參官兩人次對閣門受其章太祖時嘗行之尋廢至是復之以畢士安為翰林學士先是知制誥范杲獻玉堂記請備其職上惡其躁競出之外郡執政欲用張洎上曰極知洎文學資任不下士安第德行不及其是冬承㫖蘇易簡著翰林志二卷以獻上嘉之賜詩二首又飛白書玉堂之署四大字令中書召易簡付之榜於㕔額上曰此永為翰林美事易簡曰自有翰林未有如今日之榮也十二月朔行入閣儀初上以入閣舊圖承五代草創禮容不備命史館修撰楊徽之等討論故事别為新圖至是詔於文德殿行之張洎既與徽之等同撰新定儀又獨上疏曰竊以今之乾元殿即唐之含元殿也在周為外朝在唐為大朝冬至元日立全仗朝萬國在此殿也今之文德殿即唐之宣政殿也在周為中朝在漢為前殿在唐為正衙凡朔望起居及册拜妃后皇太子王公大臣封四夷君長試制䇿舉人在此殿也今之崇德殿即唐之紫宸殿也在周為內朝在漢為宣室在唐為上閣即隻日常朝之殿也昔東晉太極殿有東西閣唐置紫宸上閣法此制也且人君恭已南面向明而理紫宸黃屋至尊至重故巡幸則有大駕法從之盛御殿則有鉤陳羽衛之嚴故雖隻日常朝亦須立仗前代請入閣儀者蓋隻日御紫宸上閣之時先於宣政殿前立黃麾金吾仗俟契勘畢喚仗即自東西閣門入故謂之入閣今朝廷且以文德正衙權為上閣甚非憲度況國家已承正統宇內洽平凡百憲章悉從損益惟視朝之禮尚屬因循竊見長春殿正與文德殿南北相對伏請改創此殿以為上閣作隻日立仗視朝之所其崇政殿即唐之延英殿是也為雙日常時聽斷之所凖乎臨御之式允叶前經今輿議乃以入閣儀制為朝廷非常之禮甚無謂也臣又案舊史中書門下御史臺為三署謂侍從供奉之官今起居日侍從官先入殿庭東西立定俟正班入一時起居其侍從官則東西對拜甚失北面朝謁之儀今請凖舊儀侍從官先次入起居畢分行侍立於丹墀之下故謂之蛾眉班然後宰相率正班入起居雅合於禮又言陛下自臨御十有五年未嘗一日不雞鳴而起乞依唐制隻日視朝雙日不坐奏入不報女真請伐契丹詔却之女真言契丹以兵隔其朝貢之路請擊之不許自是遂屬契丹上嘗語侍臣曰國家若無內患必有外憂若無外憂必有內患外憂皆可預防惟姦邪無狀若為內患深可懼也帝王用心常須謹此無冰壬辰淳化三年春二月乙丑朔日有食之遣使按諸州民田三月親試舉人初糊名考校是嵗諸道舉人凡萬七千餘人蘇易簡舉殿試始令糊名考校內出巵言日出賦題試者不能措辭相率叩殿檻上請有錢易者日未中三題皆就以其輕俊特命黜之得孫何以下三百餘人諸科八百餘人就宴賜御製詩三首針一首時詔刻禮記儒行篇賜近臣及京朝官受任於外者併以賜何等初內殿䇿士例賜御詩以寵之至陳堯叟始易以針至是詩針並賜以和㠓知制誥㠓上表謝賜儒行篇上覽而嘉之故有是命其後欲召㠓入翰林為學士既而謂左右曰㠓眸子眊眊胸中必不正不可以居近侍也其命遂寢夏五月朔行入閣儀舊制入閣惟殿中省細仗隨兩省供奉官半入陳於庭上以為儀衛太簡命有司更設黃麾仗其殿中省細仗仍舊從新制旱遣使諸路決獄是夕雨六月黑風晝晦置常平倉京畿大穰命增價糴貯之嵗饑即減價糶名常平倉遂為定制七月趙普薨普初以吏道聞寡學術太祖嘗勸以讀書普遂手不釋卷每朝廷有大議則闔户自啓一篋取一書閲之及卒家人發其篋則論語二十篇耳普事兩朝出入三十餘年未嘗為子弟求恩澤後諡忠獻追封韓王八月召隱士种放不至放居終南山以講習為業及詔至其母曰常勸汝勿聚徒果為人所知遂稱疾不至上亦不奪其節九月幸祕閣冬十月命雷有終制置江淮兩浙茶鹽上以茶鹽之價輕重不均欲更立新制命有終按視先是三司使魏羽等言諸州茶鹽市征主吏多負官課請行次責上曰當按問其實若水旱災沴致虧官課非可加刑也帝王者為天下主財耳卿等司計當以至公為心無事刻剝致害民而傷和氣也十一月許王元僖薨詔以來年正月上辛郊元僖性仁孝尹京五年政事無失追贈太子諡孝恭詔以將有事於南郊前十日許王薨按禮天地社稷之祀並不廢其集議之宋琪上奏以為先王制禮皆本人情今詔輟十一日以後五日朝參有司又以十二日十三日受誓戒若皇帝既輟朝而未成服則全爽禮又百僚既受誓戒而入奉慰又違令式國家之儀頓失吉凶之禮相干況許王地居藩戚望著親賢於昆仲為大宗於朝廷為冡嗣遽致薨逝朝野同哀伏想聖情豈勝追念當悲慘之際行對越之儀臣等竊慮上帝之勿歆下民之斯惑矣祭天之儀歲有四焉載於禮經非有升降伏請以來年正月上辛合祭天地從之癸巳淳化四年春正月辛卯郊奉宣祖太祖配從禮儀使蘇易簡之請也易簡上言親杞圜丘以宣祖侑神作主此則符聖人大孝之道成嚴父配天之儀恭以太祖光啓丕圖以聖授聖謹按唐永徽中以髙祖太宗同配上帝欲望親祀郊丘奉宣祖太祖同配其常祀孟春祈穀孟冬神州季秋大享以宣祖崇配冬至圜丘夏至北郊孟夏雩祀以太祖崇配從之二月己未朔日有食之廢沿江𣙜貨八務聽商人貿販從雷有終之請也黎桓封交趾郡王遣使分路巡撫上以江浙淮陜比嵗旱災民兵轉徙頗肆攘奪多罹刑辟命韓援等八人巡撫之俾之招集流亡導揚壅遏決庶獄率從輕典有可以惠民者得以便宜從事官吏罷軟苛刻者上之詔令有未便者條奏蜀盜王小波攻掠諸縣蜀地饒富孟氏割據府庫益以充溢及王師平蜀孟氏所儲悉歸內府而言事者競起功利成都常賦外更置博買務諸郡課民織作禁商旅不得私市布帛司計之吏析及秋毫蜀地狹民稠耕作不足以給益以貧困兼并者復糴賤販貴以奪其利青城縣民王小波聚衆起而為亂謂衆曰我疾貧富不均今為汝均之貧民多來附者遂掠卭蜀諸縣襲殺縣令齊元振剖腹實以錢蓋惡其誅求之無厭也賊黨由是愈熾三月命何承矩制置河北緣邉屯田初承矩至雄州即建屯田之議㑹黃懋亦請於河北興水田乃以承矩為使懋為判官發河北諸州戍兵萬八千人給其役開溏泊種稻田自是葦蒲螺蛤之饒民賴其利夏五月以張洎錢若水為翰林學士上謂侍臣曰學士之職親切貴重非他官可比朕嘗恨不得為之未幾賜近臣飛白書若水及洎詩洎揣摩上意上疏稱述凡數千言上數賜詩嘉奬洎性險陂尤善事宦官嘗引唐故事奏內供奉官藍敏為學士上不從然以文采清麗巧於迎逢上卒喜之初若水任同州推官時有疑獄録事參軍以私憾放入平民罪應坐死者數人若水留其案不決録事屢侵辱之若水不為動隂遣人廉得其實證其囚遂獲免州欲上其事若水固辭曰若水得賞當置録事於何地耶録事詣若水叩首愧謝若水慰解之由是逺近翕然稱其賢上亦聞若水名㑹冦凖薦之元年命為祕書丞直史館上嘗命若水撰賜趙保忠詔有不斬繼遷存狡兔之三穴潜疑光嗣持首鼠之兩端上大喜謂若水曰此四句正道著我意及李繼遷納欵又命草賜李繼遷詔略曰既除手足之親已失輔車之勢上批其後云依此詔本極好若水家因寶藏之併三司置一使命魏羽領之詔罷鹽鐵度支户部等使三司但置使一員判官六員推官三員從馬應昌之議也六月張齊賢罷為左丞初命知定州制辭有力不逮心名浮於實之語齊賢尋自言母年八十五不願離左右上惻然許之齊賢在相位時母入謁禁中上歎其夀考有令子多賜手詔存問别加餽豫搢紳以為榮齊賢尋遭母喪水漿不入口者七日自是日啜粥一器終喪止食脫粟飯以呂端參知政事端餘慶弟也先以裨贊許王元僖無狀左遷至是始大用端有器量而性寬大雖經擯斥未嘗以得喪介意趙普嘗曰吾觀呂公奏事得嘉賞未嘗喜遇折挫未嘗懼亦不形言真台輔之器也復給事中封駁制以魏庠柴成務為之制敕有不便者許准故事封駁秋七月大霖雨十晝夜不止上憂形於色命近臣分禱未幾雍丘尉武程上疏願減後宫嬪嬙上謂宰相曰程疏逺小臣不知宫闈中事內庭給使不過三百人皆有掌執不可去者卿等固合知之朕以濟世為心視妻妾如脫屣耳李昉請加斥削以懲妄言上曰朕曷嘗以言罪人但念程不知爾復𣙜貨務置茶鹽制置使初廢務減價蠲算以便商人人人疑惑且憚江路回逺嵗課大虧乃詔復之咸平二年制置使王子輿言江淮兩浙賣茶鹽都收錢三百九十七萬餘貫比舊額增五十萬八千餘貫尋詔子輿兼制置礬稅仍領荆湖路八月丙辰朔日有食之命官專掌通進銀臺二司尋以給事中封駁隸之從向敏中之言也敏中上言通進銀臺司受逺方疏多不報請别置局分官專涖以防壅遏乃命敏中張詠同知二司公事凡章奏案牘出入自是不敢有所留滯發敕司舊隸中書亦命銀臺司兼領尋又以給事中封駁併隸焉凡詔敕並令詳酌可否然後行下時代并都部署張永德笞小校至死詔按其罪詠封還詔書且言永德方任邊寄若以小校故推辱之恐下有輕上之心不從未幾果有營兵脅訟軍候者詠復引前事為言上改容勞之九月大水自七月初雨至是不止京城廬舍多壞陳潁宋亳間水害尤甚上對宰相因切責之魏羽請檢視諸軍營及官舍上曰朕寢殿尚有漏處軍營可知應上言者即時葺治不須更檢視也冬十月河決澶州西北流溢浸大名府城時有豪民貯芻茭將圖厚利誘奸人潛穴河堤仍歲決溢知府事趙昌言徑取豪家廥積以給用由是無敢為姦利者屬河決溢浸城調禁兵助役或偃蹇不進昌言曰府城將墊人民且溺死汝輩食厚祿欲坐視耶敢不從命者斬皆股栗趨事不浹辰而城完上聞而嘉之罷提㸃刑獄自端拱以來諸州司理參軍皆上自選擇民有訴寃者立遣臺使乘傳按鞫諸路提㸃刑獄司未嘗有所平反詔罷之歸其事於轉運司三司置二使分領左右計分郡縣為十道兩京為左右計中分以隸焉時三司簿領堆積吏因為姦乃從魏羽之請而分之嚴選用知通法詔京朝官未歷州縣不得任知通上嘗謂近臣曰朕每日後殿自選循吏候及三二百人天下郡縣何憂不治李昉罷昉溫和無城府寬厚多恕上嘗曰昉本以文章進及用作相自知才微任重但憂愧而已以呂䝉正為平章事蘇易簡參知政事易簡外若坦率中有城府由知制誥為學士年未及三十在翰林八年特受人主之遇敻絶倫等或一日至三召見李沆後入在易簡下及沆參政乃以易簡為承㫖錫賚與參政等上意欲遵舊制未進台席且俟稔其名望而易簡以親老急于進用因召見頗言時政闕失沆等罷即命易簡代之易簡母薛氏入禁中上命之坐問何以教子遂成令器對曰幼則束以禮讓長則訓以詩書上顧左右曰今之孟母也非此母不生此子矣易簡在翰林時上待若賔友及參大政上但正色責吏事而已易簡乃悔其求進之速趙鎔向敏中同知樞密院鎔加宣徽北院使敏中右諌議大夫鎔等入對上曰賈黃中等以循默守位故罷適垂泣叙謝朕亦為之悽然昔周有亂臣十人同心同德人臣事主可不念此以保始終古人尚欲立功名於亂世況盛世乎卿等宜戮力以副超擢閏月置三司總計使命陳恕領之總計使判左右計事左右計使分判十道事事當計度者三使通議之恕以為官司各違政令互出難以經久極言其非便上不聽踰年乃復舊制尋以梁蔣為右計判官初蔣知吉州治豪猾為民害者上賞其强幹代還賜緋魚且記其名於御屏至是用之十二月王小波死李順陷蜀卭等州尋又陷漢州彭州初小波之黨才百人郡失於備禦賊勢遂熾衆至數萬更漕運法先是三路轉運使各領其職或廩粟多積而軍士舟楫不給雖以官錢雇丁男挽舟而土人憚其役以是歲上供米不過三百萬及楊允恭為都大發運使盡集三路舟卒與所運物數令諸州擇牙吏悉集允恭乃辨數授之江浙所運止於淮汭淮泗輸京師行之一歲上供者六百萬九朝編年備要卷四
