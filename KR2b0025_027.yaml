body:
  text: 九朝編年備要卷二十七宋陳均撰徽宗皇帝起甲申崇寧三年止庚寅大觀四年甲申崇寧三年春正月加邢恕官國朝緣邊弓箭手乃守邊之籬落無事則耕及戰則為先鋒其駝馬器械皆自備故邊臣每務恤焉至是因陜西運糧之法恕為涇原經略使加倍征之人極為苦上一日諭宰執曰涇原弓箭手可惜聞邢恕虐用其人今逃者已千餘户矣蔡京庇恕乃諭使者奏恕俵糴奏法可賞詔遷一秩劉拯罷拯為兵部尚書有詔兩制同定元符奸黨拯上言漢唐失政皆自朋黨始今日指前日之人為黨焉知後日不以今日為黨乎大抵人之過惡自有公論因其論之輕重以正典刑誰不恱服何必悉拘於籍而禁錮之哉蔡京大不懌風臺臣劾之出知蘄州鑄九鼎時朝廷制禮作樂以文太平蜀人魏漢津者年九十餘獻樂議曰人君代天理物所禀必與衆異乃不用絫黍而用帝指三節為三寸三三為九而黃鍾之律成請先鑄九鼎次鑄帝坐大鐘次鑄四韻清聲鐘次鑄二十四氣鐘然後均調絃管為一代之樂上從之大樂房參詳陳暘曰五聲十二律樂之正也二變四清樂之蠧也二變以變宫為君四清以黃鐘清為君事以時作固可變也而君不可變太蔟大吕夾鍾或可分也而黃鍾不可分豈古人所謂尊無二上之㫖哉論多不合遂遷𤾉為鴻臚少卿是冬十月帝鼎成四年八月九鼎成立大角鼎星祠初漢津議制鼎名以奠八方曰蒼曰彤曰晶曰寶曰魁曰阜曰牡曰罔凡八而中曰帝鼎皆以九州水土納鼎中及奉安翼日上幸九成宫酌獻至北方曰寶鼎者方焚香再拜而鼎忽漏其中水流溢於外蔡京私怪之殊不樂於是劉炳曰鼎之水土皆取九州之地中獨寶鼎取水土於雄州界北燕之正方也或者其為此乎當時尤以為神然其後終於北方致亂京為定鼎禮儀使上言曰自定鼎於幄殿至奉安九鼎於九成宫五色雲見祥應屢至乞録付史館仍率百官表賀詔許之二月置漏澤園中書省言元豐中詔以官地葬枯骨今欲推廣先志故也詔後殿許左右史分侍立雨雹三月置文繡院招刺繡工三百人從殿中少監張康伯之請也尋賜保義郎監文繡院陳夢文出身築圜土尚書省言强盜配流者歲以千計至配所則聚為冦掠中道亡命者復暴橫鄉里為良民害今欲倣周官司圜之法令諸州築圜土以居强盜貸死者晝則役夜則拘之視罪之輕重以為久近之限充軍無過者縱釋之躋欽成皇后於欽慈皇后之上大內火夏四月幸金明池賜所乘馬名龍驤將軍復鄯州廓州初王厚童貫統大軍出熙州篩金平於是錫羅薩勒率衆六十萬迎官軍厚等諭以朝廷恩信招納之不從次湟州與高永年分三道進師鼓行直前至宗哥城下與賊戰破之錫羅薩勒單騎遁去僞原闕王等以城降既而勝宗酋領率衆來降父安兒城尋至鄯州僞龜兹公主及其酋豪率回紇于闐諸族開門出降錫羅薩勒遁走青海上鄯州平更名曰西平建為隴右都護府不七日又復廓州宰相並進秩曲赦熙河路五月置開封牧尹各一員少尹二員分左右罷知府等官以士户儀兵刑工為六曹增置司録十二員分掌之童貫加留後初以貫為景福殿使襄州觀察尋遷延福宫使進定武留後內臣轉行兩使留後始此六月圖熙寧元豐功臣顯謨閣以王安石配饗孔子辟雍初成詔荆國公王安石孟軻以來一人而已其以配饗孔子於是吏部尚書何執中請開學殿使都人縱觀安石坐像增置諸州學詔諸州路未曾置學處並置學元年令頒蔡京所定學法於州縣是年五月置提學事官每路一員又詔知通銜並增主管學事尋令州縣學兼養武士自後罷復不常不書置書畫算學尋併醫官學罷之後罷置不書初興書畫學米芾方為太常博士奉詔以黃庭小楷作千字文以獻繼上所藏法書名畫時禁中聚前代筆蹟號宣和御覽宸翰序之詔蔡京跋尾芾因上其子友仁楚山清曉圖賜御書畫扇尋除春官外郎重定黨人及上書邪等刻石文德殿門定元祐元符黨人宰執司馬光侍從蘇軾餘官秦觀以下及上書邪等皆合為一籍通三百九人書而刻諸石詔置文德殿門蔡京自書為豐碑頒之天下餘並出籍秋七月復方田蔡京言賦調之不平久矣自開阡陌使民得以田私相貿易富者貪於有餘厚立價以規利貧者迫於不足薄移稅以速售神宗灼見此弊遂詔有司謀究方田利害蓋以土色肥磽别田之美惡定賦之多寡方為之帳而步畝丈尺無所隱户給之帖而升合尺寸無所遺其為法豈小補哉五路州縣有經方田者至今公私以為利遭元祐紛更美意良法未遍於天下其文籍見在可舉而行今檢會熙寧方田敕推神考法意刪去重復衝改取其應行者為崇寧方田勑令格式乞頒行從之八月大雨壞居民廬舍九月王厚童貫賜第京師階州羌納土秦鳳招納司言階州生蕃納土得邦潘疊三州計二千五百里大小酋領一百二十人詔本路經略胡宗回加樞密直學士渭州郭景修為西上閣門使所奏皆妄誕也罷轉般倉户部尚書曾孝廣言東南六路歲漕六百萬石輸京師往來於真楚堰傍置轉般倉又用運河糧船入汴天聖中發運使方仲荀改堰為閘自是東南金帛皆置京師而六路上供米猶用轉般之法非是乞已降祿粟綱朝㫖直載至京毋容侵盜詔從之舊制發運司米六百萬石六路漕至真揚楚泗轉般倉而上却從通泰載鹽為諸路漕司經費而發運司自以汴河綱運米入京每歲九月入奏年計已足始次第起發乃一年之蓄也又有百餘萬緡在諸路作糴本如浙路水旱淮南大熟即以浙路合糴之數於淮南寄糴而淮南之錢却在浙路諸路通融皆倣此故發運司常有六百餘萬石米百餘萬緡之蓄今改為直達發運司胡師文作羡餘獻之除户部侍郎而轉般一年之儲無有矣大觀三年冬詔罷直達復轉般法政和六年罷轉般許第三等以下土人管押不差衙前軍宣和四年又詔復轉般自轉般之法毁廢為直達每歲運糧才足本年支用先是談稹出使上令其詢訪上言立倉本意一以備中都緩急二以防漕渠阻節三則資次裝用運無虛日今泗真楚三處倉不可復置請以淮浙學事廨宇并以沿流貢院樁收俟豐歲立法轉般從之乃詔以𣙜貨務香藥計一百萬緡付發運使吕淙和糴淙私謂人曰今欲復之非千萬緡不可蓋真楚泗須先儲米二百萬石已費六百萬緡而三州七倉及七百轉之船皆壞雖四百萬緡未必足用也夏人冦邊先犯鄜延又犯涇原至是又引大軍直犯鎮戎趨渭州掠數萬口而去既而又遣渭州蕃落兵士翟勝持檄抵鎮戎軍城下自稱誥斥蔡京蔡卞王黼故京卞必欲舉兵討之實因此檄也四年林攄使遼陳夏國之罪亦舉此為辭冬十月朔大雨雹置崇鋭崇威軍詔於京東西河東北開封府界置馬兵一百七指揮凡五萬人馬以崇鋭名步以崇威名定廟制復翼祖宣祖初詔有天下者祀七世古之道也去古既逺禮文殘缺鄭氏謂不祧之宗在七世內王氏謂不祧之宗在七世之外惟我祖考功隆德大萬世不祧者今已五廟當祧者二宗而已遷毁之禮近及祖考殆非先王之意可令有司集議以聞於是用禮部尚書徐鐸議增立九廟議者或疑已祧不可復祔鐸言唐憲宗中宗代宗與本朝僖祖皆嘗祧而復入宜存宣祖於當祧之際復翼祖於已祧之後禮無不稱遂如鐸議詔曰酌鄭氏四親之論取王肅九廟之規自我作古垂之將來乃奉翼祖宣祖咸復本室於是太廟十室十一月幸太學及辟雍官論定之士十六人尋置大司成官明年冬進士三十五人賜及第後不復録更科舉法罷發解省除將來科場一次外即罷之取士並由學校升貢丙申郊大赦應貶謫人惟元祐奸黨不赦十二月行察官課最賞尚書省言監察御史宋聖寵紏勘開封府一百九事除殿外并合為最特轉一官言官賞課最始此諸路蝗乙酉崇寧四年春正月以童貫為熙河等路經略安撫制置使先是蔡京請以童貫為帥蔡卞沮止京請不已內批除貫熙河帥兼節制秦鳳京又檢元豐李憲事與樞密同呈卞於上前作色曰內臣為帥非盛世事貫聞臣此言必不喜然朝廷事體可惜上曰可罷貫秦鳳卞曰若此甚善卞退京與執政吳居厚張康國鄧洵武羣噪之卞乃求去命知河南府除貫熙河蘭湟秦鳳路帥二月置三衛郎中書省請擇公卿子弟執㦸以衛軒墀庶幾先王宿衛之意遂命置三衛郎中即親衛郎中勳衛郎中翊衛郎中勳親衛各二十翊衛倍之以勳戚及近臣親兄弟子孫有官者試充置三衛郎一員中郎二員博士二員主簿二員命精選博士以教習之既又改三衛郎為三衛侍雨雹閏月詔河陜諸路各置招納司三月置青海馬監時馬政不修河東轉運司使洪中孚請於三路給地養馬於是令青海之側置監畜牧其後馬漸蕃息及童貫出師一舉而盡之以趙挺之為右僕射時京為相懷姦植黨託紹述為名紛更祖宗法度有獻言於上者則指為異端必加竄斥挺之為門下侍郎奏曰今內外皆大臣黨若有忠告於陛下者乃指為懷異議沮法度此大臣恐人議已之私欲以杜天下之言爾然則事有大者孰敢啓口以獻人主則上下之情隔矣京又以私恩隂結衛士既增侍立食錢因禁中有盜環皇城置巡鋪卒日給錢一百五十挺之奏巡鋪卒祖宗以來月給錢五百今乃頓增四千五百比前幾加十倍又因小隆贊降請上御樓受之如南郊例支賞此皆京用私恩以牢籠士卒爾願陛下深察之遂有是命竄曽孝序孝序察訪湖北蔡京畏孝序見上重言舒亶事乃密遣客勞孝序甚渥因召見私第且曰朝廷當以宗正卿相處孝序曰太常宗正唐以宰相兼之祖宗故事設而不除久虛之選豈敢冒處京又與孝序語講議司事京曰天下之財但如一州公使爾善用之者無不足而常有餘孝序曰取諸色緡錢充一州公帑不無率斂害政若天下之財貴於流通竭取生靈膏血以聚京師恐非太平法又論明堂辟雍等事孝序曰相公命講筵不得進讀漢史蓋欲舉明主於三代之隆今乃循王莽已行之迹而欲蹈商周虛名可乎京勃然曰京所行無一毫是乎自是始有擠孝序意遂命孝序知慶州孝序入見白上曰臣與蔡京論事不合今乃當帥事臣不知稅駕矣孝序至慶州京首行結糴法盡括民力以充數孝序疏其弊且曰既結又俵民力殫矣民為邦本一有轉移誰與守邦京益怒乃欲以危法中之遣御史宋聖寵置司鄜州劾以私事其家下至奴婢皆制勘卒無所得乃以違戾詔㫖不與諸路約日出兵除名勒停竄之嶺表西夏人冦邊錫羅薩勒居臨哥城誘夏國入冦迫宣威城下塞隴右都護高永年用知河州劉仲武為統制發五萬人禦之出西寧城未三十里而賊至仲武欲持重永年易賊迎戰遂大敗永年帳下親兵皆所招納蕃部熟户也遽執永年以叛為都爾伯所殺羌人遂乘勝犯熙河城中羸卒僅四千城主楊維忠以便宜發常平錢募敢死士虜有善炮者所擊樓櫓摧折維忠以一矢殪之賊大駭乃開門出敢死士接戰殺其酋而還初王厚之功多出永年至是乃奏永年不禀約束專用新羌既坐受縛又不死乞寢贈典上以永年死震怒親書仲武及五路帥臣十八人命侍御史侯䝉制勘於秦州厚亦罷職聽逮於秦起元祐黨籍人姚雄權熙河蘭會路帥䝉至秦州上言曰漢武之殺王恢不如秦穆之赦孟明蓋子玉縊而晉侯喜孔明斃而蜀國輕虜既殺吾一都護而將臣十八人由之以死是虜得志也夫人自戕其支體欲身之不病得乎上即日赦仲武等詔䝉還厚亦上疏自劾願坐誅竄赦諸將使立功自贖上三詔厚入朝未幾厚至即召見厚謝罪請屬吏上慰諭之厚辭所復官未受命遣使就第賜告命提舉醴泉觀奉朝請吕惠卿致仕惠卿弟諒卿以元符末上書名在續添籍中惠卿上表乞出諒卿籍而表有明昭先烈必推美於泰陵闊略微文用保全於蔡邸之語坐比引失當罷職奉祠尋令守本官致仕夏四月遼使來言夏國疆事時西邊驛騷遼人遣其簽書樞密院蕭良來為泛使言朝廷出兵侵夏國今大遼以帝妹嫁夏國主請還所侵地蔡京謂遼書悖慢京草答書言峻甚上令易之曰外域當示包容今西邊方用兵北境不宜開隙趙挺之曰陛下信所謂以大事小樂天保天下者也五月林攄使遼蔡京欲開邊釁乃以龍圖閣直學士林攄報聘於遼京密諭攄令激怒之入境即盛氣而往及見遼主跪上國書仰首曰夏人數冦邊朝廷興師問罪以北朝屢遣講和之使故務含容今踰年不進誓表不遣使賀天寧節又築席徑嶺馬練川兩堡侵冦不已北朝若不窮詰非所以勸和之意也遼主出不意深以為愕及歸奏朝論皆非之六月陶節夫罷經略五路蔡京任節夫帥鄜延節夫誕妄特甚每進築一城寨即奏云此西人要害必爭之地未一年自常調遷至樞密直學士然未嘗遣一騎一卒出塞蓋與虜戰則有勝負獨進築則無虞又皆逺靈武數百里之地虜所不爭故皆得就功論賞京力主之京奏使節夫經制五路節夫盡檄諸路兵將以城本路城寨人率不平會上意厭兵宣諭曰北人遣使和解西邊用兵朝廷既許其叩關請命矣安用經制五路為乃罷節夫五路之命上既許還西人侵地詔廢銀州為銀州城威德軍為石堡寨節夫奏言既城銀州又得石堡而夏洪宥皆在吾顧盼中矣橫山之地十有七八興靈巢穴籬落淺露皆可以計取此豈可棄也又陳異日取興靈之䇿甚備章屢上知樞密院張康國因力陳節夫之奏為是趙挺之曰節夫狠戾無比專為蔡京用若使節夫在鄜延必須百端沮抑西人無由叩關請命明年夏上乃移節夫熙州未數日康國再陳鄜州非節夫不可為遂令節夫依舊在任趙挺之罷蔡京與挺之爭權挺之屢陳京姦惡力請補外遂與宫觀秋七月置三京國子監司業以梁子美為户部尚書子美將漕河北傾漕計以市寵至用三百萬緡市北珠以進北珠者皆自遼境來遼人始欲禁絶或曰中國傾府庫以事無用之物此為我利而中國可困矣因聽之遼主後益驕遂從而慕尚焉至虐女真捕海東青以求珠女真不勝其求遂叛而子美在部五年竟以户部尚書召還都發運使首以羡進者崇寧間自梁子美胡師文始監司郡守不待詔命首以土物進者政和間自盛章宋升始行御筆手詔御筆手詔放上書見羈管編管人還鄉御筆手詔始此置四輔郡蔡京謂汴都地平無險阻以兵為險請依漢三輔置京畿四郡以侍從官為之其意將以付其親密如宋喬年胡師文輩於是以潁昌府為南輔以襄邑名輔州為東輔以鄭州為西輔以澶州為北輔各屯兵二萬人積貯糧草五百萬未幾名東輔為拱州自後罷復不書八月作大晟樂初蔡京用魏漢津鑄鼎作樂取尚書身為度之義以上年二十四當四六之數取上中指為黃鍾之寸而生度量權衡以作樂京為緣飾之劉炳請改定二舞名仍分九成每三成為一變執籥秉翟揚戈持盾取象成功既成賜名大晟樂置府建官舊制樂掌於奉常至是大晟成府以大司樂及典樂為長二後置樂令協律禮樂始分為二上問中書舍人張閣曰新樂如何對曰大晟樂非特八音克諧盡善盡美至於樂器莫不皆應古制竊聞初按時已有翔鶴之瑞與簫韶九成鳳凰來儀亦何以異臣無知識但同鳥獸蹌舞而已大觀初頒新樂於天下先是端州忽上銅器驗其欵識乃宋成公時物而端州上興王之地故詔文有曰獲英莖之器於受命之邦初京令其子攸提舉大晟府而父子自為異論各引曉樂音之士朝奉大夫任宗堯京客也進士田為攸客也並為典樂大晟樂舊用中正聲若每月初氣即用中聲正氣即用正聲為謂中聲非是當去中聲於正聲中分大小二音宗堯謂六律為大六吕為小為謂非是蓋律吕各有大小攸主為之說以奏於上重和秋遂詔樂止用正聲已頒中聲樂並納禮制局改正為既無所傳授樂遂大壞始成試於政事堂執政心知其非然不敢言既遂用之於明堂而其聲益散矣大觀四年給事中蔡嶷言陛下因身為度用帝指之尺起鍾律之制奏之郊廟八音克諧願頒行指尺以同五度五量五權之法從之置學校於熙河蘭湟路劉正夫使遼林攄使遼而失遼情故遼使繼來至是遣禮部侍郎劉正夫酬對敏博與北人議皆如約上嘉之遂有大用之意御筆更制軍政御筆付三省樞密院更制陜西河東軍政六事三省樞密院同奉御筆始此十月中書省言御筆手詔已刋石并用金填毋得摹勒自是而後御筆之行始盛九月赦尋詔元祐謫嶺表者徙荆湖餘以差徙內地是歲西木場火焚防城具以億萬計自七月雨至冬十月丙戌崇寧五年春正月彗出西方其長竟天求直言大赦毁黨碑劉逵為中書侍郎勸上碎元祐黨碑寬上書係籍人禁及悉罷蔡京所造乃詔中外直言闕政夜半遣黃門至朝堂毁石刻翼日京見之厲聲曰石可毁名不可滅罷方田等法除黨人一切之禁罷方田及諸州歲貢六尚物處新置市易務罷諸路提舉鹽香礬茶學事買木水利等司市易官罷提舉保甲文臣差武臣提舉仍兼提刑復左降人官諸徙者盡還之圜土書畫算醫學三衛官以次並罷其後罷復不書二月蔡京罷以趙挺之為右相挺之請歸青州私第詔許之已辦舟裝矣上忽召挺之入對謂曰蔡京所為皆如卿言挺之因言京引私黨布滿朝廷又建四輔非國家之利祖宗以來屯重兵於京師沿汴河雍邱襄邑陳留三縣沿蔡河咸平尉氏兩縣皆列營屯取其漕路之便至神考即其所分隸諸將而教習之士皆精鋭若有所用虎符朝出而夕至矣今置四輔不惟有建營壘之勞且不通水運何以給餉上曰行且罷矣又言今諸營之兵等尺高所請衣糧依久例又更戌四邊使冒鋒鏑而京立法募四輔新軍減等尺增利物添月給且免出戍小人之情惟利是從若見新軍如此則陛下所聚舊兵皆不可用矣又言神考建都省規模宏壯一旦京因妄人家安國獻言以為不利宰相而更之深可痛惜上皆以為是且曰天久旱今京去而雨可喜又曰京以將仕郎即便為郎京又令其子攸作親衛郎欲日伺朕動作今已罷之未幾授京安逺節度中太乙宫使挺之再相或云彗星初見上震動責已深察京之姦由是旬日之間凡京所為者一切罷去京令其黨進言於上以為京改法度者皆禀上㫖非私為之若學校大樂等數事皆是紹述神考美意今一切皆罷恐非紹述之意於是上乃復學校教官及香礬司官又復大樂府復有用京之意矣三月罷求言詔昨以星變許直言朝政闕失今已消伏可罷收接親試舉人賜蔡薿以下六百七十餘人及第出身有差是冬詔今舉取士科場三分學校七分其貢額仍分年遼使來契丹復遣泛使同平章事蕭保先牛舒溫來為夏人請地時邊報稱北境㸃集甚急泛使至館人情洶洶張康國吳居厚何執中鄧洵武皆謂勢須與北境交通趙挺之獨曰吾觀彼辭甚遜且遣二相臣為使乃所以尊中國况所求但元符講和以後所侵西界地上曰先帝已畫封疆今不復議若自崇寧以來侵地可與之命蔡卞兼侍讀詔以卞深得王安石淵源之學加醴泉觀使仍兼侍讀紹聖以來竄斥善類皆卞密進劄請哲宗親批付外元符中為左丞託紹述之說迷惑主聽卞卒於政和七年高宗即位追卞所贈太師衛國公責授節副尋又貶團練副使夏五月行紀元厯立監司互察法六月詹丕逺罷時為右正言上書乞謹天戒上曰龍驤豈能當天變丕逺不喻上曰廏馬也一夕無病而死或者乃謂星孛之致應天如是耶丕逺曰此語欺甚陛下何從得之上曰得之蔡京丕逺曰大臣宜省愆引慝京非昌言上曰非欺則佞丕逺乞罷營造止浮費上曰趙挺之纍有此請營造已罷它費當一遵祖宗規範京於財用未嘗以不足告惟引周官惟王不會之說何意丕逺曰不過欲恱陛下耳上曰恱之不以道不恱也未幾丕逺又論家安國不當獻議移尚書省人言蔡京欲作第上曰寧有此耶然鄭居中久中朱諤嘗請留京賜第久中且云彗特札荒爾而以罷京不早還相天將動威當復有大雷電之怒此語殆脅朕冀其請之必從朕容以天變未久遽復相京天下謂何賜第當議上又曰比聞中外有三不可之說謂法度不可變劉逵不可用蔡京不可罷朕得之怵惕不寐者數夕丕逺曰京之誤國陛下所知也逵不知何故不可用上曰如碎黨人石刻寬上書係籍人禁皆逵首陳是以不可用丕逺曰必有媒孽逵者逵用在陛下若京不可不去尋詔丕逺昏庸迂闊差知興化軍秋七月庚寅朔日當食不虧夏人納欵李乾順奉表謝罪辭極恭順答詔略曰除先朝所畫之疆捐崇寧新取之地時知樞密院張康國奏詔內難為帶北朝和解之語上曰北朝以夏國以此為恩若不言及即疑中國不信趙挺之曰陛下之言神人咸恱大哉王言今真是之矣乃詔夏國其城堡誓表至則賜之夏又言故事地界先定載於誓言所以守之也未肯進誓表八月竄馮澥澥為太常少卿言湟廓西寧本不毛小聚陛下空數路耗內帑竭生靈膏血而取之何嘗得一金一縷入府庫一馬一甲備行陳而三州歲用以億萬計有司束手莫知所為願採前世羈縻之義以恩結甘酋授之節鉞則藩籬永固矣詔降監當尋安置道州冬十二月戊午朔日當食不虧羣臣表賀劉逵罷初上惻星變委政於趙挺之挺之多智而逵甚專事或不出於上挺之慮有後患每隂啓其端而使逵終行之逵欲取以為功亦不悟挺之之計故直前不避上稍覺其擅事星既沒上意稍怠亦悔更張之暴外未有知者學士鄭居中往來貴妃父鄭紳家多聞禁中事故先知之因乘間言今所建立皆學校禮樂以文致太平居養安濟等法乃厚下裕民何所逆天而致譴怒挺之所更張不當上大以為然居中退語禮部侍郎劉正夫未幾正夫請對如居中言上遂外挺之逵而復向京時京雖罷相退居私第然政令大綱皆與聞之於是御史余深石公弼等劾奏逵懷姦狥私愚視一相乘間抵巇取崇寧以來良法美意而盡廢之陛下息邪說以正人心而逵取為元祐學術者陛下斥朋黨以示好惡而逵朋黨人之子孫陛下罪誣詆以尊宗廟而逵擢上書邪等者陛下勤繼述以昭先烈而逵用更改熙豐法令者惟欲權出於己引至朋邪呼吸羣小如毛滂翟汝文之徒朝夕造請豈容尚執政柄遂罷逵自中書侍郎出知亳州丁亥大觀元年春正月朔大赦以蔡京為左僕射二月頒州縣學升舍法御筆以學校三舍升貢次第者為令諸升自縣養教升之州學州學教養分為三舍自外舍升為內舍內舍升為上舍上舍貢之辟雍自辟雍登太學俟殿試命以官宣和四年立小學科舉取士罷宗學辟雍官并諸路提舉學事官尋又罷見任官帶管勾學事三月趙挺之罷上意復向蔡京故挺之罷後五月卒始京既罷上嘗諭輔臣曰朝廷不可與夷狄生隙釁端一開兵連禍結生民肝腦塗地豈人君愛民之意哉挺之退語同列曰主上志在愛民息兵吾輩義當將順執政皆蔡京黨但唯笑而已立八行舉士科并定八刑夏五月張懷素伏誅懷素自稱落魄野人挾左道術遊公卿間元祐中見朝散郎吳儲因道儲之福似姚興當為關中主崇寧中到京又於承議吳侔處妄言星變至是范廖者知其謀將入京上變而貧不能丹陽進士楊東野資遣之廖告懷素謀反命中丞余深開封尹林攄及內侍官同鞫治而蔡京與懷素遊甚密深攄皆為京地深悉毁京札仍乞奏盡焚往還書疏以安反側蓋以滅迹也獄具懷素坐與儲侔結連謀反皆伏誅尋賞廖功以供備庫使而授東野宣義郎衛尉寺主簿四川改行錢引法自取湟廓西寧通行交子以助兵費由是比天聖一界逾二十倍至換界年分新交子一乃當舊㑹子四故更張之六月建僖祖殿於景靈宫九月上僖祖徽號三年五月罷京師大水河北京西河決秋七月伊洛溢九月竄章綖蔡京再相思有以中傷劉逵而言官與京為地因論其妻兄章綖姦濫敗官倚逵勢盜鑄往來貿易而以官舟挾帶倡婦託言中書侍郎家屬官司不敢誰何咸謂陛下令禁甚嚴而綖輒敢冒法無忌者逵蔽之也又言章氏公然聚工鑄錢無慮數萬以三四坐船潛載至京逵既知亳州京從中下其章時綖方乘舟抵水門掩捕搜索與逵往米尺牘赴平江制獄遣開封府李孝夀監察御史張茂直同勘逮繫千數方寒拷掠手足指脫落者不可勝計死則投之牆外其面目姓名偶同者入獄則死生未可知株連稽延京以孝夀等制勘滅裂未究事實議别遣吏鍛鍊而御史沈畸曾論盜鑄意畸欲實其言必曲成其獄乃白遣畸畸被命不五日遷左正言畸乞乘舟往來夜過堰閘並許過放乃差監察御史蕭服同往召孝夀茂直赴闕畸行未浹日又遷侍御史京將誘之以利為已用也畸疾馳至姑蘇值春疫命灑掃獄具迄平反以聞京大怒更用知蘇州孫傑鞫勘獄具綖竟竄海島畸服削籍羈管論上書觀望罪竄責李景直等四人中書省言崇寧五年上書觀望者五百餘人禁中悉以焚毁內二十人情重令擇其尤甚者李景直曾綖黃宰方軫四人詔景直除名編管新州綖依前斷軫宰以他罪鞫治未竟軫尋編管嶺南程頤卒頤崇寧中遷居龍門之南止四方學者曰尊所聞行所知可矣不必及吾門時易傳成書已久學者莫得傳授頤曰自量精力未衰尚冀有稍進耳其後寢疾始以授尹焞張繹頤既沒昔之門人高弟多已先亡無有能形容其德美者然嘗謂張繹曰我昔狀明道先生之行我之道蓋與明道同異時欲知我者求之於此文可也頤兄皓嘗言異日能使尊嚴師道者吾弟也若接引後學隨人才成就則豫不得遜焉其後朱熹論之曰明道德性寬大規模廣闊伊川氣質剛方文理密察其道雖同而造德各異史臣謂學者出其門最多淵源所漸皆為名士劉絢李籲張繹蘇昞吕大鈞皆班班可書而謝良佐游酢吕大臨楊時在其門號四先生辛亥大饗明堂奉神宗配冬十月蘇州地震大雨雹閠月以鄭居中同知樞密院蔡京之再相也居中有力焉居中責報京薦之拜同知樞密鄭貴妃以親嫌辭改太一宫使於是居中疑京援已不力頗懷怨望遂隂與知樞密院張康國合二人間京日急上寖入其言京方以祥瑞事媚上都水使者趙實行河得兩首以為瑞京信之曰此齊小白所謂象罔見之而伯者也居中曰首豈容有二人方以為異而京獨主之意殆難測乎乃出棄金明池以居中為愛已自韓忠彥罷相降手詔自今毋任外戚為三省執政至是康國言稱執政者專指三省而樞密無與居中遂申前命貴妃鄭氏亦不復辭矣竄方軫太廟齊郎方軫上書言左僕射蔡京睥睨社稷內懷不道專以紹述熙豐之說為自媒之計內而執政侍從外而帥臣監司無非其門人親戚京每有奏請盡作御筆行出又語人曰京實啓之也善則稱已過則稱君必欲陛下斂天下之怨而後已尚書省元豐所造京惡其地不利宰相盡命毁之是之謂紹述可乎又建四輔郡屯兵數十萬遣人為四總管及以宋喬年為京畿轉運密諷兖州父老詣闕請登封意在為東京留守乘輿一動投間竊啓呼吸羣助不知宗廟何所依恃乎京又建方田法欲擾百姓而鹽法朝行夕改客鈔遂為故紙赴水自縊不知幾千萬人自元符末陛下嗣服忠義之士投匭者無日無之京分為邪等黥配編置不齒仕籍則誰肯為陛下言哉又遣子攸日與陛下遊戲以花石禽鳥為獻則曰臣攸上進欲愚陛下使不知天下治亂也臣與京皆壺山人䜟云水繞壺公山此時方好看京諷部使者鑿渠以繞山臣是以知京必反也陛下安可愛一國賊而忘社稷之重乎詔宣示京京言人臣無將有必誅之刑若言不實有反坐之罪望付有司於是命御史臺鞫治獄具詔貸命流嶺南禁同翡翠十一月壬子朔日有食之十二月置黔南路廣南經略王祖道說誘王江吉三州酋首楊義免等納土遂城之為平允從三州又措置南海諸塞城之為鎮州蔡京言祖道所奏牂牁夜郎納土周二千餘里又有文地蘭那安外習等州亦皆納土七千餘里計三十縣八十鎮洞户四萬一千率百官賀曲赦廣西蔡京以下進官有差以是祖道又奏收南丹州為觀州又建庭孚二州拓地數千里塞外諸蠻悉已納土時雖建城塞其地荒瘴遣兵守戍歲有死亡無賦入皆輦內地金帛輸之二年併黔南路入廣西仍治廣西開邊拓地妄誕之罪追貶前知桂州王祖道安置永州開潩河入蔡河黃河清明年三月詔曰國家承平百五十年三有河清之應而乾寧軍河清踰八百里凡七晝夜上天眷祐敢不欽承其以乾寧軍為清州置東南帥府望郡以揚江寧杭越洪荆南潭福及廣桂為帥府真鎮江潤明䖍靖邵永封雍為望郡帥府仍兼總管用侍從官望郡以郎官以上為之既又詔於見兵額外帥府别屯二千望郡一千尋復罷之走馬承受許風聞奏事廬州雨豆戊子大觀二年春正月朔御大慶殿受八寶古制六璽唐始名寶紹聖末得秦傳國璽崇寧中又得小玉璽其文曰承天福延萬億永無極皆魚鳥篆也至是號傳國璽曰受命寶九字璽曰鎮國寶通天子之寶天子信寶皇帝行寶等為八寶置符寶郎隸門下省受命鎮國二寶非常之器臨幸則從六寶朝會則陳之赦蔡京表賀符瑞京言天下郡國所上符瑞八十七所拜表稱賀自後言祥瑞及稱賀不可勝紀不復録蔡京進太師加童貫節度仍宣撫武康節度提舉龍德宫熙河蘭湟秦鳳路宣撫使內臣建節始此其後楊戩藍從熙談稹梁師成皆踵之凡內侍寄資一切轉行祖宗之法蕩然無餘矣河東北盜起殺巡檢趙贇馬圭及兵官甚衆二月置諸州曹掾官建徽猷閣藏哲宗御集三月遣內侍談稹使舒江滁揚等州夏五月庚戌朔日有食之以復洮州功賜蔡京玉帶宣撫使童貫駐河州遣統制官辛叔獻領大兵自岷州入賊兵逺遁遂復洮州又遣蕃兵將劉法楊德領兵掩捕藏正布古由朗州分兩路進至溪哥城藏正布古等懼不敢迎敵而降遂據之以為積石軍奏至百官表賀進執政官一等以玉帶賜京京請佩金魚遂為故事尋升湟州為向德軍西寧州為賓德軍廓州為防禦州洮州為團練州加童貫檢校司空仍宣撫易鎮奉寧貫由此恃功稍專軍政選置將吏皆中㫖不復關朝廷矣六月瀘南夷納土瀘南夷人達嚕巴納土詔以為珍州增文資六階改寄祿官有左右者光祿大夫易右銀青宣奉易左光祿正奉易右光祿通奉易右正議中奉易右中散奉直易右朝議秋八月置保州敦宗院以處翼祖後宗室也九月安化諸夷納土黔西安化上三州及南思州諸峒井湖北辰靖州諸蠻及涪州䕫州南平州夷人並納土幅員二萬九千餘里蔡京表賀旌節婦任氏為昌州盧氏婦夫死十年夫之别居親兄强逼之任不能制自破其隂以死獄上封旌德縣君皇后王氏崩冬十月以石公弼為御史中丞公弼自左史遷蔡京曰國朝未有以左史除中丞者上曰公弼嘗為御史矣蓋是時有㫖斥賣元豐庫物帛有司以朽壞賤估許百官分買公弼得分券論罷之宰相已取萬匹即日繳納故京於公弼除命非所欲也先是吳執中為御史中丞薦兩浙漕屬毛注堪任臺察詔令召見未及對而執中罷注乞免對上弗可及注上殿論抑奔競勵名節去姦慝來規諫數事上大喜曰方今士大夫鮮廉寡恥卿知分義故有此召除主客郎中十二月葬靖和皇后祔永裕陵四年改諡惠恭紹興七年改諡顯恭己丑大觀三年春三月親試舉人賜賈安宅等七百餘人及第出身有差上製七言八句詩賜安宅等先是小璫梁師成慧黠稍知書得為睿思殿文字外庫專主傳上㫖於外至是亦竄名進士籍中在第一甲第十一中書侍郎林攄唱進士第有姓甄而呼堅名盎而呼快於是言者論其不學傳笑中外夏五月制違御筆法詔中外官司輒敢申明衝改御筆處分者以大不恭論政和三年詔應承受御筆處分無故違限一時者徒二年一日加一等三日以大不恭論舊制凡詔令皆中書門下詔而後命學士為之至熙寧間有內降手詔作御筆手詔違御筆以違制坐之事無巨細皆托而行焉有不類上札者而羣下皆莫敢言也竄孟翊翊為學官有古學而精於易蔡京重之翊嘗為京言本朝大德應中微有再受命之象宜更年號官名一變庶事以厭當之不然期將近矣不可忽京聞之不樂且戒以勿狂未幾上視朔文德殿百官班欲退翊忽出一軸所畫卦象赤白解釋如平日所言唐突以獻上大不樂詔編管逺方後死貶所六月蔡京罷京專國日久石公弼等交論其姦上亦厭京遂罷為太一宫使初上為端王時有郭天信者隸太史局元符末嘗以事出入禁中上退朝天信必遮白曰王當有天下蓋數數言之上即位恩澤皆俾視隨龍人得信近天信氣直敢言深以京為非每奏天文必指陳以撼京密白日中有黑子上為之恐屢白不已至三四上始疑京故罷於是殿中侍御史毛注論京毁文昌舊省建臨平新塔交植黨與陰結姦謀及劾葉夢得為京腹心乃先罷夢得翰林學士而京亦尋罷以何執中為左僕射太學生陳朝老上書言陛下即位以來五命相矣有若韓忠彥之庸懦曾布之奸贓趙挺之之蠢愚蔡京之跋扈今復相執中執中何為者耶是猶以蚊負山也初徐績與執中俱為諸王記室績持正尤見禮重然不至大用且嘗入元祐黨籍至是才復集賢殿修撰召對上勞問甚渥曰卿久於外民疾苦當盡言之績曰事固未易勝言唯茶鹽法為最甚茶法取息太重故私販者十百為羣被甲荷戈白晝公行若聚而為盜未易支吾舊法官𣙜鹽州縣常有三年之積客人沿邊入中糧草鈔法既行今許通商州縣無積鈔法大壞有誤邊計又綱運船米無缺折以般鹽酬之今無般鹽則米綱亦壞上曰為國用不足故行此法績曰生財有道理財有義用財有法今國用不足在陛下明詔有司推講而力行之上曰久不聞卿有言欲復用績績不願留以顯謨閣學士留守南京秋江淮大旱自六月不雨至十月冬十月大雨震雹甘露降尚書省上作詩賜執政以下蔡京致仕仍朝朔望提舉編修哲宗實録大朝會許立宰相班初石公弼為中丞時論京姦狀侍御史毛注初擢亦言京輔政已久罪惡非一孟翊妖姦而京受其書張懷素逆惡而京與之游林攄跋扈之黨而致之政府宋喬年姦雄之親而置之京尹其門人傳播謂陛下恩禮優異即復相陰毒慘烈睚眦必報士大夫重足側立莫敢正視京既罷相且致仕矣未幾注復彈京留居賜第不自循省增飾臺池外示閒暇執政大臣多出其門謀謨日聞牽制不改乞降前後章正京之罪俾速去國而給事何昌言又奏大臣被罪須有章疏合過門下省關報四方按京頃居相位擅作威福濫賜豫以蠧國用輕爵祿以示私恩謂財羡皆誕謾務興功為騷擾古人有一於此必加嚴刑而京兼有之自京再罷相士民以為京去可必而又以哲廟實録未竟而留今既成書去計杳然若非天變屢見有以警陛下人力其如之何上始下公弼前所上章降京太子少保致仕居於外而中丞何執中乃上書謂進退大臣當全體貌於是為京降詔略曰尚慮仇怨捃托舊事下石傾擠彈劾不已故京得不重貶而且知京將復用矣時四方承平帑庾盈溢京倡為豐亨豫大之說視財物如糞土纍朝所儲竭矣京於明年四月進哲宗實録庚寅大觀四年春二月禁燃頂煉臂自毁者刺血斷指之類張商英入對商英知杭州過闕入對上問向來黨籍之由對曰臣嘗作嘉禾頌大臣以此相媒蘖若非陛下洞悉本末臣何由出黨籍上因語及蔡京亂紀綱事商英曰蔡京自來專任意不知都省批狀便是條貫入狀請寶便是聖㫖若前後失序安得不亂上曰京多用親黨商英曰京舊居兩浙既貴浙人之髙資巧宦者苞苴結託今皆為其心腹耳目上又曰近來風俗甚不美商英曰此正今日之大患也上曰已逐三十餘輩矣商英曰餘黨尚多上曰百姓聞卿來皆鼓舞欣恱商英曰何干臣事是日商英初見聖躬微興遂留商英為中太一宫使竄陳瓘陳正彚初瓘之子正彚聞承議郎蔡崈盛稱太師蔡京福厚隂有動搖中宫之迹亟詣杭州告京有反狀知杭州蔡薿執正彚送京師上命中丞何執中鞫之瓘自明州逮入開封制獄權尹李孝夀使吏脅瓘使承教正彚妄訴瓘語吏曰正彚安能知之願得筆札悉以聞吏恐懼不敢與獄具瓘安置通州正彚流沙門島夏五月停給僧牒毛注言天下僧尼增舊十倍凡數十萬人祠部歲給度牒凡三萬乞權住三年從之立詞學兼茂科改宏詞科為之明年二月談世績以試中除館職後不書初歲一試或言不無幸中宣和五年詔附省試有星孛於奎婁犯帝座者再有星孛於中宫長數丈始出王良造父間遂歷閣道逆行入紫宫幾遍掃垣內外座已退俄又進尋至西北入濁不見朱勔進花石初尚少政和中始盛號花石綱豪奪于民毫髮不償墳墓之間盡皆發掘石巨者高廣數丈載以巨艦挽以千夫鑿河斷橋毁堰拆閘數月方至京師一花費數千緡一石費數萬緡勔又即所居創一圃林樾之勝冠於二浙後復取㫖建神霄殿塑青華帝君像其中監司郡守初到必朝謁焉九月庚寅朔日有食之罷創增寺觀額冬十月立貴妃鄭氏為皇后后有異寵上多賚以詞章天下歌之十一月丁卯郊置編政典局張商英請編熙寧元豐事號皇宋政典其目曰原廟新省除三舍導洛斷例回河保甲將兵免役青苗吏祿守具禮樂營造茶馬大略如此詔就尚書省置局差編修檢閲官商英蓋謂蔡京以紹述為名但劫制人主禁錮士大夫爾故作政典以黜其妄時商英稍事更變省六路上供錢鈔罷東北鹽又罷內庫出剩鈔鹽歸之有司亦不以少廢報私怨且裁抑僥幸然性頗疏凡所欲為必先誦言於廣座人皆得預為計而左僕射何執中陰患之又鄭居中雖以外戚嫌罷樞密而植黨窺伺商英惡之居中乃與蔡薿劉嗣明之徒共陷商英又內侍楊戩提舉後苑作有勞除節度使商英執不可詔曰祖宗法內侍皆寄資無至團練使者大有勳勞則别立宣昭等使以寵之未聞除節鉞也戩益銜之商英既置政典局久之有降㫖使通州安置人陳瓘上所著尊堯集於是瓘具奏且申政典局請於御前拆開有謂瓘當貽商英書瓘曰商英為相有所施為不於三省公行乃置局建官若自私者正恐尊堯集至而彼已動搖亟逺其迹猶恐不免况以書乎時中丞張克恭等阿附蔡京亦揣上㫖向京數條奏京政事且劾商英明年秋詔神宗德業具在信史其政典無用可罷局九朝編年備要卷二十七
