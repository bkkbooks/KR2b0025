body:
  text: 九朝編年備要卷八宋陳均撰真宗皇帝起壬子大中祥符五年止乾興壬戌元年壬子大中祥符五年春正月河決棣州時著作佐郎李垂上導河形勢書三篇并圖詔任中正陳彭年等詳定中正等言侵占民田頗為煩費興行匪易而博洽可奬八年徙城於州之北七十里以避河流既而大水沒故城丈餘二月京西飢募富民出粟振糶三月親試舉人賜徐奭以下一百餘人及第出身有差給官印紙起草并摹印御題賜之夏四月以向敏中為平章事敏中再掌留任以厚重鎮靜人情帖然上嘉之故復相初上之將北征也敏中時知永興軍上深念北鄙賜以便宜詔敏中得詔藏之不下視事如他日會郡人大儺有告禁卒欲倚儺為亂者因伏甲幕中召賓僚置酒縱閲儺入揮伏甲盡擒之果各懷短刀即席誅勦命布灰掃庭張樂宴飲如初上亦知其任重有再用之意尋知河南府至郡辨僧殺人之誣衆咸以為神明時舊相出鎮者多不以吏事為意冦準終日宴遊張齊賢儻蕩尤不治惟敏中勤於政事所至著稱上曰大臣出臨方面不當如向敏中耶六月令樞密院修時政記故事樞密院月録附史事送中書編於時政記至是王欽若等請别撰樞密院時政記始此賜隱士林逋粟帛逋恬淡好古不趨榮利家貧衣食不足晏如也結廬杭州西湖之孤山二十年足不及城市轉運使陳堯佐以其名聞詔賜粟帛長吏嵗時勞問逋卒於天聖元年臨終有茂陵他日求遺藁猶喜曽無封禪書之句上悼之賜諡和靖先生秋八月丙申朔日有食之作五嶽觀尋改為會靈觀九月以王欽若陳堯叟為同平章事樞密使儒臣領樞密兼使相始此趙安仁罷時為參知政事初議立后安仁謂劉德妃家世寒微不如沈才人出于相門後上與王欽若從容論當今大臣誰為長者欽若欲排安仁乃譽之曰無若趙安仁安仁昔為沈倫所知常欲報之上始有意斥安仁矣嘗諭王旦曰聞趙安仁在中書絶不親事旦對曰每奏對安仁亦未嘗不與居常進擬皆同列議定方敢取旨臣每見臨時變易於上前者皆迎合陛下意安仁無異議是有執守上曰能如此耶朕不知也及罷政事仍命同修史安仁雖貴簡儉若貧素喜誨誘後進時以重德歸焉以丁謂參知政事王欽若所薦也欽若與謂及劉承圭陳彭年林特交通蹤迹詭祕時號五鬼初李宗諤家貧王旦常資給之欲引宗諤為參知政事欽若知之故事參政謝日賜物幾三千緡欽若因密奏旦欲得宗諤所賜物以償已債上遂不許冬十月聖祖降先是上夢景德中所睹神人傳玉皇及天尊之命云先令汝祖某授汝天書翌日夜復夢天尊言吾坐西當斜設六位即于延恩殿設道場是日五鼓天尊降曰吾人皇中九人之一人也是趙之始祖再降乃軒轅黃帝後唐時七月一日復降主趙氏之族謂上曰善撫育蒼生無忘前志尋上聖祖尊號曰聖祖上靈髙道九天司命保生天尊乃詔避聖祖名上曰玄下曰朗應天慶觀並增聖祖殿以七月一日為先天節十月二十四日為降聖節尋又上聖母號曰元天大聖后大赦十一月置玉清昭應宮使以王旦為之十二月置景福殿使以劉承圭為之作景靈宫奉聖祖越明年以王旦為兖州景靈宫朝修使詔自京至兖州察吏治民隱聽旦以便宜從事旦還言李士衡等政績乞加褒諭又言徐懷式等無治聲令監司察之或曰公為元宰出使所舉官吏僅得褒詔無乃太輕乎旦曰既稱之又請亟用則上恩皆出於已矣此人臣之大嫌也入內押班周懷政實與旦同行或請間必俟從者皆集然後見之未嘗私焉議者以為得體立德妃劉氏為皇后后性警悟曉書史處置宫闈事多引故實無不適當定三院御史員以六員為制除差出外任及任京蒞他局者不與癸丑大中祥符六年春正月詔兩浙發廩平糴價轉運使言本路米價為賈販翔踴請禁之詔勿禁而有是命禁出使內臣干預公事官吏不即以聞並置于罪祖宗舊制凡內臣出使皆責知委狀敢妄奏他事者伏軍令至是復有是詔以屬籍為玉牒尋置宗正寺修玉牒官名皇朝新譜曰仙源積慶圖夏六月幸舍利塔楊億罷自翰林學士罷為太常少卿分司西京先是億嘗草答契丹書云鄰壤交歡上自注其側作朽壤鼠壤糞壤等字億遽改為鄰境明日引唐故事學士草制有所改為不稱職亟求罷上慰諭之他日謂輔臣曰楊億真有氣性不通商量及議册皇后劉氏上欲得億草制使丁謂諭旨億難之因請三代謂曰大年勉為此不憂不富貴曰如此富貴亦非所願也乃命他學士草制億雖頻忤旨恩禮猶不衰時王欽若驟貴億素薄之陳彭年方以文進亦忌億名出已右日相與譛之上意稍怠億嘗入直被召賜坐徐出文藁數篋以示億曰卿識朕書迹乎皆朕自起草未嘗命臣下代作也億皇恐不知所對億出即謀奔遁億有别墅在陽翟會母疾億留謁告榜子與孔目吏中夕亡去朝論喧然以為不可上亦謂王旦等曰侍從臣安得如此自便旦曰億得罪賴陛下矜容不然顛躓必矣然近職不可居外地今當罷之上終愛其才踰月弗下洎億稱疾請解官乃有是命明年秋以疾愈求入朝上謂旦曰億性峭直無所附會文章學問無及之者然或言其好竊議朝政何如也旦曰此蓋與億不足故為誣謗耳億諧謔過當則恐有之訕讟之事保其必無也命知汝州時御史猶指前事為言上詔中書召諭之至汝州言部內秋稼甚盛粟一本至四十穗麻一本至九百角上覽其章謂輔臣曰億之詞筆冠映當世後學皆慕之王旦曰如劉筠宋綬晏殊輩相繼屬文有貞元元和風格者自億始也秋七月瀘戎蠻冦邊除農器稅初知濵州呂夷簡請免稅河北農器上曰務穡勸耕古之道也豈獨河北哉乃詔諸路並除之置水虎翼軍初太祖立神衛水軍江淮平不復振舉至是選在京江淮習水卒於金明池按試戰棹而立是名八月置禮儀院以趙安仁陳彭年同知院事冬十月元德皇后祔廟至道末有司議以淑德懿德皇后並配饗太宗久未決後禮官參議以元德皇太后實生聖嗣宜改上徽名曰元德皇后升祔詔從之恭以神主祔于明德皇后之次十二月戊午朔日有食之甲寅大中祥符七年春正月上如亳州謁太清宮去秋詔以今春謁太清宮龍圖待制孫奭上言陛下封泰山祀汾隂躬謁陵寢今又將祠太清宫外議籍籍以為陛下事事效唐明皇因言明皇禍敗之迹上以泰山汾隂非始於明皇且以開元禮今世所用乃作解疑論以示羣臣雍丘隱士邢惇以學術稱隱居不仕王曽薦之上還自亳召問治道不對徐曰陛下東封西祀皆已畢矣臣復何言上説除許州助教後卒鄉人見其敕與廢紙束置屋梁間升應天府為南京作鴻慶宫二月上至自亳州恭謝東郊大赦令益州鑄當十鐡錢三月皇子受益封慶國公舊制國公食邑三千戶今止千戶有司之誤也皇子即後宫李氏所生于是五年矣劉皇后以為已子使楊婉儀保視之故仁宗嘗呼后為大娘娘婉儀為小娘娘五月刻天書以王旦為刻玉使王欽若等為同刻玉使副使同副使折惟昌卒先是河東民運糧赴麟州當出兵為援惟昌時已屬疾曰古人受命忘家死於官事吾無憾也即引衆冒風沙而行疾遂亟上遣使挾醫眕視弗及以其弟惟忠代知府州惟忠世將知兵領州事凡二十年卒於明道二年以其子繼宣代之授嘉勒斯賚官渭州蕃族首領也六月王欽若罷欽若傾巧矯誕樞密副使馬知節薄其為人未嘗詭隨上嘗賜近臣詩誤用旁韻王旦欲白上欽若曰天子詩豈當以禮部格校之旦遂止欽若退處密以聞後上言及之旦唯唯知節具斥其姦狀欽若每奏事必懷數奏但出一二匿其餘退則以已意稱上旨行之知節嘗于上前顧欽若曰懷中奏何不盡出至是又爭賞王懷信平蠻事上怒皆罷之以冦準為樞密使同平章事王旦薦之也秋八月河決澶州命塞之九月親試舉人亳州南京路張觀等二十一人除官如東封西祀例冬十月玉清昭應宫成宫宇總二千六百一十區初料功須十五年修宫使丁謂令以夜繼晝繪一壁給二燭遂七年而成軍校工匠第賞者九百餘人十二月作元符觀乙卯大中祥符八年春正月朔上玉皇聖號大赦定奏蔭法承天節及南郊二月淮浙飢遣使巡撫三月親試舉人賜蔡齊以下百八人及第出身有差狀元給金吾騶從七人傳呼聽引兩節始此是嵗禮部初置謄録院仍詔禮部進士六舉諸科九舉以上雖不合格並許奏名上之親試進士也召崇文館檢討馮元講易泰卦元因推言君道至尊臣道至卑必以誠相感乃能輔相裁成上悅命賜五品服夏四月召宰相觀書觀書於玉宸殿閲御製皇王帝霸五臣等論尋以御製良臣正臣忠臣姦臣權臣五論賜宰相冦準罷為武勝軍節度同平章事先是準惡林特之姦邪數與忿爭特方有寵上不悅謂王旦等曰準年高屢更事朕意其必能改前非今觀所為似更甚焉旦等曰準好人懷惠又欲人畏威皆大臣所當避而準以為己任此其所短也非至仁之主孰能全之始旦之薦準也嘗力疾入見上問以誰可代卿者再三不對上曰張詠何如不對又問曰馬亮何如不對上曰試以卿意言之旦強起曰以臣之愚無若冦準上憮然有間曰準性剛褊更思其次旦曰他人臣所不知也及準為樞密使中書事有關送樞密院礙詔格者準奏之上以詰旦旦頓首謝既而樞密有送中書亦礙詔格旦但令送準準大慚旦每見上必稱準之才而準數短之上以詰旦旦曰理固當然臣久在相位缺失必多準對陛下無所隱此臣所以重準也及準自知當罷使人私於旦求為使相旦大驚曰使相豈可求耶且吾不受私請準深恨之及制出準入見涕泣曰非陛下知臣何以至是上具道旦所以薦準者準始愧歎出語人曰王同年大度如此耶申嚴倉庾羡餘禁詔倉庾出納自今勿以羡餘為吏課五月榮王元儼宫火延燒內藏左藏庫朝元殿乾元門崇文院祕閣求直言有司劾遺火事當死者甚衆王旦曰陛下始以罪已詔天下今乃過為殺戮且火雖有迹安知非天譴也上欣然納之減死幾百人却羡餘貢河北轉運使李士衡言有羡餘錢四十萬緡及紬布等詔令貯積本路士衡前後獻羡餘助郊祀東封非一申禁金飾服用詔自中宫宗室皇親及外庭臣庶之家衣服器用並不得以銷金創金金線之類為飾出宮人六月己酉朔日有食之閏月大赦詔大辟情可憫者以聞令諸庫勿進都數如中使宣取錢物但畫時供應不得以見管都數供報如違主典處死監官決配舊制庫務都三司使亦不得知丁謂充使日自陳支度經費宜知常數上勉從之仍令副使以下不得預聞詔定茶法自景德改茶法之後上封者多言不便丁謂曰未改法前嵗虧茶本錢九千餘貫改法之後所收利不下二百餘萬貫乃命馮拯王曽同三司詳定拯等尋皆以謹令崇信為言先是三司言民有販茶違法者欲令同居告訐上曰以利而壞風俗非國體也不許秋七月郭崇仁遷解州團練崇仁守文子章穆皇后弟也時崇仁居母喪詔起復仍自昭州團練有是命崇仁雖外戚朝廷未嘗過推恩澤自是十年不遷八月張詠卒時以樞密直學士卒於陳州詠少倜儻有大志尚氣節重然諾勇于為義上嘗稱詠才任將帥以疾不盡其用詠臨終奏疏言不當造宫觀竭天下之財傷生民之命乞先斬丁謂頭置國宮門以謝天下然後斬臣頭置丁氏之門以謝謂上亦不以為忤詠嘗語人曰吾榜中得人最多謹重有雅望無如李文靖深沈有德鎮服天下無如王公面折廷爭素有風采無如寇公當方面寄則詠不敢辭冬十二月皇子冠封夀春郡王進封升王尋置夀春郡王友以張士遜崔遵度為之士遜平雅和謹淡於勢利遵度修起居注踰十年立殿墀上常退匿楹間慮上見之搢紳推其長者初大臣欲以二人為翊善記室上曰翊善記室府屬也王皆受拜故以王友命之令王每見答拜示賔禮之意士遜嘗對王旦稱王學書有法旦曰公為王友職止于是耶士遜愧謝是嵗注輦國來貢使者言其國東距海五千里西至天竺一千五百里南至羅蘭二千五百里至頓田三千里舟涉一千五百日乃達廣州約其道路蓋四十一萬一千四百里其國主曰十年來海無風濤中國其有聖人乎於是遣使入貢其所上來詞致如中國云丙辰大中祥符九年春正月以張旻為宣徽南院使兼樞密副使是時任馬軍副指揮使被旨選兵下令太峻兵懼謀為變上密召二府議之王旦曰若罪旻則帥臣何以御衆急捕謀者則震驚都邑陛下嘗欲任旻樞密臣未敢奉詔今若擢用使解兵柄反側者自安上喜曰王旦善處大事真宰相也二月置資善堂詔以皇子就學之所名資善堂上作記刻石堂中召近臣觀書于翔鸞閣三月召宗室觀書于玉宸殿翌日復召宴射授李遵節度使一名立遵西番宗噶爾族首領也夏六月謁會靈觀秋七月蝗上詣景靈宫開寶寺祈禱先是上出死蝗以示大臣已而執政有袖死蝗以進者請示於朝率百官賀王旦曰蝗出為災災弭幸也又何賀焉固稱弗可于是二府方奏事飛蝗蔽天上顧謂旦曰使百官方賀而蝗若此豈不為天下笑耶時遣中使督諸州捕蝗又分路按視蝗傷悉除其租上減膳蔬食不舉樂蝗傷才十一二飛蝗之過京城也上方御膳見蝗勢障日意甚不懌乃命徹膳聖體自是不康八月陳堯叟罷為右僕射堯叟強力明辨多任智數久典樞密軍馬之籍悉能周記九月秦州屬羌冦邊曹瑋敗之嘉勒斯賚宗噶爾立遵等三萬人入冦至三都瑋時知秦州即領軍擊敗之二族在秦西南頗強悍先是嘗求贊普名目瑋請勿許朝廷猶以為保順節度瑋曰我狃遵矣先為之備乃誘致其蕃部以弱之于是有三都之捷其後又破滅諸羌二族以窮孤逃入磧中瑋斥境隴上置十塞自是秦人乃安先是翰林學士李迪召對龍圖閣草詔書上徐謂迪曰曹瑋在秦州屢請益兵未及遣遽辭州事邊將誰可代瑋者對曰瑋知嘉勒斯賚欲窺關中故請益兵為備非怯也且瑋有謀諸將皆非其比陛下重發兵豈非將上玉皇聖號惡兵出宜秋門耶今關右兵多可會其羡益發赴瑋上因問關右兵幾何對曰臣向在陜西以方寸小册書兵糧數備調發今猶置佩囊中上令自探取目內侍取紙筆具疏某處當留兵若干餘悉赴塞下上顧曰真所謂頗牧在集中未幾嘉勒斯賚果犯邊秦州方出兵復召問曰瑋戰克乎對曰必克及捷書至上謂迪曰卿何料之審也迪曰嘉勒斯賚大舉入冦使諜者聲言以某日下秦州會食以激怒瑋瑋勒兵不動坐待其至是則以逸待勞臣用此知其決勝也禁貢瑞物冬十一月石普抵罪普時知許州上言日當食又言嘉勒斯賚隂報曹瑋請以臣所獻陳圖付瑋可使必勝也初上方崇符瑞普請罷天下醮設嵗可省緡錢七十餘萬以贍國用遂忤上意于是上益怪普言踰分而王欽若謂普欲以邊事動朝廷又言日食不驗除名配賀州普倜儻有膽略兩平蜀盜大小數十百戰人服其勇以李及知秦州瑋自知秦州遷為秦州都部署上問王旦誰可代瑋者旦薦及衆謂及雖重厚非守邊才及至秦州有禁軍白晝掣婦人銀叉於市及方觀書立命斬之觀書如故聲譽達京師楊億以告旦旦曰是固當斬烏足為異政乎旦之用及者其意非在此也以及之重厚必能守瑋規模而已及性清介所治簡嚴喜慰薦下吏而樂道人善後知杭州不事燕遊一旦冒雪出郊衆謂當置酒召客乃獨造林逋清談至暮而歸居官數年未嘗市吳物比去惟市白樂天集召近臣觀書於龍圖閣丁巳天禧元年春正月朔上玉皇聖祖寶册尋出聖祖金寶牌給京城寺觀天下名山恭謝南郊大赦兩浙提刑范應辰上言姦凶之輩密料赦期發其宿憾或挺刀殺人或縱火焚舍尋亦除罪又配為卒伍皆給衣糧是何異賞人為盜者耶先是上嘗謂宰相曰為國之要在乎賞當其功罰當其罪不任情於其間則賞罰必當懲勸必行萬方必理和氣必生自然天地降祥四方無事以此思之可不戒乎二月增諫官御史員詔别置諫官御史各六員不兼他職月須一員奏事或有急務聽非時入對三年則絀其不勝任者尋以劉􅀈為右正言劉平為監察御史魯宗道為右正言皆用新詔也李公藴封南平王召馮元侍講講易於宣和門北閣待制查道李虛已李行簡預焉自是聽政之暇率以為常因數訪大臣能否而行簡無怨昵必盡稱道其長人推其長者陳彭年薨臨其喪涕泗良久時為參知政事彭年敏給強記好儀制刑名之學素姦諂號九尾狐張齊賢在相位彭年嘗求為理寺詳斷官一見輒不可曰此人在朝必亂國政或疑齊賢過甚後乃服其知人夏五月以仍嵗旱蝗遣使分路安撫時諸路百三十州皆言蝗蝻食苗遣內臣督州縣分捕先是上謂宰相曰去嵗旱蝗秋稼不稔今春時雨未降朕夙夜驚懼未嘗暫忘豈非政令有爽天意因思茶鹽條禁頗為峻刻或行之已久難於遽改削其尤不便民而傷於厚斂者可也右正言魯宗道上言今天下親民之官孜孜于民政者十不一二宜妙選英哲委以親民之任上曰謹擇牧宰實朝廷之急務也先是龍圖閣待制張知白上言亦謂朝廷每除牧伯皆避命致訴比遣外任多是纍貶之人風俗不澄實由於此因求補外職不許秋七月王旦罷為太尉兼侍中昭應宫使旦以疾求解故也聽五日一赴起居旦後懇請去不已上曰朕覺體中不佳方欲以大事託卿而卿疾如此奈何因命皇子出拜旦言皇子盛德必能任陛下事遂薦可為大臣者十餘人其後不踐兩府者獨凌䇿李及薛奎常為江淮發運辭旦旦云東南民力竭矣奎退曰真宰相之言張士遜為江西轉運旦謂曰朝廷𣙜利至矣故士遜所至未嘗敢求利散監牧馬時仍嵗旱蝗向敏中言國家監牧馬數萬廣費芻粟若令出賣散於民間緩急取之猶外廄耳從之八月以王欽若同平章事先是上欲用欽若王旦言祖宗朝未嘗使南方人當國雖古稱立賢無方然必賢士乃可上遂止欽若嘗語人曰為王子明故使我作相晚却十年九月李迪參知政事上嘗憂旱蝗嵗用不給迪曰祖宗置內藏正欲復西北故土及支凶荒上曰當出金帛數百萬借三司迪曰天子於財無內外何必曰借上悅迪又言陛下東封時敕所過無伐木除道即驛舍或州治為行宫才令加塗塈而已及幸汾亳土木之役過往時百倍今旱蝗之災殆天意以警陛下也上曰卿之言然有誤朕為此者王旦薨臨其喪贈太師中書令諡文正旦尋以冬至日葬先是太常禮院言宰相出殯當輟視朝王旦以是日葬望準禮例中書言其日皇帝已有詔不受朝賀遂不下輟朝之命議者謂其日當罷百官拜表之禮時王欽若與旦不協故抑之旦性沖淡寡欲奉身至薄所居陋甚將死不為宗戚求官咸平初旦聞李沆之言固未深信及親王欽若丁謂等所為諫則業已同之欲去則上遇之厚乃嘆曰李文靖真聖人祥符以來每有大禮輒奉天書以行常悒悒不樂既寢疾遺令削髮被緇蓋悔其前之為也論者謂旦得君言聽諫從安於勢位而不能以正自終或比之馮道云旦居相位王曽等嘗乘間謂旦曰曽等在政府每見奏事其間亦有不經上覽公但批旨行下恐人言之以為不可旦但遜謝而已一日曽等以前説聞于上上曰朕嘗諭旦小事一面專行卿等當謹奉之曽退謝旦曰上之委遇非曽等所及知也中書嘗請以知制誥盛度權知開封府上曰可更問王旦旦時屬疾在告中曰度必不樂此任既而度果不願處繁劇上曰王旦銓量才品極當豈可不問也有日者上言宫禁事被誅并得朝士占問簡尺上欲案之旦曰此人常情且語不及朝廷不足究治因自取舊所占書進曰臣賤時不免為此必以為罪願并下事遂寢既而大臣復欲因是擠其所不快者力請究治上令就取則已悉焚之矣趙德明嘗以民飢上表乞糧數百萬羣臣皆請降詔責之旦曰臣欲詔德明云已敕三司在京積粟百萬可遣衆來取上喜從之德明受詔再拜曰朝廷有人契丹請嵗給外别假銀幣上以問旦旦曰東封甚近欲以此要朝廷耳乃請于此給三十萬內各借三萬契丹得之大慚宦者劉承規病求節度使上諭旦旦曰陛下所守者祖宗故典典故所無不可聽也當問諸有司翌日上復言之旦曰若如所請後將有求為樞密使者矣此必不可上乃止承規卒猶追贈焉承規即承圭也邊肅嘗坐贓貶向敏中謂旦曰邊同久責已久牽復可乎旦曰為近臣坐贓豈得更升進耶敏中語數及之旦曰必欲用須旦死可也至是始以赦敘復上嘗召李行簡命為太子中允致仕參政穆子也沖淡不樂仕進上特召對而命之初召行簡使者不知所止上令問旦旦匿名迹逺權勢後史官修真宗實録得內出奏章乃知朝廷士多旦所薦冬十月詔災沴不以聞者論罪十二月詔治河勿調丁夫以役兵充戊午天禧二年春正月宴宗室於資善堂振河北飢詔發廩及漕江淮米十萬石振之宴從臣及夀春郡王府官屬于資善堂出御製恤黎民等歌賜夀春郡王二月京西飢三月修京城夏四月作祥源觀有言拱聖營真武祠側湧泉瘳疾者詔建祥源觀任布上言不宜以神怪眩愚俗劉燁亦言前世傳聖水者皆詭妄並不報六月彗出北斗秋七月大赦以天文示變故也以李士衡為三司使上作寬財利論賜之士衡方進用王欽若害之會上論時文之弊欽若因言路振文人也然不識體李士衡父誅死而振為贈告乃曰世有顯人士衡以故不大用八月立升王受益為皇太子賜名禎尋賜以元良針謁太廟日有左右珥黃雲捧日大赦冬十月詔定茶法因左諫議大夫孫奭之請也奭言茶法屢改非示信之道即詔奭與三司裁定務從寬簡未幾奭出知河陽事遂止奭初自密州還時方置天慶等節天下節設齋醮張燕費廣奭請裁省浮用不報遂復出其居朝廷蓋不周嵗云十一月召近臣觀書于太清樓天禧三年春二月河南府地震三月戊午朔日有食之親試舉人賜王整以下一百四十人及第出身有差元年魯宗道言進士詩賦不近治道諸科對義但以念誦為工乃申明前詔進士兼取論䇿諸科能明經者别與考較天書降乾祐山夏四月迎入內冦準鎮永興朱能為都巡檢使能好造符命託神靈而外附準至是準奏天書降乾祐山中蓋能使為也上迎奉焉羣臣無敢言者孫奭時知河陽上言朱能姦憸小人天下皆知能所為獨陛下一人不知耳乞斬能以謝天下上亦不之責以夏守恩劉美為四廂都指揮使守恩為捧日天武四廂美為神衛龍衛四廂時上不豫中宫預政故守恩進用也國朝殿前司捧日天武馬軍司龍衛步軍司神衛謂之上四軍各有左右廂每廂各有都指揮使廂各三軍每軍五指揮一軍又各有指揮使一員都虞候副之捧日天武龍衛神衛又有第四軍處所退年髙者無節都指揮使止有都虞候殿前司又有神勇宣武驍騎各上下軍軍十指揮又有寧朔驍勝各十指揮虎翼左右各五軍軍十指揮並有都指揮使都虞候馬軍司則有雲騎武騎各十指揮步軍司則有虎翼左右各五軍軍十指揮每軍各有都指揮使一員都虞候副之每遇大禮後各以次補遷凡軍校遷至軍都指揮使又遷則遙領刺史又遷為廂都指揮使遙領團練使員溢即從上落軍職為正團練使刺史之本任或為他州部署鈐轄其老疾若過失者為御前忠佐馬步軍都軍頭副都軍頭𨽻軍頭司甚者出為外州馬步軍都指揮使復命臺諫兼他職右正言劉燁判三司戶部勾院監察御史劉平章頴兼鹽鐡度支判官或言燁等兼他職執政蓋不欲其專任言也諫官御史于是復兼他職六月王欽若罷欽若恩遇衰人有言其受金又與道士蓄禁書者往來故罷河決滑州灌澶濮鄆濟至徐州入淮以李允則知鎮州允則在雄州十四年治城壘不輟契丹以為疑詔詰之允則奏言初通好時不即修治他日復安敢動乎允則又縱競渡以寓水戰列畦壟植榆栁地益險阻當時邊臣鮮能及常燕軍中而甲仗庫火允則作樂行酒不輟副使請救不答少頃火熄命悉瘞所焚物密遣吏持檄瀛州以茗籠運器甲不浹旬其數已完人無知者樞密院請劾不救火狀上曰允則必有謂姑詰之對曰兵械所藏警火甚嚴方燕而燔必姦人所為舍燕救焚事或不測一日民有訴為北人毆傷而遁者允則不治與傷者錢二千衆以為怯逾月幽州以其事來詰答以無有蓋他諜以毆人為驗比得報以為妄乃殺諜以冦準同平章事準之始召也將行其門有勸準者曰公若至河陽稱疾堅求外補此為上䇿倘入見即發乾祐天書之詐斯為次也最下則再入中書為宰相爾準不懌揖而起既至遂拜平章事時丁謂為參政事準甚謹嘗會食羹汚準鬚謂起拂之準笑曰參政國大臣乃為官長拂鬚邪謂甚愧之由是傾誣自此萌矣秋八月大赦以天書再降乾祐縣也馬知節卒時以彰德軍留後卒于湘州知節慷慨以方略自任又能好書賔友儒者所與交善必一時豪杰年十八監彭州兵馬以嚴飭見憚如老將性剛直敢言無避不肯少有卑屈嘗與王欽若爭論上前退見王旦詞色猶怒甚曰知節幾欲以笏擊死之但恐驚動君相爾東封以後上每出幸必以知節為都部署許以專殺知節部分嚴明未嘗輒戮一人大會道釋大安殿凡萬三千餘人先是建道場上親臨視賜以藥銀大錢京東河北水遣使安撫冬十一月除犯酒麯銅鍮等死刑辛未郊十二月富州蠻納土詔却之庚申天禧四年春正月以曹瑋為宣徽北院使鎮國留後簽署樞密院簽署兼藩鎮始此二月江淮浙利路飢遣使安撫滑州決河塞是役凡用兵夫九萬人上親製碑紀之三月益梓路飢遣使安撫向敏中薨臨其喪敏中端厚多智善處繁劇識大體密靜逺權門無私謁諸子不令釐務雖當大事若已不與焉謹於采納不妄推薦當時以重德目之夏四月大風晝晦分江南轉運為東西路楊億復翰林學士初億自汝州還久之不遷或問王旦曰楊大年何不且與舊職旦曰大年頃以輕去上左右人言可畏賴上保庇之今此職欲出自清衷以全君臣之契耳踰六年乃復入禁署億卒于是冬億性耿介坦夷重交遊崇尚名節然評品人物善惡太明人多怨之億文章為時宗名聞外夷後贈禮部尚書諡曰文冦準罷為太子太傅萊國公先是準為樞密使曹利用副之準素輕利用議事有不合者輒曰君一夫爾豈解國家大體耶於是丁謂與利用共排準又翰林學士錢惟演亦附謂時上不豫政事多中宫所決謂等交通詭祕其黨日固劉氏宗人橫于蜀上以皇后故欲赦其罪準請必行重失后意謂等因媒蘖之準嘗請間言皇太子人望所屬願傳以神器丁謂小人也不可以輔少主上然之既而準被酒漏言謂等懼力請罷準上不記與準初有成言可其奏六月河復決滑州親試舉人御崇政殿親試禮部奏名舉人命官覆試如常例授三班奉職者九十二人借職者十三人餘補諸州上佐文學自奉職至殿侍悉免逺使與家便差遣秋七月以李迪為平章事馮拯樞密使同平章事錢惟演言拯純和與冦準不同故也上欲加拯吏部尚書參知政事將草制誤召楊億故事參知政事舍人草制樞密使同平章事學士草制因以樞密使命拯于是樞密院領使凡三人上徐覺其誤惟演遂勸遷曹利用丁謂遷中書丁謂平章事曹利用加同平章事皆用錢惟演之言也內侍周懷政伏誅冦準貶授太常卿準既罷上所以待準者猶如故丁謂等益懼會周懷政伏誅準乃逺貶初懷政嘗與上謀以太子監國出告準及準以謀泄罷相謂等因疏斥懷政懷政謀殺謂等復相準奉上為太上皇傳位太子而廢皇后召楊崇勳等諭之崇勳詣謂第告變曹利用入奏令衛士執懷政訊鞫具引伏斬之懷政既以謀逆伏誅有欲并責太子者上意惑之李迪從容奏曰陛下有幾子乃為此計上大悟準之貶也上初命與小州謂輒云與逺小州迪言向者聖旨無逺字二人忿鬬蓋始此朝士與準親厚者謂必斥之楊億尤善準始謀以太子監國屬億草制億夜屏左右為之辭至自起剪燭中外無知者既而準以被酒漏所謀獲貶謂召億至中書億懼甚不知所為謂素重億徐曰謂當改官煩公為一好詞爾億乃稍安謂等并發天書事詔捕朱能能殺使者叛逸衆潰窮蹙自殺準坐能叛再貶道州司馬準至道州晨具朝服如常時起樓讀書每賔至言笑自若若初無廊廟之貴者三絀皆非上本意嵗餘上忽問左右曰吾目中久不見冦準何耶左右莫敢對上崩乃貶雷州九月大赦冬十月初隻日視事中書門下言機務清簡請依唐制隻日視事雙日不坐從之十一月建天章閣以藏御製編聖政録命錢惟演等取時政記中盛美之事别編之丁謂李迪罷謂復相謂既擅權至除吏不以聞迪語同列曰迪起布衣十餘年位宰相有以報國死且不恨安能附權臣為自安計乎謂欲以林特為樞密副使迪爭之因詬謂引手板欲擊謂謂走得免及入對斥言謂姦邪願同下憲司置對又言冦準無罪罷斥朱能事不當顯戮又言錢惟演謂之姻家願與惟演俱罷政柄曹利用馮拯亦相朋黨時上怒甚欲付御史臺利用拯曰大臣下獄不惟深駭物聽况丁謂本無分競之意乃各降秩一級罷相謂知河南府迪知鄆州制書未出謂入對乞留因賜坐左右欲設墩謂顧曰有旨復平章事乃更以杌子進於是復視事仍詔迪即時赴鄆州謂始傳詔召劉筠草復相制筠不奉詔乃更召晏殊筠既自院出遇殊殊側面不敢揖蓋內有所愧也先是上久不豫語或錯亂嘗盛怒語輔臣曰昨夜皇后以下皆之劉氏獨留朕宫中迪進曰果如是何不治之后適在屏間聞其言由是惡迪迪所以不留亦上不豫中宫意也兩府會議資善堂詔合取旨事如故自餘常事委太子與兩府會議施行訖奏初議欲令太子總軍國事丁謂以為不可曰即日上體平朝廷何以處此迪曰太子監國非古制耶力爭不已迪既罷出故有是詔十二月嚴內侍傳旨覆奏法發京師常平倉以榖貴減其直御承明殿上不豫力疾御殿賜宰相手書諭以輔導儲二之意辛酉天禧五年春正月上疾愈幸啓聖院寬罪繫詔天下犯死刑者遞減流以下釋之遣使撫京東水災宴近臣承明殿二月審刑院奏刑措親試舉人賜天下酺三月賜京東西民租以水災賜租十之五夏四月客星出軒轅五月慮囚犯死刑者遞減有差秋七月甲戌朔日有食之冬十一月以丁謂為譯經使兼潤文十二月置同勾當三館祕閣以內侍皇甫繼明為之咸平中命內臣劉崇超監館閣圖籍至是丁謂改曰勾當公事內臣遂與大學士同職矣壬戌乾興元年春二月大赦移南郊恩賞先此頒行上崩於延慶殿年五十五在位二十六年諡曰文明章聖元孝廟號真宗皇太子即皇帝位尊皇后為皇太后楊淑妃為皇太妃軍國事權取太后處分遵遺制也丁謂欲去權字王曽曰政出房闥斯已國家否運稱權尚足示後且言猶在耳何可改也謂乃止曽又言尊禮太妃遽須他日議之不必載遺制謂拂然曰參政顧欲擅改制書耶曽復與辨而同列無助曽者亦止時中外洶洶曽正色獨立朝廷賴以為重曽援東漢故事請五日一御承明殿太后坐左皇帝坐右垂簾聽政既得旨而謂獨欲皇帝朔望見羣臣大事則太后與上召對輔臣決之非大事悉令雷允恭傳奏畫可曽曰兩宮異處而柄歸宦者禍端兆矣謂不聽蓋謂不欲令同列預聞機密故潛結允恭白太后卒行其意大赦百官進秩丁謂加司徒馮拯司空曹利用左僕射並兼侍中任中正王曽錢惟演並加尚書張士遜加侍郎曽謂謂曰中書令至諫議大夫平章事其任一也樞密珥貂可乎今以數十年曠位之官一日除授得無公議乎謂不聽冦準李迪曹瑋竄黜準雷州司戶迪衛州團練副使瑋知萊州連坐者甚衆皆丁謂之謀也王曽疑責太重謂熟視曽曰居停主人恐亦未免耳蓋曽嘗以第舍假準也曽踧然遂不復爭謂惡準迪必欲置之死地遣中使賫敕往以錦囊貯劍揭馬前既至道州準方與郡官宴飲中使入傳舍久之不出問所以來之故不答上下皆皇恐不知所為準神色自若使人謂之曰朝廷若賜準死願見敕書中使不得已乃授敕準從録事參軍借緑衫著之拜於庭升階復宴飲至暮乃罷使至鄆州迪聞其異於他日即自裁不殊或饋之食中使輒不與迪客鄧餘怒曰汝殺我公我必殺汝從迪至衛州不離左右迪由是獲全或語謂曰迪若貶死公如士論何謂曰異日好事書生弄筆墨不過曰天下惜之而已三月定視朝及講讀日中書請自禫祭後隻日於崇政殿或承明殿視事雙日如先帝故事前後殿皆不坐詔雙日雖不視事亦宜召近臣入侍講讀作受命寶曰皇帝恭膺天命之寶命王曽書之夏四月限伎術官中書言舊制翰林醫官圖畫琴棋待詔轉官止光祿寺丞天禧四年乃遷至中允贊善洗馬同正請勿踰此制雖特恩即至國子博士而止六月內侍雷允恭伏誅丁謂罷用王曽之請也初司天監邢中和言山陵上百步法宜子孫允恭擅移皇堂事覺伏誅初王曽以計紿同列請獨對直言謂包藏禍心令允恭移皇堂于絶地太后大驚欲併誅謂馮拯為之請乃止行降黜故事宰相罷相皆降制時亟欲行止召當直舍人草詞仍榜朝堂布諭天下謂所坐但私庇允恭不忍破其妄作未必真有禍心也然天資險狡多隂謀得政嵗久要不可測雖曽計傾之而公論不以為過也林特等八九人皆坐謂黨落職補外謂尋貶崖州司戶坐嘗教女道士劉德妙託道君言禍福也諸子並勒停三弟悉降黜詔臣寮有曽與謂往來者一切不問始謂命宋綬草冦準責詞綬請其故謂曰春秋無將漢法不道皆證事也綬雖從謂指然卒改易謂本語不純用及謂貶綬猶當制即草詞曰無將之戒舊典甚明不道之辜常刑罔赦朝論快焉謂初逐準京師為之語曰欲得天下寧當拔眼中丁欲得天下好莫如召冦老不半嵗謂亦貶道出雷州準遣人以一蒸羊逆之境上謂欲見準準拒絶之聞家僮欲報仇即杜門使縱博度謂行逺乃罷秋七月以王曽為平章事王旦嘗語其家人曰王君介然他日德望勳業甚大且曰王君昨讓會靈觀使頗拂上旨而進對詳雅詞直氣和了無所懾我自任政事幾二十年每遇上意稍忤則蹙縮不能自容以是知其偉度矣呂夷簡魯宗道參知政事宗道真宗時為正言多風聞彈奏上稍厭之一日自訟于上前曰臣在諫列而諫奈何以數厭之上悅其忠御筆題殿壁曰魯直後權判流內銓患銓格煩密及知吏姦狀多釐革之宗道剛正疾惡少容遇事敢言不為小謹嘗就飲酒肆使者至令以實告曰飲酒人之常情欺君臣子之大罪真宗以為忠實可大用嘗以語太后太后識之於是并夷簡皆首蒙拔擢錢惟演樞密使惟演舊位王曽上曽既入相惟演亦加樞使故事樞密使必加檢校官惟演但以兵部尚書充使有司失之也未幾馮拯言惟演以妹妻劉美實太后姻家不可與政遂罷之八月太后同御殿垂簾用王曽議也同御承明殿百官來賀太后哀慟令內侍宣諭曰候上春秋長即當還政馮拯為首相欲躡丁謂故迹曽曉以禍福且逆折之拯不敢肆自是事一決于兩宫初謂定太后稱豫謂敗中書與禮儀院參議每下制稱豫而便殿處分稱吾太后詔止稱吾尋以太后生日為表寧節冬十月葬真宗於永定陵祔廟以莊穆皇后配始丁謂請名陵曰鎮陵及謂貶馮拯謂三陵皆有永字故易曰永定陵然永定乃縣名也宣祖陵止名安陵又不知翼祖已名定陵於是復追改翼祖陵為靖陵議者譏拯不學當時無正之者天書皆從葬用王曽呂夷簡之議也尋以李沆王旦李繼隆配饗廟庭時上雖用以日易月之制改服臨朝宫中實行三年之喪十一月李士衡罷自三司使出知相州士衡屢以足疾求罷太后諭之曰先帝稱卿全曉金穀以比髙熲劉晏宜少安于位及是固請而有是命以劉筠為御史中丞先是三院言事皆先白中丞筠始令臺屬各舉糾彈之職給先聖廟學田判國子監孫奭言知兖州日於文宣王廟建立學舍以延生徒自後從學者不減數百人臣雖以俸錢贍之然常不給自臣去郡恐漸廢散請以楊光輔為兖州講書仍給田十頃以為學糧從之諸州給學田始此初御講筵御崇政殿西閣召翰林侍讀學士孫奭龍圖閣直學士兼侍講馮元講論語侍讀學士李維晏殊與焉初詔雙日御經筵自是雖隻日亦召侍臣講讀王曽以上新即位宜近師儒故令奭等入侍上在經筵或左右瞻矚或足敲踏床則奭拱立不講每講體貌必莊上亦為竦然改聽未幾召輔臣觀奭講論語上親書唐賢詩以分賜焉自是每召輔臣至經筵多以御書賜之國子監罷蔭補官國子監舊用近臣及宿儒典領近嵗頗任貴遊子弟之初任者至是始命馮元同判國子監仍詔自今毋得差補蔭京朝官九朝編年備要卷八
